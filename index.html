   const year = Number(match[3]) < 100 ? Number(match[3]) + 2000 : Number(match[3]);\n        return `${year}-${pad2(match[1])}-${pad2(match[2])}`;\n      }\n\n      match = name.match(/(?:^|[^\\d])(\\d{1,2})[._-](\\d{1,2})(?:[^\\d]|$)/);\n      if (match) {\n        const year = Number((state.month || currentMonth()).slice(0, 4));\n        return `${year}-${pad2(match[1])}-${pad2(match[2])}`;\n      }\n      return null;\n    }\n\n    function isTimesheetSectionHeader(value) {\n      const text = typeof value === \"string\" ? value : normalizeHeader(value);\n      return text.includes(\"stshift\") || text.includes(\"ndshift\") || text.includes(\"gate\") || text.includes(\"mechanic\");\n    }\n\n    function timesheetSectionColumns(headerRow) {\n      const headers = (headerRow || []).map(normalizeHeader);\n      const start = headers.findIndex((h) => [\"start\", \"here\"].includes(h));\n      const end = headers.indexOf(\"end\");\n      let actual = headers.indexOf(\"actual\");\n      if (actual < 0 && end >= 0) actual = end + 1;\n      if (actual >= (headerRow || []).length) actual = -1;\n      return {\n        start: start >= 0 ? start : 3,\n        end,\n        actual\n      };\n    }\n\n    function timestampedLiftsForShift(shift) {\n      const windows = shift.employees.filter((e) => e.start != null && e.end != null).map((e) => ({ start: e.start, end: e.end }));\n      if (!windows.length) return 0;\n      const seen = new Set();\n      state.moveDetails.filter((d) => !d.deleted && d.date === shift.date).forEach((detail) => {\n        const minute = detailMinute(detail);\n        if (minute == null) return;\n        if (windows.some((w) => minuteInWindow(minute, w.start, w.end))) seen.add(`${detail.field}|${detail.equipment}`);\n      });\n      return seen.size;\n    }\n\n    function filterAnalyticsShifts(shifts) {\n      const start = els.analyticsStart.value;\n      const end = els.analyticsEnd.value;\n      const shiftFilter = els.analyticsShift?.value || \"all\";\n      const managerFilter = els.analyticsManager.value;\n      const employee = normalizeName(els.analyticsEmployee?.value || \"\");\n      const minLpmh = numberValue(els.analyticsMinLpmh?.value || \"\");\n      return shifts.filter((shift) => {\n        if (start && shift.date < start) return false;\n        if (end && shift.date > end) return false;\n        if (shiftFilter !== \"all\" && shift.shift !== shiftFilter) return false;\n        if (managerFilter === \"unassigned\" && shift.managerKeys.length) return false;\n        if (![\"all\", \"compare\", \"unassigned\"].includes(managerFilter) && !shift.managerKeys.includes(managerFilter)) return false;\n        if (employee && !shift.employees.some((e) => e.employee.includes(employee))) return false;\n        if (minLpmh > 0 && !(shift.lpmh >= minLpmh)) return false;\n        return true;\n      });\n    }\n\n    function renderPersonGroupingMap(shifts) {\n      const groups = buildPersonGroupingMapData(shifts);\n      els.groupMapViewToggle.textContent = state.groupMapView === \"map\" ? \"Table view\" : \"Map view\";\n      if (!groups.length) {\n        els.groupMapContainer.innerHTML = `<div class=\"status-banner group-map-empty\">No LPMH data available for the selected filters.</div>`;\n        return;\n      }\n      const helper = groups.every((group) => !(group.avgLpmh > 0)) ? `<div class=\"status-banner\">All matching LPMH values are zero or unavailable, so bubble sizes are shown with a neutral baseline.</div>` : \"\";\n      if (state.groupMapView === \"table\") {\n        renderPersonGroupingTable(groups);\n      } else {\n        renderPersonGroupingSvg(groups);\n      }\n      if (helper) els.groupMapContainer.insertAdjacentHTML(\"afterbegin\", helper);\n    }\n\n    function buildPersonGroupingMapData(shifts) {\n      const groupSize = Math.max(2, Math.min(8, Number.parseInt(els.groupMapBy.value || \"2\", 10)));\n      const target = numberValue(els.groupMapTarget.value) || 3;\n      const minLpmh = numberValue(els.groupMapMinLpmh.value);\n      const minAppearances = Math.max(1, Number.parseInt(els.analyticsMinPair?.value || \"1\", 10));\n      const targetFilter = els.groupMapTargetFilter.value;\n      const map = new Map();\n\n      shifts.forEach((shift) => {\n        const employees = shift.employees.slice().sort((a, b) => a.displayName.localeCompare(b.displayName));\n        if (employees.length < groupSize) return;\n        const managerContext = analyticsManagerContext(shift);\n        const managerKey = normalizeName(managerContext);\n        combinations(employees, groupSize).forEach((combo) => {\n          const peopleKey = combo.map((employee) => employee.employee).sort().join(\"|\");\n          const key = state.managerContextEnabled ? `${peopleKey}|manager:${managerKey}` : peopleKey;\n          const baseName = combo.map((employee) => employee.displayName).join(\", \");\n          const groupName = state.managerContextEnabled ? `${baseName} - ${managerContext}` : baseName;\n          if (!map.has(key)) map.set(key, { key, name: groupName, baseName, managerContext: state.managerContextEnabled ? managerContext : \"\", shifts: new Set(), people: new Map(), lpmhValues: [], totalLpmh: 0, lifts: 0, hours: 0, target });\n          const group = map.get(key);\n          group.shifts.add(`${shift.date}|${shift.shift}`);\n          group.lifts += shift.lifts || 0;\n          group.hours += shift.hours || 0;\n          if (shift.lpmh != null) {\n            group.lpmhValues.push(shift.lpmh);\n            group.totalLpmh += shift.lpmh;\n          }\n          combo.forEach((employee) => {\n            if (!group.people.has(employee.employee)) group.people.set(employee.employee, { key: employee.employee, name: employee.displayName, hours: 0, shifts: 0, lpmhValues: [], shift: fieldLabel(shift.shift), group: groupName });\n            const person = group.people.get(employee.employee);\n            person.hours += employee.hours || 0;\n            person.shifts += 1;\n            if (shift.lpmh != null) person.lpmhValues.push(shift.lpmh);\n          });\n        });\n      });\n\n      let groups = Array.from(map.values()).map((group) => {\n        const avgLpmh = group.lpmhValues.length ? group.lpmhValues.reduce((a, b) => a + b, 0) / group.lpmhValues.length : null;\n        const people = Array.from(group.people.values()).map((person) => ({ ...person, lpmh: person.lpmhValues.length ? person.lpmhValues.reduce((a, b) => a + b, 0) / person.lpmhValues.length : null })).sort((a, b) => (b.lpmh || 0) - (a.lpmh || 0));\n        return {\n          ...group,\n          shortName: people.map((person) => person.name.split(\" \").map((part) => part[0]).join(\"\").slice(0, 2).toUpperCase()).join(\" + \"),\n          people,\n          personCount: people.length,\n          shiftCount: group.shifts.size,\n          avgLpmh,\n          totalLpmh: Math.round(group.totalLpmh * 100) / 100,\n          variance: avgLpmh == null ? null : avgLpmh - target,\n          topPerson: people[0] || null,\n          lowPerson: people[people.length - 1] || null\n        };\n      });\n\n      groups = groups.filter((group) => {\n        if (group.shiftCount < minAppearances) return false;\n        if (minLpmh > 0 && !(group.avgLpmh >= minLpmh)) return false;\n        if (targetFilter === \"above\" && !(group.variance >= 0)) return false;\n        if (targetFilter === \"below\" && !(group.variance < 0)) return false;\n        return true;\n      });\n\n      const sort = els.groupMapSort.value;\n      groups.sort((a, b) => sort === \"lowest\" ? (a.avgLpmh || 0) - (b.avgLpmh || 0) : sort === \"largest\" ? b.personCount - a.personCount : (b.avgLpmh || 0) - (a.avgLpmh || 0));\n      if (groups.length > 9) {\n        const top = groups.slice(0, 8);\n        const rest = groups.slice(8);\n        const people = rest.flatMap((group) => group.people).slice(0, 24);\n        const values = rest.flatMap((group) => group.lpmhValues);\n        top.push({ key: \"other\", name: \"Other combinations\", shortName: \"Other\", people, personCount: people.length, shiftCount: rest.reduce((sum, group) => sum + group.shiftCount, 0), lpmhValues: values, avgLpmh: values.length ? values.reduce((a, b) => a + b, 0) / values.length : null, totalLpmh: values.reduce((a, b) => a + b, 0), target, variance: null, topPerson: people[0] || null, lowPerson: people[people.length - 1] || null });\n        groups = top;\n      }\n      return groups;\n    }\n\n    function groupNameForEmployee(employee, shift, groupBy) {\n      if (groupBy === \"shift\") return fieldLabel(shift.shift || \"Unassigned\");\n      if (groupBy === \"role\") return titleName(employee.role || \"Operations\");\n      if (groupBy === \"project\") return shift.date || \"Unknown project\";\n      if (groupBy === \"location\") return employee.location || \"Settegast\";\n      if (groupBy === \"team\" || groupBy === \"department\") return `${fieldLabel(shift.shift || \"Operations\")} ${groupBy === \"team\" ? \"Team\" : \"Department\"}`;\n      return \"Operations\";\n    }\n\n    function groupSizingValue(group) {\n      const metric = els.groupMapMetric.value;\n      if (metric === \"people\") return group.personCount;\n      if (metric === \"totalLpmh\") return group.totalLpmh;\n      if (metric === \"variance\") return Math.max(0, (group.variance || 0) + Number(els.groupMapTarget.value || 3));\n      return group.avgLpmh || 0;\n    }\n\n    function renderPersonGroupingSvg(groups) {\n      const width = 1180;\n      const values = groups.map(groupSizingValue);\n      const max = Math.max(...values, 1);\n      const min = Math.min(...values.filter((v) => v > 0), max);\n      const scale = els.groupMapScale.value;\n      const cols = Math.min(3, Math.max(1, groups.length));\n      const bubbleGap = 42;\n      const selected = state.groupMapSelected;\n      const sizedGroups = groups.map((group) => {\n        const raw = groupSizingValue(group);\n        const normalized = scale === \"log\" ? Math.log1p(raw) / Math.log1p(max) : scale === \"normalized\" ? (raw - min) / ((max - min) || 1) : raw / max;\n        const area = 14500 + Math.max(0.12, normalized) * 50000;\n        const rx = Math.sqrt(area / Math.PI) * 1.35;\n        const ry = Math.sqrt(area / Math.PI) * 0.92;\n        return { group, rx, ry };\n      });\n      const maxRx = Math.max(...sizedGroups.map((item) => item.rx), 1);\n      const maxRy = Math.max(...sizedGroups.map((item) => item.ry), 1);\n      const colWidth = Math.max(width / cols, (maxRx * 2) + bubbleGap);\n      const rowHeight = Math.max(245, (maxRy * 2) + bubbleGap);\n      const leftPad = colWidth / 2;\n      const nodes = sizedGroups.map((item, index) => {\n        const { group, rx, ry } = item;\n        const col = index % cols;\n        const row = Math.floor(index / cols);\n        const x = leftPad + colWidth * col;\n        const y = 130 + row * rowHeight;\n        return { group, x, y, rx, ry, selected: selected && selected === group.key };\n      });\n      const mapWidth = Math.max(width, colWidth * cols);\n      const height = Math.max(620, Math.ceil(groups.length / cols) * rowHeight + 180, Math.max(...nodes.map((node) => node.y + node.ry), 0) + 64);\n      const contentTop = Math.min(...nodes.map((node) => node.y - node.ry));\n      const contentBottom = Math.max(...nodes.map((node) => node.y + node.ry));\n      const centerOffset = (height / 2) - ((contentTop + contentBottom) / 2);\n      nodes.forEach((node) => {\n        node.y += centerOffset;\n      });\n      const links = nodes.slice(1).map((node, index) => {\n        const previous = nodes[index];\n        return `<path class=\"map-link\" d=\"M ${node.x - node.rx} ${node.y} C ${node.x - colWidth * 0.35} ${node.y - 90}, ${previous.x} ${previous.y + 90}, ${previous.x} ${previous.y}\" />`;\n      });\n\n      const bubbleMarkup = nodes.map((node, index) => {\n        const { group, x, y, rx, ry } = node;\n        const above = group.variance == null ? false : group.variance >= 0;\n        const opacity = selected && selected !== group.key ? 0.34 : 0.82;\n        const fill = above ? \"#dff4ee\" : \"#e9f2fb\";\n        const stroke = above ? \"#1ca67f\" : \"#5a8fc8\";\n        const managerPill = managerPillMarkup(group, x, y + 62, rx);\n        const bubbleName = state.managerContextEnabled ? group.baseName || group.name : group.name;\n        const title = `${group.name}\\nAverage LPMH: ${group.avgLpmh == null ? \"N/A\" : format(group.avgLpmh, 2)}\\nWorked together: ${group.shiftCount} shift${group.shiftCount === 1 ? \"\" : \"s\"}\\nPeople: ${group.personCount}\\nTarget LPMH: ${format(group.target, 2)}\\nDifference: ${group.variance == null ? \"N/A\" : format(group.variance, 2)}\\nDate range: ${els.analyticsStart.value || \"All\"} to ${els.analyticsEnd.value || \"All\"}`;\n        return `\n          <g tabindex=\"0\" role=\"button\" aria-label=\"${escapeHtml(group.name)} group\" data-group-map-key=\"${escapeHtml(group.key)}\">\n            <ellipse class=\"group-bubble\" cx=\"${x}\" cy=\"${y}\" rx=\"${rx}\" ry=\"${ry}\" fill=\"${fill}\" stroke=\"${stroke}\" stroke-width=\"${node.selected ? 4 : 2}\" opacity=\"${opacity}\">\n              <title>${escapeHtml(title)}</title>\n            </ellipse>\n            ${svgMultilineText(bubbleName, x, y - 26, \"group-label\", 34, 3)}\n            <text class=\"group-sub-label\" x=\"${x}\" y=\"${y + 22}\">LPMH ${group.avgLpmh == null ? \"N/A\" : format(group.avgLpmh, 2)} - together ${group.shiftCount}x</text>\n            <text class=\"group-sub-label\" x=\"${x}\" y=\"${y + 40}\">${group.variance == null ? \"\" : `${group.variance >= 0 ? \"+\" : \"\"}${format(group.variance, 2)} vs target`}</text>\n            ${managerPill}\n          </g>\n        `;\n      }).join(\"\");\n\n      els.groupMapContainer.innerHTML = `<div class=\"group-map-stage\"><svg class=\"group-map-svg\" viewBox=\"0 0 ${mapWidth} ${height}\" style=\"height:${height}px\" role=\"img\" aria-label=\"Person grouping map by LPMH\">${links.join(\"\")}${bubbleMarkup}</svg></div>`;\n      els.groupMapContainer.querySelectorAll(\"[data-group-map-key]\").forEach((node) => {\n        node.addEventListener(\"click\", () => {\n          state.groupMapSelected = state.groupMapSelected === node.dataset.groupMapKey ? \"\" : node.dataset.groupMapKey;\n          persist();\n          renderAnalytics();\n        });\n        node.addEventListener(\"keydown\", (event) => {\n          if (event.key === \"Enter\" || event.key === \" \") node.click();\n        });\n      });\n    }\n\n    function managerPillMarkup(group, x, y, rx) {\n      const manager = String(group.managerContext || \"\").trim();\n      if (!manager) return \"\";\n      const label = manager.length > 24 ? `${manager.slice(0, 21)}...` : manager;\n      const width = Math.min(Math.max(92, label.length * 7 + 26), Math.max(100, rx * 1.45));\n      return `\n        <rect class=\"manager-pill\" x=\"${x - width / 2}\" y=\"${y - 14}\" width=\"${width}\" height=\"24\" rx=\"12\" ry=\"12\"></rect>\n        <text class=\"manager-pill-label\" x=\"${x}\" y=\"${y + 2}\">${escapeHtml(label)}</text>\n      `;\n    }\n\n    function svgMultilineText(text, x, y, className, maxChars = 34, maxLines = 3) {\n      const words = String(text || \"\").split(/\\s+/).filter(Boolean);\n      const lines = [];\n      let line = \"\";\n      words.forEach((word) => {\n        const next = line ? `${line} ${word}` : word;\n        if (next.length > maxChars && line) {\n          lines.push(line);\n          line = word;\n        } else {\n          line = next;\n        }\n      });\n      if (line) lines.push(line);\n      const visible = lines.slice(0, maxLines);\n      if (lines.length > maxLines) visible[maxLines - 1] = `${visible[maxLines - 1].replace(/\\s+\\S+$/, \"\")}...`;\n      return `<text class=\"${className}\" x=\"${x}\" y=\"${y}\">${visible.map((item, index) => `<tspan x=\"${x}\" dy=\"${index === 0 ? 0 : 15}\">${escapeHtml(item)}</tspan>`).join(\"\")}</text>`;\n    }\n\n    function renderPersonGroupingTable(groups) {\n      const rows = groups.map((group) => {\n        const row = [state.managerContextEnabled ? group.baseName || group.name : group.name];\n        if (state.managerContextEnabled) row.push(group.managerContext || \"\");\n        row.push(\n          group.personCount,\n          scoreCell(group.avgLpmh, group.shiftCount),\n          formatNonZero(group.totalLpmh, 2),\n          format(group.target, 2),\n          group.variance == null ? \"\" : `${group.variance >= 0 ? \"+\" : \"\"}${format(group.variance, 2)}`,\n          group.topPerson ? group.topPerson.name : \"\",\n          group.lowPerson ? group.lowPerson.name : \"\"\n        );\n        return row;\n      });\n      const headers = state.managerContextEnabled ? [\"People group\", \"Manager\", \"People\", \"Avg LPMH\", \"Total LPMH\", \"Target\", \"Variance\", \"Top performer\", \"Opportunity\"] : [\"People group\", \"People\", \"Avg LPMH\", \"Total LPMH\", \"Target\", \"Variance\", \"Top performer\", \"Opportunity\"];\n      els.groupMapContainer.innerHTML = analyticsTable(headers, rows);\n    }\n\n    function renderDailyShiftPerformance(shifts) {\n      const rows = shifts.slice().sort((a, b) => (b.lpmh || 0) - (a.lpmh || 0)).map((s) => [\n        s.date,\n        fieldLabel(s.shift),\n        s.managerNames.length ? s.managerNames.join(\", \") : \"\",\n        s.employees.map((e) => e.displayName).join(\", \"),\n        formatNonZero(s.lifts),\n        formatNonZero(s.hours, 2),\n        scoreCell(s.lpmh, shifts.length)\n      ]);\n      els.dailyShiftPerformance.innerHTML = analyticsTable([\"Date\", \"Shift\", \"Manager\", \"Employees\", \"Timestamped lifts\", \"Labor hours\", \"LPMH\"], rows);\n    }\n\n    function renderGroupAnalysis(shifts) {\n      const size = Math.max(2, Number.parseInt(els.analyticsGroupSize?.value || els.groupMapBy?.value || \"2\", 10));\n      const min = Math.max(1, Number.parseInt(els.analyticsMinPair?.value || \"2\", 10));\n      const groups = aggregateCombos(shifts, size).filter((g) => g.count >= min).slice(0, 12);\n      const headers = state.managerContextEnabled ? [\"Group\", \"Manager\", \"Avg LPMH\", \"Shifts\", \"Best\", \"Worst\"] : [\"Group\", \"Avg LPMH\", \"Shifts\", \"Best\", \"Worst\"];\n      const rows = groups.map((g) => state.managerContextEnabled ? [g.names, g.managerContext, scoreCell(g.avg, g.count), g.count, formatNonZero(g.best, 2), formatNonZero(g.worst, 2)] : [g.names, scoreCell(g.avg, g.count), g.count, formatNonZero(g.best, 2), formatNonZero(g.worst, 2)]);\n      els.groupAnalysis.innerHTML = analyticsTable(headers, rows);\n    }\n\n    function renderPairingAnalysis(shifts) {\n      const min = Math.max(1, Number.parseInt(els.analyticsMinPair?.value || \"2\", 10));\n      const pairs = aggregateCombos(shifts, 2).filter((g) => g.count >= min).slice(0, 14);\n      const headers = state.managerContextEnabled ? [\"Pair\", \"Manager\", \"Avg LPMH\", \"Shifts\", \"Signal\"] : [\"Pair\", \"Avg LPMH\", \"Shifts\", \"Signal\"];\n      const rows = pairs.map((g) => {\n        const row = [g.names];\n        if (state.managerContextEnabled) row.push(g.managerContext);\n        row.push(scoreCell(g.avg, g.count), g.count, g.count < 3 ? \"Small sample\" : g.avg >= 3 ? \"Strong\" : \"Watch\");\n        return row;\n      });\n      els.pairingAnalysis.innerHTML = analyticsTable(headers, rows);\n    }\n\n    function renderEmployeeImpact(shifts) {\n      const byEmployee = new Map();\n      shifts.forEach((shift) => shift.employees.forEach((e) => {\n        if (!byEmployee.has(e.employee)) byEmployee.set(e.employee, { name: e.displayName, shifts: [], coworkers: new Map() });\n        const item = byEmployee.get(e.employee);\n        item.shifts.push(shift);\n        shift.employees.filter((c) => c.employee !== e.employee).forEach((c) => item.coworkers.set(c.displayName, (item.coworkers.get(c.displayName) || 0) + 1));\n      }));\n      const rows = Array.from(byEmployee.values()).map((e) => {\n        const valid = e.shifts.filter((s) => s.lpmh != null);\n        const avg = valid.reduce((sum, s) => sum + s.lpmh, 0) / (valid.length || 1);\n        const best = Math.max(...valid.map((s) => s.lpmh), 0);\n        const coworkers = Array.from(e.coworkers.entries()).sort((a, b) => b[1] - a[1]).slice(0, 3).map(([n]) => n).join(\", \");\n        return [e.name, e.shifts.length, scoreCell(avg, valid.length), formatNonZero(best, 2), coworkers];\n      }).sort((a, b) => Number(b[1]) - Number(a[1])).slice(0, 20);\n      els.employeeImpact.innerHTML = analyticsTable([\"Employee\", \"Shifts\", \"Avg LPMH\", \"Best\", \"Common coworkers\"], rows);\n    }\n\n    function renderPatternFinder(shifts) {\n      const valid = shifts.filter((s) => s.lpmh != null && s.lpmh > 0).sort((a, b) => b.lpmh - a.lpmh);\n      const top = valid.slice(0, Math.max(1, Math.ceil(valid.length * 0.25)));\n      const names = new Map();\n      top.forEach((shift) => shift.employees.forEach((e) => names.set(e.displayName, (names.get(e.displayName) || 0) + 1)));\n      const common = Array.from(names.entries()).sort((a, b) => b[1] - a[1]).slice(0, 6).map(([n, c]) => `${n} (${c})`).join(\", \");\n      const managers = new Map();\n      top.forEach((shift) => managers.set(analyticsManagerContext(shift), (managers.get(analyticsManagerContext(shift)) || 0) + 1));\n      const commonManagers = Array.from(managers.entries()).sort((a, b) => b[1] - a[1]).slice(0, 4).map(([n, c]) => `${n} (${c})`).join(\", \");\n      const managerText = state.managerContextEnabled ? ` Manager context in those shifts: ${commonManagers || \"unassigned\"}.` : \"\";\n      els.patternFinder.innerHTML = top.length ? `<div class=\"status-banner\">Top-performing shifts most often include: ${common || \"not enough repeated employees yet\"}.${managerText} Treat this as directional, not proof.</div>` : `<div class=\"status-banner\">Upload timesheets and timestamped lift files to find high-LPMH patterns.</div>`;\n    }\n\n    function renderAnalyticsReview() {\n      els.analyticsReview.innerHTML = analyticsTable([\"File\", \"Sheet\", \"Row\", \"Issue\", \"Value\"], state.analyticsReviewRows.slice(-30).map((r) => [r.source, r.sheet, r.row, r.issue, r.value]));\n    }\n\n    function aggregateCombos(shifts, size) {\n      const map = new Map();\n      shifts.forEach((shift) => {\n        const employees = shift.employees.map((e) => e.displayName).sort();\n        const managerContext = analyticsManagerContext(shift);\n        const managerKey = normalizeName(managerContext);\n        combinations(employees, size).forEach((combo) => {\n          const peopleKey = combo.join(\"|\");\n          const key = state.managerContextEnabled ? `${peopleKey}|manager:${managerKey}` : peopleKey;\n          if (!map.has(key)) map.set(key, { names: combo.join(\", \"), managerContext: state.managerContextEnabled ? managerContext : \"\", count: 0, values: [] });\n          const g = map.get(key);\n          g.count += 1;\n          if (shift.lpmh != null) g.values.push(shift.lpmh);\n        });\n      });\n      return Array.from(map.values()).map((g) => ({ ...g, avg: g.values.reduce((a, b) => a + b, 0) / (g.values.length || 1), best: Math.max(...g.values, 0), worst: g.values.length ? Math.min(...g.values) : 0 })).sort((a, b) => b.avg - a.avg);\n    }\n\n    function analyticsManagerContext(shift) {\n      if (!state.managerContextEnabled) return \"\";\n      return shift.managerNames && shift.managerNames.length ? shift.managerNames.join(\" + \") : \"Unassigned manager\";\n    }\n\n    function combinations(items, size) {\n      if (items.length < size) return [];\n      if (size === 1) return items.map((x) => [x]);\n      const out = [];\n      items.forEach((item, index) => combinations(items.slice(index + 1), size - 1).forEach((rest) => out.push([item].concat(rest))));\n      return out;\n    }\n\n    function analyticsTable(headers, rows) {\n      if (!rows.length) return `<div class=\"status-banner\">No matching analytics rows yet.</div>`;\n      return `<table class=\"analytics-table\"><thead><tr>${headers.map((h) => `<th>${h}</th>`).join(\"\")}</tr></thead><tbody>${rows.map((r) => `<tr>${r.map((c) => `<td>${c == null ? \"\" : c}</td>`).join(\"\")}</tr>`).join(\"\")}</tbody></table>`;\n    }\n\n    function scoreCell(value, count) {\n      if (value == null || value === 0) return \"\";\n      const cls = count < 3 ? \"score-thin\" : value >= 3 ? \"score-strong\" : value >= 2.5 ? \"score-mid\" : \"score-low\";\n      return `<span class=\"${cls}\">${format(value, 2)}</span>`;\n    }\n\n    function detailMinute(detail) {\n      const text = String(detail.time || \"\");\n      const match = text.match(/(\\d{1,2}):(\\d{2})/);\n      if (!match) return null;\n      return Number(match[1]) * 60 + Number(match[2]);\n    }\n\n    function minuteInWindow(minute, start, end) {\n      if (start == null || end == null) return false;\n      if (end < start) return minute >= start || minute <= end;\n      return minute >= start && minute <= end;\n    }\n\n    function timeLabel(minutes) {\n      if (minutes == null || Number.isNaN(minutes)) return \"\";\n      const normalized = ((Math.round(minutes) % 1440) + 1440) % 1440;\n      const hour24 = Math.floor(normalized / 60);\n      const minute = normalized % 60;\n      const suffix = hour24 >= 12 ? \"PM\" : \"AM\";\n      const hour12 = hour24 % 12 || 12;\n      return `${hour12}:${pad2(minute)} ${suffix}`;\n    }\n\n    function timeMinutes(value) {\n      if (value == null || value === \"\") return null;\n      if (value instanceof Date && !Number.isNaN(value)) return value.getHours() * 60 + value.getMinutes();\n      if (typeof value === \"number\") {\n        if (value > 0 && value < 1) return Math.round(value * 1440);\n        const s = String(Math.round(value)).padStart(4, \"0\");\n        return Number(s.slice(0, -2)) * 60 + Number(s.slice(-2));\n      }\n      const match = String(value).trim().match(/(\\d{1,2}):?(\\d{2})?\\s*(am|pm)?/i);\n      if (!match) return null;\n      let hour = Number(match[1]);\n      const minute = Number(match[2] || 0);\n      const ap = (match[3] || \"\").toLowerCase();\n      if (ap === \"pm\" && hour < 12) hour += 12;\n      if (ap === \"am\" && hour === 12) hour = 0;\n      return hour * 60 + minute;\n    }\n\n    function hoursBetween(start, end) {\n      if (start == null || end == null) return 0;\n      const minutes = end < start ? (1440 - start) + end : end - start;\n      return Math.round((minutes / 60) * 100) / 100;\n    }\n\n    function inferShift(start) {\n      return start != null && start >= 12 * 60 ? \"second\" : \"first\";\n    }\n\n    function normalizeName(name) {\n      return String(name || \"\").trim().toLowerCase().replace(/\\s+/g, \" \");\n    }\n\n    function titleName(name) {\n      return normalizeName(name).replace(/\\b\\w/g, (c) => c.toUpperCase());\n    }\n\n    function numberValue(value) {\n      if (typeof value === \"number\") return value;\n      const number = Number.parseFloat(String(value || \"\").replace(/,/g, \"\"));\n      return Number.isNaN(number) ? 0 : number;\n    }\n\n    async function readWorkbook(file) {\n      if (!window.XLSX) throw new Error(\"Excel parser not loaded\");\n      const buffer = await file.arrayBuffer();\n      const workbook = window.XLSX.read(buffer, { cellDates: true });\n      if (isExcelHtmlFrameset(file, workbook, buffer)) {\n        throw new Error(\"this Excel HTML export points to a companion sheet file. Import the sheet001.htm file from its _files folder, or use a resaved .xlsx/.xls copy.\");\n      }\n      return workbook.SheetNames.flatMap((name) => {\n        const sheet = workbook.Sheets[name];\n        const rows = window.XLSX.utils.sheet_to_json(sheet, { header: 1, raw: true, defval: \"\" });\n        return extractRows(rows, file.name, name);\n      });\n    }\n\n    function isWorkbookFile(name) {\n      return /\\.(xlsx|xls|html?|htm)$/i.test(String(name || \"\"));\n    }\n\n    function isExcelHtmlFrameset(file, workbook, buffer) {\n      const sheetNames = workbook?.SheetNames || [];\n      if (!/\\.xls$/i.test(file.name) || sheetNames.length > 2) return false;\n      const text = new TextDecoder(\"utf-8\").decode(buffer.slice(0, Math.min(buffer.byteLength, 2000)));\n      return /Excel Workbook Frameset/i.test(text) && /href=.*sheet\\d+\\.htm/i.test(text);\n    }\n\n    function extractRows(rows, sourceName = \"\", sheetName = \"\") {\n      const moveRows = extractEquipmentMoveRows(rows, sourceName, sheetName);\n      if (moveRows.length) return moveRows;\n      const flipRows = extractFlipRows(rows, sourceName, sheetName);\n      if (flipRows.length) return flipRows;\n      const timesheetRows = extractTimesheetRows(rows, sourceName, sheetName);\n      if (timesheetRows.length) return timesheetRows;\n\n      let headerIndex = -1;\n      let map = [];\n\n      for (let i = 0; i < Math.min(rows.length, 20); i += 1) {\n        const candidate = (rows[i] || []).map(mapHeader);\n        if (candidate.includes(\"date\") && candidate.filter(Boolean).length >= 2) {\n          headerIndex = i;\n          map = candidate;\n          break;\n        }\n      }\n\n      if (headerIndex < 0) return [];\n      const dateIndex = map.indexOf(\"date\");\n      const seen = new Set();\n      const columns = map\n        .map((field, index) => ({ field, index }))\n        .filter(({ field }) => field && field !== \"date\" && !seen.has(field) && seen.add(field));\n\n      return rows.slice(headerIndex + 1).flatMap((row) => {\n        const date = toKey(row[dateIndex]);\n        if (!date) return [];\n        const record = { date };\n\n        columns.forEach(({ field, index }) => {\n          const value = row[index];\n          if (value === \"\" || value == null) return;\n          const number = typeof value === \"number\" ? value : Number.parseFloat(String(value).replace(/,/g, \"\"));\n          if (!Number.isNaN(number)) record[field] = number;\n        });\n\n        return record;\n      });\n    }\n\n    function findHeaderIndex(headers, candidates) {\n      const wanted = new Set(candidates);\n      for (let index = 0; index < headers.length; index += 1) {\n        if (wanted.has(headers[index])) return index;\n      }\n      return -1;\n    }\n\n    function normalizeTrain(value) {\n      return String(value == null ? \"\" : value).trim().replace(/\\s+/g, \" \");\n    }\n\n    function trainHeaderCandidates(field) {\n      const common = [\n        \"trainid\", \"train\", \"trainname\", \"traincode\", \"trainsymbol\", \"symbol\",\n        \"symbolid\", \"inboundtrain\", \"outboundtrain\", \"inboundtrn\", \"outboundtrn\",\n        \"inboundsymbol\", \"outboundsymbol\", \"inboundsym\", \"outboundsym\",\n        \"inboundtrainsymbol\", \"outboundtrainsymbol\", \"inboundsymbolid\",\n        \"outboundsymbolid\", \"loadtrain\", \"groundtrain\", \"deramptrain\",\n        \"ramptrain\", \"liftgenerated\", \"generatedlift\", \"loadgenerated\",\n        \"linehaultrain\", \"worktrain\", \"destinationtrain\"\n      ];\n      return field === \"ramp\"\n        ? [\"inboundsymbol\", \"inboundtrainsymbol\", \"inboundtrain\", \"loadtrain\", \"ramptrain\"].concat(common)\n        : [\"inboundsymbol\", \"inboundtrainsymbol\", \"trainid\", \"groundtrain\", \"deramptrain\", \"outboundtrain\", \"outboundsymbol\"].concat(common);\n    }\n\n    function extractEquipmentMoveRows(rows, sourceName, sheetName) {\n      const field = moveFieldFromName(sourceName);\n      if (!field) return [];\n\n      for (let i = 0; i < Math.min(rows.length, 20); i += 1) {\n        const headers = (rows[i] || []).map(normalizeHeader);\n        const equipmentIndex = findHeaderIndex(headers, [\"equipmentid\", \"equipment\", \"unitid\", \"unit\", \"containerid\", \"container\"]);\n        const timeIndex = findHeaderIndex(headers, [\"completiontime\", \"completion\", \"time\", \"datetime\", \"dateandtime\", \"eventtime\", \"createddatetime\", \"createdtime\"]);\n        const dateIndex = findHeaderIndex(headers, [\"date\", \"workdate\", \"completiondate\", \"eventdate\", \"createddate\"]);\n        const trainIndex = findHeaderIndex(headers, trainHeaderCandidates(field));\n        if (equipmentIndex < 0 || timeIndex < 0) continue;\n\n        return rows.slice(i + 1).flatMap((row, index) => {\n          const date = toKey(dateIndex >= 0 ? row[dateIndex] : \"\") || toKey(row[timeIndex]);\n          const equipment = normalizeEquipment(row[equipmentIndex]);\n          const train = trainIndex >= 0 ? normalizeTrain(row[trainIndex]) : \"\";\n          if (!date || !equipment) return [];\n          return {\n            date,\n            __kind: \"equipmentMove\",\n            __field: field,\n            __equipment: equipment,\n            __train: train,\n            __liftSource: liftSourceKeyFor(field, equipment, sourceName, \"\", train),\n            __source: sourceName,\n            __sheet: sheetName,\n            __rowNumber: i + index + 2,\n            __time: String(row[timeIndex] == null ? \"\" : row[timeIndex]).trim()\n          };\n        });\n      }\n\n      return [];\n    }\n\n    function extractFlipRows(rows, sourceName, sheetName) {\n      const source = String(sourceName || \"\").toLowerCase();\n      if (!source.includes(\"flip\")) return [];\n\n      for (let i = 0; i < Math.min(rows.length, 20); i += 1) {\n        const headers = (rows[i] || []).map(normalizeHeader);\n        const dateIndex = headers.indexOf(\"date\");\n        const timeIndex = headers.indexOf(\"time\");\n        const equipmentIndex = headers.indexOf(\"equipmentid\");\n        const reasonIndex = headers.indexOf(\"reasonforflip\");\n        if (dateIndex < 0 || equipmentIndex < 0 || reasonIndex < 0) continue;\n\n        return rows.slice(i + 1).flatMap((row, index) => {\n          const date = toKey(row[dateIndex]);\n          const equipment = normalizeEquipment(row[equipmentIndex]);\n          if (!date || !equipment) return [];\n\n          const reason = String(row[reasonIndex] == null ? \"\" : row[reasonIndex]).trim();\n          const field = normalizeHeader(reason) === \"stack\" ? \"stacked\" : \"flip\";\n          return {\n            date,\n            __kind: \"detailMove\",\n            __field: field,\n            __equipment: equipment,\n            __liftSource: liftSourceKeyFor(field, equipment, sourceName, reason),\n            __source: sourceName,\n            __sheet: sheetName,\n            __rowNumber: i + index + 2,\n            __reason: reason,\n            __time: String(row[timeIndex] == null ? \"\" : row[timeIndex]).trim()\n          };\n        });\n      }\n\n      return [];\n    }\n\n    function extractTimesheetRows(rows, sourceName, sheetName) {\n      const source = `${sourceName || \"\"} ${sheetName || \"\"}`.toLowerCase();\n      const looksLikeTimesheet = source.includes(\"timesheet\") || rows.some((row) => {\n        const first = normalizeHeader(row[0]);\n        return first === \"selectday\" || first === \"timeinputdailysheet\" || first.includes(\"stshift\") || first.includes(\"ndshift\");\n      });\n      if (!looksLikeTimesheet) return [];\n\n      const date = findTimesheetDate(rows, sourceName);\n      if (!date) return [];\n\n      let manHours = 0;\n      let parsedAnySection = false;\n      for (let i = 0; i < rows.length; i += 1) {\n        const headers = (rows[i] || []).map(normalizeHeader);\n        const firstNorm = normalizeHeader(rows[i]?.[0]);\n        const isOpsShift = firstNorm.includes(\"stshift\") || firstNorm.includes(\"ndshift\");\n        const actualIndex = timesheetSectionColumns(rows[i] || []).actual;\n        if (!isOpsShift || actualIndex < 0) continue;\n        parsedAnySection = true;\n        for (let r = i + 1; r < rows.length; r += 1) {\n          const row = rows[r] || [];\n          const name = String(row[0] == null ? \"\" : row[0]).trim();\n          const rowFirstNorm = normalizeHeader(name);\n          if (isTimesheetSectionHeader(rowFirstNorm)) break;\n          if (!name || /^off\\s*-/i.test(name) || /select|total|manager/i.test(name)) continue;\n          const hours = numberValue(row[actualIndex]);\n          if (hours > 0) manHours += hours;\n        }\n      }\n      if (!parsedAnySection) return [];\n\n      return manHours > 0 ? [{ date, manHours: Math.round(manHours * 100) / 100 }] : [];\n    }\n\n    function moveFieldFromName(sourceName) {\n      const name = String(sourceName || \"\").toLowerCase();\n      if (name.includes(\"deramp\") || name.includes(\"de-ramp\") || name.includes(\"grounds\")) return \"deramp\";\n      if (name.includes(\"ramp\") || name.includes(\"loads\")) return \"ramp\";\n      return null;\n    }\n\n    function mapHeader(header) {\n      const normalized = normalizeHeader(header);\n      const headers = {\n        date: \"date\",\n        ramp: \"ramp\",\n        deramp: \"deramp\",\n        flip: \"flip\",\n        stacked: \"stacked\",\n        unstacked: \"unstacked\",\n        chassisunstacked: \"chUnstacked\",\n        chassisstacked: \"chStacked\",\n        manhours: \"manHours\",\n        dailylifts: \"lifts\",\n        lifts: \"lifts\"\n      };\n      return headers[normalized] || null;\n    }\n\n    function normalizeHeader(header) {\n      return String(header == null ? \"\" : header).toLowerCase().replace(/[^a-z]/g, \"\");\n    }\n\n    function normalizeEquipment(value) {\n      return String(value == null ? \"\" : value).trim().replace(/\\s+/g, \" \").toUpperCase();\n    }\n\n    function toKey(value) {\n      if (value instanceof Date && !Number.isNaN(value)) {\n        return `${value.getFullYear()}-${pad2(value.getMonth() + 1)}-${pad2(value.getDate())}`;\n      }\n\n      if (typeof value === \"number\" && value > 20000 && value < 80000) {\n        const date = new Date(Math.round((value - 25569) * 86400000));\n        return `${date.getUTCFullYear()}-${pad2(date.getUTCMonth() + 1)}-${pad2(date.getUTCDate())}`;\n      }\n\n      const text = String(value == null ? \"\" : value).trim();\n      let match = text.match(/^(\\d{1,2})[./-](\\d{1,2})[./-](\\d{2,4})(?:\\s+\\d{1,2}:\\d{2}(?::\\d{2})?)?/);\n      if (match) {\n        const year = Number(match[3]) < 100 ? Number(match[3]) + 2000 : Number(match[3]);\n        return `${year}-${pad2(match[1])}-${pad2(match[2])}`;\n      }\n\n      match = text.match(/^(\\d{4})-(\\d{1,2})-(\\d{1,2})/);\n      if (match) return `${match[1]}-${pad2(match[2])}-${pad2(match[3])}`;\n\n      match = text.match(/^(?:[A-Za-z]{3,9},\\s*)?([A-Za-z]{3,9})\\s+(\\d{1,2}),\\s*(\\d{4})$/);\n      if (match) {\n        const months = { jan: 1, january: 1, feb: 2, february: 2, mar: 3, march: 3, apr: 4, april: 4, may: 5, jun: 6, june: 6, jul: 7, july: 7, aug: 8, august: 8, sep: 9, sept: 9, september: 9, oct: 10, october: 10, nov: 11, november: 11, dec: 12, december: 12 };\n        const month = months[match[1].toLowerCase()];\n        if (month) return `${match[3]}-${pad2(month)}-${pad2(match[2])}`;\n      }\n      return null;\n    }\n\n    function parseCSV(text) {\n      const rows = [];\n      let row = [];\n      let current = \"\";\n      let quoted = false;\n\n      for (let i = 0; i < text.length; i += 1) {\n        const char = text[i];\n        if (quoted) {\n          if (char === \"\\\"\") {\n            if (text[i + 1] === \"\\\"\") {\n              current += \"\\\"\";\n              i += 1;\n            } else {\n              quoted = false;\n            }\n          } else {\n            current += char;\n          }\n        } else if (char === \"\\\"\") {\n          quoted = true;\n        } else if (char === \",\") {\n          row.push(current);\n          current = \"\";\n        } else if (char === \"\\n\" || char === \"\\r\") {\n          if (char === \"\\r\" && text[i + 1] === \"\\n\") i += 1;\n          row.push(current);\n          rows.push(row);\n          row = [];\n          current = \"\";\n        } else {\n          current += char;\n        }\n      }\n\n      if (current !== \"\" || row.length) {\n        row.push(current);\n        rows.push(row);\n      }\n\n      return rows;\n    }\n\n    function sum(a, b) {\n      if (a == null && b == null) return null;\n      return (a || 0) + (b || 0);\n    }\n\n    function monthTitle(month) {\n      const [year, monthNumber] = month.split(\"-\").map(Number);\n      return `${MONTH_NAMES[monthNumber - 1]} ${year}`;\n    }\n\n    function format(value, digits = null) {\n      const rounded = digits == null ? Math.round(value * 100) / 100 : value;\n      return rounded.toLocaleString(\"en-US\", {\n        minimumFractionDigits: digits == null ? 0 : digits,\n        maximumFractionDigits: digits == null ? 2 : digits\n      });\n    }\n\n    function formatNonZero(value, digits = null) {\n      if (value == null || value === 0) return \"\";\n      return format(value, digits);\n    }\n\n    function pad2(value) {\n      return String(value).padStart(2, \"0\");\n    }\n\n    function showToast(message) {\n      clearTimeout(showToast.timer);\n      els.toast.textContent = message;\n      els.toast.classList.remove(\"hidden\");\n      showToast.timer = setTimeout(() => els.toast.classList.add(\"hidden\"), 4500);\n    }\n  <\/script>\n</body>\n</html>\n" }

    function pageFromHash() {
      const id = window.location.hash.replace(/^#/, "");
      return pages[id] && id !== "compare" && id !== "time" && id !== "dayforce" && id !== "archive" ? id : "";
    }

    let activePage = pageFromHash() || localStorage.getItem("conglobal-active-page") || "timeMd";
    if (activePage === "time" && pageFromHash() !== "time") activePage = "timeMd";
    if (activePage === "compare") activePage = "timeMd";

    function resizeFrame() {
      try {
        const doc = frame.contentDocument;
        if (!doc) return;
        frame.style.height = Math.max(
          doc.documentElement.scrollHeight,
          doc.body ? doc.body.scrollHeight : 0,
          window.innerHeight - tabs.offsetHeight
        ) + "px";
      } catch (error) {
        frame.style.height = "calc(100vh - 42px)";
      }
    }

    function selectPage(id) {
      activePage = pages[id] && id !== "compare" && id !== "time" && id !== "dayforce" && id !== "archive" ? id : "timeMd";
      localStorage.setItem("conglobal-active-page", activePage);
      if (window.location.hash !== `#${activePage}`) {
        history.replaceState(null, "", `#${activePage}`);
      }
      document.querySelectorAll(".workbook-tabs button").forEach((button) => {
        button.classList.toggle("active", button.dataset.page === activePage);
      });
      frame.srcdoc = pages[activePage].html;
    }

    let containedPopup = null;

    function closeContainedPopup() {
      if (!containedPopup) return;
      containedPopup.remove();
      containedPopup = null;
    }

    function openContainedPopup(pageId, title, options = {}) {
      if (containedPopup) closeContainedPopup();
      const page = pages[pageId];
      if (!page) return;
      containedPopup = document.createElement("div");
      containedPopup.setAttribute("role", "dialog");
      containedPopup.setAttribute("aria-modal", "true");
      containedPopup.setAttribute("aria-label", title);
      containedPopup.style.cssText = "position:fixed;inset:0;z-index:50;display:flex;align-items:flex-start;justify-content:center;padding:74px 18px 18px;background:rgba(15,23,42,.42);";
      const panelBg = options.background || "#eef2f6";
      const width = options.width || "min(1180px,calc(100vw - 36px))";
      const height = options.height || "min(820px,calc(100vh - 92px))";
      containedPopup.innerHTML = `
        <section style="width:${width};height:${height};display:flex;flex-direction:column;border:2px solid #111827;border-radius:8px;background:${panelBg};box-shadow:0 22px 60px rgba(15,23,42,.35);overflow:hidden;">
          <header style="height:42px;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:0 12px;background:#000;color:#fff;font:900 14px Arial,Helvetica,sans-serif;">
            <span>${title}</span>
            <button type="button" id="closeContainedPopup" style="min-width:34px;height:28px;border:1px solid #fff;border-radius:4px;background:#fff;color:#111827;font-weight:900;cursor:pointer;">X</button>
          </header>
          <iframe title="${title}" style="width:100%;height:100%;border:0;background:${panelBg};" sandbox="allow-same-origin allow-scripts allow-downloads allow-forms"></iframe>
        </section>
      `;
      document.body.appendChild(containedPopup);
      const iframe = containedPopup.querySelector("iframe");
      iframe.srcdoc = page.html;
      containedPopup.querySelector("#closeContainedPopup").addEventListener("click", closeContainedPopup);
      containedPopup.addEventListener("click", (event) => {
        if (event.target === containedPopup) closeContainedPopup();
      });
    }

    function openComparePopup() {
      openContainedPopup("compare", "Timesheet Compare", { background: "#eef2f6" });
    }

    function openArchivePopup() {
      openContainedPopup("archive", "Timesheet Archive", {
        background: "#f8fafc",
        width: "min(1180px,calc(100vw - 36px))",
        height: "min(880px,calc(100vh - 92px))"
      });
    }

    function openOldViewPopup() {
      openContainedPopup("time", "Old View - Time Input", {
        background: "#e7e5df",
        width: "min(1120px,calc(100vw - 36px))",
        height: "min(880px,calc(100vh - 92px))"
      });
    }

    window.openComparePopup = openComparePopup;
    window.openArchivePopup = openArchivePopup;
    window.openOldViewPopup = openOldViewPopup;

    Object.entries(pages).filter(([id]) => id !== "time" && id !== "compare" && id !== "dayforce" && id !== "archive").forEach(([id, page]) => {
      const button = document.createElement("button");
      button.type = "button";
      button.dataset.page = id;
      button.textContent = page.label;
      button.addEventListener("click", () => selectPage(id));
      tabs.appendChild(button);
    });

    frame.addEventListener("load", () => {
      resizeFrame();
      const doc = frame.contentDocument;
      if (!doc) return;
      doc.addEventListener("input", () => setTimeout(resizeFrame, 0));
      doc.addEventListener("click", () => setTimeout(resizeFrame, 0));
      setTimeout(resizeFrame, 100);
    });
    window.addEventListener("resize", resizeFrame);
    window.addEventListener("message", (event) => {
      if (event.data && event.data.type === "conglobal-open-compare-popup") openComparePopup();
      if (event.data && event.data.type === "conglobal-open-archive-popup") openArchivePopup();
      if (event.data && event.data.type === "conglobal-open-old-view-popup") openOldViewPopup();
    });
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") closeContainedPopup();
    });
    window.addEventListener("hashchange", () => selectPage(pageFromHash() || "timeMd"));
    selectPage(activePage);
  </script>
</body>
</html>
