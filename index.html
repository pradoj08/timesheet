      "time": { label: "Timesheet", html: "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n  <meta charset=\"UTF-8\" />\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" />\n  <title>Conglobal Time Input</title>\n  <style>\n    :root {\n      --black: #000;\n      --gray: #d9d9d9;\n      --green: #e2f0d9;\n      --yellow: #ffff00;\n      --pink: #ffc7ce;\n      --blue: #9dc3e6;\n      --logo: #004a64;\n      --muted: #9b9b9b;\n    }\n\n    * {\n      box-sizing: border-box;\n    }\n\n    body {\n      margin: 0;\n      background: #fff;\n      color: #000;\n      font-family: Arial, Helvetica, sans-serif;\n      font-size: 16px;\n      overflow-x: hidden;\n    }\n\n    .page-switcher {\n      width: 100%;\n      display: flex;\n      gap: 4px;\n      align-items: center;\n      padding: 6px 8px;\n      background: #111;\n      border-bottom: 2px solid #000;\n    }\n\n    .page-switcher a {\n      min-width: 118px;\n      height: 28px;\n      display: inline-flex;\n      align-items: center;\n      justify-content: center;\n      border: 1px solid #777;\n      background: #e7e6e6;\n      color: #000;\n      text-decoration: none;\n      font-size: 13px;\n      font-weight: 800;\n    }\n\n    .page-switcher a.active {\n      background: #ffff00;\n      border-color: #ffff00;\n    }\n\n    .sheet {\n      width: 100%;\n      max-width: 1180px;\n      margin: 0 auto;\n      overflow-x: hidden;\n      padding-bottom: 0;\n    }\n\n    .metrics {\n      width: 100%;\n      display: grid;\n      grid-template-columns: repeat(7, minmax(0, 1fr));\n      margin-bottom: 12px;\n      font-size: clamp(13px, 1.9vw, 19px);\n      font-weight: 900;\n      text-align: center;\n    }\n\n    .metric {\n      min-height: 60px;\n      display: flex;\n      flex-direction: column;\n      align-items: center;\n      justify-content: center;\n      gap: 1px;\n      padding: 7px 2px 6px;\n      border-right: 2px solid #fff;\n      line-height: 1.12;\n    }\n\n    .metric > span {\n      width: 100%;\n      min-height: 22px;\n      display: flex;\n      align-items: center;\n      justify-content: center;\n    }\n\n    .metric.yellow {\n      background: var(--yellow);\n    }\n\n    .metric.pink {\n      background: var(--pink);\n    }\n\n    .metric.blue {\n      background: var(--blue);\n    }\n\n    .metric input,\n    .metric select {\n      width: 100%;\n      min-height: 25px;\n      height: 25px;\n      padding: 0;\n      border: 0;\n      outline: 0;\n      background: transparent;\n      font: inherit;\n      font-weight: 900;\n      line-height: normal;\n      text-align: center;\n    }\n\n    .metric input:focus,\n    .metric select:focus {\n      background: #fff2cc;\n      box-shadow: inset 0 0 0 2px #ffc000;\n    }\n\n    .metric .custom-shift-end {\n      display: none;\n      border-top: 1px solid rgba(0, 0, 0, .25);\n    }\n\n    .metric .custom-shift-end.open {\n      display: block;\n    }\n\n    .metric.clickable {\n      cursor: pointer;\n      user-select: none;\n    }\n\n    .metric.clickable:hover,\n    .metric.clickable:focus {\n      outline: 2px solid #ffc000;\n      outline-offset: -2px;\n    }\n\n    .time-table {\n      width: 100%;\n      border-collapse: collapse;\n      table-layout: fixed;\n      font-size: clamp(11px, 1.45vw, 14px);\n    }\n\n    .time-table col.employee { width: 18%; }\n    .time-table col.off { width: 12%; }\n    .time-table col.note { width: 14%; }\n    .time-table col.time { width: 15.33%; }\n    .time-table col.actual { width: 10%; }\n\n    .time-table th,\n    .time-table td {\n      height: 22px;\n      padding: 0 3px;\n      border-bottom: 1px solid #000;\n      line-height: 21px;\n      overflow: hidden;\n      white-space: nowrap;\n    }\n\n    .time-table th {\n      background: var(--gray);\n      border-top: 2px solid #000;\n      border-bottom: 2px solid #000;\n      font-weight: 900;\n      text-align: center;\n    }\n\n    .time-table th.section-name {\n      tex dow: none;\n    }\n\n    tr.unpaid-absence-row .time-cell input,\n    tr.unpaid-absence-row .time-cell.start-status.scheduled input,\n    tr.unpaid-absence-row .time-cell.start-status.off-day-clock input,\n    tr.unpaid-absence-row .time-cell.start-status.missing-worker input {\n      background: #fff;\n      color: #000;\n      box-shadow: none;\n    }\n\n    .time-cell.start-status.scheduled input.invalid-time,\n    .time-cell.start-status.off-day-clock input.invalid-time,\n    tr.off-employee-row .time-cell.start-status input.invalid-time {\n      background: #fce4e4;\n      color: #8a1f1f;\n      box-shadow: inset 0 0 0 1px #f4a6a6;\n      font-weight: 900;\n    }\n\n    tr.purple-absence-row .name,\n    tr.purple-absence-row .time-cell input,\n    tr.purple-absence-row .time-cell.start-status.scheduled input,\n    tr.purple-absence-row .time-cell.start-status.off-day-clock input,\n    tr.purple-absence-row .time-cell.start-status.missing-worker input,\n    tr.purple-absence-row.off-employee-row .time-cell input {\n      background: #e7c7e8;\n      color: #000;\n      box-shadow: none;\n      opacity: 1;\n    }\n\n    tr.purple-absence-row .time-cell input.invalid-time {\n      background: #fce4e4;\n      color: #8a1f1f;\n      box-shadow: inset 0 0 0 1px #f4a6a6;\n      font-weight: 900;\n    }\n\n    .actual-cell {\n      text-align: center;\n      font-weight: 900;\n    }\n\n    .off-days-button {\n      width: 100%;\n      height: 100%;\n      border: 0;\n      background: transparent;\n      color: inherit;\n      font: inherit;\n      font-weight: 900;\n      cursor: pointer;\n    }\n\n    .off-days-button:hover,\n    .off-days-button:focus {\n      background: #fff2cc;\n      color: #000;\n      outline: 2px solid #ffc000;\n      outline-offset: -2px;\n    }\n\n    .modal-backdrop {\n      position: fixed;\n      inset: 0;\n      z-index: 30;\n      display: none;\n      align-items: flex-start;\n      justify-content: center;\n      padding: 54px 14px 20 tails\"></div>\n    </section>\n  </div>\n  <script>\n    const dayAliases = {\n      sun: \"sun\",\n      sunday: \"sun\",\n      mon: \"mon\",\n      monday: \"mon\",\n      tue: \"tue\",\n      tues: \"tue\",\n      tuesday: \"tue\",\n      wed: \"wed\",\n      weds: \"wed\",\n      wednesday: \"wed\",\n      thu: \"thu\",\n      thur: \"thu\",\n      thurs: \"thu\",\n      thursday: \"thu\",\n      fri: \"fri\",\n      friday: \"fri\",\n      sat: \"sat\",\n      saturday: \"sat\"\n    };\n\n    const todayKey = [\"sun\", \"mon\", \"tue\", \"wed\", \"thu\", \"fri\", \"sat\"][new Date().getDay()];\n    const rosterStorageKey = \"conglobal-roster-state-v1\";\n    const rosterAdditionsKey = \"conglobal-roster-additions-v1\";\n    const dayforceStorageKey = \"conglobal-dayforce-punches-v1\";\n    const previousTimesheetStorageKey = \"conglobal-previous-timesheet-hours-v1\";\n    const timesheetSettingsKey = \"conglobal-timesheet-settings-v1\";\n    const rosterDayLabels = [\"Mon\", \"Tues\", \"Wed\", \"Thurs\", \"Fri\", \"Sat\", \"Sun\"];\n    const lpmhGoal = 2.0;\n    const modal = document.getElementById(\"tomorrowOffModal\");\n    const modalContent = document.getElementById(\"tomorrowOffContent\");\n    const lpmhModal = document.getElementById(\"lpmhModal\");\n    const lpmhDetails = document.getElementById(\"lpmhDetails\");\n\n    function readTimesheetSettings() {\n      try {\n        const saved = JSON.parse(localStorage.getItem(timesheetSettingsKey) || \"null\");\n        return saved && typeof saved === \"object\" ? saved : {};\n      } catch (error) {\n        localStorage.removeItem(timesheetSettingsKey);\n        return {};\n      }\n    }\n\n    function writeTimesheetSettings() {\n      localStorage.setItem(timesheetSettingsKey, JSON.stringify({\n        lifts: Number(document.getElementById(\"updateLifts\").value) || 0,\n        flips: Number(document.getElementById(\"updateFlips\").value) || 0,\n        shiftEndMode: document.getElementById(\"shiftEndSelect\").value,\n        shiftEndCustom: document.getElementById(\"shiftEndOther\").value.trim()\n      }));\n    }\n\n    function applyTimesheetSettings() {\n      const settings = readTimesheetSettings();\n      if (settings.lifts !== undefined) document.getElementById(\"updateLifts\").value = settings.lifts;\n      if (settings.flips !== undefined) document.getElementById(\"updateFlips\").value = settings.flips;\n      if (settings.shiftEndMode) document.getElementById(\"shiftEndSelect\").value = settings.shiftEndMode;\n      if (settings.shiftEndCustom !== undefined) document.getElementById(\"shiftEndOther\").value = settings.shiftEndCustom;\n    }\n\n    function parseOffDays(text) {\n      return new Set(text\n        .split(\",\")\n        .map((item) => item.trim().toLowerCase())\n        .map((item) => dayAliases[item] || dayAliases[item.slice(0, 3)])\n        .filter(Boolean));\n    }\n\n    function dayKeyFromOffset(offset) {\n      const date = new Date();\n      date.setDate(date.getDate() + offset);\n      return [\"sun\", \"mon\", \"tue\", \"wed\", \"thu\", \"fri\", \"sat\"][date.getDay()];\n    }\n\n    function dayKeyFromDateValue(value) {\n      const text = String(value || \"\").trim();\n      if (!text) return \"\";\n\n      const dayNameMatch = text.match(/^([a-z]{3,9})\\b/i);\n      const explicitDay = dayNameMatch ? dayAliases[dayNameMatch[1].toLowerCase()] : \"\";\n      if (explicitDay) return explicitDay;\n\n      const match = text.match(/^(\\d{1,2})\\/(\\d{1,2})\\/(\\d{2,4})/);\n      const date = match\n        ? new Date(Number(match[3].length === 2 ? `20${match[3]}` : match[3]), Number(match[1]) - 1, Number(match[2]))\n        : new Date(text);\n      if (Number.isNaN(date.getTime())) return \"\";\n      return [\"sun\", \"mon\", \"tue\", \"wed\", \"thu\", \"fri\", \"sat\"][date.getDay()];\n    }\n\n    function dayKeyForRow(row) {\n      return row.dataset.workdayKey || todayKey;\n    }\n\n    function rowOffDays(row) {\n      return parseOffDays(row.children[1] ? row.children[1].textContent : \"\");\n    }\n\n    function rowIsScheduledToWork(row) {\n      return !rowOffDays(row).has(dayKeyForRow(row));\n    }\n\n    function isClockValue(value) {\n      const text = String(value || \"\").trim();\n      return Boolean(text && text.toLowerCase() !== \"missing?\");\n    }\n\n    function isInvalidTimeValue(value) {\n      const text = String(value || \"\").trim();\n      return Boolean(text && text.toLowerCase() !== \"missing?\" && minutesFromMilitary(text) === null);\n    }\n\n    function updateInvalidTimeStateForRow(row) {\n      const inputs = row.querySelectorAll(\".time-cell input\");\n      if (inputs.length < 3) return false;\n      const invalidStart = isInvalidTimeValue(inputs[0].value);\n      const invalidEnd = isInvalidTimeValue(inputs[2].value);\n      inputs[0].classList.toggle(\"invalid-time\", invalidStart);\n      inputs[2].classList.toggle(\"invalid-time\", invalidEnd);\n      return invalidStart || invalidEnd;\n    }\n\n    function rowHasInvalidTime(row) {\n      const inputs = row.querySelectorAll(\".time-cell input\");\n      if (inputs.length < 3) return false;\n      return isInvalidTimeValue(inputs[0].value) || isInvalidTimeValue(inputs[2].value);\n    }\n\n    function rowHasClockTime(row) {\n      const inputs = row.querySelectorAll(\".time-cell input\");\n      return Boolean((inputs[0] && isClockValue(inputs[0].value)) || (inputs[2] && isClockValue(inputs[2].value)));\n    }\n\n    function rowIsCurrentlyHere(row) {\n      const inputs = row.querySelectorAll(\".time-cell input\");\n      if (inputs.length < 3) return false;\n      return minutesFromMilitary(inputs[0].value) !== null && minutesFromMilitary(inputs[2].value) === null;\n    }\n\n    function rowHasValidClockIn(row) {\n      const inputs = row.querySelectorAll(\".time-cell input\");\n      if (!inputs.length) return false;\n      return minutesFromMilitary(inputs[0].value) !== null;\n    }\n\n    function updateScheduleStyleForRow(row) {\n      const nameCell = row.querySelector(\"td.name\");\n      if (!nameCell) return;\n\n      const startCell = row.querySelector(\".time-cell\");\n      const scheduled = rowIsScheduledToWork(row);\n      const hasClockTime = rowHasClockTime(row);\n      const offIdle = !scheduled && !hasClockTime;\n      const offDayClock = !scheduled && hasClockTime;\n      const purpleAbsence = rowHasPurpleAbsence(row);\n      const unpaidAbsence = row.dataset.absenceUnpaid === \"1\";\n      nameCell.classList.toggle(\"scheduled\", scheduled);\n      nameCell.classList.toggle(\"off-day-clock\", offDayClock);\n      row.classList.toggle(\"off-employee-row\", offIdle);\n      row.classList.toggle(\"purple-absence-row\", purpleAbsence);\n      row.classList.toggle(\"unpaid-absence-row\", unpaidAbsence);\n      if (startCell) {\n        startCell.classList.add(\"start-status\");\n        startCell.classList.toggle(\"scheduled\", scheduled);\n        startCell.classList.toggle(\"off-day-clock\", offDayClock);\n      }\n    }\n\n    function employeeNameForSort(row) {\n      return (row.querySelector(\"td.name\")?.textContent || \"\").trim();\n    }\n\n    function statusSortRank(row) {\n      const scheduled = rowIsScheduledToWork(row);\n      const clockedIn = rowHasValidClockIn(row);\n      const purpleAbsence = rowHasPurpleAbsence(row);\n\n      if (scheduled && clockedIn && !purpleAbsence) return 0;\n      if (!scheduled && clockedIn) return 1;\n      if (purpleAbsence) return 2;\n      if (scheduled && !clockedIn) return 3;\n      if (!scheduled && !clockedIn) return 4;\n      return 4;\n    }\n\n    function sectionEmployeeRows(headerRow) {\n      const rows = [];\n      let anchor = headerRow.nextElementSibling;\n\n      while (anchor && !anchor.querySelector(\"th.section-name\")) {\n        if (!anchor.querySelector(\"td.name\")) break;\n        rows.push(anchor);\n        anchor = anchor.nextElementSibling;\n      }\n\n      return { rows, anchor };\n    }\n\n    function sortShiftRows(headerCell, forcedMode = \"\") {\n      const headerRow = headerCell.closest(\"tr\");\n      if (!headerRow) return;\n\n      const mode = forcedMode || (headerCell.dataset.sortMode === \"status\" ? \"alpha\" : \"status\");\n      const { rows, anchor } = sectionEmployeeRows(headerRow);\n      const sorted = rows.slice().sort((a, b) => {\n        if (mode === \"status\") {\n          const rankDiff = statusSortRank(a) - statusSortRank(b);\n          if (rankDiff) return rankDiff;\n        }\n        return employeeNameForSort(a).localeCompare(employeeNameForSort(b));\n      });\n\n      sorted.forEach((row) => {\n        headerRow.parentNode.insertBefore(row, anchor);\n      });\n      headerCell.dataset.sortMode = mode;\n    }\n\n    function sortAllShiftsByStatus() {\n      document.querySelectorAll(\".time-table th.section-name\").forEach((header) => {\n        sortShiftRows(header, \"status\");\n      });\n    }\n\n    function sectionKeyForRow(row) {\n      let cursor = row;\n      while (cursor) {\n        const header = cursor.querySelector(\"th.section-name\");\n        if (header) return getSectionKey(header.textContent);\n        cursor = cursor.previousElementSibling;\n      }\n      return \"\";\n    }\n\n    function currentMinutes() {\n      const now = new Date();\n      return (now.getHours() * 60) + now.getMinutes();\n    }\n\n    function currentMilitaryTime() {\n      return militaryFromMinutes(currentMinutes());\n    }\n\n    function shouldCheckMissingStart(row) {\n      const sectionKey = sectionKeyForRow(row);\n      if (sectionKey === \"gate\") return false;\n      if (sectionKey === \"second\") return currentMinutes() >= minutesFromMilitary(\"1500\");\n      return true;\n    }\n\n    function rowHasAbsence(row) {\n      return Boolean((row.dataset.absenceNote || \"\").trim());\n    }\n\n    function rowHasPurpleAbsence(row) {\n      const note = String(row.dataset.absenceNote || \"\").toLowerCase();\n      return row.dataset.absencePaid === \"1\" ||\n        row.dataset.absenceUnpaid === \"1\" ||\n        /\\bfloating holidays?\\b/.test(note) ||\n        /\\bvacations?\\b/.test(note) ||\n        /\\bsick\\b/.test(note) ||\n        /\\bunpaid\\b/.test(note);\n    }\n\n    function notePill(label, className = \"\") {\n      return `<span class=\"note-pill ${className}\">${escapeHtml(label)}</span>`;\n    }\n\n    function dayLabelFromOffset(offset) {\n      const date = new Date();\n      date.setDate(date.getDate() + offset);\n      return date.toLocaleDateString(undefined, { weekday: \"long\", month: \"short\", day: \"numeric\" });\n    }\n\n    function updateScheduledHighlights() {\n      document.querySelectorAll(\".time-table tr\").forEach((row) => {\n        updateScheduleStyleForRow(row);\n      });\n    }\n\n    function updateMissingStartForRow(row) {\n      const nameCell = row.querySelector(\"td.name\");\n      const startInput = row.querySelector(\".time-cell input\");\n      if (!nameCell || !startInput) return;\n\n      updateScheduleStyleForRow(row);\n      const missingStart = shouldCheckMissingStart(row) && rowIsScheduledToWork(row) && !rowHasAbsence(row) && !isClockValue(startInput.value);\n      startInput.classList.toggle(\"missing-start\", missingStart);\n      startInput.placeholder = missingStart ? \"Missing?\" : \"\";\n      nameCell.classList.toggle(\"missing-worker\", missingStart);\n      startInput.closest(\".time-cell\")?.classList.toggle(\"missing-worker\", missingStart);\n    }\n\n    function updateMissingStarts() {\n      document.querySelectorAll(\".time-table tbody tr\").forEach(updateMissingStartForRow);\n    }\n\n    function updateOffDayNoteForRow(row) {\n      const nameCell = row.querySelector(\"td.name\");\n      const noteCell = row.children[2];\n      const inputs = row.querySelectorAll(\".time-cell input\");\n      if (!nameCell || !noteCell || inputs.length < 3) return;\n\n      if (!noteCell.hasAttribute(\"data-default-note\")) {\n        noteCell.dataset.defaultNote = noteCell.textContent;\n      }\n\n      const hasClockTime = isClockValue(inputs[0].value) || isClockValue(inputs[2].value);\n      const cameInOffDay = !rowIsScheduledToWork(row) && hasClockTime;\n      const absenceNote = (row.dataset.absenceNote || \"\").trim();\n      const pills = [];\n      if (absenceNote) {\n        const noteClass = row.dataset.absenceUnpaid === \"1\" ? \"unpaid\" : \"\";\n        absenceNote.split(\",\").map((item) => item.trim()).filter(Boolean).forEach((item) => {\n          pills.push(notePill(item, noteClass));\n        });\n      }\n      if (rowHasInvalidTime(row)) pills.push(notePill(\"Invalid\", \"invalid\"));\n      if (cameInOffDay) pills.push(notePill(\"Came In Off Day\"));\n\n      noteCell.classList.toggle(\"note-flag\", pills.length > 0);\n      noteCell.innerHTML = pills.length ? `<div class=\"note-pill-wrap\">${pills.join(\"\")}</div>` : escapeHtml(noteCell.dataset.defaultNote);\n    }\n\n    function updateOffDayNotes() {\n      document.querySelectorAll(\".time-table tbody tr\").forEach(updateOffDayNoteForRow);\n    }\n\n    function getSectionKey(text) {\n      const normalized = text.toLowerCase();\n      if (normalized.includes(\"1st\")) return \"first\";\n      if (normalized.includes(\"second\") || normalized.includes(\"2nd\")) return \"second\";\n      if (normalized.includes(\"gate\")) return \"gate\";\n      return \"\";\n    }\n\n    function getSectionLabel(key) {\n      return {\n        first: \"1st Shift\",\n        second: \"2ND SHIFT\",\n        gate: \"Gate\"\n      }[key] || key;\n    }\n\n    function offByShiftForOffset(offset) {\n      const targetDay = dayKeyFromOffset(offset);\n      const groups = { first: [], second: [], gate: [] };\n      let sectionKey = \"\";\n\n      document.querySelectorAll(\".time-table tbody tr\").forEach((row) => {\n        const header = row.querySelector(\"th.section-name\");\n        if (header) {\n          sectionKey = getSectionKey(header.textContent);\n          return;\n        }\n\n        if (!groups[sectionKey]) return;\n        const nameCell = row.querySelector(\"td.name\");\n        if (!nameCell) return;\n\n        const offDays = parseOffDays(row.children[1] ? row.children[1].textContent : \"\");\n        if (offDays.has(targetDay)) groups[sectionKey].push(nameCell.textContent.trim());\n      });\n\n      return groups;\n    }\n\n    function renderOffDayPanel(offset, title) {\n      const groups = offByShiftForOffset(offset);\n      const grid = [\"first\", \"second\", \"gate\"].map((key) => {\n        const names = groups[key];\n        const list = names.length ? names.map((name) => `<li>${escapeHtml(name)}</li>`).join(\"\") : \"<li>None</li>\";\n        return `<section class=\"off-shift-list\"><h3>${getSectionLabel(key)} [${names.length}]</h3><ul>${list}</ul></section>`;\n      }).join(\"\");\n      return `<section class=\"off-day-panel\"><h2>${title} - ${dayLabelFromOffset(offset)}</h2><div class=\"off-day-grid\">${grid}</div></section>`;\n    }\n\n    function showTomorrowOffModal() {\n      document.getElementById(\"tomorrowOffTitle\").textContent = \"Off Days Preview\";\n      modalContent.innerHTML = [\n        renderOffDayPanel(1, \"Off Tomorrow\"),\n        renderOffDayPanel(2, \"Off Day After Tomorrow\")\n      ].join(\"\");\n      modal.classList.add(\"open\");\n      modal.setAttribute(\"aria-hidden\", \"false\");\n    }\n\n    function closeTomorrowOffModal() {\n      modal.classList.remove(\"open\");\n      modal.setAttribute(\"aria-hidden\", \"true\");\n    }\n\n    function escapeHtml(value) {\n      return String(value).replace(/[&<>\"']/g, (char) => ({\n        \"&\": \"&amp;\",\n        \"<\": \"&lt;\",\n        \">\": \"&gt;\",\n        '\"': \"&quot;\",\n        \"'\": \"&#39;\"\n      }[char]));\n    }\n\n    function rosterOffDaysLabel(days) {\n      return days\n        .map((day, index) => day === \"O\" ? rosterDayLabels[index] : \"\")\n        .filter(Boolean)\n        .join(\", \");\n    }\n\n    function readRosterAdditions() {\n      try {\n        const additions = JSON.parse(localStorage.getItem(rosterAdditionsKey) || \"[]\");\n        return Array.isArray(additions) ? additions : [];\n      } catch (error) {\n        localStorage.removeItem(rosterAdditionsKey);\n        return [];\n      }\n    }\n\n    function addPendingRosterRows(roster) {\n      const additions = readRosterAdditions();\n      if (!additions.length) return roster;\n\n      const seen = new Set(Object.values(roster)\n        .flatMap((rows) => Array.isArray(rows) ? rows : [])\n        .map((employee) => normalizeName(employee.name || \"\")));\n      additions.forEach((addition) => {\n        if (!addition || !addition.name) return;\n        const key = normalizeName(addition.name);\n        const shift = addition.shift || \"first\";\n        if (!key || seen.has(key)) return;\n        if (!Array.isArray(roster[shift])) roster[shift] = [];\n        roster[shift].push({\n          name: addition.name,\n          role: addition.role || \"\",\n          days: Array.isArray(addition.days) ? addition.days : [\"W\", \"W\", \"W\", \"W\", \"W\", \"W\", \"W\"]\n        });\n        seen.add(key);\n      });\n      return roster;\n    }\n\n    function sectionRows() {\n      const sections = {};\n      let sectionKey = \"\";\n      document.querySelectorAll(\".time-table tbody tr\").forEach((row) => {\n        const header = row.querySelector(\"th.section-name\");\n        if (header) {\n          sectionKey = getSectionKey(header.textContent);\n          if (!sections[sectionKey]) sections[sectionKey] = [];\n          return;\n        }\n\n        if (!sectionKey || !row.querySelector(\"td.name\")) return;\n        sections[sectionKey].push(row);\n      });\n      return sections;\n    }\n\n    function createTimeRow() {\n      const row = document.createElement(\"tr\");\n      row.innerHTML = `<td class=\"name\"></td><td class=\"center\"></td><td class=\"center\">-</td><td class=\"time-cell\"><input /></td><td class=\"time-cell\"><input /></td><td class=\"time-cell\"><input /></td><td></td>`;\n      return row;\n    }\n\n    function insertTimeRow(sectionKey, row, existingRows) {\n      const body = document.querySelector(\".time-table tbody\");\n      const lastRow = existingRows[existingRows.length - 1];\n      if (lastRow) {\n        lastRow.insertAdjacentElement(\"afterend\", row);\n        return;\n      }\n\n      const headerRow = Array.from(body.querySelectorAll(\"tr\")).find((candidate) => {\n        const header = candidate.querySelector(\"th.section-name\");\n        return header && getSectionKey(header.textContent) === sectionKey;\n      });\n      if (headerRow) headerRow.insertAdjacentElement(\"afterend\", row);\n    }\n\n    function updateOffDaysFromRoster() {\n      const saved = localStorage.getItem(rosterStorageKey);\n      const additions = readRosterAdditions();\n      if (!saved && !additions.length) return;\n\n      try {\n        const roster = addPendingRosterRows(saved ? migrateMcDanielToDays(JSON.parse(saved)) : {});\n        const sections = sectionRows();\n\n        [\"first\", \"second\", \"gate\"].forEach((sectionKey) => {\n          if (!Array.isArray(roster[sectionKey])) return;\n          const rows = sections[sectionKey] || [];\n          roster[sectionKey].forEach((rosterRow, index) => {\n            if (!rosterRow || !rosterRow.name || !Array.isArray(rosterRow.days)) return;\n            let row = rows[index];\n            if (!row) {\n              row = createTimeRow();\n              insertTimeRow(sectionKey, row, rows);\n              rows.push(row);\n            }\n\n            const nameCell = row.querySelector(\"td.name\");\n            if (!nameCell) return;\n            nameCell.textContent = rosterRow.name;\n            row.children[1].textContent = rosterOffDaysLabel(rosterRow.days);\n          });\n        });\n      } catch (error) {\n        localStorage.removeItem(rosterStorageKey);\n      }\n    }\n\n    function normalizeName(name) {\n      const suffixes = new Set([\"jr\", \"sr\", \"ii\", \"iii\", \"iv\"]);\n      return name\n        .trim()\n        .toLowerCase()\n        .replace(/[,.]/g, \" \")\n        .replace(/\\bcontrerras\\b/g, \"contreras\")\n        .replace(/\\s+/g, \" \")\n        .split(\" \")\n        .filter((part) => part && !suffixes.has(part))\n        .sort()\n        .join(\" \");\n    }\n\n    function migrateMcDanielToDays(state) {\n      if (!state || !Array.isArray(state.second)) return state;\n      if (!Array.isArray(state.first)) state.first = [];\n\n      const alreadyOnDays = state.first.some((employee) => normalizeName(employee.name || \"\") === \"charles mcdaniel\");\n      const secondIndex = state.second.findIndex((employee) => normalizeName(employee.name || \"\") === \"charles mcdaniel\");\n      if (secondIndex === -1) return state;\n\n      const [employee] = state.second.splice(secondIndex, 1);\n      if (!alreadyOnDays) state.first.push(employee);\n      localStorage.setItem(rosterStorageKey, JSON.stringify(state));\n      return state;\n    }\n\n    function toMilitaryTime(value) {\n      const text = String(value || \"\").trim();\n      if (!text) return \"\";\n\n      const match = text.match(/^(\\d{1,2}):(\\d{2})\\s*([ap])m$/i);\n      if (!match) return text;\n\n      let hour = Number(match[1]);\n      const minute = match[2];\n      const period = match[3].toLowerCase();\n\n      if (period === \"p\" && hour !== 12) hour += 12;\n      if (period === \"a\" && hour === 12) hour = 0;\n\n      return `${String(hour).padStart(2, \"0\")}${minute}`;\n    }\n\n    function toMilitaryRange(value) {\n      return String(value || \"\")\n        .split(\"-\")\n        .map((part) => toMilitaryTime(part.trim()))\n        .filter(Boolean)\n        .join(\" - \");\n    }\n\n    function minutesFromMilitary(value) {\n      const text = String(value || \"\").trim();\n      const match = text.match(/^(\\d{1,2})(\\d{2})$/);\n      if (!match) return null;\n\n      const hours = Number(match[1]);\n      const minutes = Number(match[2]);\n      if (hours > 24 || minutes > 59 || (hours === 24 && minutes !== 0)) return null;\n      return (hours * 60) + minutes;\n    }\n\n    function militaryFromMinutes(value) {\n      const minutes = ((Math.round(value) % 1440) + 1440) % 1440;\n      const hours = Math.floor(minutes / 60);\n      const mins = minutes % 60;\n      return `${String(hours).padStart(2, \"0\")}${String(mins).padStart(2, \"0\")}`;\n    }\n\n    function shiftEndValue() {\n      const preset = document.getElementById(\"shiftEndSelect\").value;\n      if (preset !== \"other\") return preset;\n      return document.getElementById(\"shiftEndOther\").value.trim().padStart(4, \"0\");\n    }\n\n    function updateShiftEndMode(shouldRecalculate = true) {\n      const isOther = document.getElementById(\"shiftEndSelect\").value === \"other\";\n      const custom = document.getElementById(\"shiftEndOther\");\n      custom.classList.toggle(\"open\", isOther);\n      if (isOther) custom.focus();\n      if (shouldRecalculate) updateCurrentLpmh();\n    }\n\n    function hoursUntilShiftEnd(value) {\n      const endMinutes = minutesFromMilitary(value);\n      if (endMinutes === null) return 0;\n\n      const now = new Date();\n      const nowMinutes = (now.getHours() * 60) + now.getMinutes();\n      let remaining = endMinutes - nowMinutes;\n      if (remaining <= 0) remaining += 24 * 60;\n      return remaining / 60;\n    }\n\n    function calculateActualForRow(row) {\n      const inputs = row.querySelectorAll(\".time-cell input\");\n      if (inputs.length < 3) return;\n\n      const start = minutesFromMilitary(inputs[0].value);\n      const hasTemporaryEnd = start !== null && !isClockValue(inputs[2].value);\n      const temporaryEnd = hasTemporaryEnd ? currentMilitaryTime() : \"\";\n      inputs[2].classList.toggle(\"temp-clock-out\", hasTemporaryEnd);\n      inputs[2].placeholder = hasTemporaryEnd ? temporaryEnd : \"\";\n\n      const end = minutesFromMilitary(hasTemporaryEnd ? temporaryEnd : inputs[2].value);\n      const actualCell = row.children[6];\n      if (!actualCell) return;\n      updateInvalidTimeStateForRow(row);\n      updateMissingStartForRow(row);\n      updateOffDayNoteForRow(row);\n      if (start === null || end === null) {\n        actualCell.textContent = \"\";\n        return;\n      }\n\n      let minutes = end - start;\n      if (minutes < 0) minutes += 24 * 60;\n      if (inputs[1].value.trim().toUpperCase() === \"YES\") minutes -= 30;\n\n      actualCell.classList.add(\"actual-cell\");\n      actualCell.textContent = minutes > 0 ? (minutes / 60).toFixed(1) : \"\";\n    }\n\n    function calculateActualHours() {\n      document.querySelectorAll(\".time-table tbody tr\").forEach(calculateActualForRow);\n      updateMissingStarts();\n      updateOffDayNotes();\n      updateScheduledCounts();\n      updateStartCounts();\n      updateActualHeaders();\n      updateCurrentLpmh();\n    }\n\n    function updateStartCounts() {\n      let headerRow = null;\n      let hereCount = 0;\n      let outCount = 0;\n\n      function commitCount() {\n        if (!headerRow) return;\n        const startHeader = headerRow.children[3];\n        if (startHeader) {\n          const total = hereCount + outCount;\n          startHeader.textContent = total > 0 ? `${hereCount} HERE, ${outCount} OUT` : \"START\";\n        }\n      }\n\n      document.querySelectorAll(\".time-table tbody tr\").forEach((row) => {\n        const sectionHeader = row.querySelector(\"th.section-name\");\n        if (sectionHeader) {\n          commitCount();\n          headerRow = row;\n          hereCount = 0;\n          outCount = 0;\n          return;\n        }\n\n        if (!headerRow) return;\n        const inputs = row.querySelectorAll(\".time-cell input\");\n        if (inputs.length < 3) return;\n        const hasStart = minutesFromMilitary(inputs[0].value) !== null;\n        const hasEnd = minutesFromMilitary(inputs[2].value) !== null;\n        const currentlyHere = hasStart && !hasEnd;\n        if (currentlyHere) {\n          hereCount += 1;\n          return;\n        }\n        if (rowIsScheduledToWork(row) && !rowHasAbsence(row)) outCount += 1;\n      });\n\n      commitCount();\n    }\n\n    function sectionHeaderBaseText(header) {\n      if (!header.dataset.baseLabel) {\n        header.dataset.baseLabel = header.textContent.replace(/\\s*\\[\\d+\\s*sch\\]\\s*$/i, \"\").trim();\n      }\n      return header.dataset.baseLabel;\n    }\n\n    function updateScheduledCounts() {\n      let headerCell = null;\n      let scheduledCount = 0;\n\n      function commitCount() {\n        if (!headerCell) return;\n        headerCell.textContent = `${sectionHeaderBaseText(headerCell)} [${scheduledCount} sch]`;\n      }\n\n      document.querySelectorAll(\".time-table tbody tr\").forEach((row) => {\n        const sectionHeader = row.querySelector(\"th.section-name\");\n        if (sectionHeader) {\n          commitCount();\n          headerCell = sectionHeader;\n          scheduledCount = 0;\n          return;\n        }\n\n        if (!headerCell || !row.querySelector(\"td.name\")) return;\n        if (rowIsScheduledToWork(row)) scheduledCount += 1;\n      });\n\n      commitCount();\n    }\n\n    function actualHoursBySection() {\n      const totals = {};\n      let sectionKey = \"\";\n\n      document.querySelectorAll(\".time-table tbody tr\").forEach((row) => {\n        const header = row.querySelector(\"th.section-name\");\n        if (header) {\n          sectionKey = getSectionKey(header.textContent);\n          if (sectionKey && totals[sectionKey] === undefined) totals[sectionKey] = 0;\n          return;\n        }\n\n        if (!sectionKey) return;\n        const actual = Number(row.children[6] ? row.children[6].textContent : \"\");\n        if (!Number.isNaN(actual)) totals[sectionKey] = (totals[sectionKey] || 0) + actual;\n      });\n\n      return totals;\n    }\n\n    function updateActualHeaders() {\n      const totals = actualHoursBySection();\n      let sectionKey = \"\";\n\n      document.querySelectorAll(\".time-table tbody tr\").forEach((row) => {\n        const sectionHeader = row.querySelector(\"th.section-name\");\n        if (!sectionHeader) return;\n        sectionKey = getSectionKey(sectionHeader.textContent);\n        const actualHeader = row.children[6];\n        if (actualHeader) actualHeader.textContent = `Actual ${((totals[sectionKey] || 0)).toFixed(1)}`;\n      });\n    }\n\n    function shiftHoursFor(keys) {\n      const totals = actualHoursBySection();\n      return keys.reduce((sum, key) => sum + (totals[key] || 0), 0);\n    }\n\n    function previousTimesheetImport() {\n      try {\n        const saved = JSON.parse(localStorage.getItem(previousTimesheetStorageKey) || \"null\");\n        return saved && typeof saved.hours === \"number\" ? saved : null;\n      } catch (error) {\n        localStorage.removeItem(previousTimesheetStorageKey);\n        return null;\n      }\n    }\n\n    function previousShiftHours() {\n      const imported = previousTimesheetImport();\n      return imported ? Math.max(Number(imported.hours) || 0, 0) : 0;\n    }\n\n    function currentLpmhBreakdown() {\n      const lifts = Number(document.getElementById(\"updateLifts\").value) || 0;\n      const flips = Number(document.getElementById(\"updateFlips\").value) || 0;\n      const rawShiftHours = shiftHoursFor([\"first\", \"second\"]);\n      const previousHours = previousShiftHours();\n      const shiftHours = rawShiftHours + previousHours;\n      const totalMoves = Math.max(lifts + flips, 0);\n      const currentRate = shiftHours > 0 ? totalMoves / shiftHours : 0;\n      const neededValue = Math.ceil(shiftHours * lpmhGoal);\n      const remainValue = neededValue - totalMoves;\n      const remainingHours = hoursUntilShiftEnd(shiftEndValue());\n      const goalMet = shiftHours > 0 && currentRate >= lpmhGoal;\n      const neededLph = goalMet ? \"MET GOAL!\" : (remainingHours > 0 ? (Math.max(remainValue, 0) / remainingHours).toFixed(1) : \"0.0\");\n      return { lifts, flips, rawShiftHours, previousHours, shiftHours, totalMoves, currentRate, neededValue, remainValue, remainingHours, goalMet, neededLph };\n    }\n\n    function updateCurrentLpmh() {\n      const details = currentLpmhBreakdown();\n      const current = document.getElementById(\"currentLpmh\");\n      const neededRate = document.getElementById(\"lphNeeded\");\n      const needed = document.getElementById(\"liftsNeeded\");\n      const remain = document.getElementById(\"liftsRemain\");\n      const rate = details.currentRate.toFixed(1);\n      current.textContent = rate;\n      needed.textContent = String(details.neededValue);\n      remain.textContent = details.goalMet ? \"MET GOAL!\" : String(Math.max(details.remainValue, 0));\n      neededRate.textContent = details.neededLph;\n      if (lpmhModal.classList.contains(\"open\")) renderCurrentLpmhDetails();\n    }\n\n    function renderCurrentLpmhDetails() {\n      const details = currentLpmhBreakdown();\n      const rows = [\n        [\"Lifts\", details.lifts],\n        [\"Flips\", details.flips],\n        [\"Total moves\", `${details.lifts} + ${details.flips} = ${details.totalMoves}`],\n        [\"Current 1st + 2nd hrs\", details.rawShiftHours.toFixed(1)],\n        [\"0000-0300 hrs\", details.previousHours.toFixed(1)],\n        [\"Total hrs\", `${details.rawShiftHours.toFixed(1)} + ${details.previousHours.toFixed(1)} = ${details.shiftHours.toFixed(1)}`]\n      ];\n      const formula = `${details.totalMoves} MOVES / ${details.shiftHours.toFixed(1)} HRS = ${details.currentRate.toFixed(1)}`;\n      lpmhDetails.innerHTML = [\n        ...rows.map(([label, value]) => `<div class=\"lpmh-row\"><span>${escapeHtml(label)}</span><span>${escapeHtml(value)}</span></div>`),\n        `<div class=\"lpmh-formula\">${escapeHtml(formula)}</div>`\n      ].join(\"\");\n    }\n\n    function showCurrentLpmhModal() {\n      renderCurrentLpmhDetails();\n      lpmhModal.classList.add(\"open\");\n      lpmhModal.setAttribute(\"aria-hidden\", \"false\");\n    }\n\n    function closeCurrentLpmhModal() {\n      lpmhModal.classList.remove(\"open\");\n      lpmhModal.setAttribute(\"aria-hidden\", \"true\");\n    }\n\n    function applyDayforcePunches() {\n      const saved = localStorage.getItem(dayforceStorageKey);\n      if (!saved) return;\n\n      try {\n        const punches = JSON.parse(saved);\n        if (!Array.isArray(punches)) return;\n\n        const visibleNames = new Set(Array.from(document.querySelectorAll(\".time-table tbody td.name\"))\n          .map((cell) => normalizeName(cell.textContent)));\n        const rosterPunches = punches.filter((item) => visibleNames.has(normalizeName(item.name || \"\")));\n        if (rosterPunches.length !== punches.length) {\n          localStorage.setItem(dayforceStorageKey, JSON.stringify(rosterPunches));\n        }\n\n        const byName = new Map(rosterPunches.map((item) => [normalizeName(item.name || \"\"), item]));\n        document.querySelectorAll(\".time-table tbody tr\").forEach((row) => {\n          const nameCell = row.querySelector(\"td.name\");\n          if (!nameCell) return;\n          delete row.dataset.absenceNote;\n          delete row.dataset.absenceUnpaid;\n          delete row.dataset.absencePaid;\n          delete row.dataset.absenceHours;\n          delete row.dataset.workdayKey;\n\n          const punch = byName.get(normalizeName(nameCell.textContent));\n          if (!punch) {\n            updateOffDayNoteForRow(row);\n            updateMissingStartForRow(row);\n            return;\n          }\n          const punchDayKey = dayKeyFromDateValue(punch.date);\n          if (punchDayKey) row.dataset.workdayKey = punchDayKey;\n          const note = String(punch.note || punch.reason || \"\").trim();\n          if (note) {\n            row.dataset.absenceNote = note;\n            row.dataset.absenceUnpaid = punch.absenceUnpaid ? \"1\" : \"\";\n            row.dataset.absencePaid = punch.absencePaid ? \"1\" : \"\";\n            row.dataset.absenceHours = punch.absenceHours || \"\";\n          }\n\n          const inputs = row.querySelectorAll(\".time-cell input\");\n          const rawLunch = String(punch.lunch || \"\").trim();\n          const noLunch = rawLunch.toUpperCase() === \"NO\";\n          const lunchValue = noLunch ? \"\" : toMilitaryRange(rawLunch);\n          const values = [toMilitaryTime(punch.start), noLunch ? \"NO\" : (lunchValue ? \"YES\" : \"\"), toMilitaryTime(punch.end)];\n          inputs.forEach((input, index) => {\n            const hasMissingLunch = index === 1 && !note && !values[index] && (values[0] || values[2]);\n            input.value = hasMissingLunch ? \"??\" : values[index] || \"\";\n            input.classList.toggle(\"imported\", Boolean(values[index]) && !hasMissingLunch);\n            input.classList.toggle(\"missing-lunch\", hasMissingLunch);\n          });\n          calculateActualForRow(row);\n        });\n        updateStartCounts();\n        updateActualHeaders();\n        updateCurrentLpmh();\n      } catch (error) {\n        localStorage.removeItem(dayforceStorageKey);\n      }\n    }\n\n    document.addEventListener(\"input\", (event) => {\n      if (event.target.matches(\".time-cell input\")) {\n        calculateActualForRow(event.target.closest(\"tr\"));\n        updateStartCounts();\n        updateActualHeaders();\n        updateCurrentLpmh();\n        return;\n      }\n\n      if (event.target.matches(\"#updateLifts, #updateFlips, #shiftEndOther\")) {\n        writeTimesheetSettings();\n        updateCurrentLpmh();\n      }\n    });\n\n    document.getElementById(\"currentLpmhToggle\").addEventListener(\"click\", showCurrentLpmhModal);\n    document.getElementById(\"currentLpmhToggle\").addEventListener(\"keydown\", (event) => {\n      if (event.key === \"Enter\" || event.key === \" \") {\n        event.preventDefault();\n        showCurrentLpmhModal();\n      }\n    });\n    document.getElementById(\"shiftEndSelect\").addEventListener(\"change\", () => {\n      writeTimesheetSettings();\n      updateShiftEndMode();\n    });\n    document.getElementById(\"shiftEndOther\").addEventListener(\"input\", (event) => {\n      event.target.value = event.target.value.replace(/\\D/g, \"\").slice(0, 4);\n    });\n    document.querySelectorAll(\".off-days-button\").forEach((button) => {\n      button.addEventListener(\"click\", showTomorrowOffModal);\n    });\n    document.querySelectorAll(\".time-table th.section-name\").forEach((header) => {\n      header.addEventListener(\"click\", () => sortShiftRows(header, \"status\"));\n    });\n    document.getElementById(\"closeTomorrowOff\").addEventListener(\"click\", closeTomorrowOffModal);\n    document.getElementById(\"closeLpmhModal\").addEventListener(\"click\", closeCurrentLpmhModal);\n    modal.addEventListener(\"click\", (event) => {\n      if (event.target === modal) closeTomorrowOffModal();\n    });\n    lpmhModal.addEventListener(\"click\", (event) => {\n      if (event.target === lpmhModal) closeCurrentLpmhModal();\n    });\n    document.addEventListener(\"keydown\", (event) => {\n      if (event.key === \"Escape\") {\n        closeTomorrowOffModal();\n        closeCurrentLpmhModal();\n      }\n    });\n\n    applyTimesheetSettings();\n    updateShiftEndMode(false);\n    updateOffDaysFromRoster();\n    applyDayforcePunches();\n    updateScheduledHighlights();\n    calculateActualHours();\n    sortAllShiftsByStatus();\n    setInterval(calculateActualHours, 60000);\n  <\/script>\n</body>\n</html>\n" },
      "timeMd": { label: "Timesheet MD", html: "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n  <meta charset=\"UTF-8\" />\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" />\n  <title>Timesheet MD</title>\n  <style>\n    :root {\n      --ink: #111827;\n      --muted: #6b7280;\n      --soft: #f4f5f8;\n      --line: #e5e7eb;\n      --purple: #312e81;\n      --purple-soft: #eef2ff;\n      --green: #16a34a;\n      --green-soft: #dcfce7;\n      --red: #dc2626;\n      --red-soft: #fee2e2;\n      --gold: #d97706;\n      --violet: #7c3aed;\n      --violet-soft: #ede9fe;\n      --gray-soft: #eef0f3;\n    }\n\n    * {\n      box-sizing: border-box;\n    }\n\n    body {\n      margin: 0;\n      background: #e7e5df;\n      color: var(--ink);\n      font-family: \"Helvetica Neue\", Helvetica, Arial, sans-serif;\n      font-size: 13px;\n      overflow-x: hidden;\n    }\n\n    .page-switcher {\n      width: 100%;\n      display: flex;\n      gap: 4px;\n      align-items: center;\n      padding: 6px 8px;\n      background: #111;\n      border-bottom: 2px solid #000;\n    }\n\n    .page-switcher a {\n      min-width: 118px;\n      height: 28px;\n      display: inline-flex;\n      align-items: center;\n      justify-content: center;\n      border: 1px solid #777;\n      background: #e7e6e6;\n      color: #000;\n      text-decoration: none;\n      font-size: 13px;\n      font-weight: 800;\n    }\n\n    .page-switcher a.active {\n      background: #ffff00;\n      border-color: #ffff00;\n    }\n\n    .canvas {\n      min-height: 0;\n      padding: 28px 28px 20px;\n      display: flex;\n      justify-content: center;\n    }\n\n    .panel {\n      width: min(1060px, 100%);\n      min-height: 0;\n      display: flex;\n      flex-direction: column;\n      background: var(--soft);\n      border-radius: 8px;\n      box-shadow: 0 2px 18px rgba(17, 24, 39, .16);\n      overflow: hidden;\n    }\n\n    .hero {\n      display: flex;\n      align-items: flex-end;\n      justify-content: space-between;\n      gap: 20px;\n      padding: 20px 28px 17px;\n      background: var(--purple);\n      color: #fff;\n    }\n\n    h1 {\n      margin: 3px 0 0;\n      font-size: 23px;\n      line-height: 1.05;\n    }\n\n    .hero-meta {\n      text-align: right;\n      line-height: 1.45;\n      color: #c7d2fe;\n      font-size: 11px;\n      font-weight: 700;\n      white-space: nowrap;\n    }\n\n    .prev-timesheet-warning {\n      min-height: 34px;\n      display: flex;\n      align-items: center;\n      justify-content: center;\n      padding: 7px 14px;\n      background: #c00000;\n      color: #fff;\n      font-size: 14px;\n      font-weight: 900;\n      letter-spacing: .04em;\n      text-align: center;\n      text-transform: uppercase;\n    }\n\n    .prev-timesheet-warning[hidden] {\n      display: none;\n    }\n\n    .shift-end-control {\n      display: inline-flex;\n      align-items: center;\n      gap: 5px;\n      margin-top: 2px;\n      color: #fff;\n      font-size: 13px;\n    }\n\n    .shift-end-control select,\n    .shift-end-control input {\n      width: 70px;\n      height: 23px;\n      border: 1px solid rgba(255, 255, 255, .35);\n      border-radius: 4px;\n      background: rgba(255, 255, 255, .12);\n      color: #fff;\n      font: inherit;\n      font-family: \"SFMono-Regular\", Consolas, monospace;\n      font-weight: 800;\n      text-align: center;\n    }\n\n    .shift-end-control option {\n      color: #000;\n    }\n\n    .custom-shift-end {\n      display: none;\n    }\n\n    .custom-shift-end.open {\n      display: inline-block;\n    }\n\n    .kpis {\n      display: grid;\n      grid-template-columns: repeat(7, minmax(0, 1fr));\n      gap: 8px;\n      padding: 15px 28px 4px;\n    }\n\n    .kpi {\n      min-height: 66px;\n      padding: 7px 11px;\n      border: 1px solid var(--line);\n      border-radius: 7px;\n      background: #fff;\n      display: flex;\n      flex-direction: column;\n      align-items: center;\n      justify-content: center;\n      gap: 4px;\n      text-align: center;\n    }\n\n    .kpi.accent {\n      background: var(--purple-soft);\n      border-color: #c7d2fe;\n    }\n\n    .kpi.good {\n      background: #f0fdf4;\n      border-color: #bbf7d0;\n    }\n\n    .kpi.warn {\n      background: #fffbeb;\n      border-color: #fde68a;\n    }\n\n    .kpi.bad {\n      background: #fef2f2;\n      border-color: #fecaca;\n    }\n\n    .kpi-label {\n      width: 100%;\n      color: #9ca3af;\n      font-size: 12px;\n      font-weight: 800;\n      letter-spacing: .06em;\n      line-height: 1;\n      text-align: center;\n      text-transform: uppercase;\n    }\n\n    .kpi.accent .kpi-label {\n      color: #6366f1;\n    }\n\n    .kpi.good .kpi-label {\n      color: var(--green);\n    }\n\n    .kpi.warn .kpi-label {\n      color: #a16207;\n    }\n\n    .kpi.bad .kpi-label {\n      color: var(--red);\n    }\n\n    .kpi-value,\n    .kpi input,\n    .kpi select {\n      width: 100%;\n      margin-top: 0;\n      border: 0;\n      outline: 0;\n      background: transparent;\n      color: var(--ink);\n      font: inherit;\n      font-size: 20px;\n      font-weight: 800;\n      font-variant-numeric: tabular-nums;\n      line-height: 1;\n      text-align: center;\n    }\n\n    .kpi input {\n      padding: 0;\n      display: block;\n      height: 22px;\n    }\n\n    .kpi select {\n      height: 28px;\n      padding: 1px 18px 2px 0;\n      cursor: pointer;\n      line-height: 1.25;\n    }\n\n    .kpi option {\n      color: #000;\n    }\n\n    .kpi .custom-shift-end {\n      display: none;\n    }\n\n    .kpi .custom-shift-end.open {\n      display: block;\n      height: 20px;\n      margin-top: 3px;\n      font-size: 14px;\n    }\n\n    .kpi.accent .kpi-value {\n      color: #4338ca;\n    }\n\n    .kpi-value.goal-text {\n      font-size: 18px;\n    }\n\n    .kpi.good .kpi-value {\n      color: #15803d;\n    }\n\n    .kpi.warn .kpi-value {\n      color: #92400e;\n    }\n\n    .kpi.bad .kpi-value {\n      color: #b91c1c;\n    }\n\n    .cards {\n      display: flex;\n      flex-direction: column;\n      gap: 10px;\n      padding: 9px 28px 0;\n    }\n\n    .shift-card {\n      overflow: hidden;\n      border: 1px solid var(--line);\n      border-radius: 8px;\n      background: #fff;\n    }\n\n    .shift-head {\n      min-height: 26px;\n      display: grid;\n      grid-template-columns: minmax(142px, 1fr) 88px minmax(150px, 1.45fr) 118px 54px 66px 86px;\n      align-items: center;\n      gap: 7px;\n      padding: 0 13px;\n      border-top: 2px solid #000;\n      border-bottom: 2px solid #000;\n      border-left: 3px solid #d9d9d9;\n      background: #d9d9d9;\n      color: #000;\n      font-size: 11px;\n      font-weight: 900;\n      text-align: center;\n    }\n\n    .shift-head span {\n      overflow: hidden;\n      text-overflow: ellipsis;\n      white-space: nowrap;\n    }\n\n    .shift-head .shift-name {\n      text-align: left;\n    }\n\n    .pill {\n      display: inline-flex;\n      align-items: center;\n      justify-content: center;\n      min-height: 18px;\n      padding: 2px 8px;\n      border-radius: 999px;\n      background: var(--gray-soft);\n      color: var(--muted);\n      font-size: 10px;\n      font-weight: 800;\n      line-height: 1.15;\n      white-space: nowrap;\n    }\n\n    .pill.in {\n      background: var(--green-soft);\n      color: #15803d;\n    }\n\n    .pill.out,\n    .pill.no-show {\n      background: var(--red-soft);\n      color: #b91c1c;\n    }\n\n    .pill.note,\n    .pill.unpaid,\n    .pill.paid {\n      background: var(--violet-soft);\n      color: #6d28d9;\n      border-radius: 4px;\n      white-space: normal;\n    }\n\n    .shift-stats {\n      display: flex;\n      align-items: center;\n      justify-content: flex-end;\n      flex-wrap: wrap;\n      gap: 8px;\n      color: var(--muted);\n      font-size: 10px;\n      font-weight: 700;\n      text-align: right;\n    }\n\n    .shift-stats b {\n      color: var(--ink);\n      font-variant-numeric: tabular-nums;\n    }\n\n    .md-row {\n      min-height: 24px;\n      display: grid;\n      grid-template-columns: minmax(142px, 1fr) 88px minmax(150px, 1.45fr) 118px 54px 66px 86px;\n      gap: 7px;\n      align-items: center;\n      padding: 0 13px;\n      border-bottom: 1px solid #f5f6f8;\n      border-left: 3px solid #e5e7eb;\n      font-size: 13px;\n      line-height: 1.15;\n    }\n\n    .md-row.in-row,\n    .md-row.out-row {\n      border-left-color: #22c55e;\n    }\n\n    .md-row.missing-row,\n    .md-row.invalid-row {\n      border-left-color: #ef4444;\n      background: #fef4f4;\n    }\n\n    .md-row.offday-row {\n      border-left-color: #14b8a6;\n      background: #f0fdfa;\n    }\n\n    .md-row.absence-row {\n      border-left-color: #a78bfa;\n      background: var(--violet-soft);\n    }\n\n    .md-row.unpaid-row {\n      background: var(--violet-soft);\n      border-left-color: #a78bfa;\n    }\n\n    .name {\n      overflow: hidden;\n      color: var(--ink);\n      font-weight: 600;\n      text-overflow: ellipsis;\n      white-space: nowrap;\n    }\n\n    .off {\n      overflow: hidden;\n      color: #9ca3af;\n      font-size: 11.5px;\n      text-align: center;\n      text-overflow: ellipsis;\n      white-space: nowrap;\n    }\n\n    .note-slot {\n      overflow: visible;\n      text-align: center;\n      white-space: normal;\n    }\n\n    .time {\n      color: var(--green);\n      font-family: \"SFMono-Regular\", Consolas, monospace;\n      font-size: 14px;\n      font-weight: 800;\n      text-align: center;\n      font-variant-numeric: tabular-nums;\n    }\n\n    .time.missing,\n    .name.missing {\n      color: var(--red);\n    }\n\n    .time.pending {\n      color: var(--gold);\n    }\n\n    .time.muted {\n      color: #c4c7cc;\n    }\n\n    .actual {\n      color: var(--ink);\n      font-weight: 800;\n      text-align: center;\n      font-variant-numeric: tabular-nums;\n    }\n\n    .off-footer {\n      display: flex;\n      align-items: center;\n      flex-wrap: wrap;\n      gap: 6px;\n      padding: 6px 13px 8px;\n      background: #fcfcfd;\n      color: #9ca3af;\n      font-size: 9px;\n      line-height: 1.45;\n    }\n\n    .off-footer strong {\n      color: var(--muted);\n      letter-spacing: .05em;\n      text-transform: uppercase;\n    }\n\n    .off-chip {\n      display: inline-flex;\n      align-items: center;\n      justify-content: center;\n      min-height: 18px;\n      padding: 2px 9px;\n      border-radius: 4px;\n      background: #f1f3f6;\n      color: #64748b;\n      font-size: 9px;\n      font-weight: 800;\n      line-height: 1;\n      white-space: nowrap;\n    }\n\n    .legend {\n      display: flex;\n      align-items: center;\n      gap: 16px;\n      margin-top: 0;\n      padding: 10px 28px;\n      border-top: 1px solid var(--line);\n      background: #fff;\n      color: #9ca3af;\n      font-size: 9px;\n    }\n\n    .legend span {\n      display: inline-flex;\n      align-items: center;\n      gap: 5px;\n      white-space: nowrap;\n    }\n\n    .swatch {\n      width: 10px;\n      height: 6px;\n      border-radius: 2px;\n      background: #e5e7eb;\n    }\n\n    .swatch.in { background: #22c55e; }\n    .swatch.missing { background: #ef4444; }\n    .swatch.absence { background: #a78bfa; }\n    .legend .right {\n      margin-left: auto;\n      font-family: \"SFMono-Regular\", Consolas, monospace;\n    }\n\n    .modal-backdrop {\n      position: fixed;\n      inset: 0;\n      z-index: 30;\n      display: none;\n      align-items: flex-start;\n      justify-content: center;\n      padding: 54px 14px 20px;\n      background: rgba(0, 0, 0, .35);\n    }\n\n    .modal-backdrop.open {\n      display: flex;\n    }\n\n    .lpmh-modal {\n      width: min(520px, 100%);\n      max-height: calc(100vh - 80px);\n      overflow: auto;\n      background: #fff;\n      border: 3px solid #000;\n      box-shadow: 0 12px 34px rgba(0, 0, 0, .25);\n    }\n\n    .lpmh-modal header {\n      display: flex;\n      align-items: center;\n      justify-content: space-between;\n      gap: 12px;\n      padding: 8px 10px;\n      background: #000;\n      color: #fff;\n      font-weight: 900;\n    }\n\n    .lpmh-modal button {\n      min-width: 30px;\n      height: 26px;\n      border: 1px solid #fff;\n      background: #e7e6e6;\n      color: #000;\n      font-weight: 900;\n      cursor: pointer;\n    }\n\n    .lpmh-details {\n      display: grid;\n      gap: 1px;\n      padding: 8px;\n      background: #000;\n    }\n\n    .lpmh-row {\n      min-height: 32px;\n      display: grid;\n      grid-template-columns: minmax(0, 1fr) minmax(120px, auto);\n      align-items: center;\n      gap: 10px;\n      padding: 0 10px;\n      background: #fff;\n      font-weight: 900;\n    }\n\n    .lpmh-row span:last-child {\n      text-align: right;\n    }\n\n    .lpmh-formula {\n      min-height: 40px;\n      display: flex;\n      align-items: center;\n      justify-content: center;\n      padding: 6px 10px;\n      background: #ffc7ce;\n      font-size: 17px;\n      font-weight: 900;\n      text-align: center;\n    }\n\n    @media (max-width: 860px) {\n      .canvas {\n        padding: 10px 10px 14px;\n      }\n\n      .hero,\n      .legend {\n        align-items: flex-start;\n        flex-direction: column;\n      }\n\n      .hero-meta,\n      .shift-stats {\n        text-align: left;\n      }\n\n      .kpis {\n        grid-template-columns: repeat(2, minmax(0, 1fr));\n        padding-inline: 12px;\n      }\n\n      .cards {\n        padding-inline: 12px;\n      }\n\n      .shift-head,\n      .md-row {\n        grid-template-columns: minmax(112px, 1fr) 66px minmax(102px, 1.3fr) 86px 38px 44px 68px;\n        gap: 4px;\n        padding-inline: 8px;\n      }\n    }\n  </style>\n</head>\n<body>\n  <main class=\"canvas\">\n    <section class=\"panel\">\n      <header class=\"hero\">\n        <div>\n          <h1>Time Input - Daily Sheet</h1>\n        </div>\n        <div class=\"hero-meta\">\n          <div id=\"todayLabel\"></div>\n        </div>\n      </header>\n\n      <div class=\"prev-timesheet-warning\" id=\"prevTimesheetWarning\" hidden>\n        Prev Timesheet Not Imported\n      </div>\n\n      <section class=\"kpis\" aria-label=\"Daily performance goals\">\n        <label class=\"kpi\">\n          <div class=\"kpi-label\">Lifts</div>\n          <input id=\"updateLifts\" type=\"number\" min=\"0\" value=\"339\" aria-label=\"Update lifts count\" />\n        </label>\n        <label class=\"kpi\">\n          <div class=\"kpi-label\">Flips</div>\n          <input id=\"updateFlips\" type=\"number\" min=\"0\" value=\"5\" aria-label=\"Update flips count\" />\n        </label>\n        <label class=\"kpi\">\n          <div class=\"kpi-label\">Shift End</div>\n          <select id=\"shiftEndSelect\" aria-label=\"Shift end preset\">\n            <option value=\"1500\">1500</option>\n            <option value=\"2400\">2400</option>\n            <option value=\"other\">Other</option>\n          </select>\n          <input class=\"custom-shift-end\" id=\"shiftEndOther\" inputmode=\"numeric\" maxlength=\"4\" placeholder=\"0000\" aria-label=\"Custom shift end time\" />\n        </label>\n        <div class=\"kpi\">\n          <div class=\"kpi-label\">Lifts Needed</div>\n          <div class=\"kpi-value\" id=\"liftsNeeded\">0</div>\n        </div>\n        <button type=\"button\" class=\"kpi accent\" id=\"currentLpmhButton\" aria-haspopup=\"dialog\" aria-controls=\"lpmhModal\">\n          <div class=\"kpi-label\">Current LPMH</div>\n          <div class=\"kpi-value\" id=\"currentLpmh\">0.0</div>\n        </button>\n        <div class=\"kpi\" id=\"lphNeededCard\">\n          <div class=\"kpi-label\">LPH Needed</div>\n          <div class=\"kpi-value\" id=\"lphNeeded\">0.0</div>\n        </div>\n        <div class=\"kpi\" id=\"liftsRemainCard\">\n          <div class=\"kpi-label\">Lifts Remain</div>\n          <div class=\"kpi-value\" id=\"liftsRemain\">0</div>\n        </div>\n      </section>\n\n      <section class=\"cards\" id=\"shiftCards\" aria-label=\"Timesheet MD shift cards\"></section>\n\n      <footer class=\"legend\">\n        <span><span class=\"swatch in\"></span>Clocked in</span>\n        <span><span class=\"swatch\"></span>Scheduled open</span>\n        <span><span class=\"swatch missing\"></span>Exception</span>\n        <span><span class=\"swatch absence\"></span>Off-day / absence</span>\n        <span class=\"right\">?? lunch pending / projected out uses current time</span>\n      </footer>\n    </section>\n  </main>\n\n  <div class=\"modal-backdrop\" id=\"lpmhModal\" aria-hidden=\"true\">\n    <section class=\"lpmh-modal\" role=\"dialog\" aria-modal=\"true\" aria-labelledby=\"lpmhModalTitle\">\n      <header>\n        <div id=\"lpmhModalTitle\">CURRENT LPMH</div>\n        <button type=\"button\" id=\"closeLpmhModal\">X</button>\n      </header>\n      <div class=\"lpmh-details\" id=\"lpmhDetails\"></div>\n    </section>\n  </div>\n\n  <script>\n    const dayAliases = {\n      sun: \"sun\", sunday: \"sun\",\n      mon: \"mon\", monday: \"mon\",\n      tue: \"tue\", tues: \"tue\", tuesday: \"tue\",\n      wed: \"wed\", weds: \"wed\", wednesday: \"wed\",\n      thu: \"thu\", thur: \"thu\", thurs: \"thu\", thursday: \"thu\",\n      fri: \"fri\", friday: \"fri\",\n      sat: \"sat\", saturday: \"sat\"\n    };\n\n    const todayKey = [\"sun\", \"mon\", \"tue\", \"wed\", \"thu\", \"fri\", \"sat\"][new Date().getDay()];\n    const rosterStorageKey = \"conglobal-roster-state-v1\";\n    const rosterAdditionsKey = \"conglobal-roster-additions-v1\";\n    const dayforceStorageKey = \"conglobal-dayforce-punches-v1\";\n    const previousTimesheetStorageKey = \"conglobal-previous-timesheet-hours-v1\";\n    const timesheetSettingsKey = \"conglobal-timesheet-settings-v1\";\n    const rosterDayLabels = [\"Mon\", \"Tues\", \"Wed\", \"Thurs\", \"Fri\", \"Sat\", \"Sun\"];\n    const lpmhGoal = 2.0;\n    const cards = document.getElementById(\"shiftCards\");\n    const lpmhModal = document.getElementById(\"lpmhModal\");\n    const lpmhDetails = document.getElementById(\"lpmhDetails\");\n    const prevTimesheetWarning = document.getElementById(\"prevTimesheetWarning\");\n\n    function readTimesheetSettings() {\n      try {\n        const saved = JSON.parse(localStorage.getItem(timesheetSettingsKey) || \"null\");\n        return saved && typeof saved === \"object\" ? saved : {};\n      } catch (error) {\n        localStorage.removeItem(timesheetSettingsKey);\n        return {};\n      }\n    }\n\n    function writeTimesheetSettings() {\n      localStorage.setItem(timesheetSettingsKey, JSON.stringify({\n        lifts: Number(document.getElementById(\"updateLifts\").value) || 0,\n        flips: Number(document.getElementById(\"updateFlips\").value) || 0,\n        shiftEndMode: document.getElementById(\"shiftEndSelect\").value,\n        shiftEndCustom: document.getElementById(\"shiftEndOther\").value.trim()\n      }));\n    }\n\n    function applyTimesheetSettings() {\n      const settings = readTimesheetSettings();\n      if (settings.lifts !== undefined) document.getElementById(\"updateLifts\").value = settings.lifts;\n      if (settings.flips !== undefined) document.getElementById(\"updateFlips\").value = settings.flips;\n      if (settings.shiftEndMode) document.getElementById(\"shiftEndSelect\").value = settings.shiftEndMode;\n      if (settings.shiftEndCustom !== undefined) document.getElementById(\"shiftEndOther\").value = settings.shiftEndCustom;\n    }\n\n    const defaultRoster = {\n      first: [\n        [\"Branford Alton\", \"Mon, Tues\"],\n        [\"Castruita Armando\", \"Wed, Thurs\"],\n        [\"Frazer Dacoyea\", \"Mon, Tues\"],\n        [\"Citizen Dante\", \"Thurs, Fri\"],\n        [\"Towler Demetrius\", \"Thurs, Fri\"],\n        [\"Stewart Dexter\", \"Sat, Sun\"],\n        [\"Gardner Dorrean\", \"Tues, Wed\"],\n        [\"Thomas Henry\", \"Sat, Sun\"],\n        [\"Brown James\", \"Thurs, Fri\"],\n        [\"Herrera Jose\", \"Sat, Sun\"],\n        [\"Player Keyston\", \"Mon, Sun\"],\n        [\"Hickman Makia\", \"Mon, Sun\"],\n        [\"Dever Mikey\", \"Tues, Wed\"],\n        [\"Wanza Myles\", \"Mon, Tues\"],\n        [\"Romero Nelson\", \"Tues, Wed\"],\n        [\"McDaniel Charles\", \"Fri, Sat\"],\n        [\"Nava Ramon\", \"Sat, Sun\"],\n        [\"Tran Tyler\", \"Thurs, Fri\"]\n      ],\n      second: [\n        [\"Carruthers Timothy\", \"Mon, Sun\"],\n        [\"Caceres Virula Victor\", \"Mon, Tues\"],\n        [\"Keme Aweri Jr.\", \"Mon, Tues\"],\n        [\"Hosey Kevin\", \"Mon, Tues\"],\n        [\"Brown Brandy\", \"Wed, Thurs\"],\n        [\"Mejia Aaron\", \"Thurs, Fri\"],\n        [\"Bookman Derrell\", \"Thurs, Fri\"],\n        [\"Hopkins Alexander\", \"Mon, Sun\"],\n        [\"Tingle Jason\", \"Sat, Sun\"],\n        [\"Contreras Marco\", \"Sat, Sun\"],\n        [\"Benavides Robert\", \"Wed, Sun\"],\n        [\"Urtado Ernest\", \"Tues, Wed\"],\n        [\"Johnson Messiah\", \"Tues, Thurs\"],\n        [\"Gilder Rufus II\", \"Tues, Wed\"],\n        [\"Echendu Chimenierm\", \"Wed, Thurs\"],\n        [\"Delgado Jose\", \"Fri, Sat\"]\n      ],\n      gate: [\n        [\"Candace Warren\", \"Sat, Sun\"],\n        [\"Connie Johnson\", \"Sat, Sun\"],\n        [\"Jarade Douglas\", \"Sat, Sun\"],\n        [\"Gregory Watson II\", \"Sat, Sun\"],\n        [\"Bryce Alexander\", \"Thurs, Fri\"],\n        [\"Naomisha Hunt\", \"Thurs, Fri, Sat\"],\n        [\"Ramacacondra Pratt\", \"Thurs, Fri\"],\n        [\"Kane Cabral\", \"Mon, Tues\"],\n        [\"Tavares Gariet\", \"Mon, Tues\"]\n      ]\n    };\n\n    const shiftLabels = {\n      first: \"1st Shift\",\n      second: \"2nd Shift\",\n      gate: \"Gate\",\n      mechanics: \"Mechanics\",\n      managers: \"Managers\"\n    };\n\n    function escapeHtml(value) {\n      return String(value).replace(/[&<>\"']/g, (char) => ({\n        \"&\": \"&amp;\",\n        \"<\": \"&lt;\",\n        \">\": \"&gt;\",\n        '\"': \"&quot;\",\n        \"'\": \"&#39;\"\n      }[char]));\n    }\n\n    function normalizeName(name) {\n      const suffixes = new Set([\"jr\", \"sr\", \"ii\", \"iii\", \"iv\"]);\n      return String(name || \"\")\n        .trim()\n        .toLowerCase()\n        .replace(/[,.]/g, \" \")\n        .replace(/\\bcontrerras\\b/g, \"contreras\")\n        .replace(/\\s+/g, \" \")\n        .split(\" \")\n        .filter((part) => part && !suffixes.has(part))\n        .sort()\n        .join(\" \");\n    }\n\n    function parseOffDays(text) {\n      return new Set(String(text || \"\")\n        .split(\",\")\n        .map((item) => item.trim().toLowerCase())\n        .map((item) => dayAliases[item] || dayAliases[item.slice(0, 3)])\n        .filter(Boolean));\n    }\n\n    function rosterOffDaysLabel(days) {\n      return days\n        .map((day, index) => day === \"O\" ? rosterDayLabels[index] : \"\")\n        .filter(Boolean)\n        .join(\", \");\n    }\n\n    function migrateMcDanielToDays(state) {\n      if (!state || !Array.isArray(state.second)) return state;\n      if (!Array.isArray(state.first)) state.first = [];\n      const alreadyOnDays = state.first.some((employee) => normalizeName(employee.name || \"\") === \"charles mcdaniel\");\n      const secondIndex = state.second.findIndex((employee) => normalizeName(employee.name || \"\") === \"charles mcdaniel\");\n      if (secondIndex === -1) return state;\n      const [employee] = state.second.splice(secondIndex, 1);\n      if (!alreadyOnDays) state.first.push(employee);\n      localStorage.setItem(rosterStorageKey, JSON.stringify(state));\n      return state;\n    }\n\n    function readRosterAdditions() {\n      try {\n        const additions = JSON.parse(localStorage.getItem(rosterAdditionsKey) || \"[]\");\n        return Array.isArray(additions) ? additions : [];\n      } catch (error) {\n        localStorage.removeItem(rosterAdditionsKey);\n        return [];\n      }\n    }\n\n    function buildRoster() {\n      const roster = Object.fromEntries(Object.entries(defaultRoster).map(([key, rows]) => [\n        key,\n        rows.map(([name, offDays]) => ({ name, offDays }))\n      ]));\n\n      try {\n        const saved = localStorage.getItem(rosterStorageKey);\n        if (saved) {\n          const state = migrateMcDanielToDays(JSON.parse(saved));\n          [\"first\", \"second\", \"gate\", \"mechanics\", \"managers\"].forEach((key) => {\n            if (!Array.isArray(state[key])) return;\n            roster[key] = state[key]\n              .filter((employee) => employee && employee.name)\n              .map((employee) => ({\n                name: employee.name,\n                offDays: Array.isArray(employee.days) ? rosterOffDaysLabel(employee.days) : \"\"\n              }));\n          });\n        }\n      } catch (error) {\n        localStorage.removeItem(rosterStorageKey);\n      }\n\n      const seen = new Set(Object.values(roster).flat().map((employee) => normalizeName(employee.name)));\n      readRosterAdditions().forEach((addition) => {\n        if (!addition || !addition.name) return;\n        const key = addition.shift || \"first\";\n        const nameKey = normalizeName(addition.name);\n        if (!nameKey || seen.has(nameKey)) return;\n        if (!Array.isArray(roster[key])) roster[key] = [];\n        roster[key].push({\n          name: addition.name,\n          offDays: Array.isArray(addition.days) ? rosterOffDaysLabel(addition.days) : \"\"\n        });\n        seen.add(nameKey);\n      });\n\n      return roster;\n    }\n\n    function toMilitaryTime(value) {\n      const text = String(value || \"\").trim();\n      if (!text) return \"\";\n      const match = text.match(/^(\\d{1,2}):(\\d{2})\\s*([ap])m$/i);\n      if (!match) return text;\n      let hour = Number(match[1]);\n      const minute = match[2];\n      const period = match[3].toLowerCase();\n      if (period === \"p\" && hour !== 12) hour += 12;\n      if (period === \"a\" && hour === 12) hour = 0;\n      return `${String(hour).padStart(2, \"0\")}${minute}`;\n    }\n\n    function minutesFromMilitary(value) {\n      const text = String(value || \"\").trim();\n      const match = text.match(/^(\\d{1,2})(\\d{2})$/);\n      if (!match) return null;\n      const hours = Number(match[1]);\n      const minutes = Number(match[2]);\n      if (hours > 24 || minutes > 59 || (hours === 24 && minutes !== 0)) return null;\n      return (hours * 60) + minutes;\n    }\n\n    function militaryFromMinutes(value) {\n      const minutes = ((Math.round(value) % 1440) + 1440) % 1440;\n      const hours = Math.floor(minutes / 60);\n      const mins = minutes % 60;\n      return `${String(hours).padStart(2, \"0\")}${String(mins).padStart(2, \"0\")}`;\n    }\n\n    function currentMinutes() {\n      const now = new Date();\n      return (now.getHours() * 60) + now.getMinutes();\n    }\n\n    function currentMilitaryTime() {\n      return militaryFromMinutes(currentMinutes());\n    }\n\n    function dayKeyFromDateValue(value) {\n      const text = String(value || \"\").trim();\n      if (!text) return \"\";\n      const dayNameMatch = text.match(/^([a-z]{3,9})\\b/i);\n      const explicitDay = dayNameMatch ? dayAliases[dayNameMatch[1].toLowerCase()] : \"\";\n      if (explicitDay) return explicitDay;\n      const match = text.match(/^(\\d{1,2})\\/(\\d{1,2})\\/(\\d{2,4})/);\n      const date = match\n        ? new Date(Number(match[3].length === 2 ? `20${match[3]}` : match[3]), Number(match[1]) - 1, Number(match[2]))\n        : new Date(text);\n      if (Number.isNaN(date.getTime())) return \"\";\n      return [\"sun\", \"mon\", \"tue\", \"wed\", \"thu\", \"fri\", \"sat\"][date.getDay()];\n    }\n\n    function readPunches() {\n      try {\n        const punches = JSON.parse(localStorage.getItem(dayforceStorageKey) || \"[]\");\n        return Array.isArray(punches) ? punches : [];\n      } catch (error) {\n        localStorage.removeItem(dayforceStorageKey);\n        return [];\n      }\n    }\n\n    function previousShiftHours() {\n      try {\n        const saved = JSON.parse(localStorage.getItem(previousTimesheetStorageKey) || \"null\");\n        return saved && typeof saved.hours === \"number\" ? Math.max(Number(saved.hours) || 0, 0) : 0;\n      } catch (error) {\n        localStorage.removeItem(previousTimesheetStorageKey);\n        return 0;\n      }\n    }\n\n    function updatePreviousTimesheetWarning() {\n      prevTimesheetWarning.hidden = previousShiftHours() > 0;\n    }\n\n    function shouldCheckMissingStart(shiftKey) {\n      if (shiftKey === \"gate\") return false;\n      if (shiftKey === \"second\") return currentMinutes() >= minutesFromMilitary(\"1500\");\n      return true;\n    }\n\n    function actualHours(startValue, lunch, endValue) {\n      const start = minutesFromMilitary(startValue);\n      const end = minutesFromMilitary(endValue);\n      if (start === null || end === null) return 0;\n      let minutes = end - start;\n      if (minutes < 0) minutes += 1440;\n      if (String(lunch).toUpperCase() === \"YES\") minutes -= 30;\n      return minutes > 0 ? minutes / 60 : 0;\n    }\n\n    function rowRank(row) {\n      if (row.scheduled && row.hasClockIn && !row.purpleAbsence) return 0;\n      if (!row.scheduled && row.hasClockIn) return 1;\n      if (row.purpleAbsence) return 2;\n      if (row.scheduled && !row.hasClockIn) return 3;\n      return 4;\n    }\n\n    function makeRows() {\n      const roster = buildRoster();\n      const punches = new Map(readPunches().map((punch) => [normalizeName(punch.name || \"\"), punch]));\n\n      return Object.fromEntries(Object.entries(roster).map(([shiftKey, employees]) => {\n        const rows = employees.map((employee) => {\n          const punch = punches.get(normalizeName(employee.name)) || null;\n          const workdayKey = punch ? dayKeyFromDateValue(punch.date) || todayKey : todayKey;\n          const scheduled = !parseOffDays(employee.offDays).has(workdayKey);\n          const note = String((punch && (punch.note || punch.reason)) || \"\").trim();\n          const rawLunch = String((punch && punch.lunch) || \"\").trim();\n          const noLunch = rawLunch.toUpperCase() === \"NO\";\n          const start = toMilitaryTime(punch ? punch.start : \"\");\n          const end = toMilitaryTime(punch ? punch.end : \"\");\n          const hasClockIn = minutesFromMilitary(start) !== null;\n          const hasClockOut = minutesFromMilitary(end) !== null;\n          const tempEnd = hasClockIn && !hasClockOut ? currentMilitaryTime() : \"\";\n          const lunch = noLunch ? \"NO\" : (rawLunch ? \"YES\" : (start || end ? \"??\" : \"\"));\n          const actual = actualHours(start, lunch, hasClockOut ? end : tempEnd);\n          const hasClockTime = Boolean(start || end);\n          const cameInOffDay = !scheduled && hasClockTime;\n          const unpaidAbsence = Boolean(punch && punch.absenceUnpaid);\n          const paidAbsence = Boolean(punch && punch.absencePaid);\n          const purpleAbsence = paidAbsence || unpaidAbsence || /\\bfloating holidays?\\b|\\bvacations?\\b|\\bsick\\b|\\bunpaid\\b/i.test(note);\n          const invalid = Boolean((start && minutesFromMilitary(start) === null) || (end && minutesFromMilitary(end) === null));\n          const missing = shouldCheckMissingStart(shiftKey) && scheduled && !note && !hasClockIn;\n          let status = \"OPEN\";\n          if (invalid) status = \"INVALID\";\n          else if (unpaidAbsence) status = \"UNPAID\";\n          else if (paidAbsence) status = \"PAID\";\n          else if (missing) status = \"NO SHOW\";\n          else if (hasClockIn && !hasClockOut) status = \"IN\";\n          else if (hasClockIn && hasClockOut) status = \"OUT\";\n          else if (!scheduled) status = \"OFF\";\n\n          return {\n            ...employee,\n            shiftKey,\n            scheduled,\n            note,\n            start,\n            lunch,\n            end,\n            tempEnd,\n            actual,\n            hasClockIn,\n            hasClockOut,\n            cameInOffDay,\n            purpleAbsence,\n            unpaidAbsence,\n            paidAbsence,\n            invalid,\n            missing,\n            status\n          };\n        });\n\n        rows.sort((a, b) => rowRank(a) - rowRank(b) || a.name.localeCompare(b.name));\n        return [shiftKey, rows];\n      }));\n    }\n\n    function rowClass(row) {\n      const classes = [\"md-row\"];\n      if (row.status === \"IN\") classes.push(\"in-row\");\n      if (row.status === \"OUT\") classes.push(\"out-row\");\n      if (row.cameInOffDay) classes.push(\"offday-row\");\n      if (row.missing) classes.push(\"missing-row\");\n      if (row.invalid) classes.push(\"invalid-row\");\n      if (row.purpleAbsence || row.paidAbsence) classes.push(\"absence-row\");\n      if (row.unpaidAbsence) classes.push(\"unpaid-row\");\n      return classes.join(\" \");\n    }\n\n    function noteHtml(row) {\n      const notes = [];\n      if (row.note) notes.push(`<span class=\"pill ${row.unpaidAbsence ? \"unpaid\" : row.paidAbsence ? \"paid\" : \"note\"}\">${escapeHtml(row.note)}</span>`);\n      if (row.cameInOffDay) notes.push(`<span class=\"pill note\">Came In Off Day</span>`);\n      if (row.invalid) notes.push(`<span class=\"pill no-show\">Invalid</span>`);\n      return notes.join(\"\");\n    }\n\n    function renderEmployeeRow(row) {\n      const endDisplay = row.hasClockOut ? row.end : row.tempEnd;\n      const endClass = row.hasClockOut ? \"\" : \" muted\";\n      const lunchClass = row.lunch === \"??\" ? \" pending\" : \"\";\n      return `\n        <div class=\"${rowClass(row)}\">\n          <span class=\"name ${row.missing ? \"missing\" : \"\"}\">${escapeHtml(row.name)}</span>\n          <span class=\"off\">${escapeHtml(row.offDays)}</span>\n          <span class=\"note-slot\">${noteHtml(row)}</span>\n          <span class=\"time ${row.missing ? \"missing\" : \"\"}\">${escapeHtml(row.missing ? \"Missing?\" : row.start)}</span>\n          <span class=\"time${lunchClass}\">${escapeHtml(row.lunch)}</span>\n          <span class=\"time${endClass}\">${escapeHtml(endDisplay)}</span>\n          <span class=\"actual\">${row.actual ? row.actual.toFixed(1) : \"\"}</span>\n        </div>\n      `;\n    }\n\n    function sectionStats(rows, shiftKey) {\n      const scheduled = rows.filter((row) => row.scheduled).length;\n      const here = rows.filter((row) => row.hasClockIn && !row.hasClockOut).length;\n      const out = rows.filter((row) => row.scheduled && !row.unpaidAbsence && !(row.hasClockIn && !row.hasClockOut)).length;\n      const actual = rows.reduce((sum, row) => sum + row.actual, 0);\n      const visibleRows = rows.filter((row) => !(row.status === \"OFF\" && !row.note));\n      const offRows = rows.filter((row) => row.status === \"OFF\" && !row.note);\n      return { scheduled, here, out, actual, visibleRows, offRows, shiftKey };\n    }\n\n    function shiftHeaderLabel(shiftKey) {\n      if (shiftKey === \"first\") return \"1st SHIFT\";\n      if (shiftKey === \"second\") return \"2ND SHIFT\";\n      return String(shiftLabels[shiftKey] || shiftKey).toUpperCase();\n    }\n\n    function renderShiftCard(shiftKey, rows) {\n      const stats = sectionStats(rows, shiftKey);\n      const offList = stats.offRows.length\n        ? stats.offRows.map((row) => `<span class=\"off-chip\">${escapeHtml(row.name)}</span>`).join(\"\")\n        : `<span class=\"off-chip\">None</span>`;\n      const body = stats.visibleRows.length\n        ? stats.visibleRows.map(renderEmployeeRow).join(\"\")\n        : `<div class=\"off-footer\"><strong>No rows</strong></div>`;\n\n      return `\n        <section class=\"shift-card\">\n          <header class=\"shift-head\">\n            <span class=\"shift-name\">${escapeHtml(`${shiftHeaderLabel(shiftKey)} [${stats.scheduled} sch]`)}</span>\n            <span>Off Days</span>\n            <span>NOTE</span>\n
