   extractedNameCells.add(rowIndex + \":0\");\n          }\n          return {\n            source: \"punch\",\n            name: String(row[0] || \"\").trim(),\n            date: String(row[1] || \"\").trim(),\n            start: String(row[2] || \"\").trim(),\n            lunch: String(row[3] || \"\").trim(),\n            end: String(row[4] || \"\").trim()\n          };\n        })\n        .filter((row) => row.name && row.name.toLowerCase() !== \"employee\");\n    }\n\n    function columnLabel(index) {\n      let label = \"\";\n      let value = index + 1;\n      while (value > 0) {\n        const remainder = (value - 1) % 26;\n        label = String.fromCharCode(65 + remainder) + label;\n        value = Math.floor((value - 1) / 26);\n      }\n      return label;\n    }\n\n    function previewNameCandidates(value) {\n      const raw = String(value || \"\").trim();\n      return Array.from(new Set([\n        raw,\n        displayNameFromDayforce(raw),\n        payrollDisplayName(raw)\n      ].map((name) => name.trim()).filter(Boolean)));\n    }\n\n    function previewMatchSummary(rows, extractedNameCells) {\n      const names = rosterNames();\n      const seen = new Set();\n      let total = 0;\n      let matched = 0;\n\n      extractedNameCells.forEach((key) => {\n        const [rowIndexText, colIndexText] = key.split(\":\");\n        const value = String(rows[Number(rowIndexText)]?.[Number(colIndexText)] || \"\").trim();\n        if (!value) return;\n\n        const candidates = previewNameCandidates(value);\n        const normalizedKey = normalizeName(candidates[1] || candidates[0]);\n        if (!normalizedKey || seen.has(normalizedKey)) return;\n        seen.add(normalizedKey);\n        total += 1;\n\n        if (candidates.some((candidate) => matchRosterName(candidate, names).found)) {\n          matched += 1;\n        }\n      });\n\n      return { matched, total };\n    }\n\n    function renderExcelPreview(rows, extractedNameCells, headerCells, sheetName) {\n      const nonEmptyRows = rows.filter((row) => row.some((cell) => String(cell || \"\").trim()));\n      if (!nonEmptyRows.length) {\n        excelPreviewSection.hidden = true;\n        excelPreviewHead.innerHTML = \"\";\n        excelPreviewBody.innerHTML = \"\";\n        return;\n      }\n\n      const maxColumns = Math.max(...rows.map((row) => row.length), 1);\n      const summary = previewMatchSummary(rows, extractedNameCells);\n      excelPreviewToggle.title = `${sheetName} Preview`;\n      excelPreviewToggle.setAttribute(\"aria-label\", `${sheetName} preview. Click to review raw time entry import.`);\n      excelPreviewToggle.setAttribute(\"aria-expanded\", \"false\");\n      excelPreviewCount.textContent = `${summary.matched} out of ${summary.total} matched to schedule`;\n      excelPreviewHead.innerHTML = `\n        <tr>\n          <th class=\"row-number\">#</th>\n          ${Array.from({ length: maxColumns }, (_, index) => `<th>${columnLabel(index)}</th>`).join(\"\")}\n        </tr>\n      `;\n      excelPreviewBody.innerHTML = rows.map((row, rowIndex) => `\n        <tr>\n          <td class=\"row-number\">${rowIndex + 1}</td>\n          ${Array.from({ length: maxColumns }, (_, colIndex) => {\n            const key = `${rowIndex}:${colIndex}`;\n            const value = String(row[colIndex] || \"\");\n            const classes = [\n              extractedNameCells.has(key) ? \"extracted-name\" : \"\",\n              headerCells.has(key) ? \"punch-header\" : \"\"\n            ].filter(Boolean).join(\" \");\n            return `<td class=\"${classes}\" title=\"${escapeHtml(value)}\">${escapeHtml(value)}</td>`;\n          }).join(\"\")}\n        </tr>\n      `).join(\"\");\n      excelPreviewSection.classList.add(\"collapsed\");\n      excelPreviewSection.hidden = false;\n    }\n\n    function recordSource(record) {\n      const source = String(record.source || \"\").trim().toLowerCase();\n      if (source === \"punch\" || source === \"note\") return source;\n      return record.absencePaid || record.absenceUnpaid || record.absenceHours || String(record.note || \"\").trim() ? \"note\" : \"punch\";\n    }\n\n    function previewShiftForRecord(punch, names, lookup) {\n      const match = matchRosterName(punch.name, names);\n      const canonical = match.suggestion || punch.name;\n      return lookup.get(normalizeName(canonical))?.shift || \"unmatched\";\n    }\n\n    function shiftGroupOrder(shift) {\n      const order = [\"first\", \"second\", \"gate\", \"mechanics\", \"managers\", \"unmatched\"];\n      const index = order.indexOf(shift);\n      return index === -1 ? order.length : index;\n    }\n\n    function createShiftGroupRow(shift, count) {\n      const row = document.createElement(\"tr\");\n      row.className = \"shift-group-row\";\n      row.innerHTML = `<td colspan=\"6\">${escapeHtml(shiftLabels[shift] || shift)}<span class=\"shift-group-count\">${count} ${count === 1 ? \"record\" : \"records\"}</span></td>`;\n      return row;\n    }\n\n    function appendImportMessage(message) {\n      const row = document.createElement(\"tr\");\n      row.className = \"import-message-row\";\n      row.innerHTML = `<td colspan=\"6\">${escapeHtml(message)}</td>`;\n      previewBody.appendChild(row);\n      emptyState.style.display = \"none\";\n    }\n\n    function createPunchRow(punch, names) {\n      const match = matchRosterName(punch.name, names);\n      const row = document.createElement(\"tr\");\n      row.className = \"record-row\";\n      row.dataset.source = recordSource(punch);\n      row.dataset.absencePaid = punch.absencePaid ? \"1\" : \"\";\n      row.dataset.absenceUnpaid = punch.absenceUnpaid ? \"1\" : \"\";\n      row.dataset.absenceHours = punch.absenceHours || \"\";\n      row.classList.toggle(\"unmatched\", !match.found);\n      if (!match.found && match.hasSuggestion) row.dataset.suggestion = match.suggestion;\n      const suggestion = match.hasSuggestion ? match.suggestion : \"No close roster match\";\n      const suggestionActions = !match.found ? `\n        <span class=\"suggestion-actions\">\n          ${match.hasSuggestion ? '<button type=\"button\" class=\"suggestion-yes\">YES</button><button type=\"button\" class=\"suggestion-no\">NO</button>' : ''}\n          <button type=\"button\" class=\"suggestion-ignore\">Ignore</button>\n        </span>\n      ` : \"\";\n      row.innerHTML = `\n        <td class=\"name-cell\"><input value=\"${escapeHtml(punch.name)}\" aria-label=\"Employee name\" />${match.found ? \"\" : `<span class=\"suggestion\"><span>Try: ${escapeHtml(suggestion)}</span>${suggestionActions}</span>`}</td>\n        <td><input value=\"${escapeHtml(punch.date)}\" aria-label=\"Punch date\" /></td>\n        <td><input value=\"${escapeHtml(punch.start)}\" aria-label=\"Start punch\" /></td>\n        <td><input value=\"${escapeHtml(punch.lunch)}\" aria-label=\"Lunch punch\" /></td>\n        <td><input value=\"${escapeHtml(punch.end)}\" aria-label=\"End punch\" /></td>\n        <td><input value=\"${escapeHtml(punch.note || \"\")}\" aria-label=\"Note\" /></td>\n      `;\n      return { row, matched: match.found };\n    }\n\n    function renderPunches(punches) {\n      previewBody.innerHTML = \"\";\n      const names = rosterNames();\n      const lookup = rosterLookup();\n      let unmatched = 0;\n\n      const groups = new Map();\n      punches.forEach((punch) => {\n        const shift = previewShiftForRecord(punch, names, lookup);\n        if (!groups.has(shift)) groups.set(shift, []);\n        groups.get(shift).push(punch);\n      });\n\n      Array.from(groups.entries())\n        .sort(([a], [b]) => shiftGroupOrder(a) - shiftGroupOrder(b))\n        .forEach(([shift, records]) => {\n          previewBody.appendChild(createShiftGroupRow(shift, records.length));\n          records.forEach((punch) => {\n            const { row, matched } = createPunchRow(punch, names);\n            if (!matched) unmatched += 1;\n            previewBody.appendChild(row);\n          });\n      });\n      emptyState.style.display = punches.length ? \"none\" : \"block\";\n      status.textContent = unmatched ? `${punches.length} records / ${unmatched} unmatched` : `${punches.length} records`;\n      saveUnmatchedImportsFromPreview();\n      renderMissingRosterActions();\n      updatePushNotice();\n    }\n\n    function previewRecordKey(record) {\n      return [\n        normalizeName(record.name),\n        String(record.date || \"\").trim(),\n        String(record.start || \"\").trim(),\n        String(record.lunch || \"\").trim(),\n        String(record.end || \"\").trim(),\n        String(record.note || \"\").trim().toLowerCase()\n      ].join(\"|\");\n    }\n\n    function appendPreviewRecords(records) {\n      const merged = readPreview();\n      const seen = new Set(merged.map(previewRecordKey));\n      records.forEach((record) => {\n        const key = previewRecordKey(record);\n        if (seen.has(key)) return;\n        seen.add(key);\n        merged.push(record);\n      });\n      return merged;\n    }\n\n    function refreshStatusFromPreview() {\n      const rows = previewBody.querySelectorAll(\"tr.record-row\");\n      const unmatched = previewBody.querySelectorAll(\"tr.record-row.unmatched\").length;\n      status.textContent = unmatched ? `${rows.length} records / ${unmatched} unmatched` : `${rows.length} records`;\n      renderMissingRosterActions();\n    }\n\n    function saveUnmatchedImportsFromPreview() {\n      const names = Array.from(previewBody.querySelectorAll(\"tr.unmatched .name-cell input\"))\n        .map((input) => input.value.trim())\n        .filter(Boolean);\n      localStorage.setItem(unmatchedStorageKey, JSON.stringify(Array.from(new Set(names))));\n    }\n\n    function uniquePreviewMisses() {\n      const names = rosterNames();\n      const seen = new Set();\n      return readPreview().map((punch) => {\n        const match = matchRosterName(punch.name, names);\n        return { punch, match };\n      }).filter(({ punch, match }) => {\n        const key = normalizeName(punch.name);\n        if (match.found || !key || seen.has(key)) return false;\n        seen.add(key);\n        return true;\n      });\n    }\n\n    function renderMissingRosterActions() {\n      const missing = uniquePreviewMisses();\n      missingRosterPanel.hidden = missing.length === 0;\n      missingRosterCount.textContent = `${missing.length} ${missing.length === 1 ? \"name\" : \"names\"}`;\n      missingRosterBody.innerHTML = missing.map(({ punch, match }) => {\n        const suggestion = match.hasSuggestion ? match.suggestion : \"\";\n        return `\n          <div class=\"missing-roster-row\" data-name=\"${escapeHtml(punch.name)}\">\n            <div>${escapeHtml(punch.name)}</div>\n            <div>${suggestion ? `Suggestion: ${escapeHtml(suggestion)} <button type=\"button\" class=\"convert-name\" data-suggestion=\"${escapeHtml(suggestion)}\">Use</button>` : \"No close suggestion\"}</div>\n            <select class=\"target-shift\" aria-label=\"Target shift for ${escapeHtml(punch.name)}\">\n              <option value=\"first\">1st Shift</option>\n              <option value=\"second\">Second Shift</option>\n              <option value=\"gate\">Gate</option>\n              <option value=\"mechanics\">Mechanics</option>\n              <option value=\"managers\">Managers</option>\n            </select>\n            <button type=\"button\" class=\"add-roster-name\">Add</button>\n          </div>\n        `;\n      }).join(\"\");\n    }\n\n    function rosterStateHasSavedRows(state) {\n      return [\"first\", \"second\", \"gate\", \"mechanics\", \"managers\"].some((key) => Array.isArray(state[key]) && state[key].length);\n    }\n\n    function readRosterAdditions() {\n      try {\n        const additions = JSON.parse(localStorage.getItem(rosterAdditionsKey) || \"[]\");\n        return Array.isArray(additions) ? additions : [];\n      } catch (error) {\n        localStorage.removeItem(rosterAdditionsKey);\n        return [];\n      }\n    }\n\n    function rosterAlreadyHasName(name) {\n      const normalized = normalizeName(name);\n      return rosterNames().some((candidate) => normalizeName(candidate) === normalized);\n    }\n\n    function addNameToRoster(name, shift) {\n      const cleanName = String(name || \"\").trim();\n      const targetShift = shiftLabels[shift] ? shift : \"first\";\n      if (!cleanName) return false;\n      if (rosterAlreadyHasName(cleanName)) return true;\n\n      const employee = {\n        name: cleanName,\n        role: \"\",\n        days: [\"W\", \"W\", \"W\", \"W\", \"W\", \"W\", \"W\"],\n        shift: targetShift\n      };\n\n      try {\n        const state = JSON.parse(localStorage.getItem(rosterStorageKey) || \"{}\");\n        if (rosterStateHasSavedRows(state)) {\n          if (!Array.isArray(state[targetShift])) state[targetShift] = [];\n          state[targetShift].push({ name: employee.name, role: employee.role, days: employee.days });\n          localStorage.setItem(rosterStorageKey, JSON.stringify(state));\n          return true;\n        }\n      } catch (error) {\n        localStorage.removeItem(rosterStorageKey);\n      }\n\n      const additions = readRosterAdditions();\n      additions.push(employee);\n      localStorage.setItem(rosterAdditionsKey, JSON.stringify(additions));\n      return true;\n    }\n\n    function renamePreviewEmployee(oldName, newName) {\n      const oldKey = normalizeName(oldName);\n      previewBody.querySelectorAll(\"tr\").forEach((row) => {\n        const nameInput = row.querySelector(\".name-cell input\");\n        if (nameInput && normalizeName(nameInput.value) === oldKey) {\n          nameInput.value = newName;\n        }\n      });\n      renderPunches(readPreview());\n    }\n    function escapeHtml(value) {\n      return String(value).replace(/[&<>\"']/g, (char) => ({\n        \"&\": \"&amp;\",\n        \"<\": \"&lt;\",\n        \">\": \"&gt;\",\n        '\"': \"&quot;\",\n        \"'\": \"&#39;\"\n      }[char]));\n    }\n\n    function previewRecordFromRow(row) {\n      const inputs = row.querySelectorAll(\"input\");\n      return {\n        source: row.dataset.source || \"\",\n        name: inputs[0]?.value.trim() || \"\",\n        date: inputs[1]?.value.trim() || \"\",\n        start: inputs[2]?.value.trim() || \"\",\n        lunch: inputs[3]?.value.trim() || \"\",\n        end: inputs[4]?.value.trim() || \"\",\n        note: inputs[5] ? inputs[5].value.trim() : \"\",\n        absencePaid: row.dataset.absencePaid === \"1\",\n        absenceUnpaid: row.dataset.absenceUnpaid === \"1\",\n        absenceHours: row.dataset.absenceHours || \"\"\n      };\n    }\n\n    function readPreview() {\n      return Array.from(previewBody.querySelectorAll(\"tr.record-row\"))\n        .map(previewRecordFromRow)\n        .filter((row) => row.name);\n    }\n\n    function rosterValidatedPunches(records = readPreview()) {\n      const names = rosterNames();\n      const skipped = [];\n      const accepted = records.map((punch) => {\n        const match = matchRosterName(punch.name, names);\n        if (!match.found) {\n          skipped.push(punch.name);\n          return null;\n        }\n\n        const acceptedPunch = {\n          ...punch,\n          name: match.suggestion || punch.name\n        };\n\n        if (acceptedPunch.note && acceptedPunch.absencePaid && acceptedPunch.absenceHours) {\n          acceptedPunch.start = shiftStartForEmployee(acceptedPunch.name);\n          acceptedPunch.lunch = \"NO\";\n          acceptedPunch.end = endFromStartAndHours(acceptedPunch.start, Number(acceptedPunch.absenceHours));\n        }\n\n        return acceptedPunch;\n      }).filter(Boolean);\n\n      return { accepted, skipped };\n    }\n\n\n    previewBody.addEventListener(\"click\", (event) => {\n      const yesButton = event.target.closest(\".suggestion-yes\");\n      const noButton = event.target.closest(\".suggestion-no\");\n      const ignoreButton = event.target.closest(\".suggestion-ignore\");\n      if (!yesButton && !noButton && !ignoreButton) return;\n\n      const row = event.target.closest(\"tr\");\n      if (!row) return;\n\n      if (ignoreButton) {\n        const ignored = previewRecordFromRow(row);\n        const ignoredKey = previewRecordKey(ignored);\n        let removed = false;\n        const remaining = readPreview().filter((record) => {\n          if (!removed && previewRecordKey(record) === ignoredKey) {\n            removed = true;\n            return false;\n          }\n          return true;\n        });\n        renderPunches(remaining);\n        setPendingPush(remaining.length > 0);\n        status.textContent = ignored.name ? `Ignored ${ignored.name} / ${remaining.length} records` : `Ignored row / ${remaining.length} records`;\n        return;\n      }\n\n      if (yesButton) {\n        const suggestedName = row.dataset.suggestion || \"\";\n        const nameInput = row.querySelector(\".name-cell input\");\n        if (suggestedName && nameInput) {\n          nameInput.value = suggestedName;\n          row.classList.remove(\"unmatched\");\n          row.removeAttribute(\"data-suggestion\");\n        }\n      }\n\n      row.querySelector(\".suggestion\")?.remove();\n      refreshStatusFromPreview();\n      saveUnmatchedImportsFromPreview();\n      setPendingPush(true);\n    });\n\n    previewBody.addEventListener(\"input\", (event) => {\n      if (!event.target.matches(\"input\")) return;\n      refreshStatusFromPreview();\n      saveUnmatchedImportsFromPreview();\n      setPendingPush(true);\n    });\n\n    missingRosterBody.addEventListener(\"click\", (event) => {\n      const convertButton = event.target.closest(\".convert-name\");\n      const addButton = event.target.closest(\".add-roster-name\");\n      if (!convertButton && !addButton) return;\n\n      const row = event.target.closest(\".missing-roster-row\");\n      if (!row) return;\n\n      const importedName = row.dataset.name || \"\";\n      if (convertButton) {\n        const suggestion = convertButton.dataset.suggestion || \"\";\n        if (suggestion) {\n          renamePreviewEmployee(importedName, suggestion);\n          status.textContent = `Converted ${importedName} to ${suggestion}`;\n          setPendingPush(true);\n        }\n        return;\n      }\n\n      if (addButton) {\n        const shift = row.querySelector(\".target-shift\")?.value || \"first\";\n        if (addNameToRoster(importedName, shift)) {\n          renderPunches(readPreview());\n          status.textContent = `Added ${importedName} to ${shiftLabels[shift]}`;\n          setPendingPush(true);\n        }\n      }\n    });\n\n    excelPreviewToggle.addEventListener(\"click\", () => {\n      const isCollapsed = excelPreviewSection.classList.toggle(\"collapsed\");\n      excelPreviewToggle.setAttribute(\"aria-expanded\", String(!isCollapsed));\n    });\n\n    function sheetRows(workbook, sheetName, raw = false) {\n      const sheet = workbook.Sheets[sheetName];\n      return XLSX.utils.sheet_to_json(sheet, { header: 1, raw, defval: \"\" });\n    }\n\n    function preferredPunchSheetNames(workbook) {\n      const sheet2 = workbook.SheetNames.filter((sheetName) => sheetName.trim().toLowerCase() === \"sheet2\");\n      return sheet2.length ? sheet2 : workbook.SheetNames;\n    }\n\n    function fileNameStartsWith(file, prefix) {\n      return String(file?.name || \"\").trim().toLowerCase().startsWith(prefix);\n    }\n\n    function rejectImportFile(input, message) {\n      input.value = \"\";\n      status.textContent = message;\n    }\n\n    document.getElementById(\"previousTimesheetInput\").addEventListener(\"change\", async (event) => {\n      const file = event.target.files[0];\n      if (!file) return;\n\n      if (!window.XLSX) {\n        previousTimesheetStatus.textContent = \"XLSX ERROR\";\n        status.textContent = \"XLSX parser unavailable\";\n        return;\n      }\n\n      try {\n        const workbook = XLSX.read(await file.arrayBuffer(), { type: \"array\" });\n        const result = parsePreviousTimesheetHours(workbook);\n        localStorage.setItem(previousTimesheetStorageKey, JSON.stringify({\n          hours: result.hours,\n          rows: result.rows,\n          records: result.records,\n          fileName: file.name,\n          importedAt: new Date().toISOString()\n        }));\n        updatePreviousTimesheetStatus();\n        status.textContent = `Previous timesheet imported: ${result.hours.toFixed(1)} hrs`;\n      } catch (error) {\n        previousTimesheetStatus.textContent = \"IMPORT ERROR\";\n        status.textContent = \"Previous timesheet import failed\";\n      } finally {\n        event.target.value = \"\";\n      }\n    });\n\n    document.getElementById(\"fileInput\").addEventListener(\"change\", async (event) => {\n      const file = event.target.files[0];\n      if (!file) return;\n\n      if (!fileNameStartsWith(file, \"report\")) {\n        rejectImportFile(event.target, \"Punch import must start with Report\");\n        return;\n      }\n\n      if (!window.XLSX) {\n        status.textContent = \"XLSX parser unavailable\";\n        return;\n      }\n\n      const buffer = await file.arrayBuffer();\n      const workbook = XLSX.read(buffer, { type: \"array\" });\n      const targetSheets = preferredPunchSheetNames(workbook);\n      const punches = [];\n      let previewRendered = false;\n\n      targetSheets.forEach((sheetName) => {\n        const rows = sheetRows(workbook, sheetName);\n        const rawRows = sheetRows(workbook, sheetName, true);\n        const extractedNameCells = new Set();\n        const headerCells = new Set();\n        punches.push(...parsePunchWorkbookRows(rows, extractedNameCells, headerCells, rawRows));\n\n        if (!previewRendered) {\n          renderExcelPreview(rows, extractedNameCells, headerCells, sheetName);\n          previewRendered = true;\n        }\n      });\n      renderPunches(punches);\n      setPendingPush(punches.length > 0);\n    });\n\n    document.getElementById(\"noteFileInput\").addEventListener(\"change\", async (event) => {\n      const file = event.target.files[0];\n      if (!file) return;\n\n      if (!fileNameStartsWith(file, \"payroll\")) {\n        rejectImportFile(event.target, \"Note scan import must start with Payroll\");\n        return;\n      }\n\n      if (!window.XLSX) {\n        status.textContent = \"XLSX parser unavailable\";\n        return;\n      }\n\n      const buffer = await file.arrayBuffer();\n      const workbook = XLSX.read(buffer, { type: \"array\" });\n      const records = [];\n      let fallbackPreview = null;\n      let previewRendered = false;\n\n      workbook.SheetNames.forEach((sheetName) => {\n        const rows = sheetRows(workbook, sheetName);\n        const extractedNameCells = new Set();\n        const headerCells = new Set();\n        const parsed = parsePayrollAbsenceRows(rows, extractedNameCells, headerCells);\n        records.push(...parsed);\n\n        if (!fallbackPreview) {\n          fallbackPreview = { rows, extractedNameCells, headerCells, sheetName };\n        }\n\n        if (!previewRendered && (parsed.length || extractedNameCells.size || headerCells.size)) {\n          renderExcelPreview(rows, extractedNameCells, headerCells, sheetName);\n          previewRendered = true;\n        }\n      });\n\n      if (!previewRendered && fallbackPreview) {\n        renderExcelPreview(fallbackPreview.rows, fallbackPreview.extractedNameCells, fallbackPreview.headerCells, fallbackPreview.sheetName);\n      }\n\n      const merged = appendPreviewRecords(records);\n      renderPunches(merged);\n      setPendingPush(records.length > 0);\n      if (!records.length) {\n        appendImportMessage(\"No records found from import scan\");\n        status.textContent = merged.length ? `${merged.length} records / no records found from import scan` : \"No records found from import scan\";\n      }\n    });\n\n    document.getElementById(\"saveButton\").addEventListener(\"click\", () => {\n      const previewPunches = readPreview();\n      const { accepted, skipped } = rosterValidatedPunches();\n      localStorage.setItem(storageKey, JSON.stringify(accepted));\n      localStorage.setItem(unmatchedStorageKey, JSON.stringify(Array.from(new Set(skipped))));\n      renderPunches(previewPunches);\n      setPendingPush(false);\n      status.textContent = skipped.length ? `Saved ${accepted.length} / skipped ${skipped.length} not on roster` : `Saved ${accepted.length}`;\n    });\n\n    function clearRecordsBySource(source, label) {\n      const remaining = readPreview().filter((record) => recordSource(record) !== source);\n      const { accepted, skipped } = rosterValidatedPunches(remaining);\n      localStorage.setItem(storageKey, JSON.stringify(accepted));\n      localStorage.setItem(unmatchedStorageKey, JSON.stringify(Array.from(new Set(skipped))));\n      renderPunches(remaining);\n      setPendingPush(false);\n      if (!remaining.length) {\n        excelPreviewSection.hidden = true;\n        excelPreviewHead.innerHTML = \"\";\n        excelPreviewBody.innerHTML = \"\";\n      }\n      status.textContent = skipped.length\n        ? `${label} cleared / ${remaining.length} records remain / ${skipped.length} unmatched`\n        : `${label} cleared / ${remaining.length} records remain`;\n    }\n\n    function setClearMenuOpen(open) {\n      clearSplit.classList.toggle(\"open\", open);\n      clearMenuButton.setAttribute(\"aria-expanded\", String(open));\n    }\n\n    function clearPreviousTimesheet() {\n      localStorage.removeItem(previousTimesheetStorageKey);\n      updatePreviousTimesheetStatus();\n      status.textContent = \"Previous time cleared\";\n    }\n\n    function runClearAction(action) {\n      if (action === \"punch\") {\n        clearRecordsBySource(\"punch\", \"Punches\");\n      } else if (action === \"note\") {\n        clearRecordsBySource(\"note\", \"Note scan\");\n      } else if (action === \"previous\") {\n        clearPreviousTimesheet();\n      }\n    }\n\n    [clearDefaultButton, clearMenuButton].forEach((button) => {\n      button.addEventListener(\"click\", (event) => {\n        event.stopPropagation();\n        setClearMenuOpen(!clearSplit.classList.contains(\"open\"));\n      });\n    });\n\n    clearMenu.addEventListener(\"click\", (event) => {\n      const actionButton = event.target.closest(\"[data-clear-action]\");\n      if (!actionButton) return;\n      setClearMenuOpen(false);\n      runClearAction(actionButton.dataset.clearAction);\n    });\n\n    document.addEventListener(\"click\", (event) => {\n      if (!clearSplit.contains(event.target)) setClearMenuOpen(false);\n    });\n\n    document.addEventListener(\"keydown\", (event) => {\n      if (event.key === \"Escape\") setClearMenuOpen(false);\n    });\n\n    try {\n      const saved = JSON.parse(localStorage.getItem(storageKey) || \"[]\");\n      renderPunches(Array.isArray(saved) ? saved : []);\n    } catch (error) {\n      localStorage.removeItem(storageKey);\n    }\n    updatePreviousTimesheetStatus();\n  <\/script>\n</body>\n</html>\n\r\n" },
      "compare": { label: "Compare", html: "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n  <meta charset=\"UTF-8\" />\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" />\n  <title>Timesheet Compare</title>\n  <style>\n    * { box-sizing: border-box; }\n    body {\n      margin: 0;\n      overflow-x: hidden;\n      background: #eef2f6;\n      color: #0f1b2a;\n      font-family: Arial, Helvetica, sans-serif;\n      font-size: 13px;\n      font-weight: 700;\n    }\n    .page-switcher {\n      width: 100%;\n      display: flex;\n      flex-wrap: wrap;\n      gap: 4px;\n      align-items: center;\n      padding: 6px 8px;\n      background: #111;\n      border-bottom: 2px solid #000;\n    }\n    .page-switcher a {\n      min-width: 118px;\n      height: 28px;\n      display: inline-flex;\n      align-items: center;\n      justify-content: center;\n      border: 1px solid #777;\n      background: #e7e6e6;\n      color: #000;\n      text-decoration: none;\n      font-size: 13px;\n      font-weight: 800;\n    }\n    .page-switcher a.active {\n      background: #ffff00;\n      border-color: #ffff00;\n    }\n    .page {\n      width: min(1180px, calc(100% - 16px));\n      margin: 8px auto 22px;\n    }\n    .toolbar {\n      display: grid;\n      grid-template-columns: minmax(280px, 1fr) auto auto;\n      gap: 8px;\n      align-items: center;\n      padding: 10px;\n      background: #fff;\n      border: 1px solid #c4d4e4;\n      border-radius: 8px 8px 0 0;\n      font-weight: 900;\n    }\n    input[type=\"file\"] {\n      width: 100%;\n      max-width: 460px;\n      min-height: 30px;\n      padding: 3px;\n      border: 1px solid #cbd5df;\n      border-radius: 6px;\n      background: #f8fafc;\n      font-weight: 700;\n    }\n    button, select {\n      font: inherit;\n    }\n    button {\n      min-height: 30px;\n      border: 1px solid #273140;\n      border-radius: 6px;\n      background: #273140;\n      color: #fff;\n      font-weight: 900;\n      cursor: pointer;\n    }\n    button.secondary {\n      background: #f4f6f8;\n      color: #273140;\n      border-color: #cbd5df;\n    }\n    .summary {\n      display: grid;\n      grid-template-columns: repeat(4, minmax(0, 1fr));\n      gap: 1px;\n      background: #28313c;\n      border: 1px solid #c4d4e4;\n      border-top: 0;\n    }\n    .summary div {\n      min-height: 42px;\n      display: grid;\n      place-items: center;\n      background: #d9e8f7;\n      color: #071527;\n      font-size: 15px;\n      font-weight: 900;\n      text-align: center;\n    }\n    .panel {\n      margin-top: 10px;\n      border: 1px solid #c4d4e4;\n      border-radius: 8px;\n      background: #fff;\n      overflow: hidden;\n    }\n    .panel-title {\n      min-height: 38px;\n      display: flex;\n      align-items: center;\n      justify-content: space-between;\n      gap: 10px;\n      padding: 0 12px;\n      background: #d9e8f7;\n      border-bottom: 1px solid #c4d4e4;\n      color: #071527;\n      font-size: 15px;\n      font-weight: 900;\n    }\n    .panel-count {\n      color: #526174;\n      font-size: 12px;\n      white-space: nowrap;\n    }\n    table {\n      width: 100%;\n      border-collapse: collapse;\n      table-layout: fixed;\n    }\n    .preview-table col.employee { width: 21%; }\n    .preview-table col.match { width: 18%; }\n    .preview-table col.small { width: 8%; }\n    .preview-table col.actual { width: 8%; }\n    .preview-table col.actions { width: 29%; }\n    .compare-table col.employee { width: 18%; }\n    .compare-table col.small { width: 8%; }\n    .compare-table col.status { width: 10%; }\n    th, td {\n      min-height: 25px;\n      height: 25px;\n      padding: 0 5px;\n      border-bottom: 1px solid #d9e0e8;\n      overflow: hidden;\n      white-space: nowrap;\n      text-overflow: ellipsis;\n      text-align: center;\n    }\n    th {\n      height: 31px;\n      background: #28313c;\n      color: #eef4fb;\n      font-size: 12px;\n      font-weight: 900;\n      letter-spacing: .03em;\n      text-transform: uppercase;\n    }\n    .group {\n      background: #111827;\n      color: #fff;\n    }\n    .shift-section td {\n      height: 29px;\n      padding: 0 9px;\n      border-top: 2px solid #000;\n      border-bottom: 2px solid #000;\n      background: #d9e8f7;\n      color: #071527;\n      font-size: 13px;\n      font-weight: 900;\n      text-align: left;\n      text-transform: uppercase;\n    }\n    .shift-section span {\n      margin-left: 8px;\n      padding: 2px 8px;\n      border-radius: 999px;\n      background: #fff;\n      color: #526174;\n      font-size: 11px;\n      text-transform: none;\n    }\n    .employee-cell {\n      text-align: left;\n      background: #e2f0d9;\n      color: #071527;\n      font-weight: 900;\n    }\n    .name-match-button {\n      width: 100%;\n      min-height: 22px;\n      padding: 0;\n      border: 0;\n      background: transparent;\n      color: inherit;\n      text-align: left;\n      font-weight: 900;\n    }\n    .name-match-select {\n      display: none;\n      width: 100%;\n      height: 23px;\n      border: 1px solid #7c3aed;\n      border-radius: 4px;\n      background: #fff;\n      color: #071527;\n      font-size: 11px;\n      font-weight: 800;\n    }\n    tr.selecting-name .name-match-button {\n      display: none;\n    }\n    tr.selecting-name .name-match-select {\n      display: block;\n    }\n    .match { background: #d9ead3; color: #0f6b2d; font-weight: 900; }\n    .diff { background: #f4cccc; color: #7f1d1d; font-weight: 900; }\n    .missing { background: #fff2cc; color: #7c5700; font-weight: 900; }\n    .unrecognized td,\n    .unrecognized .employee-cell {\n      background: #e7c7e8;\n      color: #4f1b58;\n      font-weight: 900;\n    }\n    .ignored td,\n    .ignored .employee-cell {\n      background: #f3f4f6;\n      color: #6b7280;\n    }\n    .actions {\n      display: flex;\n      align-items: center;\n      justify-content: center;\n      gap: 4px;\n      min-width: 0;\n      overflow: visible;\n    }\n    .actions button,\n    .actions select {\n      min-height: 22px;\n      height: 22px;\n      padding: 0 7px;\n      border-radius: 4px;\n      font-size: 11px;\n    }\n    .actions select {\n      min-width: 82px;\n      border: 1px solid #cbd5df;\n      background: #fff;\n      color: #071527;\n      font-weight: 800;\n    }\n    .actions .suggest {\n      background: #111827;\n      color: #fff;\n    }\n    .actions .add {\n      background: #0f6b2d;\n      border-color: #0f6b2d;\n    }\n    .actions .ignore {\n      background: #f4f6f8;\n      color: #7f1d1d;\n      border-color: #f1a8a8;\n    }\n    .empty {\n      padding: 16px 12px;\n      color: #526174;\n      font-weight: 800;\n    }\n    @media (max-width: 860px) {\n      body { font-size: 11px; }\n      .page { width: calc(100% - 8px); }\n      .toolbar { grid-template-columns: 1fr; }\n      .summary { grid-template-columns: repeat(2, minmax(0, 1fr)); }\n      .preview-table,\n      .compare-table { table-layout: auto; }\n      th, td { min-width: 70px; padding: 0 3px; }\n      .employee-cell { min-width: 150px; }\n    }\n  </style>\n</head>\n<body>\n  <main class=\"page\">\n    <section class=\"toolbar\">\n      <label>IMPORT TIMESHEET TO COMPARE: <input type=\"file\" id=\"fileInput\" accept=\".xlsx,.xls,.csv,.txt\" /></label>\n      <button type=\"button\" id=\"refreshButton\">Refresh Current</button>\n      <button type=\"button\" class=\"secondary\" id=\"clearButton\">Clear Compare</button>\n    </section>\n\n    <section class=\"summary\" aria-label=\"Compare summary\">\n      <div id=\"currentCount\">Current MD: 0</div>\n      <div id=\"importCount\">Imported: 0</div>\n      <div id=\"matchCount\">Matches: 0</div>\n      <div id=\"issueCount\">Issues: 0</div>\n    </section>\n\n    <section class=\"panel\" id=\"previewPanel\">\n      <div class=\"panel-title\">\n        <span>Imported Timesheet Preview</span>\n        <span class=\"panel-count\" id=\"previewCount\">No import loaded</span>\n      </div>\n      <div id=\"previewEmpty\" class=\"empty\">Import an XLSX, CSV, or TXT timesheet to preview parsed rows before comparing.</div>\n      <table class=\"preview-table\" id=\"previewTable\" aria-label=\"Imported timesheet preview\" hidden>\n        <colgroup>\n          <col class=\"employee\" />\n          <col class=\"match\" />\n          <col class=\"small\" />\n          <col class=\"small\" />\n          <col class=\"small\" />\n          <col class=\"actual\" />\n          <col class=\"actions\" />\n        </colgroup>\n        <thead>\n          <tr>\n            <th>Imported Name</th>\n            <th>Schedule Match</th>\n            <th>Start</th>\n            <th>Lunch</th>\n            <th>End</th>\n            <th>Actual</th>\n            <th>Unrecognized Action</th>\n          </tr>\n        </thead>\n        <tbody id=\"previewBody\"></tbody>\n      </table>\n    </section>\n\n    <section class=\"panel\">\n      <div class=\"panel-title\">\n        <span>Current Timesheet MD vs Imported Timesheet</span>\n        <span class=\"panel-count\">Compared by employee name, start, lunch, end, and actual hours</span>\n      </div>\n      <table class=\"compare-table\" aria-label=\"Timesheet comparison\">\n        <colgroup>\n          <col class=\"employee\" />\n          <col class=\"small\" /><col class=\"small\" /><col class=\"small\" /><col class=\"small\" />\n          <col class=\"small\" /><col class=\"small\" /><col class=\"small\" /><col class=\"small\" />\n          <col class=\"status\" />\n        </colgroup>\n        <thead>\n          <tr>\n            <th rowspan=\"2\">Employee</th>\n            <th class=\"group\" colspan=\"4\">Current Timesheet MD</th>\n            <th class=\"group\" colspan=\"4\">Imported Timesheet</th>\n            <th rowspan=\"2\">Status</th>\n          </tr>\n          <tr>\n            <th>Start</th><th>Lunch</th><th>End</th><th>Actual</th>\n            <th>Start</th><th>Lunch</th><th>End</th><th>Actual</th>\n          </tr>\n        </thead>\n        <tbody id=\"compareBody\"></tbody>\n      </table>\n    </section>\n  </main>\n\n  <script src=\"https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js\"><\/script>\n  <script>\n    const dayAliases = {\n      sun: \"sun\", sunday: \"sun\",\n      mon: \"mon\", monday: \"mon\",\n      tue: \"tue\", tues: \"tue\", tuesday: \"tue\",\n      wed: \"wed\", weds: \"wed\", wednesday: \"wed\",\n      thu: \"thu\", thur: \"thu\", thurs: \"thu\", thursday: \"thu\",\n      fri: \"fri\", friday: \"fri\",\n      sat: \"sat\", saturday: \"sat\"\n    };\n    const todayKey = [\"sun\", \"mon\", \"tue\", \"wed\", \"thu\", \"fri\", \"sat\"][new Date().getDay()];\n    const rosterStorageKey = \"conglobal-roster-state-v1\";\n    const rosterAdditionsKey = \"conglobal-roster-additions-v1\";\n    const dayforceStorageKey = \"conglobal-dayforce-punches-v1\";\n    const compareStorageKey = \"conglobal-compare-timesheet-v2\";\n    const compareAliasesKey = \"conglobal-compare-name-aliases-v1\";\n    const compareIgnoredKey = \"conglobal-compare-ignored-names-v1\";\n    const rosterDayLabels = [\"Mon\", \"Tues\", \"Wed\", \"Thurs\", \"Fri\", \"Sat\", \"Sun\"];\n    const shiftLabels = {\n      first: \"1st Shift\",\n      second: \"2ND SHIFT\",\n      gate: \"Gate\",\n      mechanics: \"Mechanics\",\n      managers: \"Managers\"\n    };\n    const shiftOrder = [\"first\", \"second\", \"gate\", \"mechanics\", \"managers\", \"unknown\"];\n    const body = document.getElementById(\"compareBody\");\n    const previewBody = document.getElementById(\"previewBody\");\n\n    const defaultRoster = {\n      first: [\n        [\"Branford Alton\", \"Mon, Tues\"],\n        [\"Castruita Armando\", \"Wed, Thurs\"],\n        [\"Frazer Dacoyea\", \"Mon, Tues\"],\n        [\"Citizen Dante\", \"Thurs, Fri\"],\n        [\"Towler Demetrius\", \"Thurs, Fri\"],\n        [\"Stewart Dexter\", \"Sat, Sun\"],\n        [\"Gardner Dorrean\", \"Tues, Wed\"],\n        [\"Thomas Henry\", \"Sat, Sun\"],\n        [\"Brown James\", \"Thurs, Fri\"],\n        [\"Herrera Jose\", \"Sat, Sun\"],\n        [\"Player Keyston\", \"Mon, Sun\"],\n        [\"Hickman Makia\", \"Mon, Sun\"],\n        [\"Dever Mikey\", \"Tues, Wed\"],\n        [\"Wanza Myles\", \"Mon, Tues\"],\n        [\"Romero Nelson\", \"Tues, Wed\"],\n        [\"McDaniel Charles\", \"Fri, Sat\"],\n        [\"Nava Ramon\", \"Sat, Sun\"],\n        [\"Tran Tyler\", \"Thurs, Fri\"]\n      ],\n      second: [\n        [\"Carruthers Timothy\", \"Mon, Sun\"],\n        [\"Caceres Virula Victor\", \"Mon, Tues\"],\n        [\"Keme Aweri Jr.\", \"Mon, Tues\"],\n        [\"Hosey Kevin\", \"Mon, Tues\"],\n        [\"Brown Brandy\", \"Wed, Thurs\"],\n        [\"Mejia Aaron\", \"Thurs, Fri\"],\n        [\"Bookman Derrell\", \"Thurs, Fri\"],\n        [\"Hopkins Alexander\", \"Mon, Sun\"],\n        [\"Tingle Jason\", \"Sat, Sun\"],\n        [\"Contreras Marco\", \"Sat, Sun\"],\n        [\"Benavides Robert\", \"Wed, Sun\"],\n        [\"Urtado Ernest\", \"Tues, Wed\"],\n        [\"Johnson Messiah\", \"Tues, Thurs\"],\n        [\"Gilder Rufus II\", \"Tues, Wed\"],\n        [\"Echendu Chimenierm\", \"Wed, Thurs\"],\n        [\"Delgado Jose\", \"Fri, Sat\"]\n      ],\n      gate: [\n        [\"Candace Warren\", \"Sat, Sun\"],\n        [\"Connie Johnson\", \"Sat, Sun\"],\n        [\"Jarade Douglas\", \"Sat, Sun\"],\n        [\"Gregory Watson II\", \"Sat, Sun\"],\n        [\"Bryce Alexander\", \"Thurs, Fri\"],\n        [\"Naomisha Hunt\", \"Thurs, Fri, Sat\"],\n        [\"Ramacacondra Pratt\", \"Thurs, Fri\"],\n        [\"Kane Cabral\", \"Mon, Tues\"],\n        [\"Tavares Gariet\", \"Mon, Tues\"]\n      ],\n      mechanics: [],\n      managers: []\n    };\n\n    function escapeHtml(value) {\n      return String(value).replace(/[&<>\"']/g, (char) => ({\n        \"&\": \"&amp;\",\n        \"<\": \"&lt;\",\n        \">\": \"&gt;\",\n        '\"': \"&quot;\",\n        \"'\": \"&#39;\"\n      }[char]));\n    }\n\n    function normalizeName(name) {\n      const suffixes = new Set([\"jr\", \"sr\", \"ii\", \"iii\", \"iv\"]);\n      return String(name || \"\")\n        .trim()\n        .toLowerCase()\n        .replace(/[,.]/g, \" \")\n        .replace(/\\bcontrerras\\b/g, \"contreras\")\n        .replace(/\\bdemeatrius\\b/g, \"demetrius\")\n        .replace(/\\s+/g, \" \")\n        .split(\" \")\n        .filter((part) => part && !suffixes.has(part))\n        .sort()\n        .join(\" \");\n    }\n\n    function editDistance(a, b) {\n      const matrix = Array.from({ length: a.length + 1 }, (_, i) => [i]);\n      for (let j = 1; j <= b.length; j += 1) matrix[0][j] = j;\n      for (let i = 1; i <= a.length; i += 1) {\n        for (let j = 1; j <= b.length; j += 1) {\n          matrix[i][j] = a[i - 1] === b[j - 1]\n            ? matrix[i - 1][j - 1]\n            : Math.min(matrix[i - 1][j - 1] + 1, matrix[i][j - 1] + 1, matrix[i - 1][j] + 1);\n        }\n      }\n      return matrix[a.length][b.length];\n    }\n\n    function parseOffDays(text) {\n      return new Set(String(text || \"\")\n        .split(\",\")\n        .map((item) => item.trim().toLowerCase())\n        .map((item) => dayAliases[item] || dayAliases[item.slice(0, 3)])\n        .filter(Boolean));\n    }\n\n    function rosterOffDaysLabel(days) {\n      return days\n        .map((day, index) => day === \"O\" ? rosterDayLabels[index] : \"\")\n        .filter(Boolean)\n        .join(\", \");\n    }\n\n    function readJson(key, fallback) {\n      try {\n        const value = JSON.parse(localStorage.getItem(key) || \"null\");\n        return value === null ? fallback : value;\n      } catch (error) {\n        localStorage.removeItem(key);\n        return fallback;\n      }\n    }\n\n    function writeJson(key, value) {\n      localStorage.setItem(key, JSON.stringify(value));\n    }\n\n    function migrateMcDanielToDays(state) {\n      if (!state || !Array.isArray(state.second)) return state;\n      if (!Array.isArray(state.first)) state.first = [];\n      const alreadyOnDays = state.first.some((employee) => normalizeName(employee.name || \"\") === \"charles mcdaniel\");\n      const secondIndex = state.second.findIndex((employee) => normalizeName(employee.name || \"\") === \"charles mcdaniel\");\n      if (secondIndex === -1) return state;\n      const [employee] = state.second.splice(secondIndex, 1);\n      if (!alreadyOnDays) state.first.push(employee);\n      localStorage.setItem(rosterStorageKey, JSON.stringify(state));\n      return state;\n    }\n\n    function readRosterAdditions() {\n      const additions = readJson(rosterAdditionsKey, []);\n      return Array.isArray(additions) ? additions : [];\n    }\n\n    function buildRoster() {\n      const roster = Object.fromEntries(Object.entries(defaultRoster).map(([key, rows]) => [\n        key,\n        rows.map(([name, offDays]) => ({ name, offDays }))\n      ]));\n\n      try {\n        const saved = localStorage.getItem(rosterStorageKey);\n        if (saved) {\n          const state = migrateMcDanielToDays(JSON.parse(saved));\n          Object.keys(shiftLabels).forEach((key) => {\n            if (!Array.isArray(state[key])) return;\n            roster[key] = state[key]\n              .filter((employee) => employee && employee.name)\n              .map((employee) => ({\n                name: employee.name,\n                offDays: Array.isArray(employee.days) ? rosterOffDaysLabel(employee.days) : \"\"\n              }));\n          });\n        }\n      } catch (error) {\n        localStorage.removeItem(rosterStorageKey);\n      }\n\n      const seen = new Set(Object.values(roster).flat().map((employee) => normalizeName(employee.name)));\n      readRosterAdditions().forEach((addition) => {\n        if (!addition || !addition.name) return;\n        const key = shiftLabels[addition.shift] ? addition.shift : \"first\";\n        const nameKey = normalizeName(addition.name);\n        if (!nameKey || seen.has(nameKey)) return;\n        if (!Array.isArray(roster[key])) roster[key] = [];\n        roster[key].push({\n          name: addition.name,\n          offDays: Array.isArray(addition.days) ? rosterOffDaysLabel(addition.days) : \"\"\n        });\n        seen.add(nameKey);\n      });\n\n      return roster;\n    }\n\n    function rosterNameList() {\n      return Object.values(buildRoster()).flat().map((employee) => employee.name);\n    }\n\n    function rosterShiftForName(name) {\n      const key = normalizeName(name);\n      if (!key) return \"unknown\";\n      const roster = buildRoster();\n      for (const [shiftKey, employees] of Object.entries(roster)) {\n        if (employees.some((employee) => normalizeName(employee.name) === key)) return shiftKey;\n      }\n      return \"unknown\";\n    }\n\n    function shiftLabel(shiftKey) {\n      return shiftLabels[shiftKey] || \"Unassigned\";\n    }\n\n    function rowShiftKey(row) {\n      if (row && shiftLabels[row.shiftKey]) return row.shiftKey;\n      if (row && row.match && row.match.found) return rosterShiftForName(row.match.name);\n      if (row && row.canonicalName) return rosterShiftForName(row.canonicalName);\n      if (row && row.name) return rosterShiftForName(row.name);\n      return \"unknown\";\n    }\n\n    function groupRowsByShift(rows, getShift = rowShiftKey) {\n      const groups = new Map();\n      rows.forEach((row) => {\n        const rawShift = getShift(row);\n        const shiftKey = shiftLabels[rawShift] ? rawShift : \"unknown\";\n        if (!groups.has(shiftKey)) groups.set(shiftKey, []);\n        groups.get(shiftKey).push(row);\n      });\n      return shiftOrder\n        .filter((shiftKey) => groups.has(shiftKey))\n        .map((shiftKey) => [shiftKey, groups.get(shiftKey)]);\n    }\n\n    function shiftSectionRow(shiftKey, count, colspan) {\n      return `<tr class=\"shift-section\"><td colspan=\"${colspan}\">${escapeHtml(shiftLabel(shiftKey))}<span>${count} ata-name-select=\"${escapeHtml(row.name)}\" aria-label=\"Match ${escapeHtml(row.name)} to schedule employee\">\n          <option value=\"\">Select schedule employee</option>\n          ${optionHtml}\n        </select>\n      `;\n    }\n\n    function mapByName(rows) {\n      const map = new Map();\n      rows.forEach((row) => {\n        const key = normalizeName(row.canonicalName || row.name);\n        if (!key) return;\n        map.set(key, row);\n      });\n      return map;\n    }\n\n    function compareStatus(current, imported) {\n      if (!current && !imported) return [\"missing\", \"NO DATA\"];\n      if (!current) return [\"missing\", \"MISSING CURRENT\"];\n      if (!imported) return [\"missing\", \"MISSING IMPORT\"];\n      const fields = [\"start\", \"lunch\", \"end\", \"actual\"];\n      return fields.every((field) => String(current[field] || \"\") === String(imported[field] || \"\")) ? [\"match\", \"MATCH\"] : [\"diff\", \"DIFF\"];\n    }\n\n    function renderPreview(importedRows = readImportedRows()) {\n      const ignored = readIgnored();\n      const rows = importedRows.map(canonicalImportedRow);\n      const unresolved = rows.filter((row) => !row.match.found && !ignored.has(normalizeName(row.name))).length;\n      document.getElementById(\"previewCount\").textContent = rows.length\n        ? `${rows.length} parsed / ${unresolved} unrecognized`\n        : \"No import loaded\";\n      document.getElementById(\"previewEmpty\").style.display = rows.length ? \"none\" : \"block\";\n      document.getElementById(\"previewTable\").hidden = rows.length === 0;\n      previewBody.innerHTML = groupRowsByShift(rows).map(([shiftKey, shiftRows]) => (\n        shiftSectionRow(shiftKey, shiftRows.length, 7) + shiftRows.map((row) => {\n          const key = normalizeName(row.name);\n          const isIgnored = ignored.has(key);\n          const className = isIgnored ? \"ignored\" : (row.match.found ? \"\" : \"unrecognized\");\n          const matchText = isIgnored ElementById(\"currentCount\").textContent = `Current MD: ${currentRows.length}`;\n        document.getElementById(\"importCount\").textContent = \"Imported: 0\";\n        document.getElementById(\"matchCount\").textContent = \"Matches: 0\";\n        document.getElementById(\"issueCount\").textContent = \"Issues: 0\";\n        renderPreview([]);\n        return;\n      }\n      const importedRows = savedImportedRows\n        .filter((row) => !ignored.has(normalizeName(row.name)))\n        .map(canonicalImportedRow)\n        .filter((row) => row.match.found);\n\n      const currentMap = mapByName(currentRows);\n      const importMap = mapByName(importedRows);\n      const employeeNames = new Map();\n      currentRows.forEach((row) => employeeNames.set(normalizeName(row.name), row.name));\n      importedRows.forEach((row) => employeeNames.set(normalizeName(row.canonicalName), row.canonicalName));\n\n      let matches = 0;\n      let issues = 0;\n\n      const compareRows = Array.from(employeeNames.entries()).map(([key, name]) => {\n        const current = currentMap.get(key);\n        const imported = importMap.get(key);\n        const [className, label] = compareStatus(current, imported);\n        if (className === \"match\") matches += 1;\n        else issues += 1;\n\n        return {\n          name,\n          current,\n          imported,\n          className,\n          label,\n          shiftKey: rowShiftKey(current || imported || { name })\n        };\n      });\n\n      body.innerHTML = groupRowsByShift(compareRows, (row) => row.shiftKey).map(([shiftKey, shiftRows]) => (\n        shiftSectionRow(shiftKey, shiftRows.length, 10) + shiftRows\n          .sort((a, b) => a.name.localeCompare(b.name))\n          .map(({ name, current, imported, className, label }) => `\n            <tr>\n              <td class=\"employee-cell\">${escapeHtml(name)}</td>\n              <td>${escapeHtml(current?.start || \"\")}</td>\n              <td>${escapeHtml(current?.lunch || \"\")}</td>\n              <td>${escapeHtml(current?.end || \"\")}</td>\n              <td>${escapeHtml(current?.actual || \"\")}</td>\n              <td>${escapeHtml(imported?.start || \"\")}</td>\n              <td>${escapeHtml(imported?.lunch || \"\")}</td>\n              <td>${escapeHtml(imported?.end || \"\")}</td>\n              <td>${escapeHtml(imported?.actual || \"\")}</td>\n              <td class=\"${className}\">${label}</td>\n            </tr>\n          `).join(\"\")\n      )).join(\"\");\n\n      const unresolved = readImportedRows().map(canonicalImportedRow).filter((row) => !row.match.found && !ignored.has(normalizeName(row.name))).length;\n      document.getElementById(\"currentCount\").textContent = `Current MD: ${currentRows.length}`;\n      document.getElementById(\"importCount\").textContent = `Imported: ${importedRows.length}`;\n      document.getElementById(\"matchCount\").textContent = `Matches: ${matches}`;\n      document.getElementById(\"issueCount\").textContent = `Issues: ${issues}${unresolved ? ` / ${unresolved} names` : \"\"}`;\n      renderPreview();\n    }\n\n    function addNameToRoster(name, shift) {\n      const cleanName = String(name || \"\").trim();\n      const targetShift = shiftLabels[shift] ? shift : \"first\";\n      if (!cleanName) return false;\n      const normalized = normalizeName(cleanName);\n      if (rosterNameList().some((candidate) => normalizeName(candidate) === normalized)) return true;\n      const additions = readRosterAdditions();\n      additions.push({\n        name: cleanName,\n        role: \"\",\n        days: [\"W\", \"W\", \"W\", \"W\", \"W\", \"W\", \"W\"],\n        shift: targetShift\n      });\n      writeJson(rosterAdditionsKey, additions);\n      return true;\n    }\n\n    async function importFile(file) {\n      let imported = [];\n      if (file.name.toLowerCase().endsWith(\".csv\") || file.name.toLowerCase().endsWith(\".txt\")) {\n        const text = await file.text();\n        imported = parseWorkbookRows(text.split(/\\r?\\n/).filter(Boolean).map((line) => line.includes(\"\\t\") ? line.split(\"\\t\") : line.split(\",\")));\n      } else {\n        if (!window.XLSX) return [];\n        const workbook = XLSX.read(await file.arrayBuffer(), { type: \"array\" });\n        imported = parseWorkbookSheets(workbook.SheetNames.map((sheetName) => ({\n          name: sheetName,\n          rows: XLSX.utils.sheet_to_json(workbook.Sheets[sheetName], { header: 1, raw: false, defval: \"\" })\n        })));\n      }\n      return dedupeRows(imported).map(normalizeCompareRow);\n    }\n\n    document.getElementById(\"fileInput\").addEventListener(\"change\", async (event) => {\n      const file = event.target.files[0];\n      if (!file) return;\n      const imported = await importFile(file);\n      writeJson(compareStorageKey, imported);\n      localStorage.removeItem(compareAliasesKey);\n      localStorage.removeItem(compareIgnoredKey);\n      event.target.value = \"\";\n      renderCompare();\n    });\n\n    previewBody.addEventListener(\"click\", (event) => {\n      const openNameButton = event.target.closest(\"[data-open-name-select]\");\n      const suggestionButton = event.target.closest(\"[data-use-suggestion]\");\n      const addButton = event.target.closest(\"[data-add-name]\");\n      const ignoreButton = event.target.closest(\"[data-ignore-name]\");\n      const unignoreButton = event.target.closest(\"[data-unignore]\");\n\n      if (openNameButton) {\n        const row = openNameButton.closest(\"tr\");\n        const select = row ? row.querySelector(\"[data-name-select]\") : null;\n        if (row && select) {\n          row.classList.add(\"selecting-name\");\n          select.focus();\n        }\n        return;\n      } else if (suggestionButton) {\n        const aliases = readAliases();\n        aliases[normalizeName(suggestionButton.dataset.useSuggestion)] = suggestionButton.dataset.suggestion;\n        writeJson(compareAliasesKey, aliases);\n      } else if    .time-edit,\n    .lunch-edit {\n      width: 100%;\n      height: 22px;\n      border: 1px solid transparent;\n      border-radius: 4px;\n      background: transparent;\n      color: var(--ink);\n      font: inherit;\n      font-weight: 800;\n      text-align: center;\n    }\n\n    .note-edit {\n      color: #6d28d9;\n      font-size: 11px;\n      white-space: normal;\n    }\n\n    .time-edit,\n    .lunch-edit {\n      color: var(--green);\n      font-family: \"SFMono-Regular\", Consolas, monospace;\n      font-size: 14px;\n    }\n\n    .time-edit.missing {\n      color: var(--red);\n    }\n\n    .time-edit:focus,\n    .lunch-edit:focus,\n    .note-edit:focus {\n      border-color: #f59e0b;\n      outline: 0;\n      background: #fffbeb;\n    }\n\n    .actual {\n      color: var(--ink);\n      font-weight: 900;\n      text-align: center;\n      font-variant-numeric: tabular-nums;\n    }\n\n    .off-footer {\n      display: flex;\n      align-items: center;\n      flex-wrap: wrap;\n      gap: 6px;\n      padding: 6px 13px 8px;\n      background: #fcfcfd;\n      color: #9ca3af;\n      font-size: 9px;\n      line-height: 1.45;\n    }\n\n    .off-footer strong {\n      color: var(--muted);\n      letter-spacing: .05em;\n      text-transform: uppercase;\n    }\n\n    .off-chip {\n      display: inline-flex;\n      align-items: center;\n      justify-content: center;\n      min-height: 18px;\n      padding: 2px 9px;\n      border-radius: 4px;\n      background: #f1f3f6;\n      color: #64748b;\n      font-size: 9px;\n      font-weight: 800;\n      line-height: 1;\n      white-space: nowrap;\n    }\n\n    @media (max-width: 860px) {\n      .archive-toolbar {\n        grid-template-columns: 1fr;\n      }\n\n      .calendar-weekdays,\n      .calendar-grid {\n        gap: 3px;\n        padding-inline: 5px;\n      }\n\n      .day-cell {\n        min-height: 78px;\n        padding: 5px;\n      }\n\n      .kpis {\n        grid-template-columns: repeat(2, minmax(0, 1fr));\n      }\n\n      .shift-head,\n      .md-row {\n        grid-template-columns: minmax(112px, 1fr) 66px minmax(102px, 1.3fr) 86px 38px 44px 68px;\n        gap: 4px;\n        padding-inline: 8px;\n      }\n    }\n  </style>\n</head>\n<body>\n  <main class=\"archive-shell\">\n    <header class=\"archive-toolbar\">\n      <div class=\"month-controls\">\n        <button class=\"icon-button\" id=\"prevMonth\" type=\"button\" aria-label=\"Previous month\">&lt;</button>\n        <div class=\"month-title\" id=\"monthTitle\"></div>\n        <button class=\"icon-button\" id=\"nextMonth\" type=\"button\" aria-label=\"Next month\">&gt;</button>\n        <button class=\"secondary-button\" id=\"todayButton\" type=\"button\">Today</button>\n      </div>\n      <div class=\"save-controls\">\n        <input id=\"archiveDate\" type=\"date\" aria-label=\"Archive date\" />\n        <button class=\"primary-button\" id=\"saveTimesheet\" type=\"button\">Save Current Timesheet</button>\n        <span class=\"save-message\" id=\"saveMessage\"></span>\n      </div>\n    </header>\n\n    <section class=\"calendar-weekdays\" aria-hidden=\"true\">\n      <div class=\"weekday\">Sun</div>\n      <div class=\"weekday\">Mon</div>\n      <div class=\"weekday\">Tue</div>\n      <div class=\"weekday\">Wed</div>\n      <div class=\"weekday\">Thu</div>\n      <div class=\"weekday\">Fri</div>\n      <div class=\"weekday\">Sat</div>\n    </section>\n    <section class=\"calendar-grid\" id=\"calendarGrid\" aria-label=\"Timesheet archive calendar\"></section>\n  </main>\n\n  <div class=\"modal-backdrop\" id=\"previewModal\" aria-hidden=\"true\">\n    <section class=\"preview-modal\" role=\"dialog\" aria-modal=\"true\" aria-labelledby=\"previewTitle\">\n      <header class=\"preview-top\">\n        <div class=\"preview-title\" id=\"previewTitle\">Archived Timesheet</div>\n        <div class=\"preview-actions\">\n          <button class=\"update-button\" id=\"updateArchive\" type=\"button\">Update</button>\n          <button class=\"delete-button\" id=\"deleteArchive\" type=\"button\">Delete</button>\n          <button id=\"closePreview\" type=\"button\">X</button>\n        </div>\n      </header>\n      <div class=\"preview-body\">\n        <section class=\"kpis\" id=\"previewKpis\" aria-label=\"Archived metrics\"></section>\n        <section class=\"cards\" id=\"previewCards\" aria-label=\"Archived timesheet preview\"></section>\n      </div>\n    </section>\n  </div>\n\n  <script>\n    const dayAliases = {\n      sun: \"sun\", sunday: \"sun\",\n      mon: \"mon\", monday: \"mon\",\n      tue: \"tue\", tues: \"tue\", tuesday: \"tue\",\n      wed: \"wed\", weds: \"wed\", wednesday: \"wed\",\n      thu: \"thu\", thur: \"thu\", thurs: \"thu\", thursday: \"thu\",\n      fri: \"fri\", friday: \"fri\",\n      sat: \"sat\", saturday: \"sat\"\n    };\n\n    const archiveStorageKey = \"conglobal-timesheet-archive-v1\";\n    const rosterStorageKey = \"conglobal-roster-state-v1\";\n    const rosterAdditionsKey = \"conglobal-roster-additions-v1\";\n    const dayforceStorageKey = \"conglobal-dayforce-punches-v1\";\n    const previousTimesheetStorageKey = \"conglobal-previous-timesheet-hours-v1\";\n    const timesheetSettingsKey = \"conglobal-timesheet-settings-v1\";\n    const rosterDayLabels = [\"Mon\", \"Tues\", \"Wed\", \"Thurs\", \"Fri\", \"Sat\", \"Sun\"];\n    const lpmhGoal = 2.0;\n    const today = new Date();\n    const todayKey = [\"sun\", \"mon\", \"tue\", \"wed\", \"thu\", \"fri\", \"sat\"][today.getDay()];\n    let viewDate = new Date(today.getFullYear(), today.getMonth(), 1);\n    let selectedDateKey = isoDate(today);\n    let activeArchiveKey = \"\";\n    let activeArchive = null;\n    const deleteArchiveButton = document.getElementById(\"deleteArchive\");\n\n    const defaultRoster = {\n      first: [\n        [\"Branford Alton\", \"Mon, Tues\"],\n        [\"Castruita Armando\", \"Wed, Thurs\"],\n        [\"Frazer Dacoyea\", \"Mon, Tues\"],\n        [\"Citizen Dante\", \"Thurs, Fri\"],\n        [\"Towler Demetrius\", \"Thurs, Fri\"],\n        [\"Stewart Dexter\", \"Sat, Sun\"],\n        [\"Gardner Dorrean\", \"Tues, Wed\"],\n        [\"Thomas Henry\", \"Sat, Sun\"],\n        [\"Brown James\", \"Thurs, Fri\"],\n        [\"Herrera Jose\", \"Sat, Sun\"],\n        [\"Player Keyston\", \"Mon, Sun\"],\n        [\"Hickman Makia\", \"Mon, Sun\"],\n        [\"Dever Mikey\", \"Tues, Wed\"],\n        [\"Wanza Myles\", \"Mon, Tues\"],\n        [\"Romero Nelson\", \"Tues, Wed\"],\n        [\"McDaniel Charles\", \"Fri, Sat\"],\n        [\"Nava Ramon\", \"Sat, Sun\"],\n        [\"Tran Tyler\", \"Thurs, Fri\"]\n      ],\n      second: [\n        [\"Carruthers Timothy\", \"Mon, Sun\"],\n        [\"Caceres Virula Victor\", \"Mon, Tues\"],\n        [\"Keme Aweri Jr.\", \"Mon, Tues\"],\n        [\"Hosey Kevin\", \"Mon, Tues\"],\n        [\"Brown Brandy\", \"Wed, Thurs\"],\n        [\"Mejia Aaron\", \"Thurs, Fri\"],\n        [\"Bookman Derrell\", \"Thurs, Fri\"],\n        [\"Hopkins Alexander\", \"Mon, Sun\"],\n        [\"Tingle Jason\", \"Sat, Sun\"],\n        [\"Contreras Marco\", \"Sat, Sun\"],\n        [\"Benavides Robert\", \"Wed, Sun\"],\n        [\"Urtado Ernest\", \"Tues, Wed\"],\n        [\"Johnson Messiah\", \"Tues, Thurs\"],\n        [\"Gilder Rufus II\", \"Tues, Wed\"],\n        [\"Echendu Chimenierm\", \"Wed, Thurs\"],\n        [\"Delgado Jose\", \"Fri, Sat\"]\n      ],\n      gate: [\n        [\"Candace Warren\", \"Sat, Sun\"],\n        [\"Connie Johnson\", \"Sat, Sun\"],\n        [\"Jarade Douglas\", \"Sat, Sun\"],\n        [\"Gregory Watson II\", \"Sat, Sun\"],\n        [\"Bryce Alexander\", \"Thurs, Fri\"],\n        [\"Naomisha Hunt\", \"Thurs, Fri, Sat\"],\n        [\"Ramacacondra Pratt\", \"Thurs, Fri\"],\n        [\"Kane Cabral\", \"Mon, Tues\"],\n        [\"Tavares Gariet\", \"Mon, Tues\"]\n      ]\n    };\n\n    const shiftLabels = {\n      first: \"1st Shift\",\n      second: \"2nd Shift\",\n      gate: \"Gate\",\n      mechanics: \"Mechanics\",\n      managers: \"Managers\"\n    };\n\n    function escapeHtml(value) {\n      return String(value).replace(/[&<>\"']/g, (char) => ({\n        \"&\": \"&amp;\",\n        \"<\": \"&lt;\",\n        \">\": \"&gt;\",\n        '\"': \"&quot;\",\n        \"'\": \"&#39;\"\n      }[char]));\n    }\n\n    function isoDate(date) {\n      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, \"0\")}-${String(date.getDate()).padStart(2, \"0\")}`;\n    }\n\n    function dateFromKey(key) {\n      const [year, month, day] = String(key || \"\").split(\"-\").map(Number);\n      return new Date(year || today.getFullYear(), (month || 1) - 1, day || 1);\n    }\n\n    function monthDayLabel(key) {\n      const date = dateFromKey(key);\n      return `${date.getMonth() + 1}-${date.getDate()}`;\n    }\n\n    function normalizeName(name) {\n      const suffixes = new Set([\"jr\", \"sr\", \"ii\", \"iii\", \"iv\"]);\n      return String(name || \"\")\n        .trim()\n        .toLowerCase()\n        .replace(/[,.]/g, \" \")\n        .replace(/\\bcontrerras\\b/g, \"contreras\")\n        .replace(/\\s+/g, \" \")\n        .split(\" \")\n        .filter((part) => part && !suffixes.has(part))\n        .sort()\n        .join(\" \");\n    }\n\n    function parseOffDays(text) {\n      return new Set(String(text || \"\")\n        .split(\",\")\n        .map((item) => item.trim().toLowerCase())\n        .map((item) => dayAliases[item] || dayAliases[item.slice(0, 3)])\n        .filter(Boolean));\n    }\n\n    function rosterOffDaysLabel(days) {\n      return days\n        .map((day, index) => day === \"O\" ? rosterDayLabels[index] : \"\")\n        .filter(Boolean)\n        .join(\", \");\n    }\n\n    function migrateMcDanielToDays(state) {\n      if (!state || !Array.isArray(state.second)) return state;\n      if (!Array.isArray(state.first)) state.first = [];\n      const alreadyOnDays = state.first.some((employee) => normalizeName(employee.name || \"\") === \"charles mcdaniel\");\n      const secondIndex = state.second.findIndex((employee) => normalizeName(employee.name || \"\") === \"charles mcdaniel\");\n      if (secondIndex === -1) return state;\n      const [employee] = state.second.splice(secondIndex, 1);\n      if (!alreadyOnDays) state.first.push(employee);\n      localStorage.setItem(rosterStorageKey, JSON.stringify(state));\n      return state;\n    }\n\n    function readRosterAdditions() {\n      try {\n        const additions = JSON.parse(localStorage.getItem(rosterAdditionsKey) || \"[]\");\n        return Array.isArray(additions) ? additions : [];\n      } catch (error) {\n        localStorage.removeItem(rosterAdditionsKey);\n        return [];\n      }\n    }\n\n    function buildRoster() {\n      const roster = Object.fromEntries(Object.entries(defaultRoster).map(([key, rows]) => [\n        key,\n        rows.map(([name, offDays]) => ({ name, offDays }))\n      ]));\n\n      try {\n        const saved = localStorage.getItem(rosterStorageKey);\n        if (saved) {\n          const state = migrateMcDanielToDays(JSON.parse(saved));\n          [\"first\", \"second\", \"gate\", \"mechanics\", \"managers\"].forEach((key) => {\n            if (!Array.isArray(state[key])) return;\n            roster[key] = state[key]\n              .filter((employee) => employee && employee.name)\n              .map((employee) => ({\n                name: employee.name,\n                offDays: Array.isArray(employee.days) ? rosterOffDaysLabel(employee.days) : \"\"\n              }));\n          });\n        }\n      } catch (error) {\n        localStorage.removeItem(rosterStorageKey);\n      }\n\n      const seen = new Set(Object.values(roster).flat().map((employee) => normalizeName(employee.name)));\n      readRosterAdditions().forEach((addition) => {\n        if (!addition || !addition.name) return;\n        const key = addition.shift || \"first\";\n        const nameKey = normalizeName(addition.name);\n        if (!nameKey || seen.has(nameKey)) return;\n        if (!Array.isArray(roster[key])) roster[key] = [];\n        roster[key].push({\n          name: addition.name,\n          offDays: Array.isArray(addition.days) ? rosterOffDaysLabel(addition.days) : \"\"\n        });\n        seen.add(nameKey);\n      });\n\n      return roster;\n    }\n\n    function toMilitaryTime(value) {\n      const text = String(value || \"\").trim();\n      if (!text) return \"\";\n      const match = text.match(/^(\\d{1,2}):(\\d{2})\\s*([ap])m$/i);\n      if (!match) return text;\n      let hour = Number(match[1]);\n      const minute = match[2];\n      const period = match[3].toLowerCase();\n      if (period === \"p\" && hour !== 12) hour += 12;\n      if (period === \"a\" && hour === 12) hour = 0;\n      return `${String(hour).padStart(2, \"0\")}${minute}`;\n    }\n\n    function minutesFromMilitary(value) {\n      const text = String(value || \"\").trim();\n      const match = text.match(/^(\\d{1,2})(\\d{2})$/);\n      if (!match) return null;\n      const hours = Number(match[1]);\n      const minutes = Number(match[2]);\n      if (hours > 24 || minutes > 59 || (hours === 24 && minutes !== 0)) return null;\n      return (hours * 60) + minutes;\n    }\n\n    function militaryFromMinutes(value) {\n      const minutes = ((Math.round(value) % 1440) + 1440) % 1440;\n      const hours = Math.floor(minutes / 60);\n      const mins = minutes % 60;\n      return `${String(hours).padStart(2, \"0\")}${String(mins).padStart(2, \"0\")}`;\n    }\n\n    function currentMinutes() {\n      const now = new Date();\n      return (now.getHours() * 60) + now.getMinutes();\n    }\n\n    function currentMilitaryTime() {\n      return militaryFromMinutes(currentMinutes());\n    }\n\n    function dayKeyFromDateValue(value) {\n      const text = String(value || \"\").trim();\n      if (!text) return \"\";\n      const dayNameMatch = text.match(/^([a-z]{3,9})\\b/i);\n      const explicitDay = dayNameMatch ? dayAliases[dayNameMatch[1].toLowerCase()] : \"\";\n      if (explicitDay) return explicitDay;\n      const match = text.match(/^(\\d{1,2})\\/(\\d{1,2})\\/(\\d{2,4})/);\n      const date = match\n        ? new Date(Number(match[3].length === 2 ? `20${match[3]}` : match[3]), Number(match[1]) - 1, Number(match[2]))\n        : new Date(text);\n      if (Number.isNaN(date.getTime())) return \"\";\n      return [\"sun\", \"mon\", \"tue\", \"wed\", \"thu\", \"fri\", \"sat\"][date.getDay()];\n    }\n\n    function dayKeyFromArchiveDate(key) {\n      const date = dateFromKey(key);\n      return [\"sun\", \"mon\", \"tue\", \"wed\", \"thu\", \"fri\", \"sat\"][date.getDay()];\n    }\n\n    function readPunches() {\n      try {\n        const punches = JSON.parse(localStorage.getItem(dayforceStorageKey) || \"[]\");\n        return Array.isArray(punches) ? punches : [];\n      } catch (error) {\n        localStorage.removeItem(dayforceStorageKey);\n        return [];\n      }\n    }\n\n    function previousShiftHours() {\n      try {\n        const saved = JSON.parse(localStorage.getItem(previousTimesheetStorageKey) || \"null\");\n        return saved && typeof saved.hours === \"number\" ? Math.max(Number(saved.hours) || 0, 0) : 0;\n      } catch (error) {\n        localStorage.removeItem(previousTimesheetStorageKey);\n        return 0;\n      }\n    }\n\n    function readTimesheetSettings() {\n      try {\n        const saved = JSON.parse(localStorage.getItem(timesheetSettingsKey) || \"null\");\n        return {\n          lifts: saved && saved.lifts !== undefined ? Number(saved.lifts) || 0 : 339,\n          flips: saved && saved.flips !== undefined ? Number(saved.flips) || 0 : 5,\n          shiftEndMode: (saved && saved.shiftEndMode) || \"1500\",\n          shiftEndCustom: String((saved && saved.shiftEndCustom) || \"\")\n        };\n      } catch (error) {\n        localStorage.removeItem(timesheetSettingsKey);\n        return { lifts: 339, flips: 5, shiftEndMode: \"1500\", shiftEndCustom: \"\" };\n      }\n    }\n\n    function shiftEndFromSettings(settings) {\n      if (settings.shiftEndMode && settings.shiftEndMode !== \"other\") return settings.shiftEndMode;\n      return String(settings.shiftEndCustom || \"1500\").trim().padStart(4, \"0\");\n    }\n\n    function readArchive() {\n      try {\n        const archive = JSON.parse(localStorage.getItem(archiveStorageKey) || \"{}\");\n        return archive && typeof archive === \"object\" && !Array.isArray(archive) ? archive : {};\n      } catch (error) {\n        localStorage.removeItem(archiveStorageKey);\n        return {};\n      }\n    }\n\n    function writeArchive(archive) {\n      localStorage.setItem(archiveStorageKey, JSON.stringify(archive));\n    }\n\n    function shouldCheckMissingStart(shiftKey) {\n      if (shiftKey === \"gate\") return false;\n      if (shiftKey === \"second\") return currentMinutes() >= minutesFromMilitary(\"1500\");\n      return true;\n    }\n\n    function actualHours(startValue, lunch, endValue) {\n      const start = minutesFromMilitary(startValue);\n      const end = minutesFromMilitary(endValue);\n      if (start === null || end === null) return 0;\n      let minutes = end - start;\n      if (minutes < 0) minutes += 1440;\n      if (String(lunch).toUpperCase() === \"YES\") minutes -= 30;\n      return minutes > 0 ? minutes / 60 : 0;\n    }\n\n    function paidNoteHoursForText(value) {\n      return /\\bfloating holidays?\\b|\\bvacations?\\b/i.test(String(value || \"\")) ? 8 : 0;\n    }\n\n    function noteIsPurple(note, row = {}) {\n      return Boolean(row.paidAbsence || row.unpaidAbsence || /\\bfloating holidays?\\b|\\bvacations?\\b|\\bsick\\b|\\bunpaid\\b/i.test(String(note || \"\")));\n    }\n\n    function rowRank(row) {\n      if (row.scheduled && row.hasClockIn && !row.purpleAbsence) return 0;\n      if (!row.scheduled && row.hasClockIn) return 1;\n      if (row.purpleAbsence) return 2;\n      if (row.scheduled && !row.hasClockIn) return 3;\n      return 4;\n    }\n\n    function makeRows(dateKey = selectedDateKey) {\n      const roster = buildRoster();\n      const punches = new Map(readPunches().map((punch) => [normalizeName(punch.name || \"\"), punch]));\n      const fallbackDayKey = dayKeyFromArchiveDate(dateKey) || todayKey;\n\n      return Object.fromEntries(Object.entries(roster).map(([shiftKey, employees]) => {\n        const rows = employees.map((employee) => {\n          const punch = punches.get(normalizeName(employee.name)) || null;\n          const workdayKey = punch ? dayKeyFromDateValue(punch.date) || fallbackDayKey : fallbackDayKey;\n          const scheduled = !parseOffDays(employee.offDays).has(workdayKey);\n          const note = String((punch && (punch.note || punch.reason)) || \"\").trim();\n          const rawLunch = String((punch && punch.lunch) || \"\").trim();\n          const noLunch = rawLunch.toUpperCase() === \"NO\";\n          const start = toMilitaryTime(punch ? punch.start : \"\");\n          const importedEnd = toMilitaryTime(punch ? punch.end : \"\");\n          const hasClockIn = minutesFromMilitary(start) !== null;\n          const hasClockOut = minutesFromMilitary(importedEnd) !== null;\n          const end = hasClockIn && !hasClockOut ? currentMilitaryTime() : importedEnd;\n          const lunch = noLunch ? \"NO\" : (rawLunch ? \"YES\" : (start || end ? \"??\" : \"\"));\n          const actual = actualHours(start, lunch, end) + paidNoteHoursForText(note);\n          const hasClockTime = Boolean(start || end);\n          const cameInOffDay = !scheduled && hasClockTime;\n          const unpaidAbsence = Boolean(punch && punch.absenceUnpaid);\n          const paidAbsence = Boolean(punch && punch.absencePaid);\n          const purpleAbsence = noteIsPurple(note, { paidAbsence, unpaidAbsence });\n          const invalid = Boolean((start && minutesFromMilitary(start) === null) || (end && minutesFromMilitary(end) === null));\n          const missing = shouldCheckMissingStart(shiftKey) && scheduled && !note && !hasClockIn;\n          let status = \"OPEN\";\n          if (invalid) status = \"INVALID\";\n          else if (unpaidAbsence) status = \"UNPAID\";\n          else if (paidAbsence) status = \"PAID\";\n          else if (missing) status = \"NO SHOW\";\n          else if (hasClockIn && !hasClockOut) status = \"IN\";\n          else if (hasClockIn && hasClockOut) status = \"OUT\";\n          else if (!scheduled) status = \"OFF\";\n\n          return {\n            ...employee,\n            shiftKey,\n            scheduled,\n            note,\n            start,\n            lunch,\n            end,\n            actual,\n            hasClockIn,\n            hasClockOut,\n            cameInOffDay,\n            purpleAbsence,\n            unpaidAbsence,\n            paidAbsence,\n            invalid,\n            missing,\n            status\n          };\n        });\n\n        rows.sort((a, b) => rowRank(a) - rowRank(b) || a.name.localeCompare(b.name));\n        return [shiftKey, rows];\n      }));\n    }\n\n    function hoursUntilShiftEnd(value) {\n      const endMinutes = minutesFromMilitary(value);\n      if (endMinutes === null) return 0;\n      let remaining = endMinutes - currentMinutes();\n      if (remaining <= 0) remaining += 1440;\n      return remaining / 60;\n    }\n\n    function metricsFor(rowsByShift, settings) {\n      const lifts = Number(settings.lifts) || 0;\n      const flips = Number(settings.flips) || 0;\n      const firstHours = (rowsByShift.first || []).reduce((sum, row) => sum + (Number(row.actual) || 0), 0);\n      const secondHours = (rowsByShift.second || []).reduce((sum, row) => sum + (Number(row.actual) || 0), 0);\n      const currentHours = firstHours + secondHours;\n      const previousHoursValue = Number(settings.previousHours);\n      const previousHours = Number.isFinite(previousHoursValue) ? Math.max(previousHoursValue, 0) : previousShiftHours();\n      const shiftHours = currentHours + previousHours;\n      const totalMoves = Math.max(lifts + flips, 0);\n      const currentRate = shiftHours > 0 ? totalMoves / shiftHours : 0;\n      const neededValue = Math.ceil(shiftHours * lpmhGoal);\n      const remainValue = neededValue - totalMoves;\n      const remainingHours = hoursUntilShiftEnd(settings.shiftEnd || shiftEndFromSettings(settings));\n      const goalMet = shiftHours > 0 && currentRate >= lpmhGoal;\n      const neededLph = goalMet ? \"MET GOAL!\" : (remainingHours > 0 ? (Math.max(remainValue, 0) / remainingHours).toFixed(1) : \"0.0\");\n      return { lifts, flips, shiftEnd: settings.shiftEnd || shiftEndFromSettings(settings), currentHours, previousHours, shiftHours, totalMoves, currentRate, neededValue, remainValue, remainingHours, goalMet, neededLph };\n    }\n\n    function snapshotCurrentTimesheet(dateKey) {\n      const settings = readTimesheetSettings();\n      const rowsByShift = makeRows(dateKey);\n      const metrics = metricsFor(rowsByShift, {\n        ...settings,\n        shiftEnd: shiftEndFromSettings(settings),\n        previousHours: previousShiftHours()\n      });\n      return {\n        dateKey,\n        savedAt: new Date().toISOString(),\n        metrics,\n        shifts: rowsByShift\n      };\n    }\n\n    function renderCalendar() {\n      const archive = readArchive();\n      const monthTitle = document.getElementById(\"monthTitle\");\n      const grid = document.getElementById(\"calendarGrid\");\n      const first = new Date(viewDate.getFullYear(), viewDate.getMonth(), 1);\n      const start = new Date(first);\n      start.setDate(first.getDate() - first.getDay());\n      monthTitle.textContent = first.toLocaleDateString(undefined, { month: \"long\", year: \"numeric\" });\n\n      const cells = [];\n      for (let index = 0; index < 42; index += 1) {\n        const date = new Date(start);\n        date.setDate(start.getDate() + index);\n        const key = isoDate(date);\n        const archived = archive[key];\n        const classes = [\n          \"day-
