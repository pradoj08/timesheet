8d9;\n    }\n\n    .timeoff-pill.flo {\n      background: #edf1ff;\n      color: #4f5fba;\n    }\n\n    .timeoff-pill.hol {\n      background: #fff4d8;\n      color: #a16207;\n    }\n\n    .timeoff-pill.orange-person {\n      background: #fff0dc;\n      color: #c05621;\n    }\n\n    .more-pill {\n      padding-left: 8px;\n      color: #008f87;\n      font-size: 11px;\n      font-weight: 800;\n    }\n\n    .day-editor-backdrop {\n      position: fixed; inset: 0; z-index: 50; display: none; align-items: flex-start; justify-content: center;\n      padding: 54px 12px 20px; background: rgba(15, 23, 42, .38);\n    }\n    .day-editor-backdrop.open { display: flex; }\n    .day-editor { width: min(560px, 100%); max-height: calc(100vh - 74px); overflow: auto; border: 1px solid #cbd5e1; border-radius: 8px; background: #fff; box-shadow: 0 18px 45px rgba(15, 23, 42, .28); }\n    .day-editor header { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 10px 12px; border-bottom: 1px solid var(--line); background: #f8fafc; }\n    .day-editor h2 { margin: 0; font-size: 16px; font-weight: 900; }\n    .day-editor-close { width: 30px; height: 30px; border: 1px solid #cbd5e1; border-radius: 6px; background: #fff; color: var(--ink); font-weight: 900; cursor: pointer; }\n    .request-list { display: grid; gap: 6px; padding: 10px 12px; border-bottom: 1px solid var(--line); }\n    .request-row { min-height: 34px; display: grid; grid-template-columns: minmax(0, 1fr) auto; align-items: center; gap: 8px; padding: 5px 6px; border: 1px solid var(--line); border-radius: 6px; background: #fff; }\n    .request-row.editing { border-color: #2563eb; background: #eff6ff; box-shadow: inset 0 0 0 1px #2563eb; }\n    .request-row.confirming-delete { border-color: #dc2626; background: #fff1f2; box-shadow: inset 0 0 0 1px #dc2626; }\n    .request-row span { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 800; }\n    .request-actions { display: inline-flex; align-items: center; gap: 5px; }\n    .edit-request,\n    .delete-request,\n    .confirm-delete-request,\n    .cancel-delete-request { height: 26px; padding: 0 9px; border-radius: 6px; font-size: 12px; font-weight: 900; cursor: pointer; }\n    .edit-request { border: 1px solid #bfdbfe; background: #dbeafe; color: #1d4ed8; }\n    .delete-request { border: 1px solid #fecaca; background: #fee2e2; color: #991b1b; }\n    .confirm-delete-request { border: 1px solid #dc2626; background: #dc2626; color: #fff; }\n    .cancel-delete-request { border: 1px solid #cbd5e1; background: #fff; color: #334155; }\n    .empty-requests { min-height: 34px; display: flex; align-items: center; color: var(--muted); font-weight: 800; }\n    .add-request-form { display: grid; grid-template-columns: minmax(0, 1fr) minmax(130px, .45fr) minmax(130px, .45fr) auto; gap: 8px; padding: 12px; }\n    .add-request-form label { display: grid; gap: 4px; color: var(--muted); font-size: 11px; font-weight: 900; text-transform: uppercase; }\n    .add-request-form input,\n    .add-request-form select { height: 32px; min-width: 0; width: 100%; padding: 0 8px; border: 1px solid #cbd5e1; border-radius: 6px; background: #fff; color: var(--ink); font: inherit; font-weight: 800; }\n    .add-request-form select { color: #334155; font-size: 12px; cursor: pointer; }\n    .add-request-form button { align-self: end; height: 32px; padding: 0 12px; border: 1px solid #0f172a; border-radius: 6px; background: #0f172a; color: #fff; font: inherit; font-size: 12px; font-weight: 900; cursor: pointer; }\n    .editor-status { min-height: 18px; padding: 0 12px 12px; color: #991b1b; font-size: 12px; font-weight: 800; }\n    @media (max-width: 760px) { .add-request-form { grid-template-columns: 1fr; } }\n\n    @media (max-width: 760px) {\n      .page-switcher {\n        padding: 5px;\n      }\n\n      .page-switcher a {\n        min-width: 96px;\n        font-size: 12px;\n      }\n\n      .calendar-toolbar {\n        grid-template-columns: 1fr;\n      }\n\n      .month-controls {\n        justify-content: flex-start;\n      }\n\n      .calendar-shell {\n        width: calc(100% - 14px);\n        padding: 16px 10px;\n        border-radius: 12px;\n      }\n\n      .calendar-toolbar {\n        align-items: start;\n      }\n\n      .month-controls {\n        justify-content: flex-start;\n      }\n\n      .legend {\n        width: 100%;\n        margin-right: 0;\n      }\n\n      .calendar-weekdays,\n      .calendar-grid {\n        gap: 3px;\n      }\n\n      .calendar-grid {\n        grid-auto-rows: minmax(118px, auto);\n      }\n\n      .day-cell {\n        min-height: 118px;\n        padding: 8px 5px;\n      }\n\n      .timeoff-pill {\n        grid-template-columns: 1fr;\n        min-height: 24px;\n        padding: 4px 5px;\n        font-size: 12px;\n      }\n\n      .timeoff-code {\n        justify-self: start;\n        font-size: 10px;\n      }\n    }\n  </style>\n</head>\n<body>\n  <main class=\"calendar-shell\">\n    <header class=\"calendar-toolbar\">\n      <div class=\"title-block\">\n        <h1>Time Off</h1>\n        <label class=\"import-button\">\n          Import Time Off\n          <input type=\"file\" id=\"timeOffImport\" accept=\".xlsx,.xls\" />\n        </label>\n        <span class=\"import-status\" id=\"importStatus\">No import loaded</span>\n      </div>\n      <div class=\"month-controls\">\n        <div class=\"legend\" aria-label=\"Away reason legend\">\n          <span class=\"legend-item vac\"><span class=\"legend-dot\"></span>Vacation</span>\n          <span class=\"legend-item sic\"><span class=\"legend-dot\"></span>Sick</span>\n          <span class=\"legend-item flo\"><span class=\"legend-dot\"></span>Floating</span>\n          <span class=\"legend-item mgr\" title=\"Jarvis, Dave, Mike, Neal\"><span class=\"legend-dot\"></span>Managers</span>\n        </div>\n        <button class=\"icon-button\" id=\"prevMonth\" type=\"button\" aria-label=\"Previous month\">&lt;</button>\n        <div class=\"month-title\" id=\"monthTitle\"></div>\n        <button class=\"secondary-button\" id=\"todayButton\" type=\"button\">Today</button>\n        <button class=\"icon-button\" id=\"nextMonth\" type=\"button\" aria-label=\"Next month\">&gt;</button>\n      </div>\n    </header>\n\n    <section class=\"calendar-weekdays\" aria-hidden=\"true\">\n      <div class=\"weekday\">Sun</div>\n      <div class=\"weekday\">Mon</div>\n      <div class=\"weekday\">Tue</div>\n      <div class=\"weekday\">Wed</div>\n      <div class=\"weekday\">Thu</div>\n      <div class=\"weekday\">Fri</div>\n      <div class=\"weekday\">Sat</div>\n    </section>\n    <section class=\"calendar-grid\" id=\"calendarGrid\" aria-label=\"Time off calendar\"></section>\n  </main>\n\n  <section class=\"day-editor-backdrop\" id=\"dayEditorBackdrop\" aria-hidden=\"true\">\n    <div class=\"day-editor\" role=\"dialog\" aria-modal=\"true\" aria-labelledby=\"dayEditorTitle\">\n      <header><h2 id=\"dayEditorTitle\">Time Off</h2><button class=\"day-editor-close\" id=\"closeDayEditor\" type=\"button\" aria-label=\"Close time off editor\">X</button></header>\n      <section class=\"request-list\" id=\"requestList\" aria-label=\"Time off requests for selected day\"></section>\n      <form class=\"add-request-form\" id=\"addRequestForm\">\n        <label>Employee<input id=\"employeeInput\" list=\"employeeOptions\" autocomplete=\"off\" placeholder=\"Type employee name\" /><select id=\"employeeSelect\" aria-label=\"Select employee\"><option value=\"\">Select employee...</option></select></label>\n        <label>Away Reason<input id=\"reasonInput\" list=\"reasonOptions\" autocomplete=\"off\" placeholder=\"Type reason\" /><select id=\"reasonSelect\" aria-label=\"Select away reason\"><option value=\"\">Select reason...</option></select></label>\n        <label>Location<input id=\"locationInput\" list=\"locationOptions\" autocomplete=\"off\" placeholder=\"Type location\" /><select id=\"locationSelect\" aria-label=\"Select location\"><option value=\"\">Select location...</option></select></label>\n        <button id=\"addRequestButton\" type=\"submit\">Add</button>\n      </form>\n      <div class=\"editor-status\" id=\"editorStatus\" aria-live=\"polite\"></div>\n    </div>\n  </section>\n  <datalist id=\"employeeOptions\"></datalist>\n  <datalist id=\"reasonOptions\"></datalist>\n  <datalist id=\"locationOptions\"></datalist>\n\n  <script src=\"https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js\"><\/script>\n  <script>\n    const today = new Date();\n    let viewDate = new Date(today.getFullYear(), today.getMonth(), 1);\n    let selectedDateKey = \"\";\n    let editingRequestIndex = null;\n    let pendingDeleteIndex = null;\n    const timeOffStorageKey = \"conglobal-time-off-calendar-v1\";\n    const rosterStorageKey = \"conglobal-roster-state-v1\";\n    const rosterAdditionsKey = \"conglobal-roster-additions-v1\";\n    const rosterShiftKeys = [\"first\", \"second\", \"gate\", \"mechanics\", \"managers\"];\n    const shiftLabels = {\n      first: \"1st Shift\",\n      second: \"2nd Shift\",\n      gate: \"Gate\",\n      mechanics: \"Mechanics\",\n      managers: \"Managers\"\n    };\n    const absenceReasons = {\n      SIC: \"Sick\",\n      VAC: \"Vacation\",\n      FLO: \"Floating Holiday\",\n      HOL: \"Holiday\"\n    };\n    const displayPriority = {\n      VAC: 0,\n      FLO: 1,\n      SIC: 2,\n      HOL: 3\n    };\n    const commonLocations = [\"Ramp\", \"Gate\", \"MGR\", \"1st Shift\", \"2nd Shift\"];\n    const defaultEmployees = [\n      \"Branford Alton\", \"Castruita Armando\", \"Frazer Dacoyea\", \"Citizen Dante\", \"Towler Demetrius\",\n      \"Stewart Dexter\", \"Gardner Dorrean\", \"Thomas Henry\", \"Brown James\", \"Herrera Jose\",\n      \"Player Keyston\", \"Hickman Makia\", \"Dever Mikey\", \"Wanza Myles\", \"Romero Nelson\",\n      \"McDaniel Charles\", \"Nava Ramon\", \"Tran Tyler\", \"Benavides Robert\", \"Bookman Derrell\",\n      \"Brown Brandy\", \"Contreras Marco\", \"Delgado Jose\", \"Echendu Chimeniem\", \"Gilder Rufus II\",\n      \"Johnson Messiah\", \"Mejia Aaron\", \"Tingle Jason\", \"Urtado Ernest\", \"Caceres Virula Victor\",\n      \"Carruthers Timothy\", \"Hosey Kevin\", \"Keme Aweri Jr.\", \"Candace Warren\", \"Connie Johnson\",\n      \"Jarade Douglas\", \"Gregory Watson II\", \"Bryce Alexander\", \"Naomisha Hunt\", \"Ramacacondra Pratt\",\n      \"Kane Cabral\", \"Tavares Gariet\"\n    ];\n    const defaultShiftEmployees = {\n      first: [\n        \"Branford Alton\", \"Castruita Armando\", \"Frazer Dacoyea\", \"Citizen Dante\", \"Towler Demetrius\",\n        \"Stewart Dexter\", \"Gardner Dorrean\", \"Thomas Henry\", \"Brown James\", \"Herrera Jose\",\n        \"Player Keyston\", \"Hickman Makia\", \"Dever Mikey\", \"Wanza Myles\", \"Romero Nelson\",\n        \"McDaniel Charles\", \"Nava Ramon\", \"Tran Tyler\"\n      ],\n      second: [\n        \"Carruthers Timothy\", \"Caceres Virula Victor\", \"Keme Aweri Jr.\", \"Hosey Kevin\", \"Brown Brandy\",\n        \"Mejia Aaron\", \"Bookman Derrell\", \"Hopkins Alexander\", \"Tingle Jason\", \"Contreras Marco\",\n        \"Benavides Robert\", \"Urtado Ernest\", \"Johnson Messiah\", \"Gilder Rufus II\", \"Echendu Chimenierm\",\n        \"Delgado Jose\"\n      ],\n      gate: [\n        \"Candace Warren\", \"Connie Johnson\", \"Jarade Douglas\", \"Gregory Watson II\", \"Bryce Alexander\",\n        \"Naomisha Hunt\", \"Ramacacondra Pratt\", \"Kane Cabral\", \"Tavares Gariet\"\n      ],\n      mechanics: [],\n      managers: []\n    };\n    const monthNames = {\n      january: 0,\n      february: 1,\n      march: 2,\n      april: 3,\n      may: 4,\n      june: 5,\n      july: 6,\n      august: 7,\n      september: 8,\n      october: 9,\n      november: 10,\n      december: 11\n    };\n\n    function isoDate(date) {\n      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, \"0\")}-${String(date.getDate()).padStart(2, \"0\")}`;\n    }\n\n    function escapeHtml(value) {\n      return String(value).replace(/[&<>\"']/g, (char) => ({\n        \"&\": \"&amp;\",\n        \"<\": \"&lt;\",\n        \">\": \"&gt;\",\n        '\"': \"&quot;\",\n        \"'\": \"&#39;\"\n      }[char]));\n    }\n\n    function dateFromKey(key) {\n      const [year, month, day] = String(key || \"\").split(\"-\").map(Number);\n      return new Date(year || today.getFullYear(), (month || 1) - 1, day || 1);\n    }\n\n    function friendlyDate(key) {\n      return dateFromKey(key).toLocaleDateString(undefined, {\n        weekday: \"short\",\n        month: \"short\",\n        day: \"numeric\",\n        year: \"numeric\"\n      });\n    }\n\n    function readTimeOff() {\n      try {\n        const saved = JSON.parse(localStorage.getItem(timeOffStorageKey) || \"{}\");\n        return saved && typeof saved === \"object\" && !Array.isArray(saved) ? saved : {};\n      } catch (error) {\n        localStorage.removeItem(timeOffStorageKey);\n        return {};\n      }\n    }\n\n    function writeTimeOff(calendar) {\n      localStorage.setItem(timeOffStorageKey, JSON.stringify(calendar));\n    }\n\n    function reasonCodeFromInput(value) {\n      const text = String(value || \"\").trim();\n      if (!text) return \"\";\n      const upper = text.toUpperCase();\n      if (absenceReasons[upper]) return upper;\n      return Object.keys(absenceReasons).find((code) => absenceReasons[code].toLowerCase() === text.toLowerCase()) || upper.slice(0, 12);\n    }\n\n    function reasonLabel(code) { return absenceReasons[code] || code; }\n\n    function cleanLocation(value) {\n      const text = String(value || \"\").replace(/\\s+/g, \" \").trim();\n      if (!text || /^(location|loc|all)$/i.test(text)) return \"\";\n      return text.replace(/^location\\s*:?\\s*/i, \"\").trim();\n    }\n\n    function locationFromSheetName(sheetName) {\n      const text = cleanLocation(sheetName);\n      return /^(sheet\\d*|time away|calendar|summary|data)$/i.test(text) ? \"\" : text;\n    }\n\n    function entryLocation(entry) {\n      return cleanLocation(entry.location) || locationFromSheetName(entry.sheet);\n    }\n\n    function locationLineHtml(entry) {\n      const location = entryLocation(entry);\n      return location ? '<span class=\"timeoff-location\">' + escapeHtml(location) + '</span>' : \"\";\n    }\n\n    function nameTokenKey(name) {\n      const suffixes = new Set([\"jr\", \"sr\", \"ii\", \"iii\", \"iv\"]);\n      return normalizeName(name)\n        .split(\" \")\n        .filter((part) => part && !suffixes.has(part))\n        .sort()\n        .join(\" \");\n    }\n\n    function addShiftLookupName(lookup, name, shift) {\n      const directKey = normalizeName(name);\n      const tokenKey = nameTokenKey(name);\n      if (directKey) lookup.set(directKey, shift);\n      if (tokenKey) lookup.set(tokenKey, shift);\n    }\n\n    function rosterStateHasSavedRows(state) {\n      return rosterShiftKeys.some((key) => Array.isArray(state?.[key]) && state[key].length);\n    }\n\n    function readRosterAdditions() {\n      try {\n        const additions = JSON.parse(localStorage.getItem(rosterAdditionsKey) || \"[]\");\n        return Array.isArray(additions) ? additions : [];\n      } catch (error) {\n        localStorage.removeItem(rosterAdditionsKey);\n        return [];\n      }\n    }\n\n    function currentRosterEmployees() {\n      let employees = [];\n      Object.entries(defaultShiftEmployees).forEach(([shift, names]) => {\n        names.forEach((name) => employees.push({ name, shift }));\n      });\n\n      try {\n        const saved = JSON.parse(localStorage.getItem(rosterStorageKey) || \"null\");\n        if (saved && typeof saved === \"object\" && rosterStateHasSavedRows(saved)) {\n          employees = [];\n          rosterShiftKeys.forEach((shift) => {\n            if (!Array.isArray(saved[shift])) return;\n            saved[shift].forEach((employee) => {\n              if (employee?.name) employees.push({ name: employee.name, shift });\n            });\n          });\n        }\n      } catch (error) {\n        localStorage.removeItem(rosterStorageKey);\n      }\n\n      readRosterAdditions().forEach((employee) => {\n        if (employee?.name) employees.push({ name: employee.name, shift: employee.shift || \"first\" });\n      });\n\n      return employees;\n    }\n\n    function rosterShiftLookup() {\n      const lookup = new Map();\n      currentRosterEmployees().forEach((employee) => addShiftLookupName(lookup, employee.name, employee.shift));\n      return lookup;\n    }\n\n    function shiftForEmployee(name, lookup = rosterShiftLookup()) {\n      const shift = lookup.get(normalizeName(name)) || lookup.get(nameTokenKey(name));\n      return shiftLabels[shift] || \"\";\n    }\n\n    function shiftLineHtml(entry, lookup) {\n      const shift = shiftForEmployee(entry.name, lookup);\n      return shift ? '<span class=\"timeoff-shift\">' + escapeHtml(shift) + '</span>' : \"\";\n    }\n\n    function compareTimeOffRequests(a, b) {\n      const priorityA = displayPriority[a.code] ?? 99;\n      const priorityB = displayPriority[b.code] ?? 99;\n      return priorityA - priorityB || a.name.localeCompare(b.name) || String(a.code || \"\").localeCompare(String(b.code || \"\"));\n    }\n\n    function uniqueEmployeeNames(calendar = readTimeOff()) {\n      const names = new Set(defaultEmployees);\n      currentRosterEmployees().forEach((employee) => names.add(employee.name));\n      Object.values(calendar).forEach((entries) => {\n        entries.forEach((entry) => { if (entry.name) names.add(entry.name); });\n      });\n      return Array.from(names).sort((a, b) => a.localeCompare(b));\n    }\n\n    function uniqueLocations(calendar = readTimeOff()) {\n      const locations = new Set();\n      Object.values(calendar).forEach((entries) => {\n        entries.forEach((entry) => {\n          const location = entryLocation(entry);\n          if (location) locations.add(location);\n        });\n      });\n      return Array.from(locations).sort((a, b) => a.localeCompare(b));\n    }\n\n    function selectOptions(values, placeholder) {\n      return '<option value=\"\">' + escapeHtml(placeholder) + '</option>' + values.map((value) => '<option value=\"' + escapeHtml(value) + '\">' + escapeHtml(value) + '</option>').join(\"\");\n    }\n\n    function populateEditorOptions() {\n      const employeeNames = uniqueEmployeeNames();\n      const reasonPairs = Object.entries(absenceReasons);\n      const reasonValues = reasonPairs.map(([code, label]) => `${code} - ${label}`);\n      const locations = Array.from(new Set([...commonLocations, ...uniqueLocations()]));\n      document.getElementById(\"employeeOptions\").innerHTML = employeeNames.map((name) => '<option value=\"' + escapeHtml(name) + '\"></option>').join(\"\");\n      document.getElementById(\"employeeSelect\").innerHTML = selectOptions(employeeNames, \"Select employee...\");\n      document.getElementById(\"reasonOptions\").innerHTML = reasonPairs.map(([code, label]) => '<option value=\"' + escapeHtml(code) + '\">' + escapeHtml(label) + '</option><option value=\"' + escapeHtml(label) + '\">' + escapeHtml(code) + '</option>').join(\"\");\n      document.getElementById(\"reasonSelect\").innerHTML = selectOptions(reasonValues, \"Select reason...\");\n      document.getElementById(\"locationOptions\").innerHTML = locations.map((location) => '<option value=\"' + escapeHtml(location) + '\"></option>').join(\"\");\n      document.getElementById(\"locationSelect\").innerHTML = selectOptions(locations, \"Select location...\");\n    }\n\n    function saveCalendarAndRender(calendar) {\n      writeTimeOff(calendar);\n      renderCalendar();\n      populateEditorOptions();\n      renderDayEditor();\n    }\n\n    function renderDayEditor() {\n      const calendar = readTimeOff();\n      const entries = (calendar[selectedDateKey] || [])\n        .map((entry, originalIndex) => ({ ...entry, originalIndex }))\n        .sort(compareTimeOffRequests);\n      const list = document.getElementById(\"requestList\");\n      document.getElementById(\"dayEditorTitle\").textContent = friendlyDate(selectedDateKey);\n      if (!entries.length) {\n        list.innerHTML = '<div class=\"empty-requests\">No time off requests for this day.</div>';\n        return;\n      }\n      list.innerHTML = entries.map((entry, index) => {\n        const location = entryLocation(entry);\n        const shift = shiftForEmployee(entry.name);\n        const isEditing = editingRequestIndex === entry.originalIndex;\n        const isConfirmingDelete = pendingDeleteIndex === entry.originalIndex;\n        const actions = isConfirmingDelete\n          ? '<button class=\"confirm-delete-request\" type=\"button\" data-index=\"' + entry.originalIndex + '\">Confirm</button><button class=\"cancel-delete-request\" type=\"button\" data-index=\"' + entry.originalIndex + '\">Cancel</button>'\n          : '<button class=\"edit-request\" type=\"button\" data-index=\"' + entry.originalIndex + '\">Edit</button><button class=\"delete-request\" type=\"button\" data-index=\"' + entry.originalIndex + '\">Delete</button>';\n        return '<div class=\"request-row' + (isEditing ? ' editing' : '') + (isConfirmingDelete ? ' confirming-delete' : '') + '\"><span>' + escapeHtml(entry.name) + (shift ? ' - ' + escapeHtml(shift) : '') + ' - ' + escapeHtml(entry.code) + ' ' + escapeHtml(reasonLabel(entry.code)) + (location ? ' - ' + escapeHtml(location) : '') + '</span><div class=\"request-actions\">' + actions + '</div></div>';\n      }).join(\"\");\n    }\n\n    function clearRequestForm() {\n      editingRequestIndex = null;\n      pendingDeleteIndex = null;\n      document.getElementById(\"employeeInput\").value = \"\";\n      document.getElementById(\"reasonInput\").value = \"\";\n      document.getElementById(\"locationInput\").value = \"\";\n      document.getElementById(\"employeeSelect\").value = \"\";\n      document.getElementById(\"reasonSelect\").value = \"\";\n      document.getElementById(\"locationSelect\").value = \"\";\n      document.getElementById(\"addRequestButton\").textContent = \"Add\";\n      document.getElementById(\"editorStatus\").textContent = \"\";\n    }\n\n    function editRequest(index) {\n      const requestIndex = Number(index);\n      const calendar = readTimeOff();\n      const entry = (calendar[selectedDateKey] || [])[requestIndex];\n      if (!Number.isInteger(requestIndex) || !entry) {\n        document.getElementById(\"editorStatus\").textContent = \"Could not find that request to edit.\";\n        return;\n      }\n      editingRequestIndex = requestIndex;\n      pendingDeleteIndex = null;\n      document.getElementById(\"employeeInput\").value = entry.name || \"\";\n      document.getElementById(\"reasonInput\").value = entry.code || \"\";\n      document.getElementById(\"locationInput\").value = entryLocation(entry);\n      document.getElementById(\"employeeSelect\").value = \"\";\n      document.getElementById(\"reasonSelect\").value = \"\";\n      document.getElementById(\"locationSelect\").value = \"\";\n      document.getElementById(\"addRequestButton\").textContent = \"Save\";\n      renderDayEditor();\n      document.getElementById(\"editorStatus\").textContent = \"Editing request - update the fields, then click Save\";\n      document.getElementById(\"addRequestForm\").scrollIntoView({ block: \"nearest\" });\n      document.getElementById(\"employeeInput\").focus();\n    }\n\n    function openDayEditor(dateKey) {\n      selectedDateKey = dateKey;\n      const selected = dateFromKey(selectedDateKey);\n      viewDate = new Date(selected.getFullYear(), selected.getMonth(), 1);\n      renderCalendar();\n      populateEditorOptions();\n      renderDayEditor();\n      clearRequestForm();\n      const backdrop = document.getElementById(\"dayEditorBackdrop\");\n      backdrop.classList.add(\"open\");\n      backdrop.setAttribute(\"aria-hidden\", \"false\");\n      setTimeout(() => document.getElementById(\"employeeInput\").focus(), 0);\n    }\n\n    function closeDayEditor() {\n      const backdrop = document.getElementById(\"dayEditorBackdrop\");\n      backdrop.classList.remove(\"open\");\n      backdrop.setAttribute(\"aria-hidden\", \"true\");\n    }\n\n    function normalizeName(name) {\n      return String(name || \"\").toLowerCase().replace(/[^a-z0-9]+/g, \" \").trim();\n    }\n\n    function isOrangePerson(name) {\n      return /\\b(jarvis|dave|mike|neal)\\b/.test(normalizeName(name));\n    }\n\n    function codeFromCell(value) {\n      const text = String(value || \"\").trim().toUpperCase();\n      return Object.keys(absenceReasons).find((code) => new RegExp(`\\\\b${code}\\\\b`).test(text)) || \"\";\n    }\n\n    function parseDayNumber(value) {\n      const text = String(value || \"\").trim();\n      if (!/^\\d{1,2}$/.test(text)) return null;\n      const day = Number(text);\n      return day >= 1 && day <= 31 ? day : null;\n    }\n\n    function employeeNameFromCell(value) {\n      let text = String(value || \"\").replace(/\\s+/g, \" \").trim();\n      if (!text || !/[a-z]/i.test(text)) return \"\";\n      if (/^(emp\\s*name|employee|shifts?|time away|date range|location|reasons?|statuses?|pay groups?)/i.test(text)) return \"\";\n      if (/\\b(SIC|VAC|FLO|HOL)\\s*-/i.test(text)) return \"\";\n      text = text.replace(/\\s+\\d{3,}\\b.*$/, \"\").trim();\n      const comma = text.match(/^([^,]+),\\s*(.+)$/);\n      if (comma) return `${comma[1].trim()} ${comma[2].trim()}`.replace(/\\s+/g, \" \");\n      return text;\n    }\n\n    function monthYearFromRows(rows) {\n      const current = { month: today.getMonth(), year: today.getFullYear() };\n      for (const row of rows) {\n        for (const value of row) {\n          const match = String(value || \"\").match(/\\b(january|february|march|april|may|june|july|august|september|october|november|december)\\s+(\\d{4})\\b/i);\n          if (match) return { month: monthNames[match[1].toLowerCase()], year: Number(match[2]) };\n        }\n      }\n      for (const row of rows) {\n        for (const value of row) {\n          const text = String(value || \"\");\n          const dateMatch = text.match(/\\b(\\d{1,2})\\/(\\d{1,2})\\/(\\d{4})\\b/);\n          if (dateMatch && /date range/i.test(text)) {\n            return { month: Number(dateMatch[1]) - 1, year: Number(dateMatch[3]) };\n          }\n        }\n      }\n      return current;\n    }\n\n    function findEmployeeHeader(rows) {\n      for (let rowIndex = 0; rowIndex < rows.length; rowIndex += 1) {\n        for (let colIndex = 0; colIndex < rows[rowIndex].length; colIndex += 1) {\n          if (/\\bemp(?:loyee)?\\s*name\\b/i.test(String(rows[rowIndex][colIndex] || \"\"))) {\n            return { rowIndex, colIndex };\n          }\n        }\n      }\n      return null;\n    }\n\n    function findColumnNearHeader(rows, header, pattern) {\n      for (let rowIndex = Math.max(0, header.rowIndex - 3); rowIndex <= Math.min(rows.length - 1, header.rowIndex + 3); rowIndex += 1) {\n        for (let colIndex = 0; colIndex < rows[rowIndex].length; colIndex += 1) {\n          if (pattern.test(String(rows[rowIndex][colIndex] || \"\"))) return colIndex;\n        }\n      }\n      return -1;\n    }\n\n    function findDayColumns(rows, header) {\n      const candidates = [];\n      for (let rowIndex = Math.max(0, header.rowIndex - 3); rowIndex <= Math.min(rows.length - 1, header.rowIndex + 3); rowIndex += 1) {\n        const days = [];\n        for (let colIndex = header.colIndex + 1; colIndex < rows[rowIndex].length; colIndex += 1) {\n          const day = parseDayNumber(rows[rowIndex][colIndex]);\n          if (day !== null) days.push({ colIndex, day });\n        }\n        candidates.push({ rowIndex, days });\n      }\n      candidates.sort((a, b) => b.days.length - a.days.length);\n      return candidates[0]?.days || [];\n    }\n\n    function datedColumns(dayColumns, base) {\n      let month = base.month;\n      let year = base.year;\n      let previousDay = 0;\n      return dayColumns.map(({ colIndex, day }) => {\n        if (previousDay && day < previousDay - 7) {\n          month += 1;\n          if (month > 11) {\n            month = 0;\n            year += 1;\n          }\n        }\n        previousDay = day;\n        return { colIndex, dateKey: isoDate(new Date(year, month, day)) };\n      });\n    }\n\n    function parseTimeOffRows(rows, sheetName) {\n      const header = findEmployeeHeader(rows);\n      if (!header) return [];\n      const dayColumns = datedColumns(findDayColumns(rows, header), monthYearFromRows(rows));\n      if (!dayColumns.length) return [];\n      const locationColumn = findColumnNearHeader(rows, header, /^loc(?:ation)?$/i);\n      const sheetLocation = locationFromSheetName(sheetName);\n      const records = [];\n\n      for (let rowIndex = header.rowIndex + 1; rowIndex < rows.length; rowIndex += 1) {\n        const row = rows[rowIndex] || [];\n        const name = employeeNameFromCell(row[header.colIndex]);\n        if (!name) continue;\n        for (const column of dayColumns) {\n          const code = codeFromCell(row[column.colIndex]);\n          if (!code) continue;\n          records.push({\n            date: column.dateKey,\n            name,\n            code,\n            reason: absenceReasons[code],\n            location: locationColumn >= 0 ? cleanLocation(row[locationColumn]) || sheetLocation : sheetLocation,\n            sheet: sheetName\n          });\n        }\n      }\n\n      return records;\n    }\n\n    function recordsToCalendar(records) {\n      const seen = new Set();\n      const calendar = {};\n      records.forEach((record) => {\n        const key = `${record.date}|${normalizeName(record.name)}|${record.code}|${normalizeName(entryLocation(record))}`;\n        if (seen.has(key)) return;\n        seen.add(key);\n        if (!calendar[record.date]) calendar[record.date] = [];\n        calendar[record.date].push(record);\n      });\n      Object.values(calendar).forEach((entries) => {\n        entries.sort(compareTimeOffRequests);\n      });\n      return calendar;\n    }\n\n    function sheetRows(workbook, sheetName) {\n      const sheet = workbook.Sheets[sheetName];\n      return XLSX.utils.sheet_to_json(sheet, { header: 1, raw: false, defval: \"\" })\n        .map((row) => row.map((cell) => String(cell || \"\").trim()));\n    }\n\n    function parseTimeOffWorkbook(workbook) {\n      const records = [];\n      workbook.SheetNames.forEach((sheetName) => {\n        records.push(...parseTimeOffRows(sheetRows(workbook, sheetName), sheetName));\n      });\n      return records;\n    }\n\n    function renderCalendar() {\n      const timeOff = readTimeOff();\n      const monthTitle = document.getElementById(\"monthTitle\");\n      const grid = document.getElementById(\"calendarGrid\");\n      const first = new Date(viewDate.getFullYear(), viewDate.getMonth(), 1);\n      const start = new Date(first);\n      start.setDate(first.getDate() - first.getDay());\n      const last = new Date(viewDate.getFullYear(), viewDate.getMonth() + 1, 0);\n      const visibleDays = Math.ceil((first.getDay() + last.getDate()) / 7) * 7;\n      const todayStart = new Date(today);\n      todayStart.setHours(0, 0, 0, 0);\n      const currentWeekStart = new Date(todayStart);\n      currentWeekStart.setDate(todayStart.getDate() - todayStart.getDay());\n      const currentWeekEnd = new Date(currentWeekStart);\n      currentWeekEnd.setDate(currentWeekStart.getDate() + 6);\n      const monthName = first.toLocaleDateString(undefined, { month: \"long\" });\n      monthTitle.textContent = `${monthName} ${first.getFullYear()}`;\n      document.querySelector(\"h1\").innerHTML = `${escapeHtml(monthName)} <span class=\"title-year\">${first.getFullYear()}</span>`;\n\n      const shiftLookup = rosterShiftLookup();\n      const cells = [];\n      for (let index = 0; index < visibleDays; index += 1) {\n        const date = new Date(start);\n        date.setDate(start.getDate() + index);\n        const key = isoDate(date);\n        const cellDate = new Date(date);\n        cellDate.setHours(0, 0, 0, 0);\n        const entries = [...(timeOff[key] || [])].sort(compareTimeOffRequests);\n        const visibleEntries = entries;\n        const classes = [\n          \"day-cell\",\n          date.getMonth() !== viewDate.getMonth() ? \"muted\" : \"\",\n          (date.getDay() === 0 || date.getDay() === 6) ? \"weekend\" : \"\",\n          cellDate < todayStart ? \"past-day\" : \"\",\n          cellDate >= currentWeekStart && cellDate <= currentWeekEnd ? \"current-week\" : \"\",\n          key === selectedDateKey ? \"selected\" : \"\"\n        ].filter(Boolean).join(\" \");\n        cells.push(`\n          <button class=\"${classes}\" type=\"button\" data-date=\"${escapeHtml(key)}\">\n            <span class=\"day-number\">${date.getDate()}</span>\n            ${visibleEntries.map((entry) => `\n              <span class=\"timeoff-pill ${escapeHtml(entry.code.toLowerCase())}${isOrangePerson(entry.name) ? \" orange-person\" : \"\"}\" title=\"${escapeHtml(`${entry.name} - ${shiftForEmployee(entry.name, shiftLookup) || \"No shift found\"} - ${entry.reason}`)}\">\n                <span class=\"timeoff-name\">${escapeHtml(entry.name)}</span><span class=\"timeoff-code\">${escapeHtml(entry.code)}</span>\n                ${shiftLineHtml(entry, shiftLookup)}\n                ${locationLineHtml(entry)}\n              </span>\n            `).join(\"\")}\n\n          </button>\n        `);\n      }\n      grid.innerHTML = cells.join(\"\");\n    }\n\n    document.getElementById(\"prevMonth\").addEventListener(\"click\", () => {\n      viewDate = new Date(viewDate.getFullYear(), viewDate.getMonth() - 1, 1);\n      renderCalendar();\n    });\n\n    document.getElementById(\"nextMonth\").addEventListener(\"click\", () => {\n      viewDate = new Date(viewDate.getFullYear(), viewDate.getMonth() + 1, 1);\n      renderCalendar();\n    });\n\n    document.getElementById(\"todayButton\").addEventListener(\"click\", () => {\n      selectedDateKey = isoDate(today);\n      viewDate = new Date(today.getFullYear(), today.getMonth(), 1);\n      renderCalendar();\n    });\n\n    document.getElementById(\"timeOffImport\").addEventListener(\"change\", async (event) => {\n      const file = event.target.files[0];\n      if (!file) return;\n      const status = document.getElementById(\"importStatus\");\n\n      if (!window.XLSX) {\n        status.textContent = \"XLSX parser unavailable\";\n        event.target.value = \"\";\n        return;\n      }\n\n      try {\n        const workbook = XLSX.read(await file.arrayBuffer(), { type: \"array\" });\n        const records = parseTimeOffWorkbook(workbook);\n        if (!records.length) {\n          status.textContent = \"No time away codes found\";\n          return;\n        }\n\n        writeTimeOff(recordsToCalendar(records));\n        selectedDateKey = records[0].date;\n        const selected = dateFromKey(selectedDateKey);\n        viewDate = new Date(selected.getFullYear(), selected.getMonth(), 1);\n        status.textContent = `${records.length} time away records imported`;\n        renderCalendar();\n      } catch (error) {\n        status.textContent = \"Import failed\";\n      } finally {\n        event.target.value = \"\";\n      }\n    });\n\n    document.getElementById(\"calendarGrid\").addEventListener(\"click\", (event) => {\n      const cell = event.target.closest(\"[data-date]\");\n      if (!cell) return;\n      openDayEditor(cell.dataset.date);\n    });\n\n    function clickStartedInsideCalendarTools(event) {\n      const path = typeof event.composedPath === \"function\" ? event.composedPath() : [];\n      return path.some((node) => node && node.nodeType === 1 && node.matches && node.matches(\".calendar-grid, .month-controls, .day-editor\"))\n        || (event.target.closest && event.target.closest(\".calendar-grid, .month-controls, .day-editor\"));\n    }\n\n    document.addEventListener(\"click\", (event) => {\n      if (!selectedDateKey) return;\n      if (clickStartedInsideCalendarTools(event)) return;\n      selectedDateKey = \"\";\n      renderCalendar();\n    });\n\n    function wirePicker(selectId, inputId, transform = (value) => value) {\n      document.getElementById(selectId).addEventListener(\"change\", (event) => {\n        const value = event.target.value;\n        if (!value) return;\n        document.getElementById(inputId).value = transform(value);\n      });\n    }\n\n    wirePicker(\"employeeSelect\", \"employeeInput\");\n    wirePicker(\"reasonSelect\", \"reasonInput\", (value) => value.split(\" - \")[0]);\n    wirePicker(\"locationSelect\", \"locationInput\");\n\n    document.getElementById(\"closeDayEditor\").addEventListener(\"click\", closeDayEditor);\n    document.getElementById(\"dayEditorBackdrop\").addEventListener(\"click\", (event) => { if (event.target.id === \"dayEditorBackdrop\") closeDayEditor(); });\n    document.addEventListener(\"keydown\", (event) => { if (event.key === \"Escape\") closeDayEditor(); });\n\n    document.getElementById(\"requestList\").addEventListener(\"click\", (event) => {\n      const editButton = event.target.closest(\".edit-request\");\n      if (editButton) {\n        editRequest(Number(editButton.dataset.index));\n        return;\n      }\n\n      const deleteButton = event.target.closest(\".delete-request\");\n      if (deleteButton) {\n        pendingDeleteIndex = Number(deleteButton.dataset.index);\n        if (editingRequestIndex === pendingDeleteIndex) {\n          editingRequestIndex = null;\n          document.getElementById(\"employeeInput\").value = \"\";\n          document.getElementById(\"reasonInput\").value = \"\";\n          document.getElementById(\"locationInput\").value = \"\";\n          document.getElementById(\"employeeSelect\").value = \"\";\n          document.getElementById(\"reasonSelect\").value = \"\";\n          document.getElementById(\"locationSelect\").value = \"\";\n          document.getElementById(\"addRequestButton\").textContent = \"Add\";\n        }\n        renderDayEditor();\n        document.getElementById(\"editorStatus\").textContent = \"Click Confirm to delete this one request.\";\n        return;\n      }\n\n      const cancelButton = event.target.closest(\".cancel-delete-request\");\n      if (cancelButton) {\n        pendingDeleteIndex = null;\n        renderDayEditor();\n        document.getElementById(\"editorStatus\").textContent = \"Delete canceled.\";\n        return;\n      }\n\n      const confirmButton = event.target.closest(\".confirm-delete-request\");\n      if (!confirmButton) return;\n      const deleteIndex = Number(confirmButton.dataset.index);\n      const calendar = readTimeOff();\n      const entries = calendar[selectedDateKey] || [];\n      if (!Number.isInteger(deleteIndex) || deleteIndex < 0 || deleteIndex >= entries.length) {\n        pendingDeleteIndex = null;\n        renderDayEditor();\n        document.getElementById(\"editorStatus\").textContent = \"Could not find that request to delete.\";\n        return;\n      }\n      entries.splice(deleteIndex, 1);\n      if (editingRequestIndex === deleteIndex) editingRequestIndex = null;\n      else if (editingRequestIndex !== null && editingRequestIndex > deleteIndex) editingRequestIndex -= 1;\n      pendingDeleteIndex = null;\n      if (entries.length) calendar[selectedDateKey] = entries;\n      else delete calendar[selectedDateKey];\n      writeTimeOff(calendar);\n      renderCalendar();\n      populateEditorOptions();\n      renderDayEditor();\n      clearRequestForm();\n      document.getElementById(\"editorStatus\").textContent = \"Request deleted.\";\n    });\n\n    document.getElementById(\"addRequestForm\").addEventListener(\"submit\", (event) => {\n      event.preventDefault();\n       font-weight: 800;\n      cursor: pointer;\n    }\n\n    .nav-tab.active {\n      background: #22303f;\n      color: #fff;\n    }\n\n    .analytics-page {\n      width: 100%;\n    }\n\n    .analytics-toolbar,\n    .analytics-grid,\n    .analytics-card {\n      background: #fff;\n      border-radius: 8px;\n      box-shadow: var(--shadow);\n    }\n\n    .analytics-toolbar {\n      display: flex;\n      align-items: end;\n      gap: 12px;\n      flex-wrap: wrap;\n      padding: 16px;\n      margin-bottom: 18px;\n    }\n\n    .filter-field {\n      display: flex;\n      flex-direction: column;\n      gap: 5px;\n      color: var(--muted);\n      font-size: 11px;\n      font-weight: 800;\n      letter-spacing: 0.08em;\n      text-transform: uppercase;\n    }\n\n    .filter-field input,\n    .filter-field select {\n      min-height: 36px;\n      border: 1px solid var(--line);\n      border-radius: 8px;\n      padding: 7px 10px;\n      color: var(--ink);\n      background: #fff;\n      font: inherit;\n      font-size: 13px;\n      text-transform: none;\n      letter-spacing: 0;\n    }\n\n    .group-map-tools .compact-filter {\n      flex: 0 0 auto;\n    }\n\n    .group-map-tools .compact-filter input {\n      width: 10ch;\n      min-width: 0;\n    }\n\n    .analytics-grid {\n      display: grid;\n      grid-template-columns: minmax(0, 1.35fr) minmax(460px, 0.95fr);\n      gap: 18px;\n      background: transparent;\n      box-shadow: none;\n    }\n\n    .analytics-card {\n      padding: 18px;\n      margin-bottom: 18px;\n      overflow: auto;\n    }\n\n    .analytics-card h2 {\n      margin: 0 0 12px;\n      font-size: 15px;\n      font-weight: 800;\n    }\n\n    .analytics-card.full-width {\n      grid-column: 1 / -1;\n    }\n\n    .group-map-tools {\n      display: flex;\n      align-items: end;\n      gap: 10px;\n      flex-wrap: wrap;\n      margin-bottom: 14px;\n    }\n\n    .group-map-stage {\n      position: relative;\n      min-height: 620px;\n      overflow: auto;\n      border: 1px solid #e3e9f0;\n      border-radius: 8px;\n      background: linear-gradient(180deg, #fbfdff 0%, #f6f9fc 100%);\n    }\n\n    .group-map-svg {\n      display: block;\n      width: 100%;\n      min-width: 980px;\n    }\n\n    .group-bubble {\n      cursor: pointer;\n      transition: opacity 0.15s ease, stroke-width 0.15s ease;\n    }\n\n    .group-bubble:hover {\n      opacity: 0.92;\n      stroke-width: 3;\n    }\n\n    .group-label {\n      fill: var(--ink);\n      font-size: 13px;\n      font-weight: 900;\n      text-anchor: middle;\n      pointer-events: none;\n    }\n\n    .group-sub-label {\n      fill: var(--muted);\n      font-size: 11px;\n      font-weight: 800;\n      text-anchor: middle;\n      pointer-events: none;\n    }\n\n    .manager-pill {\n      fill: #f7c948;\n      stroke: #b7791f;\n      stroke-width: 1.4;\n      pointer-events: none;\n    }\n\n    .manager-pill-label {\n      fill: #3f2d05;\n      font-size: 10px;\n      font-weight: 900;\n      text-anchor: middle;\n      pointer-events: none;\n    }\n\n    .person-node {\n      cursor: default;\n    }\n\n    .person-node circle {\n      fill: #ffffff;\n      stroke: #678095;\n      stroke-width: 1.5;\n    }\n\n    .person-node text {\n      display: none;\n      fill: var(--ink);\n      font-size: 9px;\n      font-weight: 800;\n      text-anchor: middle;\n      pointer-events: none;\n    }\n\n    .map-link {\n      fill: none;\n      stroke: #2aa889;\n      stroke-width: 2;\n      stroke-linecap: round;\n      opacity: 0.5;\n    }\n\n    .group-map-empty {\n      padding: 18px;\n    }\n\n    .status-banner {\n      margin-bottom: 14px;\n      padding: 10px 12px;\n      border: 1px solid #d6e4f2;\n      border-radius: 8px;\n      background: #f6faff;\n      color: #42637f;\n      font-size: 12.5px;\n      font-weight: 700;\n    }\n\n    .analytics-table {\n      width: 100%;\n      min-width: 760px;\n      border-collapse: collapse;\n    }\n\n    .analytics-table th,\n utton id=\"filesButton\" class=\"button\" type=\"button\">Uploaded files</button>\n        <button id=\"pullArchiveHoursButton\" class=\"button\" type=\"button\">Pull time from archive</button>\n        <button id=\"exportButton\" class=\"button\" type=\"button\">Export</button>\n        <div class=\"import-menu\">\n          <button id=\"importMenuButton\" class=\"import-button import-menu-button\" type=\"button\">Import files</button>\n          <div id=\"importMenuList\" class=\"import-menu-list hidden\">\n            <button id=\"importLiftsButton\" type=\"button\">Import lifts</button>\n            <button id=\"importTimesheetsButton\" type=\"button\">Import timesheets</button>\n          </div>\n        </div>\n        <input id=\"fileInput\" class=\"file-input\" type=\"file\" multiple accept=\".csv,.xlsx,.xls,.htm,.html\">\n      </div>\n    </header>\n\n    <section id=\"operationsPage\" class=\"layout\">\n      <div class=\"table-wrap\">\n        <div id=\"emptyNote\" class=\"empty-note hidden\">\n          No data yet. Use <strong>Import files</strong> to load lift reports or timesheets, or type directly into any cell.\n        </div>\n        <table>\n          <thead>\n            <tr>\n              <th class=\"date-head\" rowspan=\"2\">Date</th>\n              <th class=\"group-moves\" colspan=\"3\">Lifts</th>\n              <th class=\"group-stacking\" colspan=\"4\">Stacking</th>\n              <th class=\"group-chassis\" colspan=\"3\">Chassis</th>\n              <th class=\"group-hours\" colspan=\"4\">Hours &amp; Lifts</th>\n            </tr>\n            <tr>\n              <th class=\"split-left\">Ramp</th>\n              <th>Deramp</th>\n              <th>Total</th>\n              <th class=\"split-left\">Flip</th>\n              <th>Stacked</th>\n              <th>Unstacked</th>\n              <th>Flip + Stack</th>\n              <th class=\"split-left\">Unstacked</th>\n              <th>Stacked</th>\n              <th>Total</th>\n              <th class=\"split-left\"><button id=\"timesheetHoursSource\" class=\"hour-source-button active\" type=\"button\">Man Hours</button></th>\n              <th><button id=\"powerBiHoursSource\" class=\"hour-source-button\" type=\"button\">PowerBI</button></th>\n              <th>Lifts</th>\n              <th>LPH</th>\n            </tr>\n          </thead>\n          <tbody id=\"tableBody\"></tbody>\n          <tfoot>\n            <tr id=\"totalRow\"></tr>\n          </tfoot>\n        </table>\n      </div>\n\n      <aside class=\"side\">\n        <div class=\"summary\">\n          <div class=\"summary-title\">LPMH - Lifts per man hour</div>\n          <div id=\"summaryLpmh\" class=\"summary-hero\"></div>\n          <div id=\"summaryBars\" class=\"spark-bars\"></div>\n          <div id=\"bestDayRow\" class=\"rank-row\"></div>\n          <div id=\"lowDayRow\" class=\"rank-row\"></div>\n          <div class=\"history-title\">Last 7 days</div>\n          <div id=\"recentDays\"></div>\n          <div class=\"summary-lines\">\n            <div class=\"total-line\"><span id=\"summaryHoursLabel\">Man hours</span><strong id=\"summaryHours\"></strong></div>\n            <div class=\"total-line\"><span>Lifts</span><strong id=\"summaryLifts\"></strong></div>\n          </div>\n          <label class=\"summary-toggle\">\n            <input id=\"excludedCountToggle\" type=\"checkbox\">\n            <span>Show excluded counts</span>\n          </label>\n          <label class=\"summary-toggle\">\n            <input id=\"weekendHighlightToggle\" type=\"checkbox\">\n            <span>Highlight weekends</span>\n          </label>\n        </div>\n      </aside>\n    </section>\n\n    <section id=\"analyticsPage\" class=\"analytics-page hidden\">\n      <div class=\"analytics-toolbar\">\n        <input id=\"analyticsTimesheetInput\" class=\"file-input\" type=\"file\" multiple accept=\".csv,.xlsx,.xls,.htm,.html\">\n        <datalist id=\"managerNameOptions\"></datalist>\n        <label class=\"filter-field\">Start date<input id=\"analyticsStart\" type=\"date\"></label>\n        <label class=\"filter-field\">End date<input id=\"analyticsEnd\" type=\"date\"></label>\n      </div>\n      <div id=\"analyticsStatus\" class=\"status-banner\"></div>\n      <div class=\"analytics-grid\">\n        <div class=\"analytics-card full-width\">\n          <h2>Person Grouping Map by LPMH</h2>\n          <div class=\"group-map-tools\">\n            <label class=\"filter-field\">Group size<select id=\"groupMapBy\"><option value=\"2\">2 people</option><option value=\"3\">3 people</option><option value=\"4\">4 people</option><option value=\"5\">5 people</option><option value=\"6\">6 people</option><option value=\"7\">7 people</option><option value=\"8\">8 people</option></select></label>\n            <label class=\"filter-field\">Metric sizing<select id=\"groupMapMetric\"><option value=\"avgLpmh\">Average LPMH</option><option value=\"totalLpmh\">Total LPMH</option><option value=\"variance\">LPMH vs target</option><option value=\"people\">Person count</option></select></label>\n            <label class=\"filter-field\">Size scale<select id=\"groupMapScale\"><option value=\"linear\">Linear</option><option value=\"log\">Logarithmic</option><option value=\"normalized\">Normalized</option></select></label>\n            <label class=\"filter-field compact-filter\">Min LPMH<input id=\"groupMapMinLpmh\" type=\"number\" min=\"0\" step=\"0.1\"></label>\n            <label class=\"filter-field compact-filter\">Target LPMH<input id=\"groupMapTarget\" type=\"number\" min=\"0\" step=\"0.1\" value=\"3\"></label>\n            <label class=\"filter-field\">Show groups<select id=\"groupMapTargetFilter\"><option value=\"all\">All groups</option><option value=\"above\">Above target</option><option value=\"below\">Below target</option></select></label>\n            <label class=\"filter-field\">Sort<select id=\"groupMapSort\"><option value=\"highest\">Highest LPMH</option><option value=\"lo stFilter.addEventListener(\"input\", renderAnalyticsEmployeesList);\n    els.includeAllEmployeesButton.addEventListener(\"click\", includeAllAnalyticsEmployees);\n    document.addEventListener(\"keydown\", (event) => {\n      if (event.key === \"Escape\") {\n        closeMoveModal();\n        closeFilesModal();\n        closeAnalyticsEmployeesModal();\n      }\n    });\n    els.excludedCountToggle.addEventListener(\"change\", (event) => {\n      state.showExcludedCounts = event.target.checked;\n      persist();\n      render();\n    });\n    els.weekendHighlightToggle.addEventListener(\"change\", (event) => {\n      state.weekendHighlight = event.target.checked;\n      persist();\n      render();\n    });\n    els.previewFilter.addEventListener(\"change\", (event) => {\n      state.previewFilter = event.target.value;\n      if (state.previewDate && state.previewField) openMoveModal(state.previewDate, state.previewField);\n    });\n    els.reasonFilter.addEventListener(\"change\", (event) => {\n      state.reasonFilter = event.target.value;\n      if (state.previewDate && state.previewField) openMoveModal(state.previewDate, state.previewField);\n    });\n    els.bulkInclude.addEventListener(\"click\", () => applyBulkMoveDetailState(false));\n    els.bulkExclude.addEventListener(\"click\", () => applyBulkMoveDetailState(true));\n    document.addEventListener(\"mouseup\", () => {\n      state.draggingSelect = false;\n    });\n\n    els.clearMenuButton.addEventListener(\"click\", (event) => {\n      event.stopPropagation();\n      const opening = els.clearMenuList.classList.contains(\"hidden\");\n      els.importMenuList.classList.add(\"hidden\");\n      els.clearMenuList.classList.toggle(\"hidden\", !opening);\n      els.clearMenuButton.setAttribute(\"aria-expanded\", String(opening));\n    });\n    els.clearMenuList.addEventListener(\"click\", (event) => {\n      const button = event.target.closest(\"[data-clear-month]\");\n      if (!button) return;\n      els.clearMenuList.classList.add(\"hidden\");\n      els.clearMenuButton.setAttribute(\"aria-expanded\", \"false\");\n      clearMonthSelection(button.dataset.clearMonth);\n    });\n\n    els.fileInput.addEventListener(\"change\", async (event) => {\n      const files = Array.from(event.target.files || []);\n      event.target.value = \"\";\n      if (!files.length) return;\n\n      let rows = [];\n      const failed = [];\n\n      for (const file of files) {\n        const fileId = createImportId();\n        let fileRows = [];\n        try {\n          if (isWorkbookFile(file.name)) {\n            fileRows = await readWorkbook(file);\n          } else {\n            fileRows = extractRows(parseCSV(await file.text()), file.name, \"CSV\");\n          }\n          if (fileRows.length) {\n            state.importedFiles.push({ id: fileId, name: file.name, type: \"operations\", importedAt: new Date().toISOString(), rows: fileRows.length });\n            rows = rows.concat(fileRows.map((row) => ({ ...row, __fileId: fileId, __fileName: file.name })));\n          }\n        } catch (error) {\n          failed.push(`${file.name}: ${error.message}`);\n        }\n      }\n\n      if (!rows.length) {\n        showToast(failed.length ? `Could not read: ${failed.join(\", \")}` : \"No matching rows found. Check for a Date column and known headers.\");\n        return;\n      }\n\n      const prepared = prepareImportRows(rows);\n      if (!prepared) return;\n\n      importRows(prepared.rows, prepared.details);\n      const dayCount = new Set(prepared.rows.map((row) => row.date)).size;\n      const suffix = failed.length ? ` Failed: ${failed.join(\", \")}` : \"\";\n      const duplicateNote = prepared.skippedDuplicates ? ` Counted ${prepared.skippedDuplicates} duplicate${prepared.skippedDuplicates === 1 ? \"\" : \"s\"} once.` : \"\";\n      const uniqueNote = prepared.uniqueMoveRows ? ` Counted ${prepared.uniqueMoveRows} unique ramp/deramp unit${prepared.uniqueMoveRows === 1 ? \"\" : \"s\"}.`
