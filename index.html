u: \"thu\",\n      thur: \"thu\",\n      thurs: \"thu\",\n      thursday: \"thu\",\n      fri: \"fri\",\n      friday: \"fri\",\n      sat: \"sat\",\n      saturday: \"sat\"\n    };\n\n    const todayKey = [\"sun\", \"mon\", \"tue\", \"wed\", \"thu\", \"fri\", \"sat\"][new Date().getDay()];\n    const rosterStorageKey = \"conglobal-roster-state-v1\";\n    const rosterAdditionsKey = \"conglobal-roster-additions-v1\";\n    const dayforceStorageKey = \"conglobal-dayforce-punches-v1\";\n    const previousTimesheetStorageKey = \"conglobal-previous-timesheet-hours-v1\";\n    const timesheetSettingsKey = \"conglobal-timesheet-settings-v1\";\n    const timesheetNotesKey = \"conglobal-timesheet-notes-v1\";\n    const rosterDayLabels = [\"Mon\", \"Tues\", \"Wed\", \"Thurs\", \"Fri\", \"Sat\", \"Sun\"];\n    const lpmhGoal = 2.0;\n    const modal = document.getElementById(\"tomorrowOffModal\");\n    const modalContent = document.getElementById(\"tomorrowOffContent\");\n    const lpmhModal = document.getElementById(\"lpmhModal\");\n    const lpmhDetails = document.getElementById(\"lpmhDetails\");\n\n    function readTimesheetSettings() {\n      try {\n        const saved = JSON.parse(localStorage.getItem(timesheetSettingsKey) || \"null\");\n        return saved && typeof saved === \"object\" ? saved : {};\n      } catch (error) {\n        localStorage.removeItem(timesheetSettingsKey);\n        return {};\n      }\n    }\n\n    function writeTimesheetSettings() {\n      localStorage.setItem(timesheetSettingsKey, JSON.stringify({\n        lifts: Number(document.getElementById(\"updateLifts\").value) || 0,\n        flips: Number(document.getElementById(\"updateFlips\").value) || 0,\n        shiftEndMode: document.getElementById(\"shiftEndSelect\").value,\n        shiftEndCustom: document.getElementById(\"shiftEndOther\").value.trim()\n      }));\n    }\n\n    function applyTimesheetSettings() {\n      const settings = readTimesheetSettings();\n      if (settings.lifts !== undefined) document.getElementById(\"updateLifts\").value = settings.lifts;\n      if (settings.flips !== undefined) document.getElementById(\"updateFlips\").value = settings.flips;\n      if (settings.shiftEndMode) document.getElementById(\"shiftEndSelect\").value = settings.shiftEndMode;\n      if (settings.shiftEndCustom !== undefined) document.getElementById(\"shiftEndOther\").value = settings.shiftEndCustom;\n    }\n\n    function parseOffDays(text) {\n      return new Set(text\n        .split(\",\")\n        .map((item) => item.trim().toLowerCase())\n        .map((item) => dayAliases[item] || dayAliases[item.slice(0, 3)])\n        .filter(Boolean));\n    }\n\n    function dayKeyFromOffset(offset) {\n      const date = new Date();\n      date.setDate(date.getDate() + offset);\n      return [\"sun\", \"mon\", \"tue\", \"wed\", \"thu\", \"fri\", \"sat\"][date.getDay()];\n    }\n\n    function dayKeyFromDateValue(value) {\n      const text = String(value || \"\").trim();\n      if (!text) return \"\";\n\n      const dayNameMatch = text.match(/^([a-z]{3,9})\\b/i);\n      const explicitDay = dayNameMatch ? dayAliases[dayNameMatch[1].toLowerCase()] : \"\";\n      if (explicitDay) return explicitDay;\n\n      const match = text.match(/^(\\d{1,2})\\/(\\d{1,2})\\/(\\d{2,4})/);\n      const date = match\n        ? new Date(Number(match[3].length === 2 ? `20${match[3]}` : match[3]), Number(match[1]) - 1, Number(match[2]))\n        : new Date(text);\n      if (Number.isNaN(date.getTime())) return \"\";\n      return [\"sun\", \"mon\", \"tue\", \"wed\", \"thu\", \"fri\", \"sat\"][date.getDay()];\n    }\n\n    function dayKeyForRow(row) {\n      return row.dataset.workdayKey || todayKey;\n    }\n\n    function rowOffDays(row) {\n      return parseOffDays(row.children[1] ? row.children[1].textContent : \"\");\n    }\n\n    function rowIsScheduledToWork(row) {\n      return !rowOffDays(row).has(dayKeyForRow(row));\n    }\n\n    function isClockValue(value) {\n      const text = String(value || \"\").trim();\n      return Boolean(text && text.toLowerCase() !== \"missing?\");\n    }\n\n    function isInvalidTimeValue(value) {\n      const text = String(value || \"\").trim();\n      return Boolean(text && text.toLowerCase() !== \"missing?\" && minutesFromMilitary(text) === null);\n    }\n\n    function updateInvalidTimeStateForRow(row) {\n      const inputs = row.querySelectorAll(\".time-cell input\");\n      if (inputs.length < 3) return false;\n      const invalidStart = isInvalidTimeValue(inputs[0].value);\n      const invalidEnd = isInvalidTimeValue(inputs[2].value);\n      inputs[0].classList.toggle(\"invalid-time\", invalidStart);\n      inputs[2].classList.toggle(\"invalid-time\", invalidEnd);\n      return invalidStart || invalidEnd;\n    }\n\n    function rowHasInvalidTime(row) {\n      const inputs = row.querySelectorAll(\".time-cell input\");\n      if (inputs.length < 3) return false;\n      return isInvalidTimeValue(inputs[0].value) || isInvalidTimeValue(inputs[2].value);\n    }\n\n    function rowHasClockTime(row) {\n      const inputs = row.querySelectorAll(\".time-cell input\");\n      return Boolean((inputs[0] && isClockValue(inputs[0].value)) || (inputs[2] && isClockValue(inputs[2].value)));\n    }\n\n    function rowIsCurrentlyHere(row) {\n      const inputs = row.querySelectorAll(\".time-cell input\");\n      if (inputs.length < 3) return false;\n      return minutesFromMilitary(inputs[0].value) !== null && minutesFromMilitary(inputs[2].value) === null;\n    }\n\n    function rowHasValidClockIn(row) {\n      const inputs = row.querySelectorAll(\".time-cell input\");\n      if (!inputs.length) return false;\n      return minutesFromMilitary(inputs[0].value) !== null;\n    }\n\n    function updateScheduleStyleForRow(row) {\n      const nameCell = row.querySelector(\"td.name\");\n      if (!nameCell) return;\n\n      const startCell = row.querySelector(\".time-cell\");\n      const scheduled = rowIsScheduledToWork(row);\n      const hasClockTime = rowHasClockTime(row);\n      const offIdle = !scheduled && !hasClockTime;\n      const offDayClock = !scheduled && hasClockTime;\n      const purpleAbsence = rowHasPurpleAbsence(row);\n      const unpaidAbsence = row.dataset.absenceUnpaid === \"1\";\n      nameCell.classList.toggle(\"scheduled\", scheduled);\n      nameCell.classList.toggle(\"off-day-clock\", offDayClock);\n      row.classList.toggle(\"off-employee-row\", offIdle);\n      row.classList.toggle(\"purple-absence-row\", purpleAbsence);\n      row.classList.toggle(\"unpaid-absence-row\", unpaidAbsence);\n      if (startCell) {\n        startCell.classList.add(\"start-status\");\n        startCell.classList.toggle(\"scheduled\", scheduled);\n        startCell.classList.toggle(\"off-day-clock\", offDayClock);\n      }\n    }\n\n    function employeeNameForSort(row) {\n      return (row.querySelector(\"td.name\")?.textContent || \"\").trim();\n    }\n\n    function statusSortRank(row) {\n      const scheduled = rowIsScheduledToWork(row);\n      const clockedIn = rowHasValidClockIn(row);\n      const purpleAbsence = rowHasPurpleAbsence(row);\n\n      if (scheduled && clockedIn && !purpleAbsence) return 0;\n      if (!scheduled && clockedIn) return 1;\n      if (purpleAbsence) return 2;\n      if (scheduled && !clockedIn) return 3;\n      if (!scheduled && !clockedIn) return 4;\n      return 4;\n    }\n\n    function sectionEmployeeRows(headerRow) {\n      const rows = [];\n      let anchor = headerRow.nextElementSibling;\n\n      while (anchor && !anchor.querySelector(\"th.section-name\")) {\n        if (!anchor.querySelector(\"td.name\")) break;\n        rows.push(anchor);\n        anchor = anchor.nextElementSibling;\n      }\n\n      return { rows, anchor };\n    }\n\n    function sortShiftRows(headerCell, forcedMode = \"\") {\n      const headerRow = headerCell.closest(\"tr\");\n      if (!headerRow) return;\n\n      const mode = forcedMode || (headerCell.dataset.sortMode === \"status\" ? \"alpha\" : \"status\");\n      const { rows, anchor } = sectionEmployeeRows(headerRow);\n      const sorted = rows.slice().sort((a, b) => {\n        if (mode === \"status\") {\n          const rankDiff = statusSortRank(a) - statusSortRank(b);\n          if (rankDiff) return rankDiff;\n        }\n        return employeeNameForSort(a).localeCompare(employeeNameForSort(b));\n      });\n\n      sorted.forEach((row) => {\n        headerRow.parentNode.insertBefore(row, anchor);\n      });\n      headerCell.dataset.sortMode = mode;\n    }\n\n    function sortAllShiftsByStatus() {\n      document.querySelectorAll(\".time-table th.section-name\").forEach((header) => {\n        sortShiftRows(header, \"status\");\n      });\n    }\n\n    function sectionKeyForRow(row) {\n      let cursor = row;\n      while (cursor) {\n        const header = cursor.querySelector(\"th.section-name\");\n        if (header) return getSectionKey(header.textContent);\n        cursor = cursor.previousElementSibling;\n      }\n      return \"\";\n    }\n\n    function currentMinutes() {\n      const now = new Date();\n      return (now.getHours() * 60) + now.getMinutes();\n    }\n\n    function currentMilitaryTime() {\n      return militaryFromMinutes(currentMinutes());\n    }\n\n    function shouldCheckMissingStart(row) {\n      const sectionKey = sectionKeyForRow(row);\n      if (sectionKey === \"gate\") return false;\n      if (sectionKey === \"second\") return currentMinutes() >= minutesFromMilitary(\"1500\");\n      return true;\n    }\n\n    function rowHasAbsence(row) {\n      return Boolean((row.dataset.absenceNote || \"\").trim());\n    }\n\n    function rowHasManualNote(row) {\n      const noteInput = row.querySelector(\".note-input\");\n      if (noteInput && isRealNoteValue(noteInput.value)) return true;\n      const name = row.querySelector(\"td.name\")?.textContent.trim() || \"\";\n      return Boolean(getManualNote(name));\n    }\n\n    function paidNoteHoursForText(value) {\n      r te !== false;\n\n      const start = minutesFromMilitary(inputs[0].value);\n      const hasTemporaryEnd = start !== null && !isClockValue(inputs[2].value);\n      const temporaryEnd = hasTemporaryEnd ? currentMilitaryTime() : \"\";\n      inputs[2].classList.toggle(\"temp-clock-out\", hasTemporaryEnd);\n      inputs[2].placeholder = hasTemporaryEnd ? temporaryEnd : \"\";\n\n      const end = minutesFromMilitary(hasTemporaryEnd ? temporaryEnd : inputs[2].value);\n      const actualCell = row.children[6];\n      if (!actualCell) return;\n      updateInvalidTimeStateForRow(row);\n      updateMissingStartForRow(row);\n      if (refreshNote) updateOffDayNoteForRow(row);\n      const paidNoteHours = paidNoteHoursForRow(row);\n      actualCell.classList.add(\"actual-cell\");\n      if (start === null || end === null) {\n        actualCell.textContent = paidNoteHours ? paidNoteHours.toFixed(1) : \"\";\n        return;\n      }\n\n      let minutes = end - start;\n      if (minutes < 0) minutes += 24 * 60;\n      if (inputs[1].value.trim().toUpperCase() === \"YES\") minutes -= 30;\n\n      const clockedHours = minutes > 0 ? minutes / 60 : 0;\n      const totalHours = clockedHours + paidNoteHours;\n      actualCell.textContent = totalHours > 0 ? totalHours.toFixed(1) : \"\";\n    }\n\n    function calculateActualHours() {\n      document.querySelectorAll(\".time-table tbody tr\").forEach(calculateActualForRow);\n      updateMissingStarts();\n      updateOffDayNotes();\n      updateScheduledCounts();\n      updateStartCounts();\n      updateActualHeaders();\n      updateCurrentLpmh();\n    }\n\n    function updateStartCounts() {\n      let headerRow = null;\n      let hereCount = 0;\n      let outCount = 0;\n\n      function commitCount() {\n        if (!headerRow) return;\n        const startHeader = headerRow.children[3];\n        if (startHeader) {\n          const total = hereCount + outCount;\n          startHeader.textContent = total > 0 ? `${hereCount} HERE, ${outCount}  = \"\";\n\n      document.querySelectorAll(\".time-table tbody tr\").forEach((row) => {\n        const header = row.querySelector(\"th.section-name\");\n        if (header) {\n          sectionKey = getSectionKey(header.textContent);\n          if (sectionKey && totals[sectionKey] === undefined) totals[sectionKey] = 0;\n          return;\n        }\n\n        if (!sectionKey) return;\n        const actual = Number(row.children[6] ? row.children[6].textContent : \"\");\n        if (!Number.isNaN(actual)) totals[sectionKey] = (totals[sectionKey] || 0) + actual;\n      });\n\n      return totals;\n    }\n\n    function updateActualHeaders() {\n      const totals = actualHoursBySection();\n      let sectionKey = \"\";\n\n      document.querySelectorAll(\".time-table tbody tr\").forEach((row) => {\n        const sectionHeader = row.querySelector(\"th.section-name\");\n        if (!sectionHeader) return;\n        sectionKey = getSectionKey(sectionHeader.textContent);\n        const actualHeader = row.children[6];\n        if (actualHeader) actualHeader.textContent = `Actual ${((totals[sectionKey] || 0)).toFixed(1)}`;\n      });\n    }\n\n    function shiftHoursFor(keys) {\n      const totals = actualHoursBySection();\n      return keys.reduce((sum, key) => sum + (totals[key] || 0), 0);\n    }\n\n    function previousTimesheetImport() {\n      try {\n        const saved = JSON.parse(localStorage.getItem(previousTimesheetStorageKey) || \"null\");\n        return saved && typeof saved.hours === \"number\" ? saved : null;\n      } catch (error) {\n        localStorage.removeItem(previousTimesheetStorageKey);\n        return null;\n      }\n    }\n\n    function previousShiftHours() {\n      const imported = previousTimesheetImport();\n      return imported ? Math.max(Number(imported.hours) || 0, 0) : 0;\n    }\n\n    function currentLpmhBreakdown() {\n      const lifts = Number(document.getElementById(\"updateLifts\").value) || 0;\n      const flips = Number(document.getElementById(\"updateFlips\").value) || 0;\n      const rawShiftHours = shiftHoursFor([\"first\", \"second\"]);\n      const previousHours = previousShiftHours();\n      const shiftHours = rawShiftHours + previousHours;\n      const totalMoves = Math.max(lifts + flips, 0);\n      const currentRate = shiftHours > 0 ? totalMoves / shiftHours : 0;\n      const neededValue = Math.ceil(shiftHours * lpmhGoal);\n      const remainValue = neededValue - totalMoves;\n      const remainingHours = hoursUntilShiftEnd(shiftEndValue());\n      const goalMet = shiftHours > 0 && currentRate >= lpmhGoal;\n      const neededLph = goalMet ? \"MET GOAL!\" : (remainingHours > 0 ? (Math.max(remainValue, 0) / remainingHours).toFixed(1) : \"0.0\");\n      return { lifts, flips, rawShiftHours, previousHours, shiftHours, totalMoves, currentRate, neededValue, remainValue, remainingHours, goalMet, neededLph };\n    }\n\n    function updateCurrentLpmh() {\n      const details = currentLpmhBreakdown();\n      const current = document.getElementById(\"currentLpmh\");\n      const neededRate = document.getElementById(\"lphNeeded\");\n      const needed = document.getElementById(\"liftsNeeded\");\n      const remain = document.getElementById(\"liftsRemain\");\n      const rate = details.currentRate.toFixed(1);\n      current.textContent = rate;\n      needed.textContent = String(details.neededValue);\n      remain.textContent = details.goalMet ? \"MET GOAL!\" : String(Math.max(details.remainValue, 0));\n      neededRate.textContent = details.neededLph;\n      if (lpmhModal.classList.contains(\"open\")) renderCurrentLpmhDetails();\n    }\n\n    function renderCurrentLpmhDetails() {\n      const details = currentLpmhBreakdown();\n      const rows = [\n        [\"Lifts\", details.lifts],\n        [\"Flips\", details.flips],\n        [\"Total moves\", `${details.lifts} + ${details.flips} = ${details.totalMoves}`],\n        [\"Current 1st + 2nd hrs\", details.rawShiftHours.toFixed(1)],\n        [\"0000-0300 hrs\", details.previousHours.toFixed(1)],\n        [\"Total hrs\", `${details.rawShiftHours.toFixed(1)} + ${details.previousHours.toFixed(1)} = ${details.shiftHours.toFixed(1)}`]\n      ];\n      const formula = `${details.totalMoves} MOVES / ${details.shiftHours.toFixed(1)} HRS = ${details.currentRate.toFixed(1)}`;\n      lpmhDetails.innerHTML = [\n        ...rows.map(([label, value]) => `<div class=\"lpmh-row\"><span>${escapeHtml(label)}</span><span>${escapeHtml(value)}</span></div>`),\n        `<div class=\"lpmh-formula\">${escapeHtml(formula)}</div>`\n      ].join(\"\");\n    }\n\n    function showCurrentLpmhModal() {\n      renderCurrentLpmhDetails();\n      lpmhModal.classList.add(\"open\");\n      lpmhModal.setAttribute(\"aria-hidden\", \"false\");\n    }\n\n    function closeCurrentLpmhModal() {\n      lpmhModal.classList.remove(\"open\");\n      lpmhModal.setAttribute(\"aria-hidden\", \"true\");\n    }\n\n    function applyDayforcePunches() {\n      const saved = localStorage.getItem(dayforceStorageKey);\n      if (!saved) return;\n\n      try {\n        const punches = JSON.parse(saved);\n        if (!Array.isArray(punches)) return;\n\n        const visibleNames = new Set(Array.from(document.querySelectorAll(\".time-table tbody td.name\"))\n          .map((cell) => normalizeName(cell.textContent)));\n        const rosterPunches = punches.filter((item) => visibleNames.has(normalizeName(item.name || \"\")));\n        if (rosterPunches.length !== punches.length) {\n          localStorage.setItem(dayforceStorageKey, JSON.stringify(rosterPunches));\n        }\n\n        const byName = new Map(rosterPunches.map((item) => [normalizeName(item.name || \"\"), item]));\n        document.querySelectorAll(\".time-table tbody tr\").forEach((row) => {\n          const nameCell = row.querySelector(\"td.name\");\n          if (!nameCell) return;\n          delete row.dataset.absenceNote;\n          delete row.dataset.absenceUnpaid;\n          delete row.dataset.absencePaid;\n          delete row.dataset.absenceHours;\n          delete row.dataset.workdayKey;\n\n          const punch = byName.get(normalizeName(nameCell.textContent));\n          if (!punch) {\n            updateOffDayNoteForRow(row);\n            updateMissingStartForRow(row);\n            return;\n          }\n          const punchDayKey = dayKeyFromDateValue(punch.date);\n          if (punchDayKey) row.dataset.workdayKey = punchDayKey;\n          const note = String(punch.note || punch.reason || \"\").trim();\n          if (note) {\n            row.dataset.absenceNote = note;\n            row.dataset.absenceUnpaid = punch.absenceUnpaid ? \"1\" : \"\";\n            row.dataset.absencePaid = punch.absencePaid ? \"1\" : \"\";\n            row.dataset.absenceHours = punch.absenceHours || \"\";\n          }\n\n          const inputs = row.querySelectorAll(\".time-cell input\");\n          const rawLunch = String(punch.lunch || \"\").trim();\n          const noLunch = rawLunch.toUpperCase() === \"NO\";\n          const lunchValue = noLunch ? \"\" : toMilitaryRange(rawLunch);\n          const values = [toMilitaryTime(punch.start), noLunch ? \"NO\" : (lunchValue ? \"YES\" : \"\"), toMilitaryTime(punch.end)];\n          inputs.forEach((input, index) => {\n            const hasMissingLunch = index === 1 && !note && !values[index] && (values[0] || values[2]);\n            input.value = hasMissingLunch ? \"??\" : values[index] || \"\";\n            input.classList.toggle(\"imported\", Boolean(values[index]) && !hasMissingLunch);\n            input.classList.toggle(\"missing-lunch\", hasMissingLunch);\n          });\n          calculateActualForRow(row);\n        });\n        updateStartCounts();\n        updateActualHeaders();\n        updateCurrentLpmh();\n      } catch (error) {\n        localStorage.removeItem(dayforceStorageKey);\n      }\n    }\n\n    document.addEventListener(\"input\", (event) => {\n      if (event.target.matches(\".note-input\")) {\n        saveManualNote stener(\"click\", closeCurrentLpmhModal);\n    modal.addEventListener(\"click\", (event) => {\n      if (event.target === modal) closeTomorrowOffModal();\n    });\n    lpmhModal.addEventListener(\"click\", (event) => {\n      if (event.target === lpmhModal) closeCurrentLpmhModal();\n    });\n    document.addEventListener(\"keydown\", (event) => {\n      if (event.key === \"Escape\") {\n        closeTomorrowOffModal();\n        closeCurrentLpmhModal();\n      }\n    });\n\n    applyTimesheetSettings();\n    updateShiftEndMode(false);\n    updateOffDaysFromRoster();\n    applyDayforcePunches();\n    updateScheduledHighlights();\n    calculateActualHours();\n    sortAllShiftsByStatus();\n    setInterval(calculateActualHours, 60000);\n  <\/script>\n</body>\n</html>\n" },

to;\n    }\n\n    .md-import-tray .excel-preview-table td,\n    .md-import-tray .excel-preview-table th {\n      min-width: 72px;\n      max-width: 260px;\n      text-align: left;\n      white-space: nowrap;\n    }\n\n    .md-import-tray .excel-preview-table .extracted-name {\n      background: #c6efce;\n      color: #006100;\n      box-shadow: inset 0 0 0 2px #00b050;\n    }\n\n    .md-import-tray .excel-preview-table .header-cell {\n      background: #d9e8f7;\n      color: #0f172a;\n      font-weight: 900;\n    }\n\n    .md-import-tray .empty {\n      padding: 14px 18px;\n      color: #64748b;\n      font-weight: 800;\n      text-align: center;\n    }\n\n    @media (max-width: 860px) {\n      .md-import-tray .import-panel {\n        grid-template-columns: 1fr;\n      }\n\n      .md-import-tray .file-row,\n      .md-import-tray .missing-roster-row {\n        grid-template-columns: 1fr;\n      }\n    }\n  </style>\n  <script src=\"https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js\"><\/script>\n</head>\n<body>\n  <main class=\"canvas\">\n    <datalist id=\"timesheetNoteOptions\">\n      <option value=\"-\"></option>\n      <option value=\"C/O\"></option>\n      <option value=\"SICK\"></option>\n      <option value=\"NO CALL NO SHOW\"></option>\n      <option value=\"VACATION\"></option>\n      <option value=\"LATE\"></option>\n      <option value=\"SENT HOME\"></option>\n      <option value=\"CAME IN OFF DAY\"></option>\n      <option value=\"OPS COVERING\"></option>\n      <option value=\"FLOATING HOLIDAY\"></option>\n      <option value=\"LEFT EARLY APPROVED\"></option>\n      <option value=\"LEFT EARLY?\"></option>\n      <option value=\"OTHER\"></option>\n      <option value=\"UNKNOWN??\"></option>\n    </datalist>\n    <section class=\"panel\">\n      <header class=\"hero\">\n        <div class=\"hero-title\">\n          <h1>Time Input - Daily Sheet</h1>\n        </div>\n        <div class=\"hero-meta\">\n          <div class=\"hero-actions\">\n            <button type=\"button\" class=\"export-button\" id=\"exportTimesheetMd\">Export</button>\n            <button type=\"button\" class=\"archive-button\" id=\"archivePopupButton\">Archive</button>\n            <button type=\"button\" class=\"compare-button\" id=\"comparePopupButton\">Compare</button>\n            <button type=\"button\" class=\"kpi-toggle-button\" id=\"kpiToggleButton\" aria-controls=\"kpiStrip\" aria-expanded=\"false\">KPIs</button>\n            <button type=\"button\" class=\"old-view-button\" id=\"oldViewButton\">OLD VIEW</button>\n          </div>\n          <div class=\"hero-date\">\n            <input class=\"header-date-input\" id=\"sheetDateInput\" type=\"date\" aria-label=\"Timesheet date\" />\n          </div>\n        </div>\n      </header>\n\n      <section class=\"md-import-tray\" id=\"mdImportTray\" aria-label=\"Timesheet import tools\">\n        <div class=\"md-import-title\">\n          <span>Import Tools</span>\n          <span class=\"status\" id=\"status\">Ready</span>\n        </div>\n        <div class=\"push-notice\" id=\"pushNotice\" hidden>\n              Imported data auto-applies to the Timesheet table. Unmatched names stay here for review.\n            </div>\n        \n            <section class=\"import-panel\">\n              <div class=\"file-stack\">\n                <div class=\"file-row\">\n                  <span>PUNCH XLSX:</span>\n                  <input type=\"file\" id=\"fileInput\" accept=\".xlsx,.xls\" />\n                </div>\n                <div class=\"file-row\">\n                  <span>NOTE SCAN XLSX:</span>\n                  <input type=\"file\" id=\"noteFileInput\" accept=\".xlsx,.xls\" />\n                </div>\n                <div class=\"file-row\">\n                  <span>PREV TIMESHEET:</span>\n                  <div class=\"file-control\">\n                    <input type=\"file\" id=\"previousTimesheetInput\" accept=\".xlsx,.xls\" />\n                    <span class=\"previous-timesheet-status\" id=\"previousTimesheetStatus\">0.0 HRS</span>\n                  </div>\n                </div>\n              </div>\n              <div class=\"buttons\">\n                <button type=\"button\" id=\"saveButton\" hidden>Auto Apply</button>\n                <div class=\"clear-split\" id=\"clearSplit\">\n                  <button type=\"button\" class=\"secondary\" id=\"clearDefaultButton\">Clear</button>\n                  <button type=\"button\" class=\"secondary clear-split-toggle\" id=\"clearMenuButton\" aria-label=\"Clear options\" aria-expanded=\"false\"></button>\n                  <div class=\"clear-menu\" id=\"clearMenu\">\n                    <button type=\"button\" data-clear-action=\"punch\">Clear Punches</button>\n                    <button type=\"button\" data-clear-action=\"note\">Clear Note Scan</button>\n                    <button type=\"button\" data-clear-action=\"previous\">Clear Prev Time</button>\n                  </div>\n                </div>\n              </div>\n            </section>\n        \n            <section class=\"missing-roster-panel\" id=\"missingRosterPanel\" hidden>\n              <div class=\"missing-roster-title\">\n                <span>Extracted Names Not On Roster</span>\n                <span id=\"missingRosterCount\">0 names</span>\n              </div>\n              <div class=\"missing-roster-body\" id=\"missingRosterBody\"></div>\n            </section>\n        \n            <section class=\"excel-preview\" id=\"excelPreviewSection\" hidden>\n              <div class=\"preview-title\">\n                <div class=\"preview-left\">\n                  <button type=\"button\" class=\"preview-pill\" id=\"excelPreviewToggle\" aria-expanded=\"false\">\n                    Time Entry Import Preview Click to Review\n                  </button>\n                  <div class=\"archive-calendar-tools\">\n                    <label for=\"archiveCalendarDate\">Date</label>\n                    <input id=\"archiveCalendarDate\" type=\"date\" aria-label=\"Archive calendar date\" />\n                    <button type=\"button\" class=\"archive-calendar-button\" id=\"archiveCalendarButton\">Archive Calendar</button>\n                  </div>\n                </div>\n                <span class=\"preview-count\" id=\"excelPreviewCount\">0 out of 0 matched to schedule</span>\n              </div>\n              <div class=\"excel-preview-wrap\" id=\"excelPreviewWrap\">\n                <table class=\"excel-preview-table\" aria-label=\"Raw Excel preview\">\n                  <thead id=\"excelPreviewHead\"></thead>\n                  <tbody id=\"excelPreviewBody\"></tbody>\n                </table>\n              </div>\n            </section>\n        \n            <table class=\"dayforce-table import-record-table\" aria-label=\"Imported record staging table\" hidden>\n              <colgroup>\n                <col class=\"name\" />\n                <col class=\"date\" />\n                <col class=\"start\" />\n                <col class=\"lunch\" />\n                <col class=\"end\" />\n                <col class=\"note\" />\n              </colgroup>\n              <thead>\n                <tr>\n                  <th>Employee</th>\n                  <th>Date</th>\n                  <th>Start</th>\n                  <th>Lunch</th>\n                  <th>End</th>\n                  <th>Note</th>\n                </tr>\n              </thead>\n              <tbody id=\"previewBody\"></tbody>\n            </table>\n            <div class=\"empty\" id=\"emptyState\" hidden>No imported records yet.</div>\n        \n            <section class=\"previous-timesheet-preview\" id=\"previousTimesheetPreview\" hidden>\n              <div class=\"preview-title\">\n                <span>Previous Timesheet Preview</span>\n                <span class=\"preview-count\" id=\"previousTimesheetPreviewCount\">0 rows</span>\n              </div>\n              <table class=\"dayforce-table previous-timesheet-table\" aria-label=\"Previous timesheet restore preview\">\n                <colgroup>\n                  <col class=\"name\" />\n                  <col class=\"date\" />\n                  <col class=\"time\" />\n                  <col class=\"time\" />\n                  <col class=\"time\" />\n                  <col class=\"actual\" />\n                </colgroup>\n                <thead>\n                  <tr>\n                    <th>Employee</th>\n                    <th>Date</th>\n                    <th>Start</th>\n                    <th>Lunch</th>\n                    <th>End</th>\n                    <th>Actual</th>\n                  </tr>\n                </thead>\n                <tbody id=\"previousTimesheetPreviewBody\"></tbody>\n              </table>\n            </section>\n      </section>\n\n      <div class=\"prev-timesheet-warning\" id=\"prevTimesheetWarning\" hidden>\n        Prev Timesheet Not Imported\n      </div>\n\n      <section class=\"kpis hidden\" id=\"kpiStrip\" aria-label=\"Daily performance goals\">\n        <label class=\"kpi\">\n          <div class=\"kpi-label\">Lifts</div>\n          <input id=\"updateLifts\" type=\"number\" min=\"0\" value=\"339\" aria-label=\"Update lifts count\" />\n        </label>\n        <label class=\"kpi\">\n          <div class=\"kpi-label\">Flips</div>\n          <input id=\"updateFlips\" type=\"number\" min=\"0\" value=\"5\" aria-label=\"Update flips count\" />\n        </label>\n        <label class=\"kpi\">\n          <div class=\"kpi-label\">Shift End</div>\n          <select id=\"shiftEndSelect\" aria-label=\"Shift end preset\">\n            <option value=\"1500\">1500</option>\n            <option value=\"2400\">2400</option>\n            <option value=\"other\">Other</option>\n          </select>\n          <input class=\"custom-shift-end\" id=\"shiftEndOther\" inputmode=\"numeric\" maxlength=\"4\" placeholder=\"0000\" aria-label=\"Custom shift end time\" />\n        </label>\n        <div class=\"kpi\">\n          <div class=\"kpi-label\">Lifts Needed</div>\n          <div class=\"kpi-value\" id=\"liftsNeeded\">0</div>\n        </div>\n        <button type=\"button\" class=\"kpi accent\" id=\"currentLpmhButton\" aria-haspopup=\"dialog\" aria-controls=\"lpmhModal\">\n          <div class=\"kpi-label\">Current LPMH</div>\n          <div class=\"kpi-value\" id=\"currentLpmh\">0.0</div>\n        </button>\n        <div class=\"kpi\" id=\"lphNeededCard\">\n          <div class=\"kpi-label\">LPH Needed</div>\n          <div class=\"kpi-value\" id=\"lphNeeded\">0.0</div>\n        </div>\n        <div class=\"kpi\" id=\"liftsRemainCard\">\n          <div class=\"kpi-label\">Lifts Remain</div>\n          <div class=\"kpi-value\" id=\"liftsRemain\">0</div>\n        </div>\n      </section>\n\n      <section class=\"cards\" id=\"shiftCards\" aria-label=\"Timesheet shift cards\"></section>\n\n      <footer class=\"legend\">\n        <span><span class=\"swatch in\"></span>Clocked in</span>\n        <span><span class=\"swatch\"></span>Scheduled open</span>\n        <span><span class=\"swatch missing\"></span>Exception</span>\n        <span><span class=\"swatch absence\"></span>Off-day / absence</span>\n        <span class=\"right\">?? lunch pending / projected out uses current time</span>\n      </footer>\n    </section>\n  </main>\n\n  <div class=\"modal-backdrop\" id=\"lpmhModal\" aria-hidden=\"true\">\n    <section class=\"lpmh-modal\" role=\"dialog\" aria-modal=\"true\" aria-labelledby=\"lpmhModalTitle\">\n      <header>\n        <div id=\"lpmhModalTitle\">CURRENT LPMH</div>\n        <button type=\"button\" id=\"closeLpmhModal\">X</button>\n      </header>\n      <div class=\"lpmh-details\" id=\"lpmhDetails\"></div>\n    </section>\n  </div>\n\n  <script>\n    const dayAliases = {\n      sun: \"sun\", sunday: \"sun\",\n      mon: \"mon\", monday: \"mon\",\n      tue: \"tue\", tues: \"tue\", tuesday: \"tue\",\n      wed: \"wed\", weds: \"wed\", wednesday: \"wed\",\n      thu: \"thu\", thur: \"thu\", thurs: \"thu\", thursday: \"thu\",\n      fri: \"fri\", friday: \"fri\",\n      sat: \"sat\", saturday: \"sat\"\n    };\n\n    const todayKey = [\"sun\", \"mon\", \"tue\", \"wed\", \"thu\", \"fri\", \"sat\"][new Date().getDay()];\n    const rosterStorageKey = \"conglobal-roster-state-v1\";\n    const rosterAdditionsKey = \"conglobal-roster-additions-v1\";\n    const dayforceStorageKey = \"conglobal-dayforce-punches-v1\";\n    const previousTimesheetStorageKey = \"conglobal-previous-timesheet-hours-v1\";\n    const timesheetSettingsKey = \"conglobal-timesheet-settings-v1\";\n    const timesheetNotesKey = \"conglobal-timesheet-notes-v1\";\n    const timeOffStorageKey = \"conglobal-time-off-calendar-v1\";\n    const timeOffReasonLabels = {\n      SIC: \"Sick\",\n      VAC: \"Vacation\",\n      FLO: \"Floating Holiday\",\n      HOL: \"Holiday\"\n    };\n    const rosterDayLabels = [\"Mon\", \"Tues\", \"Wed\", \"Thurs\", \"Fri\", \"Sat\", \"Sun\"];\n    const lpmhGoal = 2.0;\n    const cards = document.getElementById(\"shiftCards\");\n    const lpmhModal = document.getElementById(\"lpmhModal\");\n    const lpmhDetails = document.getElementById(\"lpmhDetails\");\n    const prevTimesheetWarning = document.getElementById(\"prevTimesheetWarning\");\n\n    function readTimesheetSettings() {\n      try {\n        const saved = JSON.parse(localStorage.getItem(timesheetSettingsKey) || \"null\");\n        return saved && typeof saved === \"object\" ? saved : {};\n      } catch (error) {\n        localStorage.removeItem(timesheetSettingsKey);\n        return {};\n      }\n    }\n\n    function writeTimesheetSettings() {\n      localStorage.setItem(timesheetSettingsKey, JSON.stringify({\n        lifts: Number(document.getElementById(\"updateLifts\").value) || 0,\n        flips: Number(document.getElementById(\"updateFlips\").value) || 0,\n        shiftEndMode: document.getElementById(\"shiftEndSelect\").value,\n        shiftEndCustom: document.getElementById(\"shiftEndOther\").value.trim(),\n        kpisVisible: document.getElementById(\"kpiToggleButton\").getAttribute(\"aria-expanded\") === \"true\",\n        sheetDate: selectedSheetDateValue()\n      }));\n    }\n\n    function applyTimesheetSettings() {\n      const settings = readTimesheetSettings();\n      if (settings.lifts !== undefined) document.getElementById(\"updateLifts\").value = settings.lifts;\n      if (settings.flips !== undefined) document.getElementById(\"updateFlips\").value = settings.flips;\n      if (settings.shiftEndMode) document.getElementById(\"shiftEndSelect\").value = settings.shiftEndMode;\n      if (settings.shiftEndCustom !== undefined) document.getElementById(\"shiftEndOther\").value = settings.shiftEndCustom;\n      if (settings.sheetDate) document.getElementById(\"sheetDateInput\").value = settings.sheetDate;\n    }\n\n    function setKpisVisible(visible, shouldSave = false) {\n      const strip = document.getElementById(\"kpiStrip\");\n      const button = document.getElementById(\"kpiToggleButton\");\n      strip.classList.toggle(\"hidden\", !visible);\n      button.classList.toggle(\"active\", visible);\n      button.setAttribute(\"aria-expanded\", String(visible));\n      button.textContent = visible ? \"Hide KPIs\" : \"KPIs\";\n      if (shouldSave) writeTimesheetSettings();\n      scheduleColumnBalance();\n    }\n\n    const defaultRoster = {\n      first: [\n        [\"Branford Alton\", \"Mon, Tues\"],\n        [\"Castruita Armando\", \"Wed, Thurs\"],\n        [\"Frazer Dacoyea\", \"Mon, Tues\"],\n        [\"Citizen Dante\", \"Thurs, Fri\"],\n        [\"Towler Demetrius\", \"Thurs, Fri\"],\n        [\"Stewart Dexter\", \"Sat, Sun\"],\n        [\"Gardner Dorrean\", \"Tues, Wed\"],\n        [\"Thomas Henry\", \"Sat, Sun\"],\n        [\"Brown James\", \"Thurs, Fri\"],\n        [\"Herrera Jose\", \"Sat, Sun\"],\n        [\"Player Keyston\", \"Mon, Sun\"],\n        [\"Hickman Makia\", \"Mon, Sun\"],\n        [\"Dever Mikey\", \"Tues, Wed\"],\n        [\"Wanza Myles\", \"Mon, Tues\"],\n        [\"Romero Nelson\", \"Tues, Wed\"],\n        [\"McDaniel Charles\", \"Fri, Sat\"],\n        [\"Nava Ramon\", \"Sat, Sun\"],\n        [\"Tran Tyler\", \"Thurs, Fri\"]\n      ],\n      second: [\n        [\"Carruthers Timothy\", \"Mon, Sun\"],\n        [\"Caceres Virula Victor\", \"Mon, Tues\"],\n        [\"Keme Aweri Jr.\", \"Mon, Tues\"],\n        [\"Hosey Kevin\", \"Mon, Tues\"],\n        [\"Brown Brandy\", \"Wed, Thurs\"],\n        [\"Mejia Aaron\", \"Thurs, Fri\"],\n        [\"Bookman Derrell\", \"Thurs, Fri\"],\n        [\"Hopkins Alexander\", \"Mon, Sun\"],\n        [\"Tingle Jason\", \"Sat, Sun\"],\n        [\"Contreras Marco\", \"Sat, Sun\"],\n        [\"Benavides Robert\", \"Wed, Sun\"],\n        [\"Urtado Ernest\", \"Tues, Wed\"],\n        [\"Johnson Messiah\", \"Tues, Thurs\"],\n        [\"Gilder Rufus II\", \"Tues, Wed\"],\n        [\"Echendu Chimenierm\", \"Wed, Thurs\"],\n        [\"Delgado Jose\", \"Fri, Sat\"]\n      ],\n      gate: [\n        [\"Candace Warren\", \"Sat, Sun\"],\n        [\"Connie Johnson\", \"Sat, Sun\"],\n        [\"Jarade Douglas\", \"Sat, Sun\"],\n        [\"Gregory Watson II\", \"Sat, Sun\"],\n        [\"Bryce Alexander\", \"Thurs, Fri\"],\n        [\"Naomisha Hunt\", \"Thurs, Fri, Sat\"],\n        [\"Ramacacondra Pratt\", \"Thurs, Fri\"],\n        [\"Kane Cabral\", \"Mon, Tues\"],\n        [\"Tavares Gariet\", \"Mon, Tues\"]\n      ]\n    };\n\n    const shiftLabels = {\n      first: \"1st Shift\",\n      second: \"2nd Shift\",\n      gate: \"Gate\",\n      mechanics: \"Mechanics\",\n      managers: \"Managers\"\n    };\n\n    function escapeHtml(value) {\n      return String(value).replace(/[&<>\"']/g, (char) => ({\n        \"&\": \"&amp;\",\n        \"<\": \"&lt;\",\n        \">\": \"&gt;\",\n        '\"': \"&quot;\",\n        \"'\": \"&#39;\"\n      }[char]));\n    }\n\n    function normalizeName(name) {\n      const suffixes = new Set([\"jr\", \"sr\", \"ii\", \"iii\", \"iv\"]);\n      return String(name || \"\")\n        .trim()\n        .toLowerCase()\n        .replace(/[,.]/g, \" \")\n        .replace(/\\bcontrerras\\b/g, \"contreras\")\n        .replace(/\\s+/g, \" \")\n        .split(\" \")\n        .filter((part) => part && !suffixes.has(part))\n        .sort()\n        .join(\" \");\n    }\n\n    function readManualNotes() {\n      try {\n        const saved = JSON.parse(localStorage.getItem(timesheetNotesKey) || \"{}\");\n        return saved && typeof saved === \"object\" && !Array.isArray(saved) ? saved : {};\n      } catch (error) {\n        localStorage.removeItem(timesheetNotesKey);\n        return {};\n      }\n    }\n\n    function getManualNote(name) {\n      const key = normalizeName(name);\n      if (!key) return \"\";\n      return String(readManualNotes()[key] || \"\").trim();\n    }\n\n    function isRealNoteValue(value) {\n      const text = String(value || \"\").trim();\n      return Boolean(text && text !== \"-\");\n    }\n\n    function saveManualNote(name, value) {\n      const key = normalizeName(name);\n      if (!key) return;\n      const notes = readManualNotes();\n      const text = String(value || \"\").trim();\n      if (isRealNoteValue(text)) notes[key] = text;\n      else delete notes[key];\n      localStorage.setItem(timesheetNotesKey, JSON.stringify(notes));\n    }\n\n    function noteInputHtml(name, value, className = \"\") {\n      const classes = [\"note-input\", className, isRealNoteValue(value) ? \"has-note\" : \"\"].filter(Boolean).join(\" \");\n      return `<input type=\"text\" class=\"${classes}\" list=\"timesheetNoteOptions\" autocomplete=\"off\" data-note-name=\"${escapeHtml(name)}\" value=\"${escapeHtml(value)}\" placeholder=\"\" aria-label=\"${escapeHtml(name)} note\" title=\"Select a note or type custom text\" />`;\n    }\n\n    function parseOffDays(text) {\n      return new Set(String(text || \"\")\n        .split(\",\")\n        .map((item) => item.trim().toLowerCase())\n        .map((item) => dayAliases[item] || dayAliases[item.slice(0, 3)])\n        .filter(Boolean));\n    }\n\n    function rosterOffDaysLabel(days) {\n      return days\n        .map((day, index) => day === \"O\" ? rosterDayLabels[index] : \"\")\n        .filter(Boolean)\n        .join(\", \");\n    }\n\n    function migrateMcDanielToDays(state) {\n      if (!state || !Array.isArray(state.second)) return state;\n      if (!Array.isArray(state.first)) state.first = [];\n      const alreadyOnDays = state.first.some((employee) => normalizeName(employee.name || \"\") === \"charles mcdaniel\");\n      const secondIndex = state.second.findIndex((employee) => normalizeName(employee.name || \"\") === \"charles mcdaniel\");\n      if (secondIndex === -1) return state;\n      const [employee] = state.second.splice(secondIndex, 1);\n      if (!alreadyOnDays) state.first.push(employee);\n      localStorage.setItem(rosterStorageKey, JSON.stringify(state));\n      return state;\n    }\n\n    function readRosterAdditions() {\n      try {\n        const additions = JSON.parse(localStorage.getItem(rosterAdditionsKey) || \"[]\");\n        return Array.isArray(additions) ? additions : [];\n      } catch (error) {\n        localStorage.removeItem(rosterAdditionsKey);\n        return [];\n      }\n    }\n\n    function buildRoster() {\n      const roster = Object.fromEntries(Object.entries(defaultRoster).map(([key, rows]) => [\n        key,\n        rows.map(([name, offDays]) => ({ name, offDays }))\n      ]));\n\n      try {\n        const saved = localStorage.getItem(rosterStorageKey);\n        if (saved) {\n          const state = migrateMcDanielToDays(JSON.parse(saved));\n          [\"first\", \"second\", \"gate\", \"mechanics\", \"managers\"].forEach((key) => {\n            if (!Array.isArray(state[key])) return;\n            roster[key] = state[key]\n              .filter((employee) => employee && employee.name)\n              .map((employee) => ({\ n\n    function textWidthForElement(element, text) {\n      if (!measureCanvas) measureCanvas = document.createElement(\"canvas\");\n      const context = measureCanvas.getContext(\"2d\");\n      const style = window.getComputedStyle(element);\n      context.font = `${style.fontWeight} ${style.fontSize} ${style.fontFamily}`;\n      const padding = (parseFloat(style.paddingLeft) || 0) + (parseFloat(style.paddingRight) || 0);\n      return context.measureText(String(text || \"\")).width + padding + 4;\n    }\n\n    function cellOverflowAmount(cell) {\n      const input = cell.querySelector(\"input\");\n      const target = input || cell;\n      const requiredWidth = input\n        ? textWidthForElement(input, input.value || input.placeholder || \"\")\n        : target.scrollWidth;\n      return Math.max(0, requiredWidth - target.clientWidth);\n    }\n\n    function balanceShiftCardColumns(card) {\n      const rows = Array.from(card.querySelectorAll(\".shift-head, .md-row\"));\n      if (!rows.length) return;\n      const overflows = Array(7).fill(0);\n\n      rows.forEach((row) => {\n        Array.from(row.children).slice(0, 7).forEach((cell, index) => {\n          overflows[index] = Math.max(overflows[index], cellOverflowAmount(cell));\n        });\n      });\n\n      if (Math.max(...overflows) < 2) {\n        card.style.setProperty(\"--md-grid-columns\", equalGridColumns);\n        return;\n      }\n\n      const columns = overflows.map((amount) => {\n        const boost = Math.min(.42, amount / 130);\n        return \"minmax(0, \" + (1 + boost).toFixed(3) + \"fr)\";\n      });\n      card.style.setProperty(\"--md-grid-columns\", columns.join(\" \"));\n    }\n\n    function balanceColumnWidths() {\n      const shiftCards = Array.from(document.querySelectorAll(\".shift-card\"));\n      shiftCards.forEach((card) => card.style.setProperty(\"--md-grid-columns\", equalGridColumns));\n      requestAnimationFrame(() => {\n        shiftCards.forEach(balanceShiftCardColumns);\n      });\n    }\n\n    function scheduleColumnBalance() {\n      cancelAnimationFrame(columnBalanceFrame);\n      columnBalanceFrame = requestAnimationFrame(balanceColumnWidths);\n    }\n    function shiftEndValue() {\n      const preset = document.getElementById(\"shiftEndSelect\").value;\n      if (preset !== \"other\") return preset;\n      return document.getElementById(\"shiftEndOther\").value.trim().padStart(4, \"0\");\n    }\n\n    function hoursUntilShiftEnd(value) {\n      const endMinutes = minutesFromMilitary(value);\n      if (endMinutes === null) return 0;\n      let remaining = endMinutes - currentMinutes();\n      if (remaining <= 0) remaining += 1440;\n      return remaining / 60;\n    }\n\n    function currentLpmhBreakdown(rowsByShift) {\n      const lifts = Number(document.getElementById(\"updateLifts\").value) || 0;\n      const flips = Number(document.getElementById(\"updateFlips\").value) || 0;\n      const firstHours = (rowsByShift.first || []).reduce((sum, row) => sum + row.actual, 0);\n      const secondHours = (rowsByShift.second || []).reduce((sum, row) => sum + row.actual, 0);\n      const currentHours = firstHours + secondHours;\n      const previousHours = previousShiftHours();\n      const shiftHours = currentHours + previousHours;\n      const totalMoves = Math.max(lifts + flips, 0);\n      const currentRate = shiftHours > 0 ? totalMoves / shiftHours : 0;\n      const neededValue = Math.ceil(shiftHours * lpmhGoal);\n      const remainValue = neededValue - totalMoves;\n      const remainingHours = hoursUntilShiftEnd(shiftEndValue());\n      const goalMet = shiftHours > 0 && currentRate >= lpmhGoal;\n      const neededLph = goalMet ? \"MET GOAL!\" : (remainingHours > 0 ? (Math.max(remainValue, 0) / remainingHours).toFixed(1) : \"0.0\");\n      return { lifts, flips, currentHours, previousHours, shiftHours, totalMoves, currentRate, neededValue, remainValue, remainingHours, goalMet, neededLph };\n    }\n\n    function updateMetrics(rowsByShift) {\n      const details = currentLpmhBreakdown(rowsByShift);\n      const lphNeededValue = document.getElementById(\"lphNeeded\");\n      const liftsRemainValue = document.getElementById(\"liftsRemain\");\n      document.getElementById(\"currentLpmh\").textContent = details.currentRate.toFixed(1);\n      lphNeededValue.textContent = details.neededLph;\n      document.getElementById(\"liftsNeeded\").textContent = String(details.neededValue);\n      liftsRemainValue.textContent = details.goalMet ? \"MET GOAL!\" : String(Math.max(details.remainValue, 0));\n      lphNeededValue.classList.toggle(\"goal-text\", details.neededLph === \"MET GOAL!\");\n      liftsRemainValue.classList.toggle(\"goal-text\", details.goalMet);\n      const currentLpmhCard = document.getElementById(\"currentLpmhButton\");\n      currentLpmhCard.classList.toggle(\"good\", details.currentRate >= lpmhGoal);\n      currentLpmhCard.classList.toggle(\"bad\", details.currentRate < lpmhGoal);\n      for (const card of [document.getElementById(\"lphNeededCard\"), document.getElementById(\"liftsRemainCard\")]) {\n        card.classList.toggle(\"good\", details.goalMet);\n        card.classList.toggle(\"warn\", !details.goalMet);\n      }\n      if (lpmhModal.classList.contains(\"open\")) renderCurrentLpmhDetails(rowsByShift);\n    }\n\n    function renderCurrentLpmhDetails(rowsByShift = makeRows()) {\n      const details = currentLpmhBreakdown(rowsByShift);\n      const rows = [\n        [\"Lifts\", details.lifts],\n        [\"Flips\", details.flips],\n        [\"Total moves\", `${details.lifts} + ${details.flips} = ${details.totalMoves}`],\n        [\"Current 1st + 2nd hrs\", details.currentHours.toFixed(1)],\n        [\"0000-0300 hrs\", details.previousHours.toFixed(1)],\n        [\"Total hrs\", `${details.currentHours.toFixed(1)} + ${details.previousHours.toFixed(1)} = ${details.shiftHours.toFixed(1)}`]\n      ];\n      const formula = `${details.totalMoves} MOVES / ${details.shiftHours.toFixed(1)} HRS = ${details.currentRate.toFixed(1)}`;\n      lpmhDetails.innerHTML = [\n        ...rows.map(([label, value]) => `<div class=\"lpmh-row\"><span>${escapeHtml(label)}</span><span>${escapeHtml(value)}</span></div>`),\n        `<div class=\"lpmh-formula\">${escapeHtml(formula)}</div>`\n      ].join(\"\");\n    }\n\n    function showCurrentLpmhModal() {\n      renderCurrentLpmhDetails(makeRows());\n      lpmhModal.classList.add(\"open\");\n      lpmhModal.setAttribute(\"aria-hidden\", \"false\");\n    }\n\n    function closeCurrentLpmhModal() {\n      lpmhModal.classList.remove(\"open\");\n      lpmhModal.setAttribute(\"aria-hidden\", \"true\");\n    }\n\n    function excelCell(value, attrs = \"\") {\n      return `<td${attrs}>${escapeHtml(value === undefined || value === null ? \"\" : value)}</td>`;\n    }\n\n    function exportEditableFieldIfNeeded() {\n      const active = document.activeElement;\n      if (active && active.matches && active.matches(\".time-edit[data-time-field]\")) {\n        saveTimeEdit(active.dataset.timeName || \"\", active.dataset.timeField || \"\", active.value);\n      }\n    }\n\n    function exportTimesheetMd() {\n      exportEditableFieldIfNeeded();\n      const rowsByShift = makeRows();\n      const todayLabel = selectedSheetDateLabel();\n      const parts = [\n        '<!DOCTYPE html><html><head><meta charset=\"UTF-8\" />',\n        '<style>',\n        'table{border-collapse:collapse;font-family:Arial,sans-serif;font-size:12px;}td,th{border:1px solid #999;padding:4px 7px;white-space:nowrap;}th{background:#d9d9d9;font-weight:700;} .title{font-size:16px;font-weight:700;background:#000;color:#fff;} .shift{background:#d9d9d9;font-weight:700;} .absence{background:#ede9fe;} .missing{background:#fff2cc;} .off{background:#f1f3f6;color:#64748b;}',\n        '</style></head><body><table>',\n        '<tr>' + excelCell(\"Time Input - Daily Sheet\", ' class=\"title\" colspan=\"7\"') + '</tr>',\n        '<tr>' + excelCell(todayLabel, ' colspan=\"7\"') + '</tr>'\n      ];\n\n      [\"first\", \"second\", \"gate\", \"mechanics\", \"managers\"].forEach((shiftKey) => {\n        const rows = rowsByShift[shiftKey] || [];\n        if (!rows.length) return;\n        const stats = sectionStats(rows, shiftKey);\n        parts.push('<tr>' +\n          excelCell(`${shiftHeaderLabel(shiftKey)} [${stats.scheduled} sch]`, ' class=\"shift\"') +\n          excelCell(\"Off Days\", ' class=\"shift\"') +\n          excelCell(\"Note\", ' class=\"shift\"') +\n          excelCell(`${stats.here} HERE, ${stats.out} OUT`, ' class=\"shift\"') +\n          excelCell(\"Lunch\", ' class=\"shift\"') +\n          excelCell(\"End\", ' class=\"shift\"') +\n          excelCell(`Actual ${stats.actual.toFixed(1)}`, ' class=\"shift\"') +\n        '</tr>');\n        stats.visibleRows.forEach((row) => {\n          const noteText = getManualNote(row.name) || row.note || (row.cameInOffDay ? \"Came In Off Day\" : \"\") || (row.invalid ? \"Invalid\" : \"\");\n          const endText = row.hasClockOut ? row.end : row.tempEnd;\n          const rowClassName = row.purpleAbsence || row.paidAbsence || row.unpaidAbsence ? ' class=\"absence\"' : (row.missing ? ' class=\"missing\"' : \"\");\n          parts.push('<tr>' +\n            excelCell(row.name, rowClassName) +\n            excelCell(row.offDays, rowClassName) +\n            excelCell(noteText, rowClassName) +\n            excelCell(row.missing ? \"Missing?\" : row.start, rowClassName) +\n            excelCell(row.lunch, rowClassName) +\n            excelCell(endText, rowClassName) +\n            excelCell(row.actual ? row.actual.toFixed(1) : \"\", rowClassName) +\n          '</tr>');\n        });\n        if (stats.offRows.length) {\n          parts.push('<tr>' + excelCell(`OFF - ${stats.offRows.length}`, ' class=\"off\"') + excelCell(stats.offRows.map((row) => row.name).join(\", \"), ' class=\"off\" colspan=\"6\"') + '</tr>');\n        }\n        parts.push('<tr>' + excelCell(\"\", ' colspan=\"7\" \n        .split(\" \")\n        .filter((part) => part && !suffixes.has(part))\n        .sort()\n        .join(\" \");\n    }\n\n    function defaultRosterRows() {\n      return Object.entries(defaultRoster).flatMap(([shift, rows]) => (\n        rows.map(([name]) => ({ name, shift }))\n      ));\n    }\n\n    function savedRosterRows(roster) {\n      return rosterShiftKeys.flatMap((shift) => (\n        Array.isArray(roster[shift])\n          ? roster[shift].filter((employee) => employee && employee.name).map((employee) => ({ name: employee.name, shift }))\n          : []\n      ));\n    }\n\n    function hasSavedRosterRows(roster) {\n      return rosterShiftKeys.some((shift) => Array.isArray(roster[shift]) && roster[shift].length);\n    }\n\n    function buildRosterRows() {\n      const rows = [];\n      const seen = new Set();\n      const addRows = (items) => {\n        items.forEach((employee) => {\n          const key = normalizeName(employee.name);\n          if (!key || seen.has(key)) return;\n          seen.add(key);\n          rows.push(employee);\n        });\n      };\n\n      try {\n        const roster = JSON.parse(localStorage.getItem(rosterStorageKey) || \"{}\");\n        addRows(hasSavedRosterRows(roster) ? savedRosterRows(roster) : defaultRosterRows());\n        const additions = JSON.parse(localStorage.getItem(rosterAdditionsKey) || \"[]\");\n        if (Array.isArray(additions)) {\n          addRows(additions.filter((employee) => employee && employee.name).map((employee) => ({\n            name: employee.name,\n            shift: employee.shift || \"first\"\n          })));\n        }\n      } catch (error) {\n        addRows(defaultRosterRows());\n      }\n\n      if (!rows.length) addRows(defaultRosterRows());\n      return rows;\n    }\n\n    function rosterNames() {\n      return buildRosterRows().map((employee) => employee.name);\n    }\n\n    function rosterLookup() {\n      const lookup = new Map();\n      buildRosterRows().forEach((employe || 0) * 60));\n    }\n\n    function editDistance(a, b) {\n      const dp = Array.from({ length: a.length + 1 }, () => Array(b.length + 1).fill(0));\n      for (let i = 0; i <= a.length; i += 1) dp[i][0] = i;\n      for (let j = 0; j <= b.length; j += 1) dp[0][j] = j;\n      for (let i = 1; i <= a.length; i += 1) {\n        for (let j = 1; j <= b.length; j += 1) {\n          const cost = a[i - 1] === b[j - 1] ? 0 : 1;\n          dp[i][j] = Math.min(dp[i - 1][j] + 1, dp[i][j - 1] + 1, dp[i - 1][j - 1] + cost);\n        }\n      }\n      return dp[a.length][b.length];\n    }\n\n    function matchRosterName(name, names) {\n      const normalized = normalizeName(name);\n      const exact = names.find((candidate) => normalizeName(candidate) === normalized);\n      if (exact) return { found: true, suggestion: exact, hasSuggestion: true, score: 0 };\n\n      const scored = names\n        .map((candidate) => ({ candidate, score: editDistance(normalized, normalizeName(candidate)) }))\n        .sort((a, b) => a.score - b.score);\n      const best = scored[0] || null;\n      const suggestionLimit = Math.max(2, Math.ceil(normalized.length * 0.35));\n      return {\n        found: false,\n        suggestion: best ? best.candidate : \"\",\n        hasSuggestion: Boolean(best && best.score <= suggestionLimit),\n        score: best ? best.score : Infinity\n      };\n    }\n\n    function cleanDayforceEmployeeName(value) {\n      return String(value)\n        .replace(/^employee\\s*:?\\s*/i, \"\")\n        .replace(/\\s+\\d{4,}\\s*$/, \"\")\n        .trim();\n    }\n\n    function displayNameFromDayforce(value) {\n      const cleaned = cleanDayforceEmployeeName(value);\n      if (!cleaned.includes(\",\")) return cleaned;\n\n      const [last, first] = cleaned.split(\",\").map((part) => part.trim());\n      return `${first} ${last}`.replace(/\\s+/g, \" \").trim();\n    }\n\n    function normalizePreviousTimesheetName(name) {\n      return normalizeName(String(name || \"\").replace(/\\s+\\d{4,}\\s*$/, \"\"));\n    }\n\n    function previousTimesheetImport() {\n      try {\n        const saved = JSON.parse(localStorage.getItem(previousTimesheetStorageKey) || \"null\");\n        return saved && typeof saved.hours === \"number\" ? saved : null;\n      } catch (error) {\n        localStorage.removeItem(previousTimesheetStorageKey);\n        return null;\n      }\n    }\n\n    function updatePreviousTimesheetStatus() {\n      const imported = previousTimesheetImport();\n      if (!previousTimesheetStatus) return;\n      if (!imported) {\n        previousTimesheetStatus.textContent = \"0.0 HRS\";\n        previousTimesheetStatus.title = \"\";\n        renderPreviousTimesheetPreview([]);\n        return;\n      }\n\n      const rowsText = imported.rows ? ` / ${imported.rows} ROWS` : \"\";\n      if (imported.source === \"timesheet-md-export\") {\n        const actual = Number(imported.actualHours || 0).toFixed(1);\n        const previous = Number(imported.hours || 0).toFixed(1);\n        previousTimesheetStatus.textContent = `${actual} ACTUAL / ${previous} PREV${rowsText}`;\n      } else {\n        previousTimesheetStatus.textContent = `${Number(imported.hours || 0).toFixed(1)} HRS${rowsText}`;\n      }\n      previousTimesheetStatus.title = imported.fileName ? `Imported from ${imported.fileName}` : \"\";\n      renderPreviousTimesheetPreview(Array.isArray(imported.records) ? imported.records : []);\n    }\n\n    function renderPreviousTimesheetPreview(records) {\n      if (!previousTimesheetPreview || !previousTimesheetPreviewBody) return;\n      previousTimesheetPreview.hidden = !records.length;\n      previousTimesheetPreviewCount.textContent = `${records.length} ${records.length === 1 ? \"row\" : \"rows\"}`;\n      if (!records.length) {\n        previousTimesheetPreviewBody.innerHTML = \"\";\n        return;\n      }\n\n      const groups = new Map();\n      records.forEach((record) => {\n        const label = record.shiftLabel || \"Previous Times
