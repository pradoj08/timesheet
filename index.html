ase()\n        .replace(/[,.]/g, \" \")\n        .replace(/\\bcontrerras\\b/g, \"contreras\")\n        .replace(/\\s+/g, \" \")\n        .split(\" \")\n        .filter((part) => part && !suffixes.has(part))\n        .sort()\n        .join(\" \");\n    }\n\n    function readRosterAdditions() {\n      try {\n        const additions = JSON.parse(localStorage.getItem(rosterAdditionsKey) || \"[]\");\n        return Array.isArray(additions) ? additions : [];\n      } catch (error) {\n        localStorage.removeItem(rosterAdditionsKey);\n        return [];\n      }\n    }\n\n    function rosterNameSet() {\n      return new Set(Array.from(document.querySelectorAll('table[data-roster] tbody .name'))\n        .map((cell) => normalizeRosterName(cell.textContent)));\n    }\n\n    function escapeHtml(value) {\n      return String(value).replace(/[&<>\"']/g, (char) => ({\n        \"&\": \"&amp;\",\n        \"<\": \"&lt;\",\n        \">\": \"&gt;\",\n        '\"': \"&quot;\",\n        \"'\": \"&#39;\"\n      }[char]));\n    }\n\n    function setShiftTitleCount(title, count, table) {\n      if (!title) return;\n      if (!title.dataset.label) {\n        title.dataset.label = title.textContent.replace(/\\s*\\[\\d+\\]/, \"\").replace(/\\s+/g, \" \").trim();\n      }\n\n      const headerLabel = table ? table.querySelector(\".section-head-label\") : null;\n      if (!headerLabel) return;\n      headerLabel.innerHTML = `\n        <span class=\"table-shift-title\">\n          <span>${escapeHtml(title.dataset.label)}</span>\n          <span class=\"staff-badge\">${count} staff</span>\n        </span>\n      `;\n    }\n\n    function updateTitleCount(form) {\n      const table = document.querySelector(`table[data-roster=\"${form.dataset.target}\"]`);\n      if (table) updateSectionCount(table);\n    }\n\n    function updateDailyTotals(table, offDays) {\n      const totals = table.querySelectorAll(\"tfoot .total-number\");\n      totals.forEach((cell, index) => {\n        if (!offDays.has(String(index))) {\n          cell.textContent = String(Number(cell.textContent) + 1);\n        }\n      });\n    }\n\n    function recalcDailyTotals(table) {\n      const totals = table.querySelectorAll(\"tfoot .total-number\");\n      totals.forEach((total, index) => {\n        const workCount = Array.from(table.querySelectorAll(\"tbody tr\")).filter((row) => {\n          const cell = row.children[index + 1];\n          return cell && cell.textContent.trim().toUpperCase() === \"W\";\n        }).length;\n        total.textContent = String(workCount);\n      });\n    }\n\n    function setSideTotal(labelText, value) {\n      const labels = Array.from(document.querySelectorAll(\".total-box .label\"));\n      const label = labels.find((item) => item.textContent.trim() === labelText);\n      if (!label || !label.nextElementSibling) return;\n      label.nextElementSibling.textContent = String(value);\n    }\n\n    function updateSideTotal(labelText, amount = 1) {\n      if (!labelText) return;\n      const labels = Array.from(document.querySelectorAll(\".total-box .label\"));\n      const label = labels.find((item) => item.textContent.trim() === labelText);\n      if (!label || !label.nextElementSibling) return;\n      label.nextElementSibling.textContent = String(Number(label.nextElementSibling.textContent) + amount);\n    }\n\n    function rowToData(row) {\n      const nameCell = row.querySelector(\".name\");\n      const role = [\"side\", \"crane\", \"everything\", \"lead\"].find((className) => nameCell.classList.contains(className)) || \"\";\n      return {\n        name: nameCell.textContent.trim(),\n        role,\n        days: Array.from(row.children).slice(1, 8).map((cell) => cell.textContent.trim().toUpperCase() === \"O\" ? \"O\" : \"W\")\n      };\n    }\n\n    function dataToRow(employee) {\n      const row = document.createElement(\"tr\");\n      const nameCell = document.createElement(\"td\");\n      nameCell.className = `name${employee.role ? ` ${employee.role}` : \"\"}`;\n      nameCell.textContent = employee.name;\n      row.appendChild(nameCell);\n\n      const days = Array.isArray(employee.days) ? employee.days : [\"W\", \"W\", \"W\", \"W\", \"W\", \"W\", \"W\"];\n      days.forEach((day) => {\n        const cell = document.createElement(\"td\");\n        const isOff = day === \"O\";\n        cell.className = isOff ? \"o\" : \"w\";\n        cell.textContent = isOff ? \"O\" : \"W\";\n        row.appendChild(cell);\n      });\n\n      addActionsToRow(row);\n      return row;\n    }\n\n    function captureRosterState() {\n      const state = {};\n      document.querySelectorAll(\"table[data-roster]\").forEach((table) => {\n        state[table.dataset.roster] = Array.from(table.querySelectorAll(\"tbody tr\")).map(rowToData);\n      });\n      return state;\n    }\n\n    function saveRosterState() {\n      localStorage.setItem(rosterStorageKey, JSON.stringify(captureRosterState()));\n    }\n\n    function updateSectionCount(table) {\n      const rosterId = table.dataset.roster;\n      const form = document.querySelector(`.add-row[data-target=\"${rosterId}\"]`);\n      const title = form ? form.previousElementSibling : null;\n      if (!title) return;\n      const count = table.querySelectorAll(\"tbody tr\").length;\n      setShiftTitleCount(title, count, table);\n    }\n\n    function refreshRosterNumbers() {\n      const rampCount = [\"first\", \"second\"].reduce((total, rosterId) => {\n        const table = document.querySelector(`table[data-roster=\"${rosterId}\"]`);\n        return total + (table ? table.querySelectorAll(\"tbody tr\").length : 0);\n      }, 0);\n      const gateTable = document.querySelector('table[data-roster=\"gate\"]');\n      const mechTable = document.querySelector('table[data-roster=\"mechanics\"]');\n\n      setSideTotal(\"RAMP TOTAL\", rampCount);\n      setSideTotal(\"GATE TOTAL\", gateTable ? gateTable.querySelectorAll(\"tbody tr\").length : 0);\n      setSideTotal(\"MECH TOTAL\", mechTable ? mechTable.querySelectorAll(\"tbody tr\").length : 0);\n\n      document.querySelectorAll(\"table[data-roster]\").forEach((table) => {\n        updateSectionCount(table);\n        recalcDailyTotals(table);\n      });\n    }\n\n    function migrateMcDanielToDays(state) {\n      if (!state || !Array.isArray(state.second)) return state;\n      if (!Array.isArray(state.first)) state.first = [];\n\n      const alreadyOnDays = state.first.some((employee) => normalizeRosterName(employee.name) === \"charles mcdaniel\");\n      const secondIndex = state.second.findIndex((employee) => normalizeRosterName(employee.name) === \"charles mcdaniel\");\n      if (secondIndex === -1) return state;\n\n      const [employee] = state.second.splice(secondIndex, 1);\n      if (!alreadyOnDays) state.first.push(employee);\n      localStorage.setItem(rosterStorageKey, JSON.stringify(state));\n      return state;\n    }\n\n    function loadRosterState() {\n      const saved = localStorage.getItem(rosterStorageKey);\n      if (!saved) return;\n\n      try {\n        const state = migrateMcDanielToDays(JSON.parse(saved));\n        Object.entries(state).forEach(([rosterId, employees]) => {\n          const table = document.querySelector(`table[data-roster=\"${rosterId}\"]`);\n          if (!table || !Array.isArray(employees)) return;\n\n          const body = table.querySelector(\"tbody\");\n          body.innerHTML = \"\";\n          employees.forEach((employee) => {\n            if (!employee || !employee.name || !Array.isArray(employee.days)) return;\n            body.appendChild(dataToRow(employee));\n          });\n        });\n        refreshRosterNumbers();\n      } catch (error) {\n        localStorage.removeItem(rosterStorageKey);\n      }\n    }\n\n    function applyPendingRosterAdditions() {\n      const additions = readRosterAdditions();\n      if (!additions.length) return;\n\n      const existing = rosterNameSet();\n      let added = 0;\n      additions.forEach((addition) => {\n        if (!addition || !addition.name) return;\n        const rosterId = addition.shift || \"first\";\n        const table = document.querySelector(`table[data-roster=\"${rosterId}\"]`);\n        const key = normalizeRosterName(addition.name);\n        if (!table || !key || existing.has(key)) return;\n\n        table.querySelector(\"tbody\").appendChild(dataToRow({\n          name: addition.name,\n          role: addition.role || \"\",\n          days: Array.isArray(addition.days) ? addition.days : [\"W\", \"W\", \"W\", \"W\", \"W\", \"W\", \"W\"]\n        }));\n        existing.add(key);\n        added += 1;\n      });\n\n      if (added) {\n        refreshRosterNumbers();\n        saveRosterState();\n      }\n      localStorage.removeItem(rosterAdditionsKey);\n    }\n\n    function addRosterRow(event) {\n      event.preventDefault();\n\n      const form = event.currentTarget;\n      const nameInput = form.elements.employee;\n      const employeeName = nameInput.value.trim();\n      if (!employeeName) return;\n\n      const rosterId = form.dataset.target;\n      const table = document.querySelector(`table[data-roster=\"${rosterId}\"]`);\n      const body = table.querySelector(\"tbody\");\n      const offDays = new Set(Array.from(form.querySelectorAll('input[name=\"off\"]:checked')).map((input) => input.value));\n      const role = form.elements.role.value;\n\n      const row = document.createElement(\"tr\");\n      const nameCell = document.createElement(\"td\");\n      nameCell.className = `name${role ? ` ${role}` : \"\"}`;\n      nameCell.textContent = employeeName;\n      row.appendChild(nameCell);\n\n      for (let day = 0; day < 7; day += 1) {\n        const cell = document.createElement(\"td\");\n        const isOff = offDays.has(String(day));\n        cell.className = isOff ? \"o\" : \"w\";\n        cell.textContent = isOff ? \"O\" : \"W\";\n        row.appendChild(cell);\n      }\n\n      addActionsToRow(row);\n      body.appendChild(row);\n      updateTitleCount(form, 1);\n      updateDailyTotals(table, offDays);\n      updateSideTotal(sectionTotals[rosterId]);\n      saveRosterState();\n      form.reset();\n      nameInput.focus();\n    }\n\n    function addActionsToTable(table) {\n      const headRow = table.querySelector(\"thead tr\");\n      const footerRow = table.querySelector(\"tfoot tr\");\n      const colgroup = table.querySelector(\"colgroup\");\n\n      if (colgroup && !colgroup.querySelector(\"col.actions\")) {\n        const col = document.createElement(\"col\");\n        col.className = \"actions\";\n        colgroup.appendChild(col);\n      }\n\n      if (headRow && !headRow.querySelector(\".action-head\")) {\n        const actionHead = document.createElement(\"th\");\n        actionHead.className = \"action-head\";\n        actionHead.textContent = \"Options\";\n        headRow.appendChild(actionHead);\n      }\n\n      if (footerRow && !footerRow.querySelector(\".actions-total\")) {\n        const actionTotal = document.createElement(\"td\");\n        actionTotal.className = \"actions-total\";\n        footerRow.appendChild(actionTotal);\n      }\n\n      table.querySelectorAll(\".employee-head, .day-head\").forEach((header, index) => {\n        const filter = header.querySelector(\".filter\");\n        if (!filter) return;\n        filter.setAttribute(\"role\", \"button\");\n        filter.setAttribute(\"tabindex\", \"0\");\n        filter.setAttribute(\"aria-label\", `Sort ${header.textContent.trim()}`);\n        filter.dataset.sortIndex = String(index);\n        filter.dataset.sortDirection = filter.dataset.sortDirection || \"asc\";\n      });\n\n      table.querySelectorAll(\"tbody tr\").forEach(addActionsToRow);\n    }\n\n    function addActionsToRow(row) {\n      if (row.querySelector(\".actions\")) return;\n\n      const cell = document.createElement(\"td\");\n      cell.className = \"actions\";\n      cell.innerHTML = `<button type=\"button\" class=\"row-action edit\" aria-label=\"Edit row\" title=\"Edit row\">${pencilIcon()}</button><button type=\"button\" class=\"row-action delete\" aria-label=\"Delete employee\" title=\"Delete employee\">${trashIcon()}</button>`;\n      row.appendChild(cell);\n    }\n\n    let rowBeingEdited = null;\n\n    function pencilIcon() {\n      return '<svg viewBox=\"0 0 24 24\" aria-hidden=\"true\"><path d=\"M12 20h9\" /><path d=\"M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z\" /></svg>';\n    }\n\n    function trashIcon() {\n      return '<svg viewBox=\"0 0 24 24\" aria-hidden=\"true\"><path d=\"M3 6h18\" /><path d=\"M8 6V4h8v2\" /><path d=\"M19 6l-1 15H6L5 6\" /><path d=\"M10 11v6\" /><path d=\"M14 11v6\" /></svg>';\n    }\n\n    function setEditButton(row, isEditing) {\n      const button = row.querySelector(\".row-action.edit\");\n      if (!button) return;\n      button.classList.toggle(\"saving\", isEditing);\n      button.innerHTML = isEditing ? \"Save\" : pencilIcon();\n      button.setAttribute(\"aria-label\", isEditing ? \"Save row changes\" : \"Edit row\");\n      button.setAttribute(\"title\", isEditing ? \"Save row changes\" : \"Edit row\");\n    }\n\n    function stopOffDayEditing() {\n      if (!rowBeingEdited) return;\n      const nameCell = rowBeingEdited.querySelector(\".name\");\n      if (nameCell) {\n        nameCell.textContent = nameCell.textContent.replace(/\\s+/g, \" \").trim();\n        nameCell.contentEditable = \"false\";\n      }\n      rowBeingEdited.classList.remove(\"editing-off\");\n      setEditButton(rowBeingEdited, false);\n      recalcDailyTotals(rowBeingEdited.closest(\"table\"));\n      saveRosterState();\n      rowBeingEdited = null;\n    }\n\n    function startOffDayEditing(row) {\n      if (rowBeingEdited && rowBeingEdited !== row) {\n        stopOffDayEditing();\n      }\n\n      rowBeingEdited = row;\n      row.classList.add(\"editing-off\");\n      const nameCell = row.querySelector(\".name\");\n      if (nameCell) {\n        nameCell.contentEditable = \"plaintext-only\";\n        nameCell.focus();\n        const selection = window.getSelection();\n        const range = document.createRange();\n        range.selectNodeContents(nameCell);\n        range.collapse(false);\n        selection.removeAllRanges();\n        selection.addRange(range);\n      }\n      setEditButton(row, true);\n    }\n\n    function toggleOffDayCell(cell) {\n      const isOff = cell.textContent.trim().toUpperCase() === \"O\";\n      cell.className = isOff ? \"w\" : \"o\";\n      cell.textContent = isOff ? \"W\" : \"O\";\n      recalcDailyTotals(cell.closest(\"table\"));\n    }\n\n    function deleteEmployee(row) {\n      const table = row.closest(\"table\");\n      const rosterId = table.dataset.roster;\n      const form = document.querySelector(`.add-row[data-target=\"${rosterId}\"]`);\n\n      row.remove();\n      if (form) updateTitleCount(form, -1);\n      recalcDailyTotals(table);\n      updateSideTotal(sectionTotals[rosterId], -1);\n      saveRosterState();\n    }\n\n    function clearDeleteConfirm(exceptButton) {\n      document.querySelectorAll(\".row-action.confirm-delete\").forEach((button) => {\n        if (button === exceptButton) return;\n        button.classList.remove(\"confirm-delete\");\n        button.innerHTML = trashIcon();\n        button.setAttribute(\"aria-label\", \"Delete employee\");\n        button.setAttribute(\"title\", \"Delete employee\");\n      });\n    }\n\n    function clearSortIndicators(table, activeFilter) {\n      table.querySelectorAll(\".filter\").forEach((filter) => {\n        if (filter === activeFilter) return;\n        filter.classList.remove(\"active\", \"desc\");\n        filter.dataset.sortDirection = \"asc\";\n      });\n    }\n\n    function sortRosterTable(table, columnIndex, direction, activeFilter) {\n      if (rowBeingEdited) stopOffDayEditing();\n\n      const multiplier = direction === \"desc\" ? -1 : 1;\n      const body = table.querySelector(\"tbody\");\n      const rows = Array.from(body.querySelectorAll(\"tr\"));\n      rows.sort((a, b) => {\n        if (columnIndex === 0) {\n          return a.querySelector(\".name\").textContent.trim().localeCompare(b.querySelector(\".name\").textContent.trim()) * multiplier;\n        }\n\n        const aValue = a.children[columnIndex]?.textContent.trim().toUpperCase() || \"\";\n        const bValue = b.children[columnIndex]?.textContent.trim().toUpperCase() || \"\";\n        if (aValue !== bValue) return aValue.localeCompare(bValue) * multiplier;\n        return a.querySelector(\".name\").textContent.trim().localeCompare(b.querySelector(\".name\").textContent.trim());\n      });\n\n      rows.forEach((row) => body.appendChild(row));\n      clearSortIndicators(table, activeFilter);\n      activeFilter.classList.add(\"active\");\n      activeFilter.classList.toggle(\"desc\", direction === \"desc\");\n      activeFilter.dataset.sortDirection = direction === \"asc\" ? \"desc\" : \"asc\";\n      recalcDailyTotals(table);\n      saveRosterState();\n    }\n\n    function handleSortFilter(filter) {\n      const table = filter.closest(\"table\");\n      if (!table) return;\n      const columnIndex = Number(filter.dataset.sortIndex || 0);\n      const direction = filter.dataset.sortDirection === \"desc\" ? \"desc\" : \"asc\";\n      sortRosterTable(table, columnIndex, direction, filter);\n    }\n\n    document.addEventListener(\"click\", (event) => {\n      const sortFilter = event.target.closest(\".filter\");\n      if (sortFilter) {\n        event.preventDefault();\n        handleSortFilter(sortFilter);\n        return;\n      }\n\n      const editableCell = event.target.closest(\"td.w, td.o\");\n      if (editableCell && rowBeingEdited && editableCell.parentElement === rowBeingEdited) {\n        event.preventDefault();\n        toggleOffDayCell(editableCell);\n        return;\n      }\n\n      const button = event.target.closest(\".row-action\");\n      if (!button) {\n        clearDeleteConfirm();\n        return;\n      }\n\n      const row = button.closest(\"tr\");\n      if (button.classList.contains(\"delete\")) {\n        if (button.classList.contains(\"confirm-delete\")) {\n          if (rowBeingEdited === row) rowBeingEdited = null;\n          deleteEmployee(row);\n          return;\n        }\n\n        clearDeleteConfirm(button);\n        button.classList.add(\"confirm-delete\");\n        button.textContent = \"OK?\";\n        button.setAttribute(\"aria-label\", \"Confirm delete employee\");\n        button.setAttribute(\"title\", \"Confirm delete employee\");\n        return;\n      }\n\n      clearDeleteConfirm();\n      if (rowBeingEdited === row) {\n        stopOffDayEditing();\n        return;\n      }\n\n      startOffDayEditing(row);\n    });\n\n    document.addEventListener(\"keydown\", (event) => {\n      const sortFilter = event.target.closest(\".filter\");\n      if (!sortFilter || ![\"Enter\", \" \"].includes(event.key)) return;\n      event.preventDefault();\n      handleSortFilter(sortFilter);\n    });\n\n    document.addEventListener(\"input\", (event) => {\n      const nameCell = event.target.closest(\"tr.editing-off .name\");\n      if (!nameCell) return;\n      saveRosterState();\n    });\n\n    document.addEventListener(\"keydown\", (event) => {\n      const nameCell = event.target.closest(\"tr.editing-off .name\");\n      if (!nameCell) return;\n      if (event.key === \"Enter\") {\n        event.preventDefault();\n        stopOffDayEditing();\n      }\n    });\n\n    document.querySelectorAll(\".add-row\").forEach((form) => {\n      form.addEventListener(\"submit\", addRosterRow);\n    });\n\n    document.querySelectorAll(\"table[data-roster]\").forEach(addActionsToTable);\n    loadRosterState();\n    applyPendingRosterAdditions();\n    refreshRosterNumbers();\n  <\/script>\n</body>\n</html>\n" },
        "compare": { label: "Compare", html: "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n  <meta charset=\"UTF-8\" />\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" />\n  <title>Timesheet Compare</title>\n  <style>\n    * { box-sizing: border-box; }\n    body {\n      margin: 0;\n      overflow-x: hidden;\n      background: #eef2f6;\n      color: #0f1b2a;\n      font-family: Arial, Helvetica, sans-serif;\n      font-size: 13px;\n      font-weight: 700;\n    }\n    .page-switcher {\n      width: 100%;\n      display: flex;\n      flex-wrap: wrap;\n      gap: 4px;\n      align-items: center;\n      padding: 6px 8px;\n      background: #111;\n      border-bottom: 2px solid #000;\n    }\n    .page-switcher a {\n      min-width: 118px;\n      height: 28px;\n      display: inline-flex;\n      align-items: center;\n      justify-content: center;\n      border: 1px solid #777;\n      background: #e7e6e6;\n      color: #000;\n      text-decoration: none;\n      font-size: 13px;\n      font-weight: 800;\n    }\n    .page-switcher a.active {\n      background: #ffff00;\n      border-color: #ffff00;\n    }\n    .page {\n      width: min(1180px, calc(100% - 16px));\n      margin: 8px auto 22px;\n    }\n    .toolbar {\n      display: grid;\n      grid-template-columns: minmax(280px, 1fr) auto auto;\n      gap: 8px;\n      align-items: center;\n      padding: 10px;\n      background: #fff;\n      border: 1px solid #c4d4e4;\n      border-radius: 8px 8px 0 0;\n      font-weight: 900;\n    }\n    input[type=\"file\"] {\n      width: 100%;\n      max-width: 460px;\n      min-height: 30px;\n      padding: 3px;\n      border: 1px solid #cbd5df;\n      border-radius: 6px;\n      background: #f8fafc;\n      font-weight: 700;\n    }\n    button, select {\n      font: inherit;\n    }\n    button {\n      min-height: 30px;\n      border: 1px solid #273140;\n      border-radius: 6px;\n      background: #273140;\n      color: #fff;\n      font-weight: 900;\n      cursor: pointer;\n    }\n    button.secondary {\n      background: #f4f6f8;\n      color: #273140;\n      border-color: #cbd5df;\n    }\n    .summary {\n      display: grid;\n      grid-template-columns: repeat(4, minmax(0, 1fr));\n      gap: 1px;\n      background: #28313c;\n      border: 1px solid #c4d4e4;\n      border-top: 0;\n    }\n    .summary div {\n      min-height: 42px;\n      display: grid;\n      place-items: center;\n      background: #d9e8f7;\n      color: #071527;\n      font-size: 15px;\n      font-weight: 900;\n      text-align: center;\n    }\n    .panel {\n      margin-top: 10px;\n      border: 1px solid #c4d4e4;\n      border-radius: 8px;\n      background: #fff;\n      overflow: hidden;\n    }\n    .panel-title {\n      min-height: 38px;\n      display: flex;\n      align-items: center;\n      justify-content: space-between;\n      gap: 10px;\n      padding: 0 12px;\n      background: #d9e8f7;\n      border-bottom: 1px solid #c4d4e4;\n      color: #071527;\n      font-size: 15px;\n      font-weight: 900;\n    }\n    .panel-count {\n      color: #526174;\n      font-size: 12px;\n      white-space: nowrap;\n    }\n    table {\n      width: 100%;\n      border-collapse: collapse;\n      table-layout: fixed;\n    }\n    .preview-table col.employee { width: 21%; }\n    .preview-table col.match { width: 18%; }\n    .preview-table col.small { width: 8%; }\n    .preview-table col.actual { width: 8%; }\n    .preview-table col.actions { width: 29%; }\n    .compare-table col.employee { width: 18%; }\n    .compare-table col.small { width: 8%; }\n    .compare-table col.status { width: 10%; }\n    th, td {\n      min-height: 25px;\n      height: 25px;\n      padding: 0 5px;\n      border-bottom: 1px solid #d9e0e8;\n      overflow: hidden;\n      white-space: nowrap;\n      text-overflow: ellipsis;\n      text-align: center;\n    }\n    th {\n      height: 31px;\n      background: #28313c;\n      color: #eef4fb;\n      font-size: 12px;\n      font-weight: 900;\n      letter-spacing: .03em;\n      text-transform: uppercase;\n    }\n    .group {\n      background: #111827;\n      color: #fff;\n    }\n    .shift-section td {\n      height: 29px;\n      padding: 0 9px;\n      border-top: 2px solid #000;\n      border-bottom: 2px solid #000;\n      background: #d9e8f7;\n      color: #071527;\n      font-size: 13px;\n      font-weight: 900;\n      text-align: left;\n      text-transform: uppercase;\n    }\n    .shift-section span {\n      margin-left: 8px;\n      padding: 2px 8px;\n      border-radius: 999px;\n      background: #fff;\n      color: #526174;\n      font-size: 11px;\n      text-transform: none;\n    }\n    .employee-cell {\n      text-align: left;\n      background: #e2f0d9;\n      color: #071527;\n      font-weight: 900;\n    }\n    .name-match-button {\n      width: 100%;\n      min-height: 22px;\n      padding: 0;\n      border: 0;\n      background: transparent;\n      color: inherit;\n      text-align: left;\n      font-weight: 900;\n    }\n    .name-match-select {\n      display: none;\n      width: 100%;\n      height: 23px;\n      border: 1px solid #7c3aed;\n      border-radius: 4px;\n      background: #fff;\n      color: #071527;\n      font-size: 11px;\n      font-weight: 800;\n    }\n    tr.selecting-name .name-match-button {\n      display: none;\n    }\n    tr.selecting-name .name-match-select {\n      display: block;\n    }\n    .match { background: #d9ead3; color: #0f6b2d; font-weight: 900; }\n    .diff { background: #f4cccc; color: #7f1d1d; font-weight: 900; }\n    .missing { background: #fff2cc; color: #7c5700; font-weight: 900; }\n    .unrecognized td,\n    .unrecognized .employee-cell {\n      background: #e7c7e8;\n      color: #4f1b58;\n      font-weight: 900;\n    }\n    .ignored td,\n    .ignored .employee-cell {\n      background: #f3f4f6;\n      color: #6b7280;\n    }\n    .actions {\n      display: flex;\n      align-items: center;\n      justify-content: center;\n      gap: 4px;\n      min-width: 0;\n      overflow: visible;\n    }\n    .actions button,\n    .actions select {\n      min-height: 22px;\n      height: 22px;\n      padding: 0 7px;\n      border-radius: 4px;\n      font-size: 11px;\n    }\n    .actions select {\n      min-width: 82px;\n      border: 1px solid #cbd5df;\n      background: #fff;\n      color: #071527;\n      font-weight: 800;\n    }\n    .actions .suggest {\n      background: #111827;\n      color: #fff;\n    }\n    .actions .add {\n      background: #0f6b2d;\n      border-color: #0f6b2d;\n    }\n    .actions .ignore {\n      background: #f4f6f8;\n      color: #7f1d1d;\n      border-color: #f1a8a8;\n    }\n    .empty {\n      padding: 16px 12px;\n      color: #526174;\n      font-weight: 800;\n    }\n    @media (max-width: 860px) {\n      body { font-size: 11px; }\n      .page { width: calc(100% - 8px); }\n      .toolbar { grid-template-columns: 1fr; }\n      .summary { grid-template-columns: repeat(2, minmax(0, 1fr)); }\n      .preview-table,\n      .compare-table { table-layout: auto; }\n      th, td { min-width: 70px; padding: 0 3px; }\n      .employee-cell { min-width: 150px; }\n    }\n  </style>\n</head>\n<body>\n  <main class=\"page\">\n    <section class=\"toolbar\">\n      <label>IMPORT TIMESHEET TO COMPARE: <input type=\"file\" id=\"fileInput\" accept=\".xlsx,.xls,.csv,.txt\" /></label>\n      <button type=\"button\" id=\"refreshButton\">Refresh Current</button>\n      <button type=\"button\" class=\"secondary\" id=\"clearButton\">Clear Compare</button>\n    </section>\n\n    <section class=\"summary\" aria-label=\"Compare summary\">\n      <div id=\"currentCount\">Current MD: 0</div>\n      <div id=\"importCount\">Imported: 0</div>\n      <div id=\"matchCount\">Matches: 0</div>\n      <div id=\"issueCount\">Issues: 0</div>\n    </section>\n\n    <section class=\"panel\" id=\"previewPanel\">\n      <div class=\"panel-title\">\n        <span>Imported Timesheet Preview</span>\n        <span class=\"panel-count\" id=\"previewCount\">No import loaded</span>\n      </div>\n      <div id=\"previewEmpty\" class=\"empty\">Import an XLSX, CSV, or TXT timesheet to preview parsed rows before comparing.</div>\n      <table class=\"preview-table\" id=\"previewTable\" aria-label=\"Imported timesheet preview\" hidden>\n        <colgroup>\n          <col class=\"employee\" />\n          <col class=\"match\" />\n          <col class=\"small\" />\n          <col class=\"small\" />\n          <col class=\"small\" />\n          <col class=\"actual\" />\n          <col class=\"actions\" />\n        </colgroup>\n        <thead>\n          <tr>\n            <th>Imported Name</th>\n            <th>Schedule Match</th>\n            <th>Start</th>\n            <th>Lunch</th>\n            <th>End</th>\n            <th>Actual</th>\n            <th>Unrecognized Action</th>\n          </tr>\n        </thead>\n        <tbody id=\"previewBody\"></tbody>\n      </table>\n    </section>\n\n    <section class=\"panel\">\n      <div class=\"panel-title\">\n        <span>Current Timesheet vs Imported Timesheet</span>\n        <span class=\"panel-count\">Compared by employee name, start, lunch, end, and actual hours</span>\n      </div>\n      <table class=\"compare-table\" aria-label=\"Timesheet comparison\">\n        <colgroup>\n          <col class=\"employee\" />\n          <col class=\"small\" /><col class=\"small\" /><col class=\"small\" /><col class=\"small\" />\n          <col class=\"small\" /><col class=\"small\" /><col class=\"small\" /><col class=\"small\" />\n          <col class=\"status\" />\n        </colgroup>\n        <thead>\n          <tr>\n            <th rowspan=\"2\">Employee</th>\n            <th class=\"group\" colspan=\"4\">Current Timesheet</th>\n            <th class=\"group\" colspan=\"4\">Imported Timesheet</th>\n            <th rowspan=\"2\">Status</th>\n          </tr>\n          <tr>\n            <th>Start</th><th>Lunch</th><th>End</th><th>Actual</th>\n            <th>Start</th><th>Lunch</th><th>End</th><th>Actual</th>\n          </tr>\n        </thead>\n        <tbody id=\"compareBody\"></tbody>\n      </table>\n    </section>\n  </main>\n\n  <script src=\"https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js\"><\/script>\n  <script>\n    const dayAliases = {\n      sun: \"sun\", sunday: \"sun\",\n      mon: \"mon\", monday: \"mon\",\n      tue: \"tue\", tues: \"tue\", tuesday: \"tue\",\n      wed: \"wed\", weds: \"wed\", wednesday: \"wed\",\n      thu: \"thu\", thur: \"thu\", thurs: \"thu\", thursday: \"thu\",\n      fri: \"fri\", friday: \"fri\",\n      sat: \"sat\", saturday: \"sat\"\n    };\n    const todayKey = [\"sun\", \"mon\", \"tue\", \"wed\", \"thu\", \"fri\", \"sat\"][new Date().getDay()];\n    const rosterStorageKey = \"conglobal-roster-state-v1\";\n    const rosterAdditionsKey = \"conglobal-roster-additions-v1\";\n    const dayforceStorageKey = \"conglobal-dayforce-punches-v1\";\n    const compareStorageKey = \"conglobal-compare-timesheet-v2\";\n    const compareAliasesKey = \"conglobal-compare-name-aliases-v1\";\n    const compareIgnoredKey = \"conglobal-compare-ignored-names-v1\";\n    const rosterDayLabels = [\"Mon\", \"Tues\", \"Wed\", \"Thurs\", \"Fri\", \"Sat\", \"Sun\"];\n    const shiftLabels = {\n      first: \"1st Shift\",\n      second: \"2ND SHIFT\",\n      gate: \"Gate\",\n      mechanics: \"Mechanics\",\n      managers: \"Managers\"\n    };\n    const shiftOrder = [\"first\", \"second\", \"gate\", \"mechanics\", \"managers\", \"unknown\"];\n    const body = document.getElementById(\"compareBody\");\n    const previewBody = document.getElementById(\"previewBody\");\n\n    const defaultRoster = {\n      first: [\n        [\"Branford Alton\", \"Mon, Tues\"],\n        [\"Castruita Armando\", \"Wed, Thurs\"],\n        [\"Frazer Dacoyea\", \"Mon, Tues\"],\n        [\"Citizen Dante\", \"Thurs, Fri\"],\n        [\"Towler Demetrius\", \"Thurs, Fri\"],\n        [\"Stewart Dexter\", \"Sat, Sun\"],\n        [\"Gardner Dorrean\", \"Tues, Wed\"],\n        [\"Thomas Henry\", \"Sat, Sun\"],\n        [\"Brown James\", \"Thurs, Fri\"],\n        [\"Herrera Jose\", \"Sat, Sun\"],\n        [\"Player Keyston\", \"Mon, Sun\"],\n        [\"Hickman Makia\", \"Mon, Sun\"],\n        [\"Dever Mikey\", \"Tues, Wed\"],\n        [\"Wanza Myles\", \"Mon, Tues\"],\n        [\"Romero Nelson\", \"Tues, Wed\"],\n        [\"McDaniel Charles\", \"Fri, Sat\"],\n        [\"Nava Ramon\", \"Sat, Sun\"],\n        [\"Tran Tyler\", \"Thurs, Fri\"]\n      ],\n      second: [\n        [\"Carruthers Timothy\", \"Mon, Sun\"],\n        [\"Caceres Virula Victor\", \"Mon, Tues\"],\n        [\"Keme Aweri Jr.\", \"Mon, Tues\"],\n        [\"Hosey Kevin\", \"Mon, Tues\"],\n        [\"Brown Brandy\", \"Wed, Thurs\"],\n        [\"Mejia Aaron\", \"Thurs, Fri\"],\n        [\"Bookman Derrell\", \"Thurs, Fri\"],\n        [\"Hopkins Alexander\", \"Mon, Sun\"],\n        [\"Tingle Jason\", \"Sat, Sun\"],\n        [\"Contreras Marco\", \"Sat, Sun\"],\n        [\"Benavides Robert\", \"Wed, Sun\"],\n        [\"Urtado Ernest\", \"Tues, Wed\"],\n        [\"Johnson Messiah\", \"Tues, Thurs\"],\n        [\"Gilder Rufus II\", \"Tues, Wed\"],\n        [\"Echendu Chimenierm\", \"Wed, Thurs\"],\n        [\"Delgado Jose\", \"Fri, Sat\"]\n      ],\n      gate: [\n        [\"Candace Warren\", \"Sat, Sun\"],\n        [\"Connie Johnson\", \"Sat, Sun\"],\n        [\"Jarade Douglas\", \"Sat, Sun\"],\n        [\"Gregory Watson II\", \"Sat, Sun\"],\n        [\"Bryce Alexander\", \"Thurs, Fri\"],\n        [\"Naomisha Hunt\", \"Thurs, Fri, Sat\"],\n        [\"Ramacacondra Pratt\", \"Thurs, Fri\"],\n        [\"Kane Cabral\", \"Mon, Tues\"],\n        [\"Tavares Gariet\", \"Mon, Tues\"]\n      ],\n      mechanics: [],\n      managers: []\n    };\n\n    function escapeHtml(value) {\n      return String(value).replace(/[&<>\"']/g, (char) => ({\n        \"&\": \"&amp;\",\n        \"<\": \"&lt;\",\n        \">\": \"&gt;\",\n        '\"': \"&quot;\",\n        \"'\": \"&#39;\"\n      }[char]));\n    }\n\n    function normalizeName(name) {\n      const suffixes = new Set([\"jr\", \"sr\", \"ii\", \"iii\", \"iv\"]);\n      return String(name || \"\")\n        .trim()\n        .toLowerCase()\n        .replace(/[,.]/g, \" \")\n        .replace(/\\bcontrerras\\b/g, \"contreras\")\n        .replace(/\\bdemeatrius\\b/g, \"demetrius\")\n        .replace(/\\s+/g, \" \")\n        .split(\" \")\n        .filter((part) => part && !suffixes.has(part))\n        .sort()\n        .join(\" \");\n    }\n\n    function editDistance(a, b) {\n      const matrix = Array.from({ length: a.length + 1 }, (_, i) => [i]);\n      for (let j = 1; j <= b.length; j += 1) matrix[0][j] = j;\n      for (let i = 1; i <= a.length; i += 1) {\n        for (let j = 1; j <= b.length; j += 1) {\n          matrix[i][j] = a[i - 1] === b[j - 1]\n            ? matrix[i - 1][j - 1]\n            : Math.min(matrix[i - 1][j - 1] + 1, matrix[i][j - 1] + 1, matrix[i - 1][j] + 1);\n        }\n      }\n      return matrix[a.length][b.length];\n    }\n\n    function parseOffDays(text) {\n      return new Set(String(text || \"\")\n        .split(\",\")\n        .map((item) => item.trim().toLowerCase())\n        .map((item) => dayAliases[item] || dayAliases[item.slice(0, 3)])\n        .filter(Boolean));\n    }\n\n    function rosterOffDaysLabel(days) {\n      return days\n        .map((day, index) => day === \"O\" ? rosterDayLabels[index] : \"\")\n        .filter(Boolean)\n        .join(\", \");\n    }\n\n    function readJson(key, fallback) {\n      try {\n        const value = JSON.parse(localStorage.getItem(key) || \"null\");\n        return value === null ? fallback : value;\n      } catch (error) {\n        localStorage.removeItem(key);\n        return fallback;\n      }\n    }\n\n    function writeJson(key, value) {\n      localStorage.setItem(key, JSON.stringify(value));\n    }\n\n    function migrateMcDanielToDays(state) {\n      if (!state || !Array.isArray(state.second)) return state;\n      if (!Array.isArray(state.first)) state.first = [];\n      const alreadyOnDays = state.first.some((employee) => normalizeName(employee.name || \"\") === \"charles mcdaniel\");\n      const secondIndex = state.second.findIndex((employee) => normalizeName(employee.name || \"\") === \"charles mcdaniel\");\n      if (secondIndex === -1) return state;\n      const [employee] = state.second.splice(secondIndex, 1);\n      if (!alreadyOnDays) state.first.push(employee);\n      localStorage.setItem(rosterStorageKey, JSON.stringify(state));\n      return state;\n    }\n\n    function readRosterAdditions() {\n      const additions = readJson(rosterAdditionsKey, []);\n      return Array.isArray(additions) ? additions : [];\n    }\n\n    function buildRoster() {\n      const roster = Object.fromEntries(Object.entries(defaultRoster).map(([key, rows]) => [\n        key,\n        rows.map(([name, offDays]) => ({ name, offDays }))\n      ]));\n\n      try {\n        const saved = localStorage.getItem(rosterStorageKey);\n        if (saved) {\n          const state = migrateMcDanielToDays(JSON.parse(saved));\n          Object.keys(shiftLabels).forEach((key) => {\n            if (!Array.isArray(state[key])) return;\n            roster[key] = state[key]\n              .filter((employee) => employee && employee.name)\n              .map((employee) => ({\n                name: employee.name,\n                offDays: Array.isArray(employee.days) ? rosterOffDaysLabel(employee.days) : \"\"\n              }));\n          });\n        }\n      } catch (error) {\n        localStorage.removeItem(rosterStorageKey);\n      }\n\n      const seen = new Set(Object.values(roster).flat().map((employee) => normalizeName(employee.name)));\n      readRosterAdditions().forEach((addition) => {\n        if (!addition || !addition.name) return;\n        const key = shiftLabels[addition.shift] ? addition.shift : \"first\";\n        const nameKey = normalizeName(addition.name);\n        if (!nameKey || seen.has(nameKey)) return;\n        if (!Array.isArray(roster[key])) roster[key] = [];\n        roster[key].push({\n          name: addition.name,\n          offDays: Array.isArray(addition.days) ? rosterOffDaysLabel(addition.days) : \"\"\n        });\n        seen.add(nameKey);\n      });\n\n      return roster;\n    }\n\n    function rosterNameList() {\n      return Object.values(buildRoster()).flat().map((employee) => employee.name);\n    }\n\n    function rosterShiftForName(name) {\n      const key = normalizeName(name);\n      if (!key) return \"unknown\";\n      const roster = buildRoster();\n      for (const [shiftKey, employees] of Object.entries(roster)) {\n        if (employees.some((employee) => normalizeName(employee.name) === key)) return shiftKey;\n      }\n      return \"unknown\";\n    }\n\n    function shiftLabel(shiftKey) {\n      return shiftLabels[shiftKey] || \"Unassigned\";\n    }\n\n    function rowShiftKey(row) {\n      if (row && shiftLabels[row.shiftKey]) return row.shiftKey;\n      if (row && row.match && row.match.found) return rosterShiftForName(row.match.name);\n      if (row && row.canonicalName) return rosterShiftForName(row.canonicalName);\n      if (row && row.name) return rosterShiftForName(row.name);\n      return \"unknown\";\n    }\n\n    function groupRowsByShift(rows, getShift = rowShiftKey) {\n      const groups = new Map();\n      rows.forEach((row) => {\n        const rawShift = getShift(row);\n        const shiftKey = shiftLabels[rawShift] ? rawShift : \"unknown\";\n        if (!groups.has(shiftKey)) groups.set(shiftKey, []);\n        groups.get(shiftKey).push(row);\n      });\n      return shiftOrder\n        .filter((shiftKey) => groups.has(shiftKey))\n        .map((shiftKey) => [shiftKey, groups.get(shiftKey)]);\n    }\n\n    function shiftSectionRow(shiftKey, count, colspan) {\n      return `<tr class=\"shift-section\"><td colspan=\"${colspan}\">${escapeHtml(shiftLabel(shiftKey))}<span>${count} records</span></td></tr>`;\n    }\n\n    function toMilitaryTime(value) {\n      const text = String(value || \"\").trim();\n      if (!text) return \"\";\n      if (/^\\d{3,4}$/.test(text)) return text.padStart(4, \"0\");\n      const match = text.match(/^(\\d{1,2}):(\\d{2})(?::\\d{2})?\\s*([ap])m?$/i);\n      if (!match) return text;\n      let hour = Number(match[1]);\n      const minute = match[2];\n      const period = match[3].toLowerCase();\n      if (period === \"p\" && hour !== 12) hour += 12;\n      if (period === \"a\" && hour === 12) hour = 0;\n      return `${String(hour).padStart(2, \"0\")}${minute}`;\n    }\n\n    function minutesFromMilitary(value) {\n      const text = String(value || \"\").trim();\n      const match = text.match(/^(\\d{1,2})(\\d{2})$/);\n      if (!match) return null;\n      const hours = Number(match[1]);\n      const minutes = Number(match[2]);\n      if (hours > 24 || minutes > 59 || (hours === 24 && minutes !== 0)) return null;\n      return (hours * 60) + minutes;\n    }\n\n    function militaryFromMinutes(value) {\n      const minutes = ((Math.round(value) % 1440) + 1440) % 1440;\n      const hours = Math.floor(minutes / 60);\n      const mins = minutes % 60;\n      return `${String(hours).padStart(2, \"0\")}${String(mins).padStart(2, \"0\")}`;\n    }\n\n    function currentMinutes() {\n      const now = new Date();\n      return (now.getHours() * 60) + now.getMinutes();\n    }\n\n    function currentMilitaryTime() {\n      return militaryFromMinutes(currentMinutes());\n    }\n\n    function dayKeyFromDateValue(value) {\n      const text = String(value || \"\").trim();\n      if (!text) return \"\";\n      const dayNameMatch = text.match(/^([a-z]{3,9})\\b/i);\n      const explicitDay = dayNameMatch ? dayAliases[dayNameMatch[1].toLowerCase()] : \"\";\n      if (explicitDay) return explicitDay;\n      const match = text.match(/^(\\d{1,2})\\/(\\d{1,2})\\/(\\d{2,4})/);\n      const date = match\n        ? new Date(Number(match[3].length === 2 ? `20${match[3]}` : match[3]), Number(match[1]) - 1, Number(match[2]))\n        : new Date(text);\n      if (Number.isNaN(date.getTime())) return \"\";\n      return [\"sun\", \"mon\", \"tue\", \"wed\", \"thu\", \"fri\", \"sat\"][date.getDay()];\n    }\n\n    function readPunches() {\n      const punches = readJson(dayforceStorageKey, []);\n      return Array.isArray(punches) ? punches : [];\n    }\n\n    function shouldCheckMissingStart(shiftKey) {\n      if (shiftKey === \"gate\") return false;\n      if (shiftKey === \"second\") return currentMinutes() >= minutesFromMilitary(\"1500\");\n      return true;\n    }\n\n    function actualHoursNumber(startValue, lunch, endValue) {\n      const start = minutesFromMilitary(startValue);\n      const end = minutesFromMilitary(endValue);\n      if (start === null || end === null) return 0;\n      let minutes = end - start;\n      if (minutes < 0) minutes += 1440;\n      if (String(lunch).toUpperCase() === \"YES\") minutes -= 30;\n      return minutes > 0 ? minutes / 60 : 0;\n    }\n\n    function actualHours(startValue, lunch, endValue) {\n      const hours = actualHoursNumber(startValue, lunch, endValue);\n      return hours ? hours.toFixed(1) : \"\";\n    }\n\n    function paidNoteHoursForText(value) {\n      return /\\bfloating holidays?\\b|\\bvacations?\\b/i.test(String(value || \"\")) ? 8 : 0;\n    }\n\n    function normalizeLunch(value) {\n      const text = String(value || \"\").trim().toUpperCase();\n      if (!text) return \"\";\n      if (text === \"NO\" || text === \"N\") return \"NO\";\n      if (text === \"??\") return \"??\";\n      if (text === \"YES\" || text === \"Y\") return \"YES\";\n      if (text.includes(\"-\") || /\\d/.test(text)) return \"YES\";\n      return text;\n    }\n\n    function rowRank(row) {\n      if (row.scheduled && row.hasClockIn && !row.purpleAbsence) return 0;\n      if (!row.scheduled && row.hasClockIn) return 1;\n      if (row.purpleAbsence) return 2;\n      if (row.sche entById(\"currentCount\").textContent = `Current MD: ${currentRows.length}`;\n        document.getElementById(\"importCount\").textContent = \"Imported: 0\";\n        document.getElementById(\"matchCount\").textContent = \"Matches: 0\";\n        document.getElementById(\"issueCount\").textContent = \"Issues: 0\";\n        renderPreview([]);\n        return;\n      }\n      const importedRows = savedImportedRows\n        .filter((row) => !ignored.has(normalizeName(row.name)))\n        .map(canonicalImportedRow)\n        .filter((row) => row.match.found);\n\n      const currentMap = mapByName(currentRows);\n      const importMap = mapByName(importedRows);\n      const employeeNames = new Map();\n      currentRows.forEach((row) => employeeNames.set(normalizeName(row.name), row.name));\n      importedRows.forEach((row) => employeeNames.set(normalizeName(row.canonicalName), row.canonicalName));\n\n      let matches = 0;\n      let issues = 0;\n\n      const compareRows = Array.from(employeeNames.entries()).map(([key, name]) => {\n        const current = currentMap.get(key);\n        const imported = importMap.get(key);\n        const [className, label] = compareStatus(current, imported);\n        if (className === \"match\") matches += 1;\n        else issues += 1;\n\n        return {\n          name,\n          current,\n          imported,\n          className,\n          label,\n          shiftKey: rowShiftKey(current || imported || { name })\n        };\n      });\n\n      body.innerHTML = groupRowsByShift(compareRows, (row) => row.shiftKey).map(([shiftKey, shiftRows]) => (\n        shiftSectionRow(shiftKey, shiftRows.length, 10) + shiftRows\n          .sort((a, b) => a.name.localeCompare(b.name))\n          .map(({ name, current, imported, className, label }) => `\n            <tr>\n              <td class=\"employee-cell\">${escapeHtml(name)}</td>\n              <td>${escapeHtml(current?.start || \"\")}</td>\n              <td>${escapeHtml(current?.lunch || \"\")}</td>\n              <td>${escapeHtml(current?.end || \"\")}</td>\n              <td>${escapeHtml(current?.actual || \"\")}</td>\n              <td>${escapeHtml(imported?.start || \"\")}</td>\n              <td>${escapeHtml(imported?.lunch || \"\")}</td>\n              <td>${escapeHtml(imported?.end || \"\")}</td>\n              <td>${escapeHtml(imported?.actual || \"\")}</td>\n              <td class=\"${className}\">${label}</td>\n            </tr>\n          `).join(\"\")\n      )).join(\"\");\n\n      const unresolved = readImportedRows().map(canonicalImportedRow).filter((row) => !row.match.found && !ignored.has(normalizeName(row.name))).length;\n      document.getElementById(\"currentCount\").textContent = `Current MD: ${currentRows.length}`;\n      document.getElementById(\"importCount\").textContent = `Imported: ${importedRows.length}`;\n      document.getElementById(\"matchCount\").textContent = `Matches: ${matches}`;\n      document.getElementById(\"issueCount\").textContent = `Issues: ${issues}${unresolved ? ` / ${unresolved} names` : \"\"}`;\n      renderPreview();\n    }\n\n    function addNameToRoster(name, shift) {\n      const cleanName = String(name || \"\").trim();\n      const targetShift = shiftLabels[shift] ? shift : \"first\";\n      if (!cleanName) return false;\n      const normalized = normalizeName(cleanName);\n      if (rosterNameList().some((candidate) => normalizeName(candidate) === normalized)) return true;\n      const additions = readRosterAdditions();\n      additions.push({\n        name: cleanName,\n        role: \"\",\n        days: [\"W\", \"W\", \"W\", \"W\", \"W\", \"W\", \"W\"],\n        shift: targetShift\n      });\n      writeJson(rosterAdditionsKey, additions);\n      return true;\n    }\n\n    async function importFile(file) {\n      let imported = [];\n      if (file.name.toLowerCase().endsWith(\".csv\") || file.name.toLowerCase().endsWith(\".txt\")) {\n        const text = await file.text();\n        imported = parseWorkbookRows(text.split(/\\r?\\n/).filter(Boolean).map((line) => line.includes(\"\\t\") ? line.split(\"\\t\") : line.split(\",\")));\n      } else {\n        if (!window.XLSX) return [];\n        const workbook = XLSX.read(await file.arrayBuffer(), { type: \"array\" });\n        imported = parseWorkbookSheets(workbook.SheetNames.map((sheetName) => ({\n          name: sheetName,\n          rows: XLSX.utils.sheet_to_json(workbook.Sheets[sheetName], { header: 1, raw: false, defval: \"\" })\n        })));\n      }\n      return dedupeRows(imported).map(normalizeCompareRow);\n    }\n\n    document.getElementById(\"fileInput\").addEventListener(\"change\", async (event) => {\n      const file = event.target.files[0];\n      if (!file) return;\n      const imported = await importFile(file);\n      writeJson(compareStorageKey, imported);\n      localStorage.removeItem(compareAliasesKey);\n      localStorage.removeItem(compareIgnoredKey);\n      event.target.value = \"\";\n      renderCompare();\n    });\n\n    previewBody.addEventListener(\"click\", (event) => {\n      const openNameButton = event.target.closest(\"[data-open-name-select]\");\n      const suggestionButton = event.target.closest(\"[data-use-suggestion]\");\n      const addButton = event.target.closest(\"[data-add-name]\");\n      const ignoreButton = event.target.closest(\"[data-ignore-name]\");\n      const unignoreButton = event.target.closest(\"[data-unignore]\");\n\n      if (openNameButton) {\n        const row = openNameButton.closest(\"tr\");\n        const select = row ? row.querySelector(\"[data-name-select]\") : null;\n        if (row && select) {\n          row.classList.add(\"selecting-name\");\n          select.focus();\n        }\n        return;\n      } else if (suggestionButton) {\n        const aliases = readAliases();\n        aliases[normalizeName(suggestionButton.dataset.useSuggestion)] = suggestionButton.dataset.suggestion;\n        writeJson(compareAliasesKey, aliases);\n      } else if (addButton) {\n        const name = addButton.dataset.addName;\n        const select = Array.from(previewBody.querySelectorAll(\"[data-shift-for]\"))\n          .find((item) => item.dataset.shiftFor === name);\n        addNameToRoster(name, select ? select.value : \"first\");\n      } else if (ignoreButton) {\n        const ignored = readIgnored();\n        ignored.add(normalizeName(ignoreButton.dataset.ignoreName));\n        writeJson(compareIgnoredKey, Array.from(ignored));\n      } else if (unignoreButton) {\n        const ignored = readIgnored();\n        ignored.delete(unignoreButton.dataset.unignore);\n        writeJson(compareIgnoredKey, Array.from(ignored));\n      } else {\n        return;\n      }\n\n      renderCompare();\n    });\n\n    previewBody.addEventListener(\"change\", (event) => {\n      const select = event.target.closest(\"[data-name-select]\");\n      if (!select || !select.value) return;\n      const aliases = readAliases();\n      aliases[normalizeName(select.dataset.nameSelect)] = select.value;\n      writeJson(compareAliasesKey, aliases);\n      renderCompare();\n    });\n\n    document.getElementById(\"refreshButton\").addEventListener(\"click\", renderCompare);\n    document.getElementById(\"clearButton\").addEventListener(\"click\", () => {\n      localStorage.removeItem(compareStorageKey);\n      localStorage.removeItem(compareAliasesKey);\n      localStorage.removeItem(compareIgnoredKey);\n      document.getElementById(\"fileInput\").value = \"\";\n      renderCompare();\n    });\n\n    renderCompare();\n  <\/script>\n</body>\n</html>\n" },

 center;\n      min-height: 18px;\n      padding: 2px 9px;\n      border-radius: 4px;\n      background: #f1f3f6;\n      color: #64748b;\n      font-size: 9px;\n      font-weight: 800;\n      line-height: 1;\n      white-space: nowrap;\n    }\n\n    @media (max-width: 860px) {\n      .archive-toolbar {\n        grid-template-columns: 1fr;\n      }\n\n      .calendar-weekdays,\n      .calendar-grid {\n        gap: 3px;\n        padding-inline: 5px;\n      }\n\n      .day-cell {\n        min-height: 78px;\n        padding: 5px;\n      }\n\n      .kpis {\n        grid-template-columns: repeat(2, minmax(0, 1fr));\n      }\n\n      .shift-head,\n      .md-row {\n        grid-template-columns: minmax(112px, 1fr) 66px minmax(102px, 1.3fr) 86px 38px 44px 68px;\n        gap: 4px;\n        padding-inline: 8px;\n      }\n    }\n  </style>\n</head>\n<body>\n  <main class=\"archive-shell\">\n    <header class=\"archive-toolbar\">\n      <div class=\"month-controls\">\n        <button class=\"icon-button\" id=\"prevMonth\" type=\"button\" aria-label=\"Previous month\">&lt;</button>\n        <div class=\"month-title\" id=\"monthTitle\"></div>\n        <button class=\"icon-button\" id=\"nextMonth\" type=\"button\" aria-label=\"Next month\">&gt;</button>\n        <button class=\"secondary-button\" id=\"todayButton\" type=\"button\">Today</button>\n      </div>\n      <div class=\"save-controls\">\n        <input id=\"archiveDate\" type=\"date\" aria-label=\"Archive date\" />\n        <button class=\"primary-button\" id=\"saveTimesheet\" type=\"button\">Save Current Timesheet</button>\n        <button class=\"secondary-button\" id=\"importArchiveTimesheets\" type=\"button\">Mass Import</button>\n        <input class=\"archive-file-input\" id=\"archiveTimesheetInput\" type=\"file\" multiple accept=\".xlsx,.xls,.html,.htm\" />\n        <button class=\"secondary-button danger-month-button\" id=\"clearArchiveMonth\" type=\"button\">Clear Current Month</button>\n        <span class=\"save tionsKey = \"conglobal-roster-additions-v1\";\n    const dayforceStorageKey = \"conglobal-dayforce-punches-v1\";\n    const previousTimesheetStorageKey = \"conglobal-previous-timesheet-hours-v1\";\n    const timesheetSettingsKey = \"conglobal-timesheet-settings-v1\";\n    const archiveSelectedDateKey = \"conglobal-archive-selected-date-v1\";\n    const rosterDayLabels = [\"Mon\", \"Tues\", \"Wed\", \"Thurs\", \"Fri\", \"Sat\", \"Sun\"];\n    const lpmhGoal = 2.0;\n    const today = new Date();\n    const todayKey = [\"sun\", \"mon\", \"tue\", \"wed\", \"thu\", \"fri\", \"sat\"][today.getDay()];\n    let viewDate = new Date(today.getFullYear(), today.getMonth(), 1);\n    let selectedDateKey = isoDate(today);\n    const requestedArchiveDate = localStorage.getItem(archiveSelectedDateKey) || \"\";\n    if (/^\\d{4}-\\d{2}-\\d{2}$/.test(requestedArchiveDate)) {\n      selectedDateKey = requestedArchiveDate;\n      const requestedDate = dateFromKey(requestedArchiveDate);\n      viewDate = new Date(requestedDate.getFullYear(), requestedDate.getMonth(), 1);\n    }\n    let activeArchiveKey = \"\";\n    let activeArchive = null;\n    let clearMonthTimer = null;\n    const deleteArchiveButton = document.getElementById(\"deleteArchive\");\n    const clearArchiveMonthButton = document.getElementById(\"clearArchiveMonth\");\n    const archiveTimesheetInput = document.getElementById(\"archiveTimesheetInput\");\n\n    const defaultRoster = {\n      first: [\n        [\"Branford Alton\", \"Mon, Tues\"],\n        [\"Castruita Armando\", \"Wed, Thurs\"],\n        [\"Frazer Dacoyea\", \"Mon, Tues\"],\n        [\"Citizen Dante\", \"Thurs, Fri\"],\n        [\"Towler Demetrius\", \"Thurs, Fri\"],\n        [\"Stewart Dexter\", \"Sat, Sun\"],\n        [\"Gardner Dorrean\", \"Tues, Wed\"],\n        [\"Thomas Henry\", \"Sat, Sun\"],\n        [\"Brown James\", \"Thurs, Fri\"],\n        [\"Herrera Jose\", \"Sat, Sun\"],\n        [\"Player Keyston\", \"Mon, Sun\"],\n        [\"Hickman Makia\", \"Mon, Sun\"],\n        [\"Dever Mikey\", \"Tues, Wed\"],\n        [\"Wanza Myles\", \"Mon, Tues\"],\n        [\"Romero Nelson\", \"Tues, Wed\"],\n        [\"McDaniel Charles\", \"Fri, Sat\"],\n        [\"Nava Ramon\", \"Sat, Sun\"],\n        [\"Tran Tyler\", \"Thurs, Fri\"]\n      ],\n      second: [\n        [\"Carruthers Timothy\", \"Mon, Sun\"],\n        [\"Caceres Virula Victor\", \"Mon, Tues\"],\n        [\"Keme Aweri Jr.\", \"Mon, Tues\"],\n        [\"Hosey Kevin\", \"Mon, Tues\"],\n        [\"Brown Brandy\", \"Wed, Thurs\"],\n        [\"Mejia Aaron\", \"Thurs, Fri\"],\n        [\"Bookman Derrell\", \"Thurs, Fri\"],\n        [\"Hopkins Alexander\", \"Mon, Sun\"],\n        [\"Tingle Jason\", \"Sat, Sun\"],\n        [\"Contreras Marco\", \"Sat, Sun\"],\n        [\"Benavides Robert\", \"Wed, Sun\"],\n        [\"Urtado Ernest\", \"Tues, Wed\"],\n        [\"Johnson Messiah\", \"Tues, Thurs\"],\n        [\"Gilder Rufus II\", \"Tues, Wed\"],\n        [\"Echendu Chimenierm\", \"Wed, Thurs\"],\n        [\"Delgado Jose\", \"Fri, Sat\"]\n      ],\n      gate: [\n        [\"Candace Warren\", \"Sat, Sun\"],\n        [\"Connie Johnson\", \"Sat, Sun\"],\n        [\"Jarade Douglas\", \"Sat, Sun\"],\n        [\"Gregory Watson II\", \"Sat, Sun\"],\n        [\"Bryce Alexander\", \"Thurs, Fri\"],\n        [\"Naomisha Hunt\", \"Thurs, Fri, Sat\"],\n        [\"Ramacacondra Pratt\", \"Thurs, Fri\"],\n        [\"Kane Cabral\", \"Mon, Tues\"],\n        [\"Tavares Gariet\", \"Mon, Tues\"]\n      ]\n    };\n\n    const shiftLabels = {\n      first: \"1st Shift\",\n      second: \"2nd Shift\",\n      gate: \"Gate\",\n      mechanics: \"Mechanics\",\n      managers: \"Managers\"\n    };\n\n    function escapeHtml(value) {\n      return String(value).replace(/[&<>\"']/g, (char) => ({\n        \"&\": \"&amp;\",\n        \"<\": \"&lt;\",\n        \">\": \"&gt;\",\n        '\"': \"&quot;\",\n        \"'\": \"&#39;\"\n      }[char]));\n    }\n\n    function isoDate(date) {\n      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, \"0\")}-${String(date.getDate()).padStart(2, \"0\")}`;\n    }\n\n    function dateFromKey(key) {\n      const [year, month, day] = String(key || \"\").split(\"-\").map(Number);\n      return new Date(year || today.getFullYear(), (month || 1) - 1, day || 1);\n    }\n\n    function monthDayLabel(key) {\n      const date = dateFromKey(key);\n      return `${date.getMonth() + 1}-${date.getDate()}`;\n    }\n\n    function normalizeName(name) {\n      const suffixes = new Set([\"jr\", \"sr\", \"ii\", \"iii\", \"iv\"]);\n      return String(name || \"\")\n        .trim()\n        .toLowerCase()\n        .replace(/[,.]/g, \" \")\n        .replace(/\\bcontrerras\\b/g, \"contreras\")\n        .replace(/\\s+/g, \" \")\n        .split(\" \")\n        .filter((part) => part && !suffixes.has(part))\n        .sort()\n        .join(\" \");\n    }\n\n    function parseOffDays(text) {\n      return new Set(String(text || \"\")\n        .split(\",\")\n        .map((item) => item.trim().toLowerCase())\n        .map((item) => dayAliases[item] || dayAliases[item.slice(0, 3)])\n        .filter(Boolean));\n    }\n\n    function rosterOffDaysLabel(days) {\n      return days\n        .map((day, index) => day === \"O\" ? rosterDayLabels[index] : \"\")\n        .filter(Boolean)\n        .join(\", \");\n    }\n\n    function migrateMcDanielToDays(state) {\n      if (!state || !Array.isArray(state.second)) return state;\n      if (!Array.isArray(state.first)) state.first = [];\n      const alreadyOnDays = state.first.some((employee) => normalizeName(employee.name || \"\") === \"charles mcdaniel\");\n      const secondIndex = state.second.findIndex((employee) => normalizeName(employee.name || \"\") === \"charles mcdaniel\");\n      if (secondIndex === -1) return state;\n      const [employee] = state.second.splice(secondIndex, 1);\n      if (!alreadyOnDays) state.first.push(employee);\n      localStorage.setItem(rosterStorageKey, JSON.stringify(state));\n      return state;\n    }\n\n    function readRosterAdditions() {\n      try {\n        const additions = JSON.parse(localStorage.getItem(rosterAdditionsKey) || \"[]\");\n        return Array.isArray(additions) ? additions : [];\n      } catch (error) {\n        localStorage.removeItem(rosterAdditionsKey);\n        return [];\n      }\n    }\n\n    function buildRoster() {\n      const roster = Object.fromEntries(Object.entries(defaultRoster).map(([key, rows]) => [\n        key,\n        rows.map(([name, offDays]) => ({ name, offDays }))\n      ]));\n\n      try {\n        const saved = localStorage.getItem(rosterStorageKey);\n        if (saved) {\n          const state = migrateMcDanielToDays(JSON.parse(saved));\n          [\"first\", \"second\", \"gate\", \"mechanics\", \"managers\"].forEach((key) => {\n            if (!Array.isArray(state[key])) return;\n            roster[key] = state[key]\n              .filter((employee) => employee && employee.name)\n              .map((employee) => ({\n                name: employee.name,\n                offDays: Array.isArray(employee.days) ? rosterOffDaysLabel(employee.days) : \"\"\n              }));\n          });\n        }\n      } catch (error) {\n        localStorage.removeItem(rosterStorageKey);\n      }\n\n      const seen = new Set(Object.values(roster).flat().map((employee) => normalizeName(employee.name)));\n      readRosterAdditions().forEach((addition) => {\n        if (!addition || !addition.name) return;\n        const key = addition.shift || \"first\";\n        const nameKey = normalizeName(addition.name);\n        if (!nameKey || seen.has(nameKey)) return;\n        if (!Array.isArray(roster[key])) roster[key] = [];\n        roster[key].push({\n          name: addition.name,\n          offDays: Array.isArray(addition.days) ? rosterOffDaysLabel(addition.days) : \"\"\n        });\n        seen.add(nameKey);\n      });\n\n      return roster;\n    }\n\n    function toMilitaryTime(value) {\n      const text = String(value || \"\").trim();\n      if (!text) return \"\";\n      const match = text.match(/^(\\d{1,2}):(\\d{2})\\s*([ap])m$/i);\n      if (!match) return text;\n      let hour = Number(match[1]);\n      const minute = match[2];\n      const period = match[3].toLowerCase();\n      if (period === \"p\" && hour !== 12) hour += 12;\n      if (period === \"a\" && hour === 12) hour = 0;\n      return `${String(hour).padStart(2, \"0\")}${minute}`;\n    }\n\n    function minutesFromMilitary(value) {\n      const text = String(value || \"\").trim();\n      const match = text.match(/^(\\d{1,2})(\\d{2})$/);\n      if (!match) return null;\n      const hours = Number(match[1]);\n      const minutes = Number(match[2]);\n      if (hours > 24 || minutes > 59 || (hours === 24 && minutes !== 0)) return null;\n      return (hours * 60) + minutes;\n    }\n\n    function militaryFromMinutes(value) {\n      const minutes = ((Math.round(value) % 1440) + 1440) % 1440;\n      const hours = Math.floor(minutes / 60);\n      const mins = minutes % 60;\n      return `${String(hours).padStart(2, \"0\")}${String(mins).padStart(2, \"0\")}`;\n    }\n\n    function currentMinutes() {\n      const now = new Date();\n      return (now.getHours() * 60) + now.getMinutes();\n    }\n\n    function currentMilitaryTime() {\n      return militaryFromMinutes(currentMinutes());\n    }\n\n    function dayKeyFromDateValue(value) {\n      const text = String(value || \"\").trim();\n      if (!text) return \"\";\n      const dayNameMatch = text.match(/^([a-z]{3,9})\\b/i);\n      const explicitDay = dayNameMatch ? dayAliases[dayNameMatch[1].toLowerCase()] : \"\";\n      if (explicitDay) return explicitDay;\n      const match = text.match(/^(\\d{1,2})\\/(\\d{1,2})\\/(\\d{2,4})/);\n      const date = match\n        ? new Date(Number(match[3].length === 2 ? `20${match[3]}` : match[3]), Number(match[1]) - 1, Number(match[2]))\n        : new Date(text);\n      if (Number.isNaN(date.getTime())) return \"\";\n      return [\"sun\", \"mon\", \"tue\", \"wed\", \"thu\", \"fri\", \"sat\"][date.getDay()];\n    }\n\n    function dayKeyFromArchiveDate(key) {\n      const date = dateFromKey(key);\n      return [\"sun\", \"mon\", \"tue\", \"wed\", \"thu\", \"fri\", \"sat\"][date.getDay()];\n    }\n\n    function readPunches() {\n      try {\n        const punches = JSON.parse(localStorage.getItem(dayforceStorageKey) || \"[]\");\n        return Array.isArray(punches) ? punches : [];\n      } catch (error) {\n        localStorage.removeItem(dayforceStorageKey);\n        return [];\n      }\n    }\n\n    function previousShiftHours() {\n      try {\n        const saved = JSON.parse(localStorage.getItem(previousTimesheetStorageKey) || \"null\");\n        return saved && typeof saved.hours === \"number\" ? Math.max(Number(saved.hours) || 0, 0) : 0;\n      } catch (error) {\n        localStorage.removeItem(previousTimesheetStorageKey);\n        return 0;\n      }\n    }\n\n    function readTimesheetSettings() {\n      try {\n        const saved = JSON.parse(localStorage.getItem(timesheetSettingsKey) || \"null\");\n        return {\n          lifts: saved && saved.lifts !== undefined ? Number(saved.lifts) || 0 : 339,\n          flips: saved && saved.flips !== undefined ? Number(saved.flips) || 0 : 5,\n          shiftEndMode: (saved && saved.shiftEndMode) || \"1500\",\n          shiftEndCustom: String((saved && saved.shiftEndCustom) || \"\")\n        };\n      } catch (error) {\n        localStorage.removeItem(timesheetSettingsKey);\n        return { lifts: 339, flips: 5, shiftEndMode: \"1500\", shiftEndCustom: \"\" };\n      }\n    }\n\n    function shiftEndFromSettings(settings) {\n      if (settings.shiftEndMode && settings.shiftEndMode !== \"other\") return settings.shiftEndMode;\n      return String(settings.shiftEndCustom || \"1500\").trim().padStart(4, \"0\");\n    }\n\n    function readArchive() {\n      try {\n        const archive = JSON.parse(localStorage.getItem(ar led.length ? \" Failed: \" + failed.join(\"; \") : \"\";\n      setArchiveMessage(\"Imported \" + imported + \" archived timesheet\" + (imported === 1 ? \"\" : \"s\") + \".\" + failedText);\n    }\n\n    function rowClass(row) {\n      const classes = [\"md-row\"];\n      if (row.status === \"IN\") classes.push(\"in-row\");\n      if (row.status === \"OUT\") classes.push(\"out-row\");\n      if (row.cameInOffDay) classes.push(\"offday-row\");\n      if (row.missing) classes.push(\"missing-row\");\n      if (row.invalid) classes.push(\"invalid-row\");\n      if (row.purpleAbsence || row.paidAbsence) classes.push(\"absence-row\");\n      if (row.unpaidAbsence) classes.push(\"unpaid-row\");\n      return classes.join(\" \");\n    }\n\n    function shiftHeaderLabel(shiftKey) {\n      if (shiftKey === \"first\") return \"1st SHIFT\";\n      if (shiftKey === \"second\") return \"2ND SHIFT\";\n      return String(shiftLabels[shiftKey] || shiftKey).toUpperCase();\n    }\n\n    function sectionStats(rows, shiftKey) {\n      const rowsWithIndex = rows.map((row, index) => ({ ...row, archiveIndex: index }));\n      const scheduled = rows.filter((row) => row.scheduled).length;\n      const here = rows.filter((row) => row.hasClockIn && !row.hasClockOut).length;\n      const out = rows.filter((row) => row.scheduled && !row.unpaidAbsence && !(row.hasClockIn && !row.hasClockOut)).length;\n      const actual = rows.reduce((sum, row) => sum + (Number(row.actual) || 0), 0);\n      const visibleRows = rowsWithIndex.filter((row) => !(row.status === \"OFF\" && !row.note));\n      const offRows = rowsWithIndex.filter((row) => row.status === \"OFF\" && !row.note);\n      return { scheduled, here, out, actual, visibleRows, offRows, shiftKey };\n    }\n\n    function renderKpis(snapshot) {\n      const details = metricsFor(snapshot.shifts, snapshot.metrics || {});\n      const remainText = details.goalMet ? \"MET GOAL!\" : String(Math.max(details.remainValue, 0));\n      document.getElementById(\"previewKpis\").innerHTML = [\n        [\"Lifts\", details.lifts, \"\"],\n        [\"Flips\", details.flips, \"\"],\n        [\"Shift End\", details.shiftEnd, \"\"],\n        [\"Lifts Needed\", details.neededValue, \"\"],\n        [\"Current LPMH\", details.currentRate.toFixed(1), details.currentRate >= lpmhGoal ? \"good\" : \"bad\"],\n        [\"LPH Needed\", details.neededLph, details.goalMet ? \"good\" : \"warn\"],\n        [\"Lifts Remain\", remainText, details.goalMet ? \"good\" : \"warn\"]\n      ].map(([label, value, className]) => `\n        <div class=\"kpi ${className}\">\n          <div class=\"kpi-label\">${escapeHtml(label)}</div>\n          <div class=\"kpi-value\">${escapeHtml(value)}</div>\n        </div>\n      `).join(\"\");\n    }\n\n    function renderEmployeeRow(row, shiftKey, rowIndex) {\n      const lunchOptions = [\"\", \"NO\", \"YES\", \"??\"].map((value) => (\n        `<option value=\"${escapeHtml(value)}\" ${String(row.lunch || \"\") === value ? \"selected\" : \"\"}>${escapeHtml(value || \"-\")}</option>`\n      )).join(\"\");\n      return `\n        <div class=\"${rowClass(row)}\" data-shift=\"${escapeHtml(shiftKey)}\" data-row=\"${rowIndex}\">\n          <span class=\"name ${row.missing ? \"missing\" : \"\"}\">${escapeHtml(row.name)}</span>\n          <span class=\"off\">${escapeHtml(row.offDays)}</span>\n          <input class=\"note-edit\" value=\"${escapeHtml(row.note || \"\")}\" aria-label=\"${escapeHtml(row.name)} note\" />\n          <input class=\"time-edit ${row.missing ? \"missing\" : \"\"}\" value=\"${escapeHtml(row.missing ? \"Missing?\" : row.start || \"\")}\" aria-label=\"${escapeHtml(row.name)} start\" />\n          <select class=\"lunch-edit\" aria-label=\"${escapeHtml(row.name)} lunch\">${lunchOptions}</select>\n          <input class=\"time-edit\" value=\"${escapeHtml(row.end || \"\")}\" aria-label=\"${escapeHtml(row.name)} end\" />\n          <span class=\"actual\">${Number(row.actual) ? Number(row.actual).toFixed(1) : \"\"}</span>\n        </div>\n      `;\n    }\n\n    function renderShiftCard(shiftKey, rows) {\n      const stats = sectionStats(rows, shiftKey);\n      const offList = stats.offRows.length\n        ? stats.offRows.map((row) => `<span class=\"off-chip\">${escapeHtml(row.name)}</span>`).join(\"\")\n        : `<span class=\"off-chip\">None</span>`;\n      const body = stats.visibleRows.length\n        ? stats.visibleRows.map((row) => renderEmployeeRow(row, shiftKey, row.archiveIndex)).join(\"\")\n        : `<div class=\"off-footer\"><strong>No rows</strong></div>`;\n\n      return `\n        <section class=\"shift-card\">\n          <header class=\"shift-head\">\n            <span class=\"shift-name\">${escapeHtml(`${shiftHeaderLabel(shiftKey)} [${stats.scheduled} sch]`)}</span>\n            <span>Off Days</span>\n            <span>NOTE</span>\n            <span>${escapeHtml(`${stats.here} HERE, ${stats.out} OUT`)}</span>\n            <span>Lunch</span>\n            <span>End</span>\n            <span>${escapeHtml(`Actual ${stats.actual.toFixed(1)}`)}</span>\n          </header>\n          ${body}\n          <div class=\"off-footer\"><strong>${escapeHtml(`OFF - ${stats.offRows.length}`)}</strong>${offList}</div>\n        </section>\n      `;\n    }\n\n    function renderPreview(snapshot) {\n      document.getElementById(\"previewTitle\").textContent = `${monthDayLabel(snapshot.dateKey)} Timesheet`;\n      renderKpis(snapshot);\n      document.getElementById(\"previewCards\").innerHTML = [\"first\", \"second\", \"gate\", \"mechanics\", \"managers\"]\n        .filter((key) => Array.isArray(snapshot.shifts[key]) && snapshot.shifts[key].length)\n        .map((key) => renderShiftCard(key, snapshot.shifts[key]))\n        .join(\"\");\n    }\n\n    function resetDeleteArchiveButton() {\n      deleteArchiveButton.textContent = \"Delete\";\n      deleteArchiveButton.classList.remove(\"confirm-delete\");\n      deleteArchiveButton.dataset.confirming = \"0\";\n    }\n\n    function openArchive(dateKey) {\n      const archive = readArchive();\n      if (!archive[dateKey]) return;\n      activeArchiveKey = dateKey;\n      activeArchive = JSON.parse(JSON.stringify(archive[dateKey]));\n      resetDeleteArchiveButton();\n      renderPreview(activeArchive);\n      document.getElementById(\"previewModal\").classList.add(\"open\");\n      document.getElementById(\"previewModal\").setAttribute(\"aria-hidden\", \"false\");\n    }\n\n    function closePreview() {\n      document.getElementById(\"previewModal\").classList.remove(\"open\");\n      document.getElementById(\"previewModal\").setAttribute(\"aria-hidden\", \"true\");\n      resetDeleteArchiveButton();\n      activeArchiveKey = \"\";\n      activeArchive = null;\n    }\n\n    function deleteActiveArchive() {\n      if (!activeArchiveKey) return;\n      if (deleteArchiveButton.dataset.confirming !== \"1\") {\n        deleteArchiveButton.textContent = \"Confirm\";\n        deleteArchiveButton.classList.add(\"confirm-delete\");\n        deleteArchiveButton.dataset.confirming = \"1\";\n        return;\n      }\n\n      const deletedKey = activeArchiveKey;\n      const archive = readArchive();\n      delete archive[deletedKey];\n      writeArchive(archive);\n      closePreview();\n      setArchiveMessage(\"Deleted \" + monthDayLabel(deletedKey));\n      renderCalendar();\n    }\n\n    function statusFromEdited(row, start, end, note, shiftKey) {\n      const hasClockIn = minutesFromMilitary(start) !== null;\n      const hasClockOut = minutesFromMilitary(end) !== null;\n      const invalid = Boolean((start && start !== \"Missing?\" && minutesFromMilitary(start) === null) || (end && minutesFromMilitary(end) === null));\n      const purpleAbsence = noteIsPurple(note, row);\n      const missing = shouldCheckMissingStart(shiftKey) && row.scheduled && !note && !hasClockIn;\n      if (invalid) return \"INVALID\";\n      if (row.unpaidAbsence || /\\bunpaid\\b/i.test(note)) return \"UNPAID\";\n      if (row.paidAbsence || purpleAbsence) return \"PAID\";\n      if (missing) return \"NO SHOW\";\n      if (hasClockIn && !hasClockOut) return \"IN\";\n      if (hasClockIn && hasClockOut) return \"OUT\";\n      if (!row.scheduled) return \"OFF\";\n      return \"OPEN\";\n    }\n\n    function updateArchiveFromPreview() {\n      if (!activeArchive || !activeArchiveKey) return;\n      document.querySelectorAll(\"#previewCards .md-row\").forEach((element) => {\n        const shiftKey = element.dataset.shift;\n        const rowIndex = Number(element.dataset.row);\n        const row = activeArchive.shifts[shiftKey] && activeArchive.shifts[shiftKey][rowIndex];\n        if (!row) return;\n        const inputs = element.querySelectorAll(\".time-edit\");\n        const note = element.querySelector(\".note-edit\").value.trim();\n        const start = inputs[0].value.trim() === \"Missing?\" ? \"\" : inputs[0].value.trim();\n        const lunch = element.querySelector(\".lunch-edit\").value.trim();\n        const end = inputs[1].value.trim();\n        row.note = note;\n        row.start = start;\n        row.lunch = lunch;\n        row.end = end;\n        row.hasClockIn = minutesFromMilitary(start) !== null;\n        row.hasClockOut = minutesFromMilitary(end) !== null;\n        row.actual = actualHours(start, lunch, end) + paidNoteHoursForText(note);\n        row.cameInOffDay = !row.scheduled && Boolean(start || end);\n        row.unpaidAbsence = /\\bunpaid\\b/i.test(note);\n        row.paidAbsence = !row.unpaidAbsence && /\\bfloating holidays?\\b|\\bvacations?\\b|\\bsick\\b/i.test(note);\n        row.purpleAbsence = noteIsPurple(note, row);\n        row.invalid = Boolean((start && minutesFromMilitary(start) === null) || (end && minutesFromMilitary(end) === null));\n        row.missing = shouldCheckMissingStart(shiftKey) && row.scheduled && !note && !row.hasClockIn;\n        row.status = statusFromEdited(row, start, end, note, shiftKey);\n      });\n\n      activeArchive.savedAt n      if (event.target.id === \"previewModal\") closePreview();\n    });\n\n    document.getElementById(\"calendarGrid\").addEventListener(\"click\", (event) => {\n      const pill = event.target.closest(\"[data-open]\");\n      if (pill) {\n        event.stopPropagation();\n        openArchive(pill.dataset.open);\n        return;\n      }\n      const cell = event.target.closest(\"[data-date]\");\n      if (!cell) return;\n      selectedDateKey = cell.dataset.date;\n      document.getElementById(\"archiveDate\").value = selectedDateKey;\n      renderCalendar();\n    });\n\n    document.addEventListener(\"keydown\", (event) => {\n      if (event.key === \"Escape\") closePreview();\n    });\n\n    document.getElementById(\"archiveDate\").value = selectedDateKey;\n    renderCalendar();\n  <\/script>\n</body>\n</html>\n" },
