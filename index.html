       <span>${escapeHtml(`${stats.here} HERE, ${stats.out} OUT`)}</span>\n            <span>Lunch</span>\n            <span>End</span>\n            <span>${escapeHtml(`Actual ${stats.actual.toFixed(1)}`)}</span>\n          </header>\n          ${body}\n          <div class=\"off-footer\"><strong>${escapeHtml(`OFF - ${stats.offRows.length}`)}</strong>${offList}</div>\n        </section>\n      `;\n    }\n\n    function shiftEndValue() {\n      const preset = document.getElementById(\"shiftEndSelect\").value;\n      if (preset !== \"other\") return preset;\n      return document.getElementById(\"shiftEndOther\").value.trim().padStart(4, \"0\");\n    }\n\n    function hoursUntilShiftEnd(value) {\n      const endMinutes = minutesFromMilitary(value);\n      if (endMinutes === null) return 0;\n      let remaining = endMinutes - currentMinutes();\n      if (remaining <= 0) remaining += 1440;\n      return remaining / 60;\n    }\n\n    function currentLpmhBreakdown(rowsByShift) {\n      const lifts = Number(document.getElementById(\"updateLifts\").value) || 0;\n      const flips = Number(document.getElementById(\"updateFlips\").value) || 0;\n      const firstHours = (rowsByShift.first || []).reduce((sum, row) => sum + row.actual, 0);\n      const secondHours = (rowsByShift.second || []).reduce((sum, row) => sum + row.actual, 0);\n      const currentHours = firstHours + secondHours;\n      const previousHours = previousShiftHours();\n      const shiftHours = currentHours + previousHours;\n      const totalMoves = Math.max(lifts + flips, 0);\n      const currentRate = shiftHours > 0 ? totalMoves / shiftHours : 0;\n      const neededValue = Math.ceil(shiftHours * lpmhGoal);\n      const remainValue = neededValue - totalMoves;\n      const remainingHours = hoursUntilShiftEnd(shiftEndValue());\n      const goalMet = shiftHours > 0 && currentRate >= lpmhGoal;\n      const neededLph = goalMet ? \"MET GOAL!\" : (remainingHours > 0 ? (Math.max(remainValue, 0) / remainingHours).toFixed(1) : \"0.0\");\n      return { lifts, flips, currentHours, previousHours, shiftHours, totalMoves, currentRate, neededValue, remainValue, remainingHours, goalMet, neededLph };\n    }\n\n    function updateMetrics(rowsByShift) {\n      const details = currentLpmhBreakdown(rowsByShift);\n      const lphNeededValue = document.getElementById(\"lphNeeded\");\n      const liftsRemainValue = document.getElementById(\"liftsRemain\");\n      document.getElementById(\"currentLpmh\").textContent = details.currentRate.toFixed(1);\n      lphNeededValue.textContent = details.neededLph;\n      document.getElementById(\"liftsNeeded\").textContent = String(details.neededValue);\n      liftsRemainValue.textContent = details.goalMet ? \"MET GOAL!\" : String(Math.max(details.remainValue, 0));\n      lphNeededValue.classList.toggle(\"goal-text\", details.neededLph === \"MET GOAL!\");\n      liftsRemainValue.classList.toggle(\"goal-text\", details.goalMet);\n      const currentLpmhCard = document.getElementById(\"currentLpmhButton\");\n      currentLpmhCard.classList.toggle(\"good\", details.currentRate >= lpmhGoal);\n      currentLpmhCard.classList.toggle(\"bad\", details.currentRate < lpmhGoal);\n      for (const card of [document.getElementById(\"lphNeededCard\"), document.getElementById(\"liftsRemainCard\")]) {\n        card.classList.toggle(\"good\", details.goalMet);\n        card.classList.toggle(\"warn\", !details.goalMet);\n      }\n      if (lpmhModal.classList.contains(\"open\")) renderCurrentLpmhDetails(rowsByShift);\n    }\n\n    function renderCurrentLpmhDetails(rowsByShift = makeRows()) {\n      const details = currentLpmhBreakdown(rowsByShift);\n      const rows = [\n        [\"Lifts\", details.lifts],\n        [\"Flips\", details.flips],\n        [\"Total moves\", `${details.lifts} + ${details.flips} = ${details.totalMoves}`],\n        [\"Current 1st + 2nd hrs\", details.currentHours.toFixed(1)],\n        [\"0000-0300 hrs\", details.previousHours.toFixed(1)],\n        [\"Total hrs\", `${details.currentHours.toFixed(1)} + ${details.previousHours.toFixed(1)} = ${details.shiftHours.toFixed(1)}`]\n      ];\n      const formula = `${details.totalMoves} MOVES / ${details.shiftHours.toFixed(1)} HRS = ${details.currentRate.toFixed(1)}`;\n      lpmhDetails.innerHTML = [\n        ...rows.map(([label, value]) => `<div class=\"lpmh-row\"><span>${escapeHtml(label)}</span><span>${escapeHtml(value)}</span></div>`),\n        `<div class=\"lpmh-formula\">${escapeHtml(formula)}</div>`\n      ].join(\"\");\n    }\n\n    function showCurrentLpmhModal() {\n      renderCurrentLpmhDetails(makeRows());\n      lpmhModal.classList.add(\"open\");\n      lpmhModal.setAttribute(\"aria-hidden\", \"false\");\n    }\n\n    function closeCurrentLpmhModal() {\n      lpmhModal.classList.remove(\"open\");\n      lpmhModal.setAttribute(\"aria-hidden\", \"true\");\n    }\n\n    function render() {\n      const rowsByShift = makeRows();\n      cards.innerHTML = [\"first\", \"second\", \"gate\", \"mechanics\", \"managers\"]\n        .filter((key) => Array.isArray(rowsByShift[key]) && rowsByShift[key].length)\n        .map((key) => renderShiftCard(key, rowsByShift[key]))\n        .join(\"\");\n      updatePreviousTimesheetWarning();\n      updateMetrics(rowsByShift);\n    }\n\n    function updateShiftEndMode(shouldRender = true) {\n      const isOther = document.getElementById(\"shiftEndSelect\").value === \"other\";\n      const custom = document.getElementById(\"shiftEndOther\");\n      custom.classList.toggle(\"open\", isOther);\n      if (isOther) custom.focus();\n      if (shouldRender) render();\n    }\n\n    document.getElementById(\"todayLabel\").textContent = new Date().toLocaleDateString(undefined, {\n      weekday: \"short\",\n      month: \"short\",\n      day: \"numeric\",\n      year: \"numeric\"\n    });\n\n    document.addEventListener(\"input\", (event) => {\n      if (event.target.matches(\"#updateLifts, #updateFlips, #shiftEndOther\")) {\n        writeTimesheetSettings();\n        render();\n      }\n    });\n\n    document.getElementById(\"shiftEndSelect\").addEventListener(\"change\", () => {\n      writeTimesheetSettings();\n      updateShiftEndMode();\n    });\n    document.getElementById(\"shiftEndOther\").addEventListener(\"input\", (event) => {\n      event.target.value = event.target.value.replace(/\\D/g, \"\").slice(0, 4);\n    });\n    document.getElementById(\"currentLpmhButton\").addEventListener(\"click\", showCurrentLpmhModal);\n    document.getElementById(\"closeLpmhModal\").addEventListener(\"click\", closeCurrentLpmhModal);\n    lpmhModal.addEventListener(\"click\", (event) => {\n      if (event.target === lpmhModal) closeCurrentLpmhModal();\n    });\n    document.addEventListener(\"keydown\", (event) => {\n      if (event.key === \"Escape\") closeCurrentLpmhModal();\n    });\n\n    applyTimesheetSettings();\n    updateShiftEndMode(false);\n    render();\n    setInterval(render, 60000);\n  <\/script>\n</body>\n</html>\n" },

ring(index))) {\n          cell.textContent = String(Number(cell.textContent) + 1);\n        }\n      });\n    }\n\n    function recalcDailyTotals(table) {\n      const totals = table.querySelectorAll(\"tfoot .total-number\");\n      totals.forEach((total, index) => {\n        const workCount = Array.from(table.querySelectorAll(\"tbody tr\")).filter((row) => {\n          const cell = row.children[index + 1];\n          return cell && cell.textContent.trim().toUpperCase() === \"W\";\n        }).length;\n        total.textContent = String(workCount);\n      });\n    }\n\n    function setSideTotal(labelText, value) {\n      const labels = Array.from(document.querySelectorAll(\".total-box .label\"));\n      const label = labels.find((item) => item.textContent.trim() === labelText);\n      if (!label || !label.nextElementSibling) return;\n      label.nextElementSibling.textContent = String(value);\n    }\n\n    function updateSideTotal(labelText, amount = 1) {\n      if (!labelText) return;\n      const labels = Array.from(document.querySelectorAll(\".total-box .label\"));\n      const label = labels.find((item) => item.textContent.trim() === labelText);\n      if (!label || !label.nextElementSibling) return;\n      label.nextElementSibling.textContent = String(Number(label.nextElementSibling.textContent) + amount);\n    }\n\n    function rowToData(row) {\n      const nameCell = row.querySelector(\".name\");\n      const role = [\"side\", \"crane\", \"everything\", \"lead\"].find((className) => nameCell.classList.contains(className)) || \"\";\n      return {\n        name: nameCell.textContent.trim(),\n        role,\n        days: Array.from(row.children).slice(1, 8).map((cell) => cell.textContent.trim().toUpperCase() === \"O\" ? \"O\" : \"W\")\n      };\n    }\n\n    function dataToRow(employee) {\n      const row = document.createElement(\"tr\");\n      const nameCell = document.createElement(\"td\");\n      nameCell.className = `name${employee.role ? ` ${employee.role}` : \"\"}`;\n      nameCell.textContent = employee.name;\n      row.appendChild(nameCell);\n\n      const days = Array.isArray(employee.days) ? employee.days : [\"W\", \"W\", \"W\", \"W\", \"W\", \"W\", \"W\"];\n      days.forEach((day) => {\n        const cell = document.createElement(\"td\");\n        const isOff = day === \"O\";\n        cell.className = isOff ? \"o\" : \"w\";\n        cell.textContent = isOff ? \"O\" : \"W\";\n        row.appendChild(cell);\n      });\n\n      addActionsToRow(row);\n      return row;\n    }\n\n    function captureRosterState() {\n      const state = {};\n      document.querySelectorAll(\"table[data-roster]\").forEach((table) => {\n        state[table.dataset.roster] = Array.from(table.querySelectorAll(\"tbody tr\")).map(rowToData);\n      });\n      return state;\n    }\n\n    function saveRosterState() {\n      localStorage.setItem(rosterStorageKey, JSON.stringify(captureRosterState()));\n    }\n\n    function updateSectionCount(table) {\n      const rosterId = table.dataset.roster;\n      const form = document.querySelector(`.add-row[data-target=\"${rosterId}\"]`);\n      const title = form ? form.previousElementSibling : null;\n      if (!title) return;\n      const count = table.querySelectorAll(\"tbody tr\").length;\n      setShiftTitleCount(title, count, table);\n    }\n\n    function refreshRosterNumbers() {\n      const rampCount = [\"first\", \"second\"].reduce((total, rosterId) => {\n        const table = document.querySelector(`table[data-roster=\"${rosterId}\"]`);\n        return total + (table ? table.querySelectorAll(\"tbody tr\").length : 0);\n      }, 0);\n      const gateTable = document.querySelector('table[data-roster=\"gate\"]');\n      const mechTable = document.querySelector('table[data-roster=\"mechanics\"]');\n\n      setSideTotal(\"RAMP TOTAL\", rampCount);\n      setSideTotal(\"GATE TOTAL\", gateTable ? gateTable.querySelectorAll(\"tbody tr\").length : 0);\n      setSideTotal(\"MECH TOTAL\", mechTable ? mechTable.querySelectorAll(\"tbody tr\").length : 0);\n\n      document.querySelectorAll(\"table[data-roster]\").forEach((table) => {\n        updateSectionCount(table);\n        recalcDailyTotals(table);\n      });\n    }\n\n    function migrateMcDanielToDays(state) {\n      if (!state || !Array.isArray(state.second)) return state;\n      if (!Array.isArray(state.first)) state.first = [];\n\n      const alreadyOnDays = state.first.some((employee) => normalizeRosterName(employee.name) === \"charles mcdaniel\");\n      const secondIndex = state.second.findIndex((employee) => normalizeRosterName(employee.name) === \"charles mcdaniel\");\n      if (secondIndex === -1) return state;\n\n      const [employee] = state.second.splice(secondIndex, 1);\n      if (!alreadyOnDays) state.first.push(employee);\n      localStorage.setItem(rosterStorageKey, JSON.stringify(state));\n      return state;\n    }\n\n    function loadRosterState() {\n      const saved = localStorage.getItem(rosterStorageKey);\n      if (!saved) return;\n\n      try {\n        const state = migrateMcDanielToDays(JSON.parse(saved));\n        Object.entries(state).forEach(([rosterId, employees]) => {\n          const table = document.querySelector(`table[data-roster=\"${rosterId}\"]`);\n          if (!table || !Array.isArray(employees)) return;\n\n          const body = table.querySelector(\"tbody\");\n          body.innerHTML = \"\";\n          employees.forEach((employee) => {\n            if (!employee || !employee.name || !Array.isArray(employee.days)) return;\n            body.appendChild(dataToRow(employee));\n          });\n        });\n        refreshRosterNumbers();\n      } catch (error) {\n        localStorage.removeItem(rosterStorageKey);\n      }\n    }\n\n    function applyPendingRosterAdditions() {\n      const additions = readRosterAdditions();\n      if (!additions.length) return;\n\n      const existing = rosterNameSet();\n      let added = 0;\n      additions.forEach((addition) => {\n        if (!addition || !addition.name) return;\n        const rosterId = addition.shift || \"first\";\n        const table = document.querySelector(`table[data-roster=\"${rosterId}\"]`);\n        const key = normalizeRosterName(addition.name);\n        if (!table || !key || existing.has(key)) return;\n\n        table.querySelector(\"tbody\").appendChild(dataToRow({\n          name: addition.name,\n          role: addition.role || \"\",\n          days: Array.isArray(addition.days) ? addition.days : [\"W\", \"W\", \"W\", \"W\", \"W\", \"W\", \"W\"]\n        }));\n        existing.add(key);\n        added += 1;\n      });\n\n      if (added) {\n        refreshRosterNumbers();\n        saveRosterState();\n      }\n      localStorage.removeItem(rosterAdditionsKey);\n    }\n\n    function addRosterRow(event) {\n      event.preventDefault();\n\n      const form = event.currentTarget;\n      const nameInput = form.elements.employee;\n      const employeeName = nameInput.value.trim();\n      if (!employeeName) return;\n\n      const rosterId = form.dataset.target;\n      const table = document.querySelector(`table[data-roster=\"${rosterId}\"]`);\n      const body = table.querySelector(\"tbody\");\n      const offDays = new Set(Array.from(form.querySelectorAll('input[name=\"off\"]:checked')).map((input) => input.value));\n      const role = form.elements.role.value;\n\n      const row = document.createElement(\"tr\");\n      const nameCell = document.createElement(\"td\");\n      nameCell.className = `name${role ? ` ${role}` : \"\"}`;\n      nameCell.textContent = employeeName;\n      row.appendChild(nameCell);\n\n      for (let day = 0; day < 7; day += 1) {\n        const cell = document.createElement(\"td\");\n        const isOff = offDays.has(String(day));\n        cell.className = isOff ? \"o\" : \"w\";\n        cell.textContent = isOff ? \"O\" : \"W\";\n        row.appendChild(cell);\n      }\n\n      addActionsToRow(row);\n      body.appendChild(row);\n      updateTitleCount(form, 1);\n      updateDailyTotals(table, offDays);\n      updateSideTotal(sectionTotals[rosterId]);\n      saveRosterState();\n      form.reset();\n      nameInput.focus();\n    }\n\n    function addActionsToTable(table) {\n      const headRow = table.querySelector(\"thead tr\");\n      const footerRow = table.querySelector(\"tfoot tr\");\n      const colgroup = table.querySelector(\"colgroup\");\n\n      if (colgroup && !colgroup.querySelector(\"col.actions\")) {\n        const col = document.createElement(\"col\");\n        col.className = \"actions\";\n        colgroup.appendChild(col);\n      }\n\n      if (headRow && !headRow.querySelector(\".action-head\")) {\n        const actionHead = document.createElement(\"th\");\n        actionHead.className = \"action-head\";\n        actionHead.textContent = \"Options\";\n        headRow.appendChild(actionHead);\n      }\n\n      if (footerRow && !footerRow.querySelector(\".actions-total\")) {\n        const actionTotal = document.createElement(\"td\");\n        actionTotal.className = \"actions-total\";\n        footerRow.appendChild(actionTotal);\n      }\n\n      table.querySelectorAll(\".employee-head, .day-head\").forEach((header, index) => {\n        const filter = header.querySelector(\".filter\");\n        if (!filter) return;\n        filter.setAttribute(\"role\", \"button\");\n        filter.setAttribute(\"tabindex\", \"0\");\n        filter.setAttribute(\"aria-label\", `Sort ${header.textContent.trim()}`);\n        filter.dataset.sortIndex = String(index);\n        filter.dataset.sortDirection = filter.dataset.sortDirection || \"asc\";\n      });\n\n      table.querySelectorAll(\"tbody tr\").forEach(addActionsToRow);\n    }\n\n    function addActionsToRow(row) {\n      if (row.querySelector(\".actions\")) return;\n\n      const cell = document.createElement(\"td\");\n      cell.className = \"actions\";\n      cell.innerHTML = `<button type=\"button\" class=\"row-action edit\" aria-label=\"Edit row\" title=\"Edit row\">${pencilIcon()}</button><button type=\"button\" class=\"row-action delete\" aria-label=\"Delete employee\" title=\"Delete employee\">${trashIcon()}</button>`;\n      row.appendChild(cell);\n    }\n\n    let rowBeingEdited = null;\n\n    function pencilIcon() {\n      return '<svg viewBox=\"0 0 24 24\" aria-hidden=\"true\"><path d=\"M12 20h9\" /><path d=\"M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z\" /></svg>';\n    }\n\n    function trashIcon() {\n      return '<svg viewBox=\"0 0 24 24\" aria-hidden=\"true\"><path d=\"M3 6h18\" /><path d=\"M8 6V4h8v2\" /><path d=\"M19 6l-1 15H6L5 6\" /><path d=\"M10 11v6\" /><path d=\"M14 11v6\" /></svg>';\n    }\n\n    function setEditButton(row, isEditing) {\n      const button = row.querySelector(\".row-action.edit\");\n      if (!button) return;\n      button.classList.toggle(\"saving\", isEditing);\n      button.innerHTML = isEditing ? \"Save\" : pencilIcon();\n      button.setAttribute(\"aria-label\", isEditing ? \"Save row changes\" : \"Edit row\");\n      button.setAttribute(\"title\", isEditing ? \"Save row changes\" : \"Edit row\");\n    }\n\n    function stopOffDayEditing() {\n      if (!rowBeingEdited) return;\n      const nameCell = rowBeingEdited.querySelector(\".name\");\n      if (nameCell) {\n        nameCell.textContent = nameCell.textContent.replace(/\\s+/g, \" \").trim();\n        nameCell.contentEditable = \"false\";\n      }\n      rowBeingEdited.classList.remove(\"editing-off\");\n      setEditButton(rowBeingEdited, false);\n      recalcDailyTotals(rowBeingEdited.closest(\"table\"));\n      saveRosterState();\n      rowBeingEdited = null;\n    }\n\n    function startOffDayEditing(row) {\n      if (rowBeingEdited && rowBeingEdited !== row) {\n        stopOffDayEditing();\n      }\n\n      rowBeingEdited = row;\n      row.classList.add(\"editing-off\");\n      const nameCell = row.querySelector(\".name\");\n      if (nameCell) {\n        nameCell.contentEditable = \"plaintext-only\";\n        nameCell.focus();\n        const selection = window.getSelection();\n        const range = document.createRange();\n        range.selectNodeContents(nameCell);\n        range.collapse(false);\n        selection.removeAllRanges();\n        selection.addRange(range);\n      }\n      setEditButton(row, true);\n    }\n\n    function toggleOffDayCell(cell) {\n      const isOff = cell.textContent.trim().toUpperCase() === \"O\";\n      cell.className = isOff ? \"w\" : \"o\";\n      cell.textContent = isOff ? \"W\" : \"O\";\n      recalcDailyTotals(cell.closest(\"table\"));\n    }\n\n    function deleteEmployee(row) {\n      const table = row.closest(\"table\");\n      const rosterId = table.dataset.roster;\n      const form = document.querySelector(`.add-row[data-target=\"${rosterId}\"]`);\n\n      row.remove();\n      if (form) updateTitleCount(form, -1);\n      recalcDailyTotals(table);\n      updateSideTotal(sectionTotals[rosterId], -1);\n      saveRosterState();\n    }\n\n    function clearDeleteConfirm(exceptButton) {\n      document.querySelectorAll(\".row-action.confirm-delete\").forEach((button) => {\n        if (button === exceptButton) return;\n        button.classList.remove(\"confirm-delete\");\n        button.innerHTML = trashIcon();\n        button.setAttribute(\"aria-label\", \"Delete employee\");\n        button.setAttribute(\"title\", \"Delete employee\");\n      });\n    }\n\n    function clearSortIndicators(table, activeFilter) {\n      table.querySelectorAll(\".filter\").forEach((filter) => {\n        if (filter === activeFilter) return;\n        filter.classList.remove(\"active\", \"desc\");\n        filter.dataset.sortDirection = \"asc\";\n      });\n    }\n\n    function sortRosterTable(table, columnIndex, direction, activeFilter) {\n      if (rowBeingEdited) stopOffDayEditing();\n\n      const multiplier = direction === \"desc\" ? -1 : 1;\n      const body = table.querySelector(\"tbody\");\n      const rows = Array.from(body.querySelectorAll(\"tr\"));\n      rows.sort((a, b) => {\n        if (columnIndex === 0) {\n          return a.querySelector(\".name\").textContent.trim().localeCompare(b.querySelector(\".name\").textContent.trim()) * multiplier;\n        }\n\n        const aValue = a.children[columnIndex]?.textContent.trim().toUpperCase() || \"\";\n        const bValue = b.children[columnIndex]?.textContent.trim().toUpperCase() || \"\";\n        if (aValue !== bValue) return aValue.localeCompare(bValue) * multiplier;\n        return a.querySelector(\".name\").textContent.trim().localeCompare(b.querySelector(\".name\").textContent.trim());\n      });\n\n      rows.forEach((row) => body.appendChild(row));\n      clearSortIndicators(table, activeFilter);\n      activeFilter.classList.add(\"active\");\n      activeFilter.classList.toggle(\"desc\", direction === \"desc\");\n      activeFilter.dataset.sortDirection = direction === \"asc\" ? \"desc\" : \"asc\";\n      recalcDailyTotals(table);\n      saveRosterState();\n    }\n\n    function handleSortFilter(filter) {\n      const table = filter.closest(\"table\");\n      if (!table) return;\n      const columnIndex = Number(filter.dataset.sortIndex || 0);\n      const direction = filter.dataset.sortDirection === \"desc\" ? \"desc\" : \"asc\";\n      sortRosterTable(table, columnIndex, direction, filter);\n    }\n\n    document.addEventListener(\"click\", (event) => {\n      const sortFilter = event.target.closest(\".filter\");\n      if (sortFilter) {\n        event.preventDefault();\n        handleSortFilter(sortFilter);\n        return;\n      }\n\n      const editableCell = event.target.closest(\"td.w, td.o\");\n      if (editableCell && rowBeingEdited && editableCell.parentElement === rowBeingEdited) {\n        event.preventDefault();\n        toggleOffDayCell(editableCell);\n        return;\n      }\n\n      const button = event.target.closest(\".row-action\");\n      if (!button) {\n        clearDeleteConfirm();\n        return;\n      }\n\n      const row = button.closest(\"tr\");\n      if (button.classList.contains(\"delete\")) {\n        if (button.classList.contains(\"confirm-delete\")) {\n          if (rowBeingEdited === row) rowBeingEdited = null;\n          deleteEmployee(row);\n          return;\n        }\n\n        clearDeleteConfirm(button);\n        button.classList.add(\"confirm-delete\");\n        button.textContent = \"OK?\";\n        button.setAttribute(\"aria-label\", \"Confirm delete employee\");\n        button.setAttribute(\"title\", \"Confirm delete employee\");\n        return;\n      }\n\n      clearDeleteConfirm();\n      if (rowBeingEdited === row) {\n        stopOffDayEditing();\n        return;\n      }\n\n      startOffDayEditing(row);\n    });\n\n    document.addEventListener(\"keydown\", (event) => {\n      const sortFilter = event.target.closest(\".filter\");\n      if (!sortFilter || ![\"Enter\", \" \"].includes(event.key)) return;\n      event.preventDefault();\n      handleSortFilter(sortFilter);\n    });\n\n    document.addEventListener(\"input\", (event) => {\n      const nameCell = event.target.closest(\"tr.editing-off .name\");\n      if (!nameCell) return;\n      saveRosterState();\n    });\n\n    document.addEventListener(\"keydown\", (event) => {\n      const nameCell = event.target.closest(\"tr.editing-off .name\");\n      if (!nameCell) return;\n      if (event.key === \"Enter\") {\n        event.preventDefault();\n        stopOffDayEditing();\n      }\n    });\n\n    document.querySelectorAll(\".add-row\").forEach((form) => {\n      form.addEventListener(\"submit\", addRosterRow);\n    });\n\n    document.querySelectorAll(\"table[data-roster]\").forEach(addActionsToTable);\n    loadRosterState();\n    applyPendingRosterAdditions();\n    refreshRosterNumbers();\n  <\/script>\n</body>\n</html>\n" },

h\", \"Tues, Thurs\"],\n        [\"Gilder Rufus II\", \"Tues, Wed\"],\n        [\"Echendu Chimenierm\", \"Wed, Thurs\"],\n        [\"Delgado Jose\", \"Fri, Sat\"]\n      ],\n      gate: [\n        [\"Candace Warren\", \"Sat, Sun\"],\n        [\"Connie Johnson\", \"Sat, Sun\"],\n        [\"Jarade Douglas\", \"Sat, Sun\"],\n        [\"Gregory Watson II\", \"Sat, Sun\"],\n        [\"Bryce Alexander\", \"Thurs, Fri\"],\n        [\"Naomisha Hunt\", \"Thurs, Fri, Sat\"],\n        [\"Ramacacondra Pratt\", \"Thurs, Fri\"],\n        [\"Kane Cabral\", \"Mon, Tues\"],\n        [\"Tavares Gariet\", \"Mon, Tues\"]\n      ],\n      mechanics: [],\n      managers: []\n    };\n\n    function hasPreviewRecords() {\n      return Boolean(previewBody.querySelector(\"tr.record-row\"));\n    }\n\n    function updatePushNotice() {\n      const show = localStorage.getItem(pendingPushKey) === \"1\" && hasPreviewRecords();\n      pushNotice.hidden = !show;\n      saveButton.classList.toggle(\"pending-push\", show);\n    }\n\n    function setPendingPush(value) {\n      if (value && hasPreviewRecords()) {\n        localStorage.setItem(pendingPushKey, \"1\");\n      } else {\n        localStorage.removeItem(pendingPushKey);\n      }\n      updatePushNotice();\n    }\n\n    function normalizeName(name) {\n      const suffixes = new Set([\"jr\", \"sr\", \"ii\", \"iii\", \"iv\"]);\n      return String(name || \"\")\n        .trim()\n        .toLowerCase()\n        .replace(/[,.]/g, \" \")\n        .replace(/\\bcontrerras\\b/g, \"contreras\")\n        .replace(/\\bdemeatrius\\b/g, \"demetrius\")\n        .replace(/\\btowner\\b/g, \"towler\")\n        .replace(/\\s+/g, \" \")\n        .split(\" \")\n        .filter((part) => part && !suffixes.has(part))\n        .sort()\n        .join(\" \");\n    }\n\n    function defaultRosterRows() {\n      return Object.entries(defaultRoster).flatMap(([shift, rows]) => (\n        rows.map(([name]) => ({ name, shift }))\n      ));\n    }\n\n    function savedRosterRows(roster) {\n      return rosterShiftKeys.flatMap((shift) => (\n        Array.isArray(roster[shift])\n          ? roster[shift].filter((employee) => employee && employee.name).map((employee) => ({ name: employee.name, shift }))\n          : []\n      ));\n    }\n\n    function hasSavedRosterRows(roster) {\n      return rosterShiftKeys.some((shift) => Array.isArray(roster[shift]) && roster[shift].length);\n    }\n\n    function buildRosterRows() {\n      const rows = [];\n      const seen = new Set();\n      const addRows = (items) => {\n        items.forEach((employee) => {\n          const key = normalizeName(employee.name);\n          if (!key || seen.has(key)) return;\n          seen.add(key);\n          rows.push(employee);\n        });\n      };\n\n      try {\n        const roster = JSON.parse(localStorage.getItem(rosterStorageKey) || \"{}\");\n        addRows(hasSavedRosterRows(roster) ? savedRosterRows(roster) : defaultRosterRows());\n        const additions = JSON.parse(localStorage.getItem(rosterAdditionsKey) || \"[]\");\n        if (Array.isArray(additions)) {\n          addRows(additions.filter((employee) => employee && employee.name).map((employee) => ({\n            name: employee.name,\n            shift: employee.shift || \"first\"\n          })));\n        }\n      } catch (error) {\n        addRows(defaultRosterRows());\n      }\n\n      if (!rows.length) addRows(defaultRosterRows());\n      return rows;\n    }\n\n    function rosterNames() {\n      return buildRosterRows().map((employee) => employee.name);\n    }\n\n    function rosterLookup() {\n      const lookup = new Map();\n      buildRosterRows().forEach((employee) => {\n        lookup.set(normalizeName(employee.name), { name: employee.name, shift: employee.shift || \"first\" });\n      });\n      return lookup;\n    }\n\n    function payrollDateFromRows(rows) {\n      for (const row of rows.slice(0, 12)) {\n        for (const cell of row) {\n          const text = String(cell || \"\").trim();\n          const match = text.match(/\\bdate\\s*:\\s*([0-9]{1,2}\\/[0-9]{1,2}\\/[0-9]{2,4})/i);\n          if (match) return match[1];\n        }\n      }\n      return new Date().toLocaleDateString();\n    }\n\n    function cleanPayrollEmployeeName(value) {\n      return cleanDayforceEmployeeName(value)\n        .replace(/\\s+\\d{4,}\\s*$/, \"\")\n        .trim();\n    }\n\n    function payrollDisplayName(value) {\n      return displayNameFromDayforce(cleanPayrollEmployeeName(value));\n    }\n\n    function payrollHours(value) {\n      const text = String(value || \"\").trim();\n      if (!text) return 0;\n      if (/^(x|yes|y|true)$/i.test(text)) return 8;\n\n      const timeMatch = text.match(/^(\\d{1,2}):(\\d{2})$/);\n      if (timeMatch) return Number(timeMatch[1]) + (Number(timeMatch[2]) / 60);\n\n      const numberMatch = text.match(/-?\\d+(\\.\\d+)?/);\n      if (!numberMatch) return 0;\n      return Math.max(0, Number(numberMatch[0]) || 0);\n    }\n\n    function titleCaseReason(value) {\n      return String(value || \"\")\n        .toLowerCase()\n        .replace(/\\b\\w/g, (char) => char.toUpperCase())\n        .replace(/\\bPto\\b/g, \"PTO\");\n    }\n\n    function absenceReasonFromHeader(header) {\n      const text = String(header || \"\").replace(/\\s+/g, \" \").trim();\n      const normalized = text.toLowerCase();\n      if (!normalized || /^total\\b/.test(normalized) || normalized.includes(\"total overtime\")) return \"\";\n      if (normalized.includes(\"business day off\") && normalized.includes(\"unpaid\")) return \"Business Day Off - Unpaid\";\n      if (normalized.includes(\"floating holiday\") || /\\bfloat\\b/.test(normalized)) return \"Floating Holiday\";\n      if (normalized.includes(\"vacation\")) return \"Vacation\";\n      if (normalized.includes(\"sick\")) return \"Sick\";\n      if (normalized.includes(\"holiday\")) return \"Holiday\";\n      if (normalized.includes(\"pto\")) return \"PTO\";\n      if (normalized.includes(\"personal\")) return \"Personal Day\";\n      if (normalized.includes(\"bereavement\")) return \"Bereavement\";\n      if (normalized.includes(\"jury\")) return \"Jury Duty\";\n      if (normalized.includes(\"leave\")) return \"Leave\";\n      if (normalized.includes(\"day off\") || normalized.includes(\"off day\")) return titleCaseReason(text);\n      if (normalized.includes(\"unpaid\") || normalized.includes(\"without pay\")) return titleCaseReason(text);\n      return \"\";\n    }\n\n    function isUnpaidReason(reason) {\n      return /\\bunpaid\\b|without pay/i.test(reason);\n    }\n\n    function minutesFromMilitary(value) {\n      const match = String(value || \"\").match(/^(\\d{1,2})(\\d{2})$/);\n      if (!match) return 0;\n      return (Number(match[1]) * 60) + Number(match[2]);\n    }\n\n    function militaryFromMinutes(value) {\n      const minutes = ((Math.round(value) % 1440) + 1440) % 1440;\n      const hours = Math.floor(minutes / 60);\n      const mins = minutes % 60;\n      return `${String(hours).padStart(2, \"0\")}${String(mins).padStart(2, \"0\")}`;\n    }\n\n    function shiftStartForEmployee(name) {\n      const names = rosterNames();\n      const match = matchRosterName(name, names);\n      const lookup = rosterLookup();\n      const canonical = match.suggestion || name;\n      const shift = lookup.get(normalizeName(canonical))?.shift || \"\";\n      if (shift === \"second\") return \"1500\";\n      if (shift === \"gate\" || shift === \"mechanics\") return \"0600\";\n      return \"0300\";\n    }\n\n    function endFromStartAndHours(start, hours) {\n      return militaryFromMinutes(minutesFromMilitary(start) + (Number(hours || 0) * 60));\n    }\n\n    function editDistance(a, b) {\n      const dp = Array.from({ length: a.length + 1 }, () => Array(b.length + 1).fill(0));\n      for (let i = 0; i <= a.length; i += 1) dp[i][0] = i;\n      for (let j = 0; j <= b.length; j += 1) dp[0][j] = j;\n      for (let i = 1; i <= a.length; i += 1) {\n        for (let j = 1; j <= b.length; j += 1) {\n          const cost = a[i - 1] === b[j - 1] ? 0 : 1;\n          dp[i][j] = Math.min(dp[i - 1][j] + 1, dp[i][j - 1] + 1, dp[i - 1][j - 1] + cost);\n        }\n      }\n      return dp[a.length][b.length];\n    }\n\n    function matchRosterName(name, names) {\n      const normalized = normalizeName(name);\n      const exact = names.find((candidate) => normalizeName(candidate) === normalized);\n      if (exact) return { found: true, suggestion: exact, hasSuggestion: true, score: 0 };\n\n      const scored = names\n        .map((candidate) => ({ candidate, score: editDistance(normalized, normalizeName(candidate)) }))\n        .sort((a, b) => a.score - b.score);\n      const best = scored[0] || null;\n      const suggestionLimit = Math.max(2, Math.ceil(normalized.length * 0.35));\n      return {\n        found: false,\n        suggestion: best ? best.candidate : \"\",\n        hasSuggestion: Boolean(best && best.score <= suggestionLimit),\n        score: best ? best.score : Infinity\n      };\n    }\n\n    function cleanDayforceEmployeeName(value) {\n      return String(value)\n        .replace(/^employee\\s*:?\\s*/i, \"\")\n        .replace(/\\s+\\d{4,}\\s*$/, \"\")\n        .trim();\n    }\n\n    function displayNameFromDayforce(value) {\n      const cleaned = cleanDayforceEmployeeName(value);\n      if (!cleaned.includes(\",\")) return cleaned;\n\n      const [last, first] = cleaned.split(\",\").map((part) => part.trim());\n      return `${first} ${last}`.replace(/\\s+/g, \" \").trim();\n    }\n\n    function normalizePreviousTimesheetName(name) {\n      return normalizeName(String(name || \"\").replace(/\\s+\\d{4,}\\s*$/, \"\"));\n    }\n\n    function previousTimesheetImport() {\n      try {\n        const saved = JSON.parse(localStorage.getItem(previousTimesheetStorageKey) || \"null\");\n        return saved && typeof saved.hours === \"number\" ? saved : null;\n      } catch (error) {\n        localStorage.removeItem(previousTimesheetStorageKey);\n        return null;\n      }\n    }\n\n    function updatePreviousTimesheetStatus() {\n      const imported = previousTimesheetImport();\n      if (!previousTimesheetStatus) return;\n      if (!imported) {\n        previousTimesheetStatus.textContent = \"0.0 HRS\";\n        previousTimesheetStatus.title = \"\";\n        renderPreviousTimesheetPreview([]);\n        return;\n      }\n\n      const rowsText = imported.rows ? ` / ${imported.rows} ROWS` : \"\";\n      previousTimesheetStatus.textContent = `${Number(imported.hours || 0).toFixed(1)} HRS${rowsText}`;\n      previousTimesheetStatus.title = imported.fileName ? `Imported from ${imported.fileName}` : \"\";\n      renderPreviousTimesheetPreview(Array.isArray(imported.records) ? imported.records : []);\n    }\n\n    function renderPreviousTimesheetPreview(records) {\n      if (!previousTimesheetPreview || !previousTimesheetPreviewBody) return;\n      previousTimesheetPreview.hidden = !records.length;\n      previousTimesheetPreviewCount.textContent = `${records.length} ${records.length === 1 ? \"row\" : \"rows\"}`;\n      previousTimesheetPreviewBody.innerHTML = records.length ? [\n        `<tr class=\"shift-group-row previous-shift-group-row\"><td colspan=\"6\">PREV 2ND SHIFT<span class=\"shift-group-count\">${records.length} ${records.length === 1 ? \"record\" : \"records\"}</span></td></tr>`,\n        ...records.map((record) => `\n          <tr>\n            <td class=\"name-cell\">${escapeHtml(record.name || \"\")}</td>\n            <td>${escapeHtml(record.date || \"\")}</td>\n            <td>${escapeHtml(record.start || \"\")}</td>\n            <td>${escapeHtml(record.lunch || \"\")}</td>\n            <td>${escapeHtml(record.end || \"\")}</td>\n            <td><strong>${Number(record.hours || 0).toFixed(1)}</strong></td>\n          </tr>\n        `)\n      ].join(\"\") : \"\";\n    }\n\n    function previousTimesheetEligibleNames() {\n      const lookup = rosterLookup();\n      const names = new Set();\n      lookup.forEach((entry, key) => {\n        if (entry.shift !== \"second\") return;\n        names.add(key);\n      });\n      return names;\n    }\n\n    function previousTimeMinutesFromValue(value) {\n      const text = String(value || \"\").trim();\n      if (!text) return null;\n\n      const meridianMatch = text.match(/^(\\d{1,2}):(\\d{2})\\s*([ap])m$/i);\n      if (meridianMatch) {\n        let hours = Number(meridianMatch[1]);\n        const minutes = Number(meridianMatch[2]);\n        const period = meridianMatch[3].toLowerCase();\n        if (period === \"p\" && hours !== 12) hours += 12;\n        if (period === \"a\" && hours === 12) hours = 0;\n        return (hours * 60) + minutes;\n      }\n\n      const colonMatch = text.match(/^(\\d{1,2}):(\\d{2})$/);\n      if (colonMatch) {\n        const hours = Number(colonMatch[1]);\n        const minutes = Number(colonMatch[2]);\n        if (hours > 24 || minutes > 59 || (hours === 24 && minutes !== 0)) return null;\n        return (hours * 60) + minutes;\n      }\n\n      const militaryMatch = text.match(/^(\\d{1,2})(\\d{2})$/);\n      if (!militaryMatch) return null;\n      const hours = Number(militaryMatch[1]);\n      const minutes = Number(militaryMatch[2]);\n      if (hours > 24 || minutes > 59 || (hours === 24 && minutes !== 0)) return null;\n      return (hours * 60) + minutes;\n    }\n\n    function normalizePreviousHeader(value) {\n      return String(value || \"\").trim().toLowerCase().replace(/\\s+/g, \" \");\n    }\n\n    function previousColumnIndexFor(row, matchers) {\n      return row.findIndex((cell) => {\n        const text = normalizePreviousHeader(cell);\n        return matchers.some((matcher) => matcher.test(text));\n      });\n    }\n\n    function rowLooksLikePreviousTimeHeader(row) {\n      const normalized = row.map(normalizePreviousHeader);\n      return normalized.some((cell) => /\\b(employee|name)\\b/.test(cell))\n        && normalized.some((cell) => /\\bstart\\b/.test(cell))\n        && normalized.some((cell) => /\\bend\\b/.test(cell));\n    }\n\n    function firstPreviousNameLikeCell(row, excludedIndexes = new Set()) {\n      for (let index = 0; index < row.length; index += 1) {\n        if (excludedIndexes.has(index)) continue;\n        const text = String(row[index] || \"\").trim();\n        if (!text || /^\\d+(\\.\\d+)?$/.test(text)) continue;\n        if (previousTimeMinutesFromValue(text) !== null) continue;\n        if (/^(yes|no|\\?\\?|start|end|lunch|actual|note|off days?)$/i.test(text)) continue;\n        if (/\\b(mon|tue|wed|thu|fri|sat|sun|jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)\\b/i.test(text) && /\\d/.test(text)) continue;\n        return text;\n      }\n      return \"\";\n    }\n\n    function previousLunchIntervals(value) {\n      const text = String(value || \"\").trim();\n      if (!text || /^(yes|no|\\?\\?)$/i.test(text)) return [];\n\n      const parts = text.split(/\\s*-\\s*/).map((part) => previousTimeMinutesFromValue(part)).filter((part) => part !== null);\n      if (parts.length < 2) return [];\n\n      let [start, end] = parts;\n      if (end <= start) end += 1440;\n      return [[start, end]];\n    }\n\n    function previousOverlapMinutes(start, end, windowStart, windowEnd) {\n      return Math.max(0, Math.min(end, windowEnd) - Math.max(start, windowStart));\n    }\n\n    function previousWindowMinutesForTimes(startValue, endValue, lunchValue) {\n      let start = previousTimeMinutesFromValue(startValue);\n      let end = previousTimeMinutesFromValue(endValue);\n      if (start === null || end === null) return 0;\n      if (end <= start) end += 1440;\n\n      const windows = [[0, 180], [1440, 1620]];\n      const worked = Math.max(...windows.map(([windowStart, windowEnd]) => previousOverlapMinutes(start, end, windowStart, windowEnd)));\n      if (!worked) return 0;\n\n      const lunch = previousLunchIntervals(lunchValue).reduce((sum, [lunchStart, lunchEnd]) => {\n        const shifted = lunchEnd <= 180 && start >= 720 ? [lunchStart + 1440, lunchEnd + 1440] : [lunchStart, lunchEnd];\n        const lunchOverlap = Math.max(...windows.map(([windowStart, windowEnd]) => previousOverlapMinutes(shifted[0], shifted[1], windowStart, windowEnd)));\n        return sum + lunchOverlap;\n      }, 0);\n\n      return Math.max(0, worked - lunch);\n    }\n\n    function firstPreviousDateLikeCell(row) {\n      const value = row.find((cell) => {\n        const text = String(cell || \"\").trim();\n        return /^(\\d{1,2}\\/\\d{1,2}\\/\\d{2,4})/.test(text)\n          || /^(sun|mon|tue|tues|wed|thu|thur|thurs|fri|sat)[a-z]*\\b/i.test(text);\n      });\n      return String(value || \"\").trim();\n    }\n\n    function previousRecordFromRow(row, indexes, eligibleNames) {\n      const name = indexes.name >= 0 ? String(row[indexes.name] || \"\").trim() : firstPreviousNameLikeCell(row, new Set([indexes.start, indexes.lunch, indexes.end]));\n      if (!name || (eligibleNames.size && !eligibleNames.has(normalizePreviousTimesheetName(name)))) return null;\n\n      const start = indexes.start >= 0 ? String(row[indexes.start] || \"\").trim() : \"\";\n      const lunch = indexes.lunch >= 0 ? String(row[indexes.lunch] || \"\").trim() : \"\";\n      const end = indexes.end >= 0 ? String(row[indexes.end] || \"\").trim() : \"\";\n      const hours = previousWindowMinutesForTimes(start, end, lunch) / 60;\n      if (hours <= 0) return null;\n\n      return {\n        name: displayNameFromDayforce(name),\n        date: indexes.date >= 0 ? String(row[indexes.date] || \"\").trim() : firstPreviousDateLikeCell(row),\n        start,\n        lunch,\n        end,\n        hours\n      };\n    }\n\n    function fallbackPreviousRecordFromRow(row, eligibleNames) {\n      const timeIndexes = [];\n      row.forEach((cell, index) => {\n        if (previousTimeMinutesFromValue(cell) !== null) timeIndexes.push(index);\n      });\n      if (timeIndexes.length < 2) return null;\n\n      const excluded = new Set(timeIndexes);\n      const name = firstPreviousNameLikeCell(row, excluded);\n      if (!name || (eligibleNames.size && !eligibleNames.has(normalizePreviousTimesheetName(name)))) return null;\n\n      const startIndex = timeIndexes[0];\n      const endIndex = timeIndexes[timeIndexes.length - 1];\n      const lunchIndex = timeIndexes.length > 2 ? timeIndexes[1] : -1;\n      const start = String(row[startIndex] || \"\").trim();\n      const lunch = lunchIndex >= 0 ? String(row[lunchIndex] || \"\").trim() : \"\";\n      const end = String(row[endIndex] || \"\").trim();\n      const hours = previousWindowMinutesForTimes(start, end, lunch) / 60;\n      if (hours <= 0) return null;\n\n      return {\n        name: displayNameFromDayforce(name),\n        date: firstPreviousDateLikeCell(row),\n        start,\n        lunch,\n        end,\n        hours\n      };\n    }\n\n    function previousRecordFromDayforceHeader(rows, rowIndex, eligibleNames) {\n      const row = rows[rowIndex].map((cell) => String(cell || \"\").trim());\n      if (!rowHasDayforceHeader(row)) return null;\n\n      const next = (rows[rowIndex + 1] || []).map((cell) => String(cell || \"\").trim());\n      const startIndex = headerIndex(row, \"start shift\");\n      const startMealIndex = headerIndex(row, \"start meal\");\n      const endMealIndex = headerIndex(row, \"end meal\");\n      const endIndex = headerIndex(row, \"end shift\");\n      const employeeCell = findEmployeeNameCell(rows, rowIndex, startIndex);\n      const employee = displayNameFromDayforce(employeeCell ? employeeCell.value : firstFilledBefore(row, startIndex));\n      if (!employee || (eligibleNames.size && !eligibleNames.has(normalizePreviousTimesheetName(employee)))) return null;\n\n      const lunch = [startMealIndex >= 0 ? next[startMealIndex] : \"\", endMealIndex >= 0 ? next[endMealIndex] : \"\"].filter(Boolean).join(\" - \");\n      const start = startIndex >= 0 ? next[startIndex] : \"\";\n      const end = endIndex >= 0 ? next[endIndex] : \"\";\n      const hours = previousWindowMinutesForTimes(start, end, lunch) / 60;\n      if (hours <= 0) return null;\n\n      return {\n        name: employee,\n        date: firstFilled(next),\n        start,\n        lunch,\n        end,\n        hours\n      };\n    }\n\n    function parsePreviousTimesheetHours(workbook) {\n      const eligibleNames = previousTimesheetEligibleNames();\n      let hours = 0;\n      let matchedRows = 0;\n      const records = [];\n\n      workbook.SheetNames.forEach((sheetName) => {\n        const rows = sheetRows(workbook, sheetName).map((row) => row.map((cell) => String(cell || \"\").trim()));\n        let indexes = null;\n\n        rows.forEach((row, rowIndex) => {\n          if (!row.some(Boolean)) return;\n\n          const dayforceRecord = previousRecordFromDayforceHeader(rows, rowIndex, eligibleNames);\n          if (dayforceRecord) {\n            hours += dayforceRecord.hours;\n            matchedRows += 1;\n            records.push(dayforceRecord);\n            return;\n          }\n\n          if (rowLooksLikePreviousTimeHeader(row)) {\n            indexes = {\n              name: previousColumnIndexFor(row, [/\\bemployee\\b/, /\\bname\\b/]),\n              date: previousColumnIndexFor(row, [/\\bdate\\b/]),\n              start: previousColumnIndexFor(row, [/\\bstart\\b/]),\n              lunch: previousColumnIndexFor(row, [/\\blunch\\b/, /\\bmeal\\b/]),\n              end: previousColumnIndexFor(row, [/\\bend\\b/])\n            };\n            return;\n          }\n\n          const record = indexes && indexes.start >= 0 && indexes.end >= 0\n            ? previousRecordFromRow(row, indexes, eligibleNames)\n            : fallbackPreviousRecordFromRow(row, eligibleNames);\n\n          if (record) {\n            hours += record.hours;\n            matchedRows += 1;\n            records.push(record);\n          }\n        });\n      });\n\n      return { hours, rows: matchedRows, records };\n    }\n\n    function rowHasDayforceHeader(row) {\n      const joined = row.map((cell) => String(cell).toLowerCase()).join(\"|\");\n      return joined.includes(\"start shift\") && joined.includes(\"end shift\");\n    }\n\n    function headerIndex(row, label) {\n      return row.findIndex((cell) => String(cell || \"\").trim().toLowerCase() === label);\n    }\n\n    function firstFilledBefore(row, endIndex) {\n      for (let index = 0; index < endIndex; index += 1) {\n        const value = String(row[index] || \"\").trim();\n        if (value) return value;\n      }\n      return \"\";\n    }\n\n    function isNameCandidate(value) {\n      const text = cleanDayforceEmployeeName(value);\n      if (!text || text.length < 3) return false;\n      if (/^\\d+(\\.\\d+)?$/.test(text)) return false;\n      if (/^\\d{1,2}[/:]\\d{1,2}/.test(text)) return false;\n      if (/\\b(start|end|meal|shift|paid|hours|exception|business|date|department|location|total|time|regular|overtime|report)\\b/i.test(text)) return false;\n      if (!/[a-z]/i.test(text)) return false;\n\n      const words = text.replace(/[,.-]/g, \" \").trim().split(/\\s+/).filter(Boolean);\n      return text.includes(\",\") || words.length >= 2;\n    }\n\n    function nameCandidateScore(value, rowDistance, sameHeaderRow) {\n      const text = cleanDayforceEmployeeName(value);\n      let score = sameHeaderRow ? 100 : 75;\n      score -= rowDistance * 12;\n      if (text.includes(\",\")) score += 18;\n      if (/\\b[A-Z][a-z]+[\\s,]+[A-Z][a-z]+\\b/.test(text)) score += 8;\n      if (/\\d{4,}/.test(String(value))) score += 4;\n      return score;\n    }\n\n    function findEmployeeNameCell(rows, headerRowIndex, startIndex) {\n      const candidates = [];\n      const headerRow = rows[headerRowIndex] || [];\n      const sameRowLimit = startIndex >= 0 ? startIndex : headerRow.length;\n\n      for (let colIndex = 0; colIndex < sameRowLimit; colIndex += 1) {\n        const value = String(headerRow[colIndex] || \"\").trim();\n        if (!isNameCandidate(value)) continue;\n        candidates.push({\n          rowIndex: headerRowIndex,\n          colIndex,\n          value,\n          score: nameCandidateScore(value, 0, true)\n        });\n      }\n\n      for (let rowIndex = headerRowIndex - 1; rowIndex >= Math.max(0, headerRowIndex - 4); rowIndex -= 1) {\n        const row = rows[rowIndex] || [];\n        const limit = Math.max(startIndex + 1, row.length);\n        for (let colIndex = 0; colIndex < limit; colIndex += 1) {\n          const value = String(row[colIndex] || \"\").trim();\n          if (!isNameCandidate(value)) continue;\n          candidates.push({\n            rowIndex,\n            colIndex,\n            value,\n            score: nameCandidateScore(value, headerRowIndex - rowIndex, false)\n          });\n        }\n      }\n\n      candidates.sort((a, b) => b.score - a.score);\n      return candidates[0] || null;\n    }\n\n    function firstFilled(row) {\n      const value = row.find((cell) => String(cell || \"\").trim());\n      return String(value || \"\").trim();\n    }\n\n    function parseDayforceMatrix(rows, extractedNameCells = new Set(), headerCells = new Set()) {\n      const punches = [];\n      for (let index = 0; index < rows.length - 1; index += 1) {\n        const row = rows[index].map((cell) => String(cell || \"\").trim());\n        if (!rowHasDayforceHeader(row)) continue;\n\n        const next = rows[index + 1].map((cell) => String(cell || \"\").trim());\n        const startIndex = headerIndex(row, \"start shift\");\n        const startMealIndex = headerIndex(row, \"start meal\");\n        const endMealIndex = headerIndex(row, \"end meal\");\n        const endIndex = headerIndex(row, \"end shift\");\n        const paidIndex = headerIndex(row, \"paid hours\");\n        const exceptionIndex = headerIndex(row, \"exceptions\");\n        [startIndex, startMealIndex, endMealIndex, endIndex, paidIndex, exceptionIndex].forEach((colIndex) => {\n          if (colIndex >= 0) headerCells.add(`${index}:${colIndex}`);\n        });\n        const employeeCell = findEmployeeNameCell(rows, index, startIndex);\n        const fallbackEmployee = firstFilledBefore(row, startIndex);\n        const employeeSource = employeeCell ? employeeCell.value : fallbackEmployee;\n        const employee = displayNameFromDayforce(employeeSource);\n        if (!employee) continue;\n        if (employeeCell) {\n          extractedNameCells.add(`${employeeCell.rowIndex}:${employeeCell.colIndex}`);\n        } else if (fallbackEmployee) {\n          const fallbackIndex = row.findIndex((cell) => String(cell || \"\").trim() === fallbackEmployee);\n          if (fallbackIndex >= 0) extractedNameCells.add(`${index}:${fallbackIndex}`);\n        }\n\n        punches.push({\n          source: \"punch\",\n          name: employee,\n          date: firstFilled(next),\n          start: startIndex >= 0 ? next[startIndex] || \"\" : \"\",\n          lunch: [startMealIndex >= 0 ? next[startMealIndex] : \"\", endMealIndex >= 0 ? next[endMealIndex] : \"\"].filter(Boolean).join(\" - \"),\n          end: endIndex >= 0 ? next[endIndex] || \"\" : \"\",\n          paid: paidIndex >= 0 ? next[paidIndex] || \"\" : \"\",\n          exceptions: exceptionIndex >= 0 ? next[exceptionIndex] || \"\" : \"\"\n        });\n      }\n      return punches;\n    }\n\n    function combinedHeader(rows, headerRowIndex, colIndex) {\n      return rows\n        .slice(headerRowIndex, Math.min(rows.length, headerRowIndex + 5))\n        .map((row) => String(row[colIndex] || \"\").trim())\n        .filter(Boolean)\n        .join(\" \");\n    }\n\n    function findPayrollHeader(rows) {\n      for (let rowIndex = 0; rowIndex < Math.min(rows.length, 35); rowIndex += 1) {\n        const row = rows[rowIndex] || [];\n        const employeeIndex = row.findIndex((cell) => String(cell || \"\").trim().toLowerCase() === \"employee\");\n        if (employeeIndex === -1) continue;\n\n        const maxColumns = Math.max(...rows.slice(rowIndex, rowIndex + 5).map((item) => item.length), row.length);\n        const reasonColumns = [];\n        for (let colIndex = 0; colIndex < maxColumns; colIndex += 1) {\n          if (colIndex === employeeIndex) continue;\n          const header = combinedHeader(rows, rowIndex, colIndex);\n          const reason = absenceReasonFromHeader(header);\n          if (!reason) continue;\n          reasonColumns.push({ colIndex, reason, header });\n        }\n\n        if (reasonColumns.length) {\n          return { rowIndex, employeeIndex, reasonColumns };\n        }\n      }\n\n      return null;\n    }\n\n    function parsePayrollAbsenceRows(rows, extractedNameCells = new Set(), headerCells = new Set()) {\n      const header = findPayrollHeader(rows);\n      if (!header) return [];\n\n      headerCells.add(`${header.rowIndex}:${header.employeeIndex}`);\n      header.reasonColumns.forEach(({ colIndex }) => {\n        for (let rowIndex = header.rowIndex; rowIndex < Math.min(rows.length, header.rowIndex + 5); rowIndex += 1) {\n          if (String(rows[rowIndex]?.[colIndex] || \"\").trim()) headerCells.add(`${rowIndex}:${colIndex}`);\n        }\n      });\n\n      const reportDate = payrollDateFromRows(rows);\n      const punches = [];\n      for (let rowIndex = header.rowIndex + 1; rowIndex < rows.length; rowIndex += 1) {\n        const row = rows[rowIndex] || [];\n        const rawName = String(row[header.employeeIndex] || \"\").trim();\n        if (!rawName || /total|percentage|employee/i.test(rawName)) continue;\n\n        const employee = payrollDisplayName(rawName);\n        if (!employee) continue;\n        extractedNameCells.add(`${rowIndex}:${header.employeeIndex}`);\n\n        const reasons = [];\n        let paidHours = 0;\n        let unpaid = false;\n        header.reasonColumns.forEach(({ colIndex, reason }) => {\n          const hours = payrollHours(row[colIndex]);\n          if (hours <= 0) return;\n          reasons.push(reason);\n          if (isUnpaidReason(reason)) {\n            unpaid = true;\n            return;\n          }\n          paidHours += hours;\n        });\n\n        if (!reasons.length) continue;\n\n        const uniqueReasons = Array.from(new Set(reasons));\n        const note = uniqueReasons.join(\", \");\n        const start = paidHours > 0 ? shiftStartForEmployee(employee) : \"\";\n        const end = paidHours > 0 ? endFromStartAndHours(start, paidHours) : \"\";\n        punches.push({\n          source: \"note\",\n          name: employee,\n          date: reportDate,\n          start,\n          lunch: paidHours > 0 ? \"NO\" : \"\",\n          end,\n          note,\n          absencePaid: paidHours > 0,\n          absenceUnpaid: unpaid && paidHours === 0,\n          absenceHours: paidHours ? String(paidHours) : \"\"\n        });\n      }\n\n      return punches;\n    }\n\n    function parsePunchWorkbookRows(rows, extractedNameCells = new Set(), headerCells = new Set()) {\n      const dayforcePunches = parseDayforceMatrix(rows, extractedNameCells, headerCells);\n      if (dayforcePunches.length) return dayforcePunches;\n\n      return rows\n        .map((row, rowIndex) => ({ row, rowIndex }))\n        .filter(({ row }) => row.some((cell) => String(cell || \"\").trim()))\n        .map(({ row, rowIndex }) => {\n          if (String(row[0] || \"\").trim() && String(row[0] || \"\").trim().toLowerCase() !== \"employee\") {\n            extractedNameCells.add(`${rowIndex}:0`);\n          }\n          return {\n            source: \"punch\",\n            name: String(row[0] || \"\").trim(),\n            date: String(row[1] || \"\").trim(),\n            start: String(row[2] || \"\").trim(),\n            lunch: String(row[3] || \"\").trim(),\n            end: String(row[4] || \"\").trim()\n          };\n        })\n        .filter((row) => row.name && row.name.toLowerCase() !== \"employee\");\n    }\n\n    function columnLabel(index) {\n      let label = \"\";\n      let value = index + 1;\n      while (value > 0) {\n        const remainder = (value - 1) % 26;\n        label = String.fromCharCode(65 + remainder) + label;\n        value = Math.floor((value - 1) / 26);\n      }\n      return label;\n    }\n\n    function previewNameCandidates(value) {\n      const raw = String(value || \"\").trim();\n      return Array.from(new Set([\n        raw,\n        displayNameFromDayforce(raw),\n        payrollDisplayName(raw)\n      ].map((name) => name.trim()).filter(Boolean)));\n    }\n\n    function previewMatchSummary(rows, extractedNameCells) {\n      const names = rosterNames();\n      const seen = new Set();\n      let total = 0;\n      let matched = 0;\n\n      extractedNameCells.forEach((key) => {\n        const [rowIndexText, colIndexText] = key.split(\":\");\n        const value = String(rows[Number(rowIndexText)]?.[Number(colIndexText)] || \"\").trim();\n        if (!value) return;\n\n        const candidates = previewNameCandidates(value);\n        const normalizedKey = normalizeName(candidates[1] || candidates[0]);\n        if (!normalizedKey || seen.has(normalizedKey)) return;\n        seen.add(normalizedKey);\n        total += 1;\n\n        if (candidates.some((candidate) => matchRosterName(candidate, names).found)) {\n          matched += 1;\n        }\n      });\n\n      return { matched, total };\n    }\n\n    function renderExcelPreview(rows, extractedNameCells, headerCells, sheetName) {\n      const nonEmptyRows = rows.filter((row) => row.some((cell) => String(cell || \"\").trim()));\n      if (!nonEmptyRows.length) {\n        excelPreviewSection.hidden = true;\n        excelPreviewHead.innerHTML = \"\";\n        excelPreviewBody.innerHTML = \"\";\n        return;\n      }\n\n      const maxColumns = Math.max(...rows.map((row) => row.length), 1);\n      const summary = previewMatchSummary(rows, extractedNameCells);\n      excelPreviewToggle.title = `${sheetName} Preview`;\n      excelPreviewToggle.setAttribute(\"aria-label\", `${sheetName} preview. Click to review raw time entry import.`);\n      excelPreviewToggle.setAttribute(\"aria-expanded\", \"false\");\n      excelPreviewCount.textContent = `${summary.matched} out of ${summary.total} matched to schedule`;\n      excelPreviewHead.innerHTML = `\n        <tr>\n          <th class=\"row-number\">#</th>\n          ${Array.from({ length: maxColumns }, (_, index) => `<th>${columnLabel(index)}</th>`).join(\"\")}\n        </tr>\n      `;\n      excelPreviewBody.innerHTML = rows.map((row, rowIndex) => `\n        <tr>\n          <td class=\"row-number\">${rowIndex + 1}</td>\n          ${Array.from({ length: maxColumns }, (_, colIndex) => {\n            const key = `${rowIndex}:${colIndex}`;\n            const value = String(row[colIndex] || \"\");\n            const classes = [\n              extractedNameCells.has(key) ? \"extracted-name\" : \"\",\n              headerCells.has(key) ? \"punch-header\" : \"\"\n            ].filter(Boolean).join(\" \");\n            return `<td class=\"${classes}\" title=\"${escapeHtml(value)}\">${escapeHtml(value)}</td>`;\n          }).join(\"\")}\n        </tr>\n      `).join(\"\");\n      excelPreviewSection.classList.add(\"collapsed\");\n      excelPreviewSection.hidden = false;\n    }\n\n    function recordSource(record) {\n      const source = String(record.source || \"\").trim().toLowerCase();\n      if (source === \"punch\" || source === \"note\") return source;\n      return record.absencePaid || record.absenceUnpaid || record.absenceHours || String(record.note || \"\").trim() ? \"note\" : \"punch\";\n    }\n\n    function previewShiftForRecord(punch, names, lookup) {\n      const match = matchRosterName(punch.name, names);\n      const canonical = match.suggestion || punch.name;\n      return lookup.get(normalizeName(canonical))?.shift || \"unmatched\";\n    }\n\n    function shiftGroupOrder(shift) {\n      const order = [\"first\", \"second\", \"gate\", \"mechanics\", \"managers\", \"unmatched\"];\n      const index = order.indexOf(shift);\n      return index === -1 ? order.length : index;\n    }\n\n    function createShiftGroupRow(shift, count) {\n      const row = document.createElement(\"tr\");\n      row.className = \"shift-group-row\";\n      row.innerHTML = `<td colspan=\"6\">${escapeHtml(shiftLabels[shift] || shift)}<span class=\"shift-group-count\">${count} ${count === 1 ? \"record\" : \"records\"}</span></td>`;\n      return row;\n    }\n\n    function appendImportMessage(message) {\n      const row = document.createElement(\"tr\");\n      row.className = \"import-message-row\";\n      row.innerHTML = `<td colspan=\"6\">${escapeHtml(message)}</td>`;\n      previewBody.appendChild(row);\n      emptyState.style.display = \"none\";\n    }\n\n    function createPunchRow(punch, names) {\n      const match = matchRosterName(punch.name, names);\n      const row = document.createElement(\"tr\");\n      row.className = \"record-row\";\n      row.dataset.source = recordSource(punch);\n      row.dataset.absencePaid = punch.absencePaid ? \"1\" : \"\";\n      row.dataset.absenceUnpaid = punch.absenceUnpaid ? \"1\" : \"\";\n      row.dataset.absenceHours = punch.absenceHours || \"\";\n      row.classList.toggle(\"unmatched\", !match.found);\n      if (!match.found && match.hasSuggestion) row.dataset.suggestion = match.suggestion;\n      const suggestion = match.hasSuggestion ? match.suggestion : \"No close roster match\";\n      const suggestionActions = match.hasSuggestion ? `\n        <span class=\"suggestion-actions\">\n          <button type=\"button\" class=\"suggestion-yes\">YES</button>\n          <button type=\"button\" class=\"suggestion-no\">NO</button>\n        </span>\n      ` : \"\";\n      row.innerHTML = `\n        <td class=\"name-cell\"><input value=\"${escapeHtml(punch.name)}\" aria-label=\"Employee name\" />${match.found ? \"\" : `<span class=\"suggestion\"><span>Try: ${escapeHtml(suggestion)}</span>${suggestionActions}</span>`}</td>\n        <td><input value=\"${escapeHtml(punch.date)}\" aria-label=\"Punch date\" /></td>\n        <td><input value=\"${escapeHtml(punch.start)}\" aria-label=\"Start punch\" /></td>\n        <td><input value=\"${escapeHtml(punch.lunch)}\" aria-label=\"Lunch punch\" /></td>\n        <td><input value=\"${escapeHtml(punch.end)}\" aria-label=\"End punch\" /></td>\n        <td><input value=\"${escapeHtml(punch.note || \"\")}\" aria-label=\"Note\" /></td>\n      `;\n      return { row, matched: match.found };\n    }\n\n    function renderPunches(punches) {\n      previewBody.innerHTML = \"\";\n      const names = rosterNames();\n      const lookup = rosterLookup();\n      let unmatched = 0;\n\n      const groups = new Map();\n      punches.forEach((punch) => {\n        const shift = previewShiftForRecord(punch, names, lookup);\n        if (!groups.has(shift)) groups.set(shift, []);\n        groups.get(shift).push(punch);\n      });\n\n      Array.from(groups.entries())\n        .sort(([a], [b]) => shiftGroupOrder(a) - shiftGroupOrder(b))\n        .forEach(([shift, records]) => {\n          previewBody.appendChild(createShiftGroupRow(shift, records.length));\n          records.forEach((punch) => {\n            const { row, matched } = createPunchRow(punch, names);\n            if (!matched) unmatched += 1;\n            previewBody.appendChild(row);\n          });\n      });\n      emptyState.style.display = punches.length ? \"none\" : \"block\";\n      status.textContent = unmatched ? `${punches.length} records / ${unmatched} unmatched` : `${punches.length} records`;\n      saveUnmatchedImportsFromPreview();\n      renderMissingRosterActions();\n      updatePushNotice();\n    }\n\n    function previewRecordKey(record) {\n      return [\n        normalizeName(record.name),\n        String(record.date || \"\").trim(),\n        String(record.start || \"\").trim(),\n        String(record.lunch || \"\").trim(),\n        String(record.end || \"\").trim(),\n        String(record.note || \"\").trim().toLowerCase()\n      ].join(\"|\");\n    }\n\n    function appendPreviewRecords(records) {\n      const merged = readPreview();\n      const seen = new Set(merged.map(previewRecordKey));\n      records.forEach((record) => {\n        const key = previewRecordKey(record);\n        if (seen.has(key)) return;\n        seen.add(key);\n        merged.push(record);\n      });\n      return merged;\n    }\n\n    function refreshStatusFromPreview() {\n      const rows = previewBody.querySelectorAll(\"tr.record-row\");\n      const unmatched = previewBody.querySelectorAll(\"tr.record-row.unmatched\").length;\n      status.textContent = unmatched ? `${rows.length} records / ${unmatched} unmatched` : `${rows.length} records`;\n      renderMissingRosterActions();\n    }\n\n    function saveUnmatchedImportsFromPreview() {\n      const names = Array.from(previewBody.querySelectorAll(\"tr.unmatched .name-cell input\"))\n        .map((input) => input.value.trim())\n        .filter(Boolean);\n      localStorage.setItem(unmatchedStorageKey, JSON.stringify(Array.from(new Set(names))));\n    }\n\n    function uniquePreviewMisses() {\n      const names = rosterNames();\n      const seen = new Set();\n      return readPreview().map((punch) => {\n        const match = matchRosterName(punch.name, names);\n        return { punch, match };\n      }).filter(({ punch, match }) => {\n        const key = normalizeName(punch.name);\n        if (match.found || !key || seen.has(key)) return false;\n        seen.add(key);\n        return true;\n      });\n    }\n\n    function renderMissingRosterActions() {\n      const missing = uniquePreviewMisses();\n      missingRosterPanel.hidden = missing.length === 0;\n      missingRosterCount.textContent = `${missing.length} ${missing.length === 1 ? \"name\" : \"names\"}`;\n      missingRosterBody.innerHTML = missing.map(({ punch, match }) => {\n        const suggestion = match.hasSuggestion ? match.suggestion : \"\";\n        return `\n          <div class=\"missing-roster-row\" data-name=\"${escapeHtml(punch.name)}\">\n            <div>${escapeHtml(punch.name)}</div>\n            <div>${suggestion ? `Suggestion: ${escapeHtml(suggestion)} <button type=\"button\" class=\"convert-name\" data-suggestion=\"${escapeHtml(suggestion)}\">Use</button>` : \"No close suggestion\"}</div>\n            <select class=\"target-shift\" aria-label=\"Target shift for ${escapeHtml(punch.name)}\">\n              <option value=\"first\">1st Shift</option>\n              <option value=\"second\">Second Shift</option>\n              <option value=\"gate\">Gate</option>\n              <option value=\"mechanics\">Mechanics</option>\n              <option value=\"managers\">Managers</option>\n            </select>\n            <button type=\"button\" class=\"add-roster-name\">Add</button>\n          </div>\n        `;\n      }).join(\"\");\n    }\n\n    function rosterStateHasSavedRows(state) {\n      return [\"first\", \"second\", \"gate\", \"mechanics\", \"managers\"].some((key) => Array.isArray(state[key]) && state[key].length);\n    }\n\n    function readRosterAdditions() {\n      try {\n        const additions = JSON.parse(localStorage.getItem(rosterAdditionsKey) || \"[]\");\n        return Array.isArray(additions) ? additions : [];\n      } catch (error) {\n        localStorage.removeItem(rosterAdditionsKey);\n        return [];\n      }\n    }\n\n    function rosterAlreadyHasName(name) {\n      const normalized = normalizeName(name);\n      return rosterNames().some((candidate) => normalizeName(candidate) === normalized);\n    }\n\n    function addNameToRoster(name, shift) {\n      const cleanName = String(name || \"\").trim();\n      const targetShift = shiftLabels[shift] ? shift : \"first\";\n      if (!cleanName) return false;\n      if (rosterAlreadyHasName(cleanName)) return true;\n\n      const employee = {\n        name: cleanName,\n        role: \"\",\n        days: [\"W\", \"W\", \"W\", \"W\", \"W\", \"W\", \"W\"],\n        shift: targetShift\n      };\n\n      try {\n        const state = JSON.parse(localStorage.getItem(rosterStorageKey) || \"{}\");\n        if (rosterStateHasSavedRows(state)) {\n          if (!Array.isArray(state[targetShift])) state[targetShift] = [];\n          state[targetShift].push({ name: employee.name, role: employee.role, days: employee.days });\n          localStorage.setItem(rosterStorageKey, JSON.stringify(state));\n          return true;\n        }\n      } catch (error) {\n        localStorage.removeItem(rosterStorageKey);\n      }\n\n      const additions = readRosterAdditions();\n      additions.push(employee);\n      localStorage.setItem(rosterAdditionsKey, JSON.stringify(additions));\n      return true;\n    }\n\n    function renamePreviewEmployee(oldName, newName) {\n      const oldKey = normalizeName(oldName);\n      previewBody.querySelectorAll(\"tr\").forEach((row) => {\n        const nameInput = row.querySelector(\".name-cell input\");\n        if (nameInput && normalizeName(nameInput.value) === oldKey) {\n          nameInput.value = newName;\n        }\n      });\n      renderPunches(readPreview());\n    }\n    function escapeHtml(value) {\n      return String(value).replace(/[&<>\"']/g, (char) => ({\n        \"&\": \"&amp;\",\n        \"<\": \"&lt;\",\n        \">\": \"&gt;\",\n        '\"': \"&quot;\",\n        \"'\": \"&#39;\"\n      }[char]));\n    }\n\n    function readPreview() {\n      return Array.from(previewBody.querySelectorAll(\"tr.record-row\")).map((row) => {\n        const inputs = row.querySelectorAll(\"input\");\n        return {\n          source: row.dataset.source || \"\",\n          name: inputs[0].value.trim(),\n          date: inputs[1].value.trim(),\n          start: inputs[2].value.trim(),\n          lunch: inputs[3].value.trim(),\n          end: inputs[4].value.trim(),\n          note: inputs[5] ? inputs[5].value.trim() : \"\",\n          absencePaid: row.dataset.absencePaid === \"1\",\n          absenceUnpaid: row.dataset.absenceUnpaid === \"1\",\n          absenceHours: row.dataset.absenceHours || \"\"\n        };\n      }).filter((row) => row.name);\n    }\n\n    function rosterValidatedPunches(records = readPreview()) {\n      const names = rosterNames();\n      const skipped = [];\n      const accepted = records.map((punch) => {\n        const match = matchRosterName(punch.name, names);\n        if (!match.found) {\n          skipped.push(punch.name);\n          return null;\n        }\n\n        const acceptedPunch = {\n          ...punch,\n          name: match.suggestion || punch.name\n        };\n\n        if (acceptedPunch.note && acceptedPunch.absencePaid && acceptedPunch.absenceHours) {\n          acceptedPunch.start = shiftStartForEmployee(acceptedPunch.name);\n          acceptedPunch.lunch = \"NO\";\n          acceptedPunch.end = endFromStartAndHours(acceptedPunch.start, Number(acceptedPunch.absenceHours));\n        }\n\n        return acceptedPunch;\n      }).filter(Boolean);\n\n      return { accepted, skipped };\n    }\n\n\n    previewBody.addEventListener(\"click\", (event) => {\n      const yesButton = event.target.closest(\".suggestion-yes\");\n      const noButton = event.target.closest(\".suggestion-no\");\n      if (!yesButton && !noButton) return;\n\n      const row = event.target.closest(\"tr\");\n      if (!row) return;\n\n      if (yesButton) {\n        const suggestedName = row.dataset.suggestion || \"\";\n        const nameInput = row.querySelector(\".name-cell input\");\n        if (suggestedName && nameInput) {\n          nameInput.value = suggestedName;\n          row.classList.remove(\"unmatched\");\n          row.removeAttribute(\"data-suggestion\");\n        }\n      }\n\n      row.querySelector(\".suggestion\")?.remove();\n      refreshStatusFromPreview();\n      saveUnmatchedImportsFromPreview();\n      setPendingPush(true);\n    });\n\n    previewBody.addEventListener(\"input\", (event) => {\n      if (!event.target.matches(\"input\")) return;\n      refreshStatusFromPreview();\n      saveUnmatchedImportsFromPreview();\n      setPendingPush(true);\n    });\n\n    missingRosterBody.addEventListener(\"click\", (event) => {\n      const convertButton = event.target.closest(\".convert-name\");\n      const addButton = event.target.closest(\".add-roster-name\");\n      if (!convertButton && !addButton) return;\n\n      const row = event.target.closest(\".missing-roster-row\");\n      if (!row) return;\n\n      const importedName = row.dataset.name || \"\";\n      if (convertButton) {\n        const suggestion = convertButton.dataset.suggestion || \"\";\n        if (suggestion) {\n          renamePreviewEmployee(importedName, suggestion);\n          status.textContent = `Converted ${importedName} to ${suggestion}`;\n          setPendingPush(true);\n        }\n        return;\n      }\n\n      if (addButton) {\n        const shift = row.querySelector(\".target-shift\")?.value || \"first\";\n        if (addNameToRoster(importedName, shift)) {\n          renderPunches(readPreview());\n          status.textContent = `Added ${importedName} to ${shiftLabels[shift]}`;\n          setPendingPush(true);\n        }\n      }\n    });\n\n    excelPreviewToggle.addEventListener(\"click\", () => {\n      const isCollapsed = excelPreviewSection.classList.toggle(\"collapsed\");\n      excelPreviewToggle.setAttribute(\"aria-expanded\", String(!isCollapsed));\n    });\n\n    function sheetRows(workbook, sheetName) {\n      const sheet = workbook.Sheets[sheetName];\n      return XLSX.utils.sheet_to_json(sheet, { header: 1, raw: false, defval: \"\" });\n    }\n\n    function preferredPunchSheetNames(workbook) {\n      const sheet2 = workbook.SheetNames.filter((sheetName) => sheetName.trim().toLowerCase() === \"sheet2\");\n      return sheet2.length ? sheet2 : workbook.SheetNames;\n    }\n\n    function fileNameStartsWith(file, prefix) {\n      return String(file?.name || \"\").trim().toLowerCase().startsWith(prefix);\n    }\n\n    function rejectImportFile(input, message) {\n      input.value = \"\";\n      status.textContent = message;\n    }\n\n    document.getElementById(\"previousTimesheetInput\").addEventListener(\"change\", async (event) => {\n      const file = event.target.files[0];\n      if (!file) return;\n\n      if (!window.XLSX) {\n        previousTimesheetStatus.textContent = \"XLSX ERROR\";\n        status.textContent = \"XLSX parser unavailable\";\n        return;\n      }\n\n      try {\n        const workbook = XLSX.read(await file.arrayBuffer(), { type: \"array\" });\n        const result = parsePreviousTimesheetHours(workbook);\n        localStorage.setItem(previousTimesheetStorageKey, JSON.stringify({\n          hours: result.hours,\n          rows: result.rows,\n          records: result.records,\n          fileName: file.name,\n          importedAt: new Date().toISOString()\n        }));\n        updatePreviousTimesheetStatus();\n        status.textContent = `Previous timesheet imported: ${result.hours.toFixed(1)} hrs`;\n      } catch (error) {\n        previousTimesheetStatus.textContent = \"IMPORT ERROR\";\n        status.textContent = \"Previous timesheet import failed\";\n      } finally {\n        event.target.value = \"\";\n      }\n    });\n\n    document.getElementById(\"fileInput\").addEventListener(\"change\", async (event) => {\n      const file = event.target.files[0];\n      if (!file) return;\n\n      if (!fileNameStartsWith(file, \"report\")) {\n        rejectImportFile(event.target, \"Punch import must start with Report\");\n        return;\n      }\n\n      if (!window.XLSX) {\n        status.textContent = \"XLSX parser unavailable\";\n        return;\n      }\n\n      const buffer = await file.arrayBuffer();\n      const workbook = XLSX.read(buffer, { type: \"array\" });\n      const targetSheets = preferredPunchSheetNames(workbook);\n      const punches = [];\n      let previewRendered = false;\n\n      targetSheets.forEach((sheetName) => {\n        const rows = sheetRows(workbook, sheetName);\n        const extractedNameCells = new Set();\n        const headerCells = new Set();\n        punches.push(...parsePunchWorkbookRows(rows, extractedNameCells, headerCells));\n\n        if (!previewRendered) {\n          renderExcelPreview(rows, extractedNameCells, headerCells, sheetName);\n          previewRendered = true;\n        }\n      });\n      renderPunches(punches);\n      setPendingPush(punches.length > 0);\n    });\n\n    document.getElementById(\"noteFileInput\").addEventListener(\"change\", async (event) => {\n      const file = event.target.files[0];\n      if (!file) return;\n\n      if (!fileNameStartsWith(file, \"payroll\")) {\n        rejectImportFile(event.target, \"Note scan import must start with Payroll\");\n        return;\n      }\n\n      if (!window.XLSX) {\n        status.textContent = \"XLSX parser unavailable\";\n        return;\n      }\n\n      const buffer = await file.arrayBuffer();\n      const workbook = XLSX.read(buffer, { type: \"array\" });\n      const records = [];\n      let fallbackPreview = null;\n      let previewRendered = false;\n\n      workbook.SheetNames.forEach((sheetName) => {\n        const rows = sheetRows(workbook, sheetName);\n        const extractedNameCells = new Set();\n        const headerCells = new Set();\n        const parsed = parsePayrollAbsenceRows(rows, extractedNameCells, headerCells);\n        records.push(...parsed);\n\n        if (!fallbackPreview) {\n          fallbackPreview = { rows, extractedNameCells, headerCells, sheetName };\n        }\n\n        if (!previewRendered && (parsed.length || extractedNameCells.size || headerCells.size)) {\n          renderExcelPreview(rows, extractedNameCells, headerCells, sheetName);\n          previewRendered = true;\n        }\n      });\n\n      if (!previewRendered && fallbackPreview) {\n        renderExcelPreview(fallbackPreview.rows, fallbackPreview.extractedNameCells, fallbackPreview.headerCells, fallbackPre
