   <button class=\"delete-button\" id=\"deleteArchive\" type=\"button\">Delete</button>\n          <button id=\"closePreview\" type=\"button\">X</button>\n        </div>\n      </header>\n      <div class=\"preview-body\">\n        <section class=\"kpis\" id=\"previewKpis\" aria-label=\"Archived metrics\"></section>\n        <section class=\"cards\" id=\"previewCards\" aria-label=\"Archived timesheet preview\"></section>\n      </div>\n    </section>\n  </div>\n\n  <script>\n    const dayAliases = {\n      sun: \"sun\", sunday: \"sun\",\n      mon: \"mon\", monday: \"mon\",\n      tue: \"tue\", tues: \"tue\", tuesday: \"tue\",\n      wed: \"wed\", weds: \"wed\", wednesday: \"wed\",\n      thu: \"thu\", thur: \"thu\", thurs: \"thu\", thursday: \"thu\",\n      fri: \"fri\", friday: \"fri\",\n      sat: \"sat\", saturday: \"sat\"\n    };\n\n    const archiveStorageKey = \"conglobal-timesheet-archive-v1\";\n    const rosterStorageKey = \"conglobal-roster-state-v1\";\n    const rosterAdditionsKey = \"conglobal-roster-additions-v1\";\n    const dayforceStorageKey = \"conglobal-dayforce-punches-v1\";\n    const previousTimesheetStorageKey = \"conglobal-previous-timesheet-hours-v1\";\n    const timesheetSettingsKey = \"conglobal-timesheet-settings-v1\";\n    const rosterDayLabels = [\"Mon\", \"Tues\", \"Wed\", \"Thurs\", \"Fri\", \"Sat\", \"Sun\"];\n    const lpmhGoal = 2.0;\n    const today = new Date();\n    const todayKey = [\"sun\", \"mon\", \"tue\", \"wed\", \"thu\", \"fri\", \"sat\"][today.getDay()];\n    let viewDate = new Date(today.getFullYear(), today.getMonth(), 1);\n    let selectedDateKey = isoDate(today);\n    let activeArchiveKey = \"\";\n    let activeArchive = null;\n    const deleteArchiveButton = document.getElementById(\"deleteArchive\");\n\n    const defaultRoster = {\n      first: [\n        [\"Branford Alton\", \"Mon, Tues\"],\n        [\"Castruita Armando\", \"Wed, Thurs\"],\n        [\"Frazer Dacoyea\", \"Mon, Tues\"],\n        [\"Citizen Dante\", \"Thurs, Fri\"],\n        [\"Towler Demetrius\", \"Thurs, Fri\"],\n        [\"Stewart Dexter\", \"Sat, Sun\"],\n        [\"Gardner Dorrean\", \"Tues, Wed\"],\n        [\"Thomas Henry\", \"Sat, Sun\"],\n        [\"Brown James\", \"Thurs, Fri\"],\n        [\"Herrera Jose\", \"Sat, Sun\"],\n        [\"Player Keyston\", \"Mon, Sun\"],\n        [\"Hickman Makia\", \"Mon, Sun\"],\n        [\"Dever Mikey\", \"Tues, Wed\"],\n        [\"Wanza Myles\", \"Mon, Tues\"],\n        [\"Romero Nelson\", \"Tues, Wed\"],\n        [\"McDaniel Charles\", \"Fri, Sat\"],\n        [\"Nava Ramon\", \"Sat, Sun\"],\n        [\"Tran Tyler\", \"Thurs, Fri\"]\n      ],\n      second: [\n        [\"Carruthers Timothy\", \"Mon, Sun\"],\n        [\"Caceres Virula Victor\", \"Mon, Tues\"],\n        [\"Keme Aweri Jr.\", \"Mon, Tues\"],\n        [\"Hosey Kevin\", \"Mon, Tues\"],\n        [\"Brown Brandy\", \"Wed, Thurs\"],\n        [\"Mejia Aaron\", \"Thurs, Fri\"],\n        [\"Bookman Derrell\", \"Thurs, Fri\"],\n        [\"Hopkins Alexander\", \"Mon, Sun\"],\n        [\"Tingle Jason\", \"Sat, Sun\"],\n        [\"Contreras Marco\", \"Sat, Sun\"],\n        [\"Benavides Robert\", \"Wed, Sun\"],\n        [\"Urtado Ernest\", \"Tues, Wed\"],\n        [\"Johnson Messiah\", \"Tues, Thurs\"],\n        [\"Gilder Rufus II\", \"Tues, Wed\"],\n        [\"Echendu Chimenierm\", \"Wed, Thurs\"],\n        [\"Delgado Jose\", \"Fri, Sat\"]\n      ],\n      gate: [\n        [\"Candace Warren\", \"Sat, Sun\"],\n        [\"Connie Johnson\", \"Sat, Sun\"],\n        [\"Jarade Douglas\", \"Sat, Sun\"],\n        [\"Gregory Watson II\", \"Sat, Sun\"],\n        [\"Bryce Alexander\", \"Thurs, Fri\"],\n        [\"Naomisha Hunt\", \"Thurs, Fri, Sat\"],\n        [\"Ramacacondra Pratt\", \"Thurs, Fri\"],\n        [\"Kane Cabral\", \"Mon, Tues\"],\n        [\"Tavares Gariet\", \"Mon, Tues\"]\n      ]\n    };\n\n    const shiftLabels = {\n      first: \"1st Shift\",\n      second: \"2nd Shift\",\n      gate: \"Gate\",\n      mechanics: \"Mechanics\",\n      managers: \"Managers\"\n    };\n\n    function escapeHtml(value) {\n      return String(value).replace(/[&<>\"']/g, (char) => ({\n        \"&\": \"&amp;\",\n        \"<\": \"&lt;\",\n        \">\": \"&gt;\",\n        '\"': \"&quot;\",\n        \"'\": \"&#39;\"\n      }[char]));\n    }\n\n    function isoDate(date) {\n      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, \"0\")}-${String(date.getDate()).padStart(2, \"0\")}`;\n    }\n\n    function dateFromKey(key) {\n      const [year, month, day] = String(key || \"\").split(\"-\").map(Number);\n      return new Date(year || today.getFullYear(), (month || 1) - 1, day || 1);\n    }\n\n    function monthDayLabel(key) {\n      const date = dateFromKey(key);\n      return `${date.getMonth() + 1}-${date.getDate()}`;\n    }\n\n    function normalizeName(name) {\n      const suffixes = new Set([\"jr\", \"sr\", \"ii\", \"iii\", \"iv\"]);\n      return String(name || \"\")\n        .trim()\n        .toLowerCase()\n        .replace(/[,.]/g, \" \")\n        .replace(/\\bcontrerras\\b/g, \"contreras\")\n        .replace(/\\s+/g, \" \")\n        .split(\" \")\n        .filter((part) => part && !suffixes.has(part))\n        .sort()\n        .join(\" \");\n    }\n\n    function parseOffDays(text) {\n      return new Set(String(text || \"\")\n        .split(\",\")\n        .map((item) => item.trim().toLowerCase())\n        .map((item) => dayAliases[item] || dayAliases[item.slice(0, 3)])\n        .filter(Boolean));\n    }\n\n    function rosterOffDaysLabel(days) {\n      return days\n        .map((day, index) => day === \"O\" ? rosterDayLabels[index] : \"\")\n        .filter(Boolean)\n        .join(\", \");\n    }\n\n    function migrateMcDanielToDays(state) {\n      if (!state || !Array.isArray(state.second)) return state;\n      if (!Array.isArray(state.first)) state.first = [];\n      const alreadyOnDays = state.first.some((employee) => normalizeName(employee.name || \"\") === \"charles mcdaniel\");\n      const secondIndex = state.second.findIndex((employee) => normalizeName(employee.name || \"\") === \"charles mcdaniel\");\n      if (secondIndex === -1) return state;\n      const [employee] = state.second.splice(secondIndex, 1);\n      if (!alreadyOnDays) state.first.push(employee);\n      localStorage.setItem(rosterStorageKey, JSON.stringify(state));\n      return state;\n    }\n\n    function readRosterAdditions() {\n      try {\n        const additions = JSON.parse(localStorage.getItem(rosterAdditionsKey) || \"[]\");\n        return Array.isArray(additions) ? additions : [];\n      } catch (error) {\n        localStorage.removeItem(rosterAdditionsKey);\n        return [];\n      }\n    }\n\n    function buildRoster() {\n      const roster = Object.fromEntries(Object.entries(defaultRoster).map(([key, rows]) => [\n        key,\n        rows.map(([name, offDays]) => ({ name, offDays }))\n      ]));\n\n      try {\n        const saved = localStorage.getItem(rosterStorageKey);\n        if (saved) {\n          const state = migrateMcDanielToDays(JSON.parse(saved));\n          [\"first\", \"second\", \"gate\", \"mechanics\", \"managers\"].forEach((key) => {\n            if (!Array.isArray(state[key])) return;\n            roster[key] = state[key]\n              .filter((employee) => employee && employee.name)\n              .map((employee) => ({\n                name: employee.name,\n                offDays: Array.isArray(employee.days) ? rosterOffDaysLabel(employee.days) : \"\"\n              }));\n          });\n        }\n      } catch (error) {\n        localStorage.removeItem(rosterStorageKey);\n      }\n\n      const seen = new Set(Object.values(roster).flat().map((employee) => normalizeName(employee.name)));\n      readRosterAdditions().forEach((addition) => {\n        if (!addition || !addition.name) return;\n        const key = addition.shift || \"first\";\n        const nameKey = normalizeName(addition.name);\n        if (!nameKey || seen.has(nameKey)) return;\n        if (!Array.isArray(roster[key])) roster[key] = [];\n        roster[key].push({\n          name: addition.name,\n          offDays: Array.isArray(addition.days) ? rosterOffDaysLabel(addition.days) : \"\"\n        });\n        seen.add(nameKey);\n      });\n\n      return roster;\n    }\n\n    function toMilitaryTime(value) {\n      const text = String(value || \"\").trim();\n      if (!text) return \"\";\n      const match = text.match(/^(\\d{1,2}):(\\d{2})\\s*([ap])m$/i);\n      if (!match) return text;\n      let hour = Number(match[1]);\n      const minute = match[2];\n      const period = match[3].toLowerCase();\n      if (period === \"p\" && hour !== 12) hour += 12;\n      if (period === \"a\" && hour === 12) hour = 0;\n      return `${String(hour).padStart(2, \"0\")}${minute}`;\n    }\n\n    function minutesFromMilitary(value) {\n      const text = String(value || \"\").trim();\n      const match = text.match(/^(\\d{1,2})(\\d{2})$/);\n      if (!match) return null;\n      const hours = Number(match[1]);\n      const minutes = Number(match[2]);\n      if (hours > 24 || minutes > 59 || (hours === 24 && minutes !== 0)) return null;\n      return (hours * 60) + minutes;\n    }\n\n    function militaryFromMinutes(value) {\n      const minutes = ((Math.round(value) % 1440) + 1440) % 1440;\n      const hours = Math.floor(minutes / 60);\n      const mins = minutes % 60;\n      return `${String(hours).padStart(2, \"0\")}${String(mins).padStart(2, \"0\")}`;\n    }\n\n    function currentMinutes() {\n      const now = new Date();\n      return (now.getHours() * 60) + now.getMinutes();\n    }\n\n    function currentMilitaryTime() {\n      return militaryFromMinutes(currentMinutes());\n    }\n\n    function dayKeyFromDateValue(value) {\n      const text = String(value || \"\").trim();\n      if (!text) return \"\";\n      const dayNameMatch = text.match(/^([a-z]{3,9})\\b/i);\n      const explicitDay = dayNameMatch ? dayAliases[dayNameMatch[1].toLowerCase()] : \"\";\n      if (explicitDay) return explicitDay;\n      const match = text.match(/^(\\d{1,2})\\/(\\d{1,2})\\/(\\d{2,4})/);\n      const date = match\n        ? new Date(Number(match[3].length === 2 ? `20${match[3]}` : match[3]), Number(match[1]) - 1, Number(match[2]))\n        : new Date(text);\n      if (Number.isNaN(date.getTime())) return \"\";\n      return [\"sun\", \"mon\", \"tue\", \"wed\", \"thu\", \"fri\", \"sat\"][date.getDay()];\n    }\n\n    function dayKeyFromArchiveDate(key) {\n      const date = dateFromKey(key);\n      return [\"sun\", \"mon\", \"tue\", \"wed\", \"thu\", \"fri\", \"sat\"][date.getDay()];\n    }\n\n    function readPunches() {\n      try {\n        const punches = JSON.parse(localStorage.getItem(dayforceStorageKey) || \"[]\");\n        return Array.isArray(punches) ? punches : [];\n      } catch (error) {\n        localStorage.removeItem(dayforceStorageKey);\n        return [];\n      }\n    }\n\n    function previousShiftHours() {\n      try {\n        const saved = JSON.parse(localStorage.getItem(previousTimesheetStorageKey) || \"null\");\n        return saved && typeof saved.hours === \"number\" ? Math.max(Number(saved.hours) || 0, 0) : 0;\n      } catch (error) {\n        localStorage.removeItem(previousTimesheetStorageKey);\n        return 0;\n      }\n    }\n\n    function readTimesheetSettings() {\n      try {\n        const saved = JSON.parse(localStorage.getItem(timesheetSettingsKey) || \"null\");\n        return {\n          lifts: saved && saved.lifts !== undefined ? Number(saved.lifts) || 0 : 339,\n          flips: saved && saved.flips !== undefined ? Number(saved.flips) || 0 : 5,\n          shiftEndMode: (saved && saved.shiftEndMode) || \"1500\",\n          shiftEndCustom: String((saved && saved.shiftEndCustom) || \"\")\n        };\n      } catch (error) {\n        localStorage.removeItem(timesheetSettingsKey);\n        return { lifts: 339, flips: 5, shiftEndMode: \"1500\", shiftEndCustom: \"\" };\n      }\n    }\n\n    function shiftEndFromSettings(settings) {\n      if (settings.shiftEndMode && settings.shiftEndMode !== \"other\") return settings.shiftEndMode;\n      return String(settings.shiftEndCustom || \"1500\").trim().padStart(4, \"0\");\n    }\n\n    function readArchive() {\n      try {\n        const archive = JSON.parse(localStorage.getItem(archiveStorageKey) || \"{}\");\n        return archive && typeof archive === \"object\" && !Array.isArray(archive) ? archive : {};\n      } catch (error) {\n        localStorage.removeItem(archiveStorageKey);\n        return {};\n      }\n    }\n\n    function writeArchive(archive) {\n      localStorage.setItem(archiveStorageKey, JSON.stringify(archive));\n    }\n\n    function shouldCheckMissingStart(shiftKey) {\n      if (shiftKey === \"gate\") return false;\n      if (shiftKey === \"second\") return currentMinutes() >= minutesFromMilitary(\"1500\");\n      return true;\n    }\n\n    function actualHours(startValue, lunch, endValue) {\n      const start = minutesFromMilitary(startValue);\n      const end = minutesFromMilitary(endValue);\n      if (start === null || end === null) return 0;\n      let minutes = end - start;\n      if (minutes < 0) minutes += 1440;\n      if (String(lunch).toUpperCase() === \"YES\") minutes -= 30;\n      return minutes > 0 ? minutes / 60 : 0;\n    }\n\n    function noteIsPurple(note, row = {}) {\n      return Boolean(row.paidAbsence || row.unpaidAbsence || /\\bfloating holidays?\\b|\\bvacations?\\b|\\bsick\\b|\\bunpaid\\b/i.test(String(note || \"\")));\n    }\n\n    function rowRank(row) {\n      if (row.scheduled && row.hasClockIn && !row.purpleAbsence) return 0;\n      if (!row.scheduled && row.hasClockIn) return 1;\n      if (row.purpleAbsence) return 2;\n      if (row.scheduled && !row.hasClockIn) return 3;\n      return 4;\n    }\n\n    function makeRows(dateKey = selectedDateKey) {\n      const roster = buildRoster();\n      const punches = new Map(readPunches().map((punch) => [normalizeName(punch.name || \"\"), punch]));\n      const fallbackDayKey = dayKeyFromArchiveDate(dateKey) || todayKey;\n\n      return Object.fromEntries(Object.entries(roster).map(([shiftKey, employees]) => {\n        const rows = employees.map((employee) => {\n          const punch = punches.get(normalizeName(employee.name)) || null;\n          const workdayKey = punch ? dayKeyFromDateValue(punch.date) || fallbackDayKey : fallbackDayKey;\n          const scheduled = !parseOffDays(employee.offDays).has(workdayKey);\n          const note = String((punch && (punch.note || punch.reason)) || \"\").trim();\n          const rawLunch = String((punch && punch.lunch) || \"\").trim();\n          const noLunch = rawLunch.toUpperCase() === \"NO\";\n          const start = toMilitaryTime(punch ? punch.start : \"\");\n          const importedEnd = toMilitaryTime(punch ? punch.end : \"\");\n          const hasClockIn = minutesFromMilitary(start) !== null;\n          const hasClockOut = minutesFromMilitary(importedEnd) !== null;\n          const end = hasClockIn && !hasClockOut ? currentMilitaryTime() : importedEnd;\n          const lunch = noLunch ? \"NO\" : (rawLunch ? \"YES\" : (start || end ? \"??\" : \"\"));\n          const actual = actualHours(start, lunch, end);\n          const hasClockTime = Boolean(start || end);\n          const cameInOffDay = !scheduled && hasClockTime;\n          const unpaidAbsence = Boolean(punch && punch.absenceUnpaid);\n          const paidAbsence = Boolean(punch && punch.absencePaid);\n          const purpleAbsence = noteIsPurple(note, { paidAbsence, unpaidAbsence });\n          const invalid = Boolean((start && minutesFromMilitary(start) === null) || (end && minutesFromMilitary(end) === null));\n          const missing = shouldCheckMissingStart(shiftKey) && scheduled && !note && !hasClockIn;\n          let status = \"OPEN\";\n          if (invalid) status = \"INVALID\";\n          else if (unpaidAbsence) status = \"UNPAID\";\n          else if (paidAbsence) status = \"PAID\";\n          else if (missing) status = \"NO SHOW\";\n          else if (hasClockIn && !hasClockOut) status = \"IN\";\n          else if (hasClockIn && hasClockOut) status = \"OUT\";\n          else if (!scheduled) status = \"OFF\";\n\n          return {\n            ...employee,\n            shiftKey,\n            scheduled,\n            note,\n            start,\n            lunch,\n            end,\n            actual,\n            hasClockIn,\n            hasClockOut,\n            cameInOffDay,\n            purpleAbsence,\n            unpaidAbsence,\n            paidAbsence,\n            invalid,\n            missing,\n            status\n          };\n        });\n\n        rows.sort((a, b) => rowRank(a) - rowRank(b) || a.name.localeCompare(b.name));\n        return [shiftKey, rows];\n      }));\n    }\n\n    function hoursUntilShiftEnd(value) {\n      const endMinutes = minutesFromMilitary(value);\n      if (endMinutes === null) return 0;\n      let remaining = endMinutes - currentMinutes();\n      if (remaining <= 0) remaining += 1440;\n      return remaining / 60;\n    }\n\n    function metricsFor(rowsByShift, settings) {\n      const lifts = Number(settings.lifts) || 0;\n      const flips = Number(settings.flips) || 0;\n      const firstHours = (rowsByShift.first || []).reduce((sum, row) => sum + (Number(row.actual) || 0), 0);\n      const secondHours = (rowsByShift.second || []).reduce((sum, row) => sum + (Number(row.actual) || 0), 0);\n      const currentHours = firstHours + secondHours;\n      const previousHoursValue = Number(settings.previousHours);\n      const previousHours = Number.isFinite(previousHoursValue) ? Math.max(previousHoursValue, 0) : previousShiftHours();\n      const shiftHours = currentHours + previousHours;\n      const totalMoves = Math.max(lifts + flips, 0);\n      const currentRate = shiftHours > 0 ? totalMoves / shiftHours : 0;\n      const neededValue = Math.ceil(shiftHours * lpmhGoal);\n      const remainValue = neededValue - totalMoves;\n      const remainingHours = hoursUntilShiftEnd(settings.shiftEnd || shiftEndFromSettings(settings));\n      const goalMet = shiftHours > 0 && currentRate >= lpmhGoal;\n      const neededLph = goalMet ? \"MET GOAL!\" : (remainingHours > 0 ? (Math.max(remainValue, 0) / remainingHours).toFixed(1) : \"0.0\");\n      return { lifts, flips, shiftEnd: settings.shiftEnd || shiftEndFromSettings(settings), currentHours, previousHours, shiftHours, totalMoves, currentRate, neededValue, remainValue, remainingHours, goalMet, neededLph };\n    }\n\n    function snapshotCurrentTimesheet(dateKey) {\n      const settings = readTimesheetSettings();\n      const rowsByShift = makeRows(dateKey);\n      const metrics = metricsFor(rowsByShift, {\n        ...settings,\n        shiftEnd: shiftEndFromSettings(settings),\n        previousHours: previousShiftHours()\n      });\n      return {\n        dateKey,\n        savedAt: new Date().toISOString(),\n        metrics,\n        shifts: rowsByShift\n      };\n    }\n\n    function renderCalendar() {\n      const archive = readArchive();\n      const monthTitle = document.getElementById(\"monthTitle\");\n      const grid = document.getElementById(\"calendarGrid\");\n      const first = new Date(viewDate.getFullYear(), viewDate.getMonth(), 1);\n      const start = new Date(first);\n      start.setDate(first.getDate() - first.getDay());\n      monthTitle.textContent = first.toLocaleDateString(undefined, { month: \"long\", year: \"numeric\" });\n\n      const cells = [];\n      for (let index = 0; index < 42; index += 1) {\n        const date = new Date(start);\n        date.setDate(start.getDate() + index);\n        const key = isoDate(date);\n        const archived = archive[key];\n        const classes = [\n          \"day-cell\",\n          date.getMonth() !== viewDate.getMonth() ? \"muted\" : \"\",\n          key === isoDate(today) ? \"today\" : \"\",\n          key === selectedDateKey ? \"selected\" : \"\"\n        ].filter(Boolean).join(\" \");\n        cells.push(`\n          <button class=\"${classes}\" type=\"button\" data-date=\"${escapeHtml(key)}\">\n            <span class=\"day-number\">${date.getDate()}</span>\n            ${archived ? `<span class=\"archive-pill\" data-open=\"${escapeHtml(key)}\">${escapeHtml(`${monthDayLabel(key)} Timesheet`)}</span>` : \"\"}\n          </button>\n        `);\n      }\n      grid.innerHTML = cells.join(\"\");\n      document.getElementById(\"archiveDate\").value = selectedDateKey;\n    }\n\n    function saveCurrentTimesheet() {\n      const dateKey = document.getElementById(\"archiveDate\").value || selectedDateKey;\n      selectedDateKey = dateKey;\n      viewDate = new Date(dateFromKey(dateKey).getFullYear(), dateFromKey(dateKey).getMonth(), 1);\n      const archive = readArchive();\n      archive[dateKey] = snapshotCurrentTimesheet(dateKey);\n      writeArchive(archive);\n      document.getElementById(\"saveMessage\").textContent = `Saved ${monthDayLabel(dateKey)}`;\n      renderCalendar();\n    }\n\n    function rowClass(row) {\n      const classes = [\"md-row\"];\n      if (row.status === \"IN\") classes.push(\"in-row\");\n      if (row.status === \"OUT\") classes.push(\"out-row\");\n      if (row.cameInOffDay) classes.push(\"offday-row\");\n      if (row.missing) classes.push(\"missing-row\");\n      if (row.invalid) classes.push(\"invalid-row\");\n      if (row.purpleAbsence || row.paidAbsence) classes.push(\"absence-row\");\n      if (row.unpaidAbsence) classes.push(\"unpaid-row\");\n      return classes.join(\" \");\n    }\n\n    function shiftHeaderLabel(shiftKey) {\n      if (shiftKey === \"first\") return \"1st SHIFT\";\n      if (shiftKey === \"second\") return \"2ND SHIFT\";\n      return String(shiftLabels[shiftKey] || shiftKey).toUpperCase();\n    }\n\n    function sectionStats(rows, shiftKey) {\n      const rowsWithIndex = rows.map((row, index) => ({ ...row, archiveIndex: index }));\n      const scheduled = rows.filter((row) => row.scheduled).length;\n      const here = rows.filter((row) => row.hasClockIn && !row.hasClockOut).length;\n      const out = rows.filter((row) => row.scheduled && !row.unpaidAbsence && !(row.hasClockIn && !row.hasClockOut)).length;\n      const actual = rows.reduce((sum, row) => sum + (Number(row.actual) || 0), 0);\n      const visibleRows = rowsWithIndex.filter((row) => !(row.status === \"OFF\" && !row.note));\n      const offRows = rowsWithIndex.filter((row) => row.status === \"OFF\" && !row.note);\n      return { scheduled, here, out, actual, visibleRows, offRows, shiftKey };\n    }\n\n    function renderKpis(snapshot) {\n      const details = metricsFor(snapshot.shifts, snapshot.metrics || {});\n      const remainText = details.goalMet ? \"MET GOAL!\" : String(Math.max(details.remainValue, 0));\n      document.getElementById(\"previewKpis\").innerHTML = [\n        [\"Lifts\", details.lifts, \"\"],\n        [\"Flips\", details.flips, \"\"],\n        [\"Shift End\", details.shiftEnd, \"\"],\n        [\"Lifts Needed\", details.neededValue, \"\"],\n        [\"Current LPMH\", details.currentRate.toFixed(1), details.currentRate >= lpmhGoal ? \"good\" : \"bad\"],\n        [\"LPH Needed\", details.neededLph, details.goalMet ? \"good\" : \"warn\"],\n        [\"Lifts Remain\", remainText, details.goalMet ? \"good\" : \"warn\"]\n      ].map(([label, value, className]) => `\n        <div class=\"kpi ${className}\">\n          <div class=\"kpi-label\">${escapeHtml(label)}</div>\n          <div class=\"kpi-value\">${escapeHtml(value)}</div>\n        </div>\n      `).join(\"\");\n    }\n\n    function renderEmployeeRow(row, shiftKey, rowIndex) {\n      const lunchOptions = [\"\", \"NO\", \"YES\", \"??\"].map((value) => (\n        `<option value=\"${escapeHtml(value)}\" ${String(row.lunch || \"\") === value ? \"selected\" : \"\"}>${escapeHtml(value || \"-\")}</option>`\n      )).join(\"\");\n      return `\n        <div class=\"${rowClass(row)}\" data-shift=\"${escapeHtml(shiftKey)}\" data-row=\"${rowIndex}\">\n          <span class=\"name ${row.missing ? \"missing\" : \"\"}\">${escapeHtml(row.name)}</span>\n          <span class=\"off\">${escapeHtml(row.offDays)}</span>\n          <input class=\"note-edit\" value=\"${escapeHtml(row.note || \"\")}\" aria-label=\"${escapeHtml(row.name)} note\" />\n          <input class=\"time-edit ${row.missing ? \"missing\" : \"\"}\" value=\"${escapeHtml(row.missing ? \"Missing?\" : row.start || \"\")}\" aria-label=\"${escapeHtml(row.name)} start\" />\n          <select class=\"lunch-edit\" aria-label=\"${escapeHtml(row.name)} lunch\">${lunchOptions}</select>\n          <input class=\"time-edit\" value=\"${escapeHtml(row.end || \"\")}\" aria-label=\"${escapeHtml(row.name)} end\" />\n          <span class=\"actual\">${Number(row.actual) ? Number(row.actual).toFixed(1) : \"\"}</span>\n        </div>\n      `;\n    }\n\n    function renderShiftCard(shiftKey, rows) {\n      const stats = sectionStats(rows, shiftKey);\n      const offList = stats.offRows.length\n        ? stats.offRows.map((row) => `<span class=\"off-chip\">${escapeHtml(row.name)}</span>`).join(\"\")\n        : `<span class=\"off-chip\">None</span>`;\n      const body = stats.visibleRows.length\n        ? stats.visibleRows.map((row) => renderEmployeeRow(row, shiftKey, row.archiveIndex)).join(\"\")\n        : `<div class=\"off-footer\"><strong>No rows</strong></div>`;\n\n      return `\n        <section class=\"shift-card\">\n          <header class=\"shift-head\">\n            <span class=\"shift-name\">${escapeHtml(`${shiftHeaderLabel(shiftKey)} [${stats.scheduled} sch]`)}</span>\n            <span>Off Days</span>\n            <span>NOTE</span>\n            <span>${escapeHtml(`${stats.here} HERE, ${stats.out} OUT`)}</span>\n            <span>Lunch</span>\n            <span>End</span>\n            <span>${escapeHtml(`Actual ${stats.actual.toFixed(1)}`)}</span>\n          </header>\n          ${body}\n          <div class=\"off-footer\"><strong>${escapeHtml(`OFF - ${stats.offRows.length}`)}</strong>${offList}</div>\n        </section>\n      `;\n    }\n\n    function renderPreview(snapshot) {\n      document.getElementById(\"previewTitle\").textContent = `${monthDayLabel(snapshot.dateKey)} Timesheet`;\n      renderKpis(snapshot);\n      document.getElementById(\"previewCards\").innerHTML = [\"first\", \"second\", \"gate\", \"mechanics\", \"managers\"]\n        .filter((key) => Array.isArray(snapshot.shifts[key]) && snapshot.shifts[key].length)\n        .map((key) => renderShiftCard(key, snapshot.shifts[key]))\n        .join(\"\");\n    }\n\n    function resetDeleteArchiveButton() {\n      deleteArchiveButton.textContent = \"Delete\";\n      deleteArchiveButton.classList.remove(\"confirm-delete\");\n      deleteArchiveButton.dataset.confirming = \"0\";\n    }\n\n    function openArchive(dateKey) {\n      const archive = readArchive();\n      if (!archive[dateKey]) return;\n      activeArchiveKey = dateKey;\n      activeArchive = JSON.parse(JSON.stringify(archive[dateKey]));\n      resetDeleteArchiveButton();\n      renderPreview(activeArchive);\n      document.getElementById(\"previewModal\").classList.add(\"open\");\n      document.getElementById(\"previewModal\").setAttribute(\"aria-hidden\", \"false\");\n    }\n\n    function closePreview() {\n      document.getElementById(\"previewModal\").classList.remove(\"open\");\n      document.getElementById(\"previewModal\").setAttribute(\"aria-hidden\", \"true\");\n      resetDeleteArchiveButton();\n      activeArchiveKey = \"\";\n      activeArchive = null;\n    }\n\n    function deleteActiveArchive() {\n      if (!activeArchiveKey) return;\n      if (deleteArchiveButton.dataset.confirming !== \"1\") {\n        deleteArchiveButton.textContent = \"Confirm\";\n        deleteArchiveButton.classList.add(\"confirm-delete\");\n        deleteArchiveButton.dataset.confirming = \"1\";\n        return;\n      }\n\n      const deletedKey = activeArchiveKey;\n      const archive = readArchive();\n      delete archive[deletedKey];\n      writeArchive(archive);\n      closePreview();\n      document.getElementById(\"saveMessage\").textContent = `Deleted ${monthDayLabel(deletedKey)}`;\n      renderCalendar();\n    }\n\n    function statusFromEdited(row, start, end, note, shiftKey) {\n      const hasClockIn = minutesFromMilitary(start) !== null;\n      const hasClockOut = minutesFromMilitary(end) !== null;\n      const invalid = Boolean((start && start !== \"Missing?\" && minutesFromMilitary(start) === null) || (end && minutesFromMilitary(end) === null));\n      const purpleAbsence = noteIsPurple(note, row);\n      const missing = shouldCheckMissingStart(shiftKey) && row.scheduled && !note && !hasClockIn;\n      if (invalid) return \"INVALID\";\n      if (row.unpaidAbsence || /\\bunpaid\\b/i.test(note)) return \"UNPAID\";\n      if (row.paidAbsence || purpleAbsence) return \"PAID\";\n      if (missing) return \"NO SHOW\";\n      if (hasClockIn && !hasClockOut) return \"IN\";\n      if (hasClockIn && hasClockOut) return \"OUT\";\n      if (!row.scheduled) return \"OFF\";\n      return \"OPEN\";\n    }\n\n    function updateArchiveFromPreview() {\n      if (!activeArchive || !activeArchiveKey) return;\n      document.querySelectorAll(\"#previewCards .md-row\").forEach((element) => {\n        const shiftKey = element.dataset.shift;\n        const rowIndex = Number(element.dataset.row);\n        const row = activeArchive.shifts[shiftKey] && activeArchive.shifts[shiftKey][rowIndex];\n        if (!row) return;\n        const inputs = element.querySelectorAll(\".time-edit\");\n        const note = element.querySelector(\".note-edit\").value.trim();\n        const start = inputs[0].value.trim() === \"Missing?\" ? \"\" : inputs[0].value.trim();\n        const lunch = element.querySelector(\".lunch-edit\").value.trim();\n        const end = inputs[1].value.trim();\n        row.note = note;\n        row.start = start;\n        row.lunch = lunch;\n        row.end = end;\n        row.hasClockIn = minutesFromMilitary(start) !== null;\n        row.hasClockOut = minutesFromMilitary(end) !== null;\n        row.actual = actualHours(start, lunch, end);\n        row.cameInOffDay = !row.scheduled && Boolean(start || end);\n        row.unpaidAbsence = /\\bunpaid\\b/i.test(note);\n        row.paidAbsence = !row.unpaidAbsence && /\\bfloating holidays?\\b|\\bvacations?\\b|\\bsick\\b/i.test(note);\n        row.purpleAbsence = noteIsPurple(note, row);\n        row.invalid = Boolean((start && minutesFromMilitary(start) === null) || (end && minutesFromMilitary(end) === null));\n        row.missing = shouldCheckMissingStart(shiftKey) && row.scheduled && !note && !row.hasClockIn;\n        row.status = statusFromEdited(row, start, end, note, shiftKey);\n      });\n\n      activeArchive.savedAt = new Date().toISOString();\n      activeArchive.metrics = metricsFor(activeArchive.shifts, activeArchive.metrics || {});\n      const archive = readArchive();\n      archive[activeArchiveKey] = activeArchive;\n      writeArchive(archive);\n      renderPreview(activeArchive);\n      renderCalendar();\n    }\n\n    document.getElementById(\"prevMonth\").addEventListener(\"click\", () => {\n      viewDate = new Date(viewDate.getFullYear(), viewDate.getMonth() - 1, 1);\n      renderCalendar();\n    });\n\n    document.getElementById(\"nextMonth\").addEventListener(\"click\", () => {\n      viewDate = new Date(viewDate.getFullYear(), viewDate.getMonth() + 1, 1);\n      renderCalendar();\n    });\n\n    document.getElementById(\"todayButton\").addEventListener(\"click\", () => {\n      selectedDateKey = isoDate(today);\n      viewDate = new Date(today.getFullYear(), today.getMonth(), 1);\n      renderCalendar();\n    });\n\n    document.getElementById(\"archiveDate\").addEventListener(\"change\", (event) => {\n      selectedDateKey = event.target.value || selectedDateKey;\n      const selected = dateFromKey(selectedDateKey);\n      viewDate = new Date(selected.getFullYear(), selected.getMonth(), 1);\n      renderCalendar();\n    });\n\n    document.getElementById(\"saveTimesheet\").addEventListener(\"click\", saveCurrentTimesheet);\n    document.getElementById(\"closePreview\").addEventListener(\"click\", closePreview);\n    document.getElementById(\"updateArchive\").addEventListener(\"click\", updateArchiveFromPreview);\n    deleteArchiveButton.addEventListener(\"click\", deleteActiveArchive);\n    document.getElementById(\"previewModal\").addEventListener(\"click\", (event) => {\n      if (event.target.id === \"previewModal\") closePreview();\n    });\n\n    document.getElementById(\"calendarGrid\").addEventListener(\"click\", (event) => {\n      const pill = event.target.closest(\"[data-open]\");\n      if (pill) {\n        event.stopPropagation();\n        openArchive(pill.dataset.open);\n        return;\n      }\n      const cell = event.target.closest(\"[data-date]\");\n      if (!cell) return;\n      selectedDateKey = cell.dataset.date;\n      document.getElementById(\"archiveDate\").value = selectedDateKey;\n      renderCalendar();\n    });\n\n    document.addEventListener(\"keydown\", (event) => {\n      if (event.key === \"Escape\") closePreview();\n    });\n\n    document.getElementById(\"archiveDate\").value = selectedDateKey;\n    renderCalendar();\n  <\/script>\n</body>\n</html>\n" },
      "timeOff": { label: "Time Off", html: "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n  <meta charset=\"UTF-8\" />\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" />\n  <title>Time Off</title>\n  <style>\n    :root {\n      --ink: #111827;\n      --muted: #6b7280;\n      --line: #d8dee8;\n      --soft: #f8fafc;\n      --purple: #312e81;\n      --green: #16a34a;\n      --red: #dc2626;\n      --gold: #d97706;\n      --violet: #7c3aed;\n    }\n\n    * {\n      box-sizing: border-box;\n    }\n\n    body {\n      margin: 0;\n      background: #fff;\n      color: var(--ink);\n      font-family: \"Helvetica Neue\", Helvetica, Arial, sans-serif;\n      font-size: 13px;\n      overflow-x: hidden;\n    }\n\n    .page-switcher {\n      width: 100%;\n      display: flex;\n      flex-wrap: wrap;\n      gap: 4px;\n      align-items: center;\n      padding: 6px 8px;\n      background: #111;\n      border-bottom: 2px solid #000;\n    }\n\n    .page-switcher a {\n      min-width: 118px;\n      height: 28px;\n      display: inline-flex;\n      align-items: center;\n      justify-content: center;\n      border: 1px solid #777;\n      background: #e7e6e6;\n      color: #000;\n      text-decoration: none;\n      font-size: 13px;\n      font-weight: 800;\n    }\n\n    .page-switcher a.active {\n      background: #ffff00;\n      border-color: #ffff00;\n    }\n\n    .calendar-shell {\n      width: min(1180px, calc(100% - 20px));\n      margin: 10px auto 18px;\n      border: 1px solid var(--line);\n      border-radius: 8px;\n      background: #fff;\n      overflow: hidden;\n    }\n\n    .calendar-toolbar {\n      min-height: 58px;\n      display: grid;\n      grid-template-columns: minmax(240px, 1fr) auto;\n      gap: 16px;\n      align-items: center;\n      padding: 10px 14px;\n      border-bottom: 1px solid var(--line);\n      background: var(--soft);\n    }\n\n    .title-block {\n      display: flex;\n      align-items: center;\n      flex-wrap: wrap;\n      gap: 12px;\n    }\n\n    h1 {\n      margin: 0;\n      color: var(--ink);\n      font-size: 20px;\n      font-weight: 900;\n      line-height: 1;\n    }\n\n    .month-title {\n      min-width: 170px;\n      color: var(--ink);\n      font-size: 18px;\n      font-weight: 900;\n      text-align: center;\n    }\n\n    .month-controls {\n      display: flex;\n      align-items: center;\n      flex-wrap: wrap;\n      justify-content: flex-end;\n      gap: 8px;\n    }\n\n    button {\n      font: inherit;\n    }\n\n    .icon-button,\n    .secondary-button {\n      height: 30px;\n      border: 1px solid #cbd5e1;\n      border-radius: 6px;\n      background: #fff;\n      color: var(--ink);\n      font-weight: 900;\n      cursor: pointer;\n    }\n\n    .icon-button {\n      width: 32px;\n    }\n\n    .secondary-button {\n      padding: 0 12px;\n    }\n\n    .calendar-weekdays,\n    .calendar-grid {\n      display: grid;\n      grid-template-columns: repeat(7, minmax(0, 1fr));\n      gap: 5px;\n      padding: 0 8px;\n    }\n\n    .calendar-weekdays {\n      padding-top: 10px;\n      padding-bottom: 4px;\n    }\n\n    .weekday {\n      height: 30px;\n      display: flex;\n      align-items: center;\n      justify-content: center;\n      border: 1px solid var(--line);\n      border-radius: 6px;\n      background: #fff;\n      color: #334155;\n      font-size: 11px;\n      font-weight: 900;\n    }\n\n    .calendar-grid {\n      padding-bottom: 10px;\n    }\n\n    .day-cell {\n      min-height: 92px;\n      display: flex;\n      flex-direction: column;\n      align-items: flex-start;\n      gap: 6px;\n      padding: 7px;\n      border: 1px solid var(--line);\n      border-radius: 6px;\n      background: #fff;\n      color: var(--ink);\n      cursor: pointer;\n    }\n\n    .day-cell:hover,\n    .day-cell.selected {\n      border-color: #94a3b8;\n      box-shadow: inset 0 0 0 1px #94a3b8;\n    }\n\n    .day-cell.muted {\n      background: var(--soft);\n      color: #a0a8b5;\n    }\n\n    .day-cell.today {\n      border-color: var(--purple);\n    }\n\n    .day-number {\n      color: inherit;\n      font-size: 11px;\n      font-weight: 800;\n    }\n\n    .selected-label {\n      display: inline-flex;\n      align-items: center;\n      justify-content: center;\n      min-height: 22px;\n      padding: 3px 8px;\n      border: 1px solid #c7d2fe;\n      border-radius: 999px;\n      background: #eef2ff;\n      color: #4338ca;\n      font-size: 11px;\n      font-weight: 900;\n      line-height: 1.1;\n    }\n\n    .import-button {\n      min-height: 30px;\n      display: inline-flex;\n      align-items: center;\n      justify-content: center;\n      padding: 0 12px;\n      border: 1px solid #0f172a;\n      border-radius: 6px;\n      background: #0f172a;\n      color: #fff;\n      font-size: 12px;\n      font-weight: 900;\n      cursor: pointer;\n    }\n\n    .import-button input {\n      position: absolute;\n      width: 1px;\n      height: 1px;\n      opacity: 0;\n      pointer-events: none;\n    }\n\n    .import-status {\n      min-height: 22px;\n      display: inline-flex;\n      align-items: center;\n      color: var(--muted);\n      font-size: 11px;\n      font-weight: 800;\n    }\n\n    .timeoff-pill {\n      max-width: 100%;\n      min-height: 20px;\n      display: inline-flex;\n      align-items: center;\n      justify-content: center;\n      padding: 2px 7px;\n      border: 1px solid #c7d2fe;\n      border-radius: 999px;\n      background: #eef2ff;\n      color: #4338ca;\n      font-family: \"Segoe UI\", Arial, Helvetica, sans-serif;\n      font-size: 11px;\n      font-weight: 600;\n      letter-spacing: 0;\n      line-height: 1.2;\n      text-align: center;\n      white-space: normal;\n    }\n\n    .timeoff-pill.sic {\n      border-color: #fecaca;\n      background: #fee2e2;\n      color: #991b1b;\n    }\n\n    .timeoff-pill.vac {\n      border-color: #ddd6fe;\n      background: #ede9fe;\n      color: #5b21b6;\n    }\n\n    .timeoff-pill.flo {\n      border-color: #bfdbfe;\n      background: #dbeafe;\n      color: #1d4ed8;\n    }\n\n    .timeoff-pill.hol {\n      border-color: #fde68a;\n      background: #fef3c7;\n      color: #92400e;\n    }\n\n    .more-pill {\n      color: var(--muted);\n      font-size: 10px;\n      font-weight: 900;\n    }\n\n    @media (max-width: 760px) {\n      .page-switcher {\n        padding: 5px;\n      }\n\n      .page-switcher a {\n        min-width: 96px;\n        font-size: 12px;\n      }\n\n      .calendar-toolbar {\n        grid-template-columns: 1fr;\n      }\n\n      .month-controls {\n        justify-content: flex-start;\n      }\n\n      .calendar-weekdays,\n      .calendar-grid {\n        gap: 3px;\n        padding-inline: 5px;\n      }\n\n      .day-cell {\n        min-height: 78px;\n        padding: 5px;\n      }\n    }\n  </style>\n</head>\n<body>\n  <main class=\"calendar-shell\">\n    <header class=\"calendar-toolbar\">\n      <div class=\"title-block\">\n        <h1>Time Off</h1>\n        <span class=\"selected-label\" id=\"selectedLabel\"></span>\n        <label class=\"import-button\">\n          Import Time Off\n          <input type=\"file\" id=\"timeOffImport\" accept=\".xlsx,.xls\" />\n        </label>\n        <span class=\"import-status\" id=\"importStatus\">No import loaded</span>\n      </div>\n      <div class=\"month-controls\">\n        <button class=\"icon-button\" id=\"prevMonth\" type=\"button\" aria-label=\"Previous month\">&lt;</button>\n        <div class=\"month-title\" id=\"monthTitle\"></div>\n        <button class=\"icon-button\" id=\"nextMonth\" type=\"button\" aria-label=\"Next month\">&gt;</button>\n        <button class=\"secondary-button\" id=\"todayButton\" type=\"button\">Today</button>\n      </div>\n    </header>\n\n    <section class=\"calendar-weekdays\" aria-hidden=\"true\">\n      <div class=\"weekday\">Sun</div>\n      <div class=\"weekday\">Mon</div>\n      <div class=\"weekday\">Tue</div>\n      <div class=\"weekday\">Wed</div>\n      <div class=\"weekday\">Thu</div>\n      <div class=\"weekday\">Fri</div>\n      <div class=\"weekday\">Sat</div>\n    </section>\n    <section class=\"calendar-grid\" id=\"calendarGrid\" aria-label=\"Time off calendar\"></section>\n  </main>\n\n  <script src=\"https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js\"><\/script>\n  <script>\n    const today = new Date();\n    let viewDate = new Date(today.getFullYear(), today.getMonth(), 1);\n    let selectedDateKey = isoDate(today);\n    const timeOffStorageKey = \"conglobal-time-off-calendar-v1\";\n    const absenceReasons = {\n      SIC: \"Sick\",\n      VAC: \"Vacation\",\n      FLO: \"Floating Holiday\",\n      HOL: \"Holiday\"\n    };\n    const monthNames = {\n      january: 0,\n      february: 1,\n      march: 2,\n      april: 3,\n      may: 4,\n      june: 5,\n      july: 6,\n      august: 7,\n      september: 8,\n      october: 9,\n      november: 10,\n      december: 11\n    };\n\n    function isoDate(date) {\n      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, \"0\")}-${String(date.getDate()).padStart(2, \"0\")}`;\n    }\n\n    function escapeHtml(value) {\n      return String(value).replace(/[&<>\"']/g, (char) => ({\n        \"&\": \"&amp;\",\n        \"<\": \"&lt;\",\n        \">\": \"&gt;\",\n        '\"': \"&quot;\",\n        \"'\": \"&#39;\"\n      }[char]));\n    }\n\n    function dateFromKey(key) {\n      const [year, month, day] = String(key || \"\").split(\"-\").map(Number);\n      return new Date(year || today.getFullYear(), (month || 1) - 1, day || 1);\n    }\n\n    function friendlyDate(key) {\n      return dateFromKey(key).toLocaleDateString(undefined, {\n        weekday: \"short\",\n        month: \"short\",\n        day: \"numeric\",\n        year: \"numeric\"\n      });\n    }\n\n    function readTimeOff() {\n      try {\n        const saved = JSON.parse(localStorage.getItem(timeOffStorageKey) || \"{}\");\n        return saved && typeof saved === \"object\" && !Array.isArray(saved) ? saved : {};\n      } catch (error) {\n        localStorage.removeItem(timeOffStorageKey);\n        return {};\n      }\n    }\n\n    function writeTimeOff(calendar) {\n      localStorage.setItem(timeOffStorageKey, JSON.stringify(calendar));\n    }\n\n    function normalizeName(name) {\n      return String(name || \"\").toLowerCase().replace(/[^a-z0-9]+/g, \" \").trim();\n    }\n\n    function codeFromCell(value) {\n      const text = String(value || \"\").trim().toUpperCase();\n      return Object.keys(absenceReasons).find((code) => new RegExp(`\\\\b${code}\\\\b`).test(text)) || \"\";\n    }\n\n    function parseDayNumber(value) {\n      const text = String(value || \"\").trim();\n      if (!/^\\d{1,2}$/.test(text)) return null;\n      const day = Number(text);\n      return day >= 1 && day <= 31 ? day : null;\n    }\n\n    function employeeNameFromCell(value) {\n      let text = String(value || \"\").replace(/\\s+/g, \" \").trim();\n      if (!text || !/[a-z]/i.test(text)) return \"\";\n      if (/^(emp\\s*name|employee|shifts?|time away|date range|location|reasons?|statuses?|pay groups?)/i.test(text)) return \"\";\n      if (/\\b(SIC|VAC|FLO|HOL)\\s*-/i.test(text)) return \"\";\n      text = text.replace(/\\s+\\d{3,}\\b.*$/, \"\").trim();\n      const comma = text.match(/^([^,]+),\\s*(.+)$/);\n      if (comma) return `${comma[1].trim()} ${comma[2].trim()}`.replace(/\\s+/g, \" \");\n      return text;\n    }\n\n    function monthYearFromRows(rows) {\n      const current = { month: today.getMonth(), year: today.getFullYear() };\n      for (const row of rows) {\n        for (const value of row) {\n          const match = String(value || \"\").match(/\\b(january|february|march|april|may|june|july|august|september|october|november|december)\\s+(\\d{4})\\b/i);\n          if (match) return { month: monthNames[match[1].toLowerCase()], year: Number(match[2]) };\n        }\n      }\n      for (const row of rows) {\n        for (const value of row) {\n          const text = String(value || \"\");\n          const dateMatch = text.match(/\\b(\\d{1,2})\\/(\\d{1,2})\\/(\\d{4})\\b/);\n          if (dateMatch && /date range/i.test(text)) {\n            return { month: Number(dateMatch[1]) - 1, year: Number(dateMatch[3]) };\n          }\n        }\n      }\n      return current;\n    }\n\n    function findEmployeeHeader(rows) {\n      for (let rowIndex = 0; rowIndex < rows.length; rowIndex += 1) {\n        for (let colIndex = 0; colIndex < rows[rowIndex].length; colIndex += 1) {\n          if (/\\bemp(?:loyee)?\\s*name\\b/i.test(String(rows[rowIndex][colIndex] || \"\"))) {\n            return { rowIndex, colIndex };\n          }\n        }\n      }\n      return null;\n    }\n\n    function findDayColumns(rows, header) {\n      const candidates = [];\n      for (let rowIndex = Math.max(0, header.rowIndex - 3); rowIndex <= Math.min(rows.length - 1, header.rowIndex + 3); rowIndex += 1) {\n        const days = [];\n        for (let colIndex = header.colIndex + 1; colIndex < rows[rowIndex].length; colIndex += 1) {\n          const day = parseDayNumber(rows[rowIndex][colIndex]);\n          if (day !== null) days.push({ colIndex, day });\n        }\n        candidates.push({ rowIndex, days });\n      }\n      candidates.sort((a, b) => b.days.length - a.days.length);\n      return candidates[0]?.days || [];\n    }\n\n    function datedColumns(dayColumns, base) {\n      let month = base.month;\n      let year = base.year;\n      let previousDay = 0;\n      return dayColumns.map(({ colIndex, day }) => {\n        if (previousDay && day < previousDay - 7) {\n          month += 1;\n          if (month > 11) {\n            month = 0;\n            year += 1;\n          }\n        }\n        previousDay = day;\n        return { colIndex, dateKey: isoDate(new Date(year, month, day)) };\n      });\n    }\n\n    function parseTimeOffRows(rows, sheetName) {\n      const header = findEmployeeHeader(rows);\n      if (!header) return [];\n      const dayColumns = datedColumns(findDayColumns(rows, header), monthYearFromRows(rows));\n      if (!dayColumns.length) return [];\n      const records = [];\n\n      for (let rowIndex = header.rowIndex + 1; rowIndex < rows.length; rowIndex += 1) {\n        const row = rows[rowIndex] || [];\n        const name = employeeNameFromCell(row[header.colIndex]);\n        if (!name) continue;\n        for (const column of dayColumns) {\n          const code = codeFromCell(row[column.colIndex]);\n          if (!code) continue;\n          records.push({\n            date: column.dateKey,\n            name,\n            code,\n            reason: absenceReasons[code],\n            sheet: sheetName\n          });\n        }\n      }\n\n      return records;\n    }\n\n    function recordsToCalendar(records) {\n      const seen = new Set();\n      const calendar = {};\n      records.forEach((record) => {\n        const key = `${record.date}|${normalizeName(record.name)}|${record.code}`;\n        if (seen.has(key)) return;\n        seen.add(key);\n        if (!calendar[record.date]) calendar[record.date] = [];\n        calendar[record.date].push(record);\n      });\n      Object.values(calendar).forEach((entries) => {\n        entries.sort((a, b) => a.name.localeCompare(b.name) || a.code.localeCompare(b.code));\n      });\n      return calendar;\n    }\n\n    function sheetRows(workbook, sheetName) {\n      const sheet = workbook.Sheets[sheetName];\n      return XLSX.utils.sheet_to_json(sheet, { header: 1, raw: false, defval: \"\" })\n        .map((row) => row.map((cell) => String(cell || \"\").trim()));\n    }\n\n    function parseTimeOffWorkbook(workbook) {\n      const records = [];\n      workbook.SheetNames.forEach((sheetName) => {\n        records.push(...parseTimeOffRows(sheetRows(workbook, sheetName), sheetName));\n      });\n      return records;\n    }\n\n    function renderCalendar() {\n      const timeOff = readTimeOff();\n      const monthTitle = document.getElementById(\"monthTitle\");\n      const grid = document.getElementById(\"calendarGrid\");\n      const first = new Date(viewDate.getFullYear(), viewDate.getMonth(), 1);\n      const start = new Date(first);\n      start.setDate(first.getDate() - first.getDay());\n      monthTitle.textContent = first.toLocaleDateString(undefined, { month: \"long\", year: \"numeric\" });\n      const selectedCount = (timeOff[selectedDateKey] || []).length;\n      document.getElementById(\"selectedLabel\").textContent = `${friendlyDate(selectedDateKey)}${selectedCount ? ` - ${selectedCount} away` : \"\"}`;\n\n      const cells = [];\n      for (let index = 0; index < 42; index += 1) {\n        const date = new Date(start);\n        date.setDate(start.getDate() + index);\n        const key = isoDate(date);\n        const entries = timeOff[key] || [];\n        const visibleEntries = entries.slice(0, 3);\n        const classes = [\n          \"day-cell\",\n          date.getMonth() !== viewDate.getMonth() ? \"muted\" : \"\",\n          key === isoDate(today) ? \"today\" : \"\",\n          key === selectedDateKey ? \"selected\" : \"\"\n        ].filter(Boolean).join(\" \");\n        cells.push(`\n          <button class=\"${classes}\" type=\"button\" data-date=\"${escapeHtml(key)}\">\n            <span class=\"day-number\">${date.getDate()}</span>\n            ${visibleEntries.map((entry) => `\n              <span class=\"timeoff-pill ${escapeHtml(entry.code.toLowerCase())}\" title=\"${escapeHtml(`${entry.name} - ${entry.reason}`)}\">\n                ${escapeHtml(`${entry.name} - ${entry.code}`)}\n              </span>\n            `).join(\"\")}\n            ${entries.length > visibleEntries.length ? `<span class=\"more-pill\">+${entries.length - visibleEntries.length} more</span>` : \"\"}\n          </button>\n        `);\n      }\n      grid.innerHTML = cells.join(\"\");\n    }\n\n    document.getElementById(\"prevMonth\").addEventListener(\"click\", () => {\n      viewDate = new Date(viewDate.getFullYear(), viewDate.getMonth() - 1, 1);\n      renderCalendar();\n    });\n\n    document.getElementById(\"nextMonth\").addEventListener(\"click\", () => {\n      viewDate = new Date(viewDate.getFullYear(), viewDate.getMonth() + 1, 1);\n      renderCalendar();\n    });\n\n    document.getElementById(\"todayButton\").addEventListener(\"click\", () => {\n      selectedDateKey = isoDate(today);\n      viewDate = new Date(today.getFullYear(), today.getMonth(), 1);\n      renderCalendar();\n    });\n\n    document.getElementById(\"timeOffImport\").addEventListener(\"change\", async (event) => {\n      const file = event.target.files[0];\n      if (!file) return;\n      const status = document.getElementById(\"importStatus\");\n\n      if (!window.XLSX) {\n        status.textContent = \"XLSX parser unavailable\";\n        event.target.value = \"\";\n        return;\n      }\n\n      try {\n        const workbook = XLSX.read(await file.arrayBuffer(), { type: \"array\" });\n        const records = parseTimeOffWorkbook(workbook);\n        if (!records.length) {\n          status.textContent = \"No time away codes found\";\n          return;\n        }\n\n        writeTimeOff(recordsToCalendar(records));\n        selectedDateKey = records[0].date;\n        const selected = dateFromKey(selectedDateKey);\n        viewDate = new Date(selected.getFullYear(), selected.getMonth(), 1);\n        status.textContent = `${records.length} time away records imported`;\n        renderCalendar();\n      } catch (error) {\n        status.textContent = \"Import failed\";\n      } finally {\n        event.target.value = \"\";\n      }\n    });\n\n    document.getElementById(\"calendarGrid\").addEventListener(\"click\", (event) => {\n      const cell = event.target.closest(\"[data-date]\");\n      if (!cell) return;\n      selectedDateKey = cell.dataset.date;\n      const selected = dateFromKey(selectedDateKey);\n      viewDate = new Date(selected.getFullYear(), selected.getMonth(), 1);\n      renderCalendar();\n    });\n\n    renderCalendar();\n  <\/script>\n</body>\n</html>\n" }
    };

    const tabs = document.querySelector(".workbook-tabs");
    const frame = document.getElementById("pageFrame");
    let activePage = localStorage.getItem("conglobal-active-page") || "time";

    function resizeFrame() {
      try {
        const doc = frame.contentDocument;
        if (!doc) return;
        frame.style.height = Math.max(
          doc.documentElement.scrollHeight,
          doc.body ? doc.body.scrollHeight : 0,
          window.innerHeight - tabs.offsetHeight
        ) + "px";
      } catch (error) {
        frame.style.height = "calc(100vh - 42px)";
      }
    }

    function selectPage(id) {
      activePage = pages[id] ? id : "time";
      localStorage.setItem("conglobal-active-page", activePage);
      document.querySelectorAll(".workbook-tabs button").forEach((button) => {
        button.classList.toggle("active", button.dataset.page === activePage);
      });
      frame.srcdoc = pages[activePage].html;
    }

    Object.entries(pages).forEach(([id, page]) => {
      const button = document.createElement("button");
      button.type = "button";
      button.dataset.page = id;
      button.textContent = page.label;
      button.addEventListener("click", () => selectPage(id));
      tabs.appendChild(button);
    });

    frame.addEventListener("load", () => {
      resizeFrame();
      const doc = frame.contentDocument;
      if (!doc) return;
      doc.addEventListener("input", () => setTimeout(resizeFrame, 0));
      doc.addEventListener("click", () => setTimeout(resizeFrame, 0));
      setTimeout(resizeFrame, 100);
    });
    window.addEventListener("resize", resizeFrame);
    selectPage(activePage);
  </script>
</body>
