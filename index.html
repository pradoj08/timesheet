e()\n        .replace(/[,.]/g, \" \")\n        .replace(/\\bcontrerras\\b/g, \"contreras\")\n        .replace(/\\s+/g, \" \")\n        .split(\" \")\n        .filter((part) => part && !suffixes.has(part))\n        .sort()\n        .join(\" \");\n    }\n\n    function readRosterAdditions() {\n      try {\n        const additions = JSON.parse(localStorage.getItem(rosterAdditionsKey) || \"[]\");\n        return Array.isArray(additions) ? additions : [];\n      } catch (error) {\n        localStorage.removeItem(rosterAdditionsKey);\n        return [];\n      }\n    }\n\n    function rosterNameSet() {\n      return new Set(Array.from(document.querySelectorAll('table[data-roster] tbody .name'))\n        .map((cell) => normalizeRosterName(cell.textContent)));\n    }\n\n    function escapeHtml(value) {\n      return String(value).replace(/[&<>\"']/g, (char) => ({\n        \"&\": \"&amp;\",\n        \"<\": \"&lt;\",\n        \">\": \"&gt;\",\n        '\"': \"&quot;\",\n        \"'\": \"&#39;\"\n      }[char]));\n    }\n\n    function setShiftTitleCount(title, count, table) {\n      if (!title) return;\n      if (!title.dataset.label) {\n        title.dataset.label = title.textContent.replace(/\\s*\\[\\d+\\]/, \"\").replace(/\\s+/g, \" \").trim();\n      }\n\n      const headerLabel = table ? table.querySelector(\".section-head-label\") : null;\n      if (!headerLabel) return;\n      headerLabel.innerHTML = `\n        <span class=\"table-shift-title\">\n          <span>${escapeHtml(title.dataset.label)}</span>\n          <span class=\"staff-badge\">${count} staff</span>\n        </span>\n      `;\n    }\n\n    function updateTitleCount(form) {\n      const table = document.querySelector(`table[data-roster=\"${form.dataset.target}\"]`);\n      if (table) updateSectionCount(table);\n    }\n\n    function updateDailyTotals(table, offDays) {\n      const totals = table.querySelectorAll(\"tfoot .total-number\");\n      totals.forEach((cell, index) => {\n        if (!offDays.has(String(index))) {\n          cell.textContent = String(Number(cell.textContent) + 1);\n        }\n      });\n    }\n\n    function recalcDailyTotals(table) {\n      const totals = table.querySelectorAll(\"tfoot .total-number\");\n      totals.forEach((total, index) => {\n        const workCount = Array.from(table.querySelectorAll(\"tbody tr\")).filter((row) => {\n          const cell = row.children[index + 1];\n          return cell && cell.textContent.trim().toUpperCase() === \"W\";\n        }).length;\n        total.textContent = String(workCount);\n      });\n    }\n\n    function setSideTotal(labelText, value) {\n      const labels = Array.from(document.querySelectorAll(\".total-box .label\"));\n      const label = labels.find((item) => item.textContent.trim() === labelText);\n      if (!label || !label.nextElementSibling) return;\n      label.nextElementSibling.textContent = String(value);\n    }\n\n    function updateSideTotal(labelText, amount = 1) {\n      if (!labelText) return;\n      const labels = Array.from(document.querySelectorAll(\".total-box .label\"));\n      const label = labels.find((item) => item.textContent.trim() === labelText);\n      if (!label || !label.nextElementSibling) return;\n      label.nextElementSibling.textContent = String(Number(label.nextElementSibling.textContent) + amount);\n    }\n\n    function rowToData(row) {\n      const nameCell = row.querySelector(\".name\");\n      const role = [\"side\", \"crane\", \"everything\", \"lead\"].find((className) => nameCell.classList.contains(className)) || \"\";\n      return {\n        name: nameCell.textContent.trim(),\n        role,\n        days: Array.from(row.children).slice(1, 8).map((cell) => cell.textContent.trim().toUpperCase() === \"O\" ? \"O\" : \"W\")\n      };\n    }\n\n    function dataToRow(employee) {\n      const row = document.createElement(\"tr\");\n      const nameCell = document.createElement(\"td\");\n      nameCell.className = `name${employee.role ? ` ${employee.role}` : \"\"}`;\n      nameCell.textContent = employee.name;\n      row.appendChild(nameCell);\n\n      const days = Array.isArray(employee.days) ? employee.days : [\"W\", \"W\", \"W\", \"W\", \"W\", \"W\", \"W\"];\n      days.forEach((day) => {\n        const cell = document.createElement(\"td\");\n        const isOff = day === \"O\";\n        cell.className = isOff ? \"o\" : \"w\";\n        cell.textContent = isOff ? \"O\" : \"W\";\n        row.appendChild(cell);\n      });\n\n      addActionsToRow(row);\n      return row;\n    }\n\n    function captureRosterState() {\n      const state = {};\n      document.querySelectorAll(\"table[data-roster]\").forEach((table) => {\n        state[table.dataset.roster] = Array.from(table.querySelectorAll(\"tbody tr\")).map(rowToData);\n      });\n      return state;\n    }\n\n    function saveRosterState() {\n      localStorage.setItem(rosterStorageKey, JSON.stringify(captureRosterState()));\n    }\n\n    function updateSectionCount(table) {\n      const rosterId = table.dataset.roster;\n      const form = document.querySelector(`.add-row[data-target=\"${rosterId}\"]`);\n      const title = form ? form.previousElementSibling : null;\n      if (!title) return;\n      const count = table.querySelectorAll(\"tbody tr\").length;\n      setShiftTitleCount(title, count, table);\n    }\n\n    function refreshRosterNumbers() {\n      const rampCount = [\"first\", \"second\"].reduce((total, rosterId) => {\n        const table = document.querySelector(`table[data-roster=\"${rosterId}\"]`);\n        return total + (table ? table.querySelectorAll(\"tbody tr\").length : 0);\n      }, 0);\n      const gateTable = document.querySelector('table[data-roster=\"gate\"]');\n      const mechTable = document.querySelector('table[data-roster=\"mechanics\"]');\n\n      setSideTotal(\"RAMP TOTAL\", rampCount);\n      setSideTotal(\"GATE TOTAL\", gateTable ? gateTable.querySelectorAll(\"tbody tr\").length : 0);\n      setSideTotal(\"MECH TOTAL\", mechTable ? mechTable.querySelectorAll(\"tbody tr\").length : 0);\n\n      document.querySelectorAll(\"table[data-roster]\").forEach((table) => {\n        updateSectionCount(table);\n        recalcDailyTotals(table);\n      });\n    }\n\n    function migrateMcDanielToDays(state) {\n      if (!state || !Array.isArray(state.second)) return state;\n      if (!Array.isArray(state.first)) state.first = [];\n\n      const alreadyOnDays = state.first.some((employee) => normalizeRosterName(employee.name) === \"charles mcdaniel\");\n      const secondIndex = state.second.findIndex((employee) => normalizeRosterName(employee.name) === \"charles mcdaniel\");\n      if (secondIndex === -1) return state;\n\n      const [employee] = state.second.splice(secondIndex, 1);\n      if (!alreadyOnDays) state.first.push(employee);\n      localStorage.setItem(rosterStorageKey, JSON.stringify(state));\n      return state;\n    }\n\n    function loadRosterState() {\n      const saved = localStorage.getItem(rosterStorageKey);\n      if (!saved) return;\n\n      try {\n        const state = migrateMcDanielToDays(JSON.parse(saved));\n        Object.entries(state).forEach(([rosterId, employees]) => {\n          const table = document.querySelector(`table[data-roster=\"${rosterId}\"]`);\n          if (!table || !Array.isArray(employees)) return;\n\n          const body = table.querySelector(\"tbody\");\n          body.innerHTML = \"\";\n          employees.forEach((employee) => {\n            if (!employee || !employee.name || !Array.isArray(employee.days)) return;\n            body.appendChild(dataToRow(employee));\n          });\n        });\n        refreshRosterNumbers();\n      } catch (error) {\n        localStorage.removeItem(rosterStorageKey);\n      }\n    }\n\n    function applyPendingRosterAdditions() {\n      const additions = readRosterAdditions();\n      if (!additions.length) return;\n\n      const existing = rosterNameSet();\n      let added = 0;\n      additions.forEach((addition) => {\n        if (!addition || !addition.name) return;\n        const rosterId = addition.shift || \"first\";\n        const table = document.querySelector(`table[data-roster=\"${rosterId}\"]`);\n        const key = normalizeRosterName(addition.name);\n        if (!table || !key || existing.has(key)) return;\n\n        table.querySelector(\"tbody\").appendChild(dataToRow({\n          name: addition.name,\n          role: addition.role || \"\",\n          days: Array.isArray(addition.days) ? addition.days : [\"W\", \"W\", \"W\", \"W\", \"W\", \"W\", \"W\"]\n        }));\n        existing.add(key);\n        added += 1;\n      });\n\n      if (added) {\n        refreshRosterNumbers();\n        saveRosterState();\n      }\n      localStorage.removeItem(rosterAdditionsKey);\n    }\n\n    function addRosterRow(event) {\n      event.preventDefault();\n\n      const form = event.currentTarget;\n      const nameInput = form.elements.employee;\n      const employeeName = nameInput.value.trim();\n      if (!employeeName) return;\n\n      const rosterId = form.dataset.target;\n      const table = document.querySelector(`table[data-roster=\"${rosterId}\"]`);\n      const body = table.querySelector(\"tbody\");\n      const offDays = new Set(Array.from(form.querySelectorAll('input[name=\"off\"]:checked')).map((input) => input.value));\n      const role = form.elements.role.value;\n\n      const row = document.createElement(\"tr\");\n      const nameCell = document.createElement(\"td\");\n      nameCell.className = `name${role ? ` ${role}` : \"\"}`;\n      nameCell.textContent = employeeName;\n      row.appendChild(nameCell);\n\n      for (let day = 0; day < 7; day += 1) {\n        const cell = document.createElement(\"td\");\n        const isOff = offDays.has(String(day));\n        cell.className = isOff ? \"o\" : \"w\";\n        cell.textContent = isOff ? \"O\" : \"W\";\n        row.appendChild(cell);\n      }\n\n      addActionsToRow(row);\n      body.appendChild(row);\n      updateTitleCount(form, 1);\n      updateDailyTotals(table, offDays);\n      updateSideTotal(sectionTotals[rosterId]);\n      saveRosterState();\n      form.reset();\n      nameInput.focus();\n    }\n\n    function addActionsToTable(table) {\n      const headRow = table.querySelector(\"thead tr\");\n      const footerRow = table.querySelector(\"tfoot tr\");\n      const colgroup = table.querySelector(\"colgroup\");\n\n      if (colgroup && !colgroup.querySelector(\"col.actions\")) {\n        const col = document.createElement(\"col\");\n        col.className = \"actions\";\n        colgroup.appendChild(col);\n      }\n\n      if (headRow && !headRow.querySelector(\".action-head\")) {\n        const actionHead = document.createElement(\"th\");\n        actionHead.className = \"action-head\";\n        actionHead.textContent = \"Options\";\n        headRow.appendChild(actionHead);\n      }\n\n      if (footerRow && !footerRow.querySelector(\".actions-total\")) {\n        const actionTotal = document.createElement(\"td\");\n        actionTotal.className = \"actions-total\";\n        footerRow.appendChild(actionTotal);\n      }\n\n      table.querySelectorAll(\".employee-head, .day-head\").forEach((header, index) => {\n        const filter = header.querySelector(\".filter\");\n        if (!filter) return;\n        filter.setAttribute(\"role\", \"button\");\n        filter.setAttribute(\"tabindex\", \"0\");\n        filter.setAttribute(\"aria-label\", `Sort ${header.textContent.trim()}`);\n        filter.dataset.sortIndex = String(index);\n        filter.dataset.sortDirection = filter.dataset.sortDirection || \"asc\";\n      });\n\n      table.querySelectorAll(\"tbody tr\").forEach(addActionsToRow);\n    }\n\n    function addActionsToRow(row) {\n      if (row.querySelector(\".actions\")) return;\n\n      const cell = document.createElement(\"td\");\n      cell.className = \"actions\";\n      cell.innerHTML = `<button type=\"button\" class=\"row-action edit\" aria-label=\"Edit row\" title=\"Edit row\">${pencilIcon()}</button><button type=\"button\" class=\"row-action delete\" aria-label=\"Delete employee\" title=\"Delete employee\">${trashIcon()}</button>`;\n      row.appendChild(cell);\n    }\n\n    let rowBeingEdited = null;\n\n    function pencilIcon() {\n      return '<svg viewBox=\"0 0 24 24\" aria-hidden=\"true\"><path d=\"M12 20h9\" /><path d=\"M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z\" /></svg>';\n    }\n\n    function trashIcon() {\n      return '<svg viewBox=\"0 0 24 24\" aria-hidden=\"true\"><path d=\"M3 6h18\" /><path d=\"M8 6V4h8v2\" /><path d=\"M19 6l-1 15H6L5 6\" /><path d=\"M10 11v6\" /><path d=\"M14 11v6\" /></svg>';\n    }\n\n    function setEditButton(row, isEditing) {\n      const button = row.querySelector(\".row-action.edit\");\n      if (!button) return;\n      button.classList.toggle(\"saving\", isEditing);\n      button.innerHTML = isEditing ? \"Save\" : pencilIcon();\n      button.setAttribute(\"aria-label\", isEditing ? \"Save row changes\" : \"Edit row\");\n      button.setAttribute(\"title\", isEditing ? \"Save row changes\" : \"Edit row\");\n    }\n\n    function stopOffDayEditing() {\n      if (!rowBeingEdited) return;\n      const nameCell = rowBeingEdited.querySelector(\".name\");\n      if (nameCell) {\n        nameCell.textContent = nameCell.textContent.replace(/\\s+/g, \" \").trim();\n        nameCell.contentEditable = \"false\";\n      }\n      rowBeingEdited.classList.remove(\"editing-off\");\n      setEditButton(rowBeingEdited, false);\n      recalcDailyTotals(rowBeingEdited.closest(\"table\"));\n      saveRosterState();\n      rowBeingEdited = null;\n    }\n\n    function startOffDayEditing(row) {\n      if (rowBeingEdited && rowBeingEdited !== row) {\n        stopOffDayEditing();\n      }\n\n      rowBeingEdited = row;\n      row.classList.add(\"editing-off\");\n      const nameCell = row.querySelector(\".name\");\n      if (nameCell) {\n        nameCell.contentEditable = \"plaintext-only\";\n        nameCell.focus();\n        const selection = window.getSelection();\n        const range = document.createRange();\n        range.selectNodeContents(nameCell);\n        range.collapse(false);\n        selection.removeAllRanges();\n        selection.addRange(range);\n      }\n      setEditButton(row, true);\n    }\n\n    function toggleOffDayCell(cell) {\n      const isOff = cell.textContent.trim().toUpperCase() === \"O\";\n      cell.className = isOff ? \"w\" : \"o\";\n      cell.textContent = isOff ? \"W\" : \"O\";\n      recalcDailyTotals(cell.closest(\"table\"));\n    }\n\n    function deleteEmployee(row) {\n      const table = row.closest(\"table\");\n      const rosterId = table.dataset.roster;\n      const form = document.querySelector(`.add-row[data-target=\"${rosterId}\"]`);\n\n      row.remove();\n      if (form) updateTitleCount(form, -1);\n      recalcDailyTotals(table);\n      updateSideTotal(sectionTotals[rosterId], -1);\n      saveRosterState();\n    }\n\n    function clearDeleteConfirm(exceptButton) {\n      document.querySelectorAll(\".row-action.confirm-delete\").forEach((button) => {\n        if (button === exceptButton) return;\n        button.classList.remove(\"confirm-delete\");\n        button.innerHTML = trashIcon();\n        button.setAttribute(\"aria-label\", \"Delete employee\");\n        button.setAttribute(\"title\", \"Delete employee\");\n      });\n    }\n\n    function clearSortIndicators(table, activeFilter) {\n      table.querySelectorAll(\".filter\").forEach((filter) => {\n        if (filter === activeFilter) return;\n        filter.classList.remove(\"active\", \"desc\");\n        filter.dataset.sortDirection = \"asc\";\n      });\n    }\n\n    function sortRosterTable(table, columnIndex, direction, activeFilter) {\n      if (rowBeingEdited) stopOffDayEditing();\n\n      const multiplier = direction === \"desc\" ? -1 : 1;\n      const body = table.querySelector(\"tbody\");\n      const rows = Array.from(body.querySelectorAll(\"tr\"));\n      rows.sort((a, b) => {\n        if (columnIndex === 0) {\n          return a.querySelector(\".name\").textContent.trim().localeCompare(b.querySelector(\".name\").textContent.trim()) * multiplier;\n        }\n\n        const aValue = a.children[columnIndex]?.textContent.trim().toUpperCase() || \"\";\n        const bValue = b.children[columnIndex]?.textContent.trim().toUpperCase() || \"\";\n        if (aValue !== bValue) return aValue.localeCompare(bValue) * multiplier;\n        return a.querySelector(\".name\").textContent.trim().localeCompare(b.querySelector(\".name\").textContent.trim());\n      });\n\n      rows.forEach((row) => body.appendChild(row));\n      clearSortIndicators(table, activeFilter);\n      activeFilter.classList.add(\"active\");\n      activeFilter.classList.toggle(\"desc\", direction === \"desc\");\n      activeFilter.dataset.sortDirection = direction === \"asc\" ? \"desc\" : \"asc\";\n      recalcDailyTotals(table);\n      saveRosterState();\n    }\n\n    function handleSortFilter(filter) {\n      const table = filter.closest(\"table\");\n      if (!table) return;\n      const columnIndex = Number(filter.dataset.sortIndex || 0);\n      const direction = filter.dataset.sortDirection === \"desc\" ? \"desc\" : \"asc\";\n      sortRosterTable(table, columnIndex, direction, filter);\n    }\n\n    document.addEventListener(\"click\", (event) => {\n      const sortFilter = event.target.closest(\".filter\");\n      if (sortFilter) {\n        event.preventDefault();\n        handleSortFilter(sortFilter);\n        return;\n      }\n\n      const editableCell = event.target.closest(\"td.w, td.o\");\n      if (editableCell && rowBeingEdited && editableCell.parentElement === rowBeingEdited) {\n        event.preventDefault();\n        toggleOffDayCell(editableCell);\n        return;\n      }\n\n      const button = event.target.closest(\".row-action\");\n      if (!button) {\n        clearDeleteConfirm();\n        return;\n      }\n\n      const row = button.closest(\"tr\");\n      if (button.classList.contains(\"delete\")) {\n        if (button.classList.contains(\"confirm-delete\")) {\n          if (rowBeingEdited === row) rowBeingEdited = null;\n          deleteEmployee(row);\n          return;\n        }\n\n        clearDeleteConfirm(button);\n        button.classList.add(\"confirm-delete\");\n        button.textContent = \"OK?\";\n        button.setAttribute(\"aria-label\", \"Confirm delete employee\");\n        button.setAttribute(\"title\", \"Confirm delete employee\");\n        return;\n      }\n\n      clearDeleteConfirm();\n      if (rowBeingEdited === row) {\n        stopOffDayEditing();\n        return;\n      }\n\n      startOffDayEditing(row);\n    });\n\n    document.addEventListener(\"keydown\", (event) => {\n      const sortFilter = event.target.closest(\".filter\");\n      if (!sortFilter || ![\"Enter\", \" \"].includes(event.key)) return;\n      event.preventDefault();\n      handleSortFilter(sortFilter);\n    });\n\n    document.addEventListener(\"input\", (event) => {\n      const nameCell = event.target.closest(\"tr.editing-off .name\");\n      if (!nameCell) return;\n      saveRosterState();\n    });\n\n    document.addEventListener(\"keydown\", (event) => {\n      const nameCell = event.target.closest(\"tr.editing-off .name\");\n      if (!nameCell) return;\n      if (event.key === \"Enter\") {\n        event.preventDefault();\n        stopOffDayEditing();\n      }\n    });\n\n    document.querySelectorAll(\".add-row\").forEach((form) => {\n      form.addEventListener(\"submit\", addRosterRow);\n    });\n\n    document.querySelectorAll(\"table[data-roster]\").forEach(addActionsToTable);\n    loadRosterState();\n    applyPendingRosterAdditions();\n    refreshRosterNumbers();\n  <\/script>\n</body>\n</html>\n" },
      "dayforce": { label: "Dayforce", html: "﻿<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n  <meta charset=\"UTF-8\" />\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" />\n  <title>Dayforce Import</title>\n  <style>\n    * {\n      box-sizing: border-box;\n    }\n\n    body {\n      margin: 0;\n      overflow-x: hidden;\n      background: #fff;\n      color: #000;\n      font-family: Arial, Helvetica, sans-serif;\n      font-size: 14px;\n    }\n\n    .page-switcher {\n      width: 100%;\n      display: flex;\n      gap: 4px;\n      align-items: center;\n      padding: 6px 8px;\n      background: #111;\n      border-bottom: 2px solid #000;\n    }\n\n    .page-switcher a {\n      min-width: 118px;\n      height: 28px;\n      display: inline-flex;\n      align-items: center;\n      justify-content: center;\n      border: 1px solid #777;\n      background: #e7e6e6;\n      color: #000;\n      text-decoration: none;\n      font-size: 13px;\n      font-weight: 800;\n    }\n\n    .page-switcher a.active {\n      background: #ffff00;\n      border-color: #ffff00;\n    }\n\n    .sheet {\n      width: 100%;\n      max-width: 1180px;\n      padding-bottom: 32px;\n    }\n\n    .masthead {\n      height: 58px;\n      display: grid;\n      grid-template-columns: 1fr auto;\n      align-items: center;\n      padding: 0 6px;\n      background: #d9e8f7;\n      border-bottom: 2px solid #000;\n    }\n\n    h1 {\n      margin: 0;\n      font-size: 24px;\n      line-height: 1;\n    }\n\n    .status {\n      font-weight: 900;\n      color: #004a64;\n    }\n\n    .import-panel {\n      display: grid;\n      grid-template-columns: minmax(260px, 1fr) 220px;\n      gap: 10px;\n      padding: 10px 6px;\n      border-bottom: 2px solid #000;\n      background: #f3f6fb;\n    }\n\n    .push-notice {\n      margin: 0;\n      padding: 9px 12px;\n      border-bottom: 2px solid #000;\n      background: #c00000;\n      color: #fff;\n      font-size: 14px;\n      font-weight ;\n    const previousTimesheetPreviewBody = document.getElementById(\"previousTimesheetPreviewBody\");\n    const clearSplit = document.getElementById(\"clearSplit\");\n    const clearDefaultButton = document.getElementById(\"clearDefaultButton\");\n    const clearMenuButton = document.getElementById(\"clearMenuButton\");\n    const clearMenu = document.getElementById(\"clearMenu\");\n    const shiftLabels = {\n      first: \"1st Shift\",\n      second: \"2ND SHIFT\",\n      gate: \"Gate\",\n      mechanics: \"Mechanics\",\n      managers: \"Managers\",\n      unmatched: \"Not On Roster\"\n    };\n    const rosterShiftKeys = [\"first\", \"second\", \"gate\", \"mechanics\", \"managers\"];\n    const defaultRoster = {\n      first: [\n        [\"Branford Alton\", \"Mon, Tues\"],\n        [\"Castruita Armando\", \"Wed, Thurs\"],\n        [\"Frazer Dacoyea\", \"Mon, Tues\"],\n        [\"Citizen Dante\", \"Thurs, Fri\"],\n        [\"Towler Demetrius\", \"Thurs, Fri\"],\n        [\"Stewart Dexter\", \"Sat, Sun\"],\n        [\"Gardner Dorrean\", \"Tues, Wed\"],\n        [\"Thomas Henry\", \"Sat, Sun\"],\n        [\"Brown James\", \"Thurs, Fri\"],\n        [\"Herrera Jose\", \"Sat, Sun\"],\n        [\"Player Keyston\", \"Mon, Sun\"],\n        [\"Hickman Makia\", \"Mon, Sun\"],\n        [\"Dever Mikey\", \"Tues, Wed\"],\n        [\"Wanza Myles\", \"Mon, Tues\"],\n        [\"Romero Nelson\", \"Tues, Wed\"],\n        [\"McDaniel Charles\", \"Fri, Sat\"],\n        [\"Nava Ramon\", \"Sat, Sun\"],\n        [\"Tran Tyler\", \"Thurs, Fri\"]\n      ],\n      second: [\n        [\"Carruthers Timothy\", \"Mon, Sun\"],\n        [\"Caceres Virula Victor\", \"Mon, Tues\"],\n        [\"Keme Aweri Jr.\", \"Mon, Tues\"],\n        [\"Hosey Kevin\", \"Mon, Tues\"],\n        [\"Brown Brandy\", \"Wed, Thurs\"],\n        [\"Mejia Aaron\", \"Thurs, Fri\"],\n        [\"Bookman Derrell\", \"Thurs, Fri\"],\n        [\"Hopkins Alexander\", \"Mon, Sun\"],\n        [\"Tingle Jason\", \"Sat, Sun\"],\n        [\"Contreras Marco\", \"Sat, Sun\"],\n        [\"Benavides Robert\", \"Wed, Sun\"],\n        [\"Urtado Ernest\", \"Tues, Wed\"],\n        [\"Johnson Messiah\", \"Tues, Thurs\"],\n        [\"Gilder Rufus II\", \"Tues, Wed\"],\n        [\"Echendu Chimenierm\", \"Wed, Thurs\"],\n        [\"Delgado Jose\", \"Fri, Sat\"]\n      ],\n      gate: [\n        [\"Candace Warren\", \"Sat, Sun\"],\n        [\"Connie Johnson\", \"Sat, Sun\"],\n        [\"Jarade Douglas\", \"Sat, Sun\"],\n        [\"Gregory Watson II\", \"Sat, Sun\"],\n        [\"Bryce Alexander\", \"Thurs, Fri\"],\n        [\"Naomisha Hunt\", \"Thurs, Fri, Sat\"],\n        [\"Ramacacondra Pratt\", \"Thurs, Fri\"],\n        [\"Kane Cabral\", \"Mon, Tues\"],\n        [\"Tavares Gariet\", \"Mon, Tues\"]\n      ],\n      mechanics: [],\n      managers: []\n    };\n\n    function hasPreviewRecords() {\n      return Boolean(previewBody.querySelector(\"tr.record-row\"));\n    }\n\n    function updatePushNotice() {\n      const show = localStorage.getItem(pendingPushKey) === \"1\" && hasPreviewRecords();\n      pushNotice.hidden = !show;\n      saveButton.classList.toggle(\"pending-push\", show);\n    }\n\n    function setPendingPush(value) {\n      if (value && hasPreviewRecords()) {\n        localStorage.setItem(pendingPushKey, \"1\");\n      } else {\n        localStorage.removeItem(pendingPushKey);\n      }\n      updatePushNotice();\n    }\n\n    function normalizeName(name) {\n      const suffixes = new Set([\"jr\", \"sr\", \"ii\", \"iii\", \"iv\"]);\n      return String(name || \"\")\n        .trim()\n        .toLowerCase()\n        .replace(/[,.]/g, \" \")\n        .replace(/\\bcontrerras\\b/g, \"contreras\")\n        .replace(/\\bdemeatrius\\b/g, \"demetrius\")\n        .replace(/\\btowner\\b/g, \"towler\")\n        .replace(/\\s+/g, \" \")\n        .split(\" \")\n        .filter((part) => part && !suffixes.has(part))\n        .sort()\n        .join(\" \");\n    }\n\n    function defaultRosterRows() {\n      return Object.entries(defaultRoster).flatMap(([shift, rows]) => (\n        rows.map(([name]) => ({ name, shift }))\n      ));\n    }\n\n    function savedRosterRows(roster) {\n      return rosterShiftKeys.flatMap((shift) => (\n        Array.isArray(roster[shift])\n          ? roster[shift].filter((employee) => employee && employee.name).map((employee) => ({ name: employee.name, shift }))\n          : []\n      ));\n    }\n\n    function hasSavedRosterRows(roster) {\n      return rosterShiftKeys.some((shift) => Array.isArray(roster[shift]) && roster[shift].length);\n    }\n\n    function buildRosterRows() {\n      const rows = [];\n      const seen = new Set();\n      const addRows = (items) => {\n        items.forEach((employee) => {\n          const key = normalizeName(employee.name);\n          if (!key || seen.has(key)) return;\n          seen.add(key);\n          rows.push(employee);\n        });\n      };\n\n      try {\n        const roster = JSON.parse(localStorage.getItem(rosterStorageKey) || \"{}\");\n        addRows(hasSavedRosterRows(roster) ? savedRosterRows(roster) : defaultRosterRows());\n        const additions = JSON.parse(localStorage.getItem(rosterAdditionsKey) || \"[]\");\n        if (Array.isArray(additions)) {\n          addRows(additions.filter((employee) => employee && employee.name).map((employee) => ({\n            name: employee.name,\n            shift: employee.shift || \"first\"\n          })));\n        }\n      } catch (error) {\n        addRows(defaultRosterRows());\n      }\n\n      if (!rows.length) addRows(defaultRosterRows());\n      return rows;\n    }\n\n    function rosterNames() {\n      return buildRosterRows().map((employee) => employee.name);\n    }\n\n    function rosterLookup() {\n      const lookup = new Map();\n      buildRosterRows().forEach((employee) => {\n        lookup.set(normalizeName(employee.name), { name: employee.name, shift: employee.shift || \"first\" });\n      });\n      return lookup;\n    }\n\n    function payrollDateFromRows(rows) {\n      for (const row of rows.slice(0, 12)) {\n        for (const cell of row) {\n          const text = String(cell || \"\").trim();\n          const match = text.match(/\\bdate\\s*:\\s*([0-9]{1,2}\\/[0-9]{1,2}\\/[0-9]{2,4})/i);\n          if (match) return match[1];\n        }\n      }\n      return new Date().toLocaleDateString();\n    }\n\n    function cleanPayrollEmployeeName(value) {\n      return cleanDayforceEmployeeName(value)\n        .replace(/\\s+\\d{4,}\\s*$/, \"\")\n        .trim();\n    }\n\n    function payrollDisplayName(value) {\n      return displayNameFromDayforce(cleanPayrollEmployeeName(value));\n    }\n\n    function payrollHours(value) {\n      const text = String(value || \"\").trim();\n      if (!text) return 0;\n      if (/^(x|yes|y|true)$/i.test(text)) return 8;\n\n      const timeMatch = text.match(/^(\\d{1,2}):(\\d{2})$/);\n      if (timeMatch) return Number(timeMatch[1]) + (Number(timeMatch[2]) / 60);\n\n      const numberMatch = text.match(/-?\\d+(\\.\\d+)?/);\n      if (!numberMatch) return 0;\n      return Math.max(0, Number(numberMatch[0]) || 0);\n    }\n\n    function titleCaseReason(value) {\n      return String(value || \"\")\n        .toLowerCase()\n        .replace(/\\b\\w/g, (char) => char.toUpperCase())\n        .replace(/\\bPto\\b/g, \"PTO\");\n    }\n\n    function absenceReasonFromHeader(header) {\n      const text = String(header || \"\").replace(/\\s+/g, \" \").trim();\n      const normalized = text.toLowerCase();\n      if (!normalized || /^total\\b/.test(normalized) || normalized.includes(\"total overtime\")) return \"\";\n      if (normalized.includes(\"business day off\") && normalized.includes(\"unpaid\")) return \"Business Day Off - Unpaid\";\n      if (normalized.includes(\"floating holiday\") || /\\bfloat\\b/.test(normalized)) return \"Floating Holiday\";\n      if (normalized.includes(\"vacation\")) return \"Vacation\";\n      if (normalized.includes(\"sick\")) return \"Sick\";\n      if (normalized.includes(\"holiday\")) return \"Holiday\";\n      if (normalized.includes(\"pto\")) return \"PTO\";\n      if (normalized.includes(\"personal\")) return \"Personal Day\";\n      if (normalized.includes(\"bereavement\")) return \"Bereavement\";\n      if (normalized.includes(\"jury\")) return \"Jury Duty\";\n      if (normalized.includes(\"leave\")) return \"Leave\";\n      if (normalized.includes(\"day off\") || normalized.includes(\"off day\")) return titleCaseReason(text);\n      if (normalized.includes(\"unpaid\") || normalized.includes(\"without pay\")) return titleCaseReason(text);\n      return \"\";\n    }\n\n    function isUnpaidReason(reason) {\n      return /\\bunpaid\\b|without pay/i.test(reason);\n    }\n\n    function minutesFromMilitary(value) {\n      const match = String(value || \"\").match(/^(\\d{1,2})(\\d{2})$/);\n      if (!match) return 0;\n      return (Number(match[1]) * 60) + Number(match[2]);\n    }\n\n    function militaryFromMinutes(value) {\n      const minutes = ((Math.round(value) % 1440) + 1440) % 1440;\n      const hours = Math.floor(minutes / 60);\n      const mins = minutes % 60;\n      return `${String(hours).padStart(2, \"0\")}${String(mins).padStart(2, \"0\")}`;\n    }\n\n    function shiftStartForEmployee(name) {\n      const names = rosterNames();\n      const match = matchRosterName(name, names);\n      const lookup = rosterLookup();\n      const canonical = match.suggestion || name;\n      const shift = lookup.get(normalizeName(canonical))?.shift || \"\";\n      if (shift === \"second\") return \"1500\";\n      if (shift === \"gate\" || shift === \"mechanics\") return \"0600\";\n      return \"0300\";\n    }\n\n    function endFromStartAndHours(start, hours) {\n      return militaryFromMinutes(minutesFromMilitary(start) + (Number(hours || 0) * 60));\n    }\n\n    function editDistance(a, b) {\n      const dp = Array.from({ length: a.length + 1 }, () => Array(b.length + 1).fill(0));\n      for (let i = 0; i <= a.length; i += 1) dp[i][0] = i;\n      for (let j = 0; j <= b.length; j += 1) dp[0][j] = j;\n      for (let i = 1; i <= a.length; i += 1) {\n        for (let j = 1; j <= b.length; j += 1) {\n          const cost = a[i - 1] === b[j - 1] ? 0 : 1;\n          dp[i][j] = Math.min(dp[i - 1][j] + 1, dp[i][j - 1] + 1, dp[i - 1][j - 1] + cost);\n        }\n      }\n      return dp[a.length][b.length];\n    }\n\n    function matchRosterName(name, names) {\n      const normalized = normalizeName(name);\n      const exact = names.find((candidate) => normalizeName(candidate) === normalized);\n      if (exact) return { found: true, suggestion: exact, hasSuggestion: true, score: 0 };\n\n      const scored = names\n        .map((candidate) => ({ candidate, score: editDistance(normalized, normalizeName(candidate)) }))\n        .sort((a, b) => a.score - b.score);\n      const best = scored[0] || null;\n      const suggestionLimit = Math.max(2, Math.ceil(normalized.length * 0.35));\n      return {\n        found: false,\n        suggestion: best ? best.candidate : \"\",\n        hasSuggestion: Boolean(best && best.score <= suggestionLimit),\n        score: best ? best.score : Infinity\n      };\n    }\n\n    function cleanDayforceEmployeeName(value) {\n      return String(value)\n        .replace(/^employee\\s*:?\\s*/i, \"\")\n        .replace(/\\s+\\d{4,}\\s*$/, \"\")\n        .trim();\n    }\n\n    function displayNameFromDayforce(value) {\n      const cleaned = cleanDayforceEmployeeName(value);\n      if (!cleaned.includes(\",\")) return cleaned;\n\n      const [last, first] = cleaned.split(\",\").map((part) => part.trim());\n      return `${first} ${last}`.replace(/\\s+/g, \" \").trim();\n    }\n\n    function normalizePreviousTimesheetName(name) {\n      return normalizeName(String(name || \"\").replace(/\\s+\\d{4,}\\s*$/, \"\"));\n    }\n\n    function previousTimesheetImport() {\n      try {\n        const saved = JSON.parse(localStorage.getItem(previousTimesheetStorageKey) || \"null\");\n        return saved && typeof saved.hours === \"number\" ? saved : null;\n      } catch (error) {\n        localStorage.removeItem(previousTimesheetStorageKey);\n        return null;\n      }\n    }\n\n    function updatePreviousTimesheetStatus() {\n      const imported = previousTimesheetImport();\n      if (!previousTimesheetStatus) return;\n      if (!imported) {\n        previousTimesheetStatus.textContent = \"0.0 HRS\";\n        previousTimesheetStatus.title = \"\";\n        renderPreviousTimesheetPreview([]);\n        return;\n      }\n\n      const rowsText = imported.rows ? ` / ${imported.rows} ROWS` : \"\";\n      previousTimesheetStatus.textContent = `${Number(imported.hours || 0).toFixed(1)} HRS${rowsText}`;\n      previousTimesheetStatus.title = imported.fileName ? `Imported from ${imported.fileName}` : \"\";\n      renderPreviousTimesheetPreview(Array.isArray(imported.records) ? imported.records : []);\n    }\n\n    function renderPreviousTimesheetPreview(records) {\n      if (!previousTimesheetPreview || !previousTimesheetPreviewBody) return;\n      previousTimesheetPreview.hidden = !records.length;\n      previousTimesheetPreviewCount.textContent = `${records.length} ${records.length === 1 ? \"row\" : \"rows\"}`;\n      previousTimesheetPreviewBody.innerHTML = records.length ? [\n        `<tr class=\"shift-group-row previous-shift-group-row\"><td colspan=\"6\">PREV 2ND SHIFT<span class=\"shift-group-count\">${records.length} ${records.length === 1 ? \"record\" : \"records\"}</span></td></tr>`,\n        ...records.map((record) => `\n          <tr>\n            <td class=\"name-cell\">${escapeHtml(record.name || \"\")}</td>\n            <td>${escapeHtml(record.date || \"\")}</td>\n            <td>${escapeHtml(record.start || \"\")}</td>\n            <td>${escapeHtml(record.lunch || \"\")}</td>\n            <td>${escapeHtml(record.end || \"\")}</td>\n            <td><strong>${Number(record.hours || 0).toFixed(1)}</strong></td>\n          </tr>\n        `)\n      ].join(\"\") : \"\";\n    }\n\n    function previousTimesheetEligibleNames() {\n      const lookup = rosterLookup();\n      const names = new Set();\n      lookup.forEach((entry, key) => {\n        if (entry.shift !== \"second\") return;\n        names.add(key);\n      });\n      return names;\n    }\n\n    function previousTimeMinutesFromValue(value) {\n      const text = String(value || \"\").trim();\n      if (!text) return null;\n\n      const meridianMatch = text.match(/^(\\d{1,2}):(\\d{2})\\s*([ap])m$/i);\n      if (meridianMatch) {\n        let hours = Number(meridianMatch[1]);\n        const minutes = Number(meridianMatch[2]);\n        const period = meridianMatch[3].toLowerCase();\n        if (period === \"p\" && hours !== 12) hours += 12;\n        if (period === \"a\" && hours === 12) hours = 0;\n        return (hours * 60) + minutes;\n      }\n\n      const colonMatch = text.match(/^(\\d{1,2}):(\\d{2})$/);\n      if (colonMatch) {\n        const hours = Number(colonMatch[1]);\n        const minutes = Number(colonMatch[2]);\n        if (hours > 24 || minutes > 59 || (hours === 24 && minutes !== 0)) return null;\n        return (hours * 60) + minutes;\n      }\n\n      const militaryMatch = text.match(/^(\\d{1,2})(\\d{2})$/);\n      if (!militaryMatch) return null;\n      const hours = Number(militaryMatch[1]);\n      const minutes = Number(militaryMatch[2]);\n      if (hours > 24 || minutes > 59 || (hours === 24 && minutes !== 0)) return null;\n      return (hours * 60) + minutes;\n    }\n\n    function normalizePreviousHeader(value) {\n      return String(value || \"\").trim().toLowerCase().replace(/\\s+/g, \" \");\n    }\n\n    function previousColumnIndexFor(row, matchers) {\n      return row.findIndex((cell) => {\n        const text = normalizePreviousHeader(cell);\n        return matchers.some((matcher) => matcher.test(text));\n      });\n    }\n\n    function rowLooksLikePreviousTimeHeader(row) {\n      const normalized = row.map(normalizePreviousHeader);\n      return normalized.some((cell) => /\\b(employee|name)\\b/.test(cell))\n        && normalized.some((cell) => /\\bstart\\b/.test(cell))\n        && normalized.some((cell) => /\\bend\\b/.test(cell));\n    }\n\n    function firstPreviousNameLikeCell(row, excludedIndexes = new Set()) {\n      for (let index = 0; index < row.length; index += 1) {\n        if (excludedIndexes.has(index)) continue;\n        const text = String(row[index] || \"\").trim();\n        if (!text || /^\\d+(\\.\\d+)?$/.test(text)) continue;\n        if (previousTimeMinutesFromValue(text) !== null) continue;\n        if (/^(yes|no|\\?\\?|start|end|lunch|actual|note|off days?)$/i.test(text)) continue;\n        if (/\\b(mon|tue|wed|thu|fri|sat|sun|jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)\\b/i.test(text) && /\\d/.test(text)) continue;\n        return text;\n      }\n      return \"\";\n    }\n\n    function previousLunchIntervals(value) {\n      const text = String(value || \"\").trim();\n      if (!text || /^(yes|no|\\?\\?)$/i.test(text)) return [];\n\n      const parts = text.split(/\\s*-\\s*/).map((part) => previousTimeMinutesFromValue(part)).filter((part) => part !== null);\n      if (parts.length < 2) return [];\n\n      let [start, end] = parts;\n      if (end <= start) end += 1440;\n      return [[start, end]];\n    }\n\n    function previousOverlapMinutes(start, end, windowStart, windowEnd) {\n      return Math.max(0, Math.min(end, windowEnd) - Math.max(start, windowStart));\n    }\n\n    function previousWindowMinutesForTimes(startValue, endValue, lunchValue) {\n      let start = previousTimeMinutesFromValue(startValue);\n      let end = previousTimeMinutesFromValue(endValue);\n      if (start === null || end === null) return 0;\n      if (end <= start) end += 1440;\n\n      const windows = [[0, 180], [1440, 1620]];\n      const worked = Math.max(...windows.map(([windowStart, windowEnd]) => previousOverlapMinutes(start, end, windowStart, windowEnd)));\n      if (!worked) return 0;\n\n      const lunch = previousLunchIntervals(lunchValue).reduce((sum, [lunchStart, lunchEnd]) => {\n        const shifted = lunchEnd <= 180 && start >= 720 ? [lunchStart + 1440, lunchEnd + 1440] : [lunchStart, lunchEnd];\n        const lunchOverlap = Math.max(...windows.map(([windowStart, windowEnd]) => previousOverlapMinutes(shifted[0], shifted[1], windowStart, windowEnd)));\n        return sum + lunchOverlap;\n      }, 0);\n\n      return Math.max(0, worked - lunch);\n    }\n\n    function firstPreviousDateLikeCell(row) {\n      const value = row.find((cell) => {\n        const text = String(cell || \"\").trim();\n        return /^(\\d{1,2}\\/\\d{1,2}\\/\\d{2,4})/.test(text)\n          || /^(sun|mon|tue|tues|wed|thu|thur|thurs|fri|sat)[a-z]*\\b/i.test(text);\n      });\n      return String(value || \"\").trim();\n    }\n\n    function previousRecordFromRow(row, indexes, eligibleNames) {\n      const name = indexes.name >= 0 ? String(row[indexes.name] || \"\").trim() : firstPreviousNameLikeCell(row, new Set([indexes.start, indexes.lunch, indexes.end]));\n      if (!name || (eligibleNames.size && !eligibleNames.has(normalizePreviousTimesheetName(name)))) return null;\n\n      const start = indexes.start >= 0 ? String(row[indexes.start] || \"\").trim() : \"\";\n      const lunch = indexes.lunch >= 0 ? String(row[indexes.lunch] || \"\").trim() : \"\";\n      const end = indexes.end >= 0 ? String(row[indexes.end] || \"\").trim() : \"\";\n      const hours = previousWindowMinutesForTimes(start, end, lunch) / 60;\n      if (hours <= 0) return null;\n\n      return {\n        name: displayNameFromDayforce(name),\n        date: indexes.date >= 0 ? String(row[indexes.date] || \"\").trim() : firstPreviousDateLikeCell(row),\n        start,\n        lunch,\n        end,\n        hours\n      };\n    }\n\n    function fallbackPreviousRecordFromRow(row, eligibleNames) {\n      const timeIndexes = [];\n      row.forEach((cell, index) => {\n        if (previousTimeMinutesFromValue(cell) !== null) timeIndexes.push(index);\n      });\n      if (timeIndexes.length < 2) return null;\n\n      const excluded = new Set(timeIndexes);\n      const name = firstPreviousNameLikeCell(row, excluded);\n      if (!name || (eligibleNames.size && !eligibleNames.has(normalizePreviousTimesheetName(name)))) return null;\n\n      const startIndex = timeIndexes[0];\n      const endIndex = timeIndexes[timeIndexes.length - 1];\n      const lunchIndex = timeIndexes.length > 2 ? timeIndexes[1] : -1;\n      const start = String(row[startIndex] || \"\").trim();\n      const lunch = lunchIndex >= 0 ? String(row[lunchIndex] || \"\").trim() : \"\";\n      const end = String(row[endIndex] || \"\").trim();\n      const hours = previousWindowMinutesForTimes(start, end, lunch) / 60;\n      if (hours <= 0) return null;\n\n      return {\n        name: displayNameFromDayforce(name),\n        date: firstPreviousDateLikeCell(row),\n        start,\n        lunch,\n        end,\n        hours\n      };\n    }\n\n    function previousRecordFromDayforceHeader(rows, rowIndex, eligibleNames) {\n      const row = rows[rowIndex].map((cell) => String(cell || \"\").trim());\n      if (!rowHasDayforceHeader(row)) return null;\n\n      const next = (rows[rowIndex + 1] || []).map((cell) => String(cell || \"\").trim());\n      const startIndex = headerIndex(row, \"start shift\");\n      const startMealIndex = headerIndex(row, \"start meal\");\n      const endMealIndex = headerIndex(row, \"end meal\");\n      const endIndex = headerIndex(row, \"end shift\");\n      const employeeCell = findEmployeeNameCell(rows, rowIndex, startIndex);\n      const employee = displayNameFromDayforce(employeeCell ? employeeCell.value : firstFilledBefore(row, startIndex));\n      if (!employee || (eligibleNames.size && !eligibleNames.has(normalizePreviousTimesheetName(employee)))) return null;\n\n      const lunch = [startMealIndex >= 0 ? next[startMealIndex] : \"\", endMealIn
