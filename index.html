omHeader(header);\n          if (!reason) continue;\n          reasonColumns.push({ colIndex, reason, header });\n        }\n\n        if (reasonColumns.length) {\n          return { rowIndex, employeeIndex, reasonColumns };\n        }\n      }\n\n      return null;\n    }\n\n    function parsePayrollAbsenceRows(rows, extractedNameCells = new Set(), headerCells = new Set()) {\n      const header = findPayrollHeader(rows);\n      if (!header) return [];\n\n      headerCells.add(`${header.rowIndex}:${header.employeeIndex}`);\n      header.reasonColumns.forEach(({ colIndex }) => {\n        for (let rowIndex = header.rowIndex; rowIndex < Math.min(rows.length, header.rowIndex + 5); rowIndex += 1) {\n          if (String(rows[rowIndex]?.[colIndex] || \"\").trim()) headerCells.add(`${rowIndex}:${colIndex}`);\n        }\n      });\n\n      const reportDate = payrollDateFromRows(rows);\n      const punches = [];\n      for (let rowIndex = header.rowIndex + 1; rowIndex < rows.length; rowIndex += 1) {\n        const row = rows[rowIndex] || [];\n        const rawName = String(row[header.employeeIndex] || \"\").trim();\n        if (!rawName || /total|percentage|employee/i.test(rawName)) continue;\n\n        const employee = payrollDisplayName(rawName);\n        if (!employee) continue;\n        extractedNameCells.add(`${rowIndex}:${header.employeeIndex}`);\n\n        const reasons = [];\n        let paidHours = 0;\n        let unpaid = false;\n        header.reasonColumns.forEach(({ colIndex, reason }) => {\n          const hours = payrollHours(row[colIndex]);\n          if (hours <= 0) return;\n          reasons.push(reason);\n          if (isUnpaidReason(reason)) {\n            unpaid = true;\n            return;\n          }\n          paidHours += hours;\n        });\n\n        if (!reasons.length) continue;\n\n        const uniqueReasons = Array.from(new Set(reasons));\n        const note = uniqueReasons.join(\", \");\n        const start = paidHours > 0 ? shiftStartForEmployee(employee) : \"\";\n        const end = paidHours > 0 ? endFromStartAndHours(start, paidHours) : \"\";\n        punches.push({\n          source: \"note\",\n          name: employee,\n          date: reportDate,\n          start,\n          lunch: paidHours > 0 ? \"NO\" : \"\",\n          end,\n          note,\n          absencePaid: paidHours > 0,\n          absenceUnpaid: unpaid && paidHours === 0,\n          absenceHours: paidHours ? String(paidHours) : \"\"\n        });\n      }\n\n      return punches;\n    }\n\n    function attendanceHeaderText(value) {\n      return String(value || \"\").trim().toLowerCase().replace(/\\s+/g, \" \");\n    }\n\n    function attendanceHeaderInfo(row) {\n      const headers = row.map(attendanceHeaderText);\n      const nameIndex = headers.findIndex((cell) => cell === \"full name\" || cell === \"employee\");\n      const timeIndex = headers.findIndex((cell) => [\"time in\", \"start time\", \"clock in\", \"clock-in\"].includes(cell));\n      if (nameIndex < 0 || timeIndex < 0) return null;\n      return {\n        nameIndex,\n        timeIndex,\n        departmentIndex: headers.findIndex((cell) => cell === \"department\"),\n        jobIndex: headers.findIndex((cell) => cell === \"job\")\n      };\n    }\n\n    function attendanceReportDate(rows) {\n      for (const row of rows) {\n        for (const value of row) {\n          const text = String(value || \"\").trim();\n          const match = text.match(/\\bRun Date:\\s*(\\d{1,2})\\/(\\d{1,2})\\/(\\d{2,4})/i);\n          if (!match) continue;\n          const year = match[3].length === 2 ? \"20\" + match[3] : match[3];\n          return Number(match[1]) + \"/\" + Number(match[2]) + \"/\" + year;\n        }\n      }\n      return \"\";\n    }\n\n    function dateFromExcelSerial(value) {\n      const serial = Number(value);\n      if (!Number.isFinite(serial) || serial < 1) return null;\n      return new Date(Date.UTC(1899, 11, 30) + Math.floor(serial) * 86400000);\n    }\n\n    function dateFromLooseValue(value) {\n      if (value instanceof Date && !Number.isNaN(value.getTime())) return value;\n      const text = String(value || \"\").trim();\n      const serialDate = /^\\d+(?:\\.\\d+)?$/.test(text) ? dateFromExcelSerial(Number(text)) : null;\n      if (serialDate) return serialDate;\n      const match = text.match(/\\b(\\d{1,2})\\/(\\d{1,2})\\/(\\d{2,4})\\b/);\n      if (match) {\n        return new Date(Number(match[3].length === 2 ? \"20\" + match[3] : match[3]), Number(match[1]) - 1, Number(match[2]));\n      }\n      return null;\n    }\n\n    function formatAttendanceDate(date, fallback = \"\") {\n      if (!(date instanceof Date) || Number.isNaN(date.getTime())) return fallback;\n      return (date.getUTCMonth() + 1) + \"/\" + date.getUTCDate() + \"/\" + date.getUTCFullYear();\n    }\n\n    function attendanceDateFromValue(value, fallback = \"\") {\n      const date = dateFromLooseValue(value);\n      return date ? formatAttendanceDate(date, fallback) : fallback;\n    }\n\n    function attendanceClockFromValue(value) {\n      if (value instanceof Date && !Number.isNaN(value.getTime())) {\n        return String(value.getHours()).padStart(2, \"0\") + String(value.getMinutes()).padStart(2, \"0\");\n      }\n\n      const text = String(value || \"\").trim();\n      if (!text) return \"\";\n\n      if (/^\\d+(?:\\.\\d+)?$/.test(text)) {\n        const serial = Number(text);\n        const minutes = Math.round((serial - Math.floor(serial)) * 1440);\n        return militaryFromMinutes(minutes);\n      }\n\n      const military = text.match(/^([01]?\\d|2[0-4])([0-5]\\d)$/);\n      if (military) return military[1].padStart(2, \"0\") + military[2];\n\n      const match = text.match(/(\\d{1,2}):(\\d{2})(?::\\d{2})?\\s*([ap])?\\.?m?\\.?/i);\n      if (!match) return \"\";\n      let hour = Number(match[1]);\n      const minute = match[2];\n      const period = (match[3] || \"\").toLowerCase();\n      if (period === \"p\" && hour !== 12) hour += 12;\n      if (period === \"a\" && hour === 12) hour = 0;\n      return String(hour).padStart(2, \"0\") + minute;\n    }\n\n    function attendanceSectionLabel(rows, headerRowIndex) {\n      for (let rowIndex = headerRowIndex - 1; rowIndex >= Math.max(0, headerRowIndex - 4); rowIndex -= 1) {\n        const first = attendanceHeaderText(rows[rowIndex]?.[0]);\n        if ([\"present\", \"late\"].includes(first)) return first;\n      }\n      return \"\";\n    }\n\n    function attendanceNameIsDataRow(value) {\n      const text = String(value || \"\").trim();\n      return Boolean(text && !/^employee count:/i.test(text) && !/^(present|late|absent)$/i.test(text) && attendanceHeaderText(text) !== \"full name\");\n    }\n\n    function parseAttendanceRollCallRows(rows, extractedNameCells = new Set(), headerCells = new Set(), rawRows = rows) {\n      const punches = [];\n      const reportDate = attendanceReportDate(rows);\n\n      for (let rowIndex = 0; rowIndex < rows.length; rowIndex += 1) {\n        const header = attendanceHeaderInfo(rows[rowIndex] || []);\n        if (!header) continue;\n\n        headerCells.add(rowIndex + \":\" + header.nameIndex);\n        headerCells.add(rowIndex + \":\" + header.timeIndex);\n        if (header.departmentIndex >= 0) headerCells.add(rowIndex + \":\" + header.departmentIndex);\n        if (header.jobIndex >= 0) headerCells.add(rowIndex + \":\" + header.jobIndex);\n\n        const section = attendanceSectionLabel(rows, rowIndex);\n        if (![\"present\", \"late\"].includes(section)) continue;\n\n        for (let dataIndex = rowIndex + 1; dataIndex < rows.length; dataIndex += 1) {\n          const row = rows[dataIndex] || [];\n          if (attendanceHeaderInfo(row)) break;\n\n          const rawName = String(row[header.nameIndex] || \"\").trim();\n          if (!attendanceNameIsDataRow(rawName)) break;\n\n          const rawClockValue = rawRows[dataIndex]?.[header.timeIndex] ?? row[header.timeIndex] ?? \"\";\n          const formattedClockValue = row[header.timeIndex] ?? rawClockValue;\n          const start = attendanceClockFromValue(rawClockValue) || attendanceClockFromValue(formattedClockValue);\n          if (!start) continue;\n\n          const name = displayNameFromDayforce(rawName);\n          if (!name) continue;\n\n          extractedNameCells.add(dataIndex + \":\" + header.nameIndex);\n          punches.push({\n            source: \"punch\",\n            name,\n            date: attendanceDateFromValue(rawClockValue, attendanceDateFromValue(formattedClockValue, reportDate)),\n            start,\n            lunch: \"\",\n            end: \"\",\n            note: \"\"\n          });\n        }\n      }\n\n      return punches;\n    }\n\n    function parsePunchWorkbookRows(rows, extractedNameCells = new Set(), headerCells = new Set(), rawRows = rows) {\n      const dayforcePunches = parseDayforceMatrix(rows, extractedNameCells, headerCells);\n      if (dayforcePunches.length) return dayforcePunches;\n\n      const rawTimePunches = parseRawTimeEntryRows(rows, extractedNameCells, headerCells);\n      if (rawTimePunches.length) return rawTimePunches;\n\n      const attendancePunches = parseAttendanceRollCallRows(rows, extractedNameCells, headerCells, rawRows);\n      if (attendancePunches.length) return attendancePunches;\n\n      return rows\n        .map((row, rowIndex) => ({ row, rowIndex }))\n        .filter(({ row }) => row.some((cell) => String(cell || \"\").trim()))\n        .map(({ row, rowIndex }) => {\n          if (String(row[0] || \"\").trim() && String(row[0] || \"\").trim().toLowerCase() !== \"employee\") {\n            extractedNameCells.add(rowIndex + \":0\");\n          }\n          return {\n            source: \"punch\",\n            name: String(row[0] || \"\").trim(),\n            date: String(row[1] || \"\").trim(),\n            start: String(row[2] || \"\").trim(),\n            lunch: String(row[3] || \"\").trim(),\n            end: String(row[4] || \"\").trim()\n          };\n        })\n        .filter((row) => row.name && row.name.toLowerCase() !== \"employee\");\n    }\n\n    function columnLabel(index) {\n      let label = \"\";\n      let value = index + 1;\n      while (value > 0) {\n        const remainder = (value - 1) % 26;\n        label = String.fromCharCode(65 + remainder) + label;\n        value = Math.floor((value - 1) / 26);\n      }\n      return label;\n    }\n\n    function previewNameCandidates(value) {\n      const raw = String(value || \"\").trim();\n      return Array.from(new Set([\n        raw,\n        displayNameFromDayforce(raw),\n        payrollDisplayName(raw)\n      ].map((name) => name.trim()).filter(Boolean)));\n    }\n\n    function previewMatchSummary(rows, extractedNameCells) {\n      const names = rosterNames();\n      const seen = new Set();\n      let total = 0;\n      let matched = 0;\n\n      extractedNameCells.forEach((key) => {\n        const [rowIndexText, colIndexText] = key.split(\":\");\n        const value = String(rows[Number(rowIndexText)]?.[Number(colIndexText)] || \"\").trim();\n        if (!value) return;\n\n        const candidates = previewNameCandidates(value);\n        const normalizedKey = normalizeName(candidates[1] || candidates[0]);\n        if (!normalizedKey || seen.has(normalizedKey)) return;\n        seen.add(normalizedKey);\n        total += 1;\n\n        if (candidates.some((candidate) => matchRosterName(candidate, names).found)) {\n          matched += 1;\n        }\n      });\n\n      return { matched, total };\n    }\n\n    function renderExcelPreview(rows, extractedNameCells, headerCells, sheetName) {\n      const nonEmptyRows = rows.filter((row) => row.some((cell) => String(cell || \"\").trim()));\n      if (!nonEmptyRows.length) {\n        excelPreviewSection.hidden = true;\n        excelPreviewHead.innerHTML = \"\";\n        excelPreviewBody.innerHTML = \"\";\n        return;\n      }\n\n      const maxColumns = Math.max(...rows.map((row) => row.length), 1);\n      const summary = previewMatchSummary(rows, extractedNameCells);\n      excelPreviewToggle.title = `${sheetName} Preview`;\n      excelPreviewToggle.setAttribute(\"aria-label\", `${sheetName} preview. Click to review raw time entry import.`);\n      excelPreviewToggle.setAttribute(\"aria-expanded\", \"false\");\n      excelPreviewCount.textContent = `${summary.matched} out of ${summary.total} matched to schedule`;\n      excelPreviewHead.innerHTML = `\n        <tr>\n          <th class=\"row-number\">#</th>\n          ${Array.from({ length: maxColumns }, (_, index) => `<th>${columnLabel(index)}</th>`).join(\"\")}\n        </tr>\n      `;\n      excelPreviewBody.innerHTML = rows.map((row, rowIndex) => `\n        <tr>\n          <td class=\"row-number\">${rowIndex + 1}</td>\n          ${Array.from({ length: maxColumns }, (_, colIndex) => {\n            const key = `${rowIndex}:${colIndex}`;\n            const value = String(row[colIndex] || \"\");\n            const classes = [\n              extractedNameCells.has(key) ? \"extracted-name\" : \"\",\n              headerCells.has(key) ? \"punch-header\" : \"\"\n            ].filter(Boolean).join(\" \");\n            return `<td class=\"${classes}\" title=\"${escapeHtml(value)}\">${escapeHtml(value)}</td>`;\n          }).join(\"\")}\n        </tr>\n      `).join(\"\");\n      excelPreviewSection.classList.add(\"collapsed\");\n      excelPreviewSection.hidden = false;\n    }\n\n    function recordSource(record) {\n      const source = String(record.source || \"\").trim().toLowerCase();\n      if (source === \"punch\" || source === \"note\" || source === \"previous\") return source;\n      return record.absencePaid || record.absenceUnpaid || record.absenceHours || String(record.note || \"\").trim() ? \"note\" : \"punch\";\n    }\n\n    function previewShiftForRecord(punch, names, lookup) {\n      const match = matchRosterName(punch.name, names);\n      const canonical = match.suggestion || punch.name;\n      return lookup.get(normalizeName(canonical))?.shift || \"unmatched\";\n    }\n\n    function shiftGroupOrder(shift) {\n      const order = [\"first\", \"second\", \"gate\", \"mechanics\", \"managers\", \"unmatched\"];\n      const index = order.indexOf(shift);\n      return index === -1 ? order.length : index;\n    }\n\n    function createShiftGroupRow(shift, count) {\n      const row = document.createElement(\"tr\");\n      row.className = \"shift-group-row\";\n      row.innerHTML = `<td colspan=\"6\">${escapeHtml(shiftLabels[shift] || shift)}<span class=\"shift-group-count\">${count} ${count === 1 ? \"record\" : \"records\"}</span></td>`;\n      return row;\n    }\n\n    function appendImportMessage(message) {\n      const row = document.createElement(\"tr\");\n      row.className = \"import-message-row\";\n      row.innerHTML = `<td colspan=\"6\">${escapeHtml(message)}</td>`;\n      previewBody.appendChild(row);\n      emptyState.style.display = \"none\";\n    }\n\n    function createPunchRow(punch, names) {\n      const match = matchRosterName(punch.name, names);\n      const row = document.createElement(\"tr\");\n      row.className = \"record-row\";\n      row.dataset.source = recordSource(punch);\n      row.dataset.absencePaid = punch.absencePaid ? \"1\" : \"\";\n      row.dataset.absenceUnpaid = punch.absenceUnpaid ? \"1\" : \"\";\n      row.dataset.absenceHours = punch.absenceHours || \"\";\n      row.classList.toggle(\"unmatched\", !match.found);\n      if (!match.found && match.hasSuggestion) row.dataset.suggestion = match.suggestion;\n      const suggestion = match.hasSuggestion ? match.suggestion : \"No close roster match\";\n      const suggestionActions = !match.found ? `\n        <span class=\"suggestion-actions\">\n          ${match.hasSuggestion ? '<button type=\"button\" class=\"suggestion-yes\">YES</button><button type=\"button\" class=\"suggestion-no\">NO</button>' : ''}\n          <button type=\"button\" class=\"suggestion-ignore\">Ignore</button>\n        </span>\n      ` : \"\";\n      row.innerHTML = `\n        <td class=\"name-cell\"><input value=\"${escapeHtml(punch.name)}\" aria-label=\"Employee name\" />${match.found ? \"\" : `<span class=\"suggestion\"><span>Try: ${escapeHtml(suggestion)}</span>${suggestionActions}</span>`}</td>\n        <td><input value=\"${escapeHtml(punch.date)}\" aria-label=\"Punch date\" /></td>\n        <td><input value=\"${escapeHtml(punch.start)}\" aria-label=\"Start punch\" /></td>\n        <td><input value=\"${escapeHtml(punch.lunch)}\" aria-label=\"Lunch punch\" /></td>\n        <td><input value=\"${escapeHtml(punch.end)}\" aria-label=\"End punch\" /></td>\n        <td><input value=\"${escapeHtml(punch.note || \"\")}\" aria-label=\"Note\" /></td>\n      `;\n      return { row, matched: match.found };\n    }\n\n    function renderPunches(punches) {\n      previewBody.innerHTML = \"\";\n      const names = rosterNames();\n      const lookup = rosterLookup();\n      let unmatched = 0;\n\n      const groups = new Map();\n      punches.forEach((punch) => {\n        const shift = previewShiftForRecord(punch, names, lookup);\n        if (!groups.has(shift)) groups.set(shift, []);\n        groups.get(shift).push(punch);\n      });\n\n      Array.from(groups.entries())\n        .sort(([a], [b]) => shiftGroupOrder(a) - shiftGroupOrder(b))\n        .forEach(([shift, records]) => {\n          previewBody.appendChild(createShiftGroupRow(shift, records.length));\n          records.forEach((punch) => {\n            const { row, matched } = createPunchRow(punch, names);\n            if (!matched) unmatched += 1;\n            previewBody.appendChild(row);\n          });\n      });\n      emptyState.style.display = punches.length ? \"none\" : \"block\";\n      status.textContent = unmatched ? `${punches.length} records / ${unmatched} unmatched` : `${punches.length} records`;\n      saveUnmatchedImportsFromPreview();\n      renderMissingRosterActions();\n      updatePushNotice();\n      syncArchiveCalendarDate();\n    }\n\n    function previewRecordKey(record) {\n      return [\n        normalizeName(record.name),\n        String(record.date || \"\").trim(),\n        String(record.start || \"\").trim(),\n        String(record.lunch || \"\").trim(),\n        String(record.end || \"\").trim(),\n        String(record.note || \"\").trim().toLowerCase()\n      ].join(\"|\");\n    }\n\n    function appendPreviewRecords(records) {\n      const merged = readPreview();\n      const seen = new Set(merged.map(previewRecordKey));\n      records.forEach((record) => {\n        const key = previewRecordKey(record);\n        if (seen.has(key)) return;\n        seen.add(key);\n        merged.push(record);\n      });\n      return merged;\n    }\n\n    function refreshStatusFromPreview() {\n      const rows = previewBody.querySelectorAll(\"tr.record-row\");\n      const unmatched = previewBody.querySelectorAll(\"tr.record-row.unmatched\").length;\n      status.textContent = unmatched ? `${rows.length} records / ${unmatched} unmatched` : `${rows.length} records`;\n      renderMissingRosterActions();\n    }\n\n    function saveUnmatchedImportsFromPreview() {\n      const names = Array.from(previewBody.querySelectorAll(\"tr.unmatched .name-cell input\"))\n        .map((input) => input.value.trim())\n        .filter(Boolean);\n      localStorage.setItem(unmatchedStorageKey, JSON.stringify(Array.from(new Set(names))));\n    }\n\n    function uniquePreviewMisses() {\n      const names = rosterNames();\n      const seen = new Set();\n      return readPreview().map((punch) => {\n        const match = matchRosterName(punch.name, names);\n        return { punch, match };\n      }).filter(({ punch, match }) => {\n        const key = normalizeName(punch.name);\n        if (match.found || !key || seen.has(key)) return false;\n        seen.add(key);\n        return true;\n      });\n    }\n\n    function renderMissingRosterActions() {\n      const missing = uniquePreviewMisses();\n      missingRosterPanel.hidden = missing.length === 0;\n      missingRosterCount.textContent = `${missing.length} ${missing.length === 1 ? \"name\" : \"names\"}`;\n      missingRosterBody.innerHTML = missing.map(({ punch, match }) => {\n        const suggestion = match.hasSuggestion ? match.suggestion : \"\";\n        return `\n          <div class=\"missing-roster-row\" data-name=\"${escapeHtml(punch.name)}\">\n            <div>${escapeHtml(punch.name)}</div>\n            <div>${suggestion ? `Suggestion: ${escapeHtml(suggestion)} <button type=\"button\" class=\"convert-name\" data-suggestion=\"${escapeHtml(suggestion)}\">Use</button>` : \"No close suggestion\"}</div>\n            <select class=\"target-shift\" aria-label=\"Target shift for ${escapeHtml(punch.name)}\">\n              <option value=\"first\">1st Shift</option>\n              <option value=\"second\">Second Shift</option>\n              <option value=\"gate\">Gate</option>\n              <option value=\"mechanics\">Mechanics</option>\n              <option value=\"managers\">Managers</option>\n            </select>\n            <button type=\"button\" class=\"add-roster-name\">Add</button>\n          </div>\n        `;\n      }).join(\"\");\n    }\n\n    function rosterStateHasSavedRows(state) {\n      return [\"first\", \"second\", \"gate\", \"mechanics\", \"managers\"].some((key) => Array.isArray(state[key]) && state[key].length);\n    }\n\n    function readRosterAdditions() {\n      try {\n        const additions = JSON.parse(localStorage.getItem(rosterAdditionsKey) || \"[]\");\n        return Array.isArray(additions) ? additions : [];\n      } catch (error) {\n        localStorage.removeItem(rosterAdditionsKey);\n        return [];\n      }\n    }\n\n    function rosterAlreadyHasName(name) {\n      const normalized = normalizeName(name);\n      return rosterNames().some((candidate) => normalizeName(candidate) === normalized);\n    }\n\n    function addNameToRoster(name, shift) {\n      const cleanName = String(name || \"\").trim();\n      const targetShift = shiftLabels[shift] ? shift : \"first\";\n      if (!cleanName) return false;\n      if (rosterAlreadyHasName(cleanName)) return true;\n\n      const employee = {\n        name: cleanName,\n        role: \"\",\n        days: [\"W\", \"W\", \"W\", \"W\", \"W\", \"W\", \"W\"],\n        shift: targetShift\n      };\n\n      try {\n        const state = JSON.parse(localStorage.getItem(rosterStorageKey) || \"{}\");\n        if (rosterStateHasSavedRows(state)) {\n          if (!Array.isArray(state[targetShift])) state[targetShift] = [];\n          state[targetShift].push({ name: employee.name, role: employee.role, days: employee.days });\n          localStorage.setItem(rosterStorageKey, JSON.stringify(state));\n          return true;\n        }\n      } catch (error) {\n        localStorage.removeItem(rosterStorageKey);\n      }\n\n      const additions = readRosterAdditions();\n      additions.push(employee);\n      localStorage.setItem(rosterAdditionsKey, JSON.stringify(additions));\n      return true;\n    }\n\n    function renamePreviewEmployee(oldName, newName) {\n      const oldKey = normalizeName(oldName);\n      previewBody.querySelectorAll(\"tr\").forEach((row) => {\n        const nameInput = row.querySelector(\".name-cell input\");\n        if (nameInput && normalizeName(nameInput.value) === oldKey) {\n          nameInput.value = newName;\n        }\n      });\n      renderPunches(readPreview());\n    }\n    function escapeHtml(value) {\n      return String(value).replace(/[&<>\"']/g, (char) => ({\n        \"&\": \"&amp;\",\n        \"<\": \"&lt;\",\n        \">\": \"&gt;\",\n        '\"': \"&quot;\",\n        \"'\": \"&#39;\"\n      }[char]));\n    }\n\n    function previewRecordFromRow(row) {\n      const inputs = row.querySelectorAll(\"input\");\n      return {\n        source: row.dataset.source || \"\",\n        name: inputs[0]?.value.trim() || \"\",\n        date: inputs[1]?.value.trim() || \"\",\n        start: inputs[2]?.value.trim() || \"\",\n        lunch: inputs[3]?.value.trim() || \"\",\n        end: inputs[4]?.value.trim() || \"\",\n        note: inputs[5] ? inputs[5].value.trim() : \"\",\n        absencePaid: row.dataset.absencePaid === \"1\",\n        absenceUnpaid: row.dataset.absenceUnpaid === \"1\",\n        absenceHours: row.dataset.absenceHours || \"\"\n      };\n    }\n\n    function readPreview() {\n      return Array.from(previewBody.querySelectorAll(\"tr.record-row\"))\n        .map(previewRecordFromRow)\n        .filter((row) => row.name);\n    }\n\n    function rosterValidatedPunches(records = readPreview()) {\n      const names = rosterNames();\n      const skipped = [];\n      const accepted = records.map((punch) => {\n        const match = matchRosterName(punch.name, names);\n        if (!match.found) {\n          skipped.push(punch.name);\n          return null;\n        }\n\n        const acceptedPunch = {\n          ...punch,\n          name: match.suggestion || punch.name\n        };\n\n        if (acceptedPunch.note && acceptedPunch.absencePaid && acceptedPunch.absenceHours) {\n          acceptedPunch.start = shiftStartForEmployee(acceptedPunch.name);\n          acceptedPunch.lunch = \"NO\";\n          acceptedPunch.end = endFromStartAndHours(acceptedPunch.start, Number(acceptedPunch.absenceHours));\n        }\n\n        return acceptedPunch;\n      }).filter(Boolean);\n\n      return { accepted, skipped };\n    }\n\n    function readStoredPunches() {\n      try {\n        const saved = JSON.parse(localStorage.getItem(storageKey) || \"[]\");\n        return Array.isArray(saved) ? saved : [];\n      } catch (error) {\n        localStorage.removeItem(storageKey);\n        return [];\n      }\n    }\n\n    function punchDateKey(record) {\n      return inputDateFromPunchDate(record?.date) || selectedSheetDateValue();\n    }\n\n    function punchIdentityKey(record) {\n      return [\n        punchDateKey(record),\n        normalizeName(record?.name),\n        recordSource(record),\n        String(record?.start || \"\").trim(),\n        String(record?.lunch || \"\").trim(),\n        String(record?.end || \"\").trim(),\n        String(record?.note || \"\").trim().toLowerCase()\n      ].join(\"|\");\n    }\n\n    function mergePunchesForDates(existing, incoming) {\n      const incomingDates = new Set(incoming.map(punchDateKey).filter(Boolean));\n      const merged = new Map();\n\n      existing.forEach((record) => {\n        const dateKey = punchDateKey(record);\n        if (dateKey && incomingDates.has(dateKey)) return;\n        merged.set(punchIdentityKey(record), record);\n      });\n\n      incoming.forEach((record) => {\n        merged.set(punchIdentityKey(record), record);\n      });\n\n      return Array.from(merged.values());\n    }\n\n    function saveAcceptedPunches(accepted) {\n      const stored = mergePunchesForDates(readStoredPunches(), accepted);\n      localStorage.setItem(storageKey, JSON.stringify(stored));\n      return stored;\n    }\n\n    function replaceAcceptedPunches(accepted) {\n      localStorage.setItem(storageKey, JSON.stringify(accepted));\n      return accepted;\n    }\n\n\n    previewBody.addEventListener(\"click\", (event) => {\n      const yesButton = event.target.closest(\".suggestion-yes\");\n      const noButton = event.target.closest(\".suggestion-no\");\n      const ignoreButton = event.target.closest(\".suggestion-ignore\");\n      if (!yesButton && !noButton && !ignoreButton) return;\n\n      const row = event.target.closest(\"tr\");\n      if (!row) return;\n\n      if (ignoreButton) {\n        const ignored = previewRecordFromRow(row);\n        const ignoredKey = previewRecordKey(ignored);\n        let removed = false;\n        const remaining = readPreview().filter((record) => {\n          if (!removed && previewRecordKey(record) === ignoredKey) {\n            removed = true;\n            return false;\n          }\n          return true;\n        });\n        renderPunches(remaining);\n        setPendingPush(remaining.length > 0);\n        status.textContent = ignored.name ? `Ignored ${ignored.name} / ${remaining.length} records` : `Ignored row / ${remaining.length} records`;\n        return;\n      }\n\n      if (yesButton) {\n        const suggestedName = row.dataset.suggestion || \"\";\n        const nameInput = row.querySelector(\".name-cell input\");\n        if (suggestedName && nameInput) {\n          nameInput.value = suggestedName;\n          row.classList.remove(\"unmatched\");\n          row.removeAttribute(\"data-suggestion\");\n        }\n      }\n\n      row.querySelector(\".suggestion\")?.remove();\n      refreshStatusFromPreview();\n      saveUnmatchedImportsFromPreview();\n      setPendingPush(true);\n    });\n\n    previewBody.addEventListener(\"input\", (event) => {\n      if (!event.target.matches(\"input\")) return;\n      refreshStatusFromPreview();\n      saveUnmatchedImportsFromPreview();\n      setPendingPush(true);\n    });\n\n    missingRosterBody.addEventListener(\"click\", (event) => {\n      const convertButton = event.target.closest(\".convert-name\");\n      const addButton = event.target.closest(\".add-roster-name\");\n      if (!convertButton && !addButton) return;\n\n      const row = event.target.closest(\".missing-roster-row\");\n      if (!row) return;\n\n      const importedName = row.dataset.name || \"\";\n      if (convertButton) {\n        const suggestion = convertButton.dataset.suggestion || \"\";\n        if (suggestion) {\n          renamePreviewEmployee(importedName, suggestion);\n          status.textContent = `Converted ${importedName} to ${suggestion}`;\n          setPendingPush(true);\n        }\n        return;\n      }\n\n      if (addButton) {\n        const shift = row.querySelector(\".target-shift\")?.value || \"first\";\n        if (addNameToRoster(importedName, shift)) {\n          renderPunches(readPreview());\n          status.textContent = `Added ${importedName} to ${shiftLabels[shift]}`;\n          setPendingPush(true);\n        }\n      }\n    });\n\n    excelPreviewToggle.addEventListener(\"click\", () => {\n      const isCollapsed = excelPreviewSection.classList.toggle(\"collapsed\");\n      excelPreviewToggle.setAttribute(\"aria-expanded\", String(!isCollapsed));\n    });\n\n    archiveCalendarDate.addEventListener(\"change\", () => {\n      archiveCalendarDate.dataset.auto = \"0\";\n      if (archiveCalendarDate.value) localStorage.setItem(archiveSelectedDateKey, archiveCalendarDate.value);\n    });\n\n    archiveCalendarButton.addEventListener(\"click\", openArchiveCalendar);\n\n    function sheetRows(workbook, sheetName, raw = false) {\n      const sheet = workbook.Sheets[sheetName];\n      return XLSX.utils.sheet_to_json(sheet, { header: 1, raw, defval: \"\" });\n    }\n\n    function preferredPunchSheetNames(workbook) {\n      const sheet2 = workbook.SheetNames.filter((sheetName) => sheetName.trim().toLowerCase() === \"sheet2\");\n      return sheet2.length ? sheet2 : workbook.SheetNames;\n    }\n\n    function fileNameStartsWith(file, prefix) {\n      return String(file?.name || \"\").trim().toLowerCase().startsWith(prefix);\n    }\n\n    function rejectImportFile(input, message) {\n      input.value = \"\";\n      status.textContent = message;\n    }\n\n    function readWorkbookFromBuffer(buffer) {\n      try {\n        return XLSX.read(buffer, { type: \"array\" });\n      } catch (error) {\n        const text = new TextDecoder().decode(buffer);\n        return XLSX.read(text, { type: \"string\" });\n      }\n    }\n\n    document.getElementById(\"previousTimesheetInput\").addEventListener(\"change\", async (event) => {\n      const file = event.target.files[0];\n      if (!file) return;\n\n      if (!window.XLSX) {\n        previousTimesheetStatus.textContent = \"XLSX ERROR\";\n        status.textContent = \"XLSX parser unavailable\";\n        return;\n      }\n\n      try {\n        const workbook = readWorkbookFromBuffer(await file.arrayBuffer());\n        const result = parsePreviousTimesheetHours(workbook);\n        localStorage.setItem(previousTimesheetStorageKey, JSON.stringify({\n          source: result.source,\n          hours: result.hours,\n          actualHours: result.actualHours,\n          rows: result.rows,\n          records: result.records,\n          fileName: file.name,\n          importedAt: new Date().toISOString()\n        }));\n        const restoreRecords = Array.isArray(result.records) ? result.records.map(previousRecordToPreviewPunch) : [];\n        syncTimesheetMdDateFromPrevious(result.records);\n        if (restoreRecords.length) {\n          renderPunches(appendPreviewRecords(restoreRecords));\n          setPendingPush(true);\n        }\n        updatePreviousTimesheetStatus();\n        const importedHours = result.source === \"timesheet-md-export\" ? Number(result.actualHours || 0) : Number(result.hours || 0);\n        status.textContent = `Previous timesheet imported: ${importedHours.toFixed(1)} hrs / ${result.rows || 0} rows`;\n      } catch (error) {\n        previousTimesheetStatus.textContent = \"IMPORT ERROR\";\n        status.textContent = \"Previous timesheet import failed\";\n      } finally {\n        event.target.value = \"\";\n      }\n    });\n\n    document.getElementById(\"fileInput\").addEventListener(\"change\", async (event) => {\n      const file = event.target.files[0];\n      if (!file) return;\n\n      if (!window.XLSX) {\n        status.textContent = \"XLSX parser unavailable\";\n        return;\n      }\n\n      const buffer = await file.arrayBuffer();\n      const workbook = readWorkbookFromBuffer(buffer);\n      const targetSheets = preferredPunchSheetNames(workbook);\n      const punches = [];\n      let previewRendered = false;\n\n      targetSheets.forEach((sheetName) => {\n        const rows = sheetRows(workbook, sheetName);\n        const rawRows = sheetRows(workbook, sheetName, true);\n        const extractedNameCells = new Set();\n        const headerCells = new Set();\n        punches.push(...parsePunchWorkbookRows(rows, extractedNameCells, headerCells, rawRows));\n\n        if (!previewRendered) {\n          renderExcelPreview(rows, extractedNameCells, headerCells, sheetName);\n          previewRendered = true;\n        }\n      });\n      renderPunches(punches);\n      setPendingPush(punches.length > 0);\n      if (!punches.length) {\n        status.textContent = \"No punch records found in this workbook\";\n      }\n    });\n\n    document.getElementById(\"noteFileInput\").addEventListener(\"change\", async (event) => {\n      const file = event.target.files[0];\n      if (!file) return;\n\n      if (!fileNameStartsWith(file, \"payroll\")) {\n        rejectImportFile(event.target, \"Note scan import must start with Payroll\");\n        return;\n      }\n\n      if (!window.XLSX) {\n        status.textContent = \"XLSX parser unavailable\";\n        return;\n      }\n\n      const buffer = await file.arrayBuffer();\n      const workbook = XLSX.read(buffer, { type: \"array\" });\n      const records = [];\n      let fallbackPreview = null;\n      let previewRendered = false;\n\n      workbook.SheetNames.forEach((sheetName) => {\n        const rows = sheetRows(workbook, sheetName);\n        const extractedNameCells = new Set();\n        const headerCells = new Set();\n        const parsed = parsePayrollAbsenceRows(rows, extractedNameCells, headerCells);\n        records.push(...parsed);\n\n        if (!fallbackPreview) {\n          fallbackPreview = { rows, extractedNameCells, headerCells, sheetName };\n        }\n\n        if (!previewRendered && (parsed.length || extractedNameCells.size || headerCells.size)) {\n          renderExcelPreview(rows, extractedNameCells, headerCells, sheetName);\n          previewRendered = true;\n        }\n      });\n\n      if (!previewRendered && fallbackPreview) {\n        renderExcelPreview(fallbackPreview.rows, fallbackPreview.extractedNameCells, fallbackPreview.headerCells, fallbackPreview.sheetName);\n      }\n\n      const merged = appendPreviewRecords(records);\n      renderPunches(merged);\n      setPendingPush(records.length > 0);\n      if (!records.length) {\n        appendImportMessage(\"No records found from import scan\");\n        status.textContent = merged.length ? `${merged.length} records / no records found from import scan` : \"No records found from import scan\";\n      }\n    });\n\n    document.getElementById(\"saveButton\").addEventListener(\"click\", () => {\n      const previewPunches = readPreview();\n      const { accepted, skipped } = rosterValidatedPunches(previewPunches);\n      saveAcceptedPunches(accepted);\n      localStorage.setItem(unmatchedStorageKey, JSON.stringify(Array.from(new Set(skipped))));\n      renderPunches(previewPunches);\n      setPendingPush(false);\n      notifyTimesheetMdUpdate();\n      const previousCount = accepted.filter((record) => recordSource(record) === \"previous\").length;\n      const savedText = previousCount ? `Saved ${accepted.length} / restored ${previousCount}` : `Saved ${accepted.length}`;\n      status.textContent = skipped.length ? `${savedText} / skipped ${skipped.length} not on roster` : savedText;\n    });\n\n    function clearRecordsBySource(source, label) {\n      const remaining = readPreview().filter((record) => recordSource(record) !== source);\n      const { accepted, skipped } = rosterValidatedPunches(remaining);\n      replaceAcceptedPunches(accepted);\n      localStorage.setItem(unmatchedStorageKey, JSON.stringify(Array.from(new Set(skipped))));\n      renderPunches(remaining);\n      setPendingPush(false);\n      notifyTimesheetMdUpdate();\n      if (!remaining.length) {\n        excelPreviewSection.hidden = true;\n        excelPreviewHead.innerHTML = \"\";\n        excelPreviewBody.innerHTML = \"\";\n      }\n      status.textContent = skipped.length\n        ? `${label} cleared / ${remaining.length} records remain / ${skipped.length} unmatched`\n        : `${label} cleared / ${remaining.length} records remain`;\n    }\n\n    function setClearMenuOpen(open) {\n      clearSplit.classList.toggle(\"open\", open);\n      clearMenuButton.setAttribute(\"aria-expanded\", String(open));\n    }\n\n    function clearPreviousTimesheet() {\n      localStorage.removeItem(previousTimesheetStorageKey);\n      const remaining = readPreview().filter((record) => recordSource(record) !== \"previous\");\n      const { accepted, skipped } = rosterValidatedPunches(remaining);\n      replaceAcceptedPunches(accepted);\n      localStorage.setItem(unmatchedStorageKey, JSON.stringify(Array.from(new Set(skipped))));\n      renderPunches(remaining);\n      setPendingPush(false);\n      notifyTimesheetMdUpdate();\n      updatePreviousTimesheetStatus();\n      status.textContent = \"Previous time cleared\";\n    }\n\n    function runClearAction(action) {\n      if (action === \"punch\") {\n        clearRecordsBySource(\"punch\", \"Punches\");\n      } else if (action === \"note\") {\n        clearRecordsBySource(\"note\", \"Note scan\");\n      } else if (action === \"previous\") {\n        clearPreviousTimesheet();\n      }\n    }\n\n    [clearDefaultButton, clearMenuButton].forEach((button) => {\n      button.addEventListener(\"click\", (event) => {\n        event.stopPropagation();\n        setClearMenuOpen(!clearSplit.classList.contains(\"open\"));\n      });\n    });\n\n    clearMenu.addEventListener(\"click\", (event) => {\n      const actionButton = event.target.closest(\"[data-clear-action]\");\n      if (!actionButton) return;\n      setClearMenuOpen(false);\n      runClearAction(actionButton.dataset.clearAction);\n    });\n\n    document.addEventListener(\"click\", (event) => {\n      if (!clearSplit.contains(event.target)) setClearMenuOpen(false);\n    });\n\n    document.addEventListener(\"keydown\", (event) => {\n      if (event.key === \"Escape\") setClearMenuOpen(false);\n    });\n\n    try {\n      const saved = JSON.parse(localStorage.getItem(storageKey) || \"[]\");\n      renderPunches(Array.isArray(saved) ? saved : []);\n    } catch (error) {\n      localStorage.removeItem(storageKey);\n    }\n    updatePreviousTimesheetStatus();\n    })();\n  <\/script>\n</body>\n</html>\n" },
        "performance": { label: "Performance", html: "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n  <meta charset=\"UTF-8\" />\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" />\n  <title>Performance Analytics</title>\n  <script src=\"https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js\"><\/script>\n  <style>\n    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@400;500;600;700&display=swap');\n\n    :root {\n      --ink: #111827;\n      --muted: #667085;\n      --line: #d8dee9;\n      --bg: #eef0f3;\n      --purple: #7c3aed;\n      --purple-soft: #ede9fe;\n      --green: #047857;\n      --green-soft: #dff7ea;\n      --amber: #b45309;\n      --amber-soft: #fff2cc;\n      --blue-soft: #dbeafe;\n    }\n    * { box-sizing: border-box; }\n    body {\n      margin: 0;\n      background: var(--bg);\n      color: var(--ink);\n      font-family: Arial, Helvetica, sans-serif;\n      overflow-x: hidden;\n    }\n    button, input, textarea { font: inherit; }\n    .page {\n      width: min(1480px, 100%);\n      margin: 0 auto;\n      padding: 10px 12px 18px;\n    }\n    .hero {\n      display: flex;\n      align-items: center;\n      justify-content: space-between;\n      gap: 16px;\n      padding: 18px 22px;\n      background: #000;\n      color: #fff;\n      border-bottom: 5px solid var(--purple);\n      border-radius: 8px 8px 0 0;\n    }\n    .kicker {\n      color: #c7d2fe;\n      font-size: 12px;\n      font-weight: 900;\n      letter-spacing: .08em;\n      text-transform: uppercase;\n    }\n    h1, h2 { margin: 0; }\n    h1 {\n      margin-top: 4px;\n      font-size: 28px;\n      line-height: 1;\n      letter-spacing: 0;\n    }\n    h2 {\n      font-size: 16px;\n      line-height: 1.15;\n    }\n    .hero-actions {\n      display: flex;\n      align-items: center;\n      justify-content: flex-end;\n      flex-wrap: wrap;\n      gap: 10px;\n    }\n    .date-box {\n      display: inline-flex;\n      align-items: center;\n      gap: 8px;\n      color: #c7d2fe;\n      font-size: 12px;\n      font-weight: 900;\n      letter-spacing: .06em;\n      text-transform: uppercase;\n    }\n    .date-box input,\n    .btn {\n      height: 34px;\n      border: 1px solid rgba(255,255,255,.55);\n      border-radius: 4px;\n      background: #fff;\n      color: #000;\n      font-weight: 900;\n    }\n    .date-box input {\n      min-width: 148px;\n      padding: 0 9px;\n      text-align: center;\n    }\n    .btn {\n      min-width: 92px;\n      padding: 0 14px;\n      cursor: pointer;\n    }\n    .btn.secondary {\n      border-color: #cbd5e1;\n      background: #f8fafc;\n    }\n    .btn.primary {\n      border-color: var(--purple);\n      background: var(--purple);\n      color: #fff;\n    }\n    .btn.danger {\n      border-color: #fecaca;\n      background: #fff1f2;\n      color: #991b1b;\n    }\n    .btn.danger.confirming {\n      border-color: #991b1b;\n      background: #991b1b;\n      color: #fff;\n    }\n    .import-status {\n      min-width: 120px;\n      color: #6e6654;\n      font-family: \"IBM Plex Mono\", Consolas, monospace;\n      font-size: 11px;\n      font-weight: 700;\n      text-align: right;\n    }\n    .metrics {\n      display: grid;\n      grid-template-columns: minmax(0, .66fr) minmax(0, .74fr) minmax(0, .54fr) minmax(0, .66fr) minmax(0, 1.36fr) minmax(0, 1.64fr);\n      gap: 5px;\n      padding: 6px 0;\n    }\n    .metric {\n      min-height: 96px;\n      display: flex;\n      flex-direction: column;\n      justify-content: center;\n      gap: 3px;\n      padding: 7px 8px;\n      background: #fff;\n      border: 1px solid var(--line);\n      border-radius: 6px;\n      text-align: center;\n    }\n    .metric-label {\n      color: #98a2b3;\n      font-size: 12px;\n      font-weight: 900;\n      letter-spacing: .08em;\n      text-transform: uppercase;\n    }\n    .metric-value {\n      color: var(--ink);\n      font-size: 24px;\n      font-weight: 900;\n      line-height: 1;\n      font-variant-numeric: tabular-nums;\n    }\n    .metric-sub {\n      min-height: 14px;\n      color: var(--muted);\n      font-size: 11px;\n      font-weight: 700;\n      overflow: hidden;\n      text-overflow: ellipsis;\n      white-space: nowrap;\n    }\n    .band, .panel {\n      background: #fff;\n      border: 1px solid var(--line);\n      border-radius: 7px;\n      overflow: hidden;\n    }\n    .section-head {\n      min-height: 46px;\n      display: flex;\n      align-items: center;\n      justify-content: space-between;\n      gap: 12px;\n      padding: 12px 15px;\n      background: #fbfcfe;\n      border-bottom: 1px solid var(--line);\n    }\n    .section-meta {\n      color: var(--muted);\n      font-size: 12px;\n      font-weight: 800;\n      text-align: right;\n    }\n    .timeline-wrap { padding: 14px 14px 16px; }\n    .timeline {\n      display: grid;\n      grid-template-columns: 108px 1fr;\n      gap: 0 10px;\n      min-width: 0;\n    }\n    .axis-label {\n      color: var(--muted);\n      font-size: 11px;\n      font-weight: 900;\n      letter-spacing: .06em;\n      text-transform: uppercase;\n    }\n    .axis,\n    .bucket-row {\n      display: grid;\n      grid-template-columns: repeat(var(--timeline-hours, 24), minmax(0, 1fr));\n      gap: 2px;\n      min-width: 0;\n    }\n    .axis span {\n      min-width: 0;\n      color: var(--muted);\n      font-size: 10px;\n      font-weight: 800;\n      text-align: center;\n      white-space: nowrap;\n      overflow: hidden;\n    }\n    .row-label {\n      min-height: 54px;\n      display: flex;\n      align-items: center;\n      padding-right: 8px;\n      border-top: 1px solid #eef2f7;\n      color: var(--ink);\n      font-size: 12px;\n      font-weight: 900;\n      letter-spacing: .04em;\n      text-transform: uppercase;\n    }\n    .bucket-row {\n      min-height: 54px;\n      align-items: stretch;\n      padding: 5px 0;\n      border-top: 1px solid #eef2f7;\n    }\n    .bucket {\n      position: relative;\n      min-width: 0;\n      padding: 0;\n      border: 1px solid #e6ebf2;\n      border-radius: 4px;\n      background: #f9fafb;\n      color: var(--ink);\n      cursor: pointer;\n      overflow: hidden;\n    }\n    .bucket::before {\n      content: \"\";\n      position: absolute;\n      left: 0;\n      right: 0;\n      bottom: 0;\n      height: calc(var(--pct, 0) * 1%);\n      background: var(--fill, #dbeafe);\n      opacity: .95;\n    }\n    .bucket span {\n      position: relative;\n      z-index: 1;\n      height: 100%;\n      display: flex;\n      align-items: center;\n      justify-content: center;\n      padding: 0 2px;\n      color: var(--ink);\n      font-size: 11px;\n      font-weight: 900;\n      font-variant-numeric: tabular-nums;\n      white-space: nowrap;\n    }\n    .bucket.target-good {\n      border-color: #86efac;\n      background: #f0fdf4;\n    }\n    .bucket.target-good::before { background: #bbf7d0; }\n    .bucket.target-good span { color: #14532d; }\n    .bucket.target-warn {\n      border-color: #facc15;\n      background: #fffbeb;\n    }\n    .bucket.target-warn::before { background: #fde68a; }\n    .bucket.target-warn span { color: #92400e; }\n    .bucket.target-bad {\n      border-color: #fca5a5;\n      background: #fef2f2;\n    }\n    .bucket.target-bad::before { background: #fecaca; }\n    .bucket.target-bad span { color: #991b1b; }\n    .bucket.empty span { color: #b5bdc9; }\n    .bucket.lunch-period {\n      border-color: #f59e0b;\n      background: #fff7ed;\n    }\n    .bucket.lunch-period::before {\n      display: none;\n    }\n    .bucket.lunch-period span {\n      color: #9a3412;\n      font-size: 9px;\n      letter-spacing: .04em;\n      text-transform: uppercase;\n    }\n\n    .bucket-row.type-row {\n      min-height: 70px;\n      padding-top: 6px;\n      padding-bottom: 6px;\n      overflow: hidden;\n    }\n    .bucket.type-bucket {\n      display: flex;\n      align-items: center;\n      justify-content: center;\n      padding: 2px;\n      overflow: hidden;\n      background: #fff;\n    }\n    .bucket.type-bucket::before {\n      display: none;\n    }\n    .type-pill-stack {\n      position: relative;\n      z-index: 1;\n      width: 100%;\n      display: flex;\n      flex-direction: column;\n      align-items: center;\n      justify-content: center;\n      gap: 3px;\n      min-width: 0;\n    }\n    .type-pill {\n      max-width: 100%;\n      min-height: 15px;\n      display: inline-flex;\n      align-items: center;\n      justify-content: center;\n      padding: 0 2px;\n      border-radius: 4px;\n      font-size: 8px;\n      font-weight: 900;\n      line-height: 1;\n      letter-spacing: 0;\n      white-space: nowrap;\n      overflow: hidden;\n      text-overflow: ellipsis;\n    }\n    .type-pill.drop { background: #dbeafe; color: #1d4ed8; }\n    .type-pill.load { background: #dcfce7; color: #047857; }\n    .type-pill.ups { background: #fce7f3; color: #be185d; }\n    .type-pill.carry { background: #ffedd5; color: #c2410c; }\n    .type-pill.manual { background: #ede9fe; color: #6d28d9; }\n    .type-pill.other { background: #e2e8f0; color: #334155; }\n    .type-legend {\n      display: flex;\n      align-items: center;\n      flex-wrap: wrap;\n      gap: 7px 12px;\n      padding: 10px 0 0 118px;\n      color: var(--muted);\n      font-size: 11px;\n      font-weight: 900;\n      text-transform: uppercase;\n    }\n    .type-legend-item {\n      display: inline-flex;\n      align-items: center;\n      gap: 5px;\n      white-space: nowrap;\n    }\n    .timeline-type-key {\n      display: grid;\n      grid-template-columns: 108px minmax(0, 1fr);\n      gap: 0 10px;\n      align-items: center;\n      padding: 0 14px 14px;\n      color: var(--muted);\n    }\n    .timeline-key-label {\n      font-size: 11px;\n      font-weight: 900;\n      letter-spacing: .06em;\n      text-transform: uppercase;\n    }\n    .timeline-type-key .type-legend {\n      padding: 0;\n      gap: 8px 10px;\n      font-size: 10px;\n    }\n    .metric.shift-card {\n      grid-column: auto;\n      min-height: 96px;\n      align-items: stretch;\n      justify-content: center;\n      text-align: left;\n      padding: 7px 8px;\n    }\n    .shift-card .metric-label {\n      margin-bottom: 5px;\n    }\n    .metric.source-mix-card {\n      grid-column: auto;\n      min-height: 96px;\n      align-items: stretch;\n      justify-content: flex-start;\n      text-align: left;\n      padding: 7px 8px;\n    }\n    .source-mix-head {\n      display: flex;\n      align-items: center;\n      justify-content: space-between;\n      gap: 10px;\n      margin-bottom: 5px;\n    }\n    .source-mix-count {\n      color: var(--muted);\n      font-size: 11px;\n      font-weight: 900;\n      white-space: nowrap;\n    }\n    .source-metric-list {\n      display: grid;\n      gap: 3px;\n    }\n    .source-metric-row {\n      min-height: 20px;\n      display: grid;\n      grid-template-columns: minmax(0, 1fr) auto;\n      align-items: center;\n      gap: 8px;\n      padding: 2px 6px;\n      border: 1px solid #e8edf5;\n      border-radius: 5px;\n      background: #fbfcfe;\n      color: var(--ink);\n      font-size: 11px;\n      font-weight: 900;\n    }\n    .source-metric-row span:first-child {\n      min-width: 0;\n      overflow: hidden;\n      text-overflow: ellipsis;\n      white-space: nowrap;\n    }\n    .source-metric-row span:last-child {\n      font-variant-numeric: tabular-nums;\n    }\n    .source-metric-empty {\n      color: var(--muted);\n      font-size: 12px;\n      font-weight: 800;\n      text-align: center;\n    }\n    .shift-summary {\n      display: grid;\n      grid-template-columns: 1.1fr repeat(4, minmax(0, 1fr));\n      gap: 0;\n      border: 1px solid var(--line);\n      border-radius: 6px;\n      overflow: hidden;\n      background: #fff;\n    }\n    .shift-summary-cell {\n      min-height: 24px;\n      display: flex;\n      align-items: center;\n      justify-content: center;\n      padding: 4px 5px;\n      border-right: 1px solid #eef2f7;\n      border-bottom: 1px solid #eef2f7;\n      color: var(--ink);\n      font-size: 11px;\n      font-weight: 900;\n      font-variant-numeric: tabular-nums;\n      white-space: nowrap;\n    }\n    .shift-summary-cell:nth-child(5n) { border-right: 0; }\n    .shift-summary-cell:nth-last-child(-n + 5) { border-bottom: 0; }\n    .shift-summary-head {\n      min-height: 28px;\n      background: #f8fafc;\n      color: #667085;\n      font-size: 11px;\n      letter-spacing: .07em;\n      text-transform: uppercase;\n    }\n    .shift-summary-name {\n      justify-content: flex-start;\n      color: var(--ink);\n      font-weight: 900;\n    }\n    .shift-summary-lph {\n      color: #111827;\n    }\n    .split {\n      display: grid;\n      grid-template-columns: minmax(0, 1fr);\n      gap: 10px;\n      margin-top: 10px;\n    }\n    .detail-body { padding: 12px 14px 14px; }\n    .employee-list {\n      display: grid;\n      gap: 6px;\n    }\n    .person-line,\n    .source-line {\n      display: grid;\n      grid-template-columns: minmax(150px, 1fr) 78px 78px 86px;\n      gap: 8px;\n      align-items: center;\n      padding: 8px 10px;\n      border: 1px solid #e8edf5;\n      border-radius: 5px;\n      background: #fbfcfe;\n      font-size: 13px;\n      font-weight: 800;\n    }\n    .source-line { grid-template-columns: minmax(120px, 1fr) 80px; }\n    .muted {\n      color: var(--muted);\n      font-weight: 700;\n    }\n    .pill {\n      min-height: 22px;\n      display: inline-flex;\n      align-items: center;\n      justify-content: center;\n      padding: 3px 7px;\n      border-radius: 4px;\n      background: var(--blue-soft);\n      color: #1d4ed8;\n      font-size: 11px;\n      font-weight: 900;\n      text-transform: uppercase;\n      white-space: nowrap;\n    }\n    .pill.first { background: var(--green-soft); color: var(--green); }\n    .pill.second { background: var(--purple-soft); color: var(--purple); }\n    .tables {\n      display: grid;\n      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);\n      gap: 10px;\n      margin-top: 10px;\n    }\n    .wide { grid-column: 1 / -1; }\n    .table-wrap {\n      width: 100%;\n      overflow-x: auto;\n    }\n    table {\n      width: 100%;\n      border-collapse: collapse;\n      table-layout: fixed;\n      font-size: 13px;\n    }\n    th, td {\n      padding: 9px 10px;\n      border-bottom: 1px solid #edf1f6;\n      text-align: left;\n      vertical-align: middle;\n    }\n    th {\n      background: #f8fafc;\n      color: #667085;\n      font-size: 11px;\n      font-weight: 900;\n      letter-spacing: .06em;\n      text-transform: uppercase;\n    }\n    td { font-weight: 800; }\n    .num {\n      text-align: right;\n      font-variant-numeric: tabular-nums;\n    }\n    .groups-editor {\n      display: grid;\n      grid-template-columns: minmax(0, 1fr) auto;\n      gap: 8px;\n      padding: 12px 14px;\n      background: #fbfcfe;\n      border-bottom: 1px solid var(--line);\n    }\n    .groups-editor textarea {\n      width: 100%;\n      min-height: 72px;\n      resize: vertical;\n      border: 1px solid #cfd7e3;\n      border-radius: 5px;\n      padding: 8px 10px;\n      color: var(--ink);\n      font-size: 13px;\n      line-height: 1.35;\n      outline: none;\n    }\n    .groups-editor textarea:focus {\n      border-color: var(--purple);\n      box-shadow: 0 0 0 2px rgba(124, 58, 237, .14);\n    }\n    .status-note {\n      padding: 10px 14px;\n      color: var(--muted);\n      font-size: 12px;\n      font-weight: 800;\n      background: #fbfcfe;\n      border-top: 1px solid #edf1f6;\n    }\n    .modal-backdrop {\n      position: fixed;\n      inset: 0;\n      z-index: 90;\n      display: none;\n      align-items: flex-start;\n      justify-content: center;\n      padding: 54px 16px 24px;\n      background: rgba(17, 24, 39, .54);\n ength) return '<div class=\"tip-note\">No clocked 1st or 2nd shift workers in this hour.</div>';\n      return bucket.people.map(function(worker) {\n        const shift = shiftLabels[worker.shift] || worker.shift || \"\";\n        return tipRow(worker.name + (shift ? \" - \" + shift : \"\"), fmt(worker.hours, 2) + \" hr\");\n      }).join(\"\");\n    }\n    function timelineTipHtml(row, bucket, value, text, isLunch) {\n      const title = bucket.label + \" - \" + row.label;\n      let html = '<div class=\"tip-title\">' + esc(title) + '</div>';\n      if (isLunch) {\n        html += '<div class=\"tip-note\">Lunch period - drag this one-hour block to move it.</div>';\n      }\n      if (row.label === \"People\") {\n        return html + '<div class=\"tip-main\">' + esc(String(bucket.people.length)) + ' people | ' + esc(fmt(bucket.laborHours, 2)) + ' labor hrs</div>' + peopleRowsHtml(bucket);\n      }\n      if (row.label === \"LPH\") {\n        const formula = fmt(bucket.lifts, 0) + \" lifts / \" + fmt(bucket.laborHours, 2) + \" labor hrs = \" + fmt(bucket.lph, 1) + \" LPH\";\n        return html + '<div class=\"tip-main\">' + esc(formula) + '</div>' + tipRow(\"Lifts\", fmt(bucket.lifts, 0)) + tipRow(\"Labor hours\", fmt(bucket.laborHours, 2)) + tipRow(\"People\", String(bucket.people.length)) + sourceRowsHtml(bucket);\n      }\n      if (row.label === \"Lifts\") {\n        return html + '<div class=\"tip-main\">' + esc(fmt(bucket.lifts, 0) + \" total lifts\") + '</div>' + sourceRowsHtml(bucket) + (bucket.note ? '<div class=\"tip-note\">' + esc(bucket.note) + '</div>' : \"\");\n      }\n      if (row.label === \"Lift Type\") {\n        return html + '<div class=\"tip-main\">' + esc(text || \"No lift type\") + '</div>' + sourceRowsHtml(bucket);\n      }\n      return html + '<div class=\"tip-main\">' + esc(text || value || \"-\") + '</div>';\n    }\n    function hourTipHtml(bucket, isLunch) {\n      let html = '<div class=\"tip-title\">' + esc(bucket.label) + '</div>';\n      if (isLunch) {\n        html += '<div class=\"tip-note\">Lunch period - click again to remove. Drag to another hour to move.</div>';\n      }\n      const formula = fmt(bucket.lifts, 0) + \" lifts / \" + fmt(bucket.laborHours, 2) + \" labor hrs = \" + fmt(bucket.lph, 1) + \" LPH\";\n      html += '<div class=\"tip-main\">' + esc(formula) + '</div>';\n      html += tipRow(\"People\", String(bucket.people.length));\n      html += tipRow(\"Lifts\", fmt(bucket.lifts, 0));\n      html += tipRow(\"Labor hours\", fmt(bucket.laborHours, 2));\n      html += sourceRowsHtml(bucket);\n      html += '<div class=\"tip-note\">Click this hour to add the selected one-hour marker.</div>';\n      return html;\n    }\n    function chartPath(points) {\n      return points.map(function(point, index) {\n        return (index ? \"L \" : \"M \") + point.x.toFixed(1) + \" \" + point.y.toFixed(1);\n      }).join(\" \");\n    }\n    function chartRuns(points) {\n      const runs = [];\n      let current = [];\n      points.forEach(function(point) {\n        if (point.active) {\n          current.push(point);\n        } else if (current.length) {\n          runs.push(current);\n          current = [];\n        }\n      });\n      if (current.length) runs.push(current);\n      return runs;\n    }\n    function chartAreaSegments(points, baseY) {\n      const html = [];\n      chartRuns(points).forEach(function(run) {\n        if (run.length === 1) {\n          const point = run[0];\n          const left = Math.max(0, point.x - 50);\n          const right = point.x + 50;\n          const fill = toneFill(point.tone);\n          html.push('<path class=\"chart-area\" d=\"M ' + left.toFixed(1) + ' ' + baseY.toFixed(1) + ' L ' + left.toFixed(1) + ' ' + point.y.toFixed(1) + ' L ' + right.toFixed(1) + ' ' + point.y.toFixed(1) + ' L ' + right.toFixed(1) + ' ' + baseY.toFixed(1) + ' Z\" fill=\"' + esc(fill) + '\" opacity=\".24\"></path>');\n          return;\n        }\n        for (let index = 0; index < run.length - 1; index += 1) {\n          const a = run[index];\n          const b = run[index + 1];\n          const left = index === 0 ? Math.max(0, a.x - 50) : a.x - 1;\n          const right = index === run.length - 2 ? b.x + 50 : b.x + 1;\n          const fill = toneFill(b.tone || a.tone);\n          const d = [\n            \"M\", left.toFixed(1), baseY.toFixed(1),\n            \"L\", left.toFixed(1), a.y.toFixed(1),\n            \"L\", a.x.toFixed(1), a.y.toFixed(1),\n            \"L\", b.x.toFixed(1), b.y.toFixed(1),\n            \"L\", right.toFixed(1), b.y.toFixed(1),\n            \"L\", right.toFixed(1), baseY.toFixed(1),\n            \"Z\"\n          ].join(\" \");\n          html.push('<path class=\"chart-area\" d=\"' + d + '\" fill=\"' + esc(fill) + '\" opacity=\".24\"></path>');\n        }\n      });\n      return html.join(\"\");\n    }\n    function chartGuide(y, cls, width) {\n      return '<line class=\"chart-guide ' + cls + '\" x1=\"0\" y1=\"' + y.toFixed(1) + '\" x2=\"' + width.toFixed(1) + '\" y2=\"' + y.toFixed(1) + '\"></line>';\n    }\n    function guideLabel(y, label, cls, side, placement) {\n      const isBelow = placement === \"below\";\n      const offset = cls === \"target\" ? 32 : 7;\n      const top = isBelow ? y + 18 : y - offset;\n      return '<span class=\"guide-label ' + cls + ' ' + side + (isBelow ? ' below' : '') + '\" style=\"top:' + top.toFixed(1) + 'px\">' + esc(label) + '</span>';\n    }\n    function targetPlacement(points, targetY) {\n      const active = points.filter(function(point) { return point.active; });\n      if (!active.length) return \"above\";\n      const tooClose = active.some(function(point) { return Math.abs(point.y - targetY) < 34; });\n      if (tooClose) return \"below\";\n      const nearby = active[active.length - 1];\n      return nearby.y <= targetY ? \"below\" : \"above\";\n    }\n    function pointMarker(point, formatter, cls, note) {\n      if (!point || !point.active) return \"\";\n s=\"timeline-lines\" viewBox=\"0 0 ' + chartWidth.toFixed(1) + ' 252\" preserveAspectRatio=\"none\" aria-hidden=\"true\">' +\n        chartGuide(lphTargetY, \"target\", chartWidth) +\n        chartGuide(liftTargetY, \"target\", chartWidth) +\n        chartAreaSegments(lphPoints, lphBase) +\n        chartAreaSegments(liftPoints, liftBase) +\n        chartRuns(lphPoints).map(function(run) { return '<path class=\"chart-line\" d=\"' + chartPath(run) + '\"></path>'; }).join(\"\") +\n        chartRuns(liftPoints).map(function(run) { return '<path class=\"chart-line\" d=\"' + chartPath(run) + '\"></path>'; }).join(\"\") +\n      '</svg>';\n      const guideLabels =\n        guideLabel(lphTargetY, \"2.1 target\", \"target\", \"left\", targetPlacement(lphPoints, lphTargetY)) +\n        guideLabel(liftTargetY, \"20 target\", \"target\", \"right\", targetPlacement(liftPoints, liftTargetY));\n      const columns = buckets.map(function(bucket, index) {\n        const isLunch = lunchHours.has(bucket.hour);\n        const isShiftChange = shiftChangeHours.has(bucket.hour);\n        const previousShiftClass = bucket.hour >= 0 && bucket.hour < 3 ? \"previous-shift previous-shift-\" + (bucket.hour === 0 ? \"start\" : bucket.hour === 2 ? \"end\" : \"mid\") : \"\";\n        const classes = [\"hour-column\", isLunch ? \"lunch-column\" : \"\", isShiftChange ? \"shift-change-column\" : \"\", previousShiftClass, selectedHour === bucket.hour ? \"selected\" : \"\"].filter(Boolean).join(\" \");\n        const markerHtml = (isLunch ? '<div class=\"marker-label\"><span class=\"lunch-marker\">Lunch</span></div>' : \"\") + (isShiftChange ? '<div class=\"marker-label\"><span class=\"shift-change-marker\">Shift Change</span></div>' : \"\");\n        const previousShiftHtml = bucket.hour === 0 ? '<span class=\"previous-shift-label\">Previous Shift</span>' : \"\";\n        const typeHtml = liftTypePills(bucket);\n        const peopleHtml = bucket.people.length ? '<strong>' + esc(bucket.people.length) + '</strong> ppl' : '&nbsp;';\n        const lphPoint = pointMarker(lphPoints[index], function(value) { return fmt(value, 1); }, \"lph\");\n        const liftPoint = pointMarker(liftPoints[index], function(value) { return fmt(value, 0); }, \"lifts\", liftPointNotes[String(bucket.hour)] || \"\");\n        return '<button type=\"button\" class=\"' + classes + '\" data-hour=\"' + bucket.hour + '\" data-lunch-position=\"' + bucket.hour + '\" data-tip=\"' + esc(hourTipHtml(bucket, isLunch)) + '\">' +\n          lphPoint +\n          liftPoint +\n          markerHtml +\n          previousShiftHtml +\n          '<div class=\"hour-label\">' + esc(displayHour(bucket.hour)) + '</div>' +\n          '<div class=\"people-count\">' + peopleHtml + '</div>' +\n          '<div class=\"chart-type-list\">' + typeHtml + '</div>' +\n        '</button>';\n      }).join(\"\");\n      const gapTargets = buckets.slice(0, -1).map(function(bucket, index) {\n        const position = normalizeLunchPeriod(bucket.hour + 0.5);\n        if (position == null) return \"\";\n        const activeLunch = lunchHours.has(position);\n        const activeShiftChange = shiftChangeHours.has(position);\n        const x = ((index + 1) / buckets.length * 100).toFixed(4) + \"%\";\n        const title = \"Timeline marker between \" + displayHour(bucket.hour) + \" and \" + displayHour(buckets[index + 1].hour);\n        return '<button type=\"button\" class=\"timeline-gap-button lunch-gap-button' + (activeLunch ? ' lunch-between' : '') + (activeShiftChange ? ' shift-change-between' : '') + '\" data-lunch-position=\"' + position + '\" data-marker-position=\"' + position + '\" style=\"--marker-x:' + x + '\" aria-label=\"' + esc(title) + '\" title=\"' + esc(title) + '\"><span class=\"lunch-marker\">Lunch</span><span class=\"shift-change-marker\">Shift Change</span></button>';\n      }).join(\"\");\n      document.getElementById(\"timeline\").innerHTML = svg + guideLabels + '<div class=\"timeline-grid\" style=\"--timeline-hours:' + buckets.length + '\">' + columns + gapTargets + '</div>';\n      document.getElementById(\"timelineMeta\").innerHTML = markerModeControlsHtml() + '<span class=\"timeline-legend-item\"><span class=\"legend-dot\" style=\"--legend:oklch(0.45 0.11 152)\"></span>On target</span><span class=\"timeline-legend-item\"><span class=\"legend-dot\" style=\"--legend:oklch(0.55 0.12 75)\"></span>Close</span><span class=\"timeline-legend-item\"><span class=\"legend-dot\" style=\"--legend:oklch(0.48 0.14 27)\"></span>Below</span><span class=\"timeline-legend-item\"><span class=\"legend-lunch\"></span>Lunch</span><span class=\"timeline-legend-item\"><span class=\"legend-shift-change\"></span>Shift Change</span>';\n      renderTypeLegend();\n    }\n    function workerEstimate(bucket, worker) {\n      if (!bucket || bucket.laborHours <= 0 || bucket.lifts <= 0) return 0;\n      return bucket.lifts * (worker.hours / bucket.laborHours);\n    }\n    function renderHourDetail(model) {\n      let hour = selectedHour;\n      if (hour == null) {\n        const firstActive = timelineBuckets(model).find(function(bucket) { return bucket.lifts > 0 || bucket.laborHours > 0; });\n        hour = firstActive ? firstActive.hour : timelineHourKeys[0];\n      }\n      selectedHour = hour;\n      const bucket = model.buckets[hour] || timelineBuckets(model)[0];\n      selectedHour = bucket.hour;\n      document.getElementById(\"hourTitle\").textContent = bucket.label;\n      document.getElementById(\"hourMeta\").textContent = fmt(bucket.laborHours, 2) + \" labor hrs | \" + fmt(bucket.lph, 1) + \" LPH\";\n      if (!bucket.people.length) {\n        document.getElementById(\"hourDetail\").innerHTML = '<div class=\"muted\">No clocked 1st or 2nd shift workers in this hour.</div>';\n        return;\n      }\n      document.getElementById(\"hourDetail\").innerHTML = '<div class=\"employee-list\">' + bucket.people.map(function(worker) {\n        const shiftClass = worker.shift === \"first\" ? \"first
