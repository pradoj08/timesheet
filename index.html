);\n      renderAnalytics();\n      const hoursDays = new Set(operationRows.filter((row) => row.manHours != null).map((row) => row.date)).size;\n      const suffix = failed.length ? ` Failed: ${failed.join(\", \")}` : \"\";\n      showToast(`Imported ${imported.length} timesheet row${imported.length === 1 ? \"\" : \"s\"}${hoursDays ? ` and man hours for ${hoursDays} day${hoursDays === 1 ? \"\" : \"s\"}` : \"\"}.${suffix}`);\n    });\n\n    [els.analyticsStart, els.analyticsEnd].forEach((el) => {\n      el.addEventListener(\"input\", renderAnalytics);\n      el.addEventListener(\"change\", renderAnalytics);\n    });\n    [els.groupMapBy, els.groupMapMetric, els.groupMapScale, els.groupMapMinLpmh, els.groupMapTarget, els.groupMapTargetFilter, els.groupMapSort, els.analyticsManager, els.analyticsShift].forEach((el) => {\n      el.addEventListener(\"input\", () => {\n        state.groupMapSelected = \"\";\n        renderAnalytics();\n      });\n      el.addEventListener(\"change\", () => {\n        state.groupMapSelected = \"\";\n        renderAnalytics();\n      });\n    });\n    els.groupMapReset.addEventListener(\"click\", () => {\n      state.groupMapSelected = \"\";\n      renderAnalytics();\n    });\n    els.groupMapViewToggle.addEventListener(\"click\", () => {\n      state.groupMapView = state.groupMapView === \"map\" ? \"table\" : \"map\";\n      persist();\n      renderAnalytics();\n    });\n\n    function currentMonth() {\n      const now = new Date();\n      return `${now.getFullYear()}-${pad2(now.getMonth() + 1)}`;\n    }\n\n    function load() {\n      try {\n        const saved = JSON.parse(localStorage.getItem(STORE_KEY) || localStorage.getItem(LEGACY_STORE_KEY) || \"null\");\n        if (saved && saved.data) {\n          state.month = saved.month || state.month;\n          state.data = saved.data || {};\n          state.moveDetails = Array.isArray(saved.moveDetails) ? saved.moveDetails.map((detail) => ({ note: \"\", ...detail, liftSource: detailLiftSource(detail) })) : [];\n          state.importedFiles = Array.isArray(saved.importedFiles) ? saved.importedFiles : [];\n          state.importedCells = Array.isArray(saved.importedCells) ? saved.importedCells : [];\n          state.lphHourSource = saved.lphHourSource === \"powerbi\" ? \"powerbi\" : \"timesheet\";\n          state.showExcludedCounts = !!saved.showExcludedCounts;\n          state.weekendHighlight = saved.weekendHighlight !== false;\n          state.analyticsRows = Array.isArray(saved.analyticsRows) ? saved.analyticsRows : [];\n          state.analyticsReviewRows = Array.isArray(saved.analyticsReviewRows) ? saved.analyticsReviewRows : [];\n          state.analyticsExcludedEmployees = Array.isArray(saved.analyticsExcludedEmployees) ? saved.analyticsExcludedEmployees : [];\n          state.analyticsExclusionReasons = saved.analyticsExclusionReasons && typeof saved.analyticsExclusionReasons === \"object\" ? saved.analyticsExclusionReasons : {};\n          state.managerNames = Array.isArray(saved.managerNames) ? saved.managerNames : [];\n          state.managerContextEnabled = !!saved.managerContextEnabled;\n          state.importedFiles = state.importedFiles.map((file) => file.type === \"analytics\" ? { dayManager: \"\", nightManager: \"\", ...file } : file);\n          state.groupMapView = saved.groupMapView || \"map\";\n          state.groupMapSelected = saved.groupMapSelected || \"\";\n          state.page = saved.page || \"operations\";\n          normalizeExistingTimesheetDates();\n          syncTimesheetManHoursFromAnalytics();\n        }\n      } catch (error) {\n        state.data = {};\n        state.moveDetails = [];\n      }\n    }\n\n    function persist() {\n      localStorage.setItem(STORE_KEY, JSON.stringify({\n        month: state.month,\n        data: state.data,\n        moveDetails: state.moveDetails,\n        importedFiles: state.importedFiles,\n        importedCells: state.importedCells,\n        lphHourSource: state.lphHourSource,\n        showExcludedCounts: state.showExcludedCounts,\n        weekendHighlight: state.weekendHighlight,\n        analyticsRows: state.analyticsRows,\n        analyticsReviewRows: state.analyticsReviewRows,\n        analyticsExcludedEmployees: state.analyticsExcludedEmployees,\n        analyticsExclusionReasons: state.analyticsExclusionReasons,\n        managerNames: state.managerNames,\n        managerContextEnabled: state.managerContextEnabled,\n        groupMapView: state.groupMapView,\n        groupMapSelected: state.groupMapSelected,\n        page: state.page\n      }));\n    }\n\n    function setPage(page) {\n      state.page = page;\n      els.operationsPage.classList.toggle(\"hidden\", page !== \"operations\");\n      els.analyticsPage.classList.toggle(\"hidden\", page !== \"analytics\");\n      els.operationsTab.classList.toggle(\"active\", page === \"operations\");\n      els.analyticsTab.classList.toggle(\"active\", page === \"analytics\");\n      persist();\n      if (page === \"analytics\") renderAnalytics();\n    }\n\n    function clearMonthSelection(type) {\n      const actions = {\n        lifts: { label: \"lifts\", fields: LIFT_FIELDS, clearMoveDetails: true },\n        manHours: { label: \"man hours\", fields: [\"manHours\"], clearMoveDetails: false },\n        powerBi: { label: \"PowerBI man hours\", fields: [\"powerBiManHours\"], clearMoveDetails: false }\n      };\n      const action = actions[type];\n      if (!action) return;\n      clearMonthFields(action);\n    }\n\n    function clearMonthFields({ label, fields, clearMoveDetails }) {\n      if (!confirm(`Clear ${label} for ${monthTitle(state.month)}?`)) return;\n      const fieldSet = new Set(fields);\n\n      Object.keys(state.data).forEach((key) => {\n        if (!key.startsWith(state.month)) return;\n        const record = { ...(state.data[key] || {}) };\n        fields.forEach((field) => delete record[field]);\n        if (Object.keys(record).length) state.data[key] = record;\n        else delete state.data[key];\n      });\n\n      state.importedCells = state.importedCells.filter((cell) => {\n        return !(String(cell.date || \"\").startsWith(state.month) && fieldSet.has(cell.field));\n      });\n\n      if (clearMoveDetails) {\n        state.moveDetails = state.moveDetails.filter((detail) => !String(detail.date || \"\").startsWith(state.month));\n      }\n\n      persist();\n      render();\n      renderAnalytics();\n      showToast(`Cleared ${label} for ${monthTitle(state.month)}`);\n    }\n\n    function setLphHourSource(source) {\n      state.lphHourSource = source === \"powerbi\" ? \"powerbi\" : \"timesheet\";\n      persist();\n      render();\n    }\n\n    function readArchiveHoursStore() {\n      try {\n        const archive = JSON.parse(localStorage.getItem(ARCHIVE_STORE_KEY) || \"{}\");\n        return archive && typeof archive === \"object\" && !Array.isArray(archive) ? archive : {};\n      } catch (error) {\n        localStorage.removeItem(ARCHIVE_STORE_KEY);\n        return {};\n      }\n    }\n\n    function archiveSnapshotLaborHours(snapshot) {\n      const shifts = snapshot && typeof snapshot === \"object\" ? snapshot.shifts : null;\n      if (!shifts || typeof shifts !== \"object\") return null;\n      const rows = [\"first\", \"second\"].flatMap((shift) => Array.isArray(shifts[shift]) ? shifts[shift] : []);\n      if (!rows.length) return null;\n      const total = rows.reduce((sum, row) => sum + (Number(row && row.actual) || 0), 0);\n      return Math.round(total * 100) / 100;\n    }\n\n    function pullManHoursFromArchive() {\n      const archive = readArchiveHoursStore();\n      const dates = Object.keys(archive).filter((date) => date.startsWith(state.month)).sort();\n      if (!dates.length) {\n        showToast(`No archived timesheets found for ${monthTitle(state.month)}.`);\n        return;\n      }\n\n      let updated = 0;\n      let skipped = 0;\n      dates.forEach((date) => {\n        const hours = archiveSnapshotLaborHours(archive[date]);\n        if (hours == null) {\n          skipped += 1;\n          return;\n        }\n        const record = { ...(state.data[date] || {}) };\n        if (hours > 0) record.manHours = hours;\n        else delete record.manHours;\n        if (Object.keys(record).length) state.data[date] = record;\n        else delete state.data[date];\n        updated += 1;\n      });\n\n      persist();\n      render();\n      renderAnalytics();\n      const skippedText = skipped ? ` (${skipped} archived day${skipped === 1 ? \"\" : \"s\"} skipped)` : \"\";\n      showToast(`Pulled archive man hours for ${updated} day${updated === 1 ? \"\" : \"s\"} in ${monthTitle(state.month)}${skippedText}.`);\n    }\n\n    function openFilesModal() {\n      renderFilesList();\n      els.filesModal.classList.remove(\"hidden\");\n      positionModalInViewport(els.filesModal);\n    }\n\n    function closeFilesModal() {\n      els.filesModal.classList.add(\"hidden\");\n      resetModalViewport(els.filesModal);\n      els.filesList.innerHTML = \"\";\n    }\n\n    function openAnalyticsEmployeesModal() {\n      renderAnalyticsEmployeesList();\n      els.analyticsEmployeesModal.classList.remove(\"hidden\");\n      positionModalInViewport(els.analyticsEmployeesModal);\n      requestAnimationFrame(function() {\n        els.analyticsEmployeeListFilter.focus({ preventScroll: true });\n      });\n    }\n\n    function closeAnalyticsEmployeesModal() {\n      els.analyticsEmployeesModal.classList.add(\"hidden\");\n      resetModalViewport(els.analyticsEmployeesModal);\n    }\n\n    function renderAnalyticsEmployeesList() {\n      const employees = analyticsEmployeeRows();\n      const filter = normalizeName(els.analyticsEmployeeListFilter.value || \"\");\n      const excluded = new Set(state.analyticsExcludedEmployees);\n      const filtered = (filter ? employees.filter((employee) => employee.key.includes(filter) || employee.name.toLowerCase().includes(filter)) : employees)\n        .sort((a, b) => {\n          const excludedDelta = Number(excluded.has(b.key)) - Number(excluded.has(a.key));\n          return excludedDelta || a.name.localeCompare(b.name);\n        });\n      els.analyticsEmployeesSubtitle.textContent = `${employees.length} employee${employees.length === 1 ? \"\" : \"s\"} available - ${excluded.size} excluded`;\n      if (!filtered.length) {\n        els.analyticsEmployeesList.innerHTML = `<div class=\"status-banner\">No employees match this filter.</div>`;\n        return;\n      }\n      const rows = filtered.map((employee) => {\n        const isExcluded = excluded.has(employee.key);\n        const reason = state.analyticsExclusionReasons[employee.key] || \"\";\n        return `\n          <tr>\n            <td>${escapeHtml(employee.name)}</td>\n            <td>${employee.shifts}</td>\n            <td>${formatNonZero(employee.hours, 2)}</td>\n            <td><span class=\"employee-state${isExcluded ? \" excluded\" : \"\"}\">${isExcluded ? \"Excluded\" : \"Included\"}</span></td>\n            <td><input class=\"exclusion-reason-input\" type=\"text\" placeholder=\"Reason\" value=\"${escapeHtml(reason)}\" data-exclusion-reason=\"${escapeHtml(employee.key)}\"${isExcluded ? \"\" : \" disabled\"}></td>\n            <td><button class=\"delete-row\" type=\"button\" data-toggle-analytics-employee=\"${escapeHtml(employee.key)}\">${isExcluded ? \"Include\" : \"Exclude\"}</button></td>\n          </tr>\n        `;\n      }).join(\"\");\n      els.analyticsEmployeesList.innerHTML = `<table class=\"employee-list\"><thead><tr><th>Employee</th><th>Shifts</th><th>Hours</th><th>Status</th><th>Reason</th><th>Action</th></tr></thead><tbody>${rows}</tbody></table>`;\n      els.analyticsEmployeesList.querySelectorAll(\"[data-toggle-analytics-employee]\").forEach((button) => {\n        button.addEventListener(\"click\", () => toggleAnalyticsEmployee(button.dataset.toggleAnalyticsEmployee));\n      });\n      els.analyticsEmployeesList.querySelectorAll(\"[data-exclusion-reason]\").forEach((input) => {\n        input.addEventListener(\"change\", () => setAnalyticsExclusionReason(input.dataset.exclusionReason, input.value));\n      });\n    }\n\n    function analyticsEmployeeRows() {\n      const employees = new Map();\n      state.analyticsRows.filter((row) => !isGateAnalyticsRow(row)).forEach((row) => {\n        if (!row.employee) return;\n        if (!employees.has(row.employee)) employees.set(row.employee, { key: row.employee, name: row.displayName || titleName(row.employee), shifts: 0, hours: 0 });\n        const item = employees.get(row.employee);\n        item.shifts += 1;\n        item.hours += row.hours || 0;\n      });\n      return Array.from(employees.values())\n        .map((employee) => ({ ...employee, hours: Math.round(employee.hours * 100) / 100 }))\n        .sort((a, b) => a.name.localeCompare(b.name));\n    }\n\n    function toggleAnalyticsEmployee(employeeKey) {\n      const excluded = new Set(state.analyticsExcludedEmployees);\n      if (excluded.has(employeeKey)) {\n        excluded.delete(employeeKey);\n        delete state.analyticsExclusionReasons[employeeKey];\n      } else {\n        excluded.add(employeeKey);\n      }\n      state.analyticsExcludedEmployees = Array.from(excluded).sort();\n      persist();\n      renderAnalytics();\n      renderAnalyticsEmployeesList();\n    }\n\n    function setAnalyticsExclusionReason(employeeKey, value) {\n      if (!employeeKey || !state.analyticsExcludedEmployees.includes(employeeKey)) return;\n      const reason = String(value || \"\").replace(/\\s+/g, \" \").trim();\n      if (reason) state.analyticsExclusionReasons[employeeKey] = reason;\n      else delete state.analyticsExclusionReasons[employeeKey];\n      persist();\n    }\n\n    function includeAllAnalyticsEmployees() {\n      state.analyticsExcludedEmployees = [];\n      state.analyticsExclusionReasons = {};\n      persist();\n      renderAnalytics();\n      renderAnalyticsEmployeesList();\n    }\n\n    function setFilesView(view) {\n      state.filesView = view;\n      renderFilesList();\n    }\n\n    function managerSelect(file, shift) {\n      const value = shift === \"day\" ? file.dayManager || \"\" : file.nightManager || \"\";\n      return `<input class=\"manager-select\" type=\"search\" list=\"managerNameOptions\" placeholder=\"Manager\" value=\"${escapeHtml(value)}\" data-manager-file=\"${escapeHtml(file.id)}\" data-manager-shift=\"${shift}\">`;\n    }\n\n    function bindManagerSelects(root) {\n      root.querySelectorAll(\"[data-manager-file]\").forEach((input) => {\n        input.addEventListener(\"change\", () => setTimesheetManager(input.dataset.managerFile, input.dataset.managerShift, input.value));\n      });\n    }\n\n    function setTimesheetManager(fileId, shift, value) {\n      const file = state.importedFiles.find((item) => item.id === fileId);\n      if (!file) return;\n      const name = cleanManagerName(value);\n      if (shift === \"day\") file.dayManager = name;\n      if (shift === \"night\") file.nightManager = name;\n      if (name) saveManagerName(name);\n      persist();\n      renderManagerControls();\n      renderAnalytics();\n    }\n\n    function saveManagerName(name) {\n      const cleaned = cleanManagerName(name);\n      if (!cleaned) return;\n      const byKey = new Map(managerNameList().map((item) => [normalizeName(item), item]));\n      byKey.set(normalizeName(cleaned), cleaned);\n      state.managerNames = Array.from(byKey.values()).sort((a, b) => a.localeCompare(b));\n    }\n\n    function cleanManagerName(name) {\n      return String(name || \"\").replace(/\\s+/g, \" \").trim();\n    }\n\n    function managerNameList() {\n      const names = (state.managerNames || []).map(cleanManagerName).filter(Boolean);\n      state.importedFiles\n        .filter((file) => file.type === \"analytics\")\n        .forEach((file) => {\n          [file.dayManager, file.nightManager].map(cleanManagerName).filter(Boolean).forEach((name) => names.push(name));\n        });\n      const byKey = new Map();\n      names.forEach((name) => {\n        if (!byKey.has(normalizeName(name))) byKey.set(normalizeName(name), name);\n      });\n      return Array.from(byKey.values()).sort((a, b) => a.localeCompare(b));\n    }\n\n    function renderManagerControls() {\n      const names = managerNameList();\n      const selected = els.analyticsManager.value || \"all\";\n      els.managerNameOptions.innerHTML = names.map((name) => `<option value=\"${escapeHtml(name)}\"></option>`).join(\"\");\n      els.analyticsManager.innerHTML = `<option value=\"all\">All managers</option><option value=\"compare\">Compare by manager</option><option value=\"unassigned\">Unassigned</option>${names.map((name) => `<option value=\"${escapeHtml(normalizeName(name))}\">${escapeHtml(name)}</option>`).join(\"\")}`;\n      if (Array.from(els.analyticsManager.options).some((option) => option.value === selected)) els.analyticsManager.value = selected;\n    }\n\n    function liftSourceLabel(source) {\n      source = normalizeSourceKey(source);\n      const labels = {\n        ihosa: \"IHOSA\",\n        mhoas: \"MHOAS\",\n        coh: \"COH\",\n        zlbho1: \"ZLBHO-13\",\n        zpbho: \"ZPBHO-15\",\n        zlbho2: \"ZLBHO-2\",\n        flips: \"Flips\",\n        ups_work: \"UPS\",\n        carryover: \"Carry-over\",\n        ramp: \"Ramp\",\n        deramp: \"Deramp\",\n        stacked: \"Stacked\",\n        unstacked: \"Unstacked\",\n        actual: \"Actual\"\n      };\n      const zlbMatch = String(source || \"\").match(/^zlbho(\\d+)$/i);\n      if (zlbMatch) return `ZLBHO-${zlbMatch[1]}`;\n      const zpbMatch = String(source || \"\").match(/^zpbho(\\d+)$/i);\n      if (zpbMatch) return `ZPBHO-${zpbMatch[1]}`;\n      return labels[source] || fieldLabel(source || \"actual\");\n    }\n\n    function cleanDropNumber(number, family) {\n      const digits = String(number || \"\").replace(/\\D/g, \"\").replace(/^0+/, \"\");\n      if (!digits) return \"\";\n      if (digits.length <= 2) return digits;\n      if (family === \"zlb\") {\n        if (digits.startsWith(\"13\")) return \"13\";\n        return digits[0];\n      }\n      if (family === \"zpb\") {\n        if (digits.startsWith(\"15\")) return \"15\";\n        return digits[0];\n      }\n      return digits.slice(0, 2);\n    }\n\n    function dropSourceKey(family, number) {\n      const cleaned = cleanDropNumber(number, family);\n      if (!cleaned) return \"\";\n      if (family === \"zlb\") {\n        if (cleaned === \"13\") return \"zlbho1\";\n        if (cleaned === \"2\") return \"zlbho2\";\n        return `zlbho${cleaned}`;\n      }\n      if (family === \"zpb\") {\n        if (cleaned === \"15\") return \"zpbho\";\n        return `zpbho${cleaned}`;\n      }\n      return \"\";\n    }\n\n    function numberedDropSourceKey(text) {\n      const raw = String(text || \"\");\n      const compact = raw.toLowerCase().replace(/[^a-z0-9]/g, \"\");\n      let match = raw.match(/\\bzlb(?:ho)?\\s*[-#]?\\s*(\\d{1,2})\\b/i) || compact.match(/zlb(?:ho)?(\\d+)/);\n      if (match) return dropSourceKey(\"zlb\", match[1]);\n      match = raw.match(/\\bzpb(?:ho)?\\s*[-#]?\\s*(\\d{1,2})\\b/i) || compact.match(/zpb(?:ho)?(\\d+)/);\n      if (match) return dropSourceKey(\"zpb\", match[1]);\n      return \"\";\n    }\n\n    function normalizeSourceKey(key) {\n      return numberedDropSourceKey(key) || String(key || \"\").trim();\n    }\n\n    function liftSourceKeyFor(field, equipment = \"\", sourceName = \"\", reason = \"\", train = \"\") {\n      const text = `${field || \"\"} ${equipment || \"\"} ${sourceName || \"\"} ${reason || \"\"} ${train || \"\"}`.toLowerCase();\n      const compact = text.replace(/[^a-z0-9]/g, \"\");\n      const numberedDrop = numberedDropSourceKey(text);\n      if (numberedDrop) return numberedDrop;\n      if (compact.includes(\"zlbho\")) return \"zlbho1\";\n      if (compact.includes(\"ihosa\") || compact.includes(\"mliho\") || compact.includes(\"iho\")) return \"ihosa\";\n      if (compact.includes(\"mhoas\") || compact.includes(\"yho37r\") || compact.includes(\"yho69r\") || /\\bmho\\b/i.test(text)) return \"mhoas\";\n      if (/\\bcoh\\b/i.test(text)) return \"coh\";\n      if (/\\bups\\b/i.test(text)) return \"ups_work\";\n      if (/carry/.test(text)) return \"carryover\";\n      if (/flip|stack/.test(String(field || \"\").toLowerCase()) || /flip|stack/.test(String(reason || \"\").toLowerCase())) return \"flips\";\n      if (field === \"ramp\" || field === \"deramp\" || field === \"stacked\" || field === \"unstacked\") return field;\n      return \"actual\";\n    }\n\n    function detailLiftSource(detail) {\n      const inferred = liftSourceKeyFor(detail?.field || detail?.__field, detail?.equipment || detail?.__equipment, detail?.fileName || detail?.source || detail?.__source, detail?.reason || detail?.__reason, detail?.train || detail?.__train);\n      if ((detail?.train || detail?.__train) && inferred && ![\"ramp\", \"deramp\", \"unstacked\", \"actual\"].includes(inferred)) return inferred;\n      if (detail && detail.liftSource) return normalizeSourceKey(detail.liftSource);\n      return inferred;\n    }\n\n    function liftSourceSummaryForFile(fileId) {\n      const counts = {};\n      state.moveDetails\n        .filter((detail) => detail.fileId === fileId && !detail.deleted)\n        .forEach((detail) => {\n          const source = detailLiftSource(detail);\n          counts[source] = (counts[source] || 0) + 1;\n        });\n      const rows = Object.entries(counts).sort((a, b) => b[1] - a[1]);\n      return rows.length\n        ? rows.map(([source, count]) => `<span class=\"source-chip\">${escapeHtml(liftSourceLabel(source))} ${count}</span>`).join(\"\")\n        : \"\";\n    }\n\n    function renderFilesList() {\n      els.filesLiftsTab.classList.toggle(\"active\", state.filesView === \"operations\");\n      els.filesTimesheetsTab.classList.toggle(\"active\", state.filesView === \"analytics\");\n      const files = state.importedFiles.filter((file) => file.type === state.filesView);\n      if (!files.length) {\n        const label = state.filesView === \"operations\" ? \"lift\" : \"timesheet\";\n        els.filesList.innerHTML = `<div class=\"status-banner\">No tracked ${label} uploads yet. Files imported before this feature was added cannot be removed by file.</div>`;\n        return;\n      }\n      const rows = files.slice().reverse().map((file) => {\n        const nameCell = state.filesView === \"analytics\" ? `<button class=\"file-preview-link\" type=\"button\" data-preview-timesheet=\"${file.id}\">${escapeHtml(file.name)}</button>` : escapeHtml(file.name);\n        const sourceCell = state.filesView === \"operations\" ? `<td>${liftSourceSummaryForFile(file.id)}</td>` : \"\";\n        const managerCells = state.filesView === \"analytics\" ? `\n          <td>${managerSelect(file, \"day\")}</td>\n          <td>${managerSelect(file, \"night\")}</td>\n        ` : \"\";\n        return `\n          <tr>\n            <td>${nameCell}</td>\n            <td>${file.rows || \"\"}</td>\n            ${sourceCell}\n            ${managerCells}\n            <td>${file.importedAt ? new Date(file.importedAt).toLocaleString() : \"\"}</td>\n            <td><button class=\"delete-row\" type=\"button\" data-remove-file=\"${file.id}\">Remove</button></td>\n          </tr>\n        `;\n      }).join(\"\");\n      const sourceHeader = state.filesView === \"operations\" ? \"<th>Sources</th>\" : \"\";\n      const managerHeaders = state.filesView === \"analytics\" ? \"<th>Day manager</th><th>Night manager</th>\" : \"\";\n      const tableClass = state.filesView === \"analytics\" ? \"file-list timesheet-file-list\" : \"file-list\";\n      els.filesList.innerHTML = `<table class=\"${tableClass}\"><thead><tr><th>File</th><th>Rows</th>${sourceHeader}${managerHeaders}<th>Imported</th><th>Action</th></tr></thead><tbody>${rows}</tbody></table>`;\n      bindManagerSelects(els.filesList);\n      els.filesList.querySelectorAll(\"[data-remove-file]\").forEach((button) => {\n        button.addEventListener(\"click\", () => removeImportedFile(button.dataset.removeFile));\n      });\n      els.filesList.querySelectorAll(\"[data-preview-timesheet]\").forEach((button) => {\n        button.addEventListener(\"click\", () => renderTimesheetFilePreview(button.dataset.previewTimesheet));\n      });\n    }\n\n    function renderTimesheetFilePreview(fileId) {\n      const file = state.importedFiles.find((item) => item.id === fileId);\n      if (!file) {\n        renderFilesList();\n        return;\n      }\n      const rows = state.analyticsRows\n        .filter((row) => row.fileId === fileId && !isGateAnalyticsRow(row))\n        .sort((a, b) => `${a.date}|${a.shift}|${a.rowNumber}`.localeCompare(`${b.date}|${b.shift}|${b.rowNumber}`));\n      const totalHours = rows.reduce((sum, row) => sum + (row.hours || 0), 0);\n      const dates = Array.from(new Set(rows.map((row) => row.date).filter(Boolean))).join(\", \");\n      const tableRows = rows.map((row) => [\n        row.date,\n        fieldLabel(row.shift),\n        row.displayName || titleName(row.employee),\n        formatNonZero(row.hours, 2),\n        timeLabel(row.start),\n        timeLabel(row.end),\n        row.rowNumber || \"\"\n      ]);\n      els.filesList.innerHTML = `\n        <div class=\"timesheet-preview-head\">\n          <div>\n            <div class=\"timesheet-preview-title\">${escapeHtml(file.name)}</div>\n            <div class=\"timesheet-preview-meta\">${rows.length} employee row${rows.length === 1 ? \"\" : \"s\"} - ${formatNonZero(totalHours, 2)} hours${dates ? ` - ${escapeHtml(dates)}` : \"\"}</div>\n          </div>\n          <div class=\"actions\">\n            <label class=\"filter-field\">Day manager${managerSelect(file, \"day\")}</label>\n            <label class=\"filter-field\">Night manager${managerSelect(file, \"night\")}</label>\n          </div>\n          <button id=\"backToFilesList\" class=\"bulk-action\" type=\"button\">Back to files</button>\n        </div>\n        ${rows.length ? analyticsTable([\"Date\", \"Shift\", \"Employee\", \"Hours\", \"Start\", \"End\", \"Row\"], tableRows) : `<div class=\"status-banner\">No parsed timesheet rows are stored for this file.</div>`}\n      `;\n      bindManagerSelects(els.filesList);\n      els.filesList.querySelector(\"#backToFilesList\").addEventListener(\"click\", renderFilesList);\n    }\n\n    function removeImportedFile(fileId) {\n      const affected = new Set();\n      state.moveDetails.filter((detail) => detail.fileId === fileId).forEach((detail) => affected.add(`${detail.date}|${detail.field}`));\n      state.importedCells.filter((cell) => cell.fileId === fileId).forEach((cell) => affected.add(`${cell.date}|${cell.field}`));\n      state.importedFiles = state.importedFiles.filter((file) => file.id !== fileId);\n      state.moveDetails = state.moveDetails.filter((detail) => detail.fileId !== fileId);\n      state.importedCells = state.importedCells.filter((cell) => cell.fileId !== fileId);\n      state.analyticsRows = state.analyticsRows.filter((row) => row.fileId !== fileId);\n      state.analyticsReviewRows = state.analyticsReviewRows.filter((row) => row.fileId !== fileId);\n\n      affected.forEach((key) => {\n        const [date, field] = key.split(\"|\");\n        if ([\"ramp\", \"deramp\", \"flip\", \"stacked\"].includes(field)) {\n          recalculateMoveCount(date, field);\n        } else {\n          const remaining = state.importedCells.filter((cell) => cell.date === date && cell.field === field);\n          const record = { ...(state.data[date] || {}) };\n          if (remaining.length) record[field] = importedCellValue(date, field, remaining);\n          else delete record[field];\n          state.data[date] = record;\n        }\n      });\n\n      persist();\n      render();\n      renderAnalytics();\n      renderFilesList();\n      showToast(\"Removed uploaded file\");\n    }\n\n    function exportOperationalWorkbook() {\n      if (!window.XLSX) {\n        showToast(\"Excel export parser is not loaded\");\n        return;\n      }\n\n      const workbook = window.XLSX.utils.book_new();\n      addDetailSheet(workbook, \"Ramps\", [\"ramp\"]);\n      addDetailSheet(workbook, \"Deramps\", [\"deramp\"]);\n      addDetailSheet(workbook, \"Stacking\", [\"stacked\", \"flip\"]);\n      addUnstackingSheet(workbook);\n\n      const safeMonth = state.month || currentMonth();\n      window.XLSX.writeFile(workbook, `operations-export-${safeMonth}.xlsx`);\n      showToast(\"Exported operations workbook\");\n    }\n\n    function addDetailSheet(workbook, sheetName, fields) {\n      const headers = [\"Date\", \"Type\", \"Equipment ID\", \"Train / Source\", \"Time\", \"Reason\", \"Lift Source\", \"Source File\", \"Source Row\", \"Excluded\", \"Notes\"];\n      const rows = state.moveDetails\n        .filter((detail) => fields.includes(detail.field))\n        .sort((a, b) => (a.date || \"\").localeCompare(b.date || \"\") || fieldLabel(a.field).localeCompare(fieldLabel(b.field)) || (a.time || \"\").localeCompare(b.time || \"\") || (a.equipment || \"\").localeCompare(b.equipment || \"\"))\n        .map((detail) => [\n          detail.date || \"\",\n          fieldLabel(detail.field),\n          detail.equipment || \"\",\n          detail.train || \"\",\n          detail.time || \"\",\n          detail.reason || \"\",\n          liftSourceLabel(detailLiftSource(detail)),\n          detail.fileName || detail.source || \"\",\n          detail.rowNumber || \"\",\n          detail.deleted ? \"Yes\" : \"No\",\n          detail.note || \"\"\n        ]);\n      appendSheet(workbook, sheetName, [headers].concat(rows));\n    }\n\n    function addUnstackingSheet(workbook) {\n      const headers = [\"Date\", \"Unstacked\", \"Excluded\", \"Notes\"];\n      const rows = Object.keys(state.data)\n        .filter((date) => typeof state.data[date].unstacked === \"number\" && state.data[date].unstacked !== 0)\n        .sort()\n        .map((date) => [date, state.data[date].unstacked, \"\", \"\"]);\n      appendSheet(workbook, \"Unstacking\", [headers].concat(rows));\n    }\n\n    function appendSheet(workbook, sheetName, rows) {\n      const sheet = window.XLSX.utils.aoa_to_sheet(rows);\n      const width = rows[0].map((header, index) => ({\n        wch: Math.max(String(header).length + 2, ...rows.slice(1).map((row) => String(row[index] == null ? \"\" : row[index]).length + 2), 12)\n      }));\n      sheet[\"!cols\"] = width;\n      if (rows.length > 1) sheet[\"!autofilter\"] = { ref: window.XLSX.utils.encode_range({ s: { r: 0, c: 0 }, e: { r: rows.length - 1, c: rows[0].length - 1 } }) };\n      window.XLSX.utils.book_append_sheet(workbook, sheet, sheetName);\n    }\n\n    function createImportId() {\n      return `${Date.now()}-${Math.random().toString(36).slice(2)}`;\n    }\n\n    function escapeHtml(value) {\n      return String(value == null ? \"\" : value).replace(/[&<>\"']/g, (char) => ({ \"&\": \"&amp;\", \"<\": \"&lt;\", \">\": \"&gt;\", '\"': \"&quot;\", \"'\": \"&#39;\" }[char]));\n    }\n\n    function render() {\n      const [year, month] = state.month.split(\"-\").map(Number);\n      const daysInMonth = new Date(year, month, 0).getDate();\n      const sums = Object.fromEntries(FIELDS.map((field) => [field, 0]));\n      const dailyStats = [];\n      let hasData = false;\n\n      els.monthInput.value = state.month;\n      els.excludedCountToggle.checked = state.showExcludedCounts;\n      els.weekendHighlightToggle.checked = state.weekendHighlight;\n      els.timesheetHoursSource.classList.toggle(\"active\", state.lphHourSource !== \"powerbi\");\n      els.powerBiHoursSource.classList.toggle(\"active\", state.lphHourSource === \"powerbi\");\n      setPage(state.page);\n      els.monthTitle.textContent = monthTitle(state.month);\n      els.tableBody.innerHTML = \"\";\n\n      for (let day = 1; day <= daysInMonth; day += 1) {\n        const key = `${year}-${pad2(month)}-${pad2(day)}`;\n        const record = state.data[key] || {};\n        const dailyLifts = operationLiftCount(record);\n        const lphHours = lphHoursForRecord(record);\n        const dayLpmh = lphHours > 0 ? dailyLifts / lphHours : null;\n        const date = new Date(year, month - 1, day);\n        const row = document.createElement(\"tr\");\n        if (state.weekendHighlight && (date.getDay() === 0 || date.getDay() === 6)) row.classList.add(\"weekend\");\n\n        row.append(dateCell(month, day, date));\n        row.append(moveCell(key, \"ramp\", record.ramp));\n        row.append(moveCell(key, \"deramp\", record.deramp));\n        row.append(totalCell(sum(record.ramp, record.deramp), \"moves-total\"));\n        row.append(detailCell(key, \"flip\", record.flip));\n        row.append(detailCell(key, \"stacked\", record.stacked));\n        row.append(inputCell(key, \"unstacked\", record.unstacked));\n        row.append(totalCell(sum(record.flip, record.stacked), \"stack-total\"));\n        row.append(inputCell(key, \"chUnstacked\", record.chUnstacked));\n        row.append(inputCell(key, \"chStacked\", record.chStacked));\n        row.append(totalCell(sum(record.chUnstacked, record.chStacked), \"chassis-total\"));\n        row.append(inputCell(key, \"manHours\", record.manHours, \"decimal\"));\n        row.append(inputCell(key, \"powerBiManHours\", record.powerBiManHours, \"decimal\"));\n        row.append(totalCell(dailyLifts, \"lph-total\"));\n        row.append(totalCell(dayLpmh, \"lph-total\", 2));\n\n        FIELDS.forEach((field) => {\n          if (typeof record[field] === \"number\") {\n            sums[field] += record[field];\n            hasData = true;\n          }\n        });\n        sums.lifts = (sums.lifts || 0) + dailyLifts;\n        if (dailyLifts > 0) hasData = true;\n        dailyStats.push({\n          key,\n          day,\n          label: `${SHORT_MONTHS[month - 1]} ${day} - ${DAY_NAMES[date.getDay()]}`,\n          lifts: dailyLifts,\n          manHours: lphHours || 0,\n          timesheetManHours: record.manHours || 0,\n          powerBiManHours: record.powerBiManHours || 0,\n          lpmh: dayLpmh\n        });\n\n        els.tableBody.append(row);\n      }\n\n      renderTotals(sums, dailyStats);\n      els.emptyNote.classList.toggle(\"hidden\", hasData);\n    }\n\n    function dateCell(month, day, date) {\n      const cell = document.createElement(\"td\");\n      cell.className = \"date-cell\";\n      cell.innerHTML = `<span class=\"day\">${SHORT_MONTHS[month - 1]} ${day}</span><span class=\"weekday\">${DAY_NAMES[date.getDay()]}</span>`;\n      return cell;\n    }\n\n    function inputCell(key, field, value, mode = \"numeric\") {\n      const cell = document.createElement(\"td\");\n      const input = document.createElement(\"input\");\n      input.className = \"cell-input\";\n      input.inputMode = mode;\n      input.value = typeof value === \"number\" ? String(value) : \"\";\n      input.addEventListener(\"change\", () => setCell(key, field, input.value));\n      cell.append(input);\n      return cell;\n    }\n\n    function moveCell(key, field, value) {\n      return detailCell(key, field, value);\n    }\n\n    function detailCell(key, field, value) {\n      const details = getMoveDetails(key, field);\n      if (!details.length) return inputCell(key, field, value);\n\n      const cell = document.createElement(\"td\");\n      const button = document.createElement(\"button\");\n      button.className = \"move-drill\";\n      button.type = \"button\";\n      button.textContent = detailValueLabel(key, field, value);\n      button.title = `Preview ${fieldLabel(field).toLowerCase()} rows`;\n      button.addEventListener(\"click\", () => openMoveModal(key, field));\n      cell.append(button);\n      return cell;\n    }\n\n    function detailValueLabel(date, field, value) {\n      const base = typeof value === \"number\" && value !== 0 ? String(value) : \"\";\n      const excluded = excludedUnitCount(date, field);\n      if (!state.showExcludedCounts || !excluded) return base;\n      return `${base} (${excluded})`;\n    }\n\n    function totalCell(value, className, digits = null) {\n      const cell = document.createElement(\"td\");\n      cell.className = `total-cell ${className}`;\n      cell.textContent = formatNonZero(value, digits);\n      return cell;\n    }\n\n    function operationLiftCount(record) {\n      return (record.ramp || 0) + (record.deramp || 0) + (record.flip || 0) + (record.stacked || 0) + (record.unstacked || 0);\n    }\n\n    function lphHoursForRecord(record) {\n      return state.lphHourSource === \"powerbi\" ? record.powerBiManHours || 0 : record.manHours || 0;\n    }\n\n    function renderTotals(sums, dailyStats = []) {\n      const moves = sums.ramp + sums.deramp;\n      const flipStack = sums.flip + sums.stacked;\n      const chassis = sums.chUnstacked + sums.chStacked;\n      const lphHours = state.lphHourSource === \"powerbi\" ? sums.powerBiManHours : sums.manHours;\n      const lpmh = lphHours > 0 ? sums.lifts / lphHours : null;\n      const values = [\n        \"Total\", sums.ramp, sums.deramp, moves, sums.flip, sums.stacked, sums.unstacked,\n        flipStack, sums.chUnstacked, sums.chStacked, chassis, sums.manHours, sums.powerBiManHours, sums.lifts, lpmh\n      ];\n\n      els.totalRow.innerHTML = \"\";\n      values.forEach((value, index) => {\n        const cell = document.createElement(\"td\");\n        cell.textContent = typeof value === \"number\" ? formatNonZero(value, index === 14 ? 2 : null) : value;\n        els.totalRow.append(cell);\n      });\n\n      els.summaryHours.textContent = formatNonZero(lphHours);\n      els.summaryHoursLabel.textContent = state.lphHourSource === \"powerbi\" ? \"PowerBI hours\" : \"Timesheet hours\";\n      els.summaryLifts.textContent = formatNonZero(sums.lifts);\n      els.summaryLpmh.textContent = formatNonZero(lpmh, 2);\n      renderLpmhBreakdown(dailyStats, sums, lpmh);\n    }\n\n    function renderLpmhBreakdown(dailyStats, sums, lpmh) {\n      const daysWithLpmh = dailyStats.filter((day) => day.lpmh != null && day.lpmh > 0);\n      const lphHours = state.lphHourSource === \"powerbi\" ? sums.powerBiManHours : sums.manHours;\n      els.summaryLpmh.textContent = formatNonZero(lpmh, 2);\n      els.summaryHours.textContent = formatNonZero(lphHours);\n      els.summaryHoursLabel.textContent = state.lphHourSource === \"powerbi\" ? \"PowerBI hours\" : \"Timesheet hours\";\n      els.summaryLifts.textContent = formatNonZero(sums.lifts);\n\n      const maxLpmh = Math.max(...daysWithLpmh.map((day) => day.lpmh), 0);\n      els.summaryBars.innerHTML = \"\";\n      dailyStats.forEach((day) => {\n        const bar = document.createElement(\"div\");\n        bar.className = \"spark-bar\";\n        if (day.lpmh && maxLpmh && day.lpmh >= maxLpmh) bar.classList.add(\"strong\");\n        const height = day.lpmh && maxLpmh ? Math.max(8, Math.round((day.lpmh / maxLpmh) * 44)) : 4;\n        bar.style.height = `${height}px`;\n        bar.title = day.lpmh ? `${day.label}: ${format(day.lpmh, 2)}` : day.label;\n        els.summaryBars.append(bar);\n      });\n\n      const best = daysWithLpmh.slice().sort((a, b) => b.lpmh - a.lpmh)[0];\n      const low = daysWithLpmh.slice().sort((a, b) => a.lpmh - b.lpmh)[0];\n      renderRankRow(els.bestDayRow, \"Best day\", best, false);\n      renderRankRow(els.lowDayRow, \"Low day\", low, true);\n\n      const recent = dailyStats.filter((day) => day.lpmh != null || day.lifts || day.manHours).slice(-7).reverse();\n      els.recentDays.innerHTML = \"\";\n      recent.forEach((day, index) => {\n        const previous = recent[index + 1];\n        const delta = previous && day.lpmh != null && previous.lpmh != null ? day.lpmh - previous.lpmh : null;\n        const row = document.createElement(\"div\");\n        row.className = \"history-row\";\n        const deltaText = delta == null || Math.abs(delta) < 0.005 ? \"0.00\" : format(Math.abs(delta), 2);\n        const deltaClass = delta == null || Math.abs(delta) < 0.005 ? \"down\" : delta > 0 ? \"up\" : \"down\";\n        const deltaArrow = delta == null || Math.abs(delta) < 0.005 ? \"-\" : delta > 0 ? \"+\" : \"-\";\n        row.innerHTML = `<span class=\"history-date\">${day.label}</span><span><span class=\"history-value\">${formatNonZero(day.lpmh, 2)}</span>${day.lpmh == null ? \"\" : `<span class=\"delta ${deltaClass}\">${deltaArrow} ${deltaText}</span>`}</span>`;\n        els.recentDays.append(row);\n      });\n    }\n\n    function renderRankRow(el, label, day, low) {\n      el.innerHTML = \"\";\n      const left = document.createElement(\"span\");\n      left.className = \"rank-label\";\n      left.innerHTML = `<span class=\"dot ${low ? \"low\" : \"\"}\"></span>${label}`;\n      const right = document.createElement(\"span\");\n      right.className = \"rank-value\";\n      right.textContent = day ? `${day.label.split(\" - \")[0]} - ${format(day.lpmh, 2)}` : \"\";\n      el.append(left, right);\n    }\n\n    function setCell(key, field, rawValue) {\n      const value = String(rawValue || \"\").trim();\n      const data = { ...(state.data[key] || {}) };\n\n      if (value === \"\") {\n        delete data[field];\n      } else {\n        const number = Number.parseFloat(value.replace(/,/g, \"\"));\n        if (Number.isNaN(number)) return;\n        data[field] = number;\n      }\n\n      state.data[key] = data;\n      persist();\n      render();\n    }\n\n    function importRows(rows, details = []) {\n      const monthCounts = {};\n      const affectedMoveCells = new Set();\n\n      if (details.length) {\n        state.moveDetails = state.moveDetails.concat(details);\n        details.forEach((detail) => affectedMoveCells.add(`${detail.date}|${detail.field}`));\n      }\n\n      rows.forEach((row) => {\n        const record = { ...(state.data[row.date] || {}) };\n        let touched = false;\n\n        FIELDS.forEach((field) => {\n          if (row[field] != null) {\n            if (row.__fileId) state.importedCells.push({ fileId: row.__fileId, fileName: row.__fileName || \"\", date: row.date, field, value: row[field], additive: field === \"manHours\" && row.__additiveManHours });\n            record[field] = field === \"manHours\" && row.__additiveManHours ? importedCellValue(row.date, field) : row[field];\n            touched = true;\n          }\n        });\n\n        if (touched) {\n          state.data[row.date] = record;\n          const month = row.date.slice(0, 7);\n          monthCounts[month] = (monthCounts[month] || 0) + 1;\n        }\n      });\n\n      affectedMoveCells.forEach((key) => {\n        const [date, field] = key.split(\"|\");\n        recalculateMoveCount(date, field);\n      });\n\n      const bestMonth = Object.entries(monthCounts).sort((a, b) => b[1] - a[1])[0];\n      if (bestMonth) state.month = bestMonth[0];\n      persist();\n      render();\n    }\n\n    function importedCellValue(date, field, cells = null) {\n      const relevant = cells || state.importedCells.filter((cell) => cell.date === date && cell.field === field);\n      if (!relevant.length) return null;\n      if (field === \"manHours\" && relevant.some((cell) => cell.additive)) {\n        const total = relevant.filter((cell) => cell.additive).reduce((sum, cell) => sum + (Number(cell.value) || 0), 0);\n        return Math.round(total * 100) / 100;\n      }\n      return relevant[relevant.length - 1].value;\n    }\n\n    function normalizeExistingTimesheetDates() {\n      const dateByFile = new Map();\n      state.importedFiles.filter((file) => file.type === \"analytics\").forEach((file) => {\n        const date = dateFromFilename(file.name);\n        if (date) dateByFile.set(file.id, date);\n      });\n      if (!dateByFile.size) return;\n\n      const affected = new Set();\n      state.analyticsRows = state.analyticsRows.map((row) => {\n        const date = dateByFile.get(row.fileId);\n        if (!date || row.date === date) return row;\n        affected.add(row.date);\n        affected.add(date);\n        return { ...row, date };\n      });\n      state.analyticsReviewRows = state.analyticsReviewRows.map((row) => {\n        const date = dateByFile.get(row.fileId);\n        return date && row.date && row.date !== date ? { ...row, date } : row;\n      });\n      state.importedCells = state.importedCells.map((cell) => {\n        const date = dateByFile.get(cell.fileId);\n        if (!date || cell.field !== \"manHours\" || cell.date === date) return cell;\n        affected.add(cell.date);\n        affected.add(date);\n        return { ...cell, date };\n      });\n\n      affected.forEach((date) => {\n        const record = { ...(state.data[date] || {}) };\n        const value = importedCellValue(date, \"manHours\");\n        if (value == null) delete record.manHours;\n        else record.manHours = value;\n        state.data[date] = record;\n      });\n      if (affected.size) persist();\n    }\n\n    function syncTimesheetManHoursFromAnalytics() {\n      const trackedTimesheets = new Set(state.importedFiles.filter((file) => file.type === \"analytics\").map((file) => file.id));\n      if (!trackedTimesheets.size) return;\n      const existing = new Set(state.importedCells.filter((cell) => cell.field === \"manHours\").map((cell) => `${cell.fileId}|${cell.date}`));\n      const grouped = new Map();\n      state.analyticsRows.filter((row) => row.fileId && trackedTimesheets.has(row.fileId) && !isGateAnalyticsRow(row)).forEach((row) => {\n        if (!row.date || !(row.hours > 0)) return;\n        const key = `${row.fileId}|${row.date}`;\n        if (existing.has(key)) return;\n        grouped.set(key, (grouped.get(key) || 0) + row.hours);\n      });\n      grouped.forEach((hours, key) => {\n        const [fileId, date] = key.split(\"|\");\n        const file = state.importedFiles.find((item) => item.id === fileId);\n        state.importedCells.push({ fileId, fileName: file?.name || \"\", date, field: \"manHours\", value: Math.round(hours * 100) / 100, additive: true });\n      });\n      const affectedDates = new Set(Array.from(grouped.keys()).map((key) => key.split(\"|\")[1]));\n      affectedDates.forEach((date) => {\n        const record = { ...(state.data[date] || {}) };\n        record.manHours = importedCellValue(date, \"manHours\");\n        state.data[date] = record;\n      });\n      if (grouped.size) persist();\n    }\n\n    function prepareImportRows(rows) {\n      const moveRows = rows.filter((row) => row.__kind === \"equipmentMove\" || row.__kind === \"detailMove\");\n      const directRows = rows.filter((row) => row.__kind !== \"equipmentMove\" && row.__kind !== \"detailMove\");\n      if (!moveRows.length) return { rows: directRows, details: [], skippedDuplicates: 0, uniqueMoveRows: 0 };\n\n      const seen = new Map();\n      const duplicates = [];\n      moveRows.forEach((row) => {\n        const source = row.__liftSource || liftSourceKeyFor(row.__field, row.__equipment, row.__source, row.__reason, row.__train);\n        const key = `${row.date}|${row.__field}|${source}|${row.__equipment}|${row.__train || \"\"}`;\n        if (seen.has(key)) {\n          duplicates.push({ current: row, first: seen.get(key) });\n        } else {\n          seen.set(key, row);\n        }\n      });\n\n      const counts = new Map();\n      const counted = new Set();\n      let skippedDuplicates = 0;\n      let uniqueMoveRows = 0;\n\n      moveRows.forEach((row) => {\n        const source = row.__liftSource || liftSourceKeyFor(row.__field, row.__equipment, row.__source, row.__reason, row.__train);\n        const duplicateKey = `${row.date}|${row.__field}|${source}|${row.__equipment}|${row.__train || \"\"}`;\n        if (counted.has(duplicateKey)) {\n          skippedDuplicates += 1;\n        } else {\n          counted.add(duplicateKey);\n          uniqueMoveRows += 1;\n\n          const countKey = `${row.date}|${row.__field}`;\n          const existing = counts.get(countKey) || { date: row.date, [row.__field]: 0 };\n          existing[row.__field] += 1;\n          counts.set(countKey, existing);\n        }\n      });\n\n      const details = moveRows.map((row, index) => ({\n        id: `${Date.now()}-${index}-${Math.random().toString(36).slice(2)}`,\n        date: row.date,\n        field: row.__field,\n        equipment: row.__equipment,\n        time: row.__time,\n        train: row.__train || \"\",\n        liftSource: row.__liftSource || liftSourceKeyFor(row.__field, row.__equipment, row.__source, row.__reason, row.__train),\n        source: row.__source,\n        fileId: row.__fileId || \"\",\n        fileName: row.__fileName || row.__source || \"\",\n        sheet: row.__sheet,\n        rowNumber: row.__rowNumber,\n        reason: row.__reason || \"\",\n        note: \"\",\n        deleted: false\n      }));\n\n      return { rows: directRows.concat(Array.from(counts.values())), details, skippedDuplicates, uniqueMoveRows };\n    }\n\n    function getMoveDetails(date, field) {\n      return state.moveDetails.filter((detail) => detail.date === date && detail.field === field);\n    }\n\n    function activeMoveDetails(date, field) {\n      return getMoveDetails(date, field).filter((detail) => !detail.deleted);\n    }\n\n    function duplicateEquipmentSet(details) {\n      const counts = new Map();\n      details.filter((detail) => !detail.deleted).forEach((detail) => {\n        counts.set(detail.equipment, (counts.get(detail.equipment) || 0) + 1);\n      });\n      return new Set(Array.from(counts.entries()).filter((entry) => entry[1] > 1).map((entry) => entry[0]));\n    }\n\n    function openMoveModal(date, field) {\n      state.previewDate = date;\n      state.previewField = field;\n      state.selectedDetailIds = new Set(Array.from(state.selectedDetailIds).filter((id) => getMoveDetails(date, field).some((detail) => detail.id === id)));\n      const label = fieldLabel(field);\n      const details = getMoveDetails(date, field);\n      const activeDetails = details.filter((detail) => !detail.deleted);\n      const hasReasons = details.some((detail) => String(detail.reason || \"\").trim());\n      if (!hasReasons) state.reasonFilter = \"all\";\n      const visibleDetails = details.filter((detail) => {\n        if (hasReasons && state.reasonFilter !== \"all\" && reasonKey(detail.reason) !== state.reasonFilter) return false;\n        if (state.previewFilter === \"included\") return !detail.deleted;\n        if (state.previewFilter === \"excluded\") return detail.deleted;\n        return true;\n      });\n      const duplicateSet = duplicateEquipmentSet(details);\n\n      populateReasonFilter(details);\n      els.reasonHeader.classList.toggle(\"hidden\", !hasReasons);\n      els.reasonFilterLabel.classList.toggle(\"hidden\", !hasReasons);\n      els.reasonFilter.classList.toggle(\"hidden\", !hasReasons);\n      els.previewFilter.value = state.previewFilter;\n      els.reasonFilter.value = state.reasonFilter;\n      els.moveModalTitle.textContent = `${label} Preview`;\n      els.moveModalSubtitle.textContent = `${date} - ${uniqueEquipmentCount(activeDetails)} included units - ${excludedUnitCount(date, field)} excluded units - select rows, then include or exclude them`;\n      els.moveModalBody.innerHTML = \"\";\n\n      if (!visibleDetails.length) {\n        const row = document.createElement(\"tr\");\n        const cell = document.createElement(\"td\");\n        cell.colSpan = hasReasons ? 10 : 9;\n        cell.textContent = details.length ? \"No rows match this filter.\" : \"No imported row details are saved for this value.\";\n        row.append(cell);\n        els.moveModalBody.append(row);\n      } else {\n        visibleDetails.forEach((detail) => {\n          const isDuplicate = duplicateSet.has(detail.equipment);\n          const row = document.createElement(\"tr\");\n          if (isDuplicate) row.classList.add(\"duplicate-row\");\n          if (detail.deleted) row.classList.add(\"deleted-row\");\n          if (state.selectedDetailIds.has(detail.id)) row.classList.add(\"selected-row\");\n          row.addEventListener(\"mousedown\", (event) => {\n            if (event.target.closest(\"input, button\")) return;\n            event.preventDefault();\n            state.draggingSelect = true;\n            state.dragSelectValue = !state.selectedDetailIds.has(detail.id);\n            setDetailSelected(detail.id, state.dragSelectValue);\n            row.classList.toggle(\"selected-row\", state.dragSelectValue);\n            const checkbox = row.querySelector('input[type=\"checkbox\"]');\n            if (checkbox) checkbox.checked = state.dragSelectValue;\n          });\n          row.addEventListener(\"mouseenter\", () => {\n            if (!state.draggingSelect) return;\n            setDetailSelected(detail.id, state.dragSelectValue);\n            row.classList.toggle(\"selected-row\", state.dragSelectValue);\n            const checkbox = row.querySelector('input[type=\"checkbox\"]');\n            if (checkbox) checkbox.checked = state.dragSelectValue;\n          });\n\n          row.append(selectCell(detail.id));\n          row.append(previewCell(detail.equipment));\n          row.append(previewCell(detail.train || \"\"));\n          row.append(previewCell(detail.time || \"\"));\n          if (hasReasons) row.append(previewCell(detail.reason || \"\"));\n          row.append(previewCell(liftSourceLabel(detailLiftSource(detail))));\n          row.append(previewCell(detail.source || \"\"));\n          row.append(previewCell(detail.rowNumber || \"\"));\n          row.append(noteCell(detail.id, detail.note || \"\"));\n\n          const actionCell = document.createElement(\"td\");\n          const button = document.createElement(\"button\");\n          button.className = \"delete-row\";\n          button.type = \"button\";\n          button.textContent = detail.deleted ? \"Include\" : \"Exclude\";\n          button.addEventListener(\"click\", (event) => {\n            event.stopPropagation();\n            toggleMoveDetail(detail.id, date, field);\n          });\n          actionCell.append(button);\n          row.append(actionCell);\n\n          els.moveModalBody.append(row);\n        });\n      }\n\n      els.moveModal.classList.remove(\"hidden\");\n      positionMoveModalInViewport();\n    }\n\n    function resetModalViewport(modal) {\n      if (!modal) return;\n      modal.classList.remove(\"embedded-viewport\");\n      modal.style.removeProperty(\"--preview-top\");\n      modal.style.removeProperty(\"--preview-height\");\n    }\n\n    function positionModalInViewport(modal) {\n      resetModalViewport(modal);\n      if (!modal || window.parent === window || !window.frameElement) return;\n      try {\n        const rect = window.frameElement.getBoundingClientRect();\n        const top = Math.max(0, -rect.top);\n        const height = Math.max(360, window.parent.innerHeight || window.innerHeight || 720);\n        modal.style.setProperty(\"--preview-top\", top + \"px\");\n        modal.style.setProperty(\"--preview-height\", height + \"px\");\n        modal.classList.add(\"embedded-viewport\");\n      } catch (error) {\n        resetModalViewport(modal);\n      }\n    }\n\n    function positionMoveModalInViewport() {\n      positionModalInViewport(els.moveModal);\n    }\n\n    function closeMoveModal() {\n      els.moveModal.classList.add(\"hidden\");\n      resetModalViewport(els.moveModal);\n      els.moveModalBody.innerHTML = \"\";\n      state.previewDate = \"\";\n      state.previewField = \"\";\n    }\n\n    function previewCell(value) {\n      const cell = document.createElement(\"td\");\n      cell.textContent = String(value == null ? \"\" : value);\n      return cell;\n    }\n\n    function selectCell(id) {\n      const cell = document.createElement(\"td\");\n      cell.className = \"select-cell\";\n      const checkbox = document.createElement(\"input\");\n      checkbox.type = \"checkbox\";\n      checkbox.checked = state.selectedDetailIds.has(id);\n      checkbox.addEventListener(\"click\", (event) => event.stopPropagation());\n      checkbox.addEventListener(\"change\", () => {\n        setDetailSelected(id, checkbox.checked);\n        checkbox.closest(\"tr\")?.classList.toggle(\"selected-row\", checkbox.checked);\n      });\n      cell.append(checkbox);\n      return cell;\n    }\n\n    function setDetailSelected(id, selected) {\n      if (selected) state.selectedDetailIds.add(id);\n      else state.selectedDetailIds.delete(id);\n    }\n\n    function applyBulkMoveDetailState(deleted) {\n      if (!state.selectedDetailIds.size || !state.previewDate || !state.previewField) return;\n      const selected = new Set(state.selectedDetailIds);\n      state.moveDetails = state.moveDetails.map((detail) => selected.has(detail.id) ? { ...detail, deleted } : detail);\n      recalculateMoveCount(state.previewDate, state.previewField);\n      state.selectedDetailIds.clear();\n      persist();\n      render();\n      openMoveModal(state.previewDate, state.previewField);\n    }\n\n    function populateReasonFilter(details) {\n      const reasons = new Map();\n      details.forEach((detail) => {\n        const label = String(detail.reason || \"\").trim() || \"No reason\";\n        reasons.set(reasonKey(label), label);\n      });\n\n      const current = reasons.has(state.reasonFilter) ? state.reasonFilter : \"all\";\n      state.reasonFilter = current;\n      els.reasonFilter.innerHTML = \"\";\n      const all = document.createElement(\"option\");\n      all.value = \"all\";\n      all.textContent = \"All reasons\";\n      els.reasonFilter.append(all);\n\n      Array.from(reasons.entries()).sort((a, b) => a[1].localeCompare(b[1])).forEach(([key, label]) => {\n        const option = document.createElement(\"option\");\n        option.value = key;\n        option.textContent = label;\n        els.reasonFilter.append(option);\n      });\n    }\n\n    function reasonKey(reason) {\n      return normalizeHeader(reason || \"noreason\") || \"noreason\";\n    }\n\n    function noteCell(id, note) {\n      const cell = document.createElement(\"td\");\n      const input = document.createElement(\"input\");\n      input.className = \"note-input\";\n      input.value = note;\n      input.placeholder = \"Add note\";\n      input.addEventListener(\"click\", (event) => event.stopPropagation());\n      input.addEventListener(\"change\", () => setMoveDetailNote(id, input.value));\n      cell.append(input);\n      return cell;\n    }\n\n    function setMoveDetailNote(id, note) {\n      state.moveDetails = state.moveDetails.map((detail) => detail.id === id ? { ...detail, note } : detail);\n      persist();\n    }\n    function toggleMoveDetail(id, date, field) {\n      state.moveDetails = state.moveDetails.map((detail) => detail.id === id ? { ...detail, deleted: !detail.deleted } : detail);\n      recalculateMoveCount(date, field);\n      persist();\n      render();\n      openMoveModal(date, field);\n    }\n\n    function recalculateMoveCount(date, field) {\n      const record = { ...(state.data[date] || {}) };\n      record[field] = uniqueEquipmentCount(activeMoveDetails(date, field));\n      state.data[date] = record;\n    }\n\n    function uniqueEquipmentCount(details) {\n      return new Set(details.map((detail) => detail.equipment).filter(Boolean)).size;\n    }\n\n    function excludedUnitCount(date, field) {\n      return uniqueEquipmentCount(getMoveDetails(date, field).filter((detail) => detail.deleted));\n    }\n\n    function fieldLabel(field) {\n      return {\n        ramp: \"Ramp\",\n        deramp: \"Deramp\",\n        flip: \"Flip\",\n        stacked: \"Stacked\",\n        manHours: \"Man Hours\",\n        powerBiManHours: \"PowerBI Man Hours\"\n      }[field] || field;\n    }\n\n    async function parseAnalyticsTimesheetFile(file) {\n      const review = [];\n      const rows = [];\n      if (isWorkbookFile(file.name)) {\n        if (!window.XLSX) throw new Error(\"Excel parser not loaded\");\n        const workbook = window.XLSX.read(await file.arrayBuffer(), { cellDates: true });\n        workbook.SheetNames.forEach((name) => {\n          const sheetRows = window.XLSX.utils.sheet_to_json(workbook.Sheets[name], { header: 1, raw: true, defval: \"\" });\n          const parsed = extractAnalyticsTimesheetRows(sheetRows, file.name, name);\n          rows.push(...parsed.rows);\n          review.push(...parsed.review);\n        });\n      } else {\n        const parsed = extractAnalyticsTimesheetRows(parseCSV(await file.text()), file.name, \"CSV\");\n        rows.push(...parsed.rows);\n        review.push(...parsed.review);\n      }\n      return { rows, review };\n    }\n\n    function extractAnalyticsTimesheetRows(rows, sourceName, sheetName) {\n      const scheduled = extractStructuredTimesheetRows(rows, sourceName, sheetName);\n      if (scheduled.rows.length || scheduled.review.length) return scheduled;\n      return extractMappedTimesheetRows(rows, sourceName, sheetName);\n    }\n\n    function extractStructuredTimesheetRows(rows, sourceName, sheetName) {\n      const out = [];\n      const review = [];\n      const date = findTimesheetDate(rows, sourceName);\n      if (!date) return { rows: [], review: [] };\n      let actualIndex = -1;\n      let startIndex = -1;\n      let endIndex = -1;\n      let parsedAnySection = false;\n\n      for (let i = 0; i < rows.length; i += 1) {\n        const headers = (rows[i] || []).map(normalizeHeader);\n        const firstNorm = normalizeHeader(rows[i]?.[0]);\n        const sectionShift = firstNorm.includes(\"stshift\") ? \"first\" : firstNorm.includes(\"ndshift\") ? \"second\" : \"\";\n        const columns = timesheetSectionColumns(rows[i] || []);\n        if (!sectionShift || columns.actual < 0) continue;\n\n        parsedAnySection = true;\n        actualIndex = columns.actual;\n        startIndex = columns.start;\n        endIndex = columns.end;\n\n        for (let r = i + 1; r < rows.length; r += 1) {\n          const row = rows[r] || [];\n          const first = String(row[0] == null ? \"\" : row[0]).trim();\n          const rowFirstNorm = normalizeHeader(first);\n          if (isTimesheetSectionHeader(rowFirstNorm)) break;\n          if (!first || /^off\\s*-/i.test(first) || /select|total|manager/i.test(first)) continue;\n          const hours = numberValue(row[actualIndex]);\n          const start = timeMinutes(row[startIndex]);\n          const end = timeMinutes(row[endIndex]);\n          if (!(hours > 0) && (start == null || end == null)) {\n            if (first && !/missing/i.test(String(row[startIndex] || \"\"))) review.push({ source: sourceName, sheet: sheetName, row: r + 1, issue: \"Missing hours and shift times\", value: first });\n            continue;\n          }\n          out.push({\n            id: `${sourceName}-${sheetName}-${r + 1}-${normalizeName(first)}`,\n            source: sourceName,\n            sheet: sheetName,\n            rowNumber: r + 1,\n            role: \"operations\",\n            date,\n            employee: normalizeName(first),\n            displayName: titleName(first),\n            shift: sectionShift,\n            start,\n            end,\n            hours: hours > 0 ? Math.round(hours * 100) / 100 : hoursBetween(start, end)\n          });\n        }\n      }\n      if (!parsedAnySection) return { rows: [], review: [] };\n      return { rows: out, review };\n    }\n\n    function extractMappedTimesheetRows(rows, sourceName, sheetName) {\n      const review = [];\n      let headerIndex = -1;\n      let map = {};\n      for (let i = 0; i < Math.min(rows.length, 20); i += 1) {\n        const headers = (rows[i] || []).map(normalizeHeader);\n        const nameIndex = headers.findIndex((h) => [\"employeename\", \"employee\", \"name\"].includes(h));\n        const dateIndex = headers.findIndex((h) => [\"workdate\", \"date\"].includes(h));\n        if (nameIndex >= 0 && dateIndex >= 0) {\n          headerIndex = i;\n          map = {\n            name: nameIndex,\n            date: dateIndex,\n            shift: headers.findIndex((h) => h === \"shift\"),\n            start: headers.findIndex((h) => [\"starttime\", \"start\"].includes(h)),\n            end: headers.findIndex((h) => [\"endtime\", \"end\"].includes(h)),\n            hours: headers.findIndex((h) => [\"hoursworked\", \"hours\", \"actual\"].includes(h))\n          };\n          break;\n        }\n      }\n      if (headerIndex < 0) return { rows: [], review };\n      const out = [];\n      rows.slice(headerIndex + 1).forEach((row, index) => {\n        const name = String(row[map.name] || \"\").trim();\n        const date = toKey(row[map.date]);\n        const start = map.start >= 0 ? timeMinutes(row[map.start]) : null;\n        const end = map.end >= 0 ? timeMinutes(row[map.end]) : null;\n        const hours = map.hours >= 0 ? numberValue(row[map.hours]) : 0;\n        if (!name || !date) return;\n        if (!(hours > 0) && (start == null || end == null)) {\n          review.push({ source: sourceName, sheet: sheetName, row: headerIndex + index + 2, issue: \"Missing hours and shift times\", value: name });\n          return;\n        }\n        const shiftRaw = map.shift >= 0 ? String(row[map.shift] || \"\").toLowerCase() : \"\";\n        const shift = shiftRaw.includes(\"2\") || shiftRaw.includes(\"night\") || shiftRaw.includes(\"second\") ? \"second\" : shiftRaw.includes(\"1\") || shiftRaw.includes(\"day\") || shiftRaw.includes(\"first\") ? \"first\" : inferShift(start);\n        out.push({ id: `${sourceName}-${sheetName}-${headerIndex + index + 2}-${normalizeName(name)}`, source: sourceName, sheet: sheetName, rowNumber: headerIndex + index + 2, role: \"operations\", date, employee: normalizeName(name), displayName: titleName(name), shift, start, end, hours: hours > 0 ? hours : hoursBetween(start, end) });\n      });\n      return { rows: out, review };\n    }\n\n    function renderAnalytics() {\n      renderManagerControls();\n      state.managerContextEnabled = els.analyticsManager.value === \"compare\";\n      const shifts = analyticsShiftRows();\n      const filtered = filterAnalyticsShifts(shifts);\n      const excludedCount = state.analyticsExcludedEmployees.length;\n      els.analyticsEmployeesButton.textContent = excludedCount ? `Employees (${excludedCount} excluded)` : \"Employees\";\n      const managerContextNote = state.managerContextEnabled ? \" Manager-aware mode is on, so employee groups are split by the assigned day/night manager for the shift.\" : \"\";\n      els.analyticsStatus.textContent = `Shift LPMH uses timestamped imported lift rows when available. Person grouping evaluates same-shift coworker combinations, so only people who actually appeared on the same shift are paired.${managerContextNote}${excludedCount ? ` ${excludedCount} employee${excludedCount === 1 ? \"\" : \"s\"} excluded from findings.` : \"\"}`;\n      renderPersonGroupingMap(filtered);\n      renderDailyShiftPerformance(filtered);\n      renderGroupAnalysis(filtered);\n      renderPairingAnalysis(filtered);\n      renderEmployeeImpact(filtered);\n      renderPatternFinder(filtered);\n      renderAnalyticsReview();\n    }\n\n    function analyticsShiftRows() {\n      const grouped = new Map();\n      const excluded = new Set(state.analyticsExcludedEmployees);\n      const fileMap = new Map(state.importedFiles.filter((file) => file.type === \"analytics\").map((file) => [file.id, file]));\n      state.analyticsRows.filter((row) => !isGateAnalyticsRow(row) && !excluded.has(row.employee)).forEach((row) => {\n        const key = `${row.date}|${row.shift}`;\n        if (!grouped.has(key)) grouped.set(key, { date: row.date, shift: row.shift, employees: [], hours: 0, managers: new Map() });\n        const g = grouped.get(key);\n        g.employees.push(row);\n        g.hours +=
