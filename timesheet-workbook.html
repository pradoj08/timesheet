  const unit = sourceUnit(source);\n      return fmt(count, 0) + \" \" + (Math.abs(count) === 1 ? unit.one : unit.many);\n    }\n    function sourceRowsHtml(bucket) {\n      if (!bucket.sources.length) return '<div class=\"tip-note\">No lift sources logged for this hour.</div>';\n      return bucket.sources.map(function(source) {\n        return tipRow(source.label, sourceCountText(source));\n      }).join(\"\");\n    }\n    function peopleRowsHtml(bucket) {\n      if (!bucket.people.length) return '<div class=\"tip-note\">No clocked 1st or 2nd shift workers in this hour.</div>';\n      return bucket.people.map(function(worker) {\n        const shift = shiftLabels[worker.shift] || worker.shift || \"\";\n        return tipRow(worker.name + (shift ? \" - \" + shift : \"\"), fmt(worker.hours, 2) + \" hr\");\n      }).join(\"\");\n    }\n    function timelineTipHtml(row, bucket, value, text, isLunch) {\n      const title = bucket.label + \" - \" + row.label;\n      let html = '<div class=\"tip-title\">' + esc(title) + '</div>';\n      if (isLunch) {\n        html += '<div class=\"tip-note\">Lunch period - drag this one-hour block to move it.</div>';\n      }\n      if (row.label === \"People\") {\n        return html + '<div class=\"tip-main\">' + esc(String(bucket.people.length)) + ' people | ' + esc(fmt(bucket.laborHours, 2)) + ' labor hrs</div>' + peopleRowsHtml(bucket);\n      }\n      if (row.label === \"LPH\") {\n        const formula = fmt(bucket.lifts, 0) + \" lifts / \" + fmt(bucket.laborHours, 2) + \" labor hrs = \" + fmt(bucket.lph, 1) + \" LPH\";\n        return html + '<div class=\"tip-main\">' + esc(formula) + '</div>' + tipRow(\"Lifts\", fmt(bucket.lifts, 0)) + tipRow(\"Labor hours\", fmt(bucket.laborHours, 2)) + tipRow(\"People\", String(bucket.people.length)) + sourceRowsHtml(bucket);\n      }\n      if (row.label === \"Lifts\") {\n        return html + '<div class=\"tip-main\">' + esc(fmt(bucket.lifts, 0) + \" total lifts\") + '</div>' + sourceRowsHtml(bucket) + (bucket.note ? '<div class=\"tip-note\">' + esc(bucket.note) + '</div>' : \"\");\n      }\n      if (row.label === \"Lift Type\") {\n        return html + '<div class=\"tip-main\">' + esc(text || \"No lift type\") + '</div>' + sourceRowsHtml(bucket);\n      }\n      return html + '<div class=\"tip-main\">' + esc(text || value || \"-\") + '</div>';\n    }\n    function hourTipHtml(bucket, isLunch) {\n      let html = '<div class=\"tip-title\">' + esc(bucket.label) + '</div>';\n      if (isLunch) {\n        html += '<div class=\"tip-note\">Lunch period - click again to remove. Drag to another hour to move.</div>';\n      }\n      const formula = fmt(bucket.lifts, 0) + \" lifts / \" + fmt(bucket.laborHours, 2) + \" labor hrs = \" + fmt(bucket.lph, 1) + \" LPH\";\n      html += '<div class=\"tip-main\">' + esc(formula) + '</div>';\n      html += tipRow(\"People\", String(bucket.people.length));\n      html += tipRow(\"Lifts\", fmt(bucket.lifts, 0));\n      html += tipRow(\"Labor hours\", fmt(bucket.laborHours, 2));\n      html += sourceRowsHtml(bucket);\n      html += '<div class=\"tip-note\">Click this hour to add the selected marker. Drag the marker or either edge to adjust it.</div>';\n      return html;\n    }\n    function chartPath(points) {\n      return points.map(function(point, index) {\n        return (index ? \"L \" : \"M \") + point.x.toFixed(1) + \" \" + point.y.toFixed(1);\n      }).join(\" \");\n    }\n    function chartRuns(points) {\n      const runs = [];\n      let current = [];\n      points.forEach(function(point) {\n        if (point.active) {\n          current.push(point);\n        } else if (current.length) {\n          runs.push(current);\n          current = [];\n        }\n      });\n      if (current.length) runs.push(current);\n      return runs;\n    }\n    function chartAreaSegments(points, baseY) {\n      const html = [];\n      chartRuns(points).forEach(function(run) {\n        if (run.length === 1) {\n          const point = run[0];\n          const left = Math.max(0, point.x - 50);\n          const right = point.x + 50;\n          const fill = toneFill(point.tone);\n          html.push('<path class=\"chart-area\" d=\"M ' + left.toFixed(1) + ' ' + baseY.toFixed(1) + ' L ' + left.toFixed(1) + ' ' + point.y.toFixed(1) + ' L ' + right.toFixed(1) + ' ' + point.y.toFixed(1) + ' L ' + right.toFixed(1) + ' ' + baseY.toFixed(1) + ' Z\" fill=\"' + esc(fill) + '\" opacity=\".24\"></path>');\n          return;\n        }\n        for (let index = 0; index < run.length - 1; index += 1) {\n          const a = run[index];\n          const b = run[index + 1];\n          const left = index === 0 ? Math.max(0, a.x - 50) : a.x - 1;\n          const right = index === run.length - 2 ? b.x + 50 : b.x + 1;\n          const fill = toneFill(b.tone || a.tone);\n          const d = [\n            \"M\", left.toFixed(1), baseY.toFixed(1),\n            \"L\", left.toFixed(1), a.y.toFixed(1),\n            \"L\", a.x.toFixed(1), a.y.toFixed(1),\n            \"L\", b.x.toFixed(1), b.y.toFixed(1),\n            \"L\", right.toFixed(1), b.y.toFixed(1),\n            \"L\", right.toFixed(1), baseY.toFixed(1),\n            \"Z\"\n          ].join(\" \");\n          html.push('<path class=\"chart-area\" d=\"' + d + '\" fill=\"' + esc(fill) + '\" opacity=\".24\"></path>');\n        }\n      });\n      return html.join(\"\");\n    }\n    function chartGuide(y, cls, width) {\n      return '<line class=\"chart-guide ' + cls + '\" x1=\"0\" y1=\"' + y.toFixed(1) + '\" x2=\"' + width.toFixed(1) + '\" y2=\"' + y.toFixed(1) + '\"></line>';\n    }\n    function guideLabel(y, label, cls, side, placement) {\n      const isBelow = placement === \"below\";\n      const offset = cls === \"target\" ? 32 : 7;\n      const top = isBelow ? y + 18 : y - offset;\n      return '<span class=\"guide-label ' + cls + ' ' + side + (isBelow ? ' below' : '') + '\" style=\"top:' + top.toFixed(1) + 'px\">' + esc(label) + '</span>';\n    }\n    function targetPlacement(points, targetY) {\n      const active = points.filter(function(point) { return point.active; });\n      if (!active.length) return \"above\";\n      const tooClose = active.some(function(point) { return Math.abs(point.y - targetY) < 34; });\n      if (tooClose) return \"below\";\n      const nearby = active[active.length - 1];\n      return nearby.y <= targetY ? \"below\" : \"above\";\n    }\n    function pointMarker(point, formatter, cls, note, attrs) {\n      if (!point || !point.active) return \"\";\n      const cleanNote = String(note || \"\").trim();\n      const extraAttrs = attrs || \"\";\n      const noteClass = cleanNote ? \" has-note\" : \"\";\n      const noteHtml = cleanNote ? '<em class=\"lift-note-bubble\">' + esc(cleanNote) + '</em>' : \"\";\n      return '<div class=\"chart-point ' + cls + noteClass + '\" data-point=\"' + esc(cls) + '\" ' + extraAttrs + ' style=\"--point-y:' + point.y.toFixed(1) + 'px;--point-color:' + esc(toneText(point.tone)) + '\">' + noteHtml + '<span>' + esc(formatter(point.value)) + '</span><i></i></div>';\n    }\n    function renderTimeline(model) {\n      const lunchHours = readLunchPeriods(model.dateValue);\n      const liftPointNotes = readLiftPointNotes(model.dateValue);\n      const buckets = timelineBuckets(model);\n      const chartWidth = buckets.length * 100;\n      const maxLph = Math.max(6, ...buckets.map(function(bucket) { return Number(bucket.lph) || 0; }), 2.5);\n      const maxLifts = Math.max(40, ...buckets.map(function(bucket) { return Number(bucket.lifts) || 0; }), 20);\n      const lphBase = 114;\n      const lphSpan = 76;\n      const liftBase = 248;\n      const liftSpan = 114;\n      const lphTargetY = lphBase - Math.min(1, 2.1 / maxLph) * lphSpan;\n      const liftTargetY = liftBase - Math.min(1, 20 / maxLifts) * liftSpan;\n      const lphPoints = buckets.map(function(bucket, index) {\n        const isLunch = lunchHours.has(bucket.hour);\n        const value = Number(bucket.lph) || 0;\n        return {\n          x: index * 100 + 50,\n          y: lphBase - Math.min(1, value / maxLph) * lphSpan,\n          value: value,\n          tone: toneKey(value, 2.1),\n          active: value > 0\n        };\n      });\n      const liftPoints = buckets.map(function(bucket, index) {\n        const isLunch = lunchHours.has(bucket.hour);\n        const value = Number(bucket.lifts) || 0;\n        return {\n          x: index * 100 + 50,\n          y: liftBase - Math.min(1, value / maxLifts) * liftSpan,\n          value: value,\n          tone: toneKey(value, 20),\n          active: value > 0\n        };\n      });\n      const svg = '<svg class=\"timeline-lines\" viewBox=\"0 0 ' + chartWidth.toFixed(1) + ' 252\" preserveAspectRatio=\"none\" aria-hidden=\"true\">' +\n        chartGuide(lphTargetY, \"target\", chartWidth) +\n        chartGuide(liftTargetY, \"target\", chartWidth) +\n        chartAreaSegments(lphPoints, lphBase) +\n        chartAreaSegments(liftPoints, liftBase) +\n        chartRuns(lphPoints).map(function(run) { return '<path class=\"chart-line\" d=\"' + chartPath(run) + '\"></path>'; }).join(\"\") +\n        chartRuns(liftPoints).map(function(run) { return '<path class=\"chart-line\" d=\"' + chartPath(run) + '\"></path>'; }).join(\"\") +\n      '</svg>';\n      const guideLabels =\n        guideLabel(lphTargetY, \"2.1 target\", \"target\", \"left\", targetPlacement(lphPoints, lphTargetY)) +\n        guideLabel(liftTargetY, \"20 target\", \"target\", \"right\", targetPlacement(liftPoints, liftTargetY));\n      const columns = buckets.map(function(bucket, index) {\n        const isLunch = lunchHours.has(bucket.hour);\n        const previousShiftClass = bucket.hour >= 0 && bucket.hour < 3 ? \"previous-shift previous-shift-\" + (bucket.hour === 0 ? \"start\" : bucket.hour === 2 ? \"end\" : \"mid\") : \"\";\n        const classes = [\"hour-column\", previousShiftClass, selectedHour === bucket.hour ? \"selected\" : \"\"].filter(Boolean).join(\" \");\n        const previousShiftHtml = bucket.hour === 0 ? '<span class=\"previous-shift-label\">Previous Shift</span>' : \"\";\n        const typeHtml = liftTypePills(bucket);\n        const peopleHtml = bucket.people.length ? '<strong>' + esc(bucket.people.length) + '</strong> ppl' : '&nbsp;';\n        const lphPoint = pointMarker(lphPoints[index], function(value) { return fmt(value, 1); }, \"lph\");\n        const liftPointNote = liftPointNotes[String(bucket.hour)] || \"\";\n        const liftPoint = pointMarker(liftPoints[index], function(value) { return fmt(value, 0); }, \"lifts\", liftPointNote, 'data-note-hour=\"' + bucket.hour + '\" title=\"Click to add or edit lift note for ' + esc(displayHour(bucket.hour)) + '\"');\n        return '<button type=\"button\" class=\"' + classes + '\" data-hour=\"' + bucket.hour + '\" data-lunch-position=\"' + bucket.hour + '\" data-tip=\"' + esc(hourTipHtml(bucket, isLunch)) + '\">' +\n          lphPoint +\n          liftPoint +\n          previousShiftHtml +\n          '<div class=\"hour-label\">' + esc(displayHour(bucket.hour)) + '</div>' +\n          '<div class=\"people-count\">' + peopleHtml + '</div>' +\n          '<div class=\"chart-type-list\">' + typeHtml + '</div>' +\n        '</button>';\n      }).join(\"\");\n      const gapTargets = buckets.slice(0, -1).map(function(bucket, index) {\n        const position = normalizeLunchPeriod(bucket.hour + 0.5);\n        if (position == null) return \"\";\n        const x = ((index + 1) / buckets.length * 100).toFixed(4) + \"%\";\n        const title = \"Timeline marker between \" + displayHour(bucket.hour) + \" and \" + displayHour(buckets[index + 1].hour);\n        return '<button type=\"button\" class=\"timeline-gap-button lunch-gap-button\" data-lunch-position=\"' + position + '\" data-marker-position=\"' + position + '\" style=\"--marker-x:' + x + '\" aria-label=\"' + esc(title) + '\" title=\"' + esc(title) + '\"></button>';\n      }).join(\"\");\n      document.getElementById(\"timeline\").innerHTML = svg + guideLabels + '<div class=\"timeline-grid\" style=\"--timeline-hours:' + buckets.length + '\">' + columns + gapTargets + timelineMarkerRangesHtml(model.dateValue) + '</div>';\n      document.getElementById(\"timelineMeta\").innerHTML = markerModeControlsHtml() + '<span class=\"timeline-legend-item\"><span class=\"legend-dot\" style=\"--legend:oklch(0.45 0.11 152)\"></span>On target</span><span class=\"timeline-legend-item\"><span class=\"legend-dot\" style=\"--legend:oklch(0.55 0.12 75)\"></span>Close</span><span class=\"timeline-legend-item\"><span class=\"legend-dot\" style=\"--legend:oklch(0.48 0.14 27)\"></span>Below</span>';\n      renderTypeLegend();\n    }\n    function workerEstimate(bucket, worker) {\n      if (!bucket || bucket.laborHours <= 0 || bucket.lifts <= 0) return 0;\n      return bucket.lifts * (worker.hours / bucket.laborHours);\n    }\n    function renderHourDetail(model) {\n      let hour = selectedHour;\n      if (hour == null) {\n        const firstActive = timelineBuckets(model).find(function(bucket) { return bucket.lifts > 0 || bucket.laborHours > 0; });\n        hour = firstActive ? firstActive.hour : timelineHourKeys[0];\n      }\n      selectedHour = hour;\n      const bucket = model.buckets[hour] || timelineBuckets(model)[0];\n      selectedHour = bucket.hour;\n      document.getElementById(\"hourTitle\").textContent = bucket.label;\n      document.getElementById(\"hourMeta\").textContent = fmt(bucket.laborHours, 2) + \" labor hrs | \" + fmt(bucket.lph, 1) + \" LPH\";\n      if (!bucket.people.length) {\n        document.getElementById(\"hourDetail\").innerHTML = '<div class=\"muted\">No clocked 1st or 2nd shift workers in this hour.</div>';\n        return;\n      }\n      document.getElementById(\"hourDetail\").innerHTML = '<div class=\"employee-list\">' + bucket.people.map(function(worker) {\n        const shiftClass = worker.shift === \"first\" ? \"first\" : \"second\";\n        return '<div class=\"person-line\"><div>' + esc(worker.name) + '<div class=\"muted\">' + esc(worker.note || \"\") + '</div></div><span class=\"pill ' + shiftClass + '\">' + esc(shiftLabels[worker.shift] || worker.shift) + '</span><div class=\"num\">' + fmt(worker.hours, 2) + ' hr</div><div class=\"num\">' + fmt(workerEstimate(bucket, worker), 1) + ' est</div></div>';\n      }).join(\"\") + '</div>';\n    }\n    function renderSourceMix(model) {\n      const sourceMeta = document.getElementById(\"sourceMeta\");\n      const sourceMix = document.getElementById(\"sourceMix\");\n      if (!sourceMeta || !sourceMix) return;\n      const rows = sourceMixRows(model);\n      const max = Math.max(1, ...rows.map(function(row) { return Number(row.lifts) || 0; }));\n      sourceMeta.textContent = rows.length ? String(rows.length) + \" sources - \" + fmt(model.totals.lifts, 0) + \" lifts\" : \"no sources\";\n      sourceMix.innerHTML = rows.length ? rows.slice(0, 8).map(function(row, index) {\n        const pct = Math.max(2, Math.min(100, (Number(row.lifts) || 0) / max * 100));\n        return '<div class=\"source-bar-row\"><div class=\"source-bar-name\">' + esc(row.label) + '</div><div class=\"source-bar-track\"><div class=\"source-bar-fill\" style=\"width:' + pct.toFixed(2) + '%;background:' + sourceColor(index) + '\"></div></div><div class=\"source-bar-count\">' + esc(fmt(row.lifts, 0)) + '</div></div>';\n      }).join(\"\") : '<div class=\"muted\">No lift sources logged.</div>';\n    }\n    function table(headers, rows) {\n      return '<table><thead><tr>' + headers.map(function(header) { return '<th' + (header.num ? ' class=\"num\"' : \"\") + '>' + esc(header.label) + '</th>'; }).join(\"\") + '</tr></thead><tbody>' + rows.join(\"\") + '</tbody></table>';\n    }\n    function td(value, numeric) {\n      return '<td' + (numeric ? ' class=\"num\"' : \"\") + '>' + esc(value) + '</td>';\n    }\n    function renderShiftTable(model) {\n      const target = document.getElementById(\"shiftPerformance\");\n      if (!target) return;\n      const craneKeys = craneOperatorKeys();\n      const cards = shiftSummaryData(model).map(function(row) {\n        const tone = toneKey(row.lph, 2.1);\n        const liftsText = fmt(row.lifts, 0);\n        const flipBadge = row.shiftKey === \"first\" ? '<span class=\"flip-badge\">' + esc(fmt(row.flipLifts, 0) + \" flips\") + '</span>' : \"\";\n        const liftValueHtml = '<span class=\"lift-total\">' + esc(liftsText) + '</span>' + flipBadge;\n        const workers = model.people\n          .filter(function(person) { return person.shift === row.shiftKey && person.workedHours > 0; })\n          .sort(function(a, b) {\n            const aCrane = isCraneOperator(a, craneKeys) ? 0 : 1;\n            const bCrane = isCraneOperator(b, craneKeys) ? 0 : 1;\n            return aCrane - bCrane || a.name.localeCompare(b.name);\n          });\n        const workerHtml = workers.length\n          ? workers.map(function(person) {\n              const chipClass = \"shift-worker-chip\" + (isCraneOperator(person, craneKeys) ? \" crane-operator\" : \"\") + (person.cameInOffDay ? \" off-day-worker\" : \"\");\n              const chipTitle = person.cameInOffDay ? ' title=\"Came in on off day\"' : \"\";\n              return '<span class=\"' + chipClass + '\"' + chipTitle + '>' + esc(person.name) + '</span>';\n            }).join(\"\")\n          : '<span class=\"shift-worker-chip empty\">No workers clocked</span>';\n        return '<div class=\"shift-performance-card\"><div class=\"shift-performance-name\">' + esc(row.shift) + '</div>' +\n          '<div class=\"shift-stat\"><div class=\"shift-stat-value\">' + esc(row.people) + '</div><div class=\"shift-stat-label\">People</div></div>' +\n          '<div class=\"shift-stat\"><div class=\"shift-stat-value\">' + esc(fmt(row.labor, 0)) + '</div><div class=\"shift-stat-label\">Labor hrs</div></div>' +\n          '<div class=\"shift-stat\"><div class=\"shift-stat-value shift-lift-value\">' + liftValueHtml + '</div><div class=\"shift-stat-label\">Est lifts</div></div>' +\n          '<div class=\"shift-stat\"><div class=\"shift-stat-value\" style=\"color:' + toneText(tone) + '\">' + esc(fmt(row.lph, 1)) + '</div><div class=\"shift-stat-label\">LPH</div></div>' +\n          '<div class=\"shift-workers\">' + workerHtml + '</div>' +\n        '</div>';\n      }).join(\"\");\n      target.innerHTML = '<h2>Shift Performance</h2><div class=\"shift-card-list\">' + cards + '</div>';\n    }\n    function parseGroups(text) {\n      return String(text || \"\").split(/\\n+/).map(function(line) {\n        const parts = line.split(\":\");\n        if (parts.length < 2) return null;\n        const name = parts.shift().trim();\n        const members = parts.join(\":\").split(\",\").map(function(item) { return item.trim(); }).filter(Boolean);\n        return name && members.length ? { name: name, members: members, keys: members.map(normalizeName) } : null;\n      }).filter(Boolean);\n    }\n    function renderGroupTable(model) {\n      const groups = parseGroups(document.getElementById(\"groupInput\").value);\n      if (!groups.length) {\n        document.getElementById(\"groupTable\").innerHTML = '<div class=\"status-note\">No custom groups saved.</div>';\n        return;\n      }\n      const rows = groups.map(function(group) {\n        const people = model.people.filter(function(person) { return group.keys.includes(person.key); });\n        const worked = people.reduce(function(sum, person) { return sum + person.workedHours; }, 0);\n        const lifts = people.reduce(function(sum, person) { return sum + person.allocatedLifts; }, 0);\n        return '<tr>' + td(group.name) + td(people.length, true) + td(fmt(worked, 1), true) + td(fmt(lifts, 1), true) + td(fmt(worked > 0 ? lifts / worked : 0, 1), true) + '</tr>';\n      });\n      document.getElementById(\"groupTable\").innerHTML = table([\n        { label: \"Group\" }, { label: \"People\", num: true }, { label: \"Labor\", num: true }, { label: \"Est Lifts\", num: true }, { label: \"LPH\", num: true }\n      ], rows);\n    }\n    function renderIndividualTable(model) {\n      const rows = model.people\n        .filter(function(person) { return person.workedHours > 0 || person.paidAbsenceHours > 0 || person.note; })\n        .sort(function(a, b) { return b.lph - a.lph || b.workedHours - a.workedHours || a.name.localeCompare(b.name); })\n        .map(function(person) {\n          const times = [person.start || \"-\", person.lunch || \"-\", person.end || \"-\"].join(\" / \");\n          return '<tr>' + td(person.name) + td(person.shiftLabel) + td(times) + td(fmt(person.workedHours, 1), true) + td(fmt(person.paidAbsenceHours, 1), true) + td(fmt(person.allocatedLifts, 1), true) + td(fmt(person.lph, 1), true) + td(person.note || (person.cameInOffDay ? \"Came in off day\" : \"\")) + '</tr>';\n        });\n      document.getElementById(\"individualTable\").innerHTML = rows.length ? table([\n        { label: \"Employee\" }, { label: \"Shift\" }, { label: \"Start/Lunch/End\" }, { label: \"Labor\", num: true }, { label: \"Paid Off\", num: true }, { label: \"Est Lifts\", num: true }, { label: \"LPH\", num: true }, { label: \"Note\" }\n      ], rows) : '<div class=\"status-note\">No timesheet rows with work, paid absence, or notes.</div>';\n    }\n    function render() {\n      const dateValue = document.getElementById(\"analysisDate\").value || localDateValue();\n      document.getElementById(\"analysisDate\").value = dateValue;\n      document.getElementById(\"displayDate\").textContent = longDateLabel(dateValue);\n      localStorage.setItem(dateStorageKey, dateValue);\n      const model = buildModel();\n      lastModel = model;\n      renderMetrics(model);\n      if (selectedHour == null) {\n        const firstActive = timelineBuckets(model).find(function(bucket) { return bucket.lifts > 0 || bucket.laborHours > 0; });\n        selectedHour = firstActive ? firstActive.hour : timelineHourKeys[0];\n      }\n      renderTimeline(model);\n      renderHourDetail(model);\n      renderSourceMix(model);\n      renderShiftTable(model);\n      renderGroupTable(model);\n      renderIndividualTable(model);\n    }\n    window.addEventListener(\"message\", function(event) {\n      const data = event.data || {};\n      if (data.type !== \"conglobal-build-performance-scenario\") return;\n      const requestId = String(data.requestId || \"\");\n      const requestedDate = inputDateKeyFromValue(data.date, data.date) || localDateValue();\n      const previousDate = document.getElementById(\"analysisDate\").value;\n      try {\n        document.getElementById(\"analysisDate\").value = requestedDate;\n        const scenarioModel = buildModel();\n        window.parent.postMessage({\n          type: \"conglobal-performance-scenario-result\",\n          requestId: requestId,\n          scenario: scenarioPayloadFromModel(scenarioModel)\n        }, \"*\");\n      } catch (error) {\n        window.parent.postMessage({\n          type: \"conglobal-performance-scenario-result\",\n          requestId: requestId,\n          error: error && error.message ? error.message : String(error)\n        }, \"*\");\n      } finally {\n        document.getElementById(\"analysisDate\").value = previousDate;\n      }\n    });\n    const timelineElement = document.getElementById(\"timeline\");\n    function timelineTooltip() {\n      return document.getElementById(\"timelineTooltip\");\n    }\n    function positionTimelineTooltip(event) {\n      const tooltip = timelineTooltip();\n      if (!tooltip) return;\n      const pad = 12;\n      let left = event.clientX + 14;\n      let top = event.clientY + 14;\n      const rect = tooltip.getBoundingClientRect();\n      if (left + rect.width + pad > window.innerWidth) left = event.clientX - rect.width - 14;\n      if (top + rect.height + pad > window.innerHeight) top = event.clientY - rect.height - 14;\n      tooltip.style.left = Math.max(pad, left) + \"px\";\n      tooltip.style.top = Math.max(pad, top) + \"px\";\n    }\n    function showTimelineTooltip(button, event) {\n      const tooltip = timelineTooltip();\n      if (!tooltip || !button || !button.dataset.tip) return;\n      tooltip.innerHTML = button.dataset.tip;\n      tooltip.classList.add(\"open\");\n      positionTimelineTooltip(event);\n    }\n    function hideTimelineTooltip() {\n      const tooltip = timelineTooltip();\n      if (!tooltip) return;\n      tooltip.classList.remove(\"open\");\n      tooltip.innerHTML = \"\";\n    }\n    function timelineSlotFromPoint(clientX) {\n      const grid = timelineElement.querySelector(\".timeline-grid\");\n      if (!grid) return 0;\n      const rect = grid.getBoundingClientRect();\n      if (!rect.width) return 0;\n      return Math.max(0, Math.min(48, Math.round(((clientX - rect.left) / rect.width) * 48)));\n    }\n    function previewTimelineMarker(state, startSlot, durationSlots) {\n      const grid = timelineElement.querySelector(\".timeline-grid\");\n      if (!grid || !state.overlay) return;\n      const gridRect = grid.getBoundingClientRect();\n      const parentRect = state.overlay.offsetParent.getBoundingClientRect();\n      state.overlay.style.left = (gridRect.left - parentRect.left + startSlot / 48 * gridRect.width) + \"px\";\n      state.overlay.style.width = (durationSlots / 48 * gridRect.width) + \"px\";\n      state.previewStart = startSlot;\n      state.previewDuration = durationSlots;\n    }\n    function refreshLunchTimeline() {\n      selectedHour = null;\n      render();\n    }\n    function finishLunchDrag(event, canceled) {\n      const state = lunchDragState;\n      if (!state) return;\n      document.body.classList.remove(\"lunch-dragging\");\n      if (state.overlay) state.overlay.classList.remove(\"dragging\");\n      if (state.overlay && state.overlay.releasePointerCapture) {\n        try { state.overlay.releasePointerCapture(state.pointerId); } catch (error) {}\n      }\n      lunchDragState = null;\n      if (!canceled && state.moved && lastModel) {\n        updateTimelineMarkerRange(lastModel.dateValue, state.markerType, state.rangeIndex, state.previewStart, state.previewDuration);\n        suppressTimelineClick = true;\n        window.setTimeout(function() { suppressTimelineClick = false; }, 350);\n        refreshLunchTimeline();\n        event.preventDefault();\n      }\n    }\n    timelineElement.addEventListener(\"pointerdown\", function(event) {\n      if (event.button !== 0) return;\n      const overlay = event.target.closest(\".timeline-marker-range\");\n      if (!overlay || !timelineElement.contains(overlay)) return;\n      const resizeHandle = event.target.closest(\"[data-resize]\");\n      const startSlot = Number(overlay.dataset.startSlot);\n      const durationSlots = Number(overlay.dataset.durationSlots);\n      lunchDragState = {\n        pointerId: event.pointerId,\n        overlay: overlay,\n        markerType: overlay.dataset.markerType,\n        rangeIndex: Number(overlay.dataset.markerRange),\n        action: resizeHandle ? resizeHandle.dataset.resize : \"move\",\n        startSlot: startSlot,\n        durationSlots: durationSlots,\n        previewStart: startSlot,\n        previewDuration: durationSlots,\n        pointerSlot: timelineSlotFromPoint(event.clientX),\n        startX: event.clientX,\n        startY: event.clientY,\n        moved: false\n      };\n      overlay.classList.add(\"dragging\");\n      document.body.classList.add(\"lunch-dragging\");\n      if (overlay.setPointerCapture) {\n        try { overlay.setPointerCapture(event.pointerId); } catch (error) {}\n      }\n      hideTimelineTooltip();\n      event.preventDefault();\n    });\n    timelineElement.addEventListener(\"pointermove\", function(event) {\n      if (!lunchDragState || event.pointerId !== lunchDragState.pointerId) return;\n      const distance = Math.hypot(event.clientX - lunchDragState.startX, event.clientY - lunchDragState.startY);\n      if (distance > 4) lunchDragState.moved = true;\n      if (!lunchDragState.moved) return;\n      const slot = timelineSlotFromPoint(event.clientX);\n      const state = lunchDragState;\n      let start = state.startSlot;\n      let duration = state.durationSlots;\n      if (state.action === \"start\") {\n        const end = state.startSlot + state.durationSlots;\n        start = Math.max(0, Math.min(end - 1, slot));\n        duration = end - start;\n      } else if (state.action === \"end\") {\n        duration = Math.max(1, Math.min(48 - start, slot - start));\n      } else {\n        start = Math.max(0, Math.min(48 - duration, state.startSlot + slot - state.pointerSlot));\n      }\n      previewTimelineMarker(state, start, duration);\n      event.preventDefault();\n    });\n    timelineElement.addEventListener(\"pointerup\", function(event) {\n      if (!lunchDragState || event.pointerId !== lunchDragState.pointerId) return;\n      finishLunchDrag(event, false);\n    });\n    timelineElement.addEventListener(\"pointercancel\", function(event) {\n      if (!lunchDragState || event.pointerId !== lunchDragState.pointerId) return;\n      finishLunchDrag(event, true);\n    });\n    timelineElement.addEventListener(\"mouseover\", function(event) {\n      const button = event.target.closest(\"button[data-tip]\");\n      if (!button || !timelineElement.contains(button)) return;\n      showTimelineTooltip(button, event);\n    });\n    timelineElement.addEventListener(\"mousemove\", function(event) {\n      const tooltip = timelineTooltip();\n      if (tooltip && tooltip.classList.contains(\"open\")) positionTimelineTooltip(event);\n    });\n    timelineElement.addEventListener(\"mouseout\", function(event) {\n      const button = event.target.closest(\"button[data-tip]\");\n      if (!button) return;\n      if (event.relatedTarget && button.contains(event.relatedTarget)) return;\n      hideTimelineTooltip();\n    });\n    timelineElement.addEventListener(\"focusin\", function(event) {\n      const button = event.target.closest(\"button[data-tip]\");\n      if (!button) return;\n      const rect = button.getBoundingClientRect();\n      showTimelineTooltip(button, { clientX: rect.left + rect.width / 2, clientY: rect.top });\n    });\n    timelineElement.addEventListener(\"focusout\", hideTimelineTooltip);\n    timelineElement.addEventListener(\"click\", function(event) {\n      const liftPoint = event.target.closest(\".chart-point.lifts\");\n      const hourButton = event.target.closest(\"button[data-hour]\");\n      const lunchButton = event.target.closest(\"button[data-lunch-position]\");\n      const markerRange = event.target.closest(\".timeline-marker-range\");\n      const markerModeButton = event.target.closest(\"button[data-marker-mode]\");\n      if (markerModeButton) {\n        timelineMarkerMode = markerStorageKeys[markerModeButton.dataset.markerMode] ? markerModeButton.dataset.markerMode : \"lunch\";\n        if (lastModel) renderTimeline(lastModel);\n        return;\n      }\n      if (markerRange) {\n        if (suppressTimelineClick) {\n          suppressTimelineClick = false;\n          return;\n        }\n        if (lastModel) {\n          removeTimelineMarkerRange(lastModel.dateValue, markerRange.dataset.markerType, Number(markerRange.dataset.markerRange));\n          refreshLunchTimeline();\n        }\n        return;\n      }\n      if (!hourButton && !lunchButton) return;\n      if (liftPoint && hourButton && lastModel) {\n        event.preventDefault();\n        event.stopPropagation();\n        const hour = Number(liftPoint.dataset.noteHour || hourButton.dataset.hour);\n        const notes = readLiftPointNotes(lastModel.dateValue);\n        const current = notes[String(hour)] || \"\";\n        const next = window.prompt(\"Lift note for \" + displayHour(hour) + \" (blank clears)\", current);\n        if (next === null) return;\n        writeLiftPointNote(lastModel.dateValue, hour, next);\n        renderTimeline(lastModel);\n        return;\n      }\n      if (suppressTimelineClick) {\n        suppressTimelineClick = false;\n        return;\n      }\n      if (lastModel && lunchButton) {\n        toggleTimelineMarkerPeriod(lastModel.dateValue, timelineMarkerMode, Number(lunchButton.dataset.lunchPosition));\n        refreshLunchTimeline();\n        return;\n      }\n    });\n    document.addEventListener(\"click\", function(event) {\n      const markerModeButton = event.target.closest(\"button[data-marker-mode]\");\n      if (markerModeButton) {\n        timelineMarkerMode = markerStorageKeys[markerModeButton.dataset.markerMode] ? markerModeButton.dataset.markerMode : \"lunch\";\n        if (lastModel) renderTimeline(lastModel);\n        return;\n      }\n      if (event.target.closest(\"#timeline\")) return;\n      if (selectedHour == null) return;\n      selectedHour = null;\n      if (lastModel) renderTimeline(lastModel);\n    });\n    const performanceDateBox = document.getElementById(\"performanceDateBox\");\n    const performanceDateButton = document.getElementById(\"performanceDateButton\");\n    const performanceDatePopover = document.getElementById(\"performanceDatePopover\");\n    const analysisDateInput = document.getElementById(\"analysisDate\");\n    function openPerformanceDatePicker() {\n      analysisDateInput.value = analysisDateInput.value || localStorage.getItem(dateStorageKey) || localDateValue();\n      performanceDateBox.classList.add(\"open\");\n      analysisDateInput.focus({ preventScroll: true });\n      if (typeof analysisDateInput.showPicker === \"function\") {\n        try {\n          analysisDateInput.showPicker();\n          return;\n        } catch (error) {}\n      }\n      analysisDateInput.click();\n    }\n\n    performanceDateButton.addEventListener(\"click\", function(event) {\n      event.stopPropagation();\n      openPerformanceDatePicker();\n    });\n    performanceDatePopover.addEventListener(\"click\", function(event) {\n      event.stopPropagation();\n    });\n    document.addEventListener(\"click\", function(event) {\n      if (!event.target.closest(\"#performanceDateBox\")) {\n        performanceDateBox.classList.remove(\"open\");\n      }\n    });\n    document.getElementById(\"analysisDate\").addEventListener(\"change\", function() {\n      selectedHour = null;\n      performanceDateBox.classList.remove(\"open\");\n      render();\n    });\n    document.getElementById(\"openLiftImport\").addEventListener(\"click\", openLiftImport);\n    document.getElementById(\"clearLiftImports\").addEventListener(\"click\", function(event) {\n      clearLiftImports(event.currentTarget);\n    });\n    document.getElementById(\"chooseLiftImport\").addEventListener(\"click\", function() {\n      document.getElementById(\"liftImportFile\").click();\n    });\n    document.getElementById(\"liftImportFile\").addEventListener(\"change\", function(event) {\n      handleLiftImportFiles(event.target.files);\n    });\n    document.getElementById(\"closeLiftImportTop\").addEventListener(\"click\", closeLiftImport);\n    document.getElementById(\"cancelLiftImport\").addEventListener(\"click\", closeLiftImport);\n    document.getElementById(\"applyLiftImport\").addEventListener(\"click\", applyLiftImport);\n    document.getElementById(\"liftImportModal\").addEventListener(\"click\", function(event) {\n      if (event.target === event.currentTarget) closeLiftImport();\n    });\n    document.getElementById(\"saveGroups\").addEventListener(\"click\", function() {\n      localStorage.setItem(groupsStorageKey, document.getElementById(\"groupInput\").value);\n      render();\n    });\n    document.getElementById(\"groupInput\").addEventListener(\"change\", function(event) {\n      localStorage.setItem(groupsStorageKey, event.target.value);\n      renderGroupTable(lastModel || buildModel());\n    });\n    document.getElementById(\"analysisDate\").value = localStorage.getItem(dateStorageKey) || localDateValue();\n    document.getElementById(\"groupInput\").value = localStorage.getItem(groupsStorageKey) || \"\";\n    window.addEventListener(\"focus\", render);\n    render();\n  <\/script>\n</body>\n</html>\n"
      },
      "roster": {
        "label": "Schedule",
        "html": "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n  <meta charset=\"UTF-8\" />\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" />\n  <title>Conglobal Roster</title>\n  <style>\n    :root {\n      --title: #d9e8f7;\n      --black: #000;\n      --work: #c6efce;\n      --off: #ffc7ce;\n      --side: #ffc000;\n      --crane: #ffff00;\n      --everything: #e7c7e8;\n      --lead: #ffff00;\n      --blue-grid: #9eb6d8;\n    }\n\n    * {\n      box-sizing: border-box;\n    }\n\n    body {\n      margin: 0;\n      background: #fff;\n      color: #000;\n      font-family: Arial, Helvetica, sans-serif;\n      font-size: 14px;\n      font-weight: 700;\n      overflow-x: hidden;\n    }\n\n    .page-switcher {\n      width: 100%;\n      display: flex;\n      gap: 4px;\n      align-items: center;\n      padding: 6px 8px;\n      background: #111;\n      border-bottom: 2px solid #000;\n    }\n\n    .page-switcher a {\n      min-width: 118px;\n      height: 28px;\n      display: inline-flex;\n      align-items: center;\n      justify-content: center;\n      border: 1px solid #777;\n      background: #e7e6e6;\n      color: #000;\n      text-decoration: none;\n      font-size: 13px;\n      font-weight: 800;\n    }\n\n    .page-switcher a.active {\n      background: #ffff00;\n      border-color: #ffff00;\n    }\n\n    .page {\n      width: 100%;\n      max-width: 100vw;\n      padding: 1px 0 30px;\n      overflow-x: hidden;\n    }\n\n    .top-grid {\n      display: grid;\n      grid-template-columns: minmax(0, 1fr) 164px;\n      align-items: start;\n      column-gap: 6px;\n    }\n\n    .shift-block {\n      width: 100%;\n      margin-bottom: 30px;\n    }\n\n    .shift-title {\n      height: 32px;\n      display: flex;\n      align-items: center;\n      padding-left: 4px;\n      background: var(--title);\n      font-size: 18px;\n      border-top: 1px solid #cbd8e8;\n    }\n\n    .add-row {\n      width: 100%;\n      display: grid;\n      grid-templ
