            "label": "Timesheet",
            "html": "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n  <meta charset=\"UTF-8\" />\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" />\n  <title>Conglobal Time Input</title>\n  <style>\n    :root {\n      --black: #000;\n      --gray: #d9d9d9;\n      --green: #e2f0d9;\n      --yellow: #ffff00;\n      --pink: #ffc7ce;\n      --blue: #9dc3e6;\n      --logo: #004a64;\n      --muted: #9b9b9b;\n    }\n\n    * {\n      box-sizing: border-box;\n    }\n\n    body {\n      margin: 0;\n      background: #fff;\n      color: #000;\n      font-family: Arial, Helvetica, sans-serif;\n      font-size: 16px;\n      overflow-x: hidden;\n    }\n\n    .page-switcher {\n      width: 100%;\n      display: flex;\n      gap: 4px;\n      align-items: center;\n      padding: 6px 8px;\n      background: #111;\n      border-bottom: 2px solid #000;\n    }\n\n    .page-switcher a {\n      min-width: 118px;\n      height: 28px;\n      display: inline-flex;\n      align-items: center;\n      justify-content: center;\n      border: 1px solid #777;\n      background: #e7e6e6;\n      color: #000;\n      text-decoration: none;\n      font-size: 13px;\n      font-weight: 800;\n    }\n\n    .page-switcher a.active {\n      background: #ffff00;\n      border-color: #ffff00;\n    }\n\n    .sheet {\n      width: 100%;\n      max-width: 1180px;\n      margin: 0 auto;\n      overflow-x: hidden;\n      padding-bottom: 0;\n    }\n\n    .metrics {\n      width: 100%;\n      display: grid;\n      grid-template-columns: repeat(7, minmax(0, 1fr));\n      margin-bottom: 12px;\n      font-size: clamp(13px, 1.9vw, 19px);\n      font-weight: 900;\n      text-align: center;\n    }\n\n    .metric {\n      min-height: 60px;\n      display: flex;\n      flex-direction: column;\n      align-items: center;\n      justify-content: center;\n      gap: 1px;\n      padding: 7px 2px 6px;\n      border-right: 2px solid #fff;\n      line-height: 1.12;\n    }\n\n    .metric > span {\n      width: 100%;\n      min-height: 22px;\n      display: flex;\n      align-items: center;\n      justify-content: center;\n    }\n\n    .metric.yellow {\n      background: var(--yellow);\n    }\n\n    .metric.pink {\n      background: var(--pink);\n    }\n\n    .metric.blue {\n      background: var(--blue);\n    }\n\n    .metric input,\n    .metric select {\n      width: 100%;\n      min-height: 25px;\n      height: 25px;\n      padding: 0;\n      border: 0;\n      outline: 0;\n      background: transparent;\n      font: inherit;\n      font-weight: 900;\n      line-height: normal;\n      text-align: center;\n    }\n\n    .metric input:focus,\n    .metric select:focus {\n      background: #fff2cc;\n      box-shadow: inset 0 0 0 2px #ffc000;\n    }\n\n    .metric .custom-shift-end {\n      display: none;\n      border-top: 1px solid rgba(0, 0, 0, .25);\n    }\n\n    .metric .custom-shift-end.open {\n      display: block;\n    }\n\n    .metric.clickable {\n      cursor: pointer;\n      user-select: none;\n    }\n\n    .metric.clickable:hover,\n    .metric.clickable:focus {\n      outline: 2px solid #ffc000;\n      outline-offset: -2px;\n    }\n\n    .time-table {\n      width: 100%;\n      border-collapse: collapse;\n      table-layout: fixed;\n      font-size: clamp(11px, 1.45vw, 14px);\n    }\n\n    .time-table col.employee { width: 18%; }\n    .time-table col.off { width: 12%; }\n    .time-table col.note { width: 14%; }\n    .time-table col.time { width: 15.33%; }\n    .time-table col.actual { width: 10%; }\n\n    .time-table th,\n    .time-table td {\n      height: 22px;\n      padding: 0 3px;\n      border-bottom: 1px solid #000;\n      line-height: 21px;\n      overflow: hidden;\n      white-space: nowrap;\n    }\n\n    .time-table th {\n      background: var(--gray);\n      border-top: 2px solid #000;\n      border-bottom: 2px solid #000;\n      font-weight: 900;\n      text-align: center;\n    }\n\n    .time-table th.section-name {\n      text-align: left;\n      cursor: pointer;\n      user-select: none;\n    }\n\n    .time-table th:last-child {\n      padding: 0 1px;\n      font-size: clamp(10px, 1.25vw, 13px);\n    }\n\n    .time-table th:nth-child(4) {\n      padding: 0 1px;\n      font-size: clamp(9px, 1.08vw, 12px);\n    }\n\n    .name {\n      background: #fff;\n    }\n\n    .time-table td.name,\n    .time-table td:nth-child(2) {\n      font-weight: 600;\n    }\n\n    .name.scheduled {\n      background: var(--green);\n    }\n\n    .name.off-day-clock {\n      background: var(--green);\n      color: #000;\n    }\n\n    tr.off-employee-row td,\n    tr.off-employee-row input {\n      color: rgba(119, 119, 119, .3);\n    }\n\n    .name.missing-worker {\n      background: #fff2cc;\n      color: #7a4b00;\n      opacity: 1;\n    }\n\n    tr.unpaid-absence-row .name {\n      background: #fce4e4;\n      color: #8a1f1f;\n      opacity: 1;\n    }\n\n    .center {\n      text-align: center;\n    }\n\n    .note-flag {\n      background: #e7c7e8;\n      color: #4f1b58;\n      text-align: center;\n      font-size: clamp(10px, 1.15vw, 12px);\n      font-weight: 900;\n      letter-spacing: 0;\n    }\n\n    .note-pill-wrap {\n      display: flex;\n      align-items: center;\n      justify-content: center;\n      gap: 3px;\n      min-height: 21px;\n      white-space: normal;\n    }\n\n    .note-pill {\n      display: inline-flex;\n      align-items: center;\n      justify-content: center;\n      max-width: 100%;\n      min-height: 17px;\n      padding: 1px 7px;\n      border-radius: 999px;\n      background: #e7c7e8;\n      color: #4f1b58;\n      font-size: clamp(11px, 1vw, 13px);\n      font-weight: 900;\n      line-height: 1.1;\n      white-space: normal;\n    }\n\n    .note-pill.unpaid {\n      background: #e7c7e8;\n      color: #4f1b58;\n    }\n\n    .note-pill.invalid {\n      background: #f4cccc;\n      color: #7f1d1d;\n    }\n\n    .note-cell-editable {\n      padding: 0;\n    }\n\n    .note-input {\n      width: 100%;\n      min-height: 21px;\n      padding: 0 5px;\n      border: 0;\n      outline: 0;\n      background: transparent;\n      color: #111827;\n      font: inherit;\n      font-weight: 800;\n      line-height: 20px;\n      text-align: center;\n    }\n\n    .note-input.auto,\n    .note-input.paid,\n    .note-input.unpaid {\n      border-radius: 999px;\n      background: #e7c7e8;\n      color: #4f1b58;\n    }\n\n    .note-input.invalid {\n      border-radius: 999px;\n      background: #f4cccc;\n      color: #7f1d1d;\n    }\n\n    .note-input.has-note {\n      background: #fff2cc;\n      color: #7a4b00;\n      box-shadow: none;\n    }\n\n    .note-input:focus {\n      background: #fff2cc;\n      box-shadow: none;\n    }\n\n    .time-cell {\n      background: #fff;\n    }\n\n    .time-cell input {\n      width: 100%;\n      height: 21px;\n      padding: 0 4px;\n      border: 0;\n      outline: 0;\n      background: transparent;\n      font: inherit;\n      text-align: center;\n    }\n\n    .time-table td:nth-child(4) input,\n    .time-table td:nth-child(5) input,\n    .time-table td:nth-child(6) input {\n      font-weight: 900;\n    }\n\n    .time-cell input:focus {\n      background: #fff2cc;\n      box-shadow: inset 0 0 0 2px #ffc000;\n    }\n\n    .time-cell input.temp-clock-out::placeholder {\n      color: rgba(0, 0, 0, .15);\n      opacity: 1;\n    }\n\n    .time-cell input.imported {\n      background: transparent;\n      color: #006100;\n      box-shadow: none;\n    }\n\n    .time-cell input.imported:focus {\n      background: #fff2cc;\n      box-shadow: inset 0 0 0 2px #ffc000;\n    }\n\n    .time-cell input.missing-lunch {\n      background: #fff2cc;\n      box-shadow: none;\n      font-weight: 900;\n    }\n\n    .time-cell input.missing-start {\n      background: #fff2cc;\n      box-shadow: inset 0 0 0 1px #f6c85f;\n      color: #7a4b00;\n      font-weight: 900;\n    }\n\n    .time-cell input.missing-start::placeholder {\n      color: #7a4b00;\n      opacity: 1;\n    }\n\n    .time-cell input.invalid-time {\n      background: #fce4e4;\n      color: #8a1f1f;\n      box-shadow: inset 0 0 0 1px #f4a6a6;\n      font-weight: 900;\n    }\n\n    .time-cell.start-status.scheduled input {\n      background: transparent;\n      color: #006100;\n      box-shadow: none;\n    }\n\n    .time-cell.start-status.off-day-clock input {\n      background: transparent;\n      color: #006100;\n      box-shadow: none;\n    }\n\n    .time-cell.start-status.missing-worker input {\n      background: #fff2cc;\n      color: #7a4b00;\n      box-shadow: none;\n    }\n\n    .time-cell.start-status.missing-worker input::placeholder {\n      color: #7a4b00;\n      opacity: 1;\n    }\n\n    tr.off-employee-row .time-cell.start-status input {\n      background: transparent;\n      box-shadow: none;\n    }\n\n    tr.unpaid-absence-row .time-cell input,\n    tr.unpaid-absence-row .time-cell.start-status.scheduled input,\n    tr.unpaid-absence-row .time-cell.start-status.off-day-clock input,\n    tr.unpaid-absence-row .time-cell.start-status.missing-worker input {\n      background: #fff;\n      color: #000;\n      box-shadow: none;\n    }\n\n    .time-cell.start-status.scheduled input.invalid-time,\n    .time-cell.start-status.off-day-clock input.invalid-time,\n    tr.off-employee-row .time-cell.start-status input.invalid-time {\n      background: #fce4e4;\n      color: #8a1f1f;\n      box-shadow: inset 0 0 0 1px #f4a6a6;\n      font-weight: 900;\n    }\n\n    tr.purple-absence-row td,\n    tr.purple-absence-row .name,\n    tr.purple-absence-row .note-input,\n    tr.purple-absence-row .note-input.has-note,\n    tr.purple-absence-row .note-input:focus,\n    tr.purple-absence-row .time-cell input,\n    tr.purple-absence-row .time-cell.start-status.scheduled input,\n    tr.purple-absence-row .time-cell.start-status.off-day-clock input,\n    tr.purple-absence-row .time-cell.start-status.missing-worker input,\n    tr.purple-absence-row.off-employee-row .time-cell input {\n ound: #fff;\n      border: 3px solid #000;\n      box-shadow: 0 12px 34px rgba(0, 0, 0, .25);\n    }\n\n    .lpmh-modal header {\n      display: flex;\n      align-items: center;\n      justify-content: space-between;\n      gap: 12px;\n      padding: 8px 10px;\n      background: #000;\n      color: #fff;\n      font-weight: 900;\n    }\n\n    .lpmh-modal header button {\n      min-width: 30px;\n      height: 26px;\n      border: 1px solid #fff;\n      background: #e7e6e6;\n      color: #000;\n      font-weight: 900;\n      cursor: pointer;\n    }\n\n    .lpmh-details {\n      display: grid;\n      gap: 1px;\n      padding: 8px;\n      background: #000;\n    }\n\n    .lpmh-row {\n      min-height: 32px;\n      display: grid;\n      grid-template-columns: minmax(0, 1fr) minmax(120px, auto);\n      align-items: center;\n      gap: 10px;\n      padding: 0 10px;\n      background: #fff;\n      font-weight: 900;\n    }\n\n    .lpmh-row span:last-child {\n      text-align: right;\n    }\n\n    .lpmh-formula {\n      min-height: 40px;\n      display: flex;\n      align-items: center;\n      justify-content: center;\n      padding: 6px 10px;\n      background: #ffc7ce;\n      color: #000;\n      font-size: 17px;\n      font-weight: 900;\n      text-align: center;\n    }\n\n    .off-day-panel {\n      background: #000;\n      border: 1px solid #000;\n    }\n\n    .off-day-panel h2 {\n      margin: 0;\n      padding: 6px 8px;\n      background: #000;\n      color: #fff;\n      font-size: 16px;\n    }\n\n    .off-day-grid {\n      display: grid;\n      grid-template-columns: repeat(3, minmax(0, 1fr));\n      gap: 1px;\n      background: #000;\n    }\n\n    .off-shift-list {\n      min-height: 120px;\n      background: #fff;\n    }\n\n    .off-shift-list h3 {\n      margin: 0;\n      padding: 6px 8px;\n      background: #d9e8f7;\n      border-bottom: 1px solid #000;\n      font-size: 14px;\n    }\n\n    .off-shift-list ul {\n      margin: 0;\n      padding: 6px 8px 8px 22px;\n  \"thu\",\n      thurs: \"thu\",\n      thursday: \"thu\",\n      fri: \"fri\",\n      friday: \"fri\",\n      sat: \"sat\",\n      saturday: \"sat\"\n    };\n\n    const todayKey = [\"sun\", \"mon\", \"tue\", \"wed\", \"thu\", \"fri\", \"sat\"][new Date().getDay()];\n    const rosterStorageKey = \"conglobal-roster-state-v1\";\n    const rosterAdditionsKey = \"conglobal-roster-additions-v1\";\n    const dayforceStorageKey = \"conglobal-dayforce-punches-v1\";\n    const previousTimesheetStorageKey = \"conglobal-previous-timesheet-hours-v1\";\n    const timesheetSettingsKey = \"conglobal-timesheet-settings-v1\";\n    const timesheetNotesKey = \"conglobal-timesheet-notes-v1\";\n    const rosterDayLabels = [\"Mon\", \"Tues\", \"Wed\", \"Thurs\", \"Fri\", \"Sat\", \"Sun\"];\n    const lpmhGoal = 2.0;\n    const modal = document.getElementById(\"tomorrowOffModal\");\n    const modalContent = document.getElementById(\"tomorrowOffContent\");\n    const lpmhModal = document.getElementById(\"lpmhModal\");\n    const lpmhDetails = document.getElementById(\"lpmhDetails\");\n\n    function readTimesheetSettings() {\n      try {\n        const saved = JSON.parse(localStorage.getItem(timesheetSettingsKey) || \"null\");\n        return saved && typeof saved === \"object\" ? saved : {};\n      } catch (error) {\n        localStorage.removeItem(timesheetSettingsKey);\n        return {};\n      }\n    }\n\n    function writeTimesheetSettings() {\n      localStorage.setItem(timesheetSettingsKey, JSON.stringify({\n        lifts: Number(document.getElementById(\"updateLifts\").value) || 0,\n        flips: Number(document.getElementById(\"updateFlips\").value) || 0,\n        shiftEndMode: document.getElementById(\"shiftEndSelect\").value,\n        shiftEndCustom: document.getElementById(\"shiftEndOther\").value.trim()\n      }));\n    }\n\n    function applyTimesheetSettings() {\n      const settings = readTimesheetSettings();\n      if (settings.lifts !== undefined) document.getElementById(\"updateLifts\").value = settings.lifts;\n      if (settings.flips !== undefined) document.getElementById(\"updateFlips\").value = settings.flips;\n      if (settings.shiftEndMode) document.getElementById(\"shiftEndSelect\").value = settings.shiftEndMode;\n      if (settings.shiftEndCustom !== undefined) document.getElementById(\"shiftEndOther\").value = settings.shiftEndCustom;\n    }\n\n    function parseOffDays(text) {\n      return new Set(text\n        .split(\",\")\n        .map((item) => item.trim().toLowerCase())\n        .map((item) => dayAliases[item] || dayAliases[item.slice(0, 3)])\n        .filter(Boolean));\n    }\n\n    function dayKeyFromOffset(offset) {\n      const date = new Date();\n      date.setDate(date.getDate() + offset);\n      return [\"sun\", \"mon\", \"tue\", \"wed\", \"thu\", \"fri\", \"sat\"][date.getDay()];\n    }\n\n    function dayKeyFromDateValue(value) {\n      const text = String(value || \"\").trim();\n      if (!text) return \"\";\n\n      const dayNameMatch = text.match(/^([a-z]{3,9})\\b/i);\n      const explicitDay = dayNameMatch ? dayAliases[dayNameMatch[1].toLowerCase()] : \"\";\n      if (explicitDay) return explicitDay;\n\n      const match = text.match(/^(\\d{1,2})\\/(\\d{1,2})\\/(\\d{2,4})/);\n      const date = match\n        ? new Date(Number(match[3].length === 2 ? `20${match[3]}` : match[3]), Number(match[1]) - 1, Number(match[2]))\n        : new Date(text);\n      if (Number.isNaN(date.getTime())) return \"\";\n      return [\"sun\", \"mon\", \"tue\", \"wed\", \"thu\", \"fri\", \"sat\"][date.getDay()];\n    }\n\n    function dayKeyForRow(row) {\n      return row.dataset.workdayKey || todayKey;\n    }\n\n    function rowOffDays(row) {\n      return parseOffDays(row.children[1] ? row.children[1].textContent : \"\");\n    }\n\n    function rowIsScheduledToWork(row) {\n      return !rowOffDays(row).has(dayKeyForRow(row));\n    }\n\n    function isClockValue(value) {\n      const text = String(value || \"\").trim();\n      return Boolean(text && text.toLowerCase() !== \"missing?\");\n    }\n\n    function isInvalidTimeValue(value) {\n      const text = String(value || \"\").trim();\n      return Boolean(text && text.toLowerCase() !== \"missing?\" && minutesFromMilitary(text) === null);\n    }\n\n    function updateInvalidTimeStateForRow(row) {\n      const inputs = row.querySelectorAll(\".time-cell input\");\n      if (inputs.length < 3) return false;\n      const invalidStart = isInvalidTimeValue(inputs[0].value);\n      const invalidEnd = isInvalidTimeValue(inputs[2].value);\n      inputs[0].classList.toggle(\"invalid-time\", invalidStart);\n      inputs[2].classList.toggle(\"invalid-time\", invalidEnd);\n      return invalidStart || invalidEnd;\n    }\n\n    function rowHasInvalidTime(row) {\n      const inputs = row.querySelectorAll(\".time-cell input\");\n      if (inputs.length < 3) return false;\n      return isInvalidTimeValue(inputs[0].value) || isInvalidTimeValue(inputs[2].value);\n    }\n\n    function rowHasClockTime(row) {\n      const inputs = row.querySelectorAll(\".time-cell input\");\n      return Boolean((inputs[0] && isClockValue(inputs[0].value)) || (inputs[2] && isClockValue(inputs[2].value)));\n    }\n\n    function rowIsCurrentlyHere(row) {\n      const inputs = row.querySelectorAll(\".time-cell input\");\n      if (inputs.length < 3) return false;\n      return minutesFromMilitary(inputs[0].value) !== null && minutesFromMilitary(inputs[2].value) === null;\n    }\n\n    function rowHasValidClockIn(row) {\n      const inputs = row.querySelectorAll(\".time-cell input\");\n      if (!inputs.length) return false;\n      return minutesFromMilitary(inputs[0].value) !== null;\n    }\n\n    function updateScheduleStyleForRow(row) {\n      const nameCell = row.querySelector(\"td.name\");\n      if (!nameCell) return;\n\n      const startCell = row.querySelector(\".time-cell\");\n      const scheduled = rowIsScheduledToWork(row);\n      const hasClockTime = rowHasClockTime(row);\n      const offIdle = !scheduled && !hasClockTime;\n      const offDayClock = !scheduled && hasClockTime;\n      const purpleAbsence = rowHasPurpleAbsence(row);\n      const unpaidAbsence = row.dataset.absenceUnpaid === \"1\";\n      nameCell.classList.toggle(\"scheduled\", scheduled);\n      nameCell.classList.toggle(\"off-day-clock\", offDayClock);\n      row.classList.toggle(\"off-employee-row\", offIdle);\n      row.classList.toggle(\"purple-absence-row\", purpleAbsence);\n      row.classList.toggle(\"unpaid-absence-row\", unpaidAbsence);\n      if (startCell) {\n        startCell.classList.add(\"start-status\");\n        startCell.classList.toggle(\"scheduled\", scheduled);\n        startCell.classList.toggle(\"off-day-clock\", offDayClock);\n      }\n    }\n\n    function employeeNameForSort(row) {\n      return (row.querySelector(\"td.name\")?.textContent || \"\").trim();\n    }\n\n    function statusSortRank(row) {\n      const scheduled = rowIsScheduledToWork(row);\n      const clockedIn = rowHasValidClockIn(row);\n      const purpleAbsence = rowHasPurpleAbsence(row);\n\n      if (scheduled && clockedIn && !purpleAbsence) return 0;\n      if (!scheduled && clockedIn) return 1;\n      if (purpleAbsence) return 2;\n      if (scheduled && !clockedIn) return 3;\n      if (!scheduled && !clockedIn) return 4;\n      return 4;\n    }\n\n    function sectionEmployeeRows(headerRow) {\n      const rows = [];\n      let anchor = headerRow.nextElementSibling;\n\n      while (anchor && !anchor.querySelector(\"th.section-name\")) {\n        if (!anchor.querySelector(\"td.name\")) break;\n        rows.push(anchor);\n        anchor = anchor.nextElementSibling;\n      }\n\n      return { rows, anchor };\n    }\n\n    function sortShiftRows(headerCell, forcedMode = \"\") {\n      const headerRow = headerCell.closest(\"tr\");\n      if (!headerRow) return;\n\n      const mode = forcedMode || (headerCell.dataset.sortMode === \"status\" ? \"alpha\" : \"status\");\n      const { rows, anchor } = sectionEmployeeRows(headerRow);\n      const sorted = rows.slice().sort((a, b) => {\n        if (mode === \"status\") {\n          const rankDiff = statusSortRank(a) - statusSortRank(b);\n          if (rankDiff) return rankDiff;\n        }\n        return employeeNameForSort(a).localeCompare(employeeNameForSort(b));\n      });\n\n      sorted.forEach((row) => {\n        headerRow.parentNode.insertBefore(row, anchor);\n      });\n      headerCell.dataset.sortMode = mode;\n    }\n\n    function sortAllShiftsByStatus() {\n      document.querySelectorAll(\".time-table th.section-name\").forEach((header) => {\n        sortShiftRows(header, \"status\");\n      });\n    }\n\n    function sectionKeyForRow(row) {\n      let cursor = row;\n      while (cursor) {\n        const header = cursor.querySelector(\"th.section-name\");\n        if (header) return getSectionKey(header.textContent);\n        cursor = cursor.previousElementSibling;\n      }\n      return \"\";\n    }\n\n    function currentMinutes() {\n      const now = new Date();\n      return (now.getHours() * 60) + now.getMinutes();\n    }\n\n    function currentMilitaryTime() {\n      return militaryFromMinutes(currentMinutes());\n    }\n\n    function shouldCheckMissingStart(row) {\n      const sectionKey = sectionKeyForRow(row);\n      if (sectionKey === \"gate\") return false;\n      if (sectionKey === \"second\") return currentMinutes() >= minutesFromMilitary(\"1500\");\n      return true;\n    }\n\n    function rowHasAbsence(row) {\n      return Boolean((row.dataset.absenceNote || \"\").trim());\n    }\n\n    function rowHasManualNote(row) {\n      const noteInput = row.querySelector(\".note-input\");\n      if (noteInput && isRealNoteValue(noteInput.value)) return true;\n      const name = row.querySelector(\"td.name\")?.textContent.trim() || \"\";\n      return Boolean(getManualNote(name));\n    }\n\n    function paidNoteHoursForText(value) {\n      return /\\bfloating holidays?\\b|\\bvacations?\\b/i.test(String(value || \"\")) ? 8 : 0;\n    }\n\n    function rowNoteText(row) {\n      const noteInput = row.querySelector(\".note-input\");\n      if (noteInput) return noteInput.value;\n      const name = row.querySelector(\"td.name\")?.textContent.trim() || \"\";\n      return getManualNote(name);\n    }\n\n    function paidNoteHoursForRow(row) {\n      return paidNoteHoursForText([row.dataset.absenceNote || \"\", rowNoteText(row)].join(\" \"));\n    }\n\n    function rowHasPurpleAbsence(row) {\n      const note = String([row.dataset.absenceNote || \"\", rowNoteText(row)].join(\" \")).toLowerCase();\n      return row.dataset.absencePaid === \"1\" ||\n        row.dataset.absenceUnpaid === \"1\" ||\n        /\\bfloating holidays?\\b/.test(note) ||\n        /\\bvacations?\\b/.test(note) ||\n        /\\bsick\\b/.test(note) ||\n        /\\bunpaid\\b/.test(note);\n    }\n\n    function notePill(label, className = \"\") {\n      return `<span class=\"note-pill ${className}\">${escapeHtml(label)}</span>`;\n    }\n\n    function dayLabelFromOffset(offset) {\n      const date = new Date();\n      date.setDate(date.getDate() + offset);\n      return date.toLocaleDateString(undefined, { weekday: \"long\", month: \"short\", day: \"numeric\" });\n    }\n\n    function updateScheduledHighlights() {\n      document.querySelectorAll(\".time-table tr\").forEach((row) => {\n        updateScheduleStyleForRow(row);\n      });\n    }\n\n    function updateMissingStartForRow(row) {\n      const nameCell = row.querySelector(\"td.name\");\n      const startInput = row.querySelector(\".time-cell input\");\n      if (!nameCell || !startInput) return;\n\n      updateScheduleStyleForRow(row);\n      const missingStart = shouldCheckMissingStart(row) && rowIsScheduledToWork(row) && !rowHasAbsence(row) && !rowHasManualNote(row) && !isClockValue(startInput.value);\n      startInput.classList.toggle(\"missing-start\", missingStart);\n      startInput.placeholder = missingStart ? \"Missing?\" : \"\";\n      nameCell.classList.toggle(\"missing-worker\", missingStart);\n      startInput.closest(\".time-cell\")?.classList.toggle(\"missing-worker\", missingStart);\n    }\n\n    function updateMissingStarts() {\n      document.querySelectorAll(\".time-table tbody tr\").forEach(updateMissingStartForRow);\n    }\n\n    function updateOffDayNoteForRow(row) {\n      const nameCell = row.querySelector(\"td.name\");\n      const noteCell = row.children[2];\n      const inputs = row.querySelectorAll(\".time-cell input\");\n      if (!nameCell || !noteCell || inputs.length < 3) return;\n\n      if (!noteCell.hasAttribute(\"data-default-note\")) {\n        const existingInput = noteCell.querySelector(\".note-input\");\n        const initialNote = (existingInput ? existingInput.value : noteCell.textContent).trim();\n        noteCell.dataset.defaultNote = initialNote === \"-\" ? \"\" : initialNote;\n      }\n\n      const hasClockTime = isClockValue(inputs[0].value) || isClockValue(inputs[2].value);\n      const cameInOffDay = !rowIsScheduledToWork(row) && hasClockTime;\n      const absenceNote = (row.dataset.absenceNote || \"\").trim();\n      const noteLabels = [];\n      let noteClass = \"\";\n      if (absenceNote) {\n        noteClass = row.dataset.absenceUnpaid === \"1\" ? \"unpaid\" : \"paid\";\n        absenceNote.split(\",\").map((item) => item.trim()).filter(Boolean).forEach((item) => {\n          noteLabels.push(item);\n        });\n      }\n      if (rowHasInvalidTime(row)) {\n        noteLabels.push(\"Invalid\");\n        noteClass = \"invalid\";\n      }\n      if (cameInOffDay) {\n        noteLabels.push(\"Came In Off Day\");\n        if (!noteClass) noteClass = \"auto\";\n      }\n\n      const name = nameCell.textContent.trim();\n      const manualNote = getManualNote(name);\n      const defaultNote = (noteCell.dataset.defaultNote || \"\").trim();\n      const displayValue = manualNote || noteLabels.join(\", \") || defaultNote;\n      noteCell.classList.add(\"note-cell-editable\");\n      noteCell.classList.toggle(\"note-flag\", noteLabels.length > 0);\n      noteCell.innerHTML = noteInputHtml(name, displayValue, noteLabels.length ? noteClass : \"\");\n    }\n\n    function updateOffDayNotes() {\n      document.querySelectorAll(\".time-table tbody tr\").forEach(updateOffDayNoteForRow);\n    }\n\n    function getSectionKey(text) {\n      const normalized = text.toLowerCase();\n      if (normalized.includes(\"1st\")) return \"first\";\n      if (normalized.includes(\"second\") || normalized.includes(\"2nd\")) return \"second\";\n      if (normalized.includes(\"gate\")) return \"gate\";\n      return \"\";\n    }\n\n    function getSectionLabel(key) {\n      return {\n        first: \"1st Shift\",\n        second: \"2ND SHIFT\",\n        gate: \"Gate\"\n      }[key] || key;\n    }\n\n    function offByShiftForOffset(offset) {\n      const targetDay = dayKeyFromOffset(offset);\n      const groups = { first: [], second: [], gate: [] };\n      let sectionKey = \"\";\n\n      document.querySelectorAll(\".time-table tbody tr\").forEach((row) => {\n        const header = row.querySelector(\"th.section-name\");\n        if (header) {\n          sectionKey = getSectionKey(header.textContent);\n          return;\n        }\n\n        if (!groups[sectionKey]) return;\n        const nameCell = row.querySelector(\"td.name\");\n        if (!nameCell) return;\n\n        const offDays = parseOffDays(row.children[1] ? row.children[1].textContent : \"\");\n        if (offDays.has(targetDay)) groups[sectionKey].push(nameCell.textContent.trim());\n      });\n\n      return groups;\n    }\n\n    function renderOffDayPanel(offset, title) {\n      const groups = offByShiftForOffset(offset);\n      const grid = [\"first\", \"second\", \"gate\"].map((key) => {\n        const names = groups[key];\n        const list = names.length ? names.map((name) => `<li>${escapeHtml(name)}</li>`).join(\"\") : \"<li>None</li>\";\n        return `<section class=\"off-shift-list\"><h3>${getSectionLabel(key)} [${names.length}]</h3><ul>${list}</ul></section>`;\n      }).join(\"\");\n      return `<section class=\"off-day-panel\"><h2>${title} - ${dayLabelFromOffset(offset)}</h2><div class=\"off-day-grid\">${grid}</div></section>`;\n    }\n\n    function showTomorrowOffModal() {\n      document.getElementById(\"tomorrowOffTitle\").textContent = \"Off Days Preview\";\n      modalContent.innerHTML = [\n        renderOffDayPanel(1, \"Off Tomorrow\"),\n        renderOffDayPanel(2, \"Off Day After Tomorrow\")\n      ].join(\"\");\n      modal.classList.add(\"open\");\n      modal.setAttribute(\"aria-hidden\", \"false\");\n    }\n\n    function closeTomorrowOffModal() {\n      modal.classList.remove(\"open\");\n      modal.setAttribute(\"aria-hidden\", \"true\");\n    }\n\n    function escapeHtml(value) {\n      return String(value).replace(/[&<>\"']/g, (char) => ({\n        \"&\": \"&amp;\",\n        \"<\": \"&lt;\",\n        \">\": \"&gt;\",\n        '\"': \"&quot;\",\n        \"'\": \"&#39;\"\n      }[char]));\n    }\n\n    function rosterOffDaysLabel(days) {\n      return days\n        .map((day, index) => day === \"O\" ? rosterDayLabels[index] : \"\")\n        .filter(Boolean)\n        .join(\", \");\n    }\n\n    function readRosterAdditions() {\n      try {\n        const additions = JSON.parse(localStorage.getItem(rosterAdditionsKey) || \"[]\");\n        return Array.isArray(additions) ? additions : [];\n      } catch (error) {\n        localStorage.removeItem(rosterAdditionsKey);\n        return [];\n      }\n    }\n\n    function addPendingRosterRows(roster) {\n      const additions = readRosterAdditions();\n      if (!additions.length) return roster;\n\n      const seen = new Set(Object.values(roster)\n        .flatMap((rows) => Array.isArray(rows) ? rows : [])\n        .map((employee) => normalizeName(employee.name || \"\")));\n      additions.forEach((addition) => {\n        if (!addition || !addition.name) return;\n        const key = normalizeName(addition.name);\n        const shift = addition.shift || \"first\";\n        if (!key || seen.has(key)) return;\n        if (!Array.isArray(roster[shift])) roster[shift] = [];\n        roster[shift].push({\n          name: addition.name,\n          role: addition.role || \"\",\n          days: Array.isArray(addition.days) ? addition.days : [\"W\", \"W\", \"W\", \"W\", \"W\", \"W\", \"W\"]\n        });\n        seen.add(key);\n      });\n      return roster;\n    }\n\n    function sectionRows() {\n      const sections = {};\n      let sectionKey = \"\";\n      document.querySelectorAll(\".time-table tbody tr\").forEach((row) => {\n        const header = row.querySelector(\"th.section-name\");\n        if (header) {\n          sectionKey = getSectionKey(header.textContent);\n          if (!sections[sectionKey]) sections[sectionKey] = [];\n          return;\n        }\n\n        if (!sectionKey || !row.querySelector(\"td.name\")) return;\n        sections[sectionKey].push(row);\n      });\n      return sections;\n    }\n\n    function daysArrayFromOffDaysLabel(label) {\n      const offDays = parseOffDays(label || \"\");\n      return [\"mon\", \"tue\", \"wed\", \"thu\", \"fri\", \"sat\", \"sun\"].map((day) => offDays.has(day) ? \"O\" : \"W\");\n    }\n\n    function currentTableRoster() {\n      const sections = sectionRows();\n      return Object.fromEntries(Object.entries(sections).map(([sectionKey, rows]) => [\n        sectionKey,\n        rows\n          .map((row) => ({\n            name: row.querySelector(\"td.name\")?.textContent.trim() || \"\",\n            days: daysArrayFromOffDaysLabel(row.children[1]?.textContent || \"\")\n          }))\n          .filter((employee) => employee.name)\n      ]));\n    }\n\n    function dedupeRoster(roster) {\n      const seen = new Set();\n      [\"first\", \"second\", \"gate\", \"mechanics\", \"managers\"].forEach((sectionKey) => {\n        if (!Array.isArray(roster[sectionKey])) return;\n        roster[sectionKey] = roster[sectionKey].filter((employee) => {\n          const key = normalizeName(employee?.name || \"\");\n          if (!key || seen.has(key)) return false;\n          seen.add(key);\n          return true;\n        });\n      });\n      return roster;\n    }\n\n    function createTimeRow() {\n      const row = document.createElement(\"tr\");\n      row.innerHTML = `<td class=\"name\"></td><td class=\"center\"></td><td class=\"center\">-</td><td class=\"time-cell\"><input /></td><td class=\"time-cell\"><input /></td><td class=\"time-cell\"><input /></td><td></td>`;\n      return row;\n    }\n\n    function insertTimeRow(sectionKey, row, existingRows) {\n      const body = document.querySelector(\".time-table tbody\");\n      const lastRow = existingRows[existingRows.length - 1];\n      if (lastRow) {\n        lastRow.insertAdjacentElement(\"afterend\", row);\n        return;\n      }\n\n      const headerRow = Array.from(body.querySelectorAll(\"tr\")).find((candidate) => {\n        const header = candidate.querySelector(\"th.section-name\");\n        return header && getSectionKey(header.textContent) === sectionKey;\n      });\n      if (headerRow) headerRow.insertAdjacentElement(\"afterend\", row);\n    }\n\n    function updateOffDaysFromRoster() {\n      const saved = localStorage.getItem(rosterStorageKey);\n      const additions = readRosterAdditions();\n      if (!saved && !additions.length) return;\n\n      try {\n        const baseRoster = saved ? migrateMcDanielToDays(JSON.parse(saved)) : currentTableRoster();\n        const roster = dedupeRoster(addPendingRosterRows(baseRoster));\n        const sections = sectionRows();\n\n        [\"first\", \"second\", \"gate\"].forEach((sectionKey) => {\n          if (!Array.isArray(roster[sectionKey])) return;\n          const rosterRows = roster[sectionKey];\n          const rows = sections[sectionKey] || [];\n          rosterRows.forEach((rosterRow, index) => {\n            if (!rosterRow || !rosterRow.name || !Array.isArray(rosterRow.days)) return;\n            let row = rows[index];\n            if (!row) {\n              row = createTimeRow();\n              insertTimeRow(sectionKey, row, rows);\n              rows.push(row);\n            }\n\n            const nameCell = row.querySelector(\"td.name\");\n            if (!nameCell) return;\n            nameCell.textContent = rosterRow.name;\n            row.children[1].textContent = rosterOffDaysLabel(rosterRow.days);\n          });\n\n          if (saved) {\n            rows.slice(rosterRows.length).forEach((row) => row.remove());\n          }\n        });\n      } catch (error) {\n        localStorage.removeItem(rosterStorageKey);\n      }\n    }\n\n    function normalizeName(name) {\n      const suffixes = new Set([\"jr\", \"sr\", \"ii\", \"iii\", \"iv\"]);\n      return name\n        .trim()\n        .toLowerCase()\n        .replace(/[,.]/g, \" \")\n        .replace(/\\bcontrerras\\b/g, \"contreras\")\n        .replace(/\\s+/g, \" \")\n        .split(\" \")\n        .filter((part) => part && !suffixes.has(part))\n        .sort()\n        .join(\" \");\n    }\n\n    function readManualNotes() {\n      try {\n        const saved = JSON.parse(localStorage.getItem(timesheetNotesKey) || \"{}\");\n        return saved && typeof saved === \"object\" && !Array.isArray(saved) ? saved : {};\n      } catch (error) {\n        localStorage.removeItem(timesheetNotesKey);\n        return {};\n      }\n    }\n\n    function getManualNote(name) {\n      const key = normalizeName(name);\n      if (!key) return \"\";\n      return String(readManualNotes()[key] || \"\").trim();\n    }\n\n    function isRealNoteValue(value) {\n      const text = String(value || \"\").trim();\n      return Boolean(text && text !== \"-\");\n    }\n\n    function saveManualNote(name, value) {\n      const key = normalizeName(name);\n      if (!key) return;\n      const notes = readManualNotes();\n      const text = String(value || \"\").trim();\n      if (isRealNoteValue(text)) notes[key] = text;\n      else delete notes[key];\n      localStorage.setItem(timesheetNotesKey, JSON.stringify(notes));\n    }\n\n    function noteInputHtml(name, value, className = \"\") {\n      const classes = [\"note-input\", className, isRealNoteValue(value) ? \"has-note\" : \"\"].filter(Boolean).join(\" \");\n      return `<input type=\"text\" class=\"${classes}\" list=\"timesheetNoteOptions\" autocomplete=\"off\" data-note-name=\"${escapeHtml(name)}\" value=\"${escapeHtml(value)}\" placeholder=\"\" aria-label=\"${escapeHtml(name)} note\" title=\"Select a note or type custom text\" />`;\n    }\n\n    function migrateMcDanielToDays(state) {\n      if (!state || !Array.isArray(state.second)) return state;\n      if (!Array.isArray(state.first)) state.first = [];\n\n      const alreadyOnDays = state.first.some((employee) => normalizeName(employee.name || \"\") === \"charles mcdaniel\");\n      const secondIndex = state.second.findIndex((employee) => normalizeName(employee.name || \"\") === \"charles mcdaniel\");\n      if (secondIndex === -1) return state;\n\n      const [employee] = state.second.splice(secondIndex, 1);\n      if (!alreadyOnDays) state.first.push(employee);\n      localStorage.setItem(rosterStorageKey, JSON.stringify(state));\n      return state;\n    }\n\n    function toMilitaryTime(value) {\n      const text = String(value || \"\").trim();\n      if (!text) return \"\";\n\n      const match = text.match(/^(\\d{1,2}):(\\d{2})\\s*([ap])m$/i);\n      if (!match) return text;\n\n      let hour = Number(match[1]);\n      const minute = match[2];\n      const period = match[3].toLowerCase();\n\n      if (period === \"p\" && hour !== 12) hour += 12;\n      if (period === \"a\" && hour === 12) hour = 0;\n\n      return `${String(hour).padStart(2, \"0\")}${minute}`;\n    }\n\n    function toMilitaryRange(value) {\n      return String(value || \"\")\n        .split(\"-\")\n        .map((part) => toMilitaryTime(part.trim()))\n        .filter(Boolean)\n        .join(\" - \");\n    }\n\n    function minutesFromMilitary(value) {\n      const text = String(value || \"\").trim();\n      const match = text.match(/^(\\d{1,2})(\\d{2})$/);\n      if (!match) return null;\n\n      const hours = Number(match[1]);\n      const minutes = Number(match[2]);\n      if (hours > 24 || minutes > 59 || (hours === 24 && minutes !== 0)) return null;\n      return (hours * 60) + minutes;\n    }\n\n    function militaryFromMinutes(value) {\n      const minutes = ((Math.round(value) % 1440) + 1440) % 1440;\n      const hours = Math.floor(minutes / 60);\n      const mins = minutes % 60;\n      return `${String(hours).padStart(2, \"0\")}${String(mins).padStart(2, \"0\")}`;\n    }\n\n    function shiftEndValue() {\n      const preset = document.getElementById(\"shiftEndSelect\").value;\n      if (preset !== \"other\") return preset;\n      return document.getElementById(\"shiftEndOther\").value.trim().padStart(4, \"0\");\n    }\n\n    function updateShiftEndMode(shouldRecalculate = true) {\n      const isOther = document.getElementById(\"shiftEndSelect\").value === \"other\";\n      const custom = document.getElementById(\"shiftEndOther\");\n      custom.classList.toggle(\"open\", isOther);\n      if (isOther) custom.focus();\n      if (shouldRecalculate) updateCurrentLpmh();\n    }\n\n    function hoursUntilShiftEnd(value) {\n      const endMinutes = minutesFromMilitary(value);\n      if (endMinutes === null) return 0;\n\n      const now = new Date();\n      const nowMinutes = (now.getHours() * 60) + now.getMinutes();\n      let remaining = endMinutes - nowMinutes;\n      if (remaining <= 0) remaining += 24 * 60;\n      return remaining / 60;\n    }\n\n    function calculateActualForRow(row, options = {}) {\n      const inputs = row.querySelectorAll(\".time-cell input\");\n      if (inputs.length < 3) return;\n      const refreshNote = options.refreshNote !== false;\n\n      const start = minutesFromMilitary(inputs[0].value);\n      const hasTemporaryEnd = start !== null && !isClockValue(inputs[2].value);\n      const temporaryEnd = hasTemporaryEnd ? currentMilitaryTime() : \"\";\n      inputs[2].classList.toggle(\"temp-clock-out\", hasTemporaryEnd);\n      inputs[2].placeholder = hasTemporaryEnd ? temporaryEnd : \"\";\n\n      const end = minutesFromMilitary(hasTemporaryEnd ? temporaryEnd : inputs[2].value);\n      const actualCell = row.children[6];\n      if (!actualCell) return;\n      updateInvalidTimeStateForRow(row);\n      updateMissingStartForRow(row);\n      if (refreshNote) updateOffDayNoteForRow(row);\n      const paidNoteHours = paidNoteHoursForRow(row);\n      actualCell.classList.add(\"actual-cell\");\n      if (start === null || end === null) {\n        actualCell.textContent = paidNoteHours ? paidNoteHours.toFixed(1) : \"\";\n        return;\n      }\n\n      let minutes = end - start;\n      if (minutes < 0) minutes += 24 * 60;\n      if (inputs[1].value.trim().toUpperCase() === \"YES\") minutes -= 30;\n\n      const clockedHours = minutes > 0 ? minutes / 60 : 0;\n      const totalHours = clockedHours + paidNoteHours;\n      actualCell.textContent = totalHours > 0 ? totalHours.toFixed(1) : \"\";\n    }\n\n    function calculateActualHours() {\n      document.querySelectorAll(\".time-table tbody tr\").forEach(calculateActualForRow);\n      updateMissingStarts();\n      updateOffDayNotes();\n      updateScheduledCounts();\n      updateStartCounts();\n      updateActualHeaders();\n      updateCurrentLpmh();\n    }\n\n    function updateStartCounts() {\n      let headerRow = null;\n      let hereCount = 0;\n      let outCount = 0;\n\n      function commitCount() {\n        if (!headerRow) return;\n        const startHeader = headerRow.children[3];\n        if (startHeader) {\n          const total = hereCount + outCount;\n          startHeader.textContent = total > 0 ? `${hereCount} HERE, ${outCount} OUT` : \"START\";\n        }\n      }\n\n      document.querySelectorAll(\".time-table tbody tr\").forEach((row) => {\n        const sectionHeader = row.querySelector(\"th.section-name\");\n        if (sectionHeader) {\n          commitCount();\n          headerRow = row;\n          hereCount = 0;\n          outCount = 0;\n          return;\n        }\n\n        if (!headerRow) return;\n        const inputs = row.querySelectorAll(\".time-cell input\");\n        if (inputs.length < 3) return;\n        const hasStart = minutesFromMilitary(inputs[0].value) !== null;\n        const hasEnd = minutesFromMilitary(inputs[2].value) !== null;\n        const currentlyHere = hasStart && !hasEnd;\n        if (currentlyHere) {\n          hereCount += 1;\n          return;\n        }\n        if (rowIsScheduledToWork(row) && !rowHasAbsence(row)) outCount += 1;\n      });\n\n      commitCount();\n    }\n\n    function sectionHeaderBaseText(header) {\n      if (!header.dataset.baseLabel) {\n        header.dataset.baseLabel = header.textContent.replace(/\\s*\\[\\d+\\s*sch\\]\\s*$/i, \"\").trim();\n      }\n      return header.dataset.baseLabel;\n    }\n\n    function updateScheduledCounts() {\n      let headerCell = null;\n      let scheduledCount = 0;\n\n      function commitCount() {\n        if (!headerCell) return;\n        headerCell.textContent = `${sectionHeaderBaseText(headerCell)} [${scheduledCount} sch]`;\n      }\n\n      document.querySelectorAll(\".time-table tbody tr\").forEach((row) => {\n        const sectionHeader = row.querySelector(\"th.section-name\");\n        if (sectionHeader) {\n          commitCount();\n          headerCell = sectionHeader;\n          scheduledCount = 0;\n          return;\n        }\n\n        if (!headerCell || !row.querySelector(\"td.name\")) return;\n        if (rowIsScheduledToWork(row)) scheduledCount += 1;\n      });\n\n      commitCount();\n    }\n\n    function actualHoursBySection() {\n      const totals = {};\n      let sectionKey = \"\";\n\n      document.querySelectorAll(\".time-table tbody tr\").forEach((row) => {\n        const header = row.querySelector(\"th.section-name\");\n        if (header) {\n          sectionKey = getSectionKey(header.textContent);\n          if (sectionKey && totals[sectionKey] === undefined) totals[sectionKey] = 0;\n          return;\n        }\n\n        if (!sectionKey) return;\n        const actual = Number(row.children[6] ? row.children[6].textContent : \"\");\n        if (!Number.isNaN(actual)) totals[sectionKey] = (totals[sectionKey] || 0) + actual;\n      });\n\n      return totals;\n    }\n\n    function updateActualHeaders() {\n      const totals = actualHoursBySection();\n      let sectionKey = \"\";\n\n      document.querySelectorAll(\".time-table tbody tr\").forEach((row) => {\n        const sectionHeader = row.querySelector(\"th.section-name\");\n        if (!sectionHeader) return;\n        sectionKey = getSectionKey(sectionHeader.textContent);\n        const actualHeader = row.children[6];\n        if (actualHeader) actualHeader.textContent = `Actual ${((totals[sectionKey] || 0)).toFixed(1)}`;\n      });\n    }\n\n    function shiftHoursFor(keys) {\n      const totals = actualHoursBySection();\n      return keys.reduce((sum, key) => sum + (totals[key] || 0), 0);\n    }\n\n    function previousTimesheetImport() {\n      try {\n        const saved = JSON.parse(localStorage.getItem(previousTimesheetStorageKey) || \"null\");\n        return saved && typeof saved.hours === \"number\" ? saved : null;\n      } catch (error) {\n        localStorage.removeItem(previousTimesheetStorageKey);\n        return null;\n      }\n    }\n\n    function previousShiftHours() {\n      const imported = previousTimesheetImport();\n      return imported ? Math.max(Number(imported.hours) || 0, 0) : 0;\n    }\n\n    function currentLpmhBreakdown() {\n      const lifts = Number(document.getElementById(\"updateLifts\").value) || 0;\n      const flips = Number(document.getElementById(\"updateFlips\").value) || 0;\n      const rawShiftHours = shiftHoursFor([\"first\", \"second\"]);\n      const previousHours = previousShiftHours();\n      const shiftHours = rawShiftHours + previousHours;\n      const totalMoves = Math.max(lifts + flips, 0);\n      const currentRate = shiftHours > 0 ? totalMoves / shiftHours : 0;\n      const neededValue = Math.ceil(shiftHours * lpmhGoal);\n      const remainValue = neededValue - totalMoves;\n      const remainingHours = hoursUntilShiftEnd(shiftEndValue());\n      const goalMet = shiftHours > 0 && currentRate >= lpmhGoal;\n      const neededLph = goalMet ? \"MET GOAL!\" : (remainingHours > 0 ? (Math.max(remainValue, 0) / remainingHours).toFixed(1) : \"0.0\");\n      return { lifts, flips, rawShiftHours, previousHours, shiftHours, totalMoves, currentRate, neededValue, remainValue, remainingHours, goalMet, neededLph };\n    }\n\n    function updateCurrentLpmh() {\n      const details = currentLpmhBreakdown();\n      const current = document.getElementById(\"currentLpmh\");\n      const neededRate = document.getElementById(\"lphNeeded\");\n      const needed = document.getElementById(\"liftsNeeded\");\n      const remain = document.getElementById(\"liftsRemain\");\n      const rate = details.currentRate.toFixed(1);\n      current.textContent = rate;\n      needed.textContent = String(details.neededValue);\n      remain.textContent = details.goalMet ? \"MET GOAL!\" : String(Math.max(details.remainValue, 0));\n      neededRate.textContent = details.neededLph;\n      if (lpmhModal.classList.contains(\"open\")) renderCurrentLpmhDetails();\n    }\n\n    function renderCurrentLpmhDetails() {\n      const details = currentLpmhBreakdown();\n      const rows = [\n        [\"Lifts\", details.lifts],\n        [\"Flips\", details.flips],\n        [\"Total moves\", `${details.lifts} + ${details.flips} = ${details.totalMoves}`],\n        [\"Current 1st + 2nd hrs\", details.rawShiftHours.toFixed(1)],\n        [\"0000-0300 hrs\", details.previousHours.toFixed(1)],\n        [\"Total hrs\", `${details.rawShiftHours.toFixed(1)} + ${details.previousHours.toFixed(1)} = ${details.shiftHours.toFixed(1)}`]\n      ];\n      const formula = `${details.totalMoves} MOVES / ${details.shiftHours.toFixed(1)} HRS = ${details.currentRate.toFixed(1)}`;\n      lpmhDetails.innerHTML = [\n        ...rows.map(([label, value]) => `<div class=\"lpmh-row\"><span>${escapeHtml(label)}</span><span>${escapeHtml(value)}</span></div>`),\n        `<div class=\"lpmh-formula\">${escapeHtml(formula)}</div>`\n      ].join(\"\");\n    }\n\n    function showCurrentLpmhModal() {\n      renderCurrentLpmhDetails();\n      lpmhModal.classList.add(\"open\");\n      lpmhModal.setAttribute(\"aria-hidden\", \"false\");\n    }\n\n    function closeCurrentLpmhModal() {\n      lpmhModal.classList.remove(\"open\");\n      lpmhModal.setAttribute(\"aria-hidden\", \"true\");\n    }\n\n    function applyDayforcePunches() {\n      const saved = localStorage.getItem(dayforceStorageKey);\n      if (!saved) return;\n\n      try {\n        const punches = JSON.parse(saved);\n        if (!Array.isArray(punches)) return;\n\n        const visibleNames = new Set(Array.from(document.querySelectorAll(\".time-table tbody td.name\"))\n          .map((cell) => normalizeName(cell.textContent)));\n        const rosterPunches = punches.filter((item) => visibleNames.has(normalizeName(item.name || \"\")));\n        if (rosterPunches.length !== punches.length) {\n          localStorage.setItem(dayforceStorageKey, JSON.stringify(rosterPunches));\n        }\n\n        const byName = new Map(rosterPunches.map((item) => [normalizeName(item.name || \"\"), item]));\n        document.querySelectorAll(\".time-table tbody tr\").forEach((row) => {\n          const nameCell = row.querySelector(\"td.name\");\n          if (!nameCell) return;\n          delete row.dataset.absenceNote;\n          delete row.dataset.absenceUnpaid;\n          delete row.dataset.absencePaid;\n          delete row.dataset.absenceHours;\n          delete row.dataset.workdayKey;\n\n          const punch = byName.get(normalizeName(nameCell.textContent));\n          if (!punch) {\n            updateOffDayNoteForRow(row);\n            updateMissingStartForRow(row);\n            return;\n          }\n          const punchDayKey = dayKeyFromDateValue(punch.date);\n          if (punchDayKey) row.dataset.workdayKey = punchDayKey;\n          const note = String(punch.note || punch.reason || \"\").trim();\n          if (note) {\n            row.dataset.absenceNote = note;\n            row.dataset.absenceUnpaid = punch.absenceUnpaid ? \"1\" : \"\";\n            row.dataset.absencePaid = punch.absencePaid ? \"1\" : \"\";\n            row.dataset.absenceHours = punch.absenceHours || \"\";\n          }\n\n          const inputs = row.querySelectorAll(\".time-cell input\");\n          const rawLunch = String(punch.lunch || \"\").trim();\n          const noLunch = rawLunch.toUpperCase() === \"NO\";\n          const lunchValue = noLunch ? \"\" : toMilitaryRange(rawLunch);\n          const values = [toMilitaryTime(punch.start), noLunch ? \"NO\" : (lunchValue ? \"YES\" : \"\"), toMilitaryTime(punch.end)];\n          inputs.forEach((input, index) => {\n            const hasMissingLunch = index === 1 && !note && !values[index] && (values[0] || values[2]);\n            input.value = hasMissingLunch ? \"??\" : values[index] || \"\";\n            input.classList.toggle(\"imported\", Boolean(values[index]) && !hasMissingLunch);\n            input.classList.toggle(\"missing-lunch\", hasMissingLunch);\n          });\n          calculateActualForRow(row);\n        });\n        updateStartCounts();\n        updateActualHeaders();\n        updateCurrentLpmh();\n      } catch (error) {\n        localStorage.removeItem(dayforceStorageKey);\n      }\n    }\n\n    document.addEventListener(\"input\", (event) => {\n      if (event.target.matches(\".note-input\")) {\n        saveManualNote(event.target.dataset.no dy.querySelector(\"tr.record-row\"));\n    }\n\n    function updatePushNotice() {\n      const show = localStorage.getItem(pendingPushKey) === \"1\" && hasPreviewRecords();\n      pushNotice.hidden = !show;\n      saveButton.classList.toggle(\"pending-push\", show);\n    }\n\n    function notifyTimesheetMdUpdate() {\n      if (typeof window.render === \"function\") window.render();\n      window.dispatchEvent(new CustomEvent(\"conglobal-md-import-updated\"));\n    }\n\n    function autoApplyPreviewToTimesheet(showStatus = true) {\n      const previewPunches = readPreview();\n      const { accepted, skipped } = rosterValidatedPunches(previewPunches);\n      saveAcceptedPunches(accepted);\n      localStorage.setItem(unmatchedStorageKey, JSON.stringify(Array.from(new Set(skipped))));\n      localStorage.removeItem(pendingPushKey);\n      renderPunches(previewPunches);\n      updatePushNotice();\n      notifyTimesheetMdUpdate();\n      if (showStatus) {\n        status.textContent = skipped.length\n          ? `${accepted.length} applied to Timesheet / ${skipped.length} unmatched`\n          : `${accepted.length} applied to Timesheet`;\n      }\n    }\n\n    function setPendingPush(value) {\n      if (value && hasPreviewRecords()) {\n        localStorage.setItem(pendingPushKey, \"1\");\n        updatePushNotice();\n        autoApplyPreviewToTimesheet(true);\n        return;\n      }\n      localStorage.removeItem(pendingPushKey);\n      updatePushNotice();\n    }\n\n    function normalizeName(name) {\n      const suffixes = new Set([\"jr\", \"sr\", \"ii\", \"iii\", \"iv\"]);\n      return String(name || \"\")\n        .trim()\n        .toLowerCase()\n        .replace(/[,.]/g, \" \")\n        .replace(/\\bcontrerras\\b/g, \"contreras\")\n        .replace(/\\bdemeatrius\\b/g, \"demetrius\")\n        .replace(/\\btowner\\b/g, \"towler\")\n        .replace(/\\s+/g, \" \")\n        .split(\" \")\n        .filter((part) => part && !suffixes.has(part))\n        .sort()\n        .join(\" \");\n    }\n\n    function defaultRosterRows() {\n      return Object.entries(defaultRoster).flatMap(([shift, rows]) => (\n        rows.map(([name]) => ({ name, shift }))\n      ));\n    }\n\n    function savedRosterRows(roster) {\n      return rosterShiftKeys.flatMap((shift) => (\n        Array.isArray(roster[shift])\n          ? roster[shift].filter((employee) => employee && employee.name).map((employee) => ({ name: employee.name, shift }))\n          : []\n      ));\n    }\n\n    function hasSavedRosterRows(roster) {\n      return rosterShiftKeys.some((shift) => Array.isArray(roster[shift]) && roster[shift].length);\n    }\n\n    function buildRosterRows() {\n      const rows = [];\n      const seen = new Set();\n      const addRows = (items) => {\n        items.forEach((employee) => {\n          const key = normalizeName(employee.name);\n          if (!key || seen.has(key)) return;\n          seen.add(key);\n          rows.push(employee);\n        });\n      };\n\n      try {\n        const roster = JSON.parse(localStorage.getItem(rosterStorageKey) || \"{}\");\n        addRows(hasSavedRosterRows(roster) ? savedRosterRows(roster) : defaultRosterRows());\n        const additions = JSON.parse(localStorage.getItem(rosterAdditionsKey) || \"[]\");\n        if (Array.isArray(additions)) {\n          addRows(additions.filter((employee) => employee && employee.name).map((employee) => ({\n            name: employee.name,\n            shift: employee.shift || \"first\"\n          })));\n        }\n      } catch (error) {\n        addRows(defaultRosterRows());\n      }\n\n      if (!rows.length) addRows(defaultRosterRows());\n      return rows;\n    }\n\n    function rosterNames() {\n      return buildRosterRows().map((employee) => employee.name);\n    }\n\n    function rosterLookup() {\n      const lookup = new Map();\n      buildRosterRows().forEach((employee) => {\n        lookup.set(normalizeName(employee.name), { name: employee.name, shift: employee.shift || \"first\" });\n      });\n      return lookup;\n    }\n\n    function payrollDateFromRows(rows) {\n      for (const row of rows.slice(0, 12)) {\n        for (const cell of row) {\n          const text = String(cell || \"\").trim();\n          const match = text.match(/\\bdate\\s*:\\s*([0-9]{1,2}\\/[0-9]{1,2}\\/[0-9]{2,4})/i);\n          if (match) return match[1];\n        }\n      }\n      return new Date().toLocaleDateString();\n    }\n\n    function cleanPayrollEmployeeName(value) {\n      return cleanDayforceEmployeeName(value)\n        .replace(/\\s+\\d{4,}\\s*$/, \"\")\n        .trim();\n    }\n\n    function payrollDisplayName(value) {\n      return displayNameFromDayforce(cleanPayrollEmployeeName(value));\n    }\n\n    function payrollHours(value) {\n      const text = String(value || \"\").trim();\n      if (!text) return 0;\n      if (/^(x|yes|y|true)$/i.test(text)) return 8;\n\n      const timeMatch = text.match(/^(\\d{1,2}):(\\d{2})$/);\n      if (timeMatch) return Number(timeMatch[1]) + (Number(timeMatch[2]) / 60);\n\n      const numberMatch = text.match(/-?\\d+(\\.\\d+)?/);\n      if (!numberMatch) return 0;\n      return Math.max(0, Number(numberMatch[0]) || 0);\n    }\n\n    function titleCaseReason(value) {\n      return String(value || \"\")\n        .toLowerCase()\n        .replace(/\\b\\w/g, (char) => char.toUpperCase())\n        .replace(/\\bPto\\b/g, \"PTO\");\n    }\n\n    function absenceReasonFromHeader(header) {\n      const text = String(header || \"\").replace(/\\s+/g, \" \").trim();\n      const normalized = text.toLowerCase();\n      if (!normalized || /^total\\b/.test(normalized) || normalized.includes(\"total overtime\")) return \"\";\n      if (normalized.includes(\"business day off\") && normalized.includes(\"unpaid\")) return \"Business Day Off - Unpaid\";\n      if (normalized.includes(\"floating holiday\") || /\\bfloat\\b/.test(normalized)) return \"Floating Holiday\";\n      if (normalized.includes(\"vacation\")) return \"Vacation\";\n      if (normalized.includes(\"sick\")) return \"Sick\";\n      if (normalized.includes(\"holiday\")) return \"Holiday\";\n      if (normalized.includes(\"pto\")) return \"PTO\";\n      if (normalized.includes(\"personal\")) return \"Personal Day\";\n      if (normalized.includes(\"bereavement\")) return \"Bereavement\";\n      if (normalized.includes(\"jury\")) return \"Jury Duty\";\n      if (normalized.includes(\"leave\")) return \"Leave\";\n      if (normalized.includes(\"day off\") || normalized.includes(\"off day\")) return titleCaseReason(text);\n      if (normalized.includes(\"unpaid\") || normalized.includes(\"without pay\")) return titleCaseReason(text);\n      return \"\";\n    }\n\n    function isUnpaidReason(reason) {\n      return /\\bunpaid\\b|without pay/i.test(reason);\n    }\n\n    function minutesFromMilitary(value) {\n      const match = String(value || \"\").match(/^(\\d{1,2})(\\d{2})$/);\n      if (!match) return 0;\n      return (Number(match[1]) * 60) + Number(match[2]);\n    }\n\n    function militaryFromMinutes(value) {\n      const minutes = ((Math.round(value) % 1440) + 1440) % 1440;\n      const hours = Math.floor(minutes / 60);\n      const mins = minutes % 60;\n      return `${String(hours).padStart(2, \"0\")}${String(mins).padStart(2, \"0\")}`;\n    }\n\n    function shiftStartForEmployee(name) {\n      const names = rosterNames();\n      const match = matchRosterName(name, names);\n      const lookup = rosterLookup();\n      const canonical = match.suggestion || name;\n      const shift = lookup.get(normalizeName(canonical))?.shift || \"\";\n      if (shift === \"second\") return \"1500\";\n      if (shift === \"gate\" || shift === \"mechanics\") return \"0600\";\n      return \"0300\";\n    }\n\n    function endFromStartAndHours(start, hours) {\n      return militaryFromMinutes(minutesFromMilitary(start) + (Number(hours || 0) * 60));\n    }\n\n    function editDistance(a, b) {\n      const dp = Array.from({ length: a.length + 1 }, () => Array(b.length + 1).fill(0));\n      for (let i = 0; i <= a.length; i += 1) dp[i][0] = i;\n      for (let j = 0; j <= b.length; j += 1) dp[0][j] = j;\n      for (let i = 1; i <= a.length; i += 1) {\n        for (let j = 1; j <= b.length; j += 1) {\n          const cost = a[i - 1] === b[j - 1] ? 0 : 1;\n          dp[i][j] = Math.min(dp[i - 1][j] + 1, dp[i][j - 1] + 1, dp[i - 1][j - 1] + cost);\n        }\n      }\n      return dp[a.length][b.length];\n    }\n\n    function matchRosterName(name, names) {\n      const normalized = normalizeName(name);\n      const exact = names.find((candidate) => normalizeName(candidate) === normalized);\n      if (exact) return { found: true, suggestion: exact, hasSuggestion: true, score: 0 };\n\n      const scored = names\n        .map((candidate) => ({ candidate, score: editDistance(normalized, normalizeName(candidate)) }))\n        .sort((a, b) => a.score - b.score);\n      const best = scored[0] || null;\n      const suggestionLimit = Math.max(2, Math.ceil(normalized.length * 0.35));\n      return {\n        found: false,\n        suggestion: best ? best.candidate : \"\",\n        hasSuggestion: Boolean(best && best.score <= suggestionLimit),\n        score: best ? best.score : Infinity\n      };\n    }\n\n    function cleanDayforceEmployeeName(value) {\n      return String(value)\n        .replace(/^employee\\s*:?\\s*/i, \"\")\n        .replace(/\\s+\\d{4,}\\s*$/, \"\")\n        .trim();\n    }\n\n    function displayNameFromDayforce(value) {\n      const cleaned = cleanDayforceEmployeeName(value);\n      if (!cleaned.includes(\",\")) return cleaned;\n\n      const [last, first] = cleaned.split(\",\").map((part) => part.trim());\n      return `${first} ${last}`.replace(/\\s+/g, \" \").trim();\n    }\n\n    function normalizePreviousTimesheetName(name) {\n      return normalizeName(String(name || \"\").replace(/\\s+\\d{4,}\\s*$/, \"\"));\n    }\n\n    function previousTimesheetImport() {\n      try {\n        const ll) => String(cell || \"\").trim());\n        if (!rowHasDayforceHeader(row)) continue;\n\n        const next = rows[index + 1].map((cell) => String(cell || \"\").trim());\n        const startIndex = headerIndex(row, \"start shift\");\n        const startMealIndex = headerIndex(row, \"start meal\");\n        const endMealIndex = headerIndex(row, \"end meal\");\n        const endIndex = headerIndex(row, \"end shift\");\n        const paidIndex = headerIndex(row, \"paid hours\");\n        const exceptionIndex = headerIndex(row, \"exceptions\");\n        [startIndex, startMealIndex, endMealIndex, endIndex, paidIndex, exceptionIndex].forEach((colIndex) => {\n          if (colIndex >= 0) headerCells.add(`${index}:${colIndex}`);\n        });\n        const employeeCell = findEmployeeNameCell(rows, index, startIndex);\n        const fallbackEmployee = firstFilledBefore(row, startIndex);\n        const employeeSource = employeeCell ? employeeCell.value : fallbackEmployee;\n        const employee = displayNameFromDayforce(employeeSource);\n        if (!employee) continue;\n        if (employeeCell) {\n          extractedNameCells.add(`${employeeCell.rowIndex}:${employeeCell.colIndex}`);\n        } else if (fallbackEmployee) {\n          const fallbackIndex = row.findIndex((cell) => String(cell || \"\").trim() === fallbackEmployee);\n          if (fallbackIndex >= 0) extractedNameCells.add(`${index}:${fallbackIndex}`);\n        }\n\n        punches.push({\n          source: \"punch\",\n          name: employee,\n          date: firstFilled(next),\n          start: startIndex >= 0 ? next[startIndex] || \"\" : \"\",\n          lunch: [startMealIndex >= 0 ? next[startMealIndex] : \"\", endMealIndex >= 0 ? next[endMealIndex] : \"\"].filter(Boolean).join(\" - \"),\n          end: endIndex >= 0 ? next[endIndex] || \"\" : \"\",\n          paid: paidIndex >= 0 ? next[paidIndex] || \"\" : \"\",\n          exceptions: exceptionIndex >= 0 ? next[exceptionIndex] || \"\" : \"\"\n        });\n      }\n      return punches;\n    }\n\n    function rawTimeReportDate(rows) {\n      for (const row of rows.slice(0, 12)) {\n        for (const value of row) {\n          const text = String(value || \"\").trim();\n          const match = text.match(/\\bDate Range:\\s*(\\d{1,2})\\/(\\d{1,2})\\/(\\d{2,4})/i);\n          if (match) {\n            const year = match[3].length === 2 ? \"20\" + match[3] : match[3];\n            return Number(match[1]) + \"/\" + Number(match[2]) + \"/\" + year;\n          }\n        }\n      }\n      return \"\";\n    }\n\n    function rawTimeHeaderInfo(row) {\n      const normalized = row.map((cell) => String(cell || \"\").trim().toLowerCase());\n      const inIndex = normalized.findIndex((cell) => cell === \"in\");\n      const outIndex = normalized.findIndex((cell) => cell === \"out\");\n      const mealInIndex = normalized.findIndex((cell) => cell === \"meal in\");\n      const mealOutIndex = normalized.findIndex((cell) => cell === \"meal out\");\n      if (inIndex < 0 || outIndex < 0 || mealInIndex < 0 || mealOutIndex < 0) return null;\n\n      const rawName = String(row[0] || \"\").trim();\n      if (!isNameCandidate(rawName)) return null;\n      return {\n        nameIndex: 0,\n        inIndex,\n        outIndex,\n        mealInIndex,\n        mealOutIndex,\n        exceptionIndex: normalized.findIndex((cell) => cell === \"exceptions\")\n      };\n    }\n\n    function rawTimeRowKind(row) {\n      return String(row[1] || \"\").trim().toLowerCase();\n    }\n\n    function rawTimeFindKindRow(rows, startIndex, kind) {\n      for (let index = startIndex; index < Math.min(rows.length, startIndex + 5); index += 1) {\n        const row = rows[index] || [];\n        if (rawTimeRowKind(row) === kind) return row;\n      }\n      return [];\n    }\n\n    function rawTimeValue(primaryRow, fallbackRow, index) {\n      return String((primaryRow && primaryRow[index]) || (fallbackRow && fallbackRow[index]) || \"\").trim();\n    }\n\n    function rawTimeDate(value, fallback) {\n      const text = String(value || \"\").trim();\n      const direct = attendanceDateFromValue(text, \"\");\n      if (direct) return direct;\n\n      const yearMatch = String(fallback || \"\").match(/\\/(\\d{4})$/);\n      const year = yearMatch ? Number(yearMatch[1]) : new Date().getFullYear();\n      const monthNames = {\n        jan: 1, january: 1,\n        feb: 2, february: 2,\n        mar: 3, march: 3,\n        apr: 4, april: 4,\n        may: 5,\n        jun: 6, june: 6,\n        jul: 7, july: 7,\n        aug: 8, august: 8,\n        sep: 9, sept: 9, september: 9,\n        oct: 10, october: 10,\n        nov: 11, november: 11,\n        dec: 12, december: 12\n      };\n      const match = text.match(/\\b([A-Za-z]{3,9})\\s+(\\d{1,2})\\b/);\n      if (!match) return fallback || text;\n      const month = monthNames[match[1].toLowerCase()];\n      if (!month) return fallback || text;\n      return month + \"/\" + Number(match[2]) + \"/\" + year;\n    }\n\n    function parseRawTimeEntryRows(rows, extractedNameCells = new Set(), headerCells = new Set()) {\n      const punches = [];\n      const reportDate = rawTimeReportDate(rows);\n\n      for (let rowIndex = 0; rowIndex < rows.length; rowIndex += 1) {\n        const row = rows[rowIndex].map((cell) => String(cell || \"\").trim());\n        const header = rawTimeHeaderInfo(row);\n        if (!header) continue;\n\n        [header.nameIndex, header.inIndex, header.outIndex, header.mealInIndex, header.mealOutIndex, header.exceptionIndex].forEach((colIndex) => {\n          if (colIndex >= 0) headerCells.add(rowIndex + \":\" + colIndex);\n        });\n        extractedNameCells.add(rowIndex + \":\" + header.nameIndex);\n\n        const rawRow = rawTimeFindKindRow(rows, rowIndex + 1, \"raw\");\n        const roundedRow = rawTimeFindKindRow(rows, rowIndex + 1, \"rounded\");\n        const name = displayNameFromDayforce(row[header.nameIndex]);\n        if (!name || (!rawRow.length && !roun
