/div>\n          <div class=\"key-row side\">SIDE-LOADER</div>\n          <div class=\"key-row crane\">CRANE</div>\n          <div class=\"key-row everything\">EVERYTHING</div>\n        </div>\n        <div class=\"key second-key\">\n          <div class=\"key-title\">KEY</div>\n          <div class=\"key-row side\">SIDE-LOADER</div>\n          <div class=\"key-row crane\">CRANE</div>\n          <div class=\"key-row everything\">EVERYTHING</div>\n        </div>\n        <div class=\"key gate-key\">\n          <div class=\"key-title\">KEY</div>\n          <div class=\"key-row lead\">LEAD</div>\n        </div>\n      </aside>\n    </div>\n  </main>\n  <script>\n    const dayNames = [\"Mon\", \"Tue\", \"Wed\", \"Thu\", \"Fri\", \"Sat\", \"Sun\"];\n\n    const sectionTotals = {\n      first: \"RAMP TOTAL\",\n      second: \"RAMP TOTAL\",\n      gate: \"GATE TOTAL\",\n      mechanics: \"MECH TOTAL\"\n    };\n\n    const rosterStorageKey = \"conglobal-roster-state-v1\";\n    const rosterAdditionsKey = \"conglobal-roster-additions-v1\";\n    const staffRoleStorageKey = \"settegast-staff-role-preferences-v1\";\n    const editableCapabilityValues = [\"hostler\", \"crane\", \"ground\", \"flip\"];\n    const editableCapabilityLabels = {\n      hostler: \"Hostler\",\n      crane: \"Crane\",\n      ground: \"Ground Man\",\n      flip: \"Flip Station\"\n    };\n    const defaultCraneCapableNames = new Set([\n      \"Stewart Dexter\", \"Thomas Henry\", \"Brown James\", \"Player Keyston\", \"Hickman Makia\",\n      \"Hosey Kevin\", \"Tingle Jason\", \"Benavides Robert\", \"Delgado Jose\"\n    ].map((name) => normalizeRosterName(name)));\n\n    function normalizeRosterName(name) {\n      const suffixes = new Set([\"jr\", \"sr\", \"ii\", \"iii\", \"iv\"]);\n      return String(name || \"\")\n        .trim()\n        .toLowerCase()\n        .replace(/[,.]/g, \" \")\n        .replace(/\\bcontrerras\\b/g, \"contreras\")\n        .replace(/\\s+/g, \" \")\n        .split(\" \")\n        .filter((part) => part && !suffixes.has(part))\n        .sort()\n        .join(\" \");\n    }\n\n    function readStaffRolePreferences() {\n      try {\n        const saved = JSON.parse(localStorage.getItem(staffRoleStorageKey) || \"{}\");\n        return saved && typeof saved === \"object\" && !Array.isArray(saved) ? saved : {};\n      } catch (error) {\n        return {};\n      }\n    }\n\n    function normalizedCapabilities(value) {\n      const roles = Array.isArray(value) ? value : [value];\n      return Array.from(new Set(roles.map((role) => String(role || \"\").toLowerCase())\n        .filter((role) => editableCapabilityValues.includes(role))));\n    }\n\n    function defaultRowCapabilities(row) {\n      const nameCell = row && row.querySelector(\".name\");\n      if (!nameCell) return [\"hostler\"];\n      if (nameCell.classList.contains(\"everything\")) return editableCapabilityValues.slice();\n      if (nameCell.classList.contains(\"side\")) return [\"hostler\", \"flip\"];\n      if (nameCell.classList.contains(\"crane\") || nameCell.classList.contains(\"lead\")\n        || defaultCraneCapableNames.has(normalizeRosterName(nameCell.textContent))) return [\"crane\"];\n      return [\"hostler\"];\n    }\n\n    function rowCapabilities(row) {\n      const nameCell = row && row.querySelector(\".name\");\n      const key = normalizeRosterName(nameCell && nameCell.textContent);\n      const saved = normalizedCapabilities(readStaffRolePreferences()[key]);\n      return saved.length ? saved : defaultRowCapabilities(row);\n    }\n\n    function saveRowCapabilities(row, capabilities, previousKey = \"\") {\n      const nameCell = row && row.querySelector(\".name\");\n      const key = normalizeRosterName(nameCell && nameCell.textContent);\n      if (!key) return;\n      const preferences = readStaffRolePreferences();\n      if (previousKey && previousKey !== key) delete preferences[previousKey];\n      const normalized = normalizedCapabilities(capabilities);\n      preferences[key] = normalized.length ? normalized : [\"hostler\"];\n      localStorage.setItem(staffRoleStorageKey, JSON.stringify(preferences));\n    }\n\n    function readRosterAdditions() {\n      try {\n        const additions = JSON.parse(localStorage.getItem(rosterAdditionsKey) || \"[]\");\n        return Array.isArray(additions) ? additions : [];\n      } catch (error) {\n        localStorage.removeItem(rosterAdditionsKey);\n        return [];\n      }\n    }\n\n    function rosterNameSet() {\n      return new Set(Array.from(document.querySelectorAll('table[data-roster] tbody .name'))\n        .map((cell) => normalizeRosterName(cell.textContent)));\n    }\n\n    function escapeHtml(value) {\n      return String(value).replace(/[&<>\"']/g, (char) => ({\n        \"&\": \"&amp;\",\n        \"<\": \"&lt;\",\n        \">\": \"&gt;\",\n        '\"': \"&quot;\",\n        \"'\": \"&#39;\"\n      }[char]));\n    }\n\n    function setShiftTitleCount(title, count, table) {\n      if (!title) return;\n      if (!title.dataset.label) {\n        title.dataset.label = title.textContent.replace(/\\s*\\[\\d+\\]/, \"\").replace(/\\s+/g, \" \").trim();\n      }\n\n      const headerLabel = table ? table.querySelector(\".section-head-label\") : null;\n      if (!headerLabel) return;\n      headerLabel.innerHTML = `\n        <span class=\"table-shift-title\">\n          <span>${escapeHtml(title.dataset.label)}</span>\n          <span class=\"staff-badge\">${count} staff</span>\n        </span>\n      `;\n    }\n\n    function updateTitleCount(form) {\n      const table = document.querySelector(`table[data-roster=\"${form.dataset.target}\"]`);\n      if (table) updateSectionCount(table);\n    }\n\n    function updateDailyTotals(table, offDays) {\n      const totals = table.querySelectorAll(\"tfoot .total-number\");\n      totals.forEach((cell, index) => {\n        if (!offDays.has(String(index))) {\n          cell.textContent = String(Number(cell.textContent) + 1);\n        }\n      });\n    }\n\n    function recalcDailyTotals(table) {\n      const totals = table.querySelectorAll(\"tfoot .total-number\");\n      totals.forEach((total, index) => {\n        const workCount = Array.from(table.querySelectorAll(\"tbody tr:not(.role-editor-row)\")).filter((row) => {\n          const cell = row.children[index + 1];\n          return cell && cell.textContent.trim().toUpperCase() === \"W\";\n        }).length;\n        total.textContent = String(workCount);\n      });\n    }\n\n    function setSideTotal(labelText, value) {\n      const labels = Array.from(document.querySelectorAll(\".total-box .label\"));\n      const label = labels.find((item) => item.textContent.trim() === labelText);\n      if (!label || !label.nextElementSibling) return;\n      label.nextElementSibling.textContent = String(value);\n    }\n\n    function updateSideTotal(labelText, amount = 1) {\n      if (!labelText) return;\n      const labels = Array.from(document.querySelectorAll(\".total-box .label\"));\n      const label = labels.find((item) => item.textContent.trim() === labelText);\n      if (!label || !label.nextElementSibling) return;\n      label.nextElementSibling.textContent = String(Number(label.nextElementSibling.textContent) + amount);\n    }\n\n    function rowToData(row) {\n      const nameCell = row.querySelector(\".name\");\n      const role = [\"side\", \"crane\", \"everything\", \"lead\"].find((className) => nameCell.classList.contains(className)) || \"\";\n      return {\n        name: nameCell.textContent.trim(),\n        role,\n        days: Array.from(row.children).slice(1, 8).map((cell) => cell.textContent.trim().toUpperCase() === \"O\" ? \"O\" : \"W\")\n      };\n    }\n\n    function dataToRow(employee) {\n      const row = document.createElement(\"tr\");\n      const nameCell = document.createElement(\"td\");\n      nameCell.className = `name${employee.role ? ` ${employee.role}` : \"\"}`;\n      nameCell.textContent = employee.name;\n      row.appendChild(nameCell);\n\n      const days = Array.isArray(employee.days) ? employee.days : [\"W\", \"W\", \"W\", \"W\", \"W\", \"W\", \"W\"];\n      days.forEach((day) => {\n        const cell = document.createElement(\"td\");\n        const isOff = day === \"O\";\n        cell.className = isOff ? \"o\" : \"w\";\n        cell.textContent = isOff ? \"O\" : \"W\";\n        row.appendChild(cell);\n      });\n\n      addActionsToRow(row);\n      return row;\n    }\n\n    function captureRosterState() {\n      const state = {};\n      document.querySelectorAll(\"table[data-roster]\").forEach((table) => {\n        state[table.dataset.roster] = Array.from(table.querySelectorAll(\"tbody tr:not(.role-editor-row)\")).map(rowToData);\n      });\n      return state;\n    }\n\n    function saveRosterState() {\n      localStorage.setItem(rosterStorageKey, JSON.stringify(captureRosterState()));\n    }\n\n    function updateSectionCount(table) {\n      const rosterId = table.dataset.roster;\n      const form = document.querySelector(`.add-row[data-target=\"${rosterId}\"]`);\n      const title = form ? form.previousElementSibling : null;\n      if (!title) return;\n      const count = table.querySelectorAll(\"tbody tr:not(.role-editor-row)\").length;\n      setShiftTitleCount(title, count, table);\n    }\n\n    function refreshRosterNumbers() {\n      const rampCount = [\"first\", \"second\"].reduce((total, rosterId) => {\n        const table = document.querySelector(`table[data-roster=\"${rosterId}\"]`);\n        return total + (table ? table.querySelectorAll(\"tbody tr:not(.role-editor-row)\").length : 0);\n      }, 0);\n      const gateTable = document.querySelector('table[data-roster=\"gate\"]');\n      const mechTable = document.querySelector('table[data-roster=\"mechanics\"]');\n\n      setSideTotal(\"RAMP TOTAL\", rampCount);\n      setSideTotal(\"GATE TOTAL\", gateTable ? gateTable.querySelectorAll(\"tbody tr:not(.role-editor-row)\").length : 0);\n      setSideTotal(\"MECH TOTAL\", mechTable ? mechTable.querySelectorAll(\"tbody tr:not(.role-editor-row)\").length : 0);\n\n      document.querySelectorAll(\"table[data-roster]\").forEach((table) => {\n        updateSectionCount(table);\n        recalcDailyTotals(table);\n      });\n    }\n\n    function migrateMcDanielToDays(state) {\n      if (!state || !Array.isArray(state.second)) return state;\n      if (!Array.isArray(state.first)) state.first = [];\n\n      const alreadyOnDays = state.first.some((employee) => normalizeRosterName(employee.name) === \"charles mcdaniel\");\n      const secondIndex = state.second.findIndex((employee) => normalizeRosterName(employee.name) === \"charles mcdaniel\");\n      if (secondIndex === -1) return state;\n\n      const [employee] = state.second.splice(secondIndex, 1);\n      if (!alreadyOnDays) state.first.push(employee);\n      localStorage.setItem(rosterStorageKey, JSON.stringify(state));\n      return state;\n    }\n\n    function migrateRosterNames(state) {\n      if (!state || typeof state !== \"object\") return state;\n      let changed = false;\n      Object.values(state).forEach((employees) => {\n        if (!Array.isArray(employees)) return;\n        employees.forEach((employee) => {\n          if (String(employee?.name || \"\").trim().toLowerCase() !== \"branford atton\") return;\n          employee.name = \"Branford Alton\";\n          changed = true;\n        });\n      });\n      if (changed) localStorage.setItem(rosterStorageKey, JSON.stringify(state));\n      return state;\n    }\n\n    function loadRosterState() {\n      const saved = localStorage.getItem(rosterStorageKey);\n      if (!saved) return;\n\n      try {\n        const state = migrateRosterNames(migrateMcDanielToDays(JSON.parse(saved)));\n        Object.entries(state).forEach(([rosterId, employees]) => {\n          const table = document.querySelector(`table[data-roster=\"${rosterId}\"]`);\n          if (!table || !Array.isArray(employees)) return;\n\n          const body = table.querySelector(\"tbody\");\n          body.innerHTML = \"\";\n          employees.forEach((employee) => {\n            if (!employee || !employee.name || !Array.isArray(employee.days)) return;\n            body.appendChild(dataToRow(employee));\n          });\n        });\n        refreshRosterNumbers();\n      } catch (error) {\n        localStorage.removeItem(rosterStorageKey);\n      }\n    }\n\n    function applyPendingRosterAdditions() {\n      const additions = readRosterAdditions();\n      if (!additions.length) return;\n\n      const existing = rosterNameSet();\n      let added = 0;\n      additions.forEach((addition) => {\n        if (!addition || !addition.name) return;\n        const rosterId = addition.shift || \"first\";\n        const table = document.querySelector(`table[data-roster=\"${rosterId}\"]`);\n        const key = normalizeRosterName(addition.name);\n        if (!table || !key || existing.has(key)) return;\n\n        table.querySelector(\"tbody\").appendChild(dataToRow({\n          name: addition.name,\n          role: addition.role || \"\",\n          days: Array.isArray(addition.days) ? addition.days : [\"W\", \"W\", \"W\", \"W\", \"W\", \"W\", \"W\"]\n        }));\n        existing.add(key);\n        added += 1;\n      });\n\n      if (added) {\n        refreshRosterNumbers();\n        saveRosterState();\n      }\n      localStorage.removeItem(rosterAdditionsKey);\n    }\n\n    function addRosterRow(event) {\n      event.preventDefault();\n\n      const form = event.currentTarget;\n      const nameInput = form.elements.employee;\n      const employeeName = nameInput.value.trim();\n      if (!employeeName) return;\n\n      const rosterId = form.dataset.target;\n      const table = document.querySelector(`table[data-roster=\"${rosterId}\"]`);\n      const body = table.querySelector(\"tbody\");\n      const offDays = new Set(Array.from(form.querySelectorAll('input[name=\"off\"]:checked')).map((input) => input.value));\n      const role = form.elements.role.value;\n\n      const row = document.createElement(\"tr\");\n      const nameCell = document.createElement(\"td\");\n      nameCell.className = `name${role ? ` ${role}` : \"\"}`;\n      nameCell.textContent = employeeName;\n      row.appendChild(nameCell);\n\n      for (let day = 0; day < 7; day += 1) {\n        const cell = document.createElement(\"td\");\n        const isOff = offDays.has(String(day));\n        cell.className = isOff ? \"o\" : \"w\";\n        cell.textContent = isOff ? \"O\" : \"W\";\n        row.appendChild(cell);\n      }\n\n      addActionsToRow(row);\n      body.appendChild(row);\n      updateTitleCount(form, 1);\n      updateDailyTotals(table, offDays);\n      updateSideTotal(sectionTotals[rosterId]);\n      saveRosterState();\n      form.reset();\n      nameInput.focus();\n    }\n\n    function addActionsToTable(table) {\n      const headRow = table.querySelector(\"thead tr\");\n      const footerRow = table.querySelector(\"tfoot tr\");\n      const colgroup = table.querySelector(\"colgroup\");\n\n      if (colgroup && !colgroup.querySelector(\"col.actions\")) {\n        const col = document.createElement(\"col\");\n        col.className = \"actions\";\n        colgroup.appendChild(col);\n      }\n\n      if (headRow && !headRow.querySelector(\".action-head\")) {\n        const actionHead = document.createElement(\"th\");\n        actionHead.className = \"action-head\";\n        actionHead.textContent = \"Options\";\n        headRow.appendChild(actionHead);\n      }\n\n      if (footerRow && !footerRow.querySelector(\".actions-total\")) {\n        const actionTotal = document.createElement(\"td\");\n        actionTotal.className = \"actions-total\";\n        footerRow.appendChild(actionTotal);\n      }\n\n      table.querySelectorAll(\".employee-head, .day-head\").forEach((header, index) => {\n        const filter = header.querySelector(\".filter\");\n        if (!filter) return;\n        filter.setAttribute(\"role\", \"button\");\n        filter.setAttribute(\"tabindex\", \"0\");\n        filter.setAttribute(\"aria-label\", `Sort ${header.textContent.trim()}`);\n        filter.dataset.sortIndex = String(index);\n        filter.dataset.sortDirection = filter.dataset.sortDirection || \"asc\";\n      });\n\n      table.querySelectorAll(\"tbody tr:not(.role-editor-row)\").forEach(addActionsToRow);\n    }\n\n    function addActionsToRow(row) {\n      if (row.querySelector(\".actions\")) return;\n\n      const cell = document.createElement(\"td\");\n      cell.className = \"actions\";\n      cell.innerHTML = `<button type=\"button\" class=\"row-action edit\" aria-label=\"Edit row\" title=\"Edit row\">${pencilIcon()}</button><button type=\"button\" class=\"row-action delete\" aria-label=\"Delete employee\" title=\"Delete employee\">${trashIcon()}</button>`;\n      row.appendChild(cell);\n    }\n\n    let rowBeingEdited = null;\n\n    function roleEditorForRow(row) {\n      const next = row && row.nextElementSibling;\n      return next && next.classList.contains(\"role-editor-row\") ? next : null;\n    }\n\n    function removeRoleEditor(row) {\n      const editor = roleEditorForRow(row);\n      if (editor) editor.remove();\n    }\n\n    function addRoleEditor(row) {\n      const table = row && row.closest(\"table[data-roster]\");\n      if (!table || ![\"first\", \"second\"].includes(table.dataset.roster)) return;\n      removeRoleEditor(row);\n      const selected = new Set(rowCapabilities(row));\n      const editor = document.createElement(\"tr\");\n      editor.className = \"role-editor-row\";\n      const cell = document.createElement(\"td\");\n      cell.colSpan = row.children.length;\n      cell.innerHTML = `\n        <div class=\"role-editor-panel\">\n          <div class=\"role-capability-grid\">\n            ${editableCapabilityValues.map((role) => `\n              <label class=\"role-capability-option\" data-role=\"${role}\">\n                <input type=\"checkbox\" data-roster-capability=\"${role}\" ${selected.has(role) ? \"checked\" : \"\"}>\n                <span>${editableCapabilityLabels[role]}</span>\n              </label>\n            `).join(\"\")}\n          </div>\n        </div>\n      `;\n      editor.appendChild(cell);\n      row.insertAdjacentElement(\"afterend\", editor);\n    }\n\n    function pencilIcon() {\n      return '<svg viewBox=\"0 0 24 24\" aria-hidden=\"true\"><path d=\"M12 20h9\" /><path d=\"M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z\" /></svg>';\n    }\n\n    function trashIcon() {\n      return '<svg viewBox=\"0 0 24 24\" aria-hidden=\"true\"><path d=\"M3 6h18\" /><path d=\"M8 6V4h8v2\" /><path d=\"M19 6l-1 15H6L5 6\" /><path d=\"M10 11v6\" /><path d=\"M14 11v6\" /></svg>';\n    }\n\n    function setEditButton(row, isEditing) {\n      const button = row.querySelector(\".row-action.edit\");\n      if (!button) return;\n      button.classList.toggle(\"saving\", isEditing);\n      button.innerHTML = isEditing ? \"Save\" : pencilIcon();\n      button.setAttribute(\"aria-label\", isEditing ? \"Save row changes\" : \"Edit row\");\n      button.setAttribute(\"title\", isEditing ? \"Save row changes\" : \"Edit row\");\n    }\n\n    function stopOffDayEditing() {\n      if (!rowBeingEdited) return;\n      const editor = roleEditorForRow(rowBeingEdited);\n      const capabilities = editor\n        ? Array.from(editor.querySelectorAll(\"[data-roster-capability]:checked\")).map((input) => input.dataset.rosterCapability)\n        : [];\n      const previousKey = rowBeingEdited.dataset.originalEmployeeKey || \"\";\n      const nameCell = rowBeingEdited.querySelector(\".name\");\n      if (nameCell) {\n        nameCell.textContent = nameCell.textContent.replace(/\\s+/g, \" \").trim();\n        nameCell.contentEditable = \"false\";\n      }\n      if (editor) saveRowCapabilities(rowBeingEdited, capabilities, previousKey);\n      removeRoleEditor(rowBeingEdited);\n      delete rowBeingEdited.dataset.originalEmployeeKey;\n      rowBeingEdited.classList.remove(\"editing-off\");\n      setEditButton(rowBeingEdited, false);\n      recalcDailyTotals(rowBeingEdited.closest(\"table\"));\n      saveRosterState();\n      rowBeingEdited = null;\n    }\n\n    function startOffDayEditing(row) {\n      if (rowBeingEdited && rowBeingEdited !== row) {\n        stopOffDayEditing();\n      }\n\n      rowBeingEdited = row;\n      row.classList.add(\"editing-off\");\n      const nameCell = row.querySelector(\".name\");\n      if (nameCell) {\n        row.dataset.originalEmployeeKey = normalizeRosterName(nameCell.textContent);\n        nameCell.contentEditable = \"plaintext-only\";\n        nameCell.focus();\n        const selection = window.getSelection();\n        const range = document.createRange();\n        range.selectNodeContents(nameCell);\n        range.collapse(false);\n        selection.removeAllRanges();\n        selection.addRange(range);\n      }\n      addRoleEditor(row);\n      setEditButton(row, true);\n    }\n\n    function toggleOffDayCell(cell) {\n      const isOff = cell.textContent.trim().toUpperCase() === \"O\";\n      cell.className = isOff ? \"w\" : \"o\";\n      cell.textContent = isOff ? \"W\" : \"O\";\n      recalcDailyTotals(cell.closest(\"table\"));\n    }\n\n    function deleteEmployee(row) {\n      const table = row.closest(\"table\");\n      const rosterId = table.dataset.roster;\n      const form = document.querySelector(`.add-row[data-target=\"${rosterId}\"]`);\n\n      removeRoleEditor(row);\n      row.remove();\n      if (form) updateTitleCount(form, -1);\n      recalcDailyTotals(table);\n      updateSideTotal(sectionTotals[rosterId], -1);\n      saveRosterState();\n    }\n\n    function clearDeleteConfirm(exceptButton) {\n      document.querySelectorAll(\".row-action.confirm-delete\").forEach((button) => {\n        if (button === exceptButton) return;\n        button.classList.remove(\"confirm-delete\");\n        button.innerHTML = trashIcon();\n        button.setAttribute(\"aria-label\", \"Delete employee\");\n        button.setAttribute(\"title\", \"Delete employee\");\n      });\n    }\n\n    function clearSortIndicators(table, activeFilter) {\n      table.querySelectorAll(\".filter\").forEach((filter) => {\n        if (filter === activeFilter) return;\n        filter.classList.remove(\"active\", \"desc\");\n        filter.dataset.sortDirection = \"asc\";\n      });\n    }\n\n    function sortRosterTable(table, columnIndex, direction, activeFilter) {\n      if (rowBeingEdited) stopOffDayEditing();\n\n      const multiplier = direction === \"desc\" ? -1 : 1;\n      const body = table.querySelector(\"tbody\");\n      const rows = Array.from(body.querySelectorAll(\"tr:not(.role-editor-row)\"));\n      rows.sort((a, b) => {\n        if (columnIndex === 0) {\n          return a.querySelector(\".name\").textContent.trim().localeCompare(b.querySelector(\".name\").textContent.trim()) * multiplier;\n        }\n\n        const aValue = a.children[columnIndex]?.textContent.trim().toUpperCase() || \"\";\n        const bValue = b.children[columnIndex]?.textContent.trim().toUpperCase() || \"\";\n        if (aValue !== bValue) return aValue.localeCompare(bValue) * multiplier;\n        return a.querySelector(\".name\").textContent.trim().localeCompare(b.querySelector(\".name\").textContent.trim());\n      });\n\n      rows.forEach((row) => body.appendChild(row));\n      clearSortIndicators(table, activeFilter);\n      activeFilter.classList.add(\"active\");\n      activeFilter.classList.toggle(\"desc\", direction === \"desc\");\n      activeFilter.dataset.sortDirection = direction === \"asc\" ? \"desc\" : \"asc\";\n      recalcDailyTotals(table);\n      saveRosterState();\n    }\n\n    function handleSortFilter(filter) {\n      const table = filter.closest(\"table\");\n      if (!table) return;\n      const columnIndex = Number(filter.dataset.sortIndex || 0);\n      const direction = filter.dataset.sortDirection === \"desc\" ? \"desc\" : \"asc\";\n      sortRosterTable(table, columnIndex, direction, filter);\n    }\n\n    document.addEventListener(\"click\", (event) => {\n      const sortFilter = event.target.closest(\".filter\");\n      if (sortFilter) {\n        event.preventDefault();\n        handleSortFilter(sortFilter);\n        return;\n      }\n\n      const editableCell = event.target.closest(\"td.w, td.o\");\n      if (editableCell && rowBeingEdited && editableCell.parentElement === rowBeingEdited) {\n        event.preventDefault();\n        toggleOffDayCell(editableCell);\n        return;\n      }\n\n      const button = event.target.closest(\".row-action\");\n      if (!button) {\n        clearDeleteConfirm();\n        return;\n      }\n\n      const row = button.closest(\"tr\");\n      if (button.classList.contains(\"delete\")) {\n        if (button.classList.contains(\"confirm-delete\")) {\n          if (rowBeingEdited === row) rowBeingEdited = null;\n          deleteEmployee(row);\n          return;\n        }\n\n        clearDeleteConfirm(button);\n        button.classList.add(\"confirm-delete\");\n        button.textContent = \"OK?\";\n        button.setAttribute(\"aria-label\", \"Confirm delete employee\");\n        button.setAttribute(\"title\", \"Confirm delete employee\");\n        return;\n      }\n\n      clearDeleteConfirm();\n      if (rowBeingEdited === row) {\n        stopOffDayEditing();\n        return;\n      }\n\n      startOffDayEditing(row);\n    });\n\n    document.addEventListener(\"keydown\", (event) => {\n      const sortFilter = event.target.closest(\".filter\");\n      if (!sortFilter || ![\"Enter\", \" \"].includes(event.key)) return;\n      event.preventDefault();\n      handleSortFilter(sortFilter);\n    });\n\n    document.addEventListener(\"input\", (event) => {\n      const nameCell = event.target.closest(\"tr.editing-off .name\");\n      if (!nameCell) return;\n      saveRosterState();\n    });\n\n    document.addEventListener(\"keydown\", (event) => {\n      const nameCell = event.target.closest(\"tr.editing-off .name\");\n      if (!nameCell) return;\n      if (event.key === \"Enter\") {\n        event.preventDefault();\n        stopOffDayEditing();\n      }\n    });\n\n    document.querySelectorAll(\".add-row\").forEach((form) => {\n      form.addEventListener(\"submit\", addRosterRow);\n    });\n\n    document.querySelectorAll(\"table[data-roster]\").forEach(addActionsToTable);\n    loadRosterState();\n    applyPendingRosterAdditions();\n    refreshRosterNumbers();\n  <\/script>\n</body>\n</html>\n"
      },
      "dayforce": {
            "label": "Dayforce",
            "html": "﻿<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n  <meta charset=\"UTF-8\" />\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" />\n  <title>Dayforce Import</title>\n  <style>\n    * {\n      box-sizing: border-box;\n    }\n\n    body {\n      margin: 0;\n      overflow-x: hidden;\n      background: #fff;\n      color: #000;\n      font-family: Arial, Helvetica, sans-serif;\n      font-size: 14px;\n    }\n\n    .page-switcher {\n      width: 100%;\n      display: flex;\n      gap: 4px;\n      align-items: center;\n      padding: 6px 8px;\n      background: #111;\n      border-bottom: 2px solid #000;\n    }\n\n    .page-switcher a {\n      min-width: 118px;\n      height: 28px;\n      display: inline-flex;\n      align-items: center;\n      justify-content: center;\n      border: 1px solid #777;\n      background: #e7e6e6;\n      color: #000;\n      text-decoration: none;\n      font-size: 13px;\n      font-weight: 800;\n    }\n\n    .page-switcher a.active {\n      background: #ffff00;\n      border-color: #ffff00;\n    }\n\n    .sheet {\n      width: 100%;\n      max-width: 1180px;\n      padding-bottom: 32px;\n    }\n\n    .masthead {\n      height: 58px;\n      display: grid;\n      grid-template-columns: 1fr auto;\n      align-items: center;\n      padding: 0 6px;\n      background: #d9e8f7;\n      border-bottom: 2px solid #000;\n    }\n\n    h1 {\n      margin: 0;\n      font-size: 24px;\n      line-height: 1;\n    }\n\n    .status {\n      font-weight: 900;\n      color: #004a64;\n    }\n\n    .import-panel {\n      display: grid;\n      grid-template-columns: minmax(260px, 1fr) 220px;\n      gap: 10px;\n      padding: 10px 6px;\n      border-bottom: 2px solid #000;\n      background: #f3f6fb;\n    }\n\n    .push-notice {\n      margin: 0;\n      padding: 9px 12px;\n      border-bottom: 2px solid #000;\n      background: #c00000;\n      color: #fff;\n      font-size: 14px;\n      font-weight: 900;\n      letter-spacing: .01em;\n      text-align: center;\n    }\n\n    .push-notice[hidden] {\n      display: none;\n    }\n\n    .file-stack {\n      display: grid;\n      align-content: start;\n      gap: 8px;\n    }\n\n    .file-row {\n      display: flex;\n      align-items: center;\n      gap: 8px;\n      font-weight: 900;\n    }\n\n    .file-row input {\n      max-width: 100%;\n      font-weight: 700;\n    }\n\n    .buttons {\n      display: grid;\n      align-content: start;\n      gap: 8px;\n    }\n\n    button {\n      height: 32px;\n      border: 1px solid #000;\n      background: #000;\n      color: #fff;\n      font-weight: 900;\n      cursor: pointer;\n    }\n\n    button.secondary {\n      background: #e7e6e6;\n      color: #000;\n      border-color: #777;\n    }\n\n    .missing-roster-panel {\n      padding: 8px 6px;\n      border-top: 2px solid #000;\n      border-bottom: 2px solid #000;\n      background: #fff2cc;\n    }\n\n    .missing-roster-panel[hidden] {\n      display: none;\n    }\n\n    .missing-roster-title {\n      display: flex;\n      justify-content: space-between;\n      gap: 8px;\n      margin-bottom: 6px;\n      font-weight: 900;\n    }\n\n    .missing-roster-body {\n      display: grid;\n      gap: 4px;\n    }\n\n    .missing-roster-row {\n      display: grid;\n      grid-template-columns: minmax(160px, 1fr) minmax(160px, 1fr) 120px 86px;\n      gap: 4px;\n      align-items: center;\n      min-height: 32px;\n      padding: 3px;\n      background: #fff;\n      border: 1px solid #bf8f00;\n      font-size: 12px;\n      font-weight: 900;\n    }\n\n    .missing-roster-row select,\n    .missing-roster-row button {\n      height: 25px;\n      font: inherit;\n      font-size: 12px;\n    }\n\n    .missing-roster-row button {\n      padding: 0 6px;\n    }\n\n    .missing-roster-row .convert-name {\n      background: #e7e6e6;\n      color: #000;\n      border-color: #777;\n    }\n\n    .dayforce-table {\n      width: 100%;\n      border-collapse: collapse;\n      table-layout: fixed;\n      font-size: 14px;\n    }\n\n    .dayforce-table col.name { width: 19%; }\n    .dayforce-table col.date { width: 16%; }\n    .dayforce-table col.start { width: 9%; }\n    .dayforce-table col.lunch { width: 17%; }\n    .dayforce-table col.end { width: 9%; }\n    .dayforce-table col.time { width: 12%; }\n    .dayforce-table col.note { width: 30%; }\n\n    th,\n    td {\n      height: 25px;\n      padding: 0 4px;\n      border-bottom: 1px solid #000;\n      overflow: hidden;\n      white-space: nowrap;\n    }\n\n    th {\n      background: #000;\n      color: #fff;\n      text-align: center;\n      font-weight: 900;\n    }\n\n    td.name-cell {\n      background: #e2f0d9;\n      font-weight: 700;\n    }\n\n    .note-pill {\n      display: inline-flex;\n      align-items: center;\n      justify-content: center;\n      max-width: 100%;\n      min-height: 19px;\n      padding: 1px 7px;\n      border-radius: 999px;\n      background: #e7c7e8;\n      color: #4f1b58;\n      font-size: 11px;\n      font-weight: 900;\n      line-height: 1.15;\n      white-space: normal;\n    }\n\n    .note-pill.unpaid {\n      background: #f4cccc;\n      color: #7f1d1d;\n    }\n\n    tr.unmatched td,\n    tr.unmatched .name-cell {\n      background: #f4b6b6;\n      font-weight: 900;\n    }\n\n    .suggestion {\n      display: grid;\n      justify-items: center;\n      gap: 3px;\n      color: #5f1a67;\n      height: auto;\n      min-height: 25px;\n      line-height: 1.15;\n      padding-top: 2px;\n      text-align: center;\n      white-space: normal;\n      overflow: visible;\n      text-overflow: clip;\n      font-size: 12px;\n    }\n\n    .suggestion-actions {\n      display: flex;\n      justify-content: center;\n      gap: 4px;\n      width: 100%;\n    }\n\n    .suggestion-actions button {\n      min-width: 36px;\n      width: auto;\n      height: 20px;\n      padding: 0 6px;\n      font-size: 11px;\n      line-height: 18px;\n      border: 1px solid #000;\n    }\n\n    .suggestion-actions .suggestion-yes {\n      background: #000;\n      color: #fff;\n    }\n\n    .suggestion-actions .suggestion-no {\n      background: #e7e6e6;\n      color: #000;\n      border-color: #777;\n    }\n\n    .suggestion-actions .suggestion-ignore {\n      background: #fff2cc;\n      color: #000;\n      border-color: #9a7b00;\n    }\n\n    td input {\n      width: 100%;\n      height: 24px;\n      border: 0;\n      outline: 0;\n      background: transparent;\n      font: inherit;\n      text-align: center;\n    }\n\n    td input:focus {\n      background: #fff2cc;\n      box-shadow: inset 0 0 0 2px #ffc000;\n    }\n\n    .empty {\n      padding: 14px 6px;\n      font-weight: 800;\n      color: #555;\n    }\n\n    .excel-preview {\n      padding: 8px 6px 10px;\n      border-top: 2px solid #000;\n      border-bottom: 2px solid #000;\n      background: #f3f6fb;\n    }\n\n    .preview-title {\n      display: flex;\n      align-items: center;\n      justify-content: space-between;\n      gap: 10px;\n      margin-bottom: 6px;\n      font-weight: 900;\n    }\n\n    .preview-pill {\n      min-height: 28px;\n      display: inline-flex;\n      align-items: center;\n      justify-content: center;\n      padding: 0 14px;\n      border: 1px solid #b7c8d9;\n      border-radius: 999px;\n      background: #fff;\n      color: #071527;\n      font: inherit;\n      font-size: 12px;\n      font-weight: 900;\n      letter-spacing: .01em;\n      white-space: nowrap;\n      box-shadow: 0 1px 2px rgba(15, 27, 42, .08);\n    }\n\n    .preview-pill:hover,\n    .preview-pill:focus {\n      background: #d9e8f7;\n      outline: 2px solid #ffc000;\n      outline-offset: 1px;\n    }\n\n    .preview-count {\n      color: #006100;\n      font-size: 12px;\n    }\n\n    .excel-preview-wrap {\n      width: 100%;\n      max-height: 420px;\n      overflow: auto;\n      border: 2px solid #000;\n      background: #fff;\n    }\n\n    .excel-preview.collapsed .excel-preview-wrap {\n      display: none;\n    }\n\n    .excel-preview-table {\n      width: max-content;\n      min-width: 100%;\n      border-collapse: collapse;\n      table-layout: auto;\n      font-size: 12px;\n    }\n\n    .excel-preview-table th,\n    .excel-preview-table td {\n      height: 22px;\n      min-width: 76px;\n      max-width: 240px;\n      padding: 0 5px;\n      border-right: 1px solid #c9c9c9;\n      border-bottom: 1px solid #c9c9c9;\n      line-height: 21px;\n      overflow: hidden;\n      text-overflow: ellipsis;\n      white-space: nowrap;\n      text-align: left;\n    }\n\n    .excel-preview-table th {\n      position: sticky;\n      top: 0;\n      z-index: 1;\n      background: #000;\n      color: #fff;\n      text-align: center;\n    }\n\n    .excel-preview-table .row-number {\n      position: sticky;\n      left: 0;\n      z-index: 1;\n      min-width: 42px;\n      background: #e7e6e6;\n      color: #000;\n      text-align: center;\n      font-weight: 900;\n    }\n\n    .excel-preview-table th.row-number {\n      z-index: 2;\n      background: #000;\n      color: #fff;\n    }\n\n    .excel-preview-table .extracted-name {\n      background: #c6efce;\n      color: #006100;\n      font-weight: 900;\n      box-shadow: inset 0 0 0 2px #00b050;\n    }\n\n    .excel-preview-table .punch-header {\n      background: #ddebf7;\n      font-weight: 900;\n    }\n\n    body {\n      background: #eef2f6;\n      color: #0f1b2a;\n      font-weight: 600;\n    }\n\n    .sheet {\n      max-width: 1180px;\n      margin: 0 auto;\n      padding: 8px 8px 34px;\n    }\n\n    .masthead {\n      height: 54px;\n      padding: 0 12px;\n      background: #d9e8f7;\n      border: 1px solid #c4d4e4;\n      border-bottom: 0;\n      border-radius: 8px 8px 0 0;\n    }\n\n    h1 {\n      color: #071527;\n      font-size: 22px;\n      letter-spacing: .01em;\n    }\n\n    .status {\n      min-width: 112px;\n      height: 26px;\n      display: inline-flex;\n      align-items: center;\n      justify-content: center;\n      padding: 0 10px;\n      border: 1px solid #b7c8d9;\n      border-radius: 999px;\n      background: #fff;\n      color: #004a64;\n      font-size: 13px;\n    }\n\n    .import-panel {\n      grid-template-columns: minmax(360px, 1fr) 220px;\n      gap: 14px;\n      padding: 12px;\n      background: #fff;\n      border: 1px solid #c4d4e4;\n      border-top: 0;\n      border-bottom: 0;\n    }\n\n    .file-stack {\n      gap: 10px;\n    }\n\n    .file-row {\n      display: grid;\n      grid-template-columns: 142px minmax(0, 1fr);\n      gap: 10px;\n      min-height: 34px;\n      align-items: center;\n      color: #111827;\n      font-size: 13px;\n    }\n\n    .file-row span {\n      text-align: right;\n      letter-spacing: .02em;\n    }\n\n    .file-row input {\n      width: 100%;\n      min-height: 30px;\n      padding: 3px;\n      border: 1px solid #cbd5df;\n      border-radius: 6px;\n      background: #f8fafc;\n    }\n\n    .file-control {\n      display: grid;\n      grid-template-columns: minmax(180px, 1fr) auto;\n      gap: 8px;\n      align-items: center;\n    }\n\n    .previous-timesheet-status {\n      min-width: 112px;\n      height: 24px;\n      display: inline-flex;\n      align-items: center;\n      justify-content: center;\n      padding: 0 8px;\n      border: 1px solid #c4d4e4;\n      border-radius: 999px;\n      background: #fff8df;\n      color: #273140;\n      font-size: 12px;\n      font-weight: 900;\n      text-align: center;\n      letter-spacing: 0;\n      white-space: nowrap;\n    }\n\n    .previous-timesheet-preview {\n      margin-top: 12px;\n      padding: 8px 6px 10px;\n      border-top: 2px solid #7c3aed;\n      border-bottom: 2px solid #7c3aed;\n      background: #f5efff;\n    }\n\n    .previous-timesheet-preview[hidden] {\n      display: none;\n    }\n\n    .previous-timesheet-preview .preview-title {\n      min-height: 34px;\n      margin: 0;\n      padding: 0 10px;\n      background: #eadcf8;\n      border: 1px solid #d8b4fe;\n      border-bottom: 0;\n    }\n\n    .previous-timesheet-table {\n      border: 1px solid #d8b4fe;\n      border-radius: 0;\n      table-layout: fixed;\n    }\n\n    .previous-timesheet-table col.name { width: 21%; }\n    .previous-timesheet-table col.date { width: 20%; }\n    .previous-timesheet-table col.time { width: 14%; }\n    .previous-timesheet-table col.actual { width: 17%; }\n\n    .previous-timesheet-table td {\n      background: #fff;\n      border-bottom-color: #e9d5ff;\n      text-align: center;\n    }\n\n    .previous-timesheet-table tbody tr:nth-child(even) td {\n      background: #fff;\n    }\n\n    .previous-timesheet-table th {\n      background: #5b21b6;\n      color: #fff;\n    }\n\n    .previous-timesheet-table td.name-cell {\n      background: #e2f0d9;\n      color: #111827;\n      font-weight: 900;\n    }\n\n    .previous-timesheet-table tbody tr:nth-child(even) td.name-cell {\n      background: #e2f0d9;\n    }\n\n    .previous-timesheet-table td.name-cell,\n    .previous-timesheet-table tr.previous-shift-group-row td {\n      text-align: left;\n    }\n\n    .previous-timesheet-table tr.previous-shift-group-row td {\n      background: #e1d2f5;\n      color: #111827;\n      border-bottom-color: #d8b4fe;\n      font-weight: 900;\n    }\n\n    .buttons {\n      gap: 9px;\n    }\n\n    #saveButton {\n      border: 1px solid #273140;\n      box-shadow: none;\n    }\n\n    #saveButton.pending-push {\n      background: #000;\n      color: #fff;\n      border: 2px solid #ffd966;\n      box-shadow:\n        0 0 0 1px #000,\n        0 0 0 3px #ffc000,\n        0 0 12px rgba(255, 192, 0, .85),\n        inset 0 1px 0 rgba(255, 255, 255, .6);\n    }\n\n    .clear-split {\n      position: relative;\n      display: grid;\n      grid-template-columns: 1fr 34px;\n    }\n\n    .clear-split > button {\n      border-radius: 6px 0 0 6px;\n    }\n\n    .clear-split-toggle {\n      border-left: 0;\n      border-radius: 0 6px 6px 0;\n      padding: 0;\n      font-size: 13px;\n    }\n\n    .clear-split-toggle::before {\n      content: \"\";\n      display: inline-block;\n      width: 0;\n      height: 0;\n      border-left: 4px solid transparent;\n      border-right: 4px solid transparent;\n      border-top: 5px solid currentColor;\n      vertical-align: middle;\n    }\n\n    .clear-menu {\n      position: absolute;\n      top: calc(100% + 4px);\n      right: 0;\n      z-index: 5;\n      width: 100%;\n      min-width: 180px;\n      display: none;\n      padding: 4px;\n      border: 1px solid #cbd5df;\n      border-radius: 6px;\n      background: #fff;\n      box-shadow: 0 8px 20px rgba(15, 27, 42, .14);\n    }\n\n    .clear-split.open .clear-menu {\n      display: grid;\n      gap: 4px;\n    }\n\n    .clear-menu button {\n      height: 28px;\n      border-radius: 4px;\n      background: #f4f6f8;\n      color: #273140;\n      border-color: #d7e0ea;\n      text-align: left;\n      padding: 0 10px;\n    }\n\n    .clear-menu button:hover,\n    .clear-menu button:focus {\n      background: #e8edf2;\n    }\n\n    button {\n      height: 32px;\n      border: 1px solid #273140;\n      border-radius: 6px;\n      background: #273140;\n      color: #fff;\n      font-size: 13px;\n      letter-spacing: .01em;\n    }\n\n    button:hover,\n    button:focus {\n      background: #111827;\n      outline: 2px solid #ffc000;\n      outline-offset: 1px;\n    }\n\n    button.secondary {\n      background: #f4f6f8;\n      color: #273140;\n      border-color: #cbd5df;\n    }\n\n    button.secondary:hover,\n    button.secondary:focus {\n      background: #e8edf2;\n    }\n\n    .dayforce-table {\n      overflow: hidden;\n      border-collapse: separate;\n      border-spacing: 0;\n      background: #fff;\n      border: 1px solid #c4d4e4;\n      border-radius: 0 0 8px 8px;\n      font-size: 13px;\n    }\n\n    .dayforce-table th,\n    .dayforce-table td {\n      height: 27px;\n      padding: 0 8px;\n      border-bottom: 1px solid #d9e0e8;\n    }\n\n    .dayforce-table th {\n      height: 32px;\n      background: #28313c;\n      color: #eef4fb;\n      border-bottom: 0;\n      font-size: 12px;\n      letter-spacing: .04em;\n      text-transform: uppercase;\n    }\n\n    .dayforce-table tbody tr:hover {\n      background: #f6f9fc;\n    }\n\n    .dayforce-table tr.shift-group-row td {\n      height: 30px;\n      padding: 0 10px;\n      background: #d9e8f7;\n      color: #071527;\n      border-top: 2px solid #28313c;\n      border-bottom: 1px solid #b6c7d8;\n      font-size: 13px;\n      font-weight: 900;\n      letter-spacing: .02em;\n      text-transform: uppercase;\n    }\n\n    .dayforce-table tr.shift-group-row:first-child td {\n      border-top: 0;\n    }\n\n    .shift-group-count {\n      display: inline-flex;\n      align-items: center;\n      justify-content: center;\n      min-width: 58px;\n      height: 19px;\n      margin-left: 8px;\n      padding: 0 8px;\n      border: 1px solid #c4d4e4;\n      border-radius: 999px;\n      background: #fff;\n      color: #526174;\n      font-size: 11px;\n      font-weight: 900;\n      letter-spacing: 0;\n      text-transform: none;\n    }\n\n    .dayforce-table tr.import-message-row td {\n      height: 34px;\n      background: #fff2cc;\n      color: #7c5700;\n      font-size: 14px;\n      font-weight: 900;\n      text-align: center;\n    }\n\n    td.name-cell {\n      background: #e2f0d9;\n      color: #071527;\n      font-weight: 800;\n    }\n\n    td input {\n      height: 26px;\n      color: #071527;\n      font-weight: 600;\n    }\n\n    td.name-cell input,\n    .dayforce-table td:nth-child(2) input,\n    .dayforce-table td:nth-child(3) input,\n    .dayforce-table td:nth-child(4) input,\n    .dayforce-table td:nth-child(5) input {\n      font-weight: 900;\n    }\n\n    .dayforce-table td:nth-child(2),\n    .dayforce-table td:nth-child(3),\n    .dayforce-table td:nth-child(4),\n    .dayforce-table td:nth-child(5) {\n      padding: 0 5px;\n    }\n\n    .dayforce-table td:nth-child(2) input,\n    .dayforce-table td:nth-child(3) input,\n    .dayforce-table td:nth-child(4) input,\n    .dayforce-table td:nth-child(5) input {\n      font-size: 12px;\n      letter-spacing: 0;\n    }\n\n    .dayforce-table th:nth-child(2),\n    .dayforce-table td:nth-child(2) {\n      min-width: 104px;\n    }\n\n    .dayforce-table td:nth-child(2),\n    .dayforce-table td:nth-child(2) input,\n    .previous-timesheet-table td:nth-child(2) {\n      font-size: 11px;\n      font-weight: 800;\n      letter-spacing: -.01em;\n      text-align: center;\n    }\n\n    .dayforce-table td:nth-child(2) input {\n      padding: 0 1px;\n    }\n\n    .empty {\n      margin: 0;\n      padding: 18px 12px;\n      border: 1px solid #c4d4e4;\n      border-top: 0;\n      border-radius: 0 0 8px 8px;\n      background: #fff;\n      color: #526174;\n    }\n\n    .missing-roster-panel,\n    .excel-preview {\n      border: 1px solid #c4d4e4;\n      border-top: 0;\n      background: #fff8df;\n    }\n\n    .excel-preview {\n      background: #fff;\n    }\n\n    @media (max-width: 760px) {\n      body {\n        font-size: 12px;\n      }\n\n      .page-switcher {\n        padding: 5px;\n      }\n\n      .page-switcher a {\n        min-width: 96px;\n        font-size: 12px;\n      }\n\n      .import-panel {\n        grid-template-columns: 1fr;\n      }\n\n      .file-control {\n        grid-template-columns: 1fr;\n      }\n\n      .clear-menu {\n        position: static;\n        margin-top: 4px;\n        grid-column: 1 / -1;\n      }\n\n      h1 {\n        font-size: 19px;\n      }\n    }\n  </style>\n</head>\n<body>\n  <main class=\"sheet\">\n    <header class=\"masthead\">\n      <h1>DAYFORCE PUNCH IMPORT</h1>\n      <div class=\"status\" id=\"status\">Ready</div>\n    </header>\n\n    <div class=\"push-notice\" id=\"pushNotice\" hidden>\n      Imported data has not been pushed to the Timesheet page yet. Click Send To Time Input.\n    </div>\n\n    <section class=\"import-panel\">\n      <div class=\"file-stack\">\n        <div class=\"file-row\">\n          <span>PUNCH XLSX:</span>\n          <input type=\"file\" id=\"fileInput\" accept=\".xlsx,.xls\" />\n        </div>\n        <div class=\"file-row\">\n          <span>NOTE SCAN XLSX:</span>\n          <input type=\"file\" id=\"noteFileInput\" accept=\".xlsx,.xls\" />\n        </div>\n        <div class=\"file-row\">\n          <span>PREV TIMESHEET:</span>\n          <div class=\"file-control\">\n            <input type=\"file\" id=\"previousTimesheetInput\" accept=\".xlsx,.xls\" />\n            <span class=\"previous-timesheet-status\" id=\"previousTimesheetStatus\">0.0 HRS</span>\n          </div>\n        </div>\n      </div>\n      <div class=\"buttons\">\n        <button type=\"button\" id=\"saveButton\">Send To Time Input</button>\n        <div class=\"clear-split\" id=\"clearSplit\">\n          <button type=\"button\" class=\"secondary\" id=\"clearDefaultButton\">Clear</button>\n          <button type=\"button\" class=\"secondary clear-split-toggle\" id=\"clearMenuButton\" aria-label=\"Clear options\" aria-expanded=\"false\"></button>\n          <div class=\"clear-menu\" id=\"clearMenu\">\n            <button type=\"button\" data-clear-action=\"punch\">Clear Punches</button>\n            <button type=\"button\" data-clear-action=\"note\">Clear Note Scan</button>\n            <button type=\"button\" data-clear-action=\"previous\">Clear Prev Time</button>\n          </div>\n        </div>\n      </div>\n    </section>\n\n    <section class=\"missing-roster-panel\" id=\"missingRosterPanel\" hidden>\n      <div class=\"missing-roster-title\">\n        <span>Extracted Names Not On Roster</span>\n        <span id=\"missingRosterCount\">0 names</span>\n      </div>\n      <div class=\"missing-roster-body\" id=\"missingRosterBody\"></div>\n    </section>\n\n    <section class=\"excel-preview\" id=\"excelPreviewSection\" hidden>\n      <div class=\"preview-title\">\n        <button type=\"button\" class=\"preview-pill\" id=\"excelPreviewToggle\" aria-expanded=\"false\">\n          Time Entry Import Preview Click to Review\n        </button>\n        <span class=\"preview-count\" id=\"excelPreviewCount\">0 out of 0 matched to schedule</span>\n      </div>\n      <div class=\"excel-preview-wrap\" id=\"excelPreviewWrap\">\n        <table class=\"excel-preview-table\" aria-label=\"Raw Excel preview\">\n          <thead id=\"excelPreviewHead\"></thead>\n          <tbody id=\"excelPreviewBody\"></tbody>\n        </table>\n      </div>\n    </section>\n\n    <table class=\"dayforce-table\" aria-label=\"Dayforce punch preview\">\n      <colgroup>\n        <col class=\"name\" />\n        <col class=\"date\" />\n        <col class=\"start\" />\n        <col class=\"lunch\" />\n        <col class=\"end\" />\n        <col class=\"note\" />\n      </colgroup>\n      <thead>\n        <tr>\n          <th>Employee</th>\n          <th>Date</th>\n          <th>Start</th>\n          <th>Lunch</th>\n          <th>End</th>\n          <th>Note</th>\n        </tr>\n      </thead>\n      <tbody id=\"previewBody\"></tbody>\n    </table>\n    <div class=\"empty\" id=\"emptyState\">No imported records yet.</div>\n\n    <section class=\"previous-timesheet-preview\" id=\"previousTimesheetPreview\" hidden>\n      <div class=\"preview-title\">\n        <span>Previous Timesheet Preview</span>\n        <span class=\"preview-count\" id=\"previousTimesheetPreviewCount\">0 rows</span>\n      </div>\n      <table class=\"dayforce-table previous-timesheet-table\" aria-label=\"Previous second shift timesheet preview\">\n        <colgroup>\n          <col class=\"name\" />\n          <col class=\"date\" />\n          <col class=\"time\" />\n          <col class=\"time\" />\n          <col class=\"time\" />\n          <col class=\"actual\" />\n        </colgroup>\n        <thead>\n          <tr>\n            <th>Employee</th>\n            <th>Date</th>\n            <th>Start</th>\n            <th>Lunch</th>\n            <th>End</th>\n            <th>0000-0300</th>\n          </tr>\n        </thead>\n        <tbody id=\"previousTimesheetPreviewBody\"></tbody>\n      </table>\n    </section>\n  </main>\n\n  <script src=\"https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js\"><\/script>\n  <script>\n    const storageKey = \"conglobal-dayforce-punches-v1\";\n    const unmatchedStorageKey = \"conglobal-dayforce-unmatched-v1\";\n    const rosterStorageKey = \"conglobal-roster-state-v1\";\n    const rosterAdditionsKey = \"conglobal-roster-additions-v1\";\n    const previousTimesheetStorageKey = \"conglobal-previous-timesheet-hours-v1\";\n    const pendingPushKey = \"conglobal-dayforce-pending-push-v1\";\n    const previewBody = document.getElementById(\"previewBody\");\n    const emptyState = document.getElementById(\"emptyState\");\n    const status = document.getElementById(\"status\");\n    const pushNotice = document.getElementById(\"pushNotice\");\n    const saveButton = document.getElementById(\"saveButton\");\n    const missingRosterPanel = document.getElementById(\"missingRosterPanel\");\n    const missingRosterCount = document.getElementById(\"missingRosterCount\");\n    const missingRosterBody = document.getElementById(\"missingRosterBody\");\n    const excelPreviewSection = document.getElementById(\"excelPreviewSection\");\n    const excelPreviewToggle = document.getElementById(\"excelPreviewToggle\");\n    const excelPreviewCount = document.getElementById(\"excelPreviewCount\");\n    const excelPreviewHead = document.getElementById(\"excelPreviewHead\");\n    const excelPreviewBody = document.getElementById(\"excelPreviewBody\");\n    const previousTimesheetStatus = document.getElementById(\"previousTimesheetStatus\");\n    const previousTimesheetPreview = document.getElementById(\"previousTimesheetPreview\");\n    const previousTimesheetPreviewCount = document.getElementById(\"previousTimesheetPreviewCount\");\n    const previousTimesheetPreviewBody = document.getElementById(\"previousTimesheetPreviewBody\");\n    const clearSplit = document.getElementById(\"clearSplit\");\n    const clearDefaultButton = document.getElementById(\"clearDefaultButton\");\n    const clearMenuButton = document.getElementById(\"clearMenuButton\");\n    const clearMenu = document.getElementById(\"clearMenu\");\n    const shiftLabels = {\n      first: \"1st Shift\",\n      second: \"2ND SHIFT\",\n      gate: \"Gate\",\n      mechanics: \"Mechanics\",\n      managers: \"Managers\",\n      unmatched: \"Not On Roster\"\n    };\n    const rosterShiftKeys = [\"first\", \"second\", \"gate\", \"mechanics\", \"managers\"];\n    const defaultRoster = {\n      first: [\n        [\"Branford Alton\", \"Mon, Tues\"],\n        [\"Castruita Armando\", \"Wed, Thurs\"],\n        [\"Frazer Dacoyea\", \"Mon, Tues\"],\n        [\"Citizen Dante\", \"Thurs, Fri\"],\n        [\"Towler Demetrius\", \"Thurs, Fri\"],\n        [\"Stewart Dexter\", \"Sat, Sun\"],\n        [\"Gardner Dorrean\", \"Tues, Wed\"],\n        [\"Thomas Henry\", \"Sat, Sun\"],\n        [\"Brown James\", \"Thurs, Fri\"],\n        [\"Herrera Jose\", \"Sat, Sun\"],\n        [\"Player Keyston\", \"Mon, Sun\"],\n        [\"Hickman Makia\", \"Mon, Sun\"],\n        [\"Dever Mikey\", \"Tues, Wed\"],\n        [\"Wanza Myles\", \"Mon, Tues\"],\n        [\"Romero Nelson\", \"Tues, Wed\"],\n        [\"McDaniel Charles\", \"Fri, Sat\"],\n        [\"Nava Ramon\", \"Sat, Sun\"],\n        [\"Tran Tyler\", \"Thurs, Fri\"]\n      ],\n      second: [\n        [\"Carruthers Timothy\", \"Mon, Sun\"],\n        [\"Caceres Virula Victor\", \"Mon, Tues\"],\n        [\"Keme Aweri Jr.\", \"Mon, Tues\"],\n        [\"Hosey Kevin\", \"Mon, Tues\"],\n        [\"Brown Brandy\", \"Wed, Thurs\"],\n        [\"Mejia Aaron\", \"Thurs, Fri\"],\n        [\"Bookman Derrell\", \"Thurs, Fri\"],\n        [\"Hopkins Alexander\", \"Mon, Sun\"],\n        [\"Tingle Jason\", \"Sat, Sun\"],\n        [\"Contreras Marco\", \"Sat, Sun\"],\n        [\"Benavides Robert\", \"Wed, Sun\"],\n        [\"Urtado Ernest\", \"Tues, Wed\"],\n        [\"Johnson Messiah\", \"Tues, Thurs\"],\n        [\"Gilder Rufus II\", \"Tues, Wed\"],\n        [\"Echendu Chimenierm\", \"Wed, Thurs\"],\n        [\"Delgado Jose\", \"Fri, Sat\"]\n      ],\n      gate: [\n        [\"Candace Warren\", \"Sat, Sun\"],\n        [\"Connie Johnson\", \"Sat, Sun\"],\n        [\"Jarade Douglas\", \"Sat, Sun\"],\n        [\"Gregory Watson II\", \"Sat, Sun\"],\n        [\"Bryce Alexander\", \"Thurs, Fri\"],\n        [\"Naomisha Hunt\", \"Thurs, Fri, Sat\"],\n        [\"Ramacacondra Pratt\", \"Thurs, Fri\"],\n        [\"Kane Cabral\", \"Mon, Tues\"],\n        [\"Tavares Gariet\", \"Mon, Tues\"]\n      ],\n      mechanics: [],\n      managers: []\n    };\n\n    function hasPreviewRecords() {\n      return Boolean(previewBody.querySelector(\"tr.record-row\"));\n    }\n\n    function updatePushNotice() {\n      const show = localStorage.getItem(pendingPushKey) === \"1\" && hasPreviewRecords();\n      pushNotice.hidden = !show;\n      saveButton.classList.toggle(\"pending-push\", show);\n    }\n\n    function setPendingPush(value) {\n      if (value && hasPreviewRecords()) {\n        localStorage.setItem(pendingPushKey, \"1\");\n      } else {\n        localStorage.removeItem(pendingPushKey);\n      }\n      updatePushNotice();\n    }\n\n    function normalizeName(name) {\n      const suffixes = new Set([\"jr\", \"sr\", \"ii\", \"iii\", \"iv\"]);\n      return String(name || \"\")\n        .trim()\n        .toLowerCase()\n        .replace(/[,.]/g, \" \")\n        .replace(/\\bcontrerras\\b/g, \"contreras\")\n        .replace(/\\bdemeatrius\\b/g, \"demetrius\")\n        .replace(/\\btowner\\b/g, \"towler\")\n        .replace(/\\s+/g, \" \")\n        .split(\" \")\n        .filter((part) => part && !suffixes.has(part))\n        .sort()\n        .join(\" \");\n    }\n\n    function defaultRosterRows() {\n      return Object.entries(defaultRoster).flatMap(([shift, rows]) => (\n        rows.map(([name]) => ({ name, shift }))\n      ));\n    }\n\n    function savedRosterRows(roster) {\n      return rosterShiftKeys.flatMap((shift) => (\n        Array.isArray(roster[shift])\n          ? roster[shift].filter((employee) => employee && employee.name).map((employee) => ({ name: employee.name, shift }))\n          : []\n      ));\n    }\n\n    function hasSavedRosterRows(roster) {\n      return rosterShiftKeys.some((shift) => Array.isArray(roster[shift]) && roster[shift].length);\n    }\n\n    function buildRosterRows() {\n      const rows = [];\n      const seen = new Set();\n      const addRows = (items) => {\n        items.forEach((employee) => {\n          const key = normalizeName(employee.name);\n          if (!key || seen.has(key)) return;\n          seen.add(key);\n          rows.push(employee);\n        });\n      };\n\n      try {\n        const roster = JSON.parse(localStorage.getItem(rosterStorageKey) || \"{}\");\n        addRows(hasSavedRosterRows(roster) ? savedRosterRows(roster) : defaultRosterRows());\n        const additions = JSON.parse(localStorage.getItem(rosterAdditionsKey) || \"[]\");\n        if (Array.isArray(additions)) {\n          addRows(additions.filter((employee) => employee && employee.name).map((employee) => ({\n            name: employee.name,\n            shift: employee.shift || \"first\"\n          })));\n        }\n      } catch (error) {\n        addRows(defaultRosterRows());\n      }\n\n      if (!rows.length) addRows(defaultRosterRows());\n      return rows;\n    }\n\n    function rosterNames() {\n      return buildRosterRows().map((employee) => employee.name);\n    }\n\n    function rosterLookup() {\n      const lookup = new Map();\n      buildRosterRows().forEach((employee) => {\n        lookup.set(normalizeName(employee.name), { name: employee.name, shift: employee.shift || \"first\" });\n      });\n      return lookup;\n    }\n\n    function payrollDateFromRows(rows) {\n      for (const row of rows.slice(0, 12)) {\n        for (const cell of row) {\n          const text = String(cell || \"\").trim();\n          const match = text.match(/\\bdate\\s*:\\s*([0-9]{1,2}\\/[0-9]{1,2}\\/[0-9]{2,4})/i);\n          if (match) return match[1];\n        }\n      }\n      return new Date().toLocaleDateString();\n    }\n\n    function cleanPayrollEmployeeName(value) {\n      return cleanDayforceEmployeeName(value)\n        .replace(/\\s+\\d{4,}\\s*$/, \"\")\n        .trim();\n    }\n\n    function payrollDisplayName(value) {\n      return displayNameFromDayforce(cleanPayrollEmployeeName(value));\n    }\n\n    function payrollHours(value) {\n      const text = String(value || \"\").trim();\n      if (!text) return 0;\n      if (/^(x|yes|y|true)$/i.test(text)) return 8;\n\n      const timeMatch = text.match(/^(\\d{1,2}):(\\d{2})$/);\n      if (timeMatch) return Number(timeMatch[1]) + (Number(timeMatch[2]) / 60);\n\n      const numberMatch = text.match(/-?\\d+(\\.\\d+)?/);\n      if (!numberMatch) return 0;\n      return Math.max(0, Number(numberMatch[0]) || 0);\n    }\n\n    function titleCaseReason(value) {\n      return String(value || \"\")\n        .toLowerCase()\n        .replace(/\\b\\w/g, (char) => char.toUpperCase())\n        .replace(/\\bPto\\b/g, \"PTO\");\n    }\n\n    function absenceReasonFromHeader(header) {\n      const text = String(header || \"\").replace(/\\s+/g, \" \").trim();\n      const normalized = text.toLowerCase();\n      if (!normalized || /^total\\b/.test(normalized) || normalized.includes(\"total overtime\")) return \"\";\n      if (normalized.includes(\"business day off\") && normalized.includes(\"unpaid\")) return \"Business Day Off - Unpaid\";\n      if (normalized.includes(\"floating holiday\") || /\\bfloat\\b/.test(normalized)) return \"Floating Holiday\";\n      if (normalized.includes(\"vacation\")) return \"Vacation\";\n      if (normalized.includes(\"sick\")) return \"Sick\";\n      if (normalized.i      ].join(\"\") : \"\";\n    }\n\n    function previousTimesheetEligibleNames() {\n      const lookup = rosterLookup();\n      const names = new Set();\n      lookup.forEach((entry, key) => {\n        if (entry.shift !== \"second\") return;\n        names.add(key);\n      });\n      return names;\n    }\n\n    function previousTimeMinutesFromValue(value) {\n      const text = String(value || \"\").trim();\n      if (!text) return null;\n\n      const meridianMatch = text.match(/^(\\d{1,2}):(\\d{2})\\s*([ap])m$/i);\n      if (meridianMatch) {\n        let hours = Number(meridianMatch[1]);\n        const minutes = Number(meridianMatch[2]);\n        const period = meridianMatch[3].toLowerCase();\n        if (period === \"p\" && hours !== 12) hours += 12;\n        if (period === \"a\" && hours === 12) hours = 0;\n        return (hours * 60) + minutes;\n      }\n\n      const colonMatch = text.match(/^(\\d{1,2}):(\\d{2})$/);\n      if (colonMatch) {\n        const hours = Number(colonMatch[1]);\n        const minutes = Number(colonMatch[2]);\n        if (hours > 24 || minutes > 59 || (hours === 24 && minutes !== 0)) return null;\n        return (hours * 60) + minutes;\n      }\n\n      const militaryMatch = text.match(/^(\\d{1,2})(\\d{2})$/);\n      if (!militaryMatch) return null;\n      const hours = Number(militaryMatch[1]);\n      const minutes = Number(militaryMatch[2]);\n      if (hours > 24 || minutes > 59 || (hours === 24 && minutes !== 0)) return null;\n      return (hours * 60) + minutes;\n    }\n\n    function normalizePreviousHeader(value) {\n      return String(value || \"\").trim().toLowerCase().replace(/\\s+/g, \" \");\n    }\n\n    function previousColumnIndexFor(row, matchers) {\n      return row.findIndex((cell) => {\n        const text = normalizePreviousHeader(cell);\n        return matchers.some((matcher) => matcher.test(text));\n      });\n    }\n\n    function rowLooksLikePreviousTimeHeader(row) {\n      const normalized = row.map(normalizePrevio
