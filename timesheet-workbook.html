apeHtml(row.name)}\" aria-label=\"Match ${escapeHtml(row.name)} to schedule employee\">\n          <option value=\"\">Select schedule employee</option>\n          ${optionHtml}\n        </select>\n      `;\n    }\n\n    function mapByName(rows) {\n      const map = new Map();\n      rows.forEach((row) => {\n        const key = normalizeName(row.canonicalName || row.name);\n        if (!key) return;\n        map.set(key, row);\n      });\n      return map;\n    }\n\n    function compareStatus(current, imported) {\n      if (!current && !imported) return [\"missing\", \"NO DATA\"];\n      if (!current) return [\"missing\", \"MISSING CURRENT\"];\n      if (!imported) return [\"missing\", \"MISSING IMPORT\"];\n      const fields = [\"start\", \"lunch\", \"end\", \"actual\"];\n      return fields.every((field) => String(current[field] || \"\") === String(imported[field] || \"\")) ? [\"match\", \"MATCH\"] : [\"diff\", \"DIFF\"];\n    }\n\n    function renderPreview(importedRows = readImportedRows()) {\n      const ignored = readIgnored();\n      const rows = importedRows.map(canonicalImportedRow);\n      const unresolved = rows.filter((row) => !row.match.found && !ignored.has(normalizeName(row.name))).length;\n      document.getElementById(\"previewCount\").textContent = rows.length\n        ? `${rows.length} parsed / ${unresolved} unrecognized`\n        : \"No import loaded\";\n      document.getElementById(\"previewEmpty\").style.display = rows.length ? \"none\" : \"block\";\n      document.getElementById(\"previewTable\").hidden = rows.length === 0;\n      previewBody.innerHTML = groupRowsByShift(rows).map(([shiftKey, shiftRows]) => (\n        shiftSectionRow(shiftKey, shiftRows.length, 7) + shiftRows.map((row) => {\n          const key = normalizeName(row.name);\n          const isIgnored = ignored.has(key);\n          const className = isIgnored ? \"ignored\" : (row.match.found ? \"\" : \"unrecognized\");\n          const matchText = isIgnored ? \"Ignored\" : (row.match.found ? row.match.name : (row.match.hasSuggestion ? `Try: ${row.match.suggestion}` : \"No match\"));\n          const actions = row.match.found || isIgnored\n            ? (isIgnored ? `<button type=\"button\" class=\"secondary\" data-unignore=\"${escapeHtml(key)}\">Unignore</button>` : \"Matched\")\n            : `\n              ${row.match.hasSuggestion ? `<button type=\"button\" class=\"suggest\" data-use-suggestion=\"${escapeHtml(row.name)}\" data-suggestion=\"${escapeHtml(row.match.suggestion)}\">Use Suggestion</button>` : \"\"}\n              <select data-shift-for=\"${escapeHtml(row.name)}\">\n                ${Object.entries(shiftLabels).map(([value, label]) => `<option value=\"${escapeHtml(value)}\">${escapeHtml(label)}</option>`).join(\"\")}\n              </select>\n              <button type=\"button\" class=\"add\" data-add-name=\"${escapeHtml(row.name)}\">Add</button>\n              <button type=\"button\" class=\"ignore\" data-ignore-name=\"${escapeHtml(row.name)}\">Ignore</button>\n            `;\n          return `\n            <tr class=\"${className}\">\n              <td class=\"employee-cell\">${previewNameCell(row, importedRows, ignored)}</td>\n              <td>${escapeHtml(matchText)}</td>\n              <td>${escapeHtml(row.start)}</td>\n              <td>${escapeHtml(row.lunch)}</td>\n              <td>${escapeHtml(row.end)}</td>\n              <td>${escapeHtml(row.actual)}</td>\n              <td><div class=\"actions\">${actions}</div></td>\n            </tr>\n          `;\n        }).join(\"\")\n      )).join(\"\");\n    }\n\n    function renderCompare() {\n      const ignored = readIgnored();\n      const currentRows = visibleCurrentRows().map((row) => ({ ...row, canonicalName: row.name }));\n      const savedImportedRows = readImportedRows();\n      if (!savedImportedRows.length) {\n        body.innerHTML = '<tr><td colspan=\"10\" class=\"empty\">No imported timesheet loaded.</td></tr>';\n        document.getElementById(\"currentCount\").textContent = `Current MD: ${currentRows.length}`;\n        document.getElementById(\"importCount\").textContent = \"Imported: 0\";\n        document.getElementById(\"matchCount\").textContent = \"Matches: 0\";\n        document.getElementById(\"issueCount\").textContent = \"Issues: 0\";\n        renderPreview([]);\n        return;\n      }\n      const importedRows = savedImportedRows\n        .filter((row) => !ignored.has(normalizeName(row.name)))\n        .map(canonicalImportedRow)\n        .filter((row) => row.match.found);\n\n      const currentMap = mapByName(currentRows);\n      const importMap = mapByName(importedRows);\n      const employeeNames = new Map();\n      currentRows.forEach((row) => employeeNames.set(normalizeName(row.name), row.name));\n      importedRows.forEach((row) => employeeNames.set(normalizeName(row.canonicalName), row.canonicalName));\n\n      let matches = 0;\n      let issues = 0;\n\n      const compareRows = Array.from(employeeNames.entries()).map(([key, name]) => {\n        const current = currentMap.get(key);\n        const imported = importMap.get(key);\n        const [className, label] = compareStatus(current, imported);\n        if (className === \"match\") matches += 1;\n        else issues += 1;\n\n        return {\n          name,\n          current,\n          imported,\n          className,\n          label,\n          shiftKey: rowShiftKey(current || imported || { name })\n        };\n      });\n\n      body.innerHTML = groupRowsByShift(compareRows, (row) => row.shiftKey).map(([shiftKey, shiftRows]) => (\n        shiftSectionRow(shiftKey, shiftRows.length, 10) + shiftRows\n          .sort((a, b) => a.name.localeCompare(b.name))\n          .map(({ name, current, imported, className, label }) => `\n            <tr>\n              <td class=\"employee-cell\">${escapeHtml(name)}</td>\n              <td>${escapeHtml(current?.start || \"\")}</td>\n              <td>${escapeHtml(current?.lunch || \"\")}</td>\n              <td>${escapeHtml(current?.end || \"\")}</td>\n              <td>${escapeHtml(current?.actual || \"\")}</td>\n              <td>${escapeHtml(imported?.start || \"\")}</td>\n              <td>${escapeHtml(imported?.lunch || \"\")}</td>\n              <td>${escapeHtml(imported?.end || \"\")}</td>\n              <td>${escapeHtml(imported?.actual || \"\")}</td>\n              <td class=\"${className}\">${label}</td>\n            </tr>\n          `).join(\"\")\n      )).join(\"\");\n\n      const unresolved = readImportedRows().map(canonicalImportedRow).filter((row) => !row.match.found && !ignored.has(normalizeName(row.name))).length;\n      document.getElementById(\"currentCount\").textContent = `Current MD: ${currentRows.length}`;\n      document.getElementById(\"importCount\").textContent = `Imported: ${importedRows.length}`;\n      document.getElementById(\"matchCount\").textContent = `Matches: ${matches}`;\n      document.getElementById(\"issueCount\").textContent = `Issues: ${issues}${unresolved ? ` / ${unresolved} names` : \"\"}`;\n      renderPreview();\n    }\n\n    function addNameToRoster(name, shift) {\n      const cleanName = String(name || \"\").trim();\n      const targetShift = shiftLabels[shift] ? shift : \"first\";\n      if (!cleanName) return false;\n      const normalized = normalizeName(cleanName);\n      if (rosterNameList().some((candidate) => normalizeName(candidate) === normalized)) return true;\n      const additions = readRosterAdditions();\n      additions.push({\n        name: cleanName,\n        role: \"\",\n        days: [\"W\", \"W\", \"W\", \"W\", \"W\", \"W\", \"W\"],\n        shift: targetShift\n      });\n      writeJson(rosterAdditionsKey, additions);\n      return true;\n    }\n\n    async function importFile(file) {\n      let imported = [];\n      if (file.name.toLowerCase().endsWith(\".csv\") || file.name.toLowerCase().endsWith(\".txt\")) {\n        const text = await file.text();\n        imported = parseWorkbookRows(text.split(/\\r?\\n/).filter(Boolean).map((line) => line.includes(\"\\t\") ? line.split(\"\\t\") : line.split(\",\")));\n      } else {\n        if (!window.XLSX) return [];\n        const workbook = XLSX.read(await file.arrayBuffer(), { type: \"array\" });\n        imported = parseWorkbookSheets(workbook.SheetNames.map((sheetName) => ({\n          name: sheetName,\n          rows: XLSX.utils.sheet_to_json(workbook.Sheets[sheetName], { header: 1, raw: false, defval: \"\" })\n        })));\n      }\n      return dedupeRows(imported).map(normalizeCompareRow);\n    }\n\n    document.getElementById(\"fileInput\").addEventListener(\"change\", async (event) => {\n      const file = event.target.files[0];\n      if (!file) return;\n      const imported = await importFile(file);\n      writeJson(compareStorageKey, imported);\n      localStorage.removeItem(compareAliasesKey);\n      localStorage.removeItem(compareIgnoredKey);\n      event.target.value = \"\";\n      renderCompare();\n    });\n\n    previewBody.addEventListener(\"click\", (event) => {\n      const openNameButton = event.target.closest(\"[data-open-name-select]\");\n      const suggestionButton = event.target.closest(\"[data-use-suggestion]\");\n      const addButton = event.target.closest(\"[data-add-name]\");\n      const ignoreButton = event.target.closest(\"[data-ignore-name]\");\n      const unignoreButton = event.target.closest(\"[data-unignore]\");\n\n      if (openNameButton) {\n        const row = openNameButton.closest(\"tr\");\n        const select = row ? row.querySelector(\"[data-name-select]\") : null;\n        if (row && select) {\n          row.classList.add(\"selecting-name\");\n          select.focus();\n        }\n        return;\n      } else if (suggestionButton) {\n        const aliases = readAliases();\n        aliases[normalizeName(suggestionButton.dataset.useSuggestion)] = suggestionButton.dataset.suggestion;\n        writeJson(compareAliasesKey, aliases);\n      } else if (addButton) {\n        const name = addButton.dataset.addName;\n        const select = Array.from(previewBody.querySelectorAll(\"[data-shift-for]\"))\n          .find((item) => item.dataset.shiftFor === name);\n        addNameToRoster(name, select ? select.value : \"first\");\n      } else if (ignoreButton) {\n        const ignored = readIgnored();\n        ignored.add(normalizeName(ignoreButton.dataset.ignoreName));\n        writeJson(compareIgnoredKey, Array.from(ignored));\n      } else if (unignoreButton) {\n        const ignored = readIgnored();\n        ignored.delete(unignoreButton.dataset.unignore);\n        writeJson(compareIgnoredKey, Array.from(ignored));\n      } else {\n        return;\n      }\n\n      renderCompare();\n    });\n\n    previewBody.addEventListener(\"change\", (event) => {\n      const select = event.target.closest(\"[data-name-select]\");\n      if (!select || !select.value) return;\n      const aliases = readAliases();\n      aliases[normalizeName(select.dataset.nameSelect)] = select.value;\n      writeJson(compareAliasesKey, aliases);\n      renderCompare();\n    });\n\n    document.getElementById(\"refreshButton\").addEventListener(\"click\", renderCompare);\n    document.getElementById(\"clearButton\").addEventListener(\"click\", () => {\n      localStorage.removeItem(compareStorageKey);\n      localStorage.removeItem(compareAliasesKey);\n      localStorage.removeItem(compareIgnoredKey);\n      document.getElementById(\"fileInput\").value = \"\";\n      renderCompare();\n    });\n\n    renderCompare();\n  <\/script>\n</body>\n</html>\n"
      },
      "archive": {
        "label": "Archive",
        "html": "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n  <meta charset=\"UTF-8\" />\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" />\n  <title>Timesheet Archive</title>\n  <script src=\"xlsx.full.min.js\"><\/script>\n  <script>\n    if (!window.XLSX) {\n      document.write('<script src=\"https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js\"><\\/script>');\n    }\n  <\/script>\n  <style>\n    :root {\n      --ink: #111827;\n      --muted: #6b7280;\n      --soft: #f8fafc;\n      --line: #d8dee8;\n      --purple: #312e81;\n      --purple-soft: #eef2ff;\n      --green: #16a34a;\n      --green-soft: #dcfce7;\n      --red: #dc2626;\n      --red-soft: #fee2e2;\n      --gold: #d97706;\n      --gold-soft: #fffbeb;\n      --violet-soft: #ede9fe;\n      --gray-soft: #eef0f3;\n    }\n\n    * {\n      box-sizing: border-box;\n    }\n\n    body {\n      margin: 0;\n      background: #fff;\n      color: var(--ink);\n      font-family: \"Helvetica Neue\", Helvetica, Arial, sans-serif;\n      font-size: 13px;\n      overflow-x: hidden;\n    }\n\n    .page-switcher {\n      width: 100%;\n      display: flex;\n      gap: 4px;\n      align-items: center;\n      padding: 6px 8px;\n      background: #111;\n      border-bottom: 2px solid #000;\n    }\n\n    .page-switcher a {\n      min-width: 118px;\n      height: 28px;\n      display: inline-flex;\n      align-items: center;\n      justify-content: center;\n      border: 1px solid #777;\n      background: #e7e6e6;\n      color: #000;\n      text-decoration: none;\n      font-size: 13px;\n      font-weight: 800;\n    }\n\n    .page-switcher a.active {\n      background: #ffff00;\n      border-color: #ffff00;\n    }\n\n    .archive-shell {\n      width: min(1180px, calc(100% - 20px));\n      margin: 10px auto 18px;\n      border: 1px solid var(--line);\n      border-radius: 8px;\n      background: #fff;\n      overflow: hidden;\n    }\n\n    .archive-toolbar {\n      min-height: 58px;\n      display: grid;\n      grid-template-columns: minmax(210px, 1fr) auto;\n      gap: 16px;\n      align-items: center;\n      padding: 10px 14px;\n      border-bottom: 1px solid var(--line);\n      background: #f8fafc;\n    }\n\n    .month-controls,\n    .save-controls {\n      display: flex;\n      align-items: center;\n      flex-wrap: wrap;\n      gap: 8px;\n    }\n\n    .month-title {\n      min-width: 170px;\n      color: var(--ink);\n      font-size: 18px;\n      font-weight: 900;\n    }\n\n    button,\n    input,\n    select {\n      font: inherit;\n    }\n\n    .icon-button,\n    .primary-button,\n    .secondary-button {\n      height: 30px;\n      border: 1px solid #cbd5e1;\n      border-radius: 6px;\n      background: #fff;\n      color: var(--ink);\n      font-weight: 900;\n      cursor: pointer;\n    }\n\n    .icon-button {\n      width: 32px;\n    }\n\n    .primary-button {\n      padding: 0 14px;\n      border-color: #0f172a;\n      background: #0f172a;\n      color: #fff;\n    }\n\n    .secondary-button {\n      padding: 0 12px;\n    }\n\n    .save-controls input[type=\"date\"] {\n      height: 30px;\n      min-width: 142px;\n      padding: 0 8px;\n      border: 1px solid #cbd5e1;\n      border-radius: 6px;\n      color: var(--ink);\n      font-weight: 800;\n    }\n\n    .save-message {\n      min-width: 118px;\n      color: var(--muted);\n      font-size: 11px;\n      font-weight: 800;\n    }\n\n    .archive-file-input {\n      position: absolute;\n      width: 1px;\n      height: 1px;\n      opacity: 0;\n      pointer-events: none;\n    }\n\n    .danger-month-button {\n      border-color: #fecaca;\n      background: #fff;\n      color: #b91c1c;\n    }\n\n    .danger-month-button.confirming {\n      border-color: #b91c1c;\n      background: #fee2e2;\n      color: #7f1d1d;\n    }\n\n    .calendar-weekdays,\n    .calendar-grid {\n      display: grid;\n      grid-template-columns: repeat(7, minmax(0, 1fr));\n      gap: 5px;\n      padding: 0 8px;\n    }\n\n    .calendar-weekdays {\n      padding-top: 10px;\n      padding-bottom: 4px;\n    }\n\n    .weekday {\n      height: 30px;\n      display: flex;\n      align-items: center;\n      justify-content: center;\n      border: 1px solid var(--line);\n      border-radius: 6px;\n      background: #fff;\n      color: #334155;\n      font-size: 11px;\n      font-weight: 900;\n    }\n\n    .calendar-grid {\n      padding-bottom: 10px;\n    }\n\n    .day-cell {\n      min-height: 92px;\n      display: flex;\n      flex-direction: column;\n      align-items: flex-start;\n      gap: 6px;\n      padding: 7px;\n      border: 1px solid var(--line);\n      border-radius: 6px;\n      background: #fff;\n      cursor: pointer;\n    }\n\n    .day-cell:hover,\n    .day-cell.selected {\n      border-color: #94a3b8;\n      box-shadow: inset 0 0 0 1px #94a3b8;\n    }\n\n    .day-cell.muted {\n      background: #f8fafc;\n      color: #a0a8b5;\n    }\n\n    .day-cell.today {\n      border-color: #4338ca;\n    }\n\n    .day-number {\n      color: inherit;\n      font-size: 11px;\n      font-weight: 800;\n    }\n\n    .archive-pill {\n      max-width: 100%;\n      min-height: 22px;\n      display: inline-flex;\n      align-items: center;\n      justify-content: center;\n      padding: 3px 8px;\n      border: 1px solid #c7d2fe;\n      border-radius: 999px;\n      background: var(--purple-soft);\n      color: #4338ca;\n      font-size: 11px;\n      font-weight: 900;\n      line-height: 1.1;\n      text-align: center;\n      white-space: normal;\n      cursor: pointer;\n    }\n\n    .day-cell.missing-punch-day {\n      border-color: #dc2626;\n      background: #fff7f7;\n      box-shadow: inset 0 0 0 1px rgba(220, 38, 38, .18);\n    }\n\n    .missing-punch-pill {\n      max-width: 100%;\n      min-height: 22px;\n      display: inline-flex;\n      align-items: center;\n      justify-content: center;\n      padding: 3px 8px;\n      border: 1px solid #ef4444;\n      border-radius: 999px;\n      background: #fee2e2;\n      color: #b91c1c;\n      font-size: 10px;\n      font-weight: 950;\n      line-height: 1.1;\n      text-align: center;\n      white-space: normal;\n      cursor: pointer;\n    }\n\n    .modal-backdrop {\n      position: fixed;\n      inset: 0;\n      z-index: 30;\n      display: none;\n      align-items: flex-start;\n      justify-content: center;\n      padding: 24px 14px;\n      background: rgba(15, 23, 42, .45);\n    }\n\n    .modal-backdrop.open {\n      display: flex;\n    }\n\n    .preview-modal {\n      width: min(1080px, 100%);\n      max-height: calc(100vh - 48px);\n      overflow: auto;\n      border: 1px solid #cbd5e1;\n      border-radius: 8px;\n      background: #e7e5df;\n      box-shadow: 0 22px 60px rgba(15, 23, 42, .28);\n    }\n\n    .preview-top {\n      position: sticky;\n      top: 0;\n      z-index: 2;\n      display: flex;\n      align-items: center;\n      justify-content: space-between;\n      gap: 12px;\n      padding: 12px 14px;\n      background: var(--purple);\n      color: #fff;\n    }\n\n    .preview-title {\n      font-size: 18px;\n      font-weight: 900;\n    }\n\n    .preview-actions {\n      display: flex;\n      align-items: center;\n      gap: 8px;\n    }\n\n    .preview-actions button {\n      height: 30px;\n      padding: 0 12px;\n      border: 1px solid rgba(255, 255, 255, .55);\n      border-radius: 5px;\n      background: rgba(255, 255, 255, .12);\n      color: #fff;\n      font-weight: 900;\n      cursor: pointer;\n    }\n\n    .preview-actions .update-button {\n      background: #fff;\n      color: var(--purple);\n    }\n\n    .preview-actions .delete-button {\n      border-color: #fecaca;\n      background: #fee2e2;\n      color: #991b1b;\n    }\n\n    .preview-actions .delete-button.confirm-delete {\n      border-color: #fff;\n      background: #dc2626;\n      color: #fff;\n    }\n\n    .preview-body {\n      padding: 14px;\n    }\n\n    .manager-assignment-panel {\n      display: grid;\n      grid-template-columns: repeat(2, minmax(0, 1fr));\n      gap: 10px;\n      margin-bottom: 10px;\n      padding: 10px;\n      border: 1px solid var(--line);\n      border-radius: 7px;\n      background: #fff;\n    }\n\n    .manager-assignment-field {\n      display: grid;\n      grid-template-columns: auto minmax(150px, 1fr);\n      align-items: center;\n      gap: 9px;\n    }\n\n    .manager-assignment-field label {\n      color: #475569;\n      font-size: 11px;\n      font-weight: 900;\n      white-space: nowrap;\n    }\n\n    .manager-assignment-field select {\n      width: 100%;\n      height: 32px;\n      padding: 0 9px;\n      border: 1px solid #cbd5e1;\n      border-radius: 5px;\n      background: #f8fafc;\n      color: var(--ink);\n      font: inherit;\n      font-weight: 800;\n      cursor: pointer;\n    }\n\n    .manager-assignment-field select:focus {\n      border-color: var(--purple);\n      outline: 2px solid rgba(55, 48, 163, .12);\n    }\n\n    .kpis {\n      display: grid;\n      grid-template-columns: repeat(7, minmax(0, 1fr));\n      gap: 8px;\n      margin-bottom: 10px;\n    }\n\n    .kpi {\n      min-height: 62px;\n      padding: 7px 10px;\n      border: 1px solid var(--line);\n      border-radius: 7px;\n      background: #fff;\n      display: flex;\n      flex-direction: column;\n      align-items: center;\n      justify-content: center;\n      gap: 4px;\n      text-align: center;\n    }\n\n    .kpi.good {\n      background: #f0fdf4;\n      border-color: #bbf7d0;\n    }\n\n    .kpi.warn {\n      background: var(--gold-soft);\n      border-color: #fde68a;\n    }\n\n    .kpi.bad {\n      background: #fef2f2;\n      border-color: #fecaca;\n    }\n\n    .kpi-label {\n      width: 100%;\n      color: #9ca3af;\n      font-size: 11px;\n      font-weight: 900;\n      letter-spacing: .05em;\n      line-height: 1;\n      text-transform: uppercase;\n    }\n\n    .kpi-value {\n      color: var(--ink);\n      font-size: 19px;\n      font-weight: 900;\n      line-height: 1;\n      font-variant-numeric: tabular-nums;\n    }\n\n    .kpi.good .kpi-label,\n    .kpi.good .kpi-value {\n      color: #15803d;\n    }\n\n    .kpi.warn .kpi-label,\n    .kpi.warn .kpi-value {\n      color: #92400e;\n    }\n\n    .kpi.bad .kpi-label,\n    .kpi.bad .kpi-value {\n      color: #b91c1c;\n    }\n\n    .cards {\n      display: flex;\n      flex-direction: column;\n      gap: 10px;\n    }\n\n    .shift-card {\n      overflow: hidden;\n      border: 1px solid var(--line);\n      border-radius: 8px;\n      background: #fff;\n    }\n\n    .shift-head,\n    .md-row {\n      display: grid;\n      grid-template-columns: minmax(142px, 1fr) 88px minmax(150px, 1.45fr) 118px 54px 66px 86px;\n      gap: 7px;\n      align-items: center;\n      padding: 0 13px;\n    }\n\n    .shift-head {\n      min-height: 26px;\n      border-top: 2px solid #000;\n      border-bottom: 2px solid #000;\n      border-left: 3px solid #d9d9d9;\n      background: #d9d9d9;\n      color: #000;\n      font-size: 11px;\n      font-weight: 900;\n      text-align: center;\n    }\n\n    .shift-head span {\n      overflow: hidden;\n      text-overflow: ellipsis;\n      white-space: nowrap;\n    }\n\n    .shift-head .shift-name {\n      text-align: left;\n    }\n\n    .md-row {\n      min-height: 28px;\n      border-bottom: 1px solid #f1f3f6;\n      border-left: 3px solid #e5e7eb;\n      font-size: 13px;\n      line-height: 1.15;\n    }\n\n    .md-row.in-row,\n    .md-row.out-row {\n      border-left-color: #22c55e;\n    }\n\n    .md-row.missing-row,\n    .md-row.invalid-row {\n      border-left-color: #ef4444;\n      background: #fef4f4;\n    }\n\n    .md-row.offday-row {\n      border-left-color: #14b8a6;\n      background: #f0fdfa;\n    }\n\n    .md-row.absence-row,\n    .md-row.unpaid-row {\n      border-left-color: #a78bfa;\n      background: var(--violet-soft);\n    }\n\n    .name {\n      overflow: hidden;\n      color: var(--ink);\n      font-weight: 600;\n      text-overflow: ellipsis;\n      white-space: nowrap;\n    }\n\n    .off {\n      overflow: hidden;\n      color: #9ca3af;\n      font-size: 11.5px;\n      text-align: center;\n      text-overflow: ellipsis;\n      white-space: nowrap;\n    }\n\n    .note-edit,\n    .time-edit,\n    .lunch-edit {\n      width: 100%;\n      height: 22px;\n      border: 1px solid transparent;\n      border-radius: 4px;\n      background: transparent;\n      color: var(--ink);\n      font: inherit;\n      font-weight: 800;\n      text-align: center;\n    }\n\n    .note-edit {\n      color: #6d28d9;\n      font-size: 11px;\n      white-space: normal;\n    }\n\n    .time-edit,\n    .lunch-edit {\n      color: var(--green);\n      font-family: \"SFMono-Regular\", Consolas, monospace;\n      font-size: 14px;\n    }\n\n    .time-edit.missing {\n      color: var(--red);\n    }\n\n    .time-edit:focus,\n    .lunch-edit:focus,\n    .note-edit:focus {\n      border-color: #f59e0b;\n      outline: 0;\n      background: #fffbeb;\n    }\n\n    .actual {\n      color: var(--ink);\n      font-weight: 900;\n      text-align: center;\n      font-variant-numeric: tabular-nums;\n    }\n\n    .off-footer {\n      display: flex;\n      align-items: center;\n      flex-wrap: wrap;\n      gap: 6px;\n      padding: 6px 13px 8px;\n      background: #fcfcfd;\n      color: #9ca3af;\n      font-size: 9px;\n      line-height: 1.45;\n    }\n\n    .off-footer strong {\n      color: var(--muted);\n      letter-spacing: .05em;\n      text-transform: uppercase;\n    }\n\n    .off-chip {\n      display: inline-flex;\n      align-items: center;\n      justify-content: center;\n      min-height: 18px;\n      padding: 2px 9px;\n      border-radius: 4px;\n      background: #f1f3f6;\n      color: #64748b;\n      font-size: 9px;\n      font-weight: 800;\n      line-height: 1;\n      white-space: nowrap;\n    }\n\n    @media (max-width: 860px) {\n      .archive-toolbar {\n        grid-template-columns: 1fr;\n      }\n\n      .calendar-weekdays,\n      .calendar-grid {\n        gap: 3px;\n        padding-inline: 5px;\n      }\n\n      .day-cell {\n        min-height: 78px;\n        padding: 5px;\n      }\n\n      .kpis {\n        grid-template-columns: repeat(2, minmax(0, 1fr));\n      }\n\n      .manager-assignment-panel {\n        grid-template-columns: 1fr;\n      }\n\n      .shift-head,\n      .md-row {\n        grid-template-columns: minmax(112px, 1fr) 66px minmax(102px, 1.3fr) 86px 38px 44px 68px;\n        gap: 4px;\n        padding-inline: 8px;\n      }\n    }\n  </style>\n</head>\n<body>\n  <main class=\"archive-shell\">\n    <header class=\"archive-toolbar\">\n      <div class=\"month-controls\">\n        <button class=\"icon-button\" id=\"prevMonth\" type=\"button\" aria-label=\"Previous month\">&lt;</button>\n        <div class=\"month-title\" id=\"monthTitle\"></div>\n        <button class=\"icon-button\" id=\"nextMonth\" type=\"button\" aria-label=\"Next month\">&gt;</button>\n        <button class=\"secondary-button\" id=\"todayButton\" type=\"button\">Today</button>\n      </div>\n      <div class=\"save-controls\">\n        <input id=\"archiveDate\" type=\"date\" aria-label=\"Archive date\" />\n        <button class=\"primary-button\" id=\"saveTimesheet\" type=\"button\">Save Current Timesheet</button>\n        <button class=\"secondary-button\" id=\"importArchiveTimesheets\" type=\"button\">Mass Import</button>\n        <input class=\"archive-file-input\" id=\"archiveTimesheetInput\" type=\"file\" multiple accept=\".xlsx,.xls,.html,.htm\" />\n        <button class=\"secondary-button danger-month-button\" id=\"clearArchiveMonth\" type=\"button\">Clear Current Month</button>\n        <span class=\"save-message\" id=\"saveMessage\"></span>\n      </div>\n    </header>\n\n    <section class=\"calendar-weekdays\" aria-hidden=\"true\">\n      <div class=\"weekday\">Sun</div>\n      <div class=\"weekday\">Mon</div>\n      <div class=\"weekday\">Tue</div>\n      <div class=\"weekday\">Wed</div>\n      <div class=\"weekday\">Thu</div>\n      <div class=\"weekday\">Fri</div>\n      <div class=\"weekday\">Sat</div>\n    </section>\n    <section class=\"calendar-grid\" id=\"calendarGrid\" aria-label=\"Timesheet archive calendar\"></section>\n  </main>\n\n  <div class=\"modal-backdrop\" id=\"previewModal\" aria-hidden=\"true\">\n    <section class=\"preview-modal\" role=\"dialog\" aria-modal=\"true\" aria-labelledby=\"previewTitle\">\n      <header class=\"preview-top\">\n        <div class=\"preview-title\" id=\"previewTitle\">Archived Timesheet</div>\n        <div class=\"preview-actions\">\n          <button class=\"update-button\" id=\"updateArchive\" type=\"button\">Update</button>\n          <button class=\"delete-button\" id=\"deleteArchive\" type=\"button\">Delete</button>\n          <button id=\"closePreview\" type=\"button\">X</button>\n        </div>\n      </header>\n      <div class=\"preview-body\">\n        <section class=\"manager-assignment-panel\" aria-label=\"Managers worked\">\n          <div class=\"manager-assignment-field\">\n            <label for=\"archiveFirstManager\">1st Shift Manager</label>\n            <select id=\"archiveFirstManager\" aria-label=\"First shift manager\"></select>\n          </div>\n          <div class=\"manager-assignment-field\">\n            <label for=\"archiveSecondManager\">2nd Shift Manager</label>\n            <select id=\"archiveSecondManager\" aria-label=\"Second shift manager\"></select>\n          </div>\n        </section>\n        <section class=\"kpis\" id=\"previewKpis\" aria-label=\"Archived metrics\"></section>\n        <section class=\"cards\" id=\"previewCards\" aria-label=\"Archived timesheet preview\"></section>\n      </div>\n    </section>\n  </div>\n\n  <script>\n    const dayAliases = {\n      sun: \"sun\", sunday: \"sun\",\n      mon: \"mon\", monday: \"mon\",\n      tue: \"tue\", tues: \"tue\", tuesday: \"tue\",\n      wed: \"wed\", weds: \"wed\", wednesday: \"wed\",\n      thu: \"thu\", thur: \"thu\", thurs: \"thu\", thursday: \"thu\",\n      fri: \"fri\", friday: \"fri\",\n      sat: \"sat\", saturday: \"sat\"\n    };\n\n    const archiveStorageKey = \"conglobal-timesheet-archive-v1\";\n    const rosterStorageKey = \"conglobal-roster-state-v1\";\n    const rosterAdditionsKey = \"conglobal-roster-additions-v1\";\n    const dayforceStorageKey = \"conglobal-dayforce-punches-v1\";\n    const previousTimesheetStorageKey = \"conglobal-previous-timesheet-hours-v1\";\n    const timesheetSettingsKey = \"conglobal-timesheet-settings-v1\";\n    const archiveSelectedDateKey = \"conglobal-archive-selected-date-v1\";\n    const rosterDayLabels = [\"Mon\", \"Tues\", \"Wed\", \"Thurs\", \"Fri\", \"Sat\", \"Sun\"];\n    const lpmhGoal = 2.0;\n    const today = new Date();\n    const todayKey = [\"sun\", \"mon\", \"tue\", \"wed\", \"thu\", \"fri\", \"sat\"][today.getDay()];\n    let viewDate = new Date(today.getFullYear(), today.getMonth(), 1);\n    let selectedDateKey = isoDate(today);\n    const requestedArchiveDate = localStorage.getItem(archiveSelectedDateKey) || \"\";\n    if (/^\\d{4}-\\d{2}-\\d{2}$/.test(requestedArchiveDate)) {\n      selectedDateKey = requestedArchiveDate;\n      const requestedDate = dateFromKey(requestedArchiveDate);\n      viewDate = new Date(requestedDate.getFullYear(), requestedDate.getMonth(), 1);\n    }\n    let activeArchiveKey = \"\";\n    let activeArchive = null;\n    let clearMonthTimer = null;\n    const deleteArchiveButton = document.getElementById(\"deleteArchive\");\n    const clearArchiveMonthButton = document.getElementById(\"clearArchiveMonth\");\n    const archiveTimesheetInput = document.getElementById(\"archiveTimesheetInput\");\n\n    const defaultRoster = {\n      first: [\n        [\"Branford Alton\", \"Mon, Tues\"],\n        [\"Castruita Armando\", \"Wed, Thurs\"],\n        [\"Frazer Dacoyea\", \"Mon, Tues\"],\n        [\"Citizen Dante\", \"Thurs, Fri\"],\n        [\"Towler Demetrius\", \"Thurs, Fri\"],\n        [\"Stewart Dexter\", \"Sat, Sun\"],\n        [\"Gardner Dorrean\", \"Tues, Wed\"],\n        [\"Thomas Henry\", \"Sat, Sun\"],\n        [\"Brown James\", \"Thurs, Fri\"],\n        [\"Herrera Jose\", \"Sat, Sun\"],\n        [\"Player Keyston\", \"Mon, Sun\"],\n        [\"Hickman Makia\", \"Mon, Sun\"],\n        [\"Dever Mikey\", \"Tues, Wed\"],\n        [\"Wanza Myles\", \"Mon, Tues\"],\n        [\"Romero Nelson\", \"Tues, Wed\"],\n        [\"McDaniel Charles\", \"Fri, Sat\"],\n        [\"Nava Ramon\", \"Sat, Sun\"],\n        [\"Tran Tyler\", \"Thurs, Fri\"]\n      ],\n      second: [\n        [\"Carruthers Timothy\", \"Mon, Sun\"],\n        [\"Caceres Virula Victor\", \"Mon, Tues\"],\n        [\"Keme Aweri Jr.\", \"Mon, Tues\"],\n        [\"Hosey Kevin\", \"Mon, Tues\"],\n        [\"Brown Brandy\", \"Wed, Thurs\"],\n        [\"Mejia Aaron\", \"Thurs, Fri\"],\n        [\"Bookman Derrell\", \"Thurs, Fri\"],\n        [\"Hopkins Alexander\", \"Mon, Sun\"],\n        [\"Tingle Jason\", \"Sat, Sun\"],\n        [\"Contreras Marco\", \"Sat, Sun\"],\n        [\"Benavides Robert\", \"Wed, Sun\"],\n        [\"Urtado Ernest\", \"Tues, Wed\"],\n        [\"Johnson Messiah\", \"Tues, Thurs\"],\n        [\"Gilder Rufus II\", \"Tues, Wed\"],\n        [\"Echendu Chimenierm\", \"Wed, Thurs\"],\n        [\"Delgado Jose\", \"Fri, Sat\"]\n      ],\n      gate: [\n        [\"Candace Warren\", \"Sat, Sun\"],\n        [\"Connie Johnson\", \"Sat, Sun\"],\n        [\"Jarade Douglas\", \"Sat, Sun\"],\n        [\"Gregory Watson II\", \"Sat, Sun\"],\n        [\"Bryce Alexander\", \"Thurs, Fri\"],\n        [\"Naomisha Hunt\", \"Thurs, Fri, Sat\"],\n        [\"Ramacacondra Pratt\", \"Thurs, Fri\"],\n        [\"Kane Cabral\", \"Mon, Tues\"],\n        [\"Tavares Gariet\", \"Mon, Tues\"]\n      ]\n    };\n\n    const defaultArchiveManagerNames = [\n      \"Neal Profit\",\n      \"Jarvis Atkins\",\n      \"Mike Stewart\",\n      \"Dave Augustine\",\n      \"Keyston Player\",\n      \"Jose Delgado\",\n      \"Jacob Prado\",\n      \"Jason Tingle\",\n      \"Shannon Howard\"\n    ];\n\n    const shiftLabels = {\n      first: \"1st Shift\",\n      second: \"2nd Shift\",\n      gate: \"Gate\",\n      mechanics: \"Mechanics\",\n      managers: \"Managers\"\n    };\n\n    function escapeHtml(value) {\n      return String(value).replace(/[&<>\"']/g, (char) => ({\n        \"&\": \"&amp;\",\n        \"<\": \"&lt;\",\n        \">\": \"&gt;\",\n        '\"': \"&quot;\",\n        \"'\": \"&#39;\"\n      }[char]));\n    }\n\n    function isoDate(date) {\n      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, \"0\")}-${String(date.getDate()).padStart(2, \"0\")}`;\n    }\n\n    function dateFromKey(key) {\n      const [year, month, day] = String(key || \"\").split(\"-\").map(Number);\n      return new Date(year || today.getFullYear(), (month || 1) - 1, day || 1);\n    }\n\n    function monthDayLabel(key) {\n      const date = dateFromKey(key);\n      return `${date.getMonth() + 1}-${date.getDate()}`;\n    }\n\n    function normalizeName(name) {\n      const suffixes = new Set([\"jr\", \"sr\", \"ii\", \"iii\", \"iv\"]);\n      return String(name || \"\")\n        .trim()\n        .toLowerCase()\n        .replace(/[,.]/g, \" \")\n        .replace(/\\bcontrerras\\b/g, \"contreras\")\n        .replace(/\\s+/g, \" \")\n        .split(\" \")\n        .filter((part) => part && !suffixes.has(part))\n        .sort()\n        .join(\" \");\n    }\n\n    function parseOffDays(text) {\n      return new Set(String(text || \"\")\n        .split(\",\")\n        .map((item) => item.trim().toLowerCase())\n        .map((item) => dayAliases[item] || dayAliases[item.slice(0, 3)])\n        .filter(Boolean));\n    }\n\n    function rosterOffDaysLabel(days) {\n      return days\n        .map((day, index) => day === \"O\" ? rosterDayLabels[index] : \"\")\n        .filter(Boolean)\n        .join(\", \");\n    }\n\n    function migrateMcDanielToDays(state) {\n      if (!state || !Array.isArray(state.second)) return state;\n      if (!Array.isArray(state.first)) state.first = [];\n      const alreadyOnDays = state.first.some((employee) => normalizeName(employee.name || \"\") === \"charles mcdaniel\");\n      const secondIndex = state.second.findIndex((employee) => normalizeName(employee.name || \"\") === \"charles mcdaniel\");\n      if (secondIndex === -1) return state;\n      const [employee] = state.second.splice(secondIndex, 1);\n      if (!alreadyOnDays) state.first.push(employee);\n      localStorage.setItem(rosterStorageKey, JSON.stringify(state));\n      return state;\n    }\n\n    function readRosterAdditions() {\n      try {\n        const additions = JSON.parse(localStorage.getItem(rosterAdditionsKey) || \"[]\");\n        return Array.isArray(additions) ? additions : [];\n      } catch (error) {\n        localStorage.removeItem(rosterAdditionsKey);\n        return [];\n      }\n    }\n\n    function buildRoster() {\n      const roster = Object.fromEntries(Object.entries(defaultRoster).map(([key, rows]) => [\n        key,\n        rows.map(([name, offDays]) => ({ name, offDays }))\n      ]));\n\n      try {\n        const saved = localStorage.getItem(rosterStorageKey);\n        if (saved) {\n          const state = migrateMcDanielToDays(JSON.parse(saved));\n          [\"first\", \"second\", \"gate\", \"mechanics\", \"managers\"].forEach((key) => {\n            if (!Array.isArray(state[key])) return;\n            roster[key] = state[key]\n              .filter((employee) => employee && employee.name)\n              .map((employee) => ({\n                name: employee.name,\n                offDays: Array.isArray(employee.days) ? rosterOffDaysLabel(employee.days) : \"\"\n              }));\n          });\n        }\n      } catch (error) {\n        localStorage.removeItem(rosterStorageKey);\n      }\n\n      const seen = new Set(Object.values(roster).flat().map((employee) => normalizeName(employee.name)));\n      readRosterAdditions().forEach((addition) => {\n        if (!addition || !addition.name) return;\n        const key = addition.shift || \"first\";\n        const nameKey = normalizeName(addition.name);\n        if (!nameKey || seen.has(nameKey)) return;\n        if (!Array.isArray(roster[key])) roster[key] = [];\n        roster[key].push({\n          name: addition.name,\n          offDays: Array.isArray(addition.days) ? rosterOffDaysLabel(addition.days) : \"\"\n        });\n        seen.add(nameKey);\n      });\n\n      return roster;\n    }\n\n    function toMilitaryTime(value) {\n      const text = String(value || \"\").trim();\n      if (!text) return \"\";\n      const match = text.match(/^(\\d{1,2}):(\\d{2})\\s*([ap])m$/i);\n      if (!match) return text;\n      let hour = Number(match[1]);\n      const minute = match[2];\n      const period = match[3].toLowerCase();\n      if (period === \"p\" && hour !== 12) hour += 12;\n      if (period === \"a\" && hour === 12) hour = 0;\n      return `${String(hour).padStart(2, \"0\")}${minute}`;\n    }\n\n    function minutesFromMilitary(value) {\n      const text = String(value || \"\").trim();\n      const match = text.match(/^(\\d{1,2})(\\d{2})$/);\n      if (!match) return null;\n      const hours = Number(match[1]);\n      const minutes = Number(match[2]);\n      if (hours > 24 || minutes > 59 || (hours === 24 && minutes !== 0)) return null;\n      return (hours * 60) + minutes;\n    }\n\n    function militaryFromMinutes(value) {\n      const minutes = ((Math.round(value) % 1440) + 1440) % 1440;\n      const hours = Math.floor(minutes / 60);\n      const mins = minutes % 60;\n      return `${String(hours).padStart(2, \"0\")}${String(mins).padStart(2, \"0\")}`;\n    }\n\n    function currentMinutes() {\n      const now = new Date();\n      return (now.getHours() * 60) + now.getMinutes();\n    }\n\n    function currentMilitaryTime() {\n      return militaryFromMinutes(currentMinutes());\n    }\n\n    function dayKeyFromDateValue(value) {\n      const text = String(value || \"\").trim();\n      if (!text) return \"\";\n      const dayNameMatch = text.match(/^([a-z]{3,9})\\b/i);\n      const explicitDay = dayNameMatch ? dayAliases[dayNameMatch[1].toLowerCase()] : \"\";\n      if (explicitDay) return explicitDay;\n      const match = text.match(/^(\\d{1,2})\\/(\\d{1,2})\\/(\\d{2,4})/);\n      const date = match\n        ? new Date(Number(match[3].length === 2 ? `20${match[3]}` : match[3]), Number(match[1]) - 1, Number(match[2]))\n        : new Date(text);\n      if (Number.isNaN(date.getTime())) return \"\";\n      return [\"sun\", \"mon\", \"tue\", \"wed\", \"thu\", \"fri\", \"sat\"][date.getDay()];\n    }\n\n    function dayKeyFromArchiveDate(key) {\n      const date = dateFromKey(key);\n      return [\"sun\", \"mon\", \"tue\", \"wed\", \"thu\", \"fri\", \"sat\"][date.getDay()];\n    }\n\n    function readPunches() {\n      try {\n        const punches = JSON.parse(localStorage.getItem(dayforceStorageKey) || \"[]\");\n        return Array.isArray(punches) ? punches : [];\n      } catch (error) {\n        localStorage.removeItem(dayforceStorageKey);\n        return [];\n      }\n    }\n\n    function previousShiftHours() {\n      try {\n        const saved = JSON.parse(localStorage.getItem(previousTimesheetStorageKey) || \"null\");\n        return saved && typeof saved.hours === \"number\" ? Math.max(Number(saved.hours) || 0, 0) : 0;\n      } catch (error) {\n        localStorage.removeItem(previousTimesheetStorageKey);\n        return 0;\n      }\n    }\n\n    function readTimesheetSettings() {\n      try {\n        const saved = JSON.parse(localStorage.getItem(timesheetSettingsKey) || \"null\");\n        return {\n          lifts: saved && saved.lifts !== undefined ? Number(saved.lifts) || 0 : 339,\n          flips: saved && saved.flips !== undefined ? Number(saved.flips) || 0 : 5,\n          shiftEndMode: (saved && saved.shiftEndMode) || \"1500\",\n          shiftEndCustom: String((saved && s heetMdActualValue(value) {\n      const cleaned = String(value || \"\").replace(/[^0-9.-]/g, \"\");\n      const number = Number(cleaned);\n      return Number.isFinite(number) ? number : 0;\n    }\n\n    function parseTimesheetMdExportRows(rows, sourceName) {\n      if (!rowsLookLikeTimesheetMdExport(rows)) return null;\n      const dateKey = timesheetMdDateFromRows(rows, sourceName);\n      if (!dateKey) return null;\n      const records = [];\n      let currentShift = null;\n      rows.forEach((row) => {\n        if (!row.some(Boolean)) return;\n        if (rowIsTimesheetMdShiftHeader(row)) {\n          currentShift = timesheetMdShiftFromHeader(row[0]);\n          return;\n        }\n        if (!currentShift) return;\n        const name = String(row[0] || \"\").trim();\n        if (!name || /^off\\s*-/i.test(name) || /time input - daily sheet/i.test(name) || /^(employee|name)$/i.test(name)) return;\n        const start = normalizeTimesheetMdTime(row[3]);\n        const lunch = cleanTimesheetMdLunch(row[4]);\n        const end = normalizeTimesheetMdTime(row[5]);\n        const actual = timesheetMdActualValue(row[6]);\n        const note = cleanTimesheetMdNote(row[2]);\n        if (!start && !end && !actual && !note) return;\n        records.push({ shiftKey: currentShift.key, name, dateKey, offDays: String(row[1] || \"\").trim(), note, start, lunch, end, actual });\n      });\n      return records.length ? { dateKey, records } : null;\n    }\n\n    function archiveRowFromImportRecord(record, dateKey) {\n      const shiftKey = record.shiftKey || \"first\";\n      const scheduled = !parseOffDays(record.offDays).has(dayKeyFromArchiveDate(dateKey));\n      const note = String(record.note || \"\").trim();\n      const start = normalizeTimesheetMdTime(record.start);\n      const lunch = cleanTimesheetMdLunch(record.lunch);\n      const end = normalizeTimesheetMdTime(record.end);\n      const hasClockIn = minutesFromMilitary(start) !== null;\n      const hasClockOut = minutesFromMilitary(end) !== null;\n      const computedActual = actualHours(start, lunch, end) + paidNoteHoursForText(note);\n      const actual = Number(record.actual) || computedActual;\n      const hasClockTime = Boolean(start || end);\n      const cameInOffDay = !scheduled && hasClockTime;\n      const unpaidAbsence = /\\bunpaid\\b/i.test(note);\n      const paidAbsence = /\\bfloating holidays?\\b|\\bvacations?\\b/i.test(note);\n      const purpleAbsence = noteIsPurple(note, { paidAbsence, unpaidAbsence });\n      const invalid = Boolean((start && minutesFromMilitary(start) === null) || (end && minutesFromMilitary(end) === null));\n      const missing = shouldCheckMissingStart(shiftKey) && scheduled && !note && !hasClockIn;\n      let status = \"OPEN\";\n      if (invalid) status = \"INVALID\";\n      else if (unpaidAbsence) status = \"UNPAID\";\n      else if (paidAbsence) status = \"PAID\";\n      else if (missing) status = \"NO SHOW\";\n      else if (hasClockIn && !hasClockOut) status = \"IN\";\n      else if (hasClockIn && hasClockOut) status = \"OUT\";\n      else if (!scheduled) status = \"OFF\";\n      return { name: record.name, offDays: record.offDays || \"\", shiftKey, scheduled, note, start, lunch, end, actual, hasClockIn, hasClockOut, cameInOffDay, purpleAbsence, unpaidAbsence, paidAbsence, invalid, missing, status };\n    }\n\n    function snapshotFromTimesheetMdImport(parsed, sourceName) {\n      const shifts = { first: [], second: [], gate: [], mechanics: [], managers: [] };\n      parsed.records.forEach((record) => {\n        const key = shifts[record.shiftKey] ? record.shiftKey : \"first\";\n        shifts[key].push(archiveRowFromImportRecord({ ...record, shiftKey: key }, parsed.dateKey));\n      });\n      const settings = readTimesheetSettings();\n      const metrics = metricsFor(shifts, { ...settings, shiftEnd: shiftEndFromSettings(settings), previousHours: 0 });\n      return { dateKey: parsed.dateKey, savedAt: new Date().toISOString(), importedFrom: sourceName || \"Mass import\", metrics, shifts };\n    }\n\n\n\n    function rosterImportLookup() {\n      const lookup = new Map();\n      Object.entries(buildRoster()).forEach(([shiftKey, employees]) => {\n        (employees || []).forEach((employee) => {\n          const key = normalizeName(employee.name || \"\");\n          if (!key || lookup.has(key)) return;\n          lookup.set(key, { shiftKey, name: employee.name, offDays: employee.offDays || \"\" });\n        });\n      });\n      return lookup;\n    }\n\n    function cleanDayforceImportName(value) {\n      let text = String(value || \"\").replace(/\\s+\\d{4,}\\s*$/, \"\").trim();\n      if (!text) return \"\";\n      if (text.includes(\",\")) {\n        const parts = text.split(\",\");\n        const last = parts[0].trim();\n        const first = parts.slice(1).join(\" \").trim();\n        text = [first, last].filter(Boolean).join(\" \");\n      }\n      return text.replace(/\\s+/g, \" \").trim();\n    }\n\n    function dayforceHeaderIndex(row, label) {\n      const wanted = String(label || \"\").trim().toLowerCase();\n      return row.findIndex((cell) => String(cell || \"\").trim().toLowerCase() === wanted);\n    }\n\n    function dayforceImportActualHours(startValue, mealStartValue, mealEndValue, endValue) {\n      const start = minutesFromMilitary(toMilitaryTime(startValue));\n      let end = minutesFromMilitary(toMilitaryTime(endValue));\n      if (start === null || end === null) return 0;\n      if (end <= start) end += 1440;\n      let minutes = end - start;\n      let mealStart = minutesFromMilitary(toMilitaryTime(mealStartValue));\n      let mealEnd = minutesFromMilitary(toMilitaryTime(mealEndValue));\n      if (mealStart !== null && mealEnd !== null) {\n        if (mealStart < start && start >= 720) mealStart += 1440;\n        if (mealEnd <= mealStart) mealEnd += 1440;\n        const overlap = Math.max(0, Math.min(end, mealEnd) - Math.max(start, mealStart));\n        minutes -= overlap;\n      }\n      return Math.max(0, Math.round((minutes / 60) * 100) / 100);\n    }\n\n    function parseDayforceTimeEntryRows(rows, sourceName) {\n      const lookup = rosterImportLookup();\n      const recordsByDate = new Map();\n      for (let index = 0; index < rows.length - 1; index += 1) {\n        const header = rows[index] || [];\n        const startIndex = dayforceHeaderIndex(header, \"Start Shift\");\n        const mealStartIndex = dayforceHeaderIndex(header, \"Start Meal\");\n        const mealEndIndex = dayforceHeaderIndex(header, \"End Meal\");\n        const endIndex = dayforceHeaderIndex(header, \"End Shift\");\n        if (startIndex < 0 || endIndex < 0) continue;\n\n        const rawName = header.map((cell) => String(cell || \"\").trim()).find((cell) => /[A-Za-z]/.test(cell) && !/start|end|meal|shift/i.test(cell)) || \"\";\n        const cleanedName = cleanDayforceImportName(rawName);\n        if (!cleanedName) continue;\n        const rosterEntry = lookup.get(normalizeName(cleanedName));\n        const row = rows[index + 1] || [];\n        const dateKey = importDateKey(row[1] || firstFilledCell(row), sourceName);\n        if (!dateKey) continue;\n\n        const start = toMilitaryTime(row[startIndex]);\n        const end = toMilitaryTime(row[endIndex]);\n        if (!start && !end) continue;\n        const mealStart = mealStartIndex >= 0 ? toMilitaryTime(row[mealStartIndex]) : \"\";\n        const mealEnd = mealEndIndex >= 0 ? toMilitaryTime(row[mealEndIndex]) : \"\";\n        const startMinutes = minutesFromMilitary(start);\n        const shiftKey = rosterEntry ? rosterEntry.shiftKey : (startMinutes !== null && startMinutes >= 12 * 60 ? \"second\" : \"first\");\n        const actual = dayforceImportActualHours(start, mealStart, mealEnd, end);\n        const record = {\n          shiftKey,\n          name: rosterEntry ? rosterEntry.name : cleanedName,\n          dateKey,\n          offDays: rosterEntry ? rosterEntry.offDays : \"\",\n          note: \"\",\n          start,\n          lunch: mealStart && mealEnd ? \"YES\" : \"NO\",\n          end,\n          actual\n        };\n        if (!recordsByDate.has(dateKey)) recordsByDate.set(dateKey, []);\n        recordsByDate.get(dateKey).push(record);\n      }\n      return Array.from(recordsByDate.entries()).map(([dateKey, records]) => ({ dateKey, records }));\n    }\n\n    async function importArchiveTimesheetFiles(event) {\n      const files = Array.from(event.target.files || []);\n      event.target.value = \"\";\n      if (!files.length) return;\n      if (!window.XLSX) {\n        setArchiveMessage(\"XLSX parser unavailable\");\n        return;\n      }\n      const archive = readArchive();\n      let imported = 0;\n      const failed = [];\n      for (const file of files) {\n        try {\n          const workbook = readArchiveWorkbook(await file.arrayBuffer());\n          let snapshots = [];\n          for (const sheetName of workbook.SheetNames) {\n            const rows = archiveSheetRows(workbook, sheetName);\n            const parsed = parseTimesheetMdExportRows(rows, file.name);\n            if (parsed) {\n              snapshots = [snapshotFromTimesheetMdImport(parsed, file.name)];\n              break;\n            }\n            const dayforceParsed = parseDayforceTimeEntryRows(rows, file.name);\n            if (dayforceParsed.length) {\n              snapshots = dayforceParsed.map((item) => snapshotFromTimesheetMdImport(item, file.name));\n              break;\n            }\n          }\n          if (!snapshots.length) {\n            failed.push(file.name + \": no Timesheet MD or Dayforce time-entry rows\");\n            continue;\n          }\n          snapshots.forEach((snapshot) => {\n            archive[snapshot.dateKey] = snapshot;\n            imported += 1;\n            selectedDateKey = snapshot.dateKey;\n          });\n        } catch (error) {\n          failed.push(file.name + \": \" + error.message);\n        }\n      }\n      if (imported) {\n        writeArchive(archive);\n        const selected = dateFromKey(selectedDateKey);\n        viewDate = new Date(selected.getFullYear(), selected.getMonth(), 1);\n        renderCalendar();\n      }\n      const failedText = failed.length ? \" Failed: \" + failed.join(\"; \") : \"\";\n      setArchiveMessage(\"Imported \" + imported + \" archived timesheet\" + (imported === 1 ? \"\" : \"s\") + \".\" + failedText);\n    }\n\n    function rowClass(row) {\n      const classes = [\"md-row\"];\n      if (row.status === \"IN\") classes.push(\"in-row\");\n      if (row.status === \"OUT\") classes.push(\"out-row\");\n      if (row.cameInOffDay) classes.push(\"offday-row\");\n      if (row.missing) classes.push(\"missing-row\");\n      if (row.invalid) classes.push(\"invalid-row\");\n      if (row.purpleAbsence || row.paidAbsence) classes.push(\"absence-row\");\n      if (row.unpaidAbsence) classes.push(\"unpaid-row\");\n      return classes.join(\" \");\n    }\n\n    function shiftHeaderLabel(shiftKey) {\n      if (shiftKey === \"first\") return \"1st SHIFT\";\n      if (shiftKey === \"second\") return \"2ND SHIFT\";\n      return String(shiftLabels[shiftKey] || shiftKey).toUpperCase();\n    }\n\n    function sectionStats(rows, shiftKey) {\n      const rowsWithIndex = rows.map((row, index) => ({ ...row, archiveIndex: index }));\n      const scheduled = rows.filter((row) => row.scheduled).length;\n      const here = rows.filter((row) => row.hasClockIn && !row.hasClockOut).length;\n      const out = rows.filter((row) => row.scheduled && !row.unpaidAbsence && !(row.hasClockIn && !row.hasClockOut)).length;\n      const actual = rows.reduce((sum, row) => sum + (Number(row.actual) || 0), 0);\n      const visibleRows = rowsWithIndex.filter((row) => !(row.status === \"OFF\" && !row.note));\n      const offRows = rowsWithIndex.filter((row) => row.status === \"OFF\" && !row.note);\n      return { scheduled, here, out, actual, visibleRows, offRows, shiftKey };\n    }\n\n    function renderKpis(snapshot) {\n      const details = metricsFor(snapshot.shifts, snapshot.metrics || {});\n      const remainText = details.goalMet ? \"MET GOAL!\" : String(Math.max(details.remainValue, 0));\n      document.getElementById(\"previewKpis\").innerHTML = [\n        [\"Lifts\", details.lifts, \"\"],\n        [\"Flips\", details.flips, \"\"],\n        [\"Shift End\", details.shiftEnd, \"\"],\n        [\"Lifts Needed\", details.neededValue, \"\"],\n        [\"Current LPMH\", details.currentRate.toFixed(1), details.currentRate >= lpmhGoal ? \"good\" : \"bad\"],\n        [\"LPH Needed\", details.neededLph, details.goalMet ? \"good\" : \"warn\"],\n        [\"Lifts Remain\", remainText, details.goalMet ? \"good\" : \"warn\"]\n      ].map(([label, value, className]) => `\n        <div class=\"kpi ${className}\">\n          <div class=\"kpi-label\">${escapeHtml(label)}</div>\n          <div class=\"kpi-value\">${escapeHtml(value)}</div>\n        </div>\n      `).join(\"\");\n    }\n\n    function renderEmployeeRow(row, shiftKey, rowIndex) {\n      const lunchOptions = [\"\", \"NO\", \"YES\", \"??\"].map((value) => (\n        `<option value=\"${escapeHtml(value)}\" ${String(row.lunch || \"\") === value ? \"selected\" : \"\"}>${escapeHtml(value || \"-\")}</option>`\n      )).join(\"\");\n      return `\n        <div class=\"${rowClass(row)}\" data-shift=\"${escapeHtml(shiftKey)}\" data-row=\"${rowIndex}\">\n          <span class=\"name ${row.missing ? \"missing\" : \"\"}\">${escapeHtml(row.name)}</span>\n          <span class=\"off\">${escapeHtml(row.offDays)}</span>\n          <input class=\"note-edit\" value=\"${escapeHtml(row.note || \"\")}\" aria-label=\"${escapeHtml(row.name)} note\" />\n          <input class=\"time-edit ${row.missing ? \"missing\" : \"\"}\" value=\"${escapeHtml(row.missing ? \"Missing?\" : row.start || \"\")}\" aria-label=\"${escapeHtml(row.name)} start\" />\n          <select class=\"lunch-edit\" aria-label=\"${escapeHtml(row.name)} lunch\">${lunchOptions}</select>\n          <input class=\"time-edit\" value=\"${escapeHtml(row.end || \"\")}\" aria-label=\"${escapeHtml(row.name)} end\" />\n          <span class=\"actual\">${Number(row.actual) ? Number(row.actual).toFixed(1) : \"\"}</span>\n        </div>\n      `;\n    }\n\n    function renderShiftCard(shiftKey, rows) {\n      const stats = sectionStats(rows, shiftKey);\n      const offList = stats.offRows.length\n        ? stats.offRows.map((row) => `<span class=\"off-chip\">${escapeHtml(row.name)}</span>`).join(\"\")\n        : `<span class=\"off-chip\">None</span>`;\n      const body = stats.visibleRows.length\n        ? stats.visibleRows.map((row) => renderEmployeeRow(row, shiftKey, row.archiveIndex)).join(\"\")\n        : `<div class=\"off-footer\"><strong>No rows</strong></div>`;\n\n      return `\n        <section class=\"shift-card\">\n          <header class=\"shift-head\">\n            <span class=\"shift-name\">${escapeHtml(`${shiftHeaderLabel(shiftKey)} [${stats.scheduled} sch]`)}</span>\n            <span>Off Days</span>\n            <span>NOTE</span>\n            <span>${escapeHtml(`${stats.here} HERE, ${stats.out} OUT`)}</span>\n            <span>Lunch</span>\n            <span>End</span>\n            <span>${escapeHtml(`Actual ${stats.actual.toFixed(1)}`)}</span>\n          </header>\n          ${body}\n          <div class=\"off-footer\"><strong>${escapeHtml(`OFF - ${stats.offRows.length}`)}</strong>${offList}</div>\n        </section>\n      `;\n    }\n\n    function renderPreview(snapshot) {\n      document.getElementById(\"previewTitle\").textContent = `${monthDayLabel(snapshot.dateKey)} Timesheet`;\n      renderManagerAssignments(snapshot);\n      renderKpis(snapshot);\n      document.getElementById(\"previewCards\").innerHTML = [\"first\", \"second\", \"gate\", \"mechanics\", \"managers\"]\n        .filter((key) => Array.isArray(snapshot.shifts[key]) && snapshot.shifts[key].length)\n        .map((key) => renderShiftCard(key, snapshot.shifts[key]))\n        .join(\"\");\n    }\n\n    function resetDeleteArchiveButton() {\n      deleteArchiveButton.textContent = \"Delete\";\n      deleteArchiveButton.classList.remove(\"confirm-delete\");\n      deleteArchiveButton.dataset.confirming = \"0\";\n    }\n\n    function openArchive(dateKey) {\n      const archive = readArchive();\n      if (!archive[dateKey]) return;\n      activeArchiveKey = dateKey;\n      activeArchive = JSON.parse(JSON.stringify(archive[dateKey]));\n      resetDeleteArchiveButton();\n      renderPreview(activeArchive);\n      document.getElementById(\"previewModal\").classList.add(\"open\");\n      document.getElementById(\"previewModal\").setAttribute(\"aria-hidden\", \"false\");\n    }\n\n    function closePreview() {\n      document.getElementById(\"previewModal\").classList.remove(\"open\");\n      document.getElementById(\"previewModal\").setAttribute(\"aria-hidden\", \"true\");\n      resetDeleteArchiveButton();\n      activeArchiveKey = \"\";\n      activeArchive = null;\n    }\n\n    function deleteActiveArchive() {\n      if (!activeArchiveKey) return;\n      if (deleteArchiveButton.dataset.confirming !== \"1\") {\n        deleteArchiveButton.textContent = \"Confirm\";\n        deleteArchiveButton.classList.add(\"confirm-delete\");\n        deleteArchiveButton.dataset.confirming = \"1\";\n        return;\n      }\n\n      const deletedKey = activeArchiveKey;\n      const archive = readArchive();\n      delete archive[deletedKey];\n      writeArchive(archive);\n      closePreview();\n      setArchiveMessage(\"Deleted \" + monthDayLabel(deletedKey));\n      renderCalendar();\n    }\n\n    function statusFromEdited(row, start, end, note, shiftKey) {\n      const hasClockIn = minutesFromMilitary(start) !== null;\n      const hasClockOut = minutesFromMilitary(end) !== null;\n      const invalid = Boolean((start && start !== \"Missing?\" && minutesFromMilitary(start) === null) || (end && minutesFromMilitary(end) === null));\n      const purpleAbsence = noteIsPurple(note, row);\n      const missing = shouldCheckMissingStart(shiftKey) && row.scheduled && !note && !hasClockIn;\n      if (invalid) return \"INVALID\";\n      if (row.unpaidAbsence || /\\bunpaid\\b/i.test(note)) return \"UNPAID\";\n      if (row.paidAbsence || purpleAbsence) return \"PAID\";\n      if (missing) return \"NO SHOW\";\n      if (hasClockIn && !hasClockOut) return \"IN\";\n      if (hasClockIn && hasClockOut) return \"OUT\";\n      if (!row.scheduled) return \"OFF\";\n      return \"OPEN\";\n    }\n\n    function updateArchiveFromPreview() {\n      if (!activeArchive || !activeArchiveKey) return;\n      document.querySelectorAll(\"#previewCards .md-row\").forEach((element) => {\n        const shiftKey = element.dataset.shift;\n        const rowIndex = Number(element.dataset.row);\n        const row = activeArchive.shifts[shiftKey] && activeArchive.shifts[shiftKey][rowIndex];\n        if (!row) return;\n        const inputs = element.querySelectorAll(\".time-edit\");\n        const note = element.querySelector(\".note-edit\").value.trim();\n        const start = inputs[0].value.trim() === \"Missing?\" ? \"\" : inputs[0].value.trim();\n        const lunch = element.querySelector(\".lunch-edit\").value.trim();\n        const end = inputs[1].value.trim();\n        row.note = note;\n        row.start = start;\n        row.lunch = lunch;\n        row.end = end;\n        row.hasClockIn = minutesFromMilitary(start) !== null;\n        row.hasClockOut = minutesFromMilitary(end) !== null;\n        row.actual = actualHours(start, lunch, end) + paidNoteHoursForText(note);\n        row.cameInOffDay = !row.scheduled && Boolean(start || end);\n        row.unpaidAbsence = /\\bunpaid\\b/i.test(note);\n        row.paidAbsence = !row.unpaidAbsence && /\\bfloating holidays?\\b|\\bvacations?\\b|\\bsick\\b/i.test(note);\n        row.purpleAbsence = noteIsPurple(note, row);\n        row.invalid = Boolean((start && minutesFromMilitary(start) === null) || (end && minutesFromMilitary(end) === null));\n        row.missing = shouldCheckMissingStart(shiftKey) && row.scheduled && !note && !row.hasClockIn;\n        row.status = statusFromEdited(row, start, end, note, shiftKey);\n      });\n\n      activeArchive.managerAssignments = {\n        first: document.getElementById(\"archiveFirstManager\").value,\n        second: document.getElementById(\"archiveSecondManager\").value\n      };\n      activeArchive.savedAt = new Date().toISOString();\n      activeArchive.metrics = metricsFor(activeArchive.shifts, activeArchive.metrics || {});\n      const archive = readArchive();\n      archive[activeArchiveKey] = activeArchive;\n      writeArchive(archive);\n      renderPreview(activeArchive);\n      renderCalendar();\n    }\n\n    document.getElementById(\"prevMonth\").addEventListener(\"click\", () => {\n      viewDate = new Date(viewDate.getFullYear(), viewDate.getMonth() - 1, 1);\n      renderCalendar();\n    });\n\n    document.getElementById(\"nextMonth\").addEventListener(\"click\", () => {\n      viewDate = new Date(viewDate.getFullYear(), viewDate.getMonth() + 1, 1);\n      renderCalendar();\n    });\n\n    document.getElementById(\"todayButton\").addEventListener(\"click\", () => {\n      selectedDateKey = isoDate(today);\n      viewDate = new Date(today.getFullYear(), today.getMonth(), 1);\n      renderCalendar();\n    });\n\n    document.getElementById(\"archiveDate\").addEventListener(\"change\", (event) => {\n      selectedDateKey = event.target.value || selectedDateKey;\n      const selected = dateFromKey(selectedDateKey);\n      viewDate = new Date(selected.getFullYear(), selected.getMonth(), 1);\n      renderCalendar();\n    });\n\n    document.getElementById(\"saveTimesheet\").addEventListener(\"click\", saveCurrentTimesheet);\n    document.getElementById(\"importArchiveTimesheets\").addEventListener(\"click\", () => archiveTimesheetInput.click());\n    archiveTimesheetInput.addEventListener(\"change\", importArchiveTimesheetFiles);\n    clearArchiveMonthButton.addEventListener(\"click\", clearCurrentArchiveMonth);\n    document.getElementById(\"closePreview\").addEventListener(\"click\", closePreview);\n    document.getElementById(\"updateArchive\").addEventListener(\"click\", updateArchiveFromPreview);\n    deleteArchiveButton.addEventListener(\"click\", deleteActiveArchive);\n    document.getElementById(\"previewModal\").addEventListener(\"click\", (event) => {\n      if (event.target.id === \"previewModal\") closePreview();\n    });\n\n    document.getElementById(\"calendarGrid\").addEventListener(\"click\", (event) => {\n      const pill = event.target.closest(\"[data-open]\");\n      if (pill) {\n        event.stopPropagation();\n        openArchive(pill.dataset.open);\n        return;\n      }\n      const cell = event.target.closest(\"[data-date]\");\n      if (!cell) return;\n      selectedDateKey = cell.dataset.date;\n      document.getElementById(\"archiveDate\").value = selectedDateKey;\n      renderCalendar();\n    });\n\n    document.addEventListener(\"keydown\", (event) => {\n      if (event.key === \"Escape\") closePreview();\n    });\n\n    document.getElementById(\"archiveDate\").value = selectedDateKey;\n    renderCalendar();\n  <\/script>\n</body>\n</html>\n"
      },
      "timeOff": {
        "label": "Time Off",
        "html": "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n  <meta charset=\"UTF-8\" />\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" />\n  <title>Time Off</title>\n  <style>\n    :root {\n      --ink: #111827;\n      --muted: #6b7280;\n      --line: #d8dee8;\n      --soft: #f8fafc;\n      --purple: #312e81;\n      --green: #16a34a;\n      --red: #dc2626;\n      --gold: #d97706;\n      --violet: #7c3aed;\n    }\n\n    * {\n      box-sizing: border-box;\n    }\n\n    body {\n      margin: 0;\n      background: #fff;\n      color: var(--ink);\n      font-family: \"Helvetica Neue\", Helvetica, Arial, sans-serif;\n      font-size: 13px;\n      overflow-x: hidden;\n    }\n\n    .page-switcher {\n      width: 100%;\n      display: flex;\n      flex-wrap: wrap;\n      gap: 4px;\n      align-items: center;\n      padding: 6px 8px;\n      background: #111;\n      border-bottom: 2px solid #000;\n    }\n\n    .page-switcher a {\n      min-width: 118px;\n      height: 28px;\n      display: inline-flex;\n      align-items: center;\n      justify-content: center;\n      border: 1px solid #777;\n      background: #e7e6e6;\n      color: #000;\n      text-decoration: none;\n      font-size: 13px;\n      font-weight: 800;\n    }\n\n    .page-switcher a.active {\n      background: #ffff00;\n      border-color: #ffff00;\n    }\n\n    .calendar-shell {\n      width: min(1320px, calc(100% - 34px));\n      min-height: 0;\n      margin: 10px auto 8px;\n      padding: 28px 30px 12px;\n      border: 1px solid #e5e7eb;\n      border-radius: 16px;\n      background: #fff;\n      box-shadow: 0 3px 16px rgba(15, 23, 42, .11);\n      overflow: visible;\n    }\n\n    .calendar-toolbar {\n      min-height: 54px;\n      display: grid;\n      grid-template-columns: minmax(360px, 1fr) auto;\n      gap: 18px;\n      align-items: center;\n      padding: 0 0 18px;\n      border-bottom: 1px solid #eef0f4;\n      background: transparent;\n    }\n\n    .title-block {\n      display: flex;\n      align-items: center;\n      flex-wrap: wrap;\n      gap: 10px;\n    }\n\n    h1 {\n      margin: 0;\n      color: #0f172a;\n      font-family: Georgia, \"Times New Roman\", serif;\n      font-size: 49px;\n      font-weight: 500;\n      line-height: 1;\n      letter-spacing: 0;\n    }\n\n    .title-year {\n      color: #0f172a;\n    }\n\n    .month-title {\n      display: none;\n    }\n\n    .import-button {\n      display: inline-flex;\n      align-items: center;\n      justify-content: center;\n      min-height: 28px;\n      padding: 0 11px;\n      border: 1px solid #d5deea;\n      border-radius: 999px;\n      background: #f8fafc;\n      color: #475569;\n      font-size: 12px;\n      font-weight: 700;\n      line-height: 1;\n      cursor: pointer;\n      white-space: nowrap;\n    }\n\n    .import-button:hover {\n      background: #eef3f8;\n      border-color: #c7d2df;\n      color: #111827;\n    }\n\n    .import-button input {\n      display: none;\n    }\n\n    .import-status {\n      display: none;\n    }\n\n    .view-toggle {\n      flex: 0 0 auto;\n      display: inline-grid;\n      grid-template-columns: repeat(4, minmax(62px, auto));\n      overflow: hidden;\n      border: 1px solid #d5deea;\n      border-radius: 8px;\n      background: #f8fafc;\n    }\n\n    .view-toggle button {\n      min-height: 30px;\n      padding: 0 9px;\n      border: 0;\n      border-right: 1px solid #d5deea;\n      background: transparent;\n      color: #64748b;\n      font-size: 10px;\n      font-weight: 900;\n      cursor: pointer;\n      white-space: nowrap;\n    }\n\n    .view-toggle button:last-child { border-right: 0; }\n    .view-toggle button.active {\n      background: #0f172a;\n      color: #fff;\n    }\n\n    .status-key {\n      grid-column: 1 / -1;\n      display: flex;\n      align-items: center;\n      justify-content: center;\n      flex-wrap: wrap;\n      gap: 8px 10px;\n      width: 100%;\n      min-width: 0;\n      padding-top: 2px;\n      overflow-x: visible;\n      color: #475569;\n      font-size: 11px;\n      font-weight: 800;\n      text-align: center;\n      white-space: normal;\n      scrollbar-width: none;\n    }\n\n    .status-key::-webkit-scrollbar { display: none; }\n\n    .status-key span {\n      display: inline-flex;\n      align-items: center;\n      gap: 4px;\n    }\n\n    .status-key i {\n      width: 9px;\n      height: 9px;\n      display: inline-block;\n      border-radius: 2px;\n    }\n\n    .status-key .sick-color { background: #dc2626; }\n    .status-key .vacation-color { background: #7c3aed; }\n    .status-key .unknown-color { background: #64748b; }\n    .status-key .came-in-color { background: #16a34a; }\n\n    .status-key b { font-weight: 900; }\n    .status-key .crane-key { color: #f4c95d; }\n    .status-key .bn-key { color: #fb923c; }\n    .status-key .sick-key { color: #f87171; }\n    .status-key .vacation-key { color: #c4a7ff; }\n    .status-key .unknown-key { color: #cbd5e1; }\n    .status-key .out-key { color: #cbd5e1; }\n    .status-key .ncns-key { color: #f87171; }\n    .status-key .here-key { color: #4ade80; }\n    .status-key .flip-line-key { color: #22c55e; }\n    .status-key .came-in-key { color: #4ade80; }\n\n    .view-pane[hidden] { display: none !important; }\n    .calendar-shell.list-mode { width: min(1700px, calc(100% - 20px)); }\n    .calendar-shell.three-day-list-mode { width: min(1180px, calc(100% - 20px)); }\n\n    .month-controls {\n      display: flex;\n      align-items: center;\n      justify-content: flex-end;\n      flex-wrap: wrap;\n      gap: 8px;\n    }\n\n    .legend {\n      display: inline-flex;\n      align-items: center;\n      flex-wrap: wrap;\n      justify-content: flex-end;\n      gap: 7px 15px;\n      margin-right: 12px;\n      color: #667085;\n      font-size: 18px;\n      font-weight: 500;\n    }\n\n    .legend-item {\n      display: inline-flex;\n      align-items: center;\n      gap: 7px;\n      white-space: nowrap;\n    }\n\n    .le k {\n      border-color: #ded8bf;\n      background: #fbf8ee;\n    }\n\n    .day-cell.current-week:hover {\n      background: #f8f3df;\n    }\n\n    .day-cell.selected {\n      border-color: #009b95;\n      background: #e5fbf8;\n      box-shadow: inset 0 0 0 1px #009b95;\n    }\n\n    .day-cell.muted,\n    .day-cell.weekend:not(.selected):not(.current-week) {\n      background: #eef1f6;\n    }\n\n    .day-cell.muted {\n      color: #bbc2cf;\n    }\n\n    .day-cell.past-day .timeoff-name {\n      opacity: .35;\n    }\n\n    .day-number {\n      color: inherit;\n      font-size: 13px;\n      font-weight: 750;\n      line-height: 1;\n      margin-bottom: 3px;\n      text-align: left;\n    }\n\n    .timeoff-pill {\n      width: 100%;\n      min-height: 28px;\n      display: grid;\n      grid-template-columns: minmax(0, 1fr) auto;\n      align-items: start;\n      column-gap: 6px;\n      row-gap: 2px;\n      padding: 4px 7px;\n      border: 0;\n      border-left: 3px solid currentColor;\n      border-radius: 6px;\n      background: #f1ebff;\n      color: #6d28d9;\n      font-family: \"Segoe UI\", Arial, Helvetica, sans-serif;\n      font-stretch: normal;\n      font-size: 13px;\n      font-weight: 600;\n      letter-spacing: 0;\n      line-height: 1.18;\n      text-align: left;\n      white-space: normal;\n    }\n\n    .timeoff-name {\n      min-width: 0;\n      overflow: visible;\n      text-overflow: clip;\n      white-space: normal;\n      overflow-wrap: anywhere;\n      word-break: normal;\n      line-height: 1.18;\n    }\n\n    .timeoff-location {\n      grid-column: 1 / -1;\n      min-width: 0;\n      color: currentColor;\n      font-size: 10px;\n      font-weight: 500;\n      line-height: 1.05;\n      opacity: .82;\n      overflow-wrap: anywhere;\n    }\n\n    .timeoff-shift {\n      grid-column: 1 / -1;\n      min-width: 0;\n      color: currentColor;\n      font-size: 10px;\n      font-weight: 800;\n      line-height: 1.05;\n      opacity: .9;\n      text-transf n    .staff-shift h3,\n    .staff-support-group h3 {\n      display: flex;\n      align-items: center;\n      justify-content: space-between;\n      gap: 2px;\n      margin: 0 0 1px;\n      color: #334155;\n      font-size: 13px;\n      font-weight: 900;\n      text-transform: uppercase;\n    }\n\n    .staff-shift h3 {\n      margin: -2px -2px 1px;\n      padding: 2px 3px;\n      background: #000;\n      color: #fff;\n      cursor: pointer;\n      transition: background 120ms ease;\n    }\n\n    .staff-shift h3:hover,\n    .staff-shift h3:focus-visible { background: #334155; outline: 2px solid #facc15; outline-offset: -2px; }\n\n    .staff-shift h3 b,\n    .staff-support-group h3 b { color: #0f172a; }\n\n    .staff-shift h3 b { color: #fff; }\n\n    .staff-pill-list {\n      display: grid;\n      gap: 0;\n    }\n\n    .staff-pill {\n      width: 100%;\n      min-width: 0;\n      min-height: 15px;\n      display: grid;\n      grid-template-columns: minmax(0, 1fr) auto;\n      align-items: center;\n      gap: 2px;\n      padding: 1px 2px;\n      border: 1px solid #bde4c9;\n      border-radius: 3px;\n      background: #e8f7ec;\n      color: #166534;\n      font-size: 13px;\n      font-weight: 750;\n      font-family: inherit;\n      line-height: 1.1;\n      text-align: left;\n      cursor: pointer;\n    }\n\n    .staff-pill > span {\n      min-width: 0;\n      overflow-wrap: anywhere;\n    }\n\n    .staff-pill small {\n      font-size: 11px;\n      font-weight: 900;\n      line-height: 1;\n      text-transform: uppercase;\n      white-space: nowrap;\n    }\n\n    .staff-pill .crane-flag {\n      color: #b7791f;\n      font-weight: 900;\n    }\n\n    .staff-pill.plain {\n      min-height: 14px;\n      padding: 1px 2px;\n      border-color: transparent;\n      background: transparent;\n      color: #0f172a;\n    }\n\n    .staff-pill.crane {\n      border-color: #e5b94f;\n      background: #fff0bd;\n      color: #7a4b00;\n    }\n\n    .staff-pill.manager {\n      border-c
