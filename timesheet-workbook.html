StorageKey);\n        return {};\n      }\n    }\n\n    function writeTimeOff(calendar) {\n      localStorage.setItem(timeOffStorageKey, JSON.stringify(calendar));\n    }\n\n    function readEmployeeBank() {\n      try {\n        const saved = JSON.parse(localStorage.getItem(employeeBankStorageKey) || \"{}\");\n        return saved && typeof saved === \"object\" && !Array.isArray(saved) ? saved : {};\n      } catch (error) {\n        localStorage.removeItem(employeeBankStorageKey);\n        return {};\n      }\n    }\n\n    function writeEmployeeBank(bank) {\n      localStorage.setItem(employeeBankStorageKey, JSON.stringify(bank));\n    }\n\n    function readEmployeeDayStatuses() {\n      try {\n        const saved = JSON.parse(localStorage.getItem(employeeDayStatusStorageKey) || \"{}\");\n        return saved && typeof saved === \"object\" && !Array.isArray(saved) ? saved : {};\n      } catch (error) {\n        localStorage.removeItem(employeeDayStatusStorageKey);\n        return {};\n      }\n    }\n\n    function writeEmployeeDayStatuses(statuses) {\n      localStorage.setItem(employeeDayStatusStorageKey, JSON.stringify(statuses));\n    }\n\n    function readEmployeeDayAdditions() {\n      try {\n        const saved = JSON.parse(localStorage.getItem(employeeDayAdditionsStorageKey) || \"{}\");\n        return saved && typeof saved === \"object\" && !Array.isArray(saved) ? saved : {};\n      } catch (error) {\n        localStorage.removeItem(employeeDayAdditionsStorageKey);\n        return {};\n      }\n    }\n\n    function writeEmployeeDayAdditions(additions) {\n      localStorage.setItem(employeeDayAdditionsStorageKey, JSON.stringify(additions));\n    }\n\n    function reasonCodeFromInput(value) {\n      const text = String(value || \"\").trim();\n      if (!text) return \"\";\n      const upper = text.toUpperCase();\n      if (absenceReasons[upper]) return upper;\n      return Object.keys(absenceReasons).find((code) => absenceReasons[code].toLowerCase() === text.toLowerCase()) || upper.slice(0, 12);\n    }\n\n    function reasonLabel(code) { return absenceReasons[code] || code; }\n\n    function cleanLocation(value) {\n      const text = String(value || \"\").replace(/\\s+/g, \" \").trim();\n      if (!text || /^(location|loc|all)$/i.test(text)) return \"\";\n      return text.replace(/^location\\s*:?\\s*/i, \"\").trim();\n    }\n\n    function locationFromSheetName(sheetName) {\n      const text = cleanLocation(sheetName);\n      return /^(sheet\\d*|time away|calendar|summary|data)$/i.test(text) ? \"\" : text;\n    }\n\n    function entryLocation(entry) {\n      return cleanLocation(entry.location) || locationFromSheetName(entry.sheet);\n    }\n\n    function displayEntryLocation(entry, lookup = rosterShiftLookup()) {\n      const location = entryLocation(entry);\n      const shift = shiftForEmployee(entry.name, lookup);\n      return location && shift && normalizeName(location) === normalizeName(shift) ? \"\" : location;\n    }\n\n    function locationLineHtml(entry, lookup) {\n      const location = displayEntryLocation(entry, lookup);\n      return location ? '<span class=\"timeoff-location\">' + escapeHtml(location) + '</span>' : \"\";\n    }\n\n    function nameTokenKey(name) {\n      const suffixes = new Set([\"jr\", \"sr\", \"ii\", \"iii\", \"iv\"]);\n      return normalizeName(name)\n        .split(\" \")\n        .filter((part) => part && !suffixes.has(part))\n        .sort()\n        .join(\" \");\n    }\n\n    function addShiftLookupName(lookup, name, shift) {\n      const directKey = normalizeName(name);\n      const tokenKey = nameTokenKey(name);\n      if (directKey) lookup.set(directKey, shift);\n      if (tokenKey) lookup.set(tokenKey, shift);\n    }\n\n    function rosterStateHasSavedRows(state) {\n      return rosterShiftKeys.some((key) => Array.isArray(state?.[key]) && state[key].length);\n    }\n\n    function readRosterAdditions() {\n      try {\n        const additions = JSON.parse(localStorage.getItem(rosterAdditionsKey) || \"[]\");\n        return Array.isArray(additions) ? additions : [];\n      } catch (error) {\n        localStorage.removeItem(rosterAdditionsKey);\n        return [];\n      }\n    }\n\n    function normalizeRosterDays(days) {\n      const source = Array.isArray(days) ? days : String(days || \"\").split(\"\");\n      return Array.from({ length: 7 }, (_, index) => String(source[index] || \"W\").toUpperCase() === \"O\" ? \"O\" : \"W\");\n    }\n\n    function fallbackRosterEmployees() {\n      const employees = [];\n      Object.entries(defaultRosterSchedule).forEach(([shift, rows]) => {\n        rows.forEach(([name, role, days]) => {\n          employees.push({ name, shift, role: role || \"\", days: normalizeRosterDays(days) });\n        });\n      });\n      return employees;\n    }\n\n    function rosterEmployeeKey(employee) {\n      return nameTokenKey(employee?.name) || normalizeName(employee?.name);\n    }\n\n    function currentRosterEmployees() {\n      const fallback = fallbackRosterEmployees();\n      const fallbackByName = new Map(fallback.map((employee) => [rosterEmployeeKey(employee), employee]));\n      let employees = fallback;\n\n      try {\n        const saved = JSON.parse(localStorage.getItem(rosterStorageKey) || \"null\");\n        if (saved && typeof saved === \"object\" && rosterStateHasSavedRows(saved)) {\n          employees = [];\n          rosterShiftKeys.forEach((shift) => {\n            if (!Array.isArray(saved[shift])) return;\n            saved[shift].forEach((employee) => {\n              if (!employee?.name) return;\n              const fallbackEmployee = fallbackByName.get(rosterEmployeeKey(employee));\n              employees.push({\n                name: employee.name,\n                shift,\n                role: employee.role || fallbackEmployee?.role || \"\",\n                days: normalizeRosterDays(Array.isArray(employee.days) ? employee.days : fallbackEmployee?.days)\n              });\n            });\n          });\n        }\n      } catch (error) {\n        localStorage.removeItem(rosterStorageKey);\n      }\n\n      readRosterAdditions().forEach((employee) => {\n        if (!employee?.name) return;\n        const key = rosterEmployeeKey(employee);\n        const existingIndex = employees.findIndex((candidate) => rosterEmployeeKey(candidate) === key);\n        const existing = existingIndex >= 0 ? employees[existingIndex] : null;\n        const nextEmployee = {\n          name: employee.name,\n          shift: employee.shift || existing?.shift || \"first\",\n          role: employee.role || existing?.role || \"\",\n          days: normalizeRosterDays(Array.isArray(employee.days) ? employee.days : existing?.days)\n        };\n        if (existingIndex >= 0) employees[existingIndex] = nextEmployee;\n        else employees.push(nextEmployee);\n      });\n\n      const seen = new Set();\n      return employees.filter((employee) => {\n        const key = rosterEmployeeKey(employee);\n        if (!key || seen.has(key)) return false;\n        seen.add(key);\n        return true;\n      });\n    }\n\n    function rosterShiftLookup(employees = currentRosterEmployees()) {\n      const lookup = new Map();\n      employees.forEach((employee) => addShiftLookupName(lookup, employee.name, employee.shift));\n      return lookup;\n    }\n\n    function shiftForEmployee(name, lookup = rosterShiftLookup()) {\n      const shift = lookup.get(normalizeName(name)) || lookup.get(nameTokenKey(name));\n      return shiftLabels[shift] || \"\";\n    }\n\n    function shiftLineHtml(entry, lookup) {\n      const shift = shiftForEmployee(entry.name, lookup);\n      return shift ? '<span class=\"timeoff-shift\">' + escapeHtml(shift) + '</span>' : \"\";\n    }\n\n    function compareTimeOffRequests(a, b) {\n      const priorityA = displayPriority[a.code] ?? 99;\n      const priorityB = displayPriority[b.code] ?? 99;\n      return priorityA - priorityB || a.name.localeCompare(b.name) || String(a.code || \"\").localeCompare(String(b.code || \"\"));\n    }\n\n    function uniqueEmployeeNames(calendar = readTimeOff()) {\n      const names = new Set(defaultEmployees);\n      currentRosterEmployees().forEach((employee) => names.add(employee.name));\n      Object.values(calendar).forEach((entries) => {\n        entries.forEach((entry) => { if (entry.name) names.add(entry.name); });\n      });\n      return Array.from(names).sort((a, b) => a.localeCompare(b));\n    }\n\n    function uniqueLocations(calendar = readTimeOff()) {\n      const locations = new Set();\n      Object.values(calendar).forEach((entries) => {\n        entries.forEach((entry) => {\n          const location = entryLocation(entry);\n          if (location) locations.add(location);\n        });\n      });\n      return Array.from(locations).sort((a, b) => a.localeCompare(b));\n    }\n\n    function selectOptions(values, placeholder) {\n      return '<option value=\"\">' + escapeHtml(placeholder) + '</option>' + values.map((value) => '<option value=\"' + escapeHtml(value) + '\">' + escapeHtml(value) + '</option>').join(\"\");\n    }\n\n    function populateEditorOptions() {\n      const employeeNames = uniqueEmployeeNames();\n      const reasonPairs = Object.entries(absenceReasons);\n      const reasonValues = reasonPairs.map(([code, label]) => `${code} - ${label}`);\n      const locations = Array.from(new Set([...commonLocations, ...uniqueLocations()]));\n      document.getElementById(\"employeeOptions\").innerHTML = employeeNames.map((name) => '<option value=\"' + escapeHtml(name) + '\"></option>').join(\"\");\n      document.getElementById(\"employeeSelect\").innerHTML = selectOptions(employeeNames, \"Select employee...\");\n      document.getElementById(\"reasonOptions\").innerHTML = reasonPairs.map(([code, label]) => '<option value=\"' + escapeHtml(code) + '\">' + escapeHtml(label) + '</option><option value=\"' + escapeHtml(label) + '\">' + escapeHtml(code) + '</option>').join(\"\");\n      document.getElementById(\"reasonSelect\").innerHTML = selectOptions(reasonValues, \"Select reason...\");\n      document.getElementById(\"locationOptions\").innerHTML = locations.map((location) => '<option value=\"' + escapeHtml(location) + '\"></option>').join(\"\");\n      document.getElementById(\"locationSelect\").innerHTML = selectOptions(locations, \"Select location...\");\n    }\n\n    function saveCalendarAndRender(calendar) {\n      writeTimeOff(calendar);\n      renderCalendar();\n      populateEditorOptions();\n      renderDayEditor();\n    }\n\n    function dailyStatusOptions(selected) {\n      const options = [\n        [\"working\", \"Working\"], [\"here\", \"Here\"], [\"flipline\", \"Flip Line\"], [\"crane\", \"Crane\"], [\"bn\", \"BN\"], [\"vac\", \"Vacation\"], [\"sic\", \"Sick\"],\n        [\"calledoff\", \"Called Off\"], [\"out\", \"Out\"], [\"ncns\", \"NCNS\"], [\"bnsf\", \"BNSF\"],\n        [\"camein\", \"Came In\"], [\"unknown\", \"Unknown\"]\n      ];\n      return options.map(([value, label]) => `<option value=\"${value}\" ${value === selected ? \"selected\" : \"\"}>${label}</option>`).join(\"\");\n    }\n\n    function renderDailyEmployeeManager() {\n      const date = dateFromKey(selectedDateKey);\n      const additions = readEmployeeDayAdditions();\n      const staffing = staffingForDate(\n        date,\n        readTimeOff(),\n        currentRosterEmployees(),\n        readEmployeeBank(),\n        readEmployeeDayStatuses(),\n        additions\n      );\n      const addedKeys = new Set((additions[selectedDateKey] || []).map((employee) => normalizeName(employee.name)));\n      const shiftSection = (label, employees) => `\n        <section class=\"daily-shift-column\">\n          <h4>${label} - ${employees.length}</h4>\n          ${employees.length ? employees.map((employee) => {\n            const added = addedKeys.has(normalizeName(employee.name));\n            const status = employeeStatusForDate(employee.name, selectedDateKey);\n            return `<div class=\"daily-employee-row\">\n              <strong title=\"${escapeHtml(employee.name)}\">${escapeHtml(employee.name)}${added ? ' <span class=\"daily-added-badge\">Added</span>' : \"\"}</strong>\n              <select data-daily-status-name=\"${escapeHtml(employee.name)}\" aria-label=\"Status for ${escapeHtml(employee.name)}\">${dailyStatusOptions(status)}</select>\n              ${added ? `<button class=\"remove-day-employee\" type=\"button\" data-remove-day-name=\"${escapeHtml(employee.name)}\">Remove</button>` : \"\"}\n            </div>`;\n          }).join(\"\") : '<div class=\"empty-requests\" style=\"padding:6px\">No employees</div>'}\n        </section>`;\n      document.getElementById(\"dailyEmployeeList\").innerHTML = [\n        shiftSection(\"Day\", staffing.shifts.first || []),\n        shiftSection(\"Night\", staffing.shifts.second || [])\n      ].join(\"\");\n    }\n\n    function renderDayEditor() {\n      const calendar = readTimeOff();\n      const entries = (calendar[selectedDateKey] || [])\n        .map((entry, originalIndex) => ({ ...entry, originalIndex }))\n        .sort(compareTimeOffRequests);\n      const list = document.getElementById(\"requestList\");\n      document.getElementById(\"dayEditorTitle\").textContent = friendlyDate(selectedDateKey);\n      renderDailyEmployeeManager();\n      if (!entries.length) {\n        list.innerHTML = '<div class=\"empty-requests\">No time off requests for this day.</div>';\n        return;\n      }\n      list.innerHTML = entries.map((entry, index) => {\n        const location = displayEntryLocation(entry);\n        const shift = shiftForEmployee(entry.name);\n        const isEditing = editingRequestIndex === entry.originalIndex;\n        const isConfirmingDelete = pendingDeleteIndex === entry.originalIndex;\n        const actions = isConfirmingDelete\n          ? '<button class=\"confirm-delete-request\" type=\"button\" data-index=\"' + entry.originalIndex + '\">Confirm</button><button class=\"cancel-delete-request\" type=\"button\" data-index=\"' + entry.originalIndex + '\">Cancel</button>'\n          : '<button class=\"edit-request\" type=\"button\" data-index=\"' + entry.originalIndex + '\">Edit</button><button class=\"delete-request\" type=\"button\" data-index=\"' + entry.originalIndex + '\">Delete</button>';\n        return '<div class=\"request-row' + (isEditing ? ' editing' : '') + (isConfirmingDelete ? ' confirming-delete' : '') + '\"><span>' + escapeHtml(entry.name) + (shift ? ' - ' + escapeHtml(shift) : '') + ' - ' + escapeHtml(entry.code) + ' ' + escapeHtml(reasonLabel(entry.code)) + (location ? ' - ' + escapeHtml(location) : '') + '</span><div class=\"request-actions\">' + actions + '</div></div>';\n      }).join(\"\");\n    }\n\n    function clearRequestForm() {\n      editingRequestIndex = null;\n      pendingDeleteIndex = null;\n      document.getElementById(\"employeeInput\").value = \"\";\n      document.getElementById(\"reasonInput\").value = \"\";\n      document.getElementById(\"locationInput\").value = \"\";\n      document.getElementById(\"employeeSelect\").value = \"\";\n      document.getElementById(\"reasonSelect\").value = \"\";\n      document.getElementById(\"locationSelect\").value = \"\";\n      document.getElementById(\"addRequestButton\").textContent = \"Add\";\n      document.getElementById(\"editorStatus\").textContent = \"\";\n    }\n\n    function editRequest(index) {\n      const requestIndex = Number(index);\n      const calendar = readTimeOff();\n      const entry = (calendar[selectedDateKey] || [])[requestIndex];\n      if (!Number.isInteger(requestIndex) || !entry) {\n        document.getElementById(\"editorStatus\").textContent = \"Could not find that request to edit.\";\n        return;\n      }\n      editingRequestIndex = requestIndex;\n      pendingDeleteIndex = null;\n      document.getElementById(\"employeeInput\").value = entry.name || \"\";\n      document.getElementById(\"reasonInput\").value = entry.code || \"\";\n      document.getElementById(\"locationInput\").value = entryLocation(entry);\n      document.getElementById(\"employeeSelect\").value = \"\";\n      document.getElementById(\"reasonSelect\").value = \"\";\n      document.getElementById(\"locationSelect\").value = \"\";\n      document.getElementById(\"addRequestButton\").textContent = \"Save\";\n      renderDayEditor();\n      document.getElementById(\"editorStatus\").textContent = \"Editing request - update the fields, then click Save\";\n      document.getElementById(\"addRequestForm\").scrollIntoView({ block: \"nearest\" });\n      document.getElementById(\"employeeInput\").focus();\n    }\n\n    function openDayEditor(dateKey) {\n      selectedDateKey = dateKey;\n      const selected = dateFromKey(selectedDateKey);\n      viewDate = new Date(selected.getFullYear(), selected.getMonth(), 1);\n      renderCalendar();\n      populateEditorOptions();\n      renderDayEditor();\n      clearRequestForm();\n      const backdrop = document.getElementById(\"dayEditorBackdrop\");\n      backdrop.classList.add(\"open\");\n      backdrop.setAttribute(\"aria-hidden\", \"false\");\n      setTimeout(() => document.getElementById(\"employeeInput\").focus(), 0);\n    }\n\n    function closeDayEditor() {\n      const backdrop = document.getElementById(\"dayEditorBackdrop\");\n      backdrop.classList.remove(\"open\");\n      backdrop.setAttribute(\"aria-hidden\", \"true\");\n    }\n\n    function populateEmployeeBank() {\n      const select = document.getElementById(\"employeeBankEmployee\");\n      const employees = currentRosterEmployees()\n        .map((employee) => employee.name)\n        .sort((left, right) => left.localeCompare(right, undefined, { sensitivity: \"base\" }));\n      select.innerHTML = employees.map((name) => `<option value=\"${escapeHtml(name)}\">${escapeHtml(name)}</option>`).join(\"\");\n      syncEmployeeBankTag();\n    }\n\n    function syncEmployeeBankTag() {\n      const name = document.getElementById(\"employeeBankEmployee\").value;\n      const bank = readEmployeeBank();\n      document.getElementById(\"employeeBankTag\").value = bank[normalizeName(name)] || \"\";\n    }\n\n    function openEmployeeBank() {\n      populateEmployeeBank();\n      document.getElementById(\"employeeBankStatus\").textContent = \"Choose a permanent pill for this employee.\";\n      const backdrop = document.getElementById(\"employeeBankBackdrop\");\n      backdrop.classList.add(\"open\");\n      backdrop.setAttribute(\"aria-hidden\", \"false\");\n      setTimeout(() => document.getElementById(\"employeeBankEmployee\").focus(), 0);\n    }\n\n    function closeEmployeeBank() {\n      const backdrop = document.getElementById(\"employeeBankBackdrop\");\n      backdrop.classList.remove(\"open\");\n      backdrop.setAttribute(\"aria-hidden\", \"true\");\n    }\n\n    function employeeStatusForDate(name, dateKey) {\n      const employee = currentRosterEmployees().find((candidate) => normalizeName(candidate.name) === normalizeName(name)) || { name };\n      const absence = timeOffEntryForEmployee(readTimeOff()[dateKey] || [], employee);\n      if (String(absence?.code || \"\").toUpperCase() === \"SIC\") return \"sic\";\n      if (absence) return \"vac\";\n      const dayStatus = readEmployeeDayStatuses()[dateKey]?.[normalizeName(name)];\n      if (dayStatus) return dayStatus;\n      const bankTag = readEmployeeBank()[normalizeName(name)];\n      if (bankTag) return bankTag;\n      return isCraneOperator(employee) ? \"crane\" : \"working\";\n    }\n\n    function employeeRoleFlagsForDate(name, dateKey) {\n      const employee = currentRosterEmployees().find((candidate) => normalizeName(candidate.name) === normalizeName(name)) || { name };\n      const key = normalizeName(name);\n      const dayStatus = readEmployeeDayStatuses()[dateKey]?.[key] || \"\";\n      const bankTag = readEmployeeBank()[key] || \"\";\n      const flags = [];\n      if (bankTag === \"crane\" || isCraneOperator(employee)) flags.push(\"C\");\n      if (dayStatus === \"flipline\") flags.push(\"FL\");\n      return flags;\n    }\n\n    function employeeCalendarName(name, dateKey) {\n      const flags = employeeRoleFlagsForDate(name, dateKey);\n      return flags.length ? `${name} ${flags.map((flag) => `(${flag})`).join(\" \")}` : name;\n    }\n\n    function positionEmployeeStatus(anchor) {\n      const dialog = document.querySelector(\"#employeeStatusBackdrop .employee-bank-dialog\");\n      if (!dialog || !anchor) return;\n      const rect = anchor.getBoundingClientRect();\n      const gap = 5;\n      const width = dialog.offsetWidth || 190;\n      const height = dialog.offsetHeight || 310;\n      let left = rect.right + gap;\n      if (left + width > window.innerWidth - 6) left = rect.left - width - gap;\n      left = Math.max(6, Math.min(left, window.innerWidth - width - 6));\n      const top = Math.max(6, Math.min(rect.top, window.innerHeight - height - 6));\n      dialog.style.left = `${Math.round(left)}px`;\n      dialog.style.top = `${Math.round(top)}px`;\n    }\n\n    function openEmployeeStatus(name, dateKey, anchor) {\n      selectedStatusName = String(name || \"\").trim();\n      selectedStatusDate = String(dateKey || \"\");\n      if (!selectedStatusName || !selectedStatusDate) return;\n      document.getElementById(\"employeeStatusName\").textContent = `${selectedStatusName} - ${friendlyDate(selectedStatusDate)}`;\n      const currentStatus = employeeStatusForDate(selectedStatusName, selectedStatusDate);\n      document.querySelectorAll(\"[data-quick-status]\").forEach((button) => {\n        const active = button.dataset.quickStatus === currentStatus;\n        button.classList.toggle(\"active\", active);\n        button.setAttribute(\"aria-pressed\", String(active));\n      });\n      document.getElementById(\"employeeStatusMessage\").textContent = \"Choose a status for this date.\";\n      const backdrop = document.getElementById(\"employeeStatusBackdrop\");\n      backdrop.classList.add(\"open\");\n      backdrop.setAttribute(\"aria-hidden\", \"false\");\n      positionEmployeeStatus(anchor);\n      setTimeout(() => document.querySelector(\"[data-quick-status]\")?.focus(), 0);\n    }\n\n    function closeEmployeeStatus() {\n      const backdrop = document.getElementById(\"employeeStatusBackdrop\");\n      backdrop.classList.remove(\"open\");\n      backdrop.setAttribute(\"aria-hidden\", \"true\");\n    }\n\n    function offScheduleEmployees(dateKey, shift) {\n      const date = dateFromKey(dateKey);\n      return currentRosterEmployees()\n        .filter((employee) => employee.shift === shift && !isEmployeeScheduled(employee, date))\n        .sort((left, right) => String(left.name || \"\").localeCompare(String(right.name || \"\"), undefined, { sensitivity: \"base\" }));\n    }\n\n    function openOffSchedule(dateKey, shift) {\n      if (!dateKey || ![\"first\", \"second\"].includes(shift)) return;\n      const label = shift === \"first\" ? \"Day\" : \"Night\";\n      const employees = offScheduleEmployees(dateKey, shift);\n      document.getElementById(\"offScheduleTitle\").textContent = `${label} - Not Scheduled`;\n      document.getElementById(\"offScheduleSummary\").textContent = `${friendlyDate(dateKey)} - ${employees.length} employee${employees.length === 1 ? \"\" : \"s\"}`;\n      document.getElementById(\"offScheduleList\").innerHTML = employees.length\n        ? employees.map((employee) => `<div class=\"off-schedule-name\" title=\"${escapeHtml(employee.name)}\">${escapeHtml(employee.name)}</div>`).join(\"\")\n        : '<div class=\"off-schedule-empty\">Everyone on this shift is scheduled.</div>';\n      const backdrop = document.getElementById(\"offScheduleBackdrop\");\n      backdrop.classList.add(\"open\");\n      backdrop.setAttribute(\"aria-hidden\", \"false\");\n      setTimeout(() => document.getElementById(\"closeOffSchedule\").focus(), 0);\n    }\n\n    function closeOffSchedule() {\n      const backdrop = document.getElementById(\"offScheduleBackdrop\");\n      backdrop.classList.remove(\"open\");\n      backdrop.setAttribute(\"aria-hidden\", \"true\");\n    }\n\n    function saveEmployeeStatus(name, dateKey, status) {\n      const nameKey = normalizeName(name);\n      const tokenKey = nameTokenKey(name);\n      const calendar = readTimeOff();\n      const currentEntries = calendar[dateKey] || [];\n      calendar[dateKey] = currentEntries.filter((entry) => {\n        const directMatch = normalizeName(entry.name) === nameKey;\n        const tokenMatch = tokenKey && nameTokenKey(entry.name) === tokenKey;\n        return !directMatch && !tokenMatch;\n      });\n      if (status === \"vac\" || status === \"sic\") {\n        const code = status.toUpperCase();\n        calendar[dateKey].push({ date: dateKey, name, code, reason: reasonLabel(code), location: \"\", sheet: \"List Status\" });\n        calendar[dateKey].sort(compareTimeOffRequests);\n      }\n      if (!calendar[dateKey].length) delete calendar[dateKey];\n      writeTimeOff(calendar);\n\n      const statuses = readEmployeeDayStatuses();\n      if (!statuses[dateKey]) statuses[dateKey] = {};\n      if (status === \"vac\" || status === \"sic\" || !status) delete statuses[dateKey][nameKey];\n      else statuses[dateKey][nameKey] = status;\n      if (!Object.keys(statuses[dateKey]).length) delete statuses[dateKey];\n      writeEmployeeDayStatuses(statuses);\n    }\n\n    function normalizeName(name) {\n      return String(name || \"\")\n        .toLowerCase()\n        .replace(/[^a-z0-9]+/g, \" \")\n        .replace(/\\bbranford atton\\b/g, \"branford alton\")\n        .trim();\n    }\n\n    function isOrangePerson(name) {\n      return /\\b(jarvis|dave|mike|neal)\\b/.test(normalizeName(name));\n    }\n\n    function codeFromCell(value) {\n      const text = String(value || \"\").trim().toUpperCase();\n      return Object.keys(absenceReasons).find((code) => new RegExp(`\\\\b${code}\\\\b`).test(text)) || \"\";\n    }\n\n    function parseDayNumber(value) {\n      const text = String(value || \"\").trim();\n      if (!/^\\d{1,2}$/.test(text)) return null;\n      const day = Number(text);\n      return day >= 1 && day <= 31 ? day : null;\n    }\n\n    function employeeNameFromCell(value) {\n      let text = String(value || \"\").replace(/\\s+/g, \" \").trim();\n      if (!text || !/[a-z]/i.test(text)) return \"\";\n      if (/^(emp\\s*name|employee|shifts?|time away|date range|location|reasons?|statuses?|pay groups?)/i.test(text)) return \"\";\n      if (/\\b(SIC|VAC|FLO|HOL)\\s*-/i.test(text)) return \"\";\n      text = text.replace(/\\s+\\d{3,}\\b.*$/, \"\").trim();\n      const comma = text.match(/^([^,]+),\\s*(.+)$/);\n      if (comma) return `${comma[1].trim()} ${comma[2].trim()}`.replace(/\\s+/g, \" \");\n      return text;\n    }\n\n    function monthYearFromRows(rows) {\n      const current = { month: today.getMonth(), year: today.getFullYear() };\n      for (const row of rows) {\n        for (const value of row) {\n          const match = String(value || \"\").match(/\\b(january|february|march|april|may|june|july|august|september|october|november|december)\\s+(\\d{4})\\b/i);\n          if (match) return { month: monthNames[match[1].toLowerCase()], year: Number(match[2]) };\n        }\n      }\n      for (const row of rows) {\n        for (const value of row) {\n          const text = String(value || \"\");\n          const dateMatch = text.match(/\\b(\\d{1,2})\\/(\\d{1,2})\\/(\\d{4})\\b/);\n          if (dateMatch && /date range/i.test(text)) {\n            return { month: Number(dateMatch[1]) - 1, year: Number(dateMatch[3]) };\n          }\n        }\n      }\n      return current;\n    }\n\n    function findEmployeeHeader(rows) {\n      for (let rowIndex = 0; rowIndex < rows.length; rowIndex += 1) {\n        for (let colIndex = 0; colIndex < rows[rowIndex].length; colIndex += 1) {\n          if (/\\bemp(?:loyee)?\\s*name\\b/i.test(String(rows[rowIndex][colIndex] || \"\"))) {\n            return { rowIndex, colIndex };\n          }\n        }\n      }\n      return null;\n    }\n\n    function findColumnNearHeader(rows, header, pattern) {\n      for (let rowIndex = Math.max(0, header.rowIndex - 3); rowIndex <= Math.min(rows.length - 1, header.rowIndex + 3); rowIndex += 1) {\n        for (let colIndex = 0; colIndex < rows[rowIndex].length; colIndex += 1) {\n          if (pattern.test(String(rows[rowIndex][colIndex] || \"\"))) return colIndex;\n        }\n      }\n      return -1;\n    }\n\n    function findDayColumns(rows, header) {\n      const candidates = [];\n      for (let rowIndex = Math.max(0, header.rowIndex - 3); rowIndex <= Math.min(rows.length - 1, header.rowIndex + 3); rowIndex += 1) {\n        const days = [];\n        for (let colIndex = header.colIndex + 1; colIndex < rows[rowIndex].length; colIndex += 1) {\n          const day = parseDayNumber(rows[rowIndex][colIndex]);\n          if (day !== null) days.push({ colIndex, day });\n        }\n        candidates.push({ rowIndex, days });\n      }\n      candidates.sort((a, b) => b.days.length - a.days.length);\n      return candidates[0]?.days || [];\n    }\n\n    function datedColumns(dayColumns, base) {\n      let month = base.month;\n      let year = base.year;\n      let previousDay = 0;\n      return dayColumns.map(({ colIndex, day }) => {\n        if (previousDay && day < previousDay - 7) {\n          month += 1;\n          if (month > 11) {\n            month = 0;\n            year += 1;\n          }\n        }\n        previousDay = day;\n        return { colIndex, dateKey: isoDate(new Date(year, month, day)) };\n      });\n    }\n\n    function parseTimeOffRows(rows, sheetName) {\n      const header = findEmployeeHeader(rows);\n      if (!header) return [];\n      const dayColumns = datedColumns(findDayColumns(rows, header), monthYearFromRows(rows));\n      if (!dayColumns.length) return [];\n      const locationColumn = findColumnNearHeader(rows, header, /^loc(?:ation)?$/i);\n      const sheetLocation = locationFromSheetName(sheetName);\n      const records = [];\n\n      for (let rowIndex = header.rowIndex + 1; rowIndex < rows.length; rowIndex += 1) {\n        const row = rows[rowIndex] || [];\n        const name = employeeNameFromCell(row[header.colIndex]);\n        if (!name) continue;\n        for (const column of dayColumns) {\n          const code = codeFromCell(row[column.colIndex]);\n          if (!code) continue;\n          records.push({\n            date: column.dateKey,\n            name,\n            code,\n            reason: absenceReasons[code],\n            location: locationColumn >= 0 ? cleanLocation(row[locationColumn]) || sheetLocation : sheetLocation,\n            sheet: sheetName\n          });\n        }\n      }\n\n      return records;\n    }\n\n    function recordsToCalendar(records) {\n      const seen = new Set();\n      const calendar = {};\n      records.forEach((record) => {\n        const key = `${record.date}|${normalizeName(record.name)}|${record.code}|${normalizeName(entryLocation(record))}`;\n        if (seen.has(key)) return;\n        seen.add(key);\n        if (!calendar[record.date]) calendar[record.date] = [];\n        calendar[record.date].push(record);\n      });\n      Object.values(calendar).forEach((entries) => {\n        entries.sort(compareTimeOffRequests);\n      });\n      return calendar;\n    }\n\n    function sheetRows(workbook, sheetName) {\n      const sheet = workbook.Sheets[sheetName];\n      return XLSX.utils.sheet_to_json(sheet, { header: 1, raw: false, defval: \"\" })\n        .map((row) => row.map((cell) => String(cell || \"\").trim()));\n    }\n\n    function parseTimeOffWorkbook(workbook) {\n      const records = [];\n      workbook.SheetNames.forEach((sheetName) => {\n        records.push(...parseTimeOffRows(sheetRows(workbook, sheetName), sheetName));\n      });\n      return records;\n    }\n\n    function rosterDayIndex(date) {\n      return (date.getDay() + 6) % 7;\n    }\n\n    function isEmployeeScheduled(employee, date) {\n      return normalizeRosterDays(employee.days)[rosterDayIndex(date)] !== \"O\";\n    }\n\n    function isCraneOperator(employee) {\n      const role = normalizeName(employee?.role).replace(/\\s+/g, \"\");\n      return role === \"crane\" || role === \"everything\";\n    }\n\n    function isManagerEmployee(employee) {\n      return employee?.shift === \"managers\" || isOrangePerson(employee?.name);\n    }\n\n    function timeOffEntryForEmployee(entries, employee) {\n      const directKey = normalizeName(employee.name);\n      const tokenKey = nameTokenKey(employee.name);\n      return entries\n        .filter((entry) => normalizeName(entry.name) === directKey || (tokenKey && nameTokenKey(entry.name) === tokenKey))\n        .sort(compareTimeOffRequests)[0] || null;\n    }\n\n    function staffListSortPriority(employee) {\n      const absenceCode = String(employee?.absence?.code || \"\").toUpperCase();\n      if (absenceCode === \"SIC\") return 3;\n      if (employee?.absence) return 2;\n      if (employee?.statusOverride === \"bn\") return 2;\n      if ([\"bnsf\", \"calledoff\", \"out\", \"ncns\", \"unknown\"].includes(employee?.statusOverride)) return 4;\n      if ([\"working\", \"here\", \"flipline\", \"camein\"].includes(employee?.statusOverride)) return 1;\n      if (employee?.bankTag === \"unknown\") return 4;\n      if (employee?.bankTag === \"crane\" || isCraneOperator(employee)) return 0;\n      return 1;\n    }\n\n    function isCountedStaffEmployee(employee) {\n      return Boolean(employee?.working) && employee?.bankTag !== \"unknown\" && employee?.statusOverride !== \"bnsf\";\n    }\n\n    function orderedStaffForDisplay(employees) {\n      const ordered = [...employees].sort((left, right) => {\n        const countDifference = (isCountedStaffEmployee(left) ? 0 : 1) - (isCountedStaffEmployee(right) ? 0 : 1);\n        const priorityDifference = staffListSortPriority(left) - staffListSortPriority(right);\n        return countDifference || priorityDifference || String(left.name || \"\").localeCompare(String(right.name || \"\"), undefined, { sensitivity: \"base\" });\n      });\n      const firstNotCounted = ordered.findIndex((employee) => !isCountedStaffEmployee(employee));\n      return ordered.map((employee, index) => ({ employee, bottomHug: firstNotCounted > 0 && index === firstNotCounted }));\n    }\n\n    function staffingForDate(date, timeOff, roster, employeeBank, employeeDayStatuses, employeeDayAdditions) {\n      const dateKey = isoDate(date);\n      const entries = timeOff[dateKey] || [];\n      const dateStatuses = employeeDayStatuses[dateKey] || {};\n      const additions = Array.isArray(employeeDayAdditions[dateKey]) ? employeeDayAdditions[dateKey] : [];\n      const additionsByName = new Map(additions.map((employee) => [normalizeName(employee.name), employee]));\n      const dailyRoster = roster.map((employee) => {\n        const addition = additionsByName.get(normalizeName(employee.name));\n        if (!addition) return employee;\n        additionsByName.delete(normalizeName(employee.name));\n        return { ...employee, shift: addition.shift || employee.shift, dayAdded: true };\n      });\n      additionsByName.forEach((employee) => dailyRoster.push({\n        name: employee.name,\n        shift: employee.shift === \"second\" ? \"second\" : \"first\",\n        role: \"\",\n        days: [\"W\", \"W\", \"W\", \"W\", \"W\", \"W\", \"W\"],\n        dayAdded: true\n      }));\n      const shifts = Object.fromEntries(rosterShiftKeys.map((shift) => [shift, []]));\n      let scheduled = 0;\n      let working = 0;\n\n      dailyRoster.forEach((employee) => {\n        if (employee.shift === \"gate\" || employee.shift === \"mechanics\") return;\n        if (!employee.dayAdded && !isEmployeeScheduled(employee, date)) return;\n        const nameKey = normalizeName(employee.name);\n        const statusOverride = dateStatuses[nameKey] || \"\";\n        const activeOverride = [\"working\", \"here\", \"flipline\", \"crane\", \"unknown\", \"bnsf\", \"camein\", \"bn\", \"calledoff\", \"out\", \"ncns\"].includes(statusOverride);\n        const absence = activeOverride ? null : timeOffEntryForEmployee(entries, employee);\n        const bankTag = statusOverride === \"crane\" || statusOverride === \"unknown\"\n          ? statusOverride\n          : activeOverride ? \"\" : employeeBank[nameKey] || \"\";\n        const overrideOut = [\"bn\", \"bnsf\", \"unknown\", \"calledoff\", \"out\", \"ncns\"].includes(statusOverride);\n        const bankOut = [\"bn\", \"unknown\"].includes(bankTag);\n        const row = { ...employee, absence, working: !absence && !overrideOut && !bankOut, bankTag, statusOverride };\n        if (!shifts[row.shift]) shifts[row.shift] = [];\n        shifts[row.shift].push(row);\n        scheduled += 1;\n        if (row.working) working += 1;\n      });\n\n      Object.values(shifts).forEach((employees) => {\n        employees.sort((left, right) => {\n          const priorityDifference = staffListSortPriority(left) - staffListSortPriority(right);\n          return priorityDifference || String(left.name || \"\").localeCompare(String(right.name || \"\"), undefined, { sensitivity: \"base\" });\n        });\n      });\n\n      return {\n        date,\n        shifts,\n        scheduled,\n        working,\n        away: scheduled - working\n      };\n    }\n\n    function staffPillHtml(employee, dateKey, extraClass = \"\") {\n      const absence = employee.absence;\n      const classes = [\"staff-pill\"];\n      if (extraClass) classes.push(extraClass);\n      let title = `${employee.name} - working`;\n      let flag = \"\";\n\n      if (absence) {\n        const code = String(absence.code || \"\").toLowerCase();\n        classes.push([\"vac\", \"sic\", \"flo\", \"hol\"].includes(code) ? code : \"other-away\", \"out-status\");\n        title = `${employee.name} - ${reasonLabel(absence.code)}`;\n        if (code === \"vac\") flag = '<small class=\"status-flag\" aria-label=\"Vacation\">(V)</small>';\n        if (code === \"sic\") flag = '<small class=\"status-flag\" aria-label=\"Sick\">(S)</small>';\n      } else if (employee.statusOverride === \"bnsf\") {\n        classes.push(\"bnsf\", \"out-status\");\n        title = `${employee.name} - BNSF`;\n        flag = '<small class=\"status-flag\" aria-label=\"BNSF\">(BN)</small>';\n      } else if (employee.statusOverride === \"calledoff\") {\n        classes.push(\"called-off\", \"out-status\");\n        title = `${employee.name} - called off`;\n        flag = '<small class=\"status-flag\" aria-label=\"Called off\">(CO)</small>';\n      } else if (employee.statusOverride === \"out\") {\n        classes.push(\"out\", \"out-status\");\n        title = `${employee.name} - out`;\n        flag = '<small class=\"status-flag\" aria-label=\"Out\">(O)</small>';\n      } else if (employee.statusOverride === \"ncns\") {\n        classes.push(\"ncns\", \"out-status\");\n        title = `${employee.name} - no call no show`;\n        flag = '<small class=\"status-flag\" aria-label=\"No call no show\">(NC)</small>';\n      } else if (employee.statusOverride === \"camein\") {\n        classes.push(\"came-in\");\n        title = `${employee.name} - came in`;\n        flag = '<small class=\"status-flag\" aria-label=\"Came in\">(+)</small>';\n      } else if (employee.statusOverride === \"here\") {\n        classes.push(\"came-in\");\n        title = `${employee.name} - here`;\n        flag = '<small class=\"status-flag\" aria-label=\"Here\">(&#10003;)</small>';\n      } else if (employee.statusOverride === \"flipline\") {\n        classes.push(\"flip-line\");\n        title = `${employee.name} - flip line`;\n        flag = '<small class=\"status-flag\" aria-label=\"Flip Line\">(FL)</small>';\n      } else if (employee.statusOverride === \"bn\") {\n        classes.push(\"bn\", \"out-status\");\n        title = `${employee.name} - BN`;\n        flag = '<small class=\"bn-flag\" aria-label=\"BN\">(BN)</small>';\n      } else if (employee.statusOverride === \"working\") {\n        classes.push(\"plain\");\n      } else if (employee.bankTag === \"unknown\") {\n        classes.push(\"unknown\", \"out-status\");\n        title = `${employee.name} - unknown status`;\n        flag = '<small class=\"status-flag\" aria-label=\"Unknown status\">(??)</small>';\n      } else if (employee.bankTag === \"crane\" || isCraneOperator(employee)) {\n        classes.push(\"crane\");\n        title = `${employee.name} - working - crane operator`;\n        flag = '<small class=\"crane-flag\" aria-label=\"Crane operator\">(C)</small>';\n      } else {\n        classes.push(\"plain\");\n      }\n\n      return `<button class=\"${classes.join(\" \")}\" type=\"button\" data-status-name=\"${escapeHtml(employee.name)}\" data-status-date=\"${escapeHtml(dateKey)}\" title=\"${escapeHtml(title)}\"><span>${escapeHtml(employee.name)}</span>${flag}</button>`;\n    }\n\n    function shiftStaffHtml(label, employees, dateKey, shiftKey, extraClass = \"\") {\n      const displayEmployees = orderedStaffForDisplay(employees);\n      return `\n        <section class=\"staff-shift${extraClass ? ` ${extraClass}` : \"\"}\">\n          <h3 role=\"button\" tabindex=\"0\" data-off-schedule-date=\"${escapeHtml(dateKey)}\" data-off-schedule-shift=\"${escapeHtml(shiftKey)}\" title=\"Show employees not scheduled for ${escapeHtml(label)} shift\"><span>${escapeHtml(label)}</span></h3>\n          <div class=\"staff-pill-list\">\n            ${displayEmployees.length ? displayEmployees.map(({ employee, bottomHug }) => staffPillHtml(employee, dateKey, bottomHug ? \"bottom-hug\" : \"\")).join(\"\") : '<span class=\"staff-empty\">No one scheduled</span>'}\n          </div>\n        </section>\n      `;\n    }\n\n    function supportStaffHtml(staffing, dateKey) {\n      return \"\";\n    }\n\n    function staffDayHtml(staffing, monthIndex) {\n      const date = staffing.date;\n      const key = isoDate(date);\n      const outsideMonth = monthIndex !== null && date.getMonth() !== monthIndex;\n      const isToday = key === isoDate(today);\n      const isPast = key < isoDate(today);\n      const isSelected = key === selectedDateKey;\n      const classes = [\n        \"staff-day\",\n        outsideMonth ? \"outside-month\" : \"\",\n        isPast ? \"past-day\" : \"\",\n        isToday ? \"today\" : \"\",\n        isSelected ? \"selected\" : \"\"\n      ].filter(Boolean).join(\" \");\n      const dayName = date.toLocaleDateString(undefined, { weekday: \"short\" });\n      const dateLabel = date.toLocaleDateString(undefined, { month: \"short\", day: \"numeric\" });\n      const relativeDayLabel = listRange === \"three-day\"\n        ? (key === isoDate(today) ? \"Today\" : (key < isoDate(today) ? \"Yesterday\" : \"Tomorrow\"))\n        : \"\";\n      const relativeDayHtml = relativeDayLabel ? '<span class=\"relative-day-label\">' + escapeHtml(relativeDayLabel) + '</span>' : \"\";\n      const countableWorker = (employee) => employee.working && employee.bankTag !== \"unknown\" && employee.statusOverride !== \"bnsf\";\n      const shiftCount = (employees) => {\n        const countable = employees.filter(countableWorker);\n        const flipLine = countable.filter((employee) => employee.statusOverride === \"flipline\").length;\n        const regular = countable.length - flipLine;\n        return { total: countable.length, label: flipLine ? `${regular}+${flipLine}` : String(regular) };\n      };\n      const firstShiftWorking = shiftCount(staffing.shifts.first || []);\n      const secondShiftWorking = shiftCount(staffing.shifts.second || []);\n\n      if (outsideMonth) {\n        return `\n          <article class=\"${classes}\">\n            <button class=\"staff-day-button\" type=\"button\" data-list-date=\"${escapeHtml(key)}\">\n              <strong>${escapeHtml(dayName)}</strong><b>${date.getDate()}</b><span>${escapeHtml(dateLabel)}</span>${relativeDayHtml}\n            </button>\n            <span class=\"staff-empty\" style=\"padding:10px 7px\">Outside this month</span>\n          </article>\n        `;\n      }\n\n      return `\n        <article class=\"${classes}\">\n          <button class=\"staff-day-button\" type=\"button\" data-list-date=\"${escapeHtml(key)}\">\n            <strong>${escapeHtml(dayName)}</strong><b>${date.getDate()}</b>${relativeDayHtml}\n          </button>\n          <div class=\"staff-shift-grid\">\n            ${shiftStaffHtml(\"Day\", staffing.shifts.first || [], key, \"first\")}\n            ${shiftStaffHtml(\"Night\", staffing.shifts.second || [], key, \"second\")}\n          </div>\n          ${supportStaffHtml(staffing, key)}\n          <div class=\"staff-day-total\">\n            <b class=\"${firstShiftWorking.total < 10 ? \"low-staff\" : \"\"}\" title=\"1st Shift working\">${firstShiftWorking.label}</b>\n            <b class=\"${secondShiftWorking.total < 10 ? \"low-staff\" : \"\"}\" title=\"2nd Shift working\">${secondShiftWorking.label}</b>\n          </div>\n        </article>\n      `;\n    }\n\n    function renderStaffList(timeOff, monthFirst, roster) {\n      const list = document.getElementById(\"listView\");\n      const employeeBank = readEmployeeBank();\n      const employeeDayStatuses = readEmployeeDayStatuses();\n      const employeeDayAdditions = readEmployeeDayAdditions();\n      const twoWeekView = listRange === \"two-week\";\n      const threeDayView = listRange === \"three-day\";\n      list.classList.toggle(\"two-week-mode\", twoWeekView);\n      list.classList.toggle(\"three-day-mode\", threeDayView);\n      const start = threeDayView ? new Date(today) : (twoWeekView ? new Date(today) : new Date(monthFirst));\n      start.setHours(0, 0, 0, 0);\n      if (threeDayView) start.setDate(start.getDate() - 1);\n      else start.setDate(start.getDate() - rosterDayIndex(start));\n      const last = new Date(monthFirst.getFullYear(), monthFirst.getMonth() + 1, 0);\n      const daysBeforeMonth = rosterDayIndex(monthFirst);\n      const visibleDays = threeDayView ? 3 : (twoWeekView ? 14 : Math.ceil((daysBeforeMonth + last.getDate()) / 7) * 7);\n      const displayMonthIndex = (twoWeekView || threeDayView) ? null : monthFirst.getMonth();\n      const staffDays = [];\n\n      for (let index = 0; index < visibleDays; index += 1) {\n        const date = new Date(start);\n        date.setDate(start.getDate() + index);\n        staffDays.push(staffingForDate(date, timeOff, roster, employeeBank, employeeDayStatuses, employeeDayAdditions));\n      }\n\n      const weeks = [];\n      for (let index = 0; index < staffDays.length; index += 7) {\n        const week = staffDays.slice(index, index + 7);\n        weeks.push(`\n          <section class=\"staff-week\">\n            <div class=\"staff-week-grid\">${week.map((staffing) => staffDayHtml(staffing, displayMonthIndex)).join(\"\")}</div>\n          </section>\n        `);\n      }\n\n      list.innerHTML = weeks.join(\"\");\n    }\n\n    function syncViewMode() {\n      const calendarActive = viewMode === \"calendar\";\n      const monthActive = !calendarActive && listRange === \"month\";\n      const twoWeekActive = !calendarActive && listRange === \"two-week\";\n      const threeDayActive = !calendarActive && listRange === \"three-day\";\n      document.getElementById(\"calendarView\").hidden = !calendarActive;\n      document.getElementById(\"listView\").hidden = calendarActive;\n      const shell = document.querySelector(\".calendar-shell\");\n      shell.classList.toggle(\"list-mode\", !calendarActive);\n      shell.classList.toggle(\"two-week-list-mode\", twoWeekActive);\n      shell.classList.toggle(\"three-day-list-mode\", threeDayActive);\n      document.getElementById(\"calendarViewToggle\").classList.toggle(\"active\", calendarActive);\n      document.getElementById(\"listViewToggle\").classList.toggle(\"active\", monthActive);\n      document.getElementById(\"twoWeekViewToggle\").classList.toggle(\"active\", twoWeekActive);\n      document.getElementById(\"threeDayViewToggle\").classList.toggle(\"active\", threeDayActive);\n      document.getElementById(\"calendarViewToggle\").setAttribute(\"aria-pressed\", String(calendarActive));\n      document.getElementById(\"listViewToggle\").setAttribute(\"aria-pressed\", String(monthActive));\n      document.getElementById(\"twoWeekViewToggle\").setAttribute(\"aria-pressed\", String(twoWeekActive));\n      document.getElementById(\"threeDayViewToggle\").setAttribute(\"aria-pressed\", String(threeDayActive));\n    }\n\n    function setViewMode(nextMode, nextRange = listRange) {\n      viewMode = nextMode === \"list\" ? \"list\" : \"calendar\";\n      listRange = [\"two-week\", \"three-day\"].includes(nextRange) ? nextRange : \"month\";\n      localStorage.setItem(timeOffViewStorageKey, viewMode);\n      localStorage.setItem(timeOffListRangeStorageKey, listRange);\n      renderCalendar();\n    }\n\n    function renderCalendar() {\n      const timeOff = readTimeOff();\n      const monthTitle = document.getElementById(\"monthTitle\");\n      const grid = document.getElementById(\"calendarGrid\");\n      const first = new Date(viewDate.getFullYear(), viewDate.getMonth(), 1);\n      const start = new Date(first);\n      start.setDate(first.getDate() - first.getDay());\n      const last = new Date(viewDate.getFullYear(), viewDate.getMonth() + 1, 0);\n      const visibleDays = Math.ceil((first.getDay() + last.getDate()) / 7) * 7;\n      const todayStart = new Date(today);\n      todayStart.setHours(0, 0, 0, 0);\n      const currentWeekStart = new Date(todayStart);\n      currentWeekStart.setDate(todayStart.getDate() - todayStart.getDay());\n      const currentWeekEnd = new Date(currentWeekStart);\n      currentWeekEnd.setDate(currentWeekStart.getDate() + 6);\n      const monthName = first.toLocaleDateString(undefined, { month: \"long\" });\n      monthTitle.textContent = `${monthName} ${first.getFullYear()}`;\n      document.querySelector(\"h1\").innerHTML = `${escapeHtml(monthName)} <span class=\"title-year\">${first.getFullYear()}</span>`;\n\n      const roster = currentRosterEmployees();\n      const shiftLookup = rosterShiftLookup(roster);\n      const cells = [];\n      for (let index = 0; index < visibleDays; index += 1) {\n        const date = new Date(start);\n        date.setDate(start.getDate() + index);\n        const key = isoDate(date);\n        const cellDate = new Date(date);\n        cellDate.setHours(0, 0, 0, 0);\n        const entries = [...(timeOff[key] || [])].sort(compareTimeOffRequests);\n        const visibleEntries = entries;\n        const classes = [\n          \"day-cell\",\n          date.getMonth() !== viewDate.getMonth() ? \"muted\" : \"\",\n          (date.getDay() === 0 || date.getDay() === 6) ? \"weekend\" : \"\",\n          cellDate < todayStart ? \"past-day\" : \"\",\n          cellDate >= currentWeekStart && cellDate <= currentWeekEnd ? \"current-week\" : \"\",\n          key === selectedDateKey ? \"selected\" : \"\"\n        ].filter(Boolean).join(\" \");\n        cells.push(`\n          <button class=\"${classes}\" type=\"button\" data-date=\"${escapeHtml(key)}\">\n            <span class=\"day-number\">${date.getDate()}</span>\n            ${visibleEntries.map((entry) => `\n              <span class=\"timeoff-pill ${escapeHtml(entry.code.toLowerCase())}${isOrangePerson(entry.name) ? \" orange-person\" : \"\"}\" title=\"${escapeHtml(`${entry.name} - ${shiftForEmployee(entry.name, shiftLookup) || \"No shift found\"} - ${entry.reason}`)}\">\n                <span class=\"timeoff-name\">${escapeHtml(employeeCalendarName(entry.name, key))}</span><span class=\"timeoff-code\">${escapeHtml(entry.code)}</span>\n                ${shiftLineHtml(entry, shiftLookup)}\n                ${locationLineHtml(entry, shiftLookup)}\n              </span>\n            `).join(\"\")}\n\n          </button>\n        `);\n      }\n      grid.innerHTML = cells.join(\"\");\n      renderStaffList(timeOff, first, roster);\n      syncViewMode();\n    }\n\n    document.getElementById(\"calendarViewToggle\").addEventListener(\"click\", () => setViewMode(\"calendar\"));\n    document.getElementById(\"listViewToggle\").addEventListener(\"click\", () => setViewMode(\"list\", \"month\"));\n    document.getElementById(\"twoWeekViewToggle\").addEventListener(\"click\", () => {\n      viewDate = new Date(today.getFullYear(), today.getMonth(), 1);\n      setViewMode(\"list\", \"two-week\");\n    });\n\n    document.getElementById(\"threeDayViewToggle\").addEventListener(\"click\", () => {\n      viewDate = new Date(today.getFullYear(), today.getMonth(), 1);\n      setViewMode(\"list\", \"three-day\");\n    });\n\n    document.getElementById(\"prevMonth\").addEventListener(\"click\", () => {\n      viewDate = new Date(viewDate.getFullYear(), viewDate.getMonth() - 1, 1);\n      renderCalendar();\n    });\n\n    document.getElementById(\"nextMonth\").addEventListener(\"click\", () => {\n      viewDate = new Date(viewDate.getFullYear(), viewDate.getMonth() + 1, 1);\n      renderCalendar();\n    });\n\n    document.getElementById(\"todayButton\").addEventListener(\"click\", () => {\n      selectedDateKey = isoDate(today);\n      viewDate = new Date(today.getFullYear(), today.getMonth(), 1);\n      renderCalendar();\n    });\n\n    document.getElementById(\"timeOffImport\").addEventListener(\"change\", async (event) => {\n      const file = event.target.files[0];\n      if (!file) return;\n      const status = document.getElementById(\"importStatus\");\n\n      if (!window.XLSX) {\n        status.textContent = \"XLSX parser unavailable\";\n        event.target.value = \"\";\n        return;\n      }\n\n      try {\n        const workbook = XLSX.read(await file.arrayBuffer(), { type: \"array\" });\n        const records = parseTimeOffWorkbook(workbook);\n        if (!records.length) {\n          status.textContent = \"No time away codes found\";\n          return;\n        }\n\n        writeTimeOff(recordsToCalendar(records));\n        selectedDateKey = records[0].date;\n        const selected = dateFromKey(selectedDateKey);\n        viewDate = new Date(selected.getFullYear(), selected.getMonth(), 1);\n        status.textContent = `${records.length} time away records imported`;\n        renderCalendar();\n      } catch (error) {\n        status.textContent = \"Import failed\";\n      } finally {\n        event.target.value = \"\";\n      }\n    });\n\n    document.getElementById(\"calendarGrid\").addEventListener(\"click\", (event) => {\n      const cell = event.target.closest(\"[data-date]\");\n      if (!cell) return;\n      openDayEditor(cell.dataset.date);\n    });\n\n    document.getElementById(\"listView\").addEventListener(\"click\", (event) => {\n      const offScheduleHeader = event.target.closest(\"[data-off-schedule-shift]\");\n      if (offScheduleHeader) {\n        openOffSchedule(offScheduleHeader.dataset.offScheduleDate, offScheduleHeader.dataset.offScheduleShift);\n        return;\n      }\n      const employeeButton = event.target.closest(\"[data-status-name]\");\n      if (employeeButton) {\n        openEmployeeStatus(employeeButton.dataset.statusName, employeeButton.dataset.statusDate, employeeButton);\n        return;\n      }\n      const cell = event.target.closest(\"[data-list-date]\");\n      if (!cell) return;\n      openDayEditor(cell.dataset.listDate);\n    });\n\n    document.getElementById(\"listView\").addEventListener(\"keydown\", (event) => {\n      if (!['Enter', ' '].includes(event.key)) return;\n      const offScheduleHeader = event.target.closest(\"[data-off-schedule-shift]\");\n      if (!offScheduleHeader) return;\n      event.preventDefault();\n      openOffSchedule(offScheduleHeader.dataset.offScheduleDate, offScheduleHeader.dataset.offScheduleShift);\n    });\n\n    function clickStartedInsideCalendarTools(event) {\n      const path = typeof event.composedPath === \"function\" ? event.composedPath() : [];\n      const toolSelector = \".calendar-grid, .staff-list-view, .view-toggle, .month-controls, .day-editor, .employee-bank-dialog\";\n      return path.some((node) => node && node.nodeType === 1 && node.matches && node.matches(toolSelector))\n        || (event.target.closest && event.target.closest(toolSelector));\n    }\n\n    document.addEventListener(\"click\", (event) => {\n      if (!selectedDateKey) return;\n      if (clickStartedInsideCalendarTools(event)) return;\n      selectedDateKey = \"\";\n      renderCalendar();\n    });\n\n    function wirePicker(selectId, inputId, transform = (value) => value) {\n      document.getElementById(selectId).addEventListener(\"change\", (event) => {\n        const value = event.target.value;\n        if (!value) return;\n        document.getElementById(inputId).value = transform(value);\n      });\n    }\n\n    wirePicker(\"employeeSelect\", \"employeeInput\");\n    wirePicker(\"reasonSelect\", \"reasonInput\", (value) => value.split(\" - \")[0]);\n    wirePicker(\"locationSelect\", \"locationInput\");\n\n    document.getElementById(\"closeDayEditor\").addEventListener(\"click\", closeDayEditor);\n    document.getElementById(\"dayEditorBackdrop\").addEventListener(\"click\", (event) => { if (event.target.id === \"dayEditorBackdrop\") closeDayEditor(); });\n    document.getElementById(\"employeeBankButton\").addEventListener(\"click\", openEmployeeBank);\n    document.getElementById(\"closeEmployeeBank\").addEventListener(\"click\", closeEmployeeBank);\n    document.getElementById(\"employeeBankBackdrop\").addEventListener(\"click\", (event) => { if (event.target.id === \"employeeBankBackdrop\") closeEmployeeBank(); });\n    document.getElementById(\"employeeBankEmployee\").addEventListener(\"change\", syncEmployeeBankTag);\n    document.getElementById(\"employeeBankForm\").addEventListener(\"submit\", (event) => {\n      event.preventDefault();\n      const name = document.getElementById(\"employeeBankEmployee\").value;\n      const tag = document.getElementById(\"employeeBankTag\").value;\n      if (!name) return;\n      const bank = readEmployeeBank();\n      const key = normalizeName(name);\n      if (tag) bank[key] = tag;\n      else delete bank[key];\n      writeEmployeeBank(bank);\n      document.getElementById(\"employeeBankStatus\").textContent = tag ? `${name} saved as ${tag === \"crane\" ? \"Crane\" : \"Unknown\"}.` : `${name} returned to roster default.`;\n      renderCalendar();\n    });\n    document.getElementById(\"closeEmployeeStatus\").addEventListener(\"click\", closeEmployeeStatus);\n    document.getElementById(\"employeeStatusBackdrop\").addEventListener(\"click\", (event) => { if (event.target.id === \"employeeStatusBackdrop\") closeEmployeeStatus(); });\n    document.addEventListener(\"click\", (event) => {\n      const backdrop = document.getElementById(\"employeeStatusBackdrop\");\n      if (!backdrop.classList.contains(\"open\")) return;\n      if (event.target.closest(\"#employeeStatusBackdrop .employee-bank-dialog, [data-status-name]\")) return;\n      closeEmployeeStatus();\n    });\n    document.getElementById(\"closeOffSchedule\").addEventListener(\"click\", closeOffSchedule);\n    document.getElementById(\"offScheduleBackdrop\").addEventListener(\"click\", (event) => { if (event.target.id === \"offScheduleBackdrop\") closeOffSchedule(); });\n    document.getElementById(\"employeeStatusActions\").addEventListener(\"click\", (event) => {\n      const action = event.target.closest(\"[data-quick-status]\");\n      if (!action) return;\n      const status = action.dataset.quickStatus;\n      if (!selectedStatusName || !selectedStatusDate || !status) return;\n      const unselect = status === \"clear\" || action.classList.contains(\"active\");\n      const nextStatus = unselect ? \"\" : status;\n      saveEmployeeStatus(selectedStatusName, selectedStatusDate, nextStatus);\n      const statusLabel = unselect ? \"Unselected\" : ({ here: \"Here\", flipline: \"Flip Line\", vac: \"Vacation\", sic: \"Sick\", calledoff: \"Called Off\", out: \"Out\", ncns: \"NCNS\", bnsf: \"BNSF\", unknown: \"Unknown\" }[status] || status);\n      document.getElementById(\"employeeStatusMessage\").textContent = `${selectedStatusName} updated to ${statusLabel}.`;\n      renderCalendar();\n      closeEmployeeStatus();\n    });\n    document.getElementById(\"dailyEmployeeList\").addEventListener(\"change\", (event) => {\n      const select = event.target.closest(\"[data-daily-status-name]\");\n      if (!select || !selectedDateKey) return;\n      saveEmployeeStatus(select.dataset.dailyStatusName, selectedDateKey, select.value);\n      renderCalendar();\n      renderDayEditor();\n    });\n    document.getElementById(\"dailyEmployeeList\").addEventListener(\"click\", (event) => {\n      const button = event.target.closest(\"[data-remove-day-name]\");\n      if (!button || !selectedDateKey) return;\n      const name = button.dataset.removeDayName;\n      const additions = readEmployeeDayAdditions();\n      additions[selectedDateKey] = (additions[selectedDateKey] || []).filter((employee) => normalizeName(employee.name) !== normalizeName(name));\n      if (!additions[selectedDateKey].length) delete additions[selectedDateKey];\n      writeEmployeeDayAdditions(additions);\n      const statuses = readEmployeeDayStatuses();\n      if (statuses[selectedDateKey]) {\n        delete statuses[selectedDateKey][normalizeName(name)];\n        if (!Object.keys(statuses[selectedDateKey]).length) delete statuses[selectedDateKey];\n        writeEmployeeDayStatuses(statuses);\n      }\n      renderCalendar();\n      renderDayEditor();\n    });\n    document.getElementById(\"addDayEmployeeForm\").addEventListener(\"submit\", (event) => {\n      event.preventDefault();\n      const input = document.getElementById(\"addDayEmployeeName\");\n      const name = input.value.trim();\n      const shift = document.getElementById(\"addDayEmployeeShift\").value === \"second\" ? \"second\" : \"first\";\n      if (!name || !selectedDateKey) return;\n      const additions = readEmployeeDayAdditions();\n      const rows = Array.isArray(additions[selectedDateKey]) ? additions[selectedDateKey] : [];\n      const existingIndex = rows.findIndex((employee) => normalizeName(employee.name) === normalizeName(name));\n      const addition = { name, shift };\n      if (existingIndex >= 0) rows[existingIndex] = addition;\n      else rows.push(addition);\n      additions[selectedDateKey] = rows;\n      writeEmployeeDayAdditions(additions);\n      saveEmployeeStatus(name, selectedDateKey, \"camein\");\n      input.value = \"\";\n      renderCalendar();\n      renderDayEditor();\n    });\n    document.addEventListener(\"keydown\", (event) => {\n      if (event.key !== \"Escape\") return;\n      closeDayEditor();\n      closeEmployeeBank();\n      closeEmployeeStatus();\n      closeOffSchedule();\n    });\n\n    document.getElementById(\"requestList\").addEventListener(\"click\", (event) => {\n      const editButton = event.target.closest(\".edit-request\");\n      if (editButton) {\n        editRequest(Number(editButton.dataset.index));\n        return;\n      }\n\n      const deleteButton = event.target.closest(\".delete-request\");\n      if (deleteButton) {\n        pendingDeleteIndex = Number(deleteButton.dataset.index);\n        if (editingRequestIndex === pendingDeleteIndex) {\n          editingRequestIndex = null;\n          document.getElementById(\"employeeInput\").value = \"\";\n          document.getElementById(\"reasonInput\").value = \"\";\n          document.getElementById(\"locationInput\").value = \"\";\n          document.getElementById(\"employeeSelect\").value = \"\";\n          document.getElementById(\"reasonSelect\").value = \"\";\n          document.getElementById(\"locationSelect\").value = \"\";\n          document.getElementById(\"addRequestButton\").textContent = \"Add\";\n        }\n        renderDayEditor();\n        document.getElementById(\"editorStatus\").textContent = \"Click Confirm to delete this one request.\";\n        return;\n      }\n\n      const cancelButton = event.target.closest(\".cancel-delete-request\");\n      if (cancelButton) {\n        pendingDeleteIndex = null;\n        renderDayEditor();\n        document.getElementById(\"editorStatus\").textContent = \"Delete canceled.\";\n        return;\n      }\n\n      const confirmButton = event.target.closest(\".confirm-delete-request\");\n      if (!confirmButton) return;\n      const deleteIndex = Number(confirmButton.dataset.index);\n      const calendar = readTimeOff();\n      const entries = calendar[selectedDateKey] || [];\n      if (!Number.isInteger(deleteIndex) || deleteIndex < 0 || deleteIndex >= entries.length) {\n        pendingDeleteIndex = null;\n        renderDayEditor();\n        document.getElementById(\"editorStatus\").textContent = \"Could not find that request to delete.\";\n        return;\n      }\n      entries.splice(deleteIndex, 1);\n      if (editingRequestIndex === deleteIndex) editingRequestIndex = null;\n      else if (editingRequestIndex !== null && editingRequestIndex > deleteIndex) editingRequestIndex -= 1;\n      pendingDeleteIndex = null;\n      if (entries.length) calendar[selectedDateKey] = entries;\n      else delete calendar[selectedDateKey];\n      writeTimeOff(calendar);\n      renderCalendar();\n      populateEditorOptions();\n      renderDayEditor();\n      clearRequestForm();\n      document.getElementById(\"editorStatus\").textContent = \"Request deleted.\";\n    });\n\n    document.getElementById(\"addRequestForm\").addEventListener(\"submit\", (event) => {\n      event.preventDefault();\n      const employeeInput = document.getElementById(\"employeeInput\");\n      const reasonInput = document.getElementById(\"reasonInput\");\n      const locationInput = document.getElementById(\"locationInput\");\n      const name = employeeInput.value.trim();\n      const code = reasonCodeFromInput(reasonInput.value);\n      const location = cleanLocation(locationInput.value);\n      const status = document.getElementById(\"editorStatus\");\n      if (!name || !code) { status.textContent = \"Employee and away reason are required.\"; return; }\n      const calendar = readTimeOff();\n      if (!calendar[selectedDateKey]) calendar[selectedDateKey] = [];\n      const nextEntry = { date: selectedDateKey, name, code, reason: reasonLabel(code), location, sheet: \"Manual\" };\n      if (editingRequestIndex !== null && calendar[selectedDateKey][editingRequestIndex]) {\n        calendar[selectedDateKey][editingRequestIndex] = { ...calendar[selectedDateKey][editingRequestIndex], ...nextEntry };\n      } else {\n        calendar[selectedDateKey].push(nextEntry);\n      }\n      calendar[selectedDateKey].sort(compareTimeOffRequests);\n      writeTimeOff(calendar);\n      renderCalendar();\n      populateEditorOptions();\n      renderDayEditor();\n      clearRequestForm();\n      document.getElementById(\"editorStatus\").textContent = editingRequestIndex === null ? \"Request saved.\" : \"Request saved.\";\n      employeeInput.focus();\n    });\n\n    window.addEventListener(\"storage\", (event) => {\n      if ([timeOffStorageKey, rosterStorageKey, rosterAdditionsKey, employeeBankStorageKey, employeeDayStatusStorageKey, employeeDayAdditionsStorageKey].includes(event.key)) {\n        populateEditorOptions();\n        renderCalendar();\n      }\n    });\n\n    window.addEventListener(\"focus\", () => {\n      populateEditorOptions();\n      renderCalendar();\n    });\n\n    populateEditorOptions();\n    renderCalendar();\n  <\/script>\n</body>\n</html>\n"
      }
};

    const tabs = document.querySelector(".workbook-tabs");
    const frame = document.getElementById("pageFrame");
    function pageFromHash() {
      const id = window.location.hash.replace(/^#/, "");
      return pages[id] ? id : "";
    }

    let activePage = pageFromHash() || localStorage.getItem("conglobal-active-page") || "timeMd";
    if (activePage === "time" && pageFromHash() !== "time") activePage = "timeMd";

    function resizeFrame() {
      try {
        const doc = frame.contentDocument;
        if (!doc) return;
        frame.style.height = Math.max(
          doc.documentElement.scrollHeight,
          doc.body ? doc.body.scrollHeight : 0,
          window.innerHeight - tabs.offsetHeight
        ) + "px";
      } catch (error) {
        frame.style.height = "calc(100vh - 42px)";
      }
    }

    function selectPage(id) {
      activePage = pages[id] ? id : "timeMd";
      localStorage.setItem("conglobal-active-page", activePage);
      if (window.location.hash !== `#${activePage}`) {
        history.replaceState(null, "", `#${activePage}`);
      }
      document.querySelectorAll(".workbook-tabs button").forEach((button) => {
        button.classList.toggle("active", button.dataset.page === activePage);
      });
      frame.srcdoc = pages[activePage].html;
    }

    Object.entries(pages).filter(([id]) => id !== "time").forEach(([id, page]) => {
      const button = document.createElement("button");
      button.type = "button";
      button.dataset.page = id;
      button.textContent = page.label;
      button.addEventListener("click", () => selectPage(id));
      tabs.appendChild(button);
    });

    frame.addEventListener("load", () => {
      resizeFrame();
      const doc = frame.contentDocument;
      if (!doc) return;
      doc.addEventListener("input", () => setTimeout(resizeFrame, 0));
      doc.addEventListener("click", () => setTimeout(resizeFrame, 0));
      setTimeout(resizeFrame, 100);
    });
    window.addEventListener("resize", resizeFrame);
    window.addEventListener("hashchange", () => selectPage(pageFromHash() || "timeMd"));
    selectPage(activePage);
  </script>
